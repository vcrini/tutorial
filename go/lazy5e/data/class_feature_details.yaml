          type: table
    - class_name: Paladin
      class_source: XPHB
      subclass_name: Glory
      subclass_source: XPHB
      feature: Peerless Athlete
      source: XPHB
      level: 3
      entries:
        - As a {@variantrule Bonus Action|XPHB}, you can expend one use of your Channel Divinity to augment your athleticism. For 1 hour, you have {@variantrule Advantage|XPHB} on Strength ({@skill Athletics|XPHB}) and Dexterity ({@skill Acrobatics|XPHB}) checks, and the distance of your Long and High Jumps increases by 10 feet (this extra distance costs movement as normal).
    - class_name: Paladin
      class_source: XPHB
      subclass_name: Glory
      subclass_source: XPHB
      feature: Aura of Alacrity
      source: XPHB
      level: 7
      entries:
        - Your Speed increases by 10 feet.
        - In addition, whenever an ally enters your Aura of Protection for the first time on a turn or starts their turn there, the ally's {@variantrule Speed|XPHB} increases by 10 feet until the end of their next turn.
    - class_name: Paladin
      class_source: XPHB
      subclass_name: Glory
      subclass_source: XPHB
      feature: Glorious Defense
      source: XPHB
      level: 15
      entries:
        - You can turn defense into a sudden strike. When you or another creature you can see within 10 feet of you is hit by an attack roll, you can take a {@variantrule Reaction|XPHB} to grant a bonus to the target's AC against that attack, potentially causing it to miss. The bonus equals your Charisma modifier (minimum of +1). If the attack misses, you can make one attack with a weapon against the attacker as part of this {@variantrule Reaction|XPHB} if the attacker is within your weapon's range.
        - You can use this feature a number of times equal to your Charisma modifier (minimum of once), and you regain all expended uses when you finish a {@variantrule Long Rest|XPHB}.
    - class_name: Paladin
      class_source: XPHB
      subclass_name: Glory
      subclass_source: XPHB
      feature: Living Legend
      source: XPHB
      level: 20
      entries:
        - You can empower yourself with the legends—whether true or exaggerated—of your great deeds. As a {@variantrule Bonus Action|XPHB}, you gain the benefits below for 10 minutes. Once you use this feature, you can't use it again until you finish a {@variantrule Long Rest|XPHB}. You can also restore your use of it by expending a level 5 spell slot (no action required).
        - entries:
            - You are blessed with an otherworldly presence and have {@variantrule Advantage|XPHB} on all Charisma checks.
          name: Charismatic
          type: entries
        - entries:
            - If you fail a saving throw, you can take a {@variantrule Reaction|XPHB} to reroll it. You must use this new roll.
          name: Saving Throw Reroll
          type: entries
        - entries:
            - Once on each of your turns when you make an attack roll with a weapon and miss, you can cause that attack to hit instead.
          name: Unerring Strike
          type: entries
    - class_name: Paladin
      class_source: XPHB
      subclass_name: Noble Genies
      subclass_source: FRHoF
      feature: Dao's Crush
      source: FRHoF
      level: 3
      entries:
        - Earth rises up around the target of your Divine Smite. The target has the {@condition Grappled|XPHB} condition (escape DC equal to your spell save DC). While {@condition Grappled|XPHB}, the target has the {@condition Restrained|XPHB} condition.
    - class_name: Paladin
      class_source: XPHB
      subclass_name: Noble Genies
      subclass_source: FRHoF
      feature: Djinni's Escape
      source: FRHoF
      level: 3
      entries:
        - You {@variantrule Teleportation|XPHB|teleport} to an unoccupied space you can see within 30 feet of yourself and take on a semi-incorporeal form, which lasts until the end of your next turn. While in this form, you have {@variantrule Resistance|XPHB} to Bludgeoning, Piercing, and Slashing damage, and you have {@variantrule Immunity|XPHB} to the {@condition Grappled|XPHB}, {@condition Prone|XPHB}, and {@condition Restrained|XPHB} conditions.
    - class_name: Paladin
      class_source: XPHB
      subclass_name: Noble Genies
      subclass_source: FRHoF
      feature: Efreeti's Fury
      source: FRHoF
      level: 3
      entries:
        - The target of your Divine Smite takes an extra {@damage 2d4} Fire damage, and fire jumps from the target to another creature you can see within 30 feet of yourself. The second creature also takes {@damage 2d4} Fire damage.
    - class_name: Paladin
      class_source: XPHB
      subclass_name: Noble Genies
      subclass_source: FRHoF
      feature: Elemental Smite
      source: FRHoF
      level: 3
      entries:
        - Immediately after you cast {@spell Divine Smite|XPHB}, you can expend one use of your {@classFeature Channel Divinity|Paladin|XPHB|3|XPHB} and invoke one of the following effects.
        - subclassFeature: Dao's Crush|Paladin|XPHB|Noble Genies|FRHoF|3|FRHoF
          type: refSubclassFeature
        - subclassFeature: Djinni's Escape|Paladin|XPHB|Noble Genies|FRHoF|3|FRHoF
          type: refSubclassFeature
        - subclassFeature: Efreeti's Fury|Paladin|XPHB|Noble Genies|FRHoF|3|FRHoF
          type: refSubclassFeature
        - subclassFeature: Marid's Surge|Paladin|XPHB|Noble Genies|FRHoF|3|FRHoF
          type: refSubclassFeature
    - class_name: Paladin
      class_source: XPHB
      subclass_name: Noble Genies
      subclass_source: FRHoF
      feature: Genie Spells
      source: FRHoF
      level: 3
      entries:
        - When you reach a Paladin level specified in the Genie Spells table, you thereafter always have the listed spells prepared.
