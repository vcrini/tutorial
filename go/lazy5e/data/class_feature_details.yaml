      subclass_name: Zeal (PSA)
      subclass_source: PSA
      feature: Zeal Domain (PSA)
      source: PSA
      level: 1
      entries:
        - entries:
            - The worthy shall rush to the God-Pharaoh's side with relentless zeal, rising to overcome every obstacle in their way.
          type: quote
