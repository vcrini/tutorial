      source: XPHB
      level: 14
      entries:
        - 'The target must succeed on a Constitution saving throw, or on its next turn, it can do only one of the following: move or take an action or a {@variantrule Bonus Action|XPHB}.'
    - class_name: Rogue
      class_source: XPHB
      feature: Devious Strikes
      source: XPHB
      level: 14
      entries:
        - You've practiced new ways to use your Sneak Attack deviously. The following effects are now among your Cunning Strike options.
        - entries:
            - classFeature: 'Daze (Cost: 2d6)|Rogue|XPHB|14|XPHB'
              type: refClassFeature
            - classFeature: 'Knock Out (Cost: 6d6)|Rogue|XPHB|14|XPHB'
