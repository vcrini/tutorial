        - If your DM allows the use of feats, you may instead take a {@5etools feat|feats.html}.
    - class_name: Druid
      class_source: PHB
      feature: Beast Spells
      source: PHB
      level: 18
      entries:
        - Beginning at 18th level, you can cast many of your druid spells in any shape you assume using Wild Shape. You can perform the somatic and verbal components of a druid spell while in a beast shape, but you aren't able to provide material components.
    - class_name: Druid
      class_source: PHB
      feature: Timeless Body
      source: PHB
      level: 18
      entries:
        - Starting at 18th level, the primal magic that you wield causes you to age more slowly. For every 10 years that pass, your body ages only 1 year.
    - class_name: Druid
      class_source: PHB
      feature: Ability Score Improvement
      source: PHB
      level: 19
      entries:
        - When you reach 19th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can't increase an ability score above 20 using this feature.
        - If your DM allows the use of feats, you may instead take a {@5etools feat|feats.html}.
    - class_name: Druid
      class_source: PHB
      feature: Archdruid
      source: PHB
      level: 20
      entries:
        - At 20th level, you can use your Wild Shape an unlimited number of times.
        - Additionally, you can ignore the verbal and somatic components of your druid spells, as well as any material components that lack a cost and aren't consumed by a spell. You gain this benefit in both your normal shape and your beast shape from Wild Shape.
    - class_name: Druid
      class_source: XPHB
      feature: Druidic
      source: XPHB
      level: 1
      entries:
        - You know Druidic, the secret language of Druids. While learning this ancient tongue, you also unlocked the magic of communicating with animals; you always have the {@spell Speak with Animals|XPHB} spell prepared.
        - You can use Druidic to leave hidden messages. You and others who know Druidic automatically spot such a message. Others spot the message's presence with a successful {@dc 15} Intelligence ({@skill Investigation|XPHB}) check but can't decipher it without magic.
    - class_name: Druid
      class_source: XPHB
      feature: Magician
      source: XPHB
      level: 1
      entries:
        - You know one extra cantrip from the {@filter Druid spell list|spells|class=Druid}. In addition, your mystical connection to nature gives you a bonus to your Intelligence ({@skill Arcana|XPHB} or {@skill Nature|XPHB}) checks. The bonus equals your Wisdom modifier (minimum bonus of +1).
    - class_name: Druid
      class_source: XPHB
      feature: Primal Order
      source: XPHB
      level: 1
      entries:
        - You have dedicated yourself to one of the following sacred roles of your choice.
        - entries:
            - count: 1
              entries:
                - classFeature: Magician|Druid|XPHB|1
                  type: refClassFeature
                - classFeature: Warden|Druid|XPHB|1
                  type: refClassFeature
              type: options
          type: entries
    - class_name: Druid
      class_source: XPHB
      feature: Spellcasting
      source: XPHB
      level: 1
      entries:
        - You have learned to cast spells through studying the mystical forces of nature. See {@book chapter 7|XPHB|7} for the rules on spellcasting. The information below details how you use those rules with Druid spells, which appear on the {@filter Druid spell list|spells|class=Druid} later in the class's description.
        - entries:
            - entries:
                - You know two cantrips of your choice from the {@filter Druid spell list|spells|class=Druid}. {@spell Druidcraft|XPHB} and {@spell Produce Flame|XPHB} are recommended.
                - Whenever you gain a Druid level, you can replace one of your cantrips with another cantrip of your choice from the {@filter Druid spell list|spells|class=Druid}.
                - When you reach Druid levels 4 and 10, you learn another cantrip of your choice from the {@filter Druid spell list|spells|class=Druid}, as shown in the Cantrips column of the Druid Features table.
              name: Cantrips
              type: entries
            - entries:
                - The Druid Features table shows how many spell slots you have to cast your level 1+ spells. You regain all expended slots when you finish a {@variantrule Long Rest|XPHB}.
              name: Spell Slots
              type: entries
            - entries:
                - You prepare the list of level 1+ spells that are available for you to cast with this feature. To start, choose four level 1 spells from the {@filter Druid spell list|spells|class=Druid}. {@spell Animal Friendship|XPHB}, {@spell Cure Wounds|XPHB}, {@spell Faerie Fire|XPHB}, and {@spell Thunderwave|XPHB} are recommended.
                - The number of spells on your list increases as you gain Druid levels, as shown in the Prepared Spells column of the Druid Features table. Whenever that number increases, choose additional spells from the {@filter Druid spell list|spells|class=Druid} until the number of spells on your list matches the number on the table. The chosen spells must be of a level for which you have spell slots. For example, if you're a level 3 Druid, your list of prepared spells can include six spells of levels 1 and 2 in any combination.
                - If another Druid feature gives you spells that you always have prepared, those spells don't count against the number of spells you can prepare with this feature, but those spells otherwise count as Druid spells for you.
              name: Prepared Spells of Level 1+
              type: entries
            - entries:
                - Whenever you finish a {@variantrule Long Rest|XPHB}, you can change your list of prepared spells, replacing any of the spells with other Druid spells for which you have spell slots.
              name: Changing Your Prepared Spells
              type: entries
            - entries:
                - Wisdom is your spellcasting ability for your Druid spells.
              name: Spellcasting Ability
              type: entries
            - entries:
                - You can use a {@item Druidic Focus|XPHB} as a {@variantrule Spellcasting Focus|XPHB} for your Druid spells.
              name: Spellcasting Focus
              type: entries
          type: entries
    - class_name: Druid
      class_source: XPHB
      feature: Warden
      source: XPHB
      level: 1
      entries:
        - Trained for battle, you gain proficiency with {@filter Martial weapons|items|type=martial weapon} and training with {@filter Medium armor|items|type=Medium Armor}.
    - class_name: Druid
      class_source: XPHB
      feature: Wild Companion
      source: XPHB
      level: 2
      entries:
        - You can summon a nature spirit that assumes an animal form to aid you. As a {@action Magic|XPHB} action, you can expend a spell slot or a use of Wild Shape to cast the {@spell Find Familiar|XPHB} spell without Material components.
        - When you cast the spell in this way, the familiar is Fey and disappears when you finish a {@variantrule Long Rest|XPHB}.
    - class_name: Druid
      class_source: XPHB
      feature: Wild Shape
      source: XPHB
      level: 2
      entries:
        - The power of nature allows you to assume the form of an animal. As a {@variantrule Bonus Action|XPHB}, you shape-shift into a Beast form that you have learned for this feature (see "Known Forms" below). You stay in that form for a number of hours equal to half your Druid level or until you use Wild Shape again, have the {@condition Incapacitated|XPHB} condition, or die. You can also leave the form early as a {@variantrule Bonus Action|XPHB}.
        - entries:
            - entries:
                - You can use Wild Shape twice. You regain one expended use when you finish a {@variantrule Short Rest|XPHB}, and you regain all expended uses when you finish a {@variantrule Long Rest|XPHB}.
                - You gain additional uses when you reach certain Druid levels, as shown in the Wild Shape column of the Druid Features table.
              name: Number of Uses
              type: entries
            - entries:
                - You know four Beast forms for this feature, chosen from among Beast stat blocks that have a maximum {@variantrule Challenge Rating|XPHB} of 1/4 and that lack a {@variantrule Fly Speed|XPHB} (see appendix B for stat block options). The {@creature Rat|XMM}, {@creature Riding Horse|XMM}, {@creature Spider|XMM}, and {@creature Wolf|XMM} are recommended. Whenever you finish a {@variantrule Long Rest|XPHB}, you can replace one of your known forms with another eligible form.
                - When you reach certain Druid levels, your number of known forms and the maximum {@variantrule Challenge Rating|XPHB} for those forms increases, as shown in the Beast Shapes table. In addition, starting at level 8, you can adopt a form that has a {@variantrule Fly Speed|XPHB}.
                - When choosing known forms, you may look in the {@book Monster Manual|XMM} or elsewhere for eligible Beasts if the Dungeon Master permits you to do so.
              name: Known Forms
              type: entries
            - caption: Beast Shapes
              colLabels:
                - Druid Level
                - Known Forms
                - Max CR
                - Fly Speed
              colStyles:
                - col-3 text-center
                - col-3 text-center
                - col-3 text-center
              rows:
                - - "2"
                  - "4"
                  - '{@filter 1/4|bestiary|challenge rating=[&0;&1/4]|type=beast|speed type=!fly|miscellaneous=!swarm}'
                  - "No"
                - - "4"
                  - "6"
                  - '{@filter 1/2|bestiary|challenge rating=[&0;&1/2]|type=beast|speed type=!fly|miscellaneous=!swarm}'
                  - "No"
                - - "8"
                  - "8"
                  - '{@filter 1|bestiary|challenge rating=[&0;&1]|type=beast|miscellaneous=!swarm}'
                  - "Yes"
              type: table
            - entries:
                - 'While in a form, you retain your personality, memories, and ability to speak, and the following rules apply:'
                - items:
                    - entries:
                        - When you assume a Wild Shape form, you gain a number of {@variantrule Temporary Hit Points|XPHB} equal to your Druid level.
                      name: Temporary Hit Points
                      type: item
                    - entries:
                        - Your game statistics are replaced by the Beast's stat block, but you retain your creature type; {@variantrule Hit Points|XPHB}; {@variantrule Hit Point Dice|XPHB}; Intelligence, Wisdom, and Charisma scores; class features; languages; and feats. You also retain your skill and saving throw proficiencies and use your {@variantrule Proficiency|XPHB|Proficiency Bonus} for them, in addition to gaining the proficiencies of the creature. If a skill or saving throw modifier in the Beast's stat block is higher than yours, use the one in the stat block.
                      name: Game Statistics
                      type: item
                    - entries:
                        - You can't cast spells, but shape-shifting doesn't break your {@status Concentration|XPHB} or otherwise interfere with a spell you've already cast.
                      name: No Spellcasting
                      type: item
                    - entries:
                        - Your ability to handle objects is determined by the form's limbs rather than your own. In addition, you choose whether your equipment falls in your space, merges into your new form, or is worn by it. Worn equipment functions as normal, but the DM decides whether it's practical for the new form to wear a piece of equipment based on the creature's size and shape. Your equipment doesn't change size or shape to match the new form, and any equipment that the new form can't wear must either fall to the ground or merge with the form. Equipment that merges with the form has no effect while you're in that form.
                      name: Objects
                      type: item
                  style: list-hang-notitle
                  type: list
              name: Rules While Shape-Shifted
              type: entries
          type: entries
    - class_name: Druid
