      level: 3
    - class_name: Cleric
      class_source: XPHB
      subclass_name: War
      subclass_source: XPHB
      feature: Guided Strike
      source: XPHB
      level: 3
      entries:
        - When you or a creature within 30 feet of you misses with an attack roll, you can expend one use of your Channel Divinity and give that roll a +10 bonus, potentially causing it to hit. When you use this feature to benefit another creature's attack roll, you must take a {@variantrule Reaction|XPHB} to do so.
    - class_name: Cleric
      class_source: XPHB
      subclass_name: War
      subclass_source: XPHB
      feature: War Domain
      source: XPHB
      level: 3
      entries:
        - '{@i Inspire Valor and Smite Foes}'
        - War has many manifestations. It can make heroes of ordinary people. It can be desperate and horrific, with acts of cruelty and cowardice eclipsing instances of excellence and courage. Clerics who tap into the magic of the War Domain excel in battle, inspiring others to fight the good fight or offering acts of violence as prayers.
        - Gods of the War Domain watch over warriors and reward them for their great deeds. They include champions of honor and chivalry as well as gods of destruction and pillage. Other war gods take a more neutral stance, promoting war in all its manifestations and supporting warriors in any circumstance.
        - subclassFeature: War Domain Spells|Cleric|XPHB|War|XPHB|3
          type: refSubclassFeature
        - subclassFeature: War Priest|Cleric|XPHB|War|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Guided Strike|Cleric|XPHB|War|XPHB|3
          type: refSubclassFeature
    - class_name: Cleric
      class_source: XPHB
      subclass_name: War
      subclass_source: XPHB
      feature: War Domain Spells
      source: XPHB
      level: 3
      entries:
        - Your connection to this divine domain ensures you always have certain spells ready. When you reach a Cleric level specified in the War Domain Spells table, you thereafter always have the listed spells prepared.
        - caption: War Domain Spells
          colLabels:
            - Cleric Level
            - Prepared Spells
          colStyles:
            - col-1 text-center
            - col-11
          rows:
            - - 3rd
              - '{@spell Guiding Bolt|XPHB}, {@spell Magic Weapon|XPHB}, {@spell Shield of Faith|XPHB}, {@spell Spiritual Weapon|XPHB}'
            - - 5th
              - '{@spell Crusader''s Mantle|XPHB}, {@spell Spirit Guardians|XPHB}'
            - - 7th
              - '{@spell Fire Shield|XPHB}, {@spell Freedom of Movement|XPHB}'
            - - 9th
              - '{@spell Hold Monster|XPHB}, {@spell Steel Wind Strike|XPHB}'
          type: table
    - class_name: Cleric
      class_source: XPHB
      subclass_name: War
      subclass_source: XPHB
      feature: War Priest
      source: XPHB
      level: 3
      entries:
        - As a {@variantrule Bonus Action|XPHB}, you can make one attack with a weapon or an {@variantrule Unarmed Strike|XPHB}. You can use this {@variantrule Bonus Action|XPHB} a number of times equal to your Wisdom modifier (minimum of once). You regain all expended uses when you finish a {@variantrule Short Rest|XPHB|Short} or {@variantrule Long Rest|XPHB}.
    - class_name: Cleric
      class_source: XPHB
      subclass_name: War
      subclass_source: XPHB
      feature: War God's Blessing
      source: XPHB
      level: 6
      entries:
        - You can expend a use of your Channel Divinity to cast {@spell Shield of Faith|XPHB} or {@spell Spiritual Weapon|XPHB} rather than expending a spell slot. When you cast either spell in this way, the spell doesn't require {@status Concentration|XPHB}. Instead the spell lasts for 1 minute, but it ends early if you cast that spell again, have the {@condition Incapacitated|XPHB} condition, or die.
    - class_name: Cleric
      class_source: XPHB
      subclass_name: War
      subclass_source: XPHB
      feature: Avatar of Battle
      source: XPHB
      level: 17
      entries:
        - You gain {@variantrule Resistance|XPHB} to Bludgeoning, Piercing, and Slashing damage.
    - class_name: Cleric
      class_source: XPHB
      subclass_name: Zeal (PSA)
      subclass_source: PSA
      feature: 'Channel Divinity: Consuming Fervor'
      source: PSA
      level: 3
