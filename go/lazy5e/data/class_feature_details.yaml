    - class_name: Artificer
      class_source: EFA
      feature: Artificer Subclass
      source: EFA
      level: 3
      entries:
        - You gain an Artificer subclass of your choice. The {@subclass Alchemist|Artificer|EFA|EFA}, {@subclass Armorer|Artificer|EFA|EFA}, {@subclass Artillerist|Artificer|EFA|EFA}, and {@subclass Battle Smith|Artificer|EFA|EFA}, and {@subclass Cartographer|Artificer|EFA|EFA} subclasses are detailed after this class's description. A subclass is a specialization that grants you features at certain Artificer levels. For the rest of your career, you gain each of your subclass's features that are of your Artificer level or lower.
    - class_name: Artificer
      class_source: EFA
      feature: Ability Score Improvement
      source: EFA
      level: 4
      entries:
        - You gain the {@feat Ability Score Improvement|XPHB} feat or another feat of your choice for which you qualify. You gain this feature again at Artificer levels 8, 12, and 16.
    - class_name: Artificer
      class_source: EFA
      feature: Subclass feature
      source: EFA
      level: 5
      entries:
        - You gain a feature from your Artificer Subclass.
    - class_name: Artificer
      class_source: EFA
      feature: Magic Item Tinker
      source: EFA
      level: 6
      entries:
        - Your {@classFeature Replicate Magic Item|Artificer|EFA|2|EFA} feature gains the following options.
        - entries:
            - entries:
                - As a {@variantrule Bonus Action|XPHB}, you can touch a magic item within 5 feet of yourself that you created with Replicate Magic Item and that uses charges. You expend a level 1+ spell slot and recharge the item. The number of charges the item regains is equal to the level of spell slot expended.
              name: Charge Magic Item
              type: entries
            - entries:
                - As a {@variantrule Bonus Action|XPHB}, you can touch a magic item within 5 feet of yourself that you created with Replicate Magic Item and cause the item to vanish, converting its magical energy into a spell slot. The slot is level 1 if the item is Common or level 2 if the item is Uncommon or Rare. Once you use this feature, you can't do so again until you finish a {@variantrule Long Rest|XPHB}. Any spell slot you create with this feature vanishes when you finish a {@variantrule Long Rest|XPHB}.
              name: Drain Magic Item
              type: entries
            - entries:
                - As a {@action Magic|XPHB} action, you can touch one magic item within 5 feet of yourself that you created with Replicate Magic Item and transform it into a different magic item. The resulting item must be based on a magic item plan you know. Once you use this feature, you can't do so again until you finish a {@variantrule Long Rest|XPHB}.
              name: Transmute Magic Item
              type: entries
          type: entries
    - class_name: Artificer
      class_source: EFA
      feature: Flash of Genius
      source: EFA
      level: 7
      entries:
        - When you or a creature you can see within 30 feet of you fails an ability check or a saving throw, you can take a {@variantrule Reaction|XPHB} to add a bonus to the roll, potentially causing it to succeed. The bonus equals your Intelligence modifier (minimum of +1).
        - You can take this {@variantrule Reaction|XPHB} a number of times equal to your Intelligence modifier (minimum of once). You regain all expended uses when you finish a {@variantrule Long Rest|XPHB}.
    - class_name: Artificer
      class_source: EFA
      feature: Ability Score Improvement
      source: EFA
      level: 8
      entries:
        - You gain the {@feat Ability Score Improvement|XPHB} feat or another feat of your choice for which you qualify.
    - class_name: Artificer
      class_source: EFA
      feature: Subclass feature
      source: EFA
      level: 9
      entries:
        - You gain a feature from your Artificer Subclass.
    - class_name: Artificer
      class_source: EFA
      feature: Magic Item Adept
      source: EFA
      level: 10
      entries:
        - You can now attune to up to four magic items at once.
    - class_name: Artificer
      class_source: EFA
      feature: Spell-Storing Item
      source: EFA
      level: 11
      entries:
        - Whenever you finish a {@variantrule Long Rest|XPHB}, you can touch one Simple or Martial weapon or one item that you can use as a {@variantrule Spellcasting Focus|XPHB}, and you store a spell in it, choosing a level 1, 2, or 3 Artificer spell that has a casting time of an action and doesn't require a Material component that is consumed by the spell (you needn't have the spell prepared).
        - While holding the object, a creature can take a {@action Magic|XPHB} action to produce the spell's effect from it, using your spellcasting ability modifier. If the spell requires {@status Concentration|XPHB}, the creature must concentrate. Once a creature has used the object to produce the spell's effect, the object can't be used this way again until the start of the creature's next turn.
        - The spell stays in the object until it's been used a number of times equal to twice your Intelligence modifier (minimum of twice) or until you use this feature again to store a spell in an object.
    - class_name: Artificer
      class_source: EFA
      feature: Ability Score Improvement
      source: EFA
      level: 12
      entries:
        - You gain the {@feat Ability Score Improvement|XPHB} feat or another feat of your choice for which you qualify.
    - class_name: Artificer
      class_source: EFA
      feature: Advanced Artifice
      source: EFA
      level: 14
      entries:
        - You gain the following benefits.
        - entries:
            - entries:
                - You can now attune to up to five magic items at once.
              name: Magic Item Savant
              type: entries
            - entries:
                - When you finish a {@variantrule Short Rest|XPHB}, you regain one expended use of your {@classFeature Flash of Genius|Artificer|EFA|7|EFA} feature.
              name: Refreshed Genius
              type: entries
          type: entries
    - class_name: Artificer
      class_source: EFA
      feature: Subclass feature
      source: EFA
      level: 15
      entries:
        - You gain a feature from your Artificer Subclass.
    - class_name: Artificer
      class_source: EFA
      feature: Ability Score Improvement
      source: EFA
      level: 16
      entries:
        - You gain the {@feat Ability Score Improvement|XPHB} feat or another feat of your choice for which you qualify.
    - class_name: Artificer
      class_source: EFA
      feature: Magic Item Master
      source: EFA
      level: 18
      entries:
        - You can now attune to up to six magic items at once.
    - class_name: Artificer
      class_source: EFA
      feature: Epic Boon
      source: EFA
      level: 19
      entries:
        - You gain an Epic Boon feat or another feat of your choice for which you qualify. {@feat Boon of Energy Resistance|XPHB} is recommended.
    - class_name: Artificer
      class_source: EFA
      feature: Soul of Artifice
      source: EFA
      level: 20
      entries:
        - You have developed a mystical connection to your magic items, which you can draw on for aid. You gain the following benefits.
        - entries:
            - entries:
                - If you're reduced to 0 {@variantrule Hit Points|XPHB} but not killed outright, you can disintegrate any number of Uncommon or Rare magic items created by your Replicate Magic Item feature. If you do so, your {@variantrule Hit Points|XPHB} instead change to a number equal to 20 times the number of magic items disintegrated.
              name: Cheat Death
              type: entries
            - entries:
                - When you finish a {@variantrule Short Rest|XPHB}, you regain all expended uses of your {@classFeature Flash of Genius|Artificer|EFA|7|EFA} if you have {@variantrule Attunement|XPHB} to at least one magic item.
              name: Magical Guidance
              type: entries
          type: entries
    - class_name: Artificer
      class_source: TCE
      feature: Magical Tinkering
      source: TCE
      level: 1
      entries:
        - '{@i 1st-level artificer feature}'
        - 'You''ve learned how to invest a spark of magic into mundane objects. To use this ability, you must have {@item thieves'' tools|PHB} or {@item artisan''s tools|PHB} in hand. You then touch a Tiny nonmagical object as an action and give it one of the following magical properties of your choice:'
        - items:
            - The object sheds bright light in a 5-foot radius and dim light for an additional 5 feet.
            - Whenever tapped by a creature, the object emits a recorded message that can be heard up to 10 feet away. You utter the message when you bestow this property on the object, and the recording can be no more than 6 seconds long.
            - The object continuously emits your choice of an odor or a nonverbal sound (wind, waves, chirping, or the like). The chosen phenomenon is perceivable up to 10 feet away.
            - A static visual effect appears on one of the object's surfaces. This effect can be a picture, up to 25 words of text, lines and shapes, or a mixture of these elements, as you like.
          type: list
        - The chosen property lasts indefinitely. As an action, you can touch the object and end the property early.
        - You can bestow magic on multiple objects, touching one object each time you use this feature, though a single object can only bear one property at a time. The maximum number of objects you can affect with this feature at one time is equal to your Intelligence modifier (minimum of one object). If you try to exceed your maximum, the oldest property immediately ends, and then the new property applies.
    - class_name: Artificer
      class_source: TCE
      feature: 'Optional Rule: Firearm Proficiency'
      source: TCE
      level: 1
      entries:
        - The secrets of creating and operating gunpowder weapons have been discovered in various corners of the D&D multiverse. If your Dungeon Master uses the rules on firearms in {@book chapter 9|DMG|9|Firearms} of the {@book Dungeon Master's Guide|DMG} and your artificer has been exposed to the operation of such weapons, your artificer is proficient with them.
    - class_name: Artificer
      class_source: TCE
      feature: Spellcasting
      source: TCE
      level: 1
      entries:
        - '{@i 1st-level artificer feature}'
        - You've studied the workings of magic and how to cast spells, channeling the magic through objects. To observers, you don't appear to be casting spells in a conventional way; you appear to produce wonders from mundane items and outlandish inventions.
        - entries:
            - You produce your artificer spell effects through your tools. You must have a spellcasting focus—specifically {@item thieves' tools|phb} or some kind of {@item artisan's tools|phb|artisan's tool}—in hand when you cast any spell with this Spellcasting feature (meaning the spell has an 'M' component when you cast it). You must be proficient with the tool to use it in this way. See {@book chapter 5|PHB|4}, "Equipment," in the {@book Player's Handbook|PHB} for descriptions of these tools.
            - After you gain the Infuse Item feature at 2nd level, you can also use any item bearing one of your infusions as a spellcasting focus.
            - entries:
                - As an artificer, you use tools when you cast your spells. When describing your spellcasting, think about how you're using a tool to perform the spell effect. If you cast {@spell cure wounds} using {@item alchemist's supplies|PHB}, you could be quickly producing a salve. If you cast it using {@item tinker's tools|PHB}, you might have a miniature mechanical spider that binds wounds. When you cast {@spell poison spray}, you could fling foul chemicals or use a wand that spits venom. The effect of the spell is the same as for a spellcaster of any other class, but your method of spellcasting is special.
                - The same principle applies when you prepare your spells. As an artificer, you don't study a spellbook or pray to prepare your spells. Instead, you work with your tools and create the specialized items you'll use to produce your effects. If you replace {@spell cure wounds} with {@spell heat metal}, you might be altering the device you use to heal—perhaps modifying a tool so that it channels heat instead of healing energy.
                - Such details don't limit you in any way or provide you with any benefit beyond the spell's effects. You don't have to justify how you're using tools to cast a spell. But describing your spellcasting creatively is a fun way to distinguish yourself from other spellcasters.
              name: The Magic of Artifice
              type: inset
          name: Tools Required
          type: entries
        - entries:
            - At 1st level, you know two cantrips of your choice from the {@filter artificer spell list|spells|level=0|class=Artificer}. At higher levels, you learn additional artificer cantrips of your choice, as shown in the Cantrips Known column of the Artificer table.
            - When you gain a level in this class, you can replace one of the artificer cantrips you know with another cantrip from the artificer spell list.
          name: Cantrips (0-Level Spells)
          type: entries
        - entries:
            - The Artificer table shows how many spell slots you have to cast your artificer spells. To cast one of your artificer spells of 1st level or higher, you must expend a slot of the spell's level or higher. You regain all expended spell slots when you finish a long rest.
            - You prepare the list of artificer spells that are available for you to cast, choosing from the {@filter artificer spell list|spells|class=Artificer}. When you do so, choose a number of artificer spells equal to your Intelligence modifier + half your artificer level, rounded down (minimum of one spell). The spells must be of a level for which you have spell slots.
            - For example, if you are a 5th-level artificer, you have four 1st-level and two 2nd-level spell slots. With an Intelligence of 14, your list of prepared spells can include four spells of 1st or 2nd level, in any combination. If you prepare the 1st-level spell {@spell cure wounds}, you can cast it using a 1st-level or a 2nd-level slot. Casting the spell doesn't remove it from your list of prepared spells.
            - 'You can change your list of prepared spells when you finish a long rest. Preparing a new list of artificer spells requires time spent tinkering with your spellcasting focuses: at least 1 minute per spell level for each spell on your list.'
          name: Preparing and Casting Spells
          type: entries
        - entries:
            - Intelligence is your spellcasting ability for your artificer spells; your understanding of the theory behind magic allows you to wield these spells with superior skill. You use your Intelligence whenever an artificer spell refers to your spellcasting ability. In addition, you use your Intelligence modifier when setting the saving throw DC for an artificer spell you cast and when making an attack roll with one.
            - attributes:
                - int
              name: Spell
              type: abilityDc
            - attributes:
                - int
              name: Spell
              type: abilityAttackMod
          name: Spellcasting Ability
          type: entries
        - entries:
            - You can cast an artificer spell as a ritual if that spell has the ritual tag and you have the spell prepared.
          name: Ritual Casting
          type: entries
    - class_name: Artificer
      class_source: TCE
      feature: Infuse Item
      source: TCE
      level: 2
      entries:
        - '{@i 2nd-level artificer feature}'
        - You've gained the ability to imbue mundane items with certain magical infusions, turning those objects into magic items.
        - classFeature: Infusions Known|Artificer|TCE|2
          type: refClassFeature
        - entries:
            - Artificers have invented numerous magical infusions, extraordinary processes that rapidly create magic items. To many, artificers seem like wonderworkers, accomplishing in hours what others need weeks to complete.
            - The description of each of the following infusions details the type of item that can receive it, along with whether the resulting magic item requires attunement.
            - Some infusions specify a minimum artificer level. You can't learn such an infusion until you are at least that level.
            - Unless an infusion's description says otherwise, you can't learn an infusion more than once.
          name: Artificer Infusions
          type: inset
        - entries:
            - Whenever you finish a long rest, you can touch a nonmagical object and imbue it with one of your artificer infusions, turning it into a magic item. An infusion works on only certain kinds of objects, as specified in the infusion's description. If the item requires attunement, you can attune yourself to it the instant you infuse the item. If you decide to attune to the item later, you must do so using the normal process for attunement (see "{@book Attunement|DMG|7|Attunement}" in chapter 7 of the {@book Dungeon Master's Guide|DMG}).
            - Your infusion remains in an item indefinitely, but when you die, the infusion vanishes after a number of days have passed equal to your Intelligence modifier (minimum of 1 day). The infusion also vanishes if you give up your knowledge of the infusion for another one.
            - You can infuse more than one nonmagical object at the end of a long rest; the maximum number of objects appears in the Infused Items column of the Artificer table. You must touch each of the objects, and each of your infusions can be in only one object at a time. Moreover, no object can bear more than one of your infusions at a time. If you try to exceed your maximum number of infusions, the oldest infusion immediately ends, and then the new infusion applies.
            - If an infusion ends on an item that contains other things, like a {@item bag of holding}, its contents harmlessly appear in and around its space.
          name: Infusing an Item
          type: entries
    - class_name: Artificer
      class_source: TCE
      feature: Infusions Known
      source: TCE
      level: 2
      entries:
        - When you gain this feature, pick four artificer infusions to learn, choosing from the "{@filter Artificer Infusions|optionalfeatures|feature type=ai|source=TCE}" section at the end of the class's description. You learn additional infusions of your choice when you reach certain levels in this class, as shown in the Infusions Known column of the Artificer table.
        - Whenever you gain a level in this class, you can replace one of the artificer infusions you learned with a new one.
    - class_name: Artificer
      class_source: TCE
      feature: Artificer Specialist
      source: TCE
      level: 3
      entries:
        - '{@i 3rd-level artificer feature}'
        - Choose the type of specialist you are, each of which is detailed at the end of the class's description. Your choice grants you features at 5th level and again at 9th and 15th level.
    - class_name: Artificer
      class_source: TCE
      feature: The Right Tool for the Job
      source: TCE
      level: 3
      entries:
        - '{@i 3rd-level artificer feature}'
        - 'You''ve learned how to produce exactly the tool you need: with {@item thieves'' tools|PHB} or {@item artisan''s tools|PHB} in hand, you can magically create one set of {@item artisan''s tools|PHB} in an unoccupied space within 5 feet of you. This creation requires 1 hour of uninterrupted work, which can coincide with a short or long rest. Though the product of magic, the tools are nonmagical, and they vanish when you use this feature again.'
    - class_name: Artificer
      class_source: TCE
      feature: Ability Score Improvement
      source: TCE
      level: 4
      entries:
        - '{@i 4th-level artificer feature}'
        - When you reach 4th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can't increase an ability score above 20 using this feature.
        - If your DM allows the use of feats, you may instead take a {@5etools feat|feats.html}.
    - class_name: Artificer
      class_source: TCE
      feature: Artificer Specialist Feature
      source: TCE
      level: 5
      entries:
        - '{@i 5th-level artificer feature}'
        - You gain a feature granted by your Artificer Specialist choice.
    - class_name: Artificer
      class_source: TCE
      feature: Tool Expertise
      source: TCE
      level: 6
      entries:
        - '{@i 6th-level artificer feature}'
        - Your proficiency bonus is now doubled for any ability check you make that uses your proficiency with a tool.
    - class_name: Artificer
      class_source: TCE
      feature: Flash of Genius
      source: TCE
      level: 7
      entries:
        - '{@i 7th-level artificer feature}'
        - You've gained the ability to come up with solutions under pressure. When you or another creature you can see within 30 feet of you makes an ability check or a saving throw, you can use your reaction to add your Intelligence modifier to the roll.
        - You can use this feature a number of times equal to your Intelligence modifier (minimum of once). You regain all expended uses when you finish a long rest.
    - class_name: Artificer
      class_source: TCE
      feature: Ability Score Improvement
      source: TCE
      level: 8
      entries:
        - '{@i 8th-level artificer feature}'
        - When you reach 8th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can't increase an ability score above 20 using this feature.
        - If your DM allows the use of feats, you may instead take a {@5etools feat|feats.html}.
    - class_name: Artificer
      class_source: TCE
      feature: Artificer Specialist Feature
      source: TCE
      level: 9
      entries:
        - '{@i 9th-level artificer feature}'
        - You gain a feature granted by your Artificer Specialist choice.
    - class_name: Artificer
      class_source: TCE
      feature: Magic Item Adept
      source: TCE
      level: 10
      entries:
        - '{@i 10th-level artificer feature}'
        - 'You''ve achieved a profound understanding of how to use and make magic items:'
        - items:
            - You can attune to up to four magic items at once.
            - If you craft a magic item with a rarity of common or uncommon, it takes you a quarter of the normal time, and it costs you half as much of the usual gold.
          type: list
    - class_name: Artificer
      class_source: TCE
      feature: Spell-Storing Item
      source: TCE
      level: 11
      entries:
        - '{@i 11th-level artificer feature}'
        - You can now store a spell in an object. Whenever you finish a long rest, you can touch one {@filter simple or martial weapon|items|source=phb|category=basic|type=martial weapon;simple weapon} or one item that you can use as a spellcasting focus, and you store a spell in it, choosing a 1st- or 2nd-level spell from the {@filter artificer spell list|spells|class=Artificer|cast time=action|level=1;2} that requires 1 action to cast (you needn't have it prepared).
        - While holding the object, a creature can take an action to produce the spell's effect from it, using your spellcasting ability modifier. If the spell requires {@status concentration}, the creature must concentrate. The spell stays in the object until it's been used a number of times equal to twice your Intelligence modifier (minimum of twice) or until you use this feature again to store a spell in an object.
    - class_name: Artificer
      class_source: TCE
      feature: Ability Score Improvement
      source: TCE
      level: 12
      entries:
        - '{@i 12th-level artificer feature}'
        - When you reach 12th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can't increase an ability score above 20 using this feature.
        - If your DM allows the use of feats, you may instead take a {@5etools feat|feats.html}.
    - class_name: Artificer
      class_source: TCE
      feature: Magic Item Savant
      source: TCE
      level: 14
      entries:
        - '{@i 14th-level artificer feature}'
        - 'Your skill with magic items deepens:'
        - items:
            - You can attune to up to five magic items at once.
            - You ignore all class, race, spell, and level requirements on attuning to or using a magic item.
          type: list
    - class_name: Artificer
      class_source: TCE
      feature: Artificer Specialist Feature
      source: TCE
      level: 15
      entries:
        - '{@i 15th-level artificer feature}'
        - You gain a feature granted by your Artificer Specialist choice.
    - class_name: Artificer
      class_source: TCE
      feature: Ability Score Improvement
      source: TCE
      level: 16
      entries:
        - '{@i 16th-level artificer feature}'
        - When you reach 16th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can't increase an ability score above 20 using this feature.
        - If your DM allows the use of feats, you may instead take a {@5etools feat|feats.html}.
    - class_name: Artificer
      class_source: TCE
      feature: Magic Item Master
      source: TCE
      level: 18
      entries:
        - '{@i 18th-level artificer feature}'
        - You can now attune to up to six magic items at once.
    - class_name: Artificer
      class_source: TCE
      feature: Ability Score Improvement
      source: TCE
      level: 19
      entries:
        - '{@i 19th-level artificer feature}'
        - When you reach 19th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can't increase an ability score above 20 using this feature.
        - If your DM allows the use of feats, you may instead take a {@5etools feat|feats.html}.
    - class_name: Artificer
      class_source: TCE
      feature: Soul of Artifice
      source: TCE
      level: 20
      entries:
        - '{@i 20th-level artificer feature}'
        - 'You have developed a mystical connection to your magic items, which you can draw on for protection:'
        - items:
            - You gain a +1 bonus to all saving throws per magic item you are currently attuned to.
            - If you're reduced to 0 hit points but not killed outright, you can use your reaction to end one of your artificer infusions, causing you to drop to 1 hit point instead of 0.
          type: list
    - class_name: Barbarian
      class_source: PHB
      feature: Rage
      source: PHB
      level: 1
      entries:
        - In battle, you fight with primal ferocity. On your turn, you can enter a rage as a bonus action.
        - 'While raging, you gain the following benefits if you aren''t wearing heavy armor:'
        - items:
            - You have advantage on Strength checks and Strength saving throws.
            - When you make a melee weapon attack using Strength, you gain a +2 bonus to the damage roll. This bonus increases as you level.
            - You have resistance to bludgeoning, piercing, and slashing damage.
          type: list
        - If you are able to cast spells, you can't cast them or concentrate on them while raging.
        - Your rage lasts for 1 minute. It ends early if you are knocked {@condition unconscious} or if your turn ends and you haven't attacked a hostile creature since your last turn or taken damage since then. You can also end your rage on your turn as a bonus action.
        - Once you have raged the maximum number of times for your barbarian level, you must finish a long rest before you can rage again. You may rage 2 times at 1st level, 3 at 3rd, 4 at 6th, 5 at 12th, and 6 at 17th.
    - class_name: Barbarian
      class_source: PHB
      feature: Unarmored Defense
      source: PHB
      level: 1
      entries:
        - While you are not wearing any armor, your Armor Class equals 10 + your Dexterity modifier + your Constitution modifier. You can use a shield and still gain this benefit.
    - class_name: Barbarian
      class_source: PHB
      feature: Danger Sense
      source: PHB
      level: 2
      entries:
        - At 2nd level, you gain an uncanny sense of when things nearby aren't as they should be, giving you an edge when you dodge away from danger. You have advantage on Dexterity saving throws against effects that you can see, such as traps and spells. To gain this benefit, you can't be {@condition blinded}, {@condition deafened}, or {@condition incapacitated}.
    - class_name: Barbarian
      class_source: PHB
      feature: Reckless Attack
      source: PHB
      level: 2
      entries:
        - Starting at 2nd level, you can throw aside all concern for defense to attack with fierce desperation. When you make your first attack on your turn, you can decide to attack recklessly. Doing so gives you advantage on melee weapon attack rolls using Strength during this turn, but attack rolls against you have advantage until your next turn.
    - class_name: Barbarian
      class_source: PHB
      feature: Primal Knowledge
      source: TCE
      level: 3
      entries:
        - '{@i 3rd-level barbarian {@variantrule optional class features|tce|optional feature}}'
        - When you reach 3rd level and again at 10th level, you gain proficiency in one skill of your choice from the list of skills available to barbarians at 1st level.
    - class_name: Barbarian
      class_source: PHB
      feature: Primal Path
      source: PHB
      level: 3
      entries:
        - At 3rd level, you choose a path that shapes the nature of your rage from the list of available paths. Your choice grants you features at 3rd level and again at 6th, 10th, and 14th levels.
    - class_name: Barbarian
      class_source: PHB
      feature: Ability Score Improvement
      source: PHB
      level: 4
      entries:
        - When you reach 4th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can't increase an ability score above 20 using this feature.
        - If your DM allows the use of feats, you may instead take a {@5etools feat|feats.html}.
    - class_name: Barbarian
      class_source: PHB
      feature: Extra Attack
      source: PHB
      level: 5
      entries:
        - Beginning at 5th level, you can attack twice, instead of once, whenever you take the {@action Attack} action on your turn.
    - class_name: Barbarian
      class_source: PHB
      feature: Fast Movement
      source: PHB
      level: 5
      entries:
        - Starting at 5th level, your speed increases by 10 feet while you aren't wearing heavy armor.
    - class_name: Barbarian
      class_source: PHB
      feature: Path Feature
      source: PHB
      level: 6
      entries:
        - At 6th level, you gain a feature from your Primal Path.
    - class_name: Barbarian
      class_source: PHB
      feature: Feral Instinct
      source: PHB
      level: 7
      entries:
        - By 7th level, your instincts are so honed that you have advantage on initiative rolls.
        - Additionally, if you are {@status surprised} at the beginning of combat and aren't {@condition incapacitated}, you can act normally on your first turn, but only if you enter your rage before doing anything else on that turn.
    - class_name: Barbarian
      class_source: PHB
      feature: Instinctive Pounce
      source: TCE
      level: 7
      entries:
        - '{@i 7th-level barbarian {@variantrule optional class features|tce|optional feature}}'
        - As part of the bonus action you take to enter your rage, you can move up to half your speed.
    - class_name: Barbarian
      class_source: PHB
      feature: Ability Score Improvement
      source: PHB
      level: 8
      entries:
        - When you reach 8th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can't increase an ability score above 20 using this feature.
        - If your DM allows the use of feats, you may instead take a {@5etools feat|feats.html}.
    - class_name: Barbarian
      class_source: PHB
      feature: Brutal Critical (1 die)
      source: PHB
      level: 9
      entries:
        - Beginning at 9th level, you can roll one additional weapon damage die when determining the extra damage for a critical hit with a melee attack.
        - This increases to two additional dice at 13th level and three additional dice at 17th level.
    - class_name: Barbarian
      class_source: PHB
      feature: Path feature
      source: PHB
      level: 10
      entries:
        - At 10th level, you gain a feature from your Primal Path.
    - class_name: Barbarian
      class_source: PHB
      feature: Relentless Rage
      source: PHB
      level: 11
      entries:
        - Starting at 11th level, your rage can keep you fighting despite grievous wounds. If you drop to 0 hit points while you're raging and don't die outright, you can make a {@dc 10} Constitution saving throw. If you succeed, you drop to 1 hit point instead.
        - Each time you use this feature after the first, the DC increases by 5. When you finish a short or long rest, the DC resets to 10.
    - class_name: Barbarian
      class_source: PHB
      feature: Ability Score Improvement
      source: PHB
      level: 12
      entries:
        - When you reach 12th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can't increase an ability score above 20 using this feature.
        - If your DM allows the use of feats, you may instead take a {@5etools feat|feats.html}.
    - class_name: Barbarian
      class_source: PHB
      feature: Brutal Critical (2 dice)
      source: PHB
      level: 13
      entries:
        - At 13th level, you can roll two additional weapon damage dice when determining the extra damage for a critical hit with a melee attack.
        - This increases to three additional dice at 17th level.
    - class_name: Barbarian
      class_source: PHB
      feature: Path feature
      source: PHB
      level: 14
      entries:
        - At 14th level, you gain a feature from your Primal Path.
    - class_name: Barbarian
      class_source: PHB
      feature: Persistent Rage
      source: PHB
      level: 15
      entries:
        - Beginning at 15th level, your rage is so fierce that it ends early only if you fall {@condition unconscious} or if you choose to end it.
    - class_name: Barbarian
      class_source: PHB
      feature: Ability Score Improvement
      source: PHB
      level: 16
      entries:
        - When you reach 16th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can't increase an ability score above 20 using this feature.
        - If your DM allows the use of feats, you may instead take a {@5etools feat|feats.html}.
    - class_name: Barbarian
      class_source: PHB
      feature: Brutal Critical (3 dice)
      source: PHB
      level: 17
      entries:
        - At 17th level, you can roll three additional weapon damage dice when determining the extra damage for a critical hit with a melee attack.
    - class_name: Barbarian
      class_source: PHB
      feature: Indomitable Might
      source: PHB
      level: 18
      entries:
        - Beginning at 18th level, if your total for a Strength check is less than your Strength score, you can use that score in place of the total.
    - class_name: Barbarian
      class_source: PHB
      feature: Ability Score Improvement
      source: PHB
      level: 19
      entries:
        - When you reach 19th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can't increase an ability score above 20 using this feature.
        - If your DM allows the use of feats, you may instead take a {@5etools feat|feats.html}.
    - class_name: Barbarian
      class_source: PHB
      feature: Primal Champion
      source: PHB
      level: 20
      entries:
        - At 20th level, you embody the power of the wilds. Your Strength and Constitution scores increase by 4. Your maximum for those scores is now 24.
    - class_name: Barbarian
      class_source: XPHB
      feature: Rage
      source: XPHB
      level: 1
      entries:
        - You can imbue yourself with a primal power called Rage, a force that grants you extraordinary might and resilience. You can enter it as a {@variantrule Bonus Action|XPHB} if you aren't wearing Heavy armor.
        - You can enter your Rage the number of times shown for your Barbarian level in the Rages column of the Barbarian Features table. You regain one expended use when you finish a {@variantrule Short Rest|XPHB}, and you regain all expended uses when you finish a {@variantrule Long Rest|XPHB}.
        - While active, your Rage follows the rules below.
        - entries:
            - entries:
                - You have {@variantrule Resistance|XPHB} to Bludgeoning, Piercing, and Slashing damage.
              name: Damage Resistance
              type: entries
            - entries:
                - When you make an attack using Strength—with either a weapon or an {@variantrule Unarmed Strike|XPHB}—and deal damage to the target, you gain a bonus to the damage that increases as you gain levels as a Barbarian, as shown in the Rage Damage column of the Barbarian Features table.
              name: Rage Damage
              type: entries
            - entries:
                - You have {@variantrule Advantage|XPHB} on Strength checks and Strength saving throws.
              name: Strength Advantage
              type: entries
            - entries:
                - You can't maintain {@status Concentration|XPHB}, and you can't cast spells.
              name: No Concentration or Spells
              type: entries
            - entries:
                - 'The Rage lasts until the end of your next turn, and it ends early if you don Heavy armor or have the {@condition Incapacitated|XPHB} condition. If your Rage is still active on your next turn, you can extend the Rage for another round by doing one of the following:'
                - items:
                    - Make an attack roll against an enemy.
                    - Force an enemy to make a saving throw.
                    - Take a {@variantrule Bonus Action|XPHB} to extend your Rage.
                  type: list
              name: Duration
              type: entries
          type: entries
        - Each time the Rage is extended, it lasts until the end of your next turn. You can maintain a Rage for up to 10 minutes.
    - class_name: Barbarian
      class_source: XPHB
      feature: Unarmored Defense
      source: XPHB
      level: 1
      entries:
        - While you aren't wearing any armor, your base {@variantrule Armor Class|XPHB} equals 10 plus your Dexterity and Constitution modifiers. You can use a {@item Shield|XPHB} and still gain this benefit.
    - class_name: Barbarian
      class_source: XPHB
      feature: Weapon Mastery
      source: XPHB
      level: 1
      entries:
        - Your training with weapons allows you to use the {@variantrule weapon mastery properties|XPHB|mastery properties} of two kinds of {@filter Simple|items|type=simple weapon;melee weapon=sand} or {@filter Martial Melee weapons|items|type=martial weapon;melee weapon=sand} of your choice, such as {@item Greataxe|XPHB|Greataxes} and {@item Handaxe|XPHB|Handaxes}. Whenever you finish a {@variantrule Long Rest|XPHB}, you can practice weapon drills and change one of those weapon choices.
        - When you reach certain Barbarian levels, you gain the ability to use the {@variantrule weapon mastery properties|XPHB|mastery properties} of more kinds of weapons, as shown in the Weapon Mastery column of the Barbarian Features table.
    - class_name: Barbarian
      class_source: XPHB
      feature: Danger Sense
      source: XPHB
      level: 2
      entries:
        - You gain an uncanny sense of when things aren't as they should be, giving you an edge when you dodge perils. You have {@variantrule Advantage|XPHB} on Dexterity saving throws unless you have the {@condition Incapacitated|XPHB} condition.
    - class_name: Barbarian
      class_source: XPHB
      feature: Reckless Attack
      source: XPHB
      level: 2
      entries:
        - You can throw aside all concern for defense to attack with increased ferocity. When you make your first attack roll on your turn, you can decide to attack recklessly. Doing so gives you {@variantrule Advantage|XPHB} on attack rolls using Strength until the start of your next turn, but attack rolls against you have {@variantrule Advantage|XPHB} during that time.
    - class_name: Barbarian
      class_source: XPHB
      feature: Barbarian Subclass
      source: XPHB
      level: 3
      entries:
        - You gain a Barbarian subclass of your choice. A subclass is a specialization that grants you features at certain Barbarian levels. For the rest of your career, you gain each of your subclass's features that are of your Barbarian level or lower.
    - class_name: Barbarian
      class_source: XPHB
      feature: Primal Knowledge
      source: XPHB
      level: 3
      entries:
        - You gain proficiency in another skill of your choice from the skill list available to Barbarians at level 1.
        - 'In addition, while your Rage is active, you can channel primal power when you attempt certain tasks; whenever you make an ability check using one of the following skills, you can make it as a Strength check even if it normally uses a different ability: {@skill Acrobatics|XPHB}, {@skill Intimidation|XPHB}, {@skill Perception|XPHB}, {@skill Stealth|XPHB}, or {@skill Survival|XPHB}. When you use this ability, your Strength represents primal power coursing through you, honing your agility, bearing, and senses.'
    - class_name: Barbarian
      class_source: XPHB
      feature: Ability Score Improvement
      source: XPHB
      level: 4
      entries:
        - You gain the {@feat Ability Score Improvement|XPHB} feat or another {@5etools feat|feats.html} of your choice for which you qualify. You gain this feature again at Barbarian levels 8, 12, and 16.
    - class_name: Barbarian
      class_source: XPHB
      feature: Extra Attack
      source: XPHB
      level: 5
      entries:
        - You can attack twice instead of once whenever you take the {@action Attack|XPHB} action on your turn.
    - class_name: Barbarian
      class_source: XPHB
      feature: Fast Movement
      source: XPHB
      level: 5
      entries:
        - Your speed increases by 10 feet while you aren't wearing Heavy armor.
    - class_name: Barbarian
      class_source: XPHB
      feature: Subclass Feature
      source: XPHB
      level: 6
      entries:
        - You gain a feature from your Barbarian subclass.
    - class_name: Barbarian
      class_source: XPHB
      feature: Feral Instinct
      source: XPHB
      level: 7
      entries:
        - Your instincts are so honed that you have {@variantrule Advantage|XPHB} on {@variantrule Initiative|XPHB} rolls.
    - class_name: Barbarian
      class_source: XPHB
      feature: Instinctive Pounce
      source: XPHB
      level: 7
      entries:
        - As part of the {@variantrule Bonus Action|XPHB} you take to enter your Rage, you can move up to half your {@variantrule Speed|XPHB}.
    - class_name: Barbarian
      class_source: XPHB
      feature: Ability Score Improvement
      source: XPHB
      level: 8
      entries:
        - You gain the {@feat Ability Score Improvement|XPHB} feat or another {@5etools feat|feats.html} of your choice for which you qualify.
    - class_name: Barbarian
      class_source: XPHB
      feature: Brutal Strike
      source: XPHB
      level: 9
      entries:
        - If you use Reckless Attack, you can forgo any {@variantrule Advantage|XPHB} on one Strength-based attack roll of your choice on your turn. The chosen attack roll mustn't have {@variantrule Disadvantage|XPHB}. If the chosen attack roll hits, the target takes an extra {@damage 1d10} damage of the same type dealt by the weapon or {@variantrule Unarmed Strike|XPHB}, and you can cause one Brutal Strike effect of your choice. You have the following effect options.
        - entries:
            - entries:
                - The target is pushed 15 feet straight away from you. You can then move up to half your {@variantrule Speed|XPHB} straight toward the target without provoking {@action Opportunity Attack|XPHB|Opportunity Attacks}.
              name: Forceful Blow
              type: entries
            - entries:
                - The target's {@variantrule Speed|XPHB} is reduced by 15 feet until the start of your next turn. A target can be affected by only one Hamstring Blow at a time—the most recent one.
              name: Hamstring Blow
              type: entries
          type: entries
    - class_name: Barbarian
      class_source: XPHB
      feature: Subclass Feature
      source: XPHB
      level: 10
      entries:
        - You gain a feature from your Barbarian subclass.
    - class_name: Barbarian
      class_source: XPHB
      feature: Relentless Rage
      source: XPHB
      level: 11
      entries:
        - Your Rage can keep you fighting despite grievous wounds. If you drop to 0 {@variantrule Hit Points|XPHB} while your Rage is active and don't die outright, you can make a {@dc 10} Constitution saving throw. If you succeed, your {@variantrule Hit Points|XPHB} instead change to a number equal to twice your Barbarian level.
        - Each time you use this feature after the first, the DC increases by 5. When you finish a {@variantrule Short Rest|XPHB|Short} or {@variantrule Long Rest|XPHB}, the DC resets to 10.
    - class_name: Barbarian
      class_source: XPHB
      feature: Ability Score Improvement
      source: XPHB
      level: 12
      entries:
        - You gain the {@feat Ability Score Improvement|XPHB} feat or another {@5etools feat|feats.html} of your choice for which you qualify.
    - class_name: Barbarian
      class_source: XPHB
      feature: Improved Brutal Strike
      source: XPHB
      level: 13
      entries:
        - You have honed new ways to attack furiously. The following effects are now among your Brutal Strike options.
        - entries:
            - entries:
                - The target has {@variantrule Disadvantage|XPHB} on the next saving throw it makes, and it can't make {@action Opportunity Attack|XPHB|Opportunity Attacks} until the start of your next turn.
              name: Staggering Blow
              type: entries
            - entries:
                - Before the start of your next turn, the next attack roll made by another creature against the target gains a +5 bonus to the roll. An attack roll can gain only one Sundering Blow bonus.
              name: Sundering Blow
              type: entries
          type: entries
    - class_name: Barbarian
      class_source: XPHB
      feature: Subclass Feature
      source: XPHB
      level: 14
      entries:
        - You gain a feature from your Barbarian subclass.
    - class_name: Barbarian
      class_source: XPHB
      feature: Persistent Rage
      source: XPHB
      level: 15
      entries:
        - When you roll {@variantrule Initiative|XPHB}, you can regain all expended uses of Rage. After you regain uses of Rage in this way, you can't do so again until you finish a {@variantrule Long Rest|XPHB}.
        - In addition, your Rage is so fierce that it now lasts for 10 minutes without you needing to do anything to extend it from round to round. Your Rage ends early if you have the {@condition Unconscious|XPHB} condition (not just the {@condition Incapacitated|XPHB} condition) or don Heavy armor.
    - class_name: Barbarian
      class_source: XPHB
      feature: Ability Score Improvement
      source: XPHB
      level: 16
      entries:
        - You gain the {@feat Ability Score Improvement|XPHB} feat or another {@5etools feat|feats.html} of your choice for which you qualify.
    - class_name: Barbarian
      class_source: XPHB
      feature: Improved Brutal Strike
      source: XPHB
      level: 17
      entries:
        - The extra damage of your Brutal Strike increases to {@damage 2d10}. In addition, you can use two different Brutal Strike effects whenever you use your Brutal Strike feature.
    - class_name: Barbarian
      class_source: XPHB
      feature: Indomitable Might
      source: XPHB
      level: 18
      entries:
        - If your total for a Strength check or Strength saving throw is less than your Strength score, you can use that score in place of the total.
    - class_name: Barbarian
      class_source: XPHB
      feature: Epic Boon
      source: XPHB
      level: 19
      entries:
        - You gain an {@filter Epic Boon feat|feats|category=EB} or another {@5etools feat|feats.html} of your choice for which you qualify. {@feat Boon of Irresistible Offense|XPHB} is recommended.
    - class_name: Barbarian
      class_source: XPHB
      feature: Primal Champion
      source: XPHB
      level: 20
      entries:
        - You embody primal power. Your Strength and Constitution scores increase by 4, to a maximum of 25.
    - class_name: Bard
      class_source: PHB
      feature: Bardic Inspiration
      source: PHB
      level: 1
      entries:
        - You can inspire others through stirring words or music. To do so, you use a bonus action on your turn to choose one creature other than yourself within 60 feet of you who can hear you. That creature gains one Bardic Inspiration die, a {@dice d6}.
        - Once within the next 10 minutes, the creature can roll the die and add the number rolled to one ability check, attack roll, or saving throw it makes. The creature can wait until after it rolls the {@dice d20} before deciding to use the Bardic Inspiration die, but must decide before the DM says whether the roll succeeds or fails. Once the Bardic Inspiration die is rolled, it is lost. A creature can have only one Bardic Inspiration die at a time.
        - You can use this feature a number of times equal to your Charisma modifier (a minimum of once). You regain any expended uses when you finish a long rest.
        - Your Bardic Inspiration die changes when you reach certain levels in this class. The die becomes a {@dice d8} at 5th level, a {@dice d10} at 10th level, and a {@dice d12} at 15th level.
    - class_name: Bard
      class_source: PHB
      feature: Spellcasting
      source: PHB
      level: 1
      entries:
        - You have learned to untangle and reshape the fabric of reality in harmony with your wishes and music. Your spells are part of your vast repertoire, magic that you can tune to different situations. See {@book chapter 10|PHB|10} for the general rules of spellcasting and {@book chapter 11|PHB|11} for the {@filter bard spell list|spells|class=bard}.
        - entries:
            - You know two cantrips of your choice from the bard spell list. You learn additional bard cantrips of your choice at higher levels, learning a 3rd cantrip at 4th level and a 4th at 10th level.
          name: Cantrips
          type: entries
        - entries:
            - The Bard table shows how many spell slots you have to cast your {@filter bard spells|spells|class=bard} of 1st level and higher. To cast one of these spells, you must expend a slot of the spell's level or higher. You regain all expended spell slots when you finish a long rest.
            - For example, if you know the 1st-level spell {@spell cure wounds} and have a 1st-level and a 2nd-level spell slot available, you can cast {@spell cure wounds} using either slot.
          name: Spell Slots
          type: entries
        - entries:
            - You know four 1st-level spells of your choice from the bard spell list.
            - You learn an additional bard spell of your choice at each level except 12th, 16th, 19th, and 20th. Each of these spells must be of a level for which you have spell slots. For instance, when you reach 3rd level in this class, you can learn one new spell of 1st or 2nd level.
            - Additionally, when you gain a level in this class, you can choose one of the bard spells you know and replace it with another spell from the bard spell list, which also must be of a level for which you have spell slots.
          name: Spells Known of 1st Level and Higher
          type: entries
        - entries:
            - Charisma is your spellcasting ability for your bard spells. Your magic comes from the heart and soul you pour into the performance of your music or oration. You use your Charisma whenever a spell refers to your spellcasting ability. In addition, you use your Charisma modifier when setting the saving throw DC for a bard spell you cast and when making an attack roll with one.
            - attributes:
                - cha
              name: Spell
              type: abilityDc
            - attributes:
                - cha
              name: Spell
              type: abilityAttackMod
          name: Spellcasting Ability
          type: entries
        - entries:
            - You can cast any bard spell you know as a ritual if that spell has the ritual tag.
          name: Ritual Casting
          type: entries
        - entries:
            - You can use a {@item musical instrument|PHB} as a spellcasting focus for your bard spells.
          name: Spellcasting Focus
          type: entries
    - class_name: Bard
      class_source: PHB
      feature: Jack of All Trades
      source: PHB
      level: 2
      entries:
        - Starting at 2nd level, you can add half your proficiency bonus, rounded down, to any ability check you make that doesn't already include your proficiency bonus.
    - class_name: Bard
      class_source: PHB
      feature: Magical Inspiration
      source: TCE
      level: 2
      entries:
        - '{@i 2nd-level bard {@variantrule optional class features|tce|optional feature}}'
        - If a creature has a Bardic Inspiration die from you and casts a spell that restores hit points or deals damage, the creature can roll that die and choose a target affected by the spell. Add the number rolled as a bonus to the hit points regained or the damage dealt. The Bardic Inspiration die is then lost.
    - class_name: Bard
      class_source: PHB
      feature: Song of Rest (d6)
      source: PHB
      level: 2
      entries:
        - Beginning at 2nd level, you can use soothing music or oration to help revitalize your wounded allies during a short rest. If you or any friendly creatures who can hear your performance regain hit points by spending Hit Dice at the end of the short rest, each of those creatures regains an extra {@dice 1d6} hit points.
        - 'The extra hit points increase when you reach certain levels in this class: to {@dice 1d8} at 9th level, to {@dice 1d10} at 13th level, and to {@dice 1d12} at 17th level.'
    - class_name: Bard
      class_source: PHB
      feature: Bard College
      source: PHB
      level: 3
      entries:
        - At 3rd level, you delve into the advanced techniques of a bard college of your choice from the list of available colleges. Your choice grants you features at 3rd level and again at 6th and 14th level.
    - class_name: Bard
      class_source: PHB
      feature: Expertise
      source: PHB
      level: 3
      entries:
        - At 3rd level, choose two of your skill proficiencies. Your proficiency bonus is doubled for any ability check you make that uses either of the chosen proficiencies.
        - At 10th level, you can choose another two skill proficiencies to gain this benefit.
    - class_name: Bard
      class_source: PHB
      feature: Ability Score Improvement
      source: PHB
      level: 4
      entries:
        - When you reach 4th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can't increase an ability score above 20 using this feature.
        - If your DM allows the use of feats, you may instead take a {@5etools feat|feats.html}.
    - class_name: Bard
      class_source: PHB
      feature: Bardic Versatility
      source: TCE
      level: 4
      entries:
        - '{@i 4th-level bard {@variantrule optional class features|tce|optional feature}}'
        - 'Whenever you reach a level in this class that grants the Ability Score Improvement feature, you can do one of the following, representing a change in focus as you use your skills and magic:'
        - items:
            - Replace one of the skills you chose for the Expertise feature with one of your other skill proficiencies that isn't benefiting from Expertise.
            - Replace one cantrip you learned from this class's Spellcasting feature with another cantrip from the {@filter bard spell list|spells|level=0|class=bard}.
          type: list
    - class_name: Bard
      class_source: PHB
      feature: Bardic Inspiration (d8)
      source: PHB
      level: 5
      entries:
        - At 5th level, your Bardic Inspiration die changes to a {@dice d8}.
    - class_name: Bard
      class_source: PHB
      feature: Font of Inspiration
      source: PHB
      level: 5
      entries:
        - Beginning when you reach 5th level, you regain all of your expended uses of Bardic Inspiration when you finish a short or long rest.
    - class_name: Bard
      class_source: PHB
      feature: Bard College feature
      source: PHB
      level: 6
      entries:
        - At 6th level, you gain a feature from your Bard College.
    - class_name: Bard
      class_source: PHB
      feature: Countercharm
      source: PHB
      level: 6
      entries:
        - At 6th level, you gain the ability to use musical notes or words of power to disrupt mind-influencing effects. As an action, you can start a performance that lasts until the end of your next turn. During that time, you and any friendly creatures within 30 feet of you have advantage on saving throws against being {@condition frightened} or {@condition charmed}. A creature must be able to hear you to gain this benefit. The performance ends early if you are {@condition incapacitated} or silenced or if you voluntarily end it (no action required).
    - class_name: Bard
      class_source: PHB
      feature: Ability Score Improvement
      source: PHB
      level: 8
      entries:
        - When you reach 8th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can't increase an ability score above 20 using this feature.
        - If your DM allows the use of feats, you may instead take a {@5etools feat|feats.html}.
    - class_name: Bard
      class_source: PHB
      feature: Song of Rest (d8)
      source: PHB
      level: 9
      entries:
        - At 9th level, the extra hit points gained from Song of Rest increases to {@dice 1d8}.
    - class_name: Bard
      class_source: PHB
      feature: Bardic Inspiration (d10)
      source: PHB
      level: 10
      entries:
        - At 10th level, your Bardic Inspiration die changes to a {@dice d10}.
    - class_name: Bard
      class_source: PHB
      feature: Expertise
      source: PHB
      level: 10
      entries:
        - At 10th level, you can choose another two skill proficiencies. Your proficiency bonus is doubled for any ability check you make that uses either of the chosen proficiencies.
    - class_name: Bard
      class_source: PHB
      feature: Magical Secrets
      source: PHB
      level: 10
      entries:
        - By 10th level, you have plundered magical knowledge from a wide spectrum of disciplines. Choose two spells from any classes, including this one. A spell you choose must be of a level you can cast, as shown on the Bard table, or a cantrip.
        - The chosen spells count as bard spells for you and are included in the number in the Spells Known column of the Bard table.
        - You learn two additional spells from any classes at 14th level and again at 18th level.
    - class_name: Bard
      class_source: PHB
      feature: Ability Score Improvement
      source: PHB
      level: 12
      entries:
        - When you reach 12th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can't increase an ability score above 20 using this feature.
        - If your DM allows the use of feats, you may instead take a {@5etools feat|feats.html}.
    - class_name: Bard
      class_source: PHB
      feature: Song of Rest (d10)
      source: PHB
      level: 13
      entries:
        - At 13th level, the extra hit points gained from Song of Rest increases to {@dice 1d10}.
    - class_name: Bard
      class_source: PHB
      feature: Bard College feature
      source: PHB
      level: 14
      entries:
        - At 14th level, you gain a feature from your Bard College.
    - class_name: Bard
      class_source: PHB
      feature: Magical Secrets
      source: PHB
      level: 14
      entries:
        - At 14th level, choose two additional spells from any classes, including this one. A spell you choose must be of a level you can cast, as shown on the Bard table, or a cantrip.
        - The chosen spells count as bard spells for you and are included in the number in the Spells Known column of the Bard table.
    - class_name: Bard
      class_source: PHB
      feature: Bardic Inspiration (d12)
      source: PHB
      level: 15
      entries:
        - At 15th level, your Bardic Inspiration die changes to a {@dice d12}.
    - class_name: Bard
      class_source: PHB
      feature: Ability Score Improvement
      source: PHB
      level: 16
      entries:
        - When you reach 16th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can't increase an ability score above 20 using this feature.
        - If your DM allows the use of feats, you may instead take a {@5etools feat|feats.html}.
    - class_name: Bard
      class_source: PHB
      feature: Song of Rest (d12)
      source: PHB
      level: 17
      entries:
        - At 17th level, the extra hit points gained from Song of Rest increases to {@dice 1d12}.
    - class_name: Bard
      class_source: PHB
      feature: Magical Secrets
      source: PHB
      level: 18
      entries:
        - At 18th level, choose two additional spells from any class, including this one. A spell you choose must be of a level you can cast, as shown on the Bard table, or a cantrip.
        - The chosen spells count as bard spells for you and are included in the number in the Spells Known column of the Bard table.
    - class_name: Bard
      class_source: PHB
      feature: Ability Score Improvement
      source: PHB
      level: 19
      entries:
        - When you reach 19th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can't increase an ability score above 20 using this feature.
        - If your DM allows the use of feats, you may instead take a {@5etools feat|feats.html}.
    - class_name: Bard
      class_source: PHB
      feature: Superior Inspiration
      source: PHB
      level: 20
      entries:
        - At 20th level, when you roll initiative and have no uses of Bardic Inspiration left, you regain one use.
    - class_name: Bard
      class_source: XPHB
      feature: Bardic Inspiration
      source: XPHB
      level: 1
      entries:
        - You can supernaturally inspire others through words, music, or dance. This inspiration is represented by your Bardic Inspiration die, which is a {@dice d6}.
        - entries:
            - entries:
                - As a {@variantrule Bonus Action|XPHB}, you can inspire another creature within 60 feet of yourself who can see or hear you. That creature gains one of your Bardic Inspiration dice. A creature can have only one Bardic Inspiration die at a time.
                - Once within the next hour when the creature fails a {@variantrule D20 Test|XPHB}, the creature can roll the Bardic Inspiration die and add the number rolled to the {@dice d20}, potentially turning the failure into a success. A Bardic Inspiration die is expended when it's rolled.
              name: Using Bardic Inspiration
              type: entries
            - entries:
                - You can confer a Bardic Inspiration die a number of times equal to your Charisma modifier (minimum of once), and you regain all expended uses when you finish a {@variantrule Long Rest|XPHB}.
              name: Number of Uses
              type: entries
            - entries:
                - Your Bardic Inspiration die changes when you reach certain Bard levels, as shown in the Bardic Die column of the Bard Features table. The die becomes a {@dice d8} at level 5, a {@dice d10} at level 10, and a {@dice d12} at level 15.
              name: At Higher Levels
              type: entries
          type: entries
    - class_name: Bard
      class_source: XPHB
      feature: Spellcasting
      source: XPHB
      level: 1
      entries:
        - You have learned to cast spells through your bardic arts. See {@book chapter 7|XPHB|7} for the rules on spellcasting. The information below details how you use those rules with Bard spells, which appear in the {@filter Bard spell list|spells|class=Bard} later in the class's description.
        - entries:
            - entries:
                - You know two cantrips of your choice from the {@filter Bard spell list|spells|class=Bard}. {@spell Dancing Lights|XPHB} and {@spell Vicious Mockery|XPHB} are recommended.
                - Whenever you gain a Bard level, you can replace one of your cantrips with another cantrip of your choice from the {@filter Bard spell list|spells|class=Bard}.
                - When you reach Bard levels 4 and 10, you learn another cantrip of your choice from the {@filter Bard spell list|spells|class=Bard}, as shown in the Cantrips column of the Bard Features table.
              name: Cantrips
              type: entries
            - entries:
                - The Bard Features table shows how many spell slots you have to cast your level 1+ spells. You regain all expended slots when you finish a {@variantrule Long Rest|XPHB}.
              name: Spell Slots
              type: entries
            - entries:
                - You prepare the list of level 1+ spells that are available for you to cast with this feature. To start, choose four level 1 spells from the {@filter Bard spell list|spells|class=Bard}. {@spell Charm Person|XPHB}, {@spell Color Spray|XPHB}, {@spell Dissonant Whispers|XPHB}, and {@spell Healing Word|XPHB} are recommended.
                - The number of spells on your list increases as you gain Bard levels, as shown in the Prepared Spells column of the Bard Features table. Whenever that number increases, choose additional spells from the {@filter Bard spell list|spells|class=Bard} until the number of spells on your list matches the number on the table. The chosen spells must be of a level for which you have spell slots. For example, if you're a level 3 Bard, your list of prepared spells can include six spells of levels 1 and 2 in any combination.
                - If another Bard feature gives you spells that you always have prepared, those spells don't count against the number of spells you can prepare with this feature, but those spells otherwise count as Bard spells for you.
              name: Prepared Spells of Level 1+
              type: entries
            - entries:
                - Whenever you gain a Bard level, you can replace one spell on your list with another Bard spell for which you have spell slots.
              name: Changing Your Prepared Spells
              type: entries
            - entries:
                - Charisma is your spellcasting ability for your Bard spells.
              name: Spellcasting Ability
              type: entries
            - entries:
                - You can use a {@item Musical Instrument|XPHB} as a {@variantrule Spellcasting Focus|XPHB} for your Bard spells.
              name: Spellcasting Focus
              type: entries
          type: entries
    - class_name: Bard
      class_source: XPHB
      feature: Expertise
      source: XPHB
      level: 2
      entries:
        - You gain {@variantrule Expertise|XPHB} in two of your skill proficiencies of your choice. {@skill Performance|XPHB} and {@skill Persuasion|XPHB} are recommended if you have proficiency in them.
        - At Bard level 9, you gain {@variantrule Expertise|XPHB} in two more of your skill proficiencies of your choice.
    - class_name: Bard
      class_source: XPHB
      feature: Jack of All Trades
      source: XPHB
      level: 2
      entries:
        - You can add half your {@variantrule Proficiency|XPHB|Proficiency Bonus} (round down) to any ability check you make that uses a skill proficiency you lack and that doesn't otherwise use your {@variantrule Proficiency|XPHB|Proficiency Bonus}.
        - For example, if you make a Strength ({@skill Athletics|XPHB}) check and lack {@skill Athletics|XPHB} proficiency, you can add half your {@variantrule Proficiency|XPHB|Proficiency Bonus} to the check.
        - entries:
            - Does your Bard beat a {@item drum|XPHB} while chanting the deeds of ancient heroes? Strum a {@item lute|XPHB} while crooning romantic tunes? Perform arias of stirring power? Recite dramatic monologues from classic tragedies? Use the rhythm of a folk dance to coordinate the movement of allies in battle? Compose naughty limericks?
            - When you play a Bard, consider the style of artistic performance you favor, the moods you might invoke, and the themes that inspire your own creations. Are your poems inspired by moments of natural beauty, or are they brooding reflections on loss? Do you prefer lofty hymns or rowdy tavern songs? Are you drawn to laments for the fallen or celebrations of joy? Do you dance merry jigs or perform elaborate interpretive choreography? Do you focus on one style of performance or strive to master them all?
          name: A Bard's Repertoire
          type: inset
    - class_name: Bard
      class_source: XPHB
      feature: Bard Subclass
      source: XPHB
      level: 3
      entries:
        - You gain a Bard subclass of your choice. A subclass is a specialization that grants you features at certain Bard levels. For the rest of your career, you gain each of your subclass's features that are of your Bard level or lower.
    - class_name: Bard
      class_source: XPHB
      feature: Ability Score Improvement
      source: XPHB
      level: 4
      entries:
        - You gain the {@feat Ability Score Improvement|XPHB} feat or another {@5etools feat|feats.html} of your choice for which you qualify. You gain this feature again at Bard levels 8, 12, and 16.
    - class_name: Bard
      class_source: XPHB
      feature: Font of Inspiration
      source: XPHB
      level: 5
      entries:
        - You now regain all your expended uses of Bardic Inspiration when you finish a {@variantrule Short Rest|XPHB|Short} or {@variantrule Long Rest|XPHB}.
        - In addition, you can expend a spell slot (no action required) to regain one expended use of Bardic Inspiration.
    - class_name: Bard
      class_source: XPHB
      feature: Subclass Feature
      source: XPHB
      level: 6
      entries:
        - You gain a feature from your Bard Subclass.
    - class_name: Bard
      class_source: XPHB
      feature: Countercharm
      source: XPHB
      level: 7
      entries:
        - You can use musical notes or words of power to disrupt mind-influencing effects. If you or a creature within 30 feet of you fails a saving throw against an effect that applies the {@condition Charmed|XPHB} or {@condition Frightened|XPHB} condition, you can take a {@variantrule Reaction|XPHB} to cause the save to be rerolled, and the new roll has {@variantrule Advantage|XPHB}.
    - class_name: Bard
      class_source: XPHB
      feature: Ability Score Improvement
      source: XPHB
      level: 8
      entries:
        - You gain the {@feat Ability Score Improvement|XPHB} feat or another {@5etools feat|feats.html} of your choice for which you qualify.
    - class_name: Bard
      class_source: XPHB
      feature: Expertise
      source: XPHB
      level: 9
      entries:
        - You gain {@variantrule Expertise|XPHB} in two of your Skill Proficiencies of your choice.
    - class_name: Bard
      class_source: XPHB
      feature: Magical Secrets
      source: XPHB
      level: 10
      entries:
        - You've learned secrets from various magical traditions. Whenever you reach a Bard level (including this level) and the Prepared Spells number in the Bard Features table increases, you can choose any of your new prepared spells from the {@filter Bard|spells|class=Bard}, {@filter Cleric|spells|class=Cleric}, {@filter Druid|spells|class=Druid}, and {@filter Wizard|spells|class=Wizard} {@filter spell lists|spells|class=Bard;Cleric;Druid;Wizard}, and the chosen spells count as Bard spells for you (see a class's section for its spell list). In addition, whenever you replace a spell prepared for this class, you can replace it with a spell from those lists.
    - class_name: Bard
      class_source: XPHB
      feature: Ability Score Improvement
      source: XPHB
      level: 12
      entries:
        - You gain the {@feat Ability Score Improvement|XPHB} feat or another {@5etools feat|feats.html} of your choice for which you qualify.
    - class_name: Bard
      class_source: XPHB
      feature: Subclass Feature
      source: XPHB
      level: 14
      entries:
        - You gain a feature from your Bard Subclass.
    - class_name: Bard
      class_source: XPHB
