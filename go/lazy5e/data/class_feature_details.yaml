    - class_name: Artificer
      class_source: EFA
      subclass_name: Artillerist
      subclass_source: EFA
      feature: Eldritch Cannon
      source: EFA
      level: 3
      entries:
        - Using {@item Smith's Tools|XPHB} or {@item Woodcarver's Tools|XPHB}, you can take a {@action Magic|XPHB} action to create a Small or Tiny {@object Eldritch Cannon|EFA} in an unoccupied space on a horizontal surface within 5 feet of yourself. You determine its appearance, including whether you carry it or not (and your choice of legs or wheels, for the latter). It disappears if it is reduced to 0 {@variantrule Hit Points|XPHB} or after 1 hour. You can dismiss it early as a {@action Magic|XPHB} action.
        - Once you create a cannon, you can't do so again until you finish a {@variantrule Long Rest|XPHB} or expend a spell slot to create one. You can have only one cannon at a time and can't create one while you already have one.
    - class_name: Artificer
      class_source: EFA
      subclass_name: Artillerist
      subclass_source: EFA
      feature: Tools of the Trade
      source: EFA
      level: 3
      entries:
        - You gain the following benefits.
        - entries:
            - You gain proficiency with {@filter Martial Ranged weapons|items|type=martial weapon;ranged weapon=sand}.
          name: Ranged Weaponry
          type: entries
        - entries:
            - You gain proficiency with {@item Woodcarver's Tools|XPHB}. If you already have this proficiency, you gain proficiency with one other type of {@item Artisan's Tools|XPHB} of your choice.
          name: Tool Proficiency
          type: entries
        - entries:
            - When you craft a magic {@item Wand|XPHB}, the amount of time required to craft it is halved.
          name: Wand Crafting
          type: entries
    - class_name: Artificer
      class_source: EFA
      subclass_name: Artillerist
      subclass_source: EFA
      feature: Arcane Firearm
      source: EFA
      level: 5
      entries:
        - When you finish a {@variantrule Long Rest|XPHB}, you can use {@item Woodcarver's Tools|XPHB} to carve special sigils into a {@item Rod|XPHB}, {@item Staff|XPHB}, {@item Wand|XPHB}, or {@filter Martial Ranged weapon|items|type=martial weapon;ranged weapon=sand} and thereby turn it into your Arcane Firearm. The sigils disappear from the object if you later carve them on a different item. The sigils otherwise last indefinitely.
        - You can use your Arcane Firearm as a {@variantrule Spellcasting Focus|XPHB} for your Artificer spells. When you cast an Artificer spell through the firearm, roll {@damage 1d8}, and you gain a bonus to one of the spell's damage rolls equal to the number rolled.
    - class_name: Artificer
      class_source: EFA
      subclass_name: Artillerist
      subclass_source: EFA
      feature: Explosive Cannon
      source: EFA
      level: 9
      entries:
        - Every {@object Eldritch Cannon|EFA} you create is now more destructive. You gain the following benefits.
        - entries:
            - When your cannon takes damage, you can take a {@variantrule Reaction|XPHB} to command the cannon to detonate if you are within 60 feet of it. Doing so destroys the cannon and forces each creature within 20 feet of it to make a Dexterity saving throw against your spell save DC, taking {@damage 3d10} Force damage on a failed save or half as much damage on a successful one.
          name: Detonate
          type: entries
        - entries:
            - The cannon's damage rolls and the number of {@variantrule Temporary Hit Points|XPHB} granted by Protector increase by {@dice 1d8}.
          name: Firepower
          type: entries
    - class_name: Artificer
      class_source: EFA
      subclass_name: Artillerist
      subclass_source: EFA
      feature: Fortified Position
      source: EFA
      level: 15
      entries:
        - You're a master at forming well-defended emplacements using your {@object Eldritch Cannon|EFA}. You gain the following benefits.
        - entries:
            - You can now have two cannons at the same time, and you can create two with the same {@action Magic|XPHB} action. (If you expend a spell slot to create the first cannon, you must expend another spell slot to create the second.) You can activate both of them with the same {@variantrule Bonus Action|XPHB}, ordering them to use the same activation option or different ones. You can't create a third cannon while you have two.
          name: Double Firepower
          type: item
        - entries:
            - You and your allies have {@variantrule Cover|XPHB|Half Cover} while within 10 feet of your {@object Eldritch Cannon|EFA}.
          name: Shimmering Field Projection
          type: entries
    - class_name: Artificer
      class_source: EFA
      subclass_name: Battle Smith
      subclass_source: EFA
      feature: Battle Ready
      source: EFA
      level: 3
      entries:
        - Your combat training and your experiments with magic have paid off in two ways.
        - entries:
            - When you attack with a magic weapon, you can use your Intelligence modifier, instead of your Strength or Dexterity modifier, for the attack and damage rolls.
          name: Arcane Empowerment
          type: entries
        - entries:
            - You gain proficiency with {@filter Martial weapons|items|type=martial weapon}. You can use a weapon with which you have proficiency as a {@variantrule Spellcasting Focus|XPHB} for your Artificer spells.
          name: Weapon Knowledge
          type: entries
    - class_name: Artificer
      class_source: EFA
      subclass_name: Battle Smith
      subclass_source: EFA
      feature: Battle Smith
      source: EFA
      level: 3
      entries:
        - '{@i Command a Construct Guardian}'
        - A Battle Smith is a combination of protector and medic, an expert at defending others and repairing both materiel and personnel. To aid in their work, Battle Smiths are accompanied by a {@creature Steel Defender|EFA}, a protective companion of their own creation.
        - subclassFeature: Tools of the Trade|Artificer|EFA|Battle Smith|EFA|3|EFA
          type: refSubclassFeature
        - subclassFeature: Battle Smith Spells|Artificer|EFA|Battle Smith|EFA|3|EFA
          type: refSubclassFeature
        - subclassFeature: Battle Ready|Artificer|EFA|Battle Smith|EFA|3|EFA
          type: refSubclassFeature
        - subclassFeature: Steel Defender|Artificer|EFA|Battle Smith|EFA|3|EFA
          type: refSubclassFeature
