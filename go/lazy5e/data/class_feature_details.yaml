    - class_name: Wizard
      class_source: XPHB
      subclass_name: Illusionist
      subclass_source: XPHB
      feature: Improved Illusions
      source: XPHB
      level: 3
      entries:
        - You can cast Illusion spells without providing Verbal components, and if an Illusion spell you cast has a range of 10+ feet, the range increases by 60 feet.
        - You also know the {@spell Minor Illusion|XPHB} cantrip. If you already know it, you learn a different Wizard cantrip of your choice. The cantrip doesn't count against your number of cantrips known. You can create both a sound and an image with a single casting of {@spell Minor Illusion|XPHB}, and you can cast it as a {@variantrule Bonus Action|XPHB}.
    - class_name: Wizard
      class_source: XPHB
      subclass_name: Illusionist
      subclass_source: XPHB
      feature: Phantasmal Creatures
      source: XPHB
      level: 6
      entries:
        - You always have the {@spell Summon Beast|XPHB} and {@spell Summon Fey|XPHB} spells prepared. Whenever you cast either spell, you can change its school to Illusion, which causes the summoned creature to appear spectral. You can cast the Illusion version of each spell without expending a spell slot, but casting it without a slot halves the creature's {@variantrule Hit Points|XPHB}. Once you cast either spell without a spell slot, you must finish a {@variantrule Long Rest|XPHB} before you can cast the spell in that way again.
    - class_name: Wizard
      class_source: XPHB
      subclass_name: Illusionist
      subclass_source: XPHB
      feature: Illusory Self
      source: XPHB
      level: 10
      entries:
        - When a creature hits you with an attack roll, you can take a {@variantrule Reaction|XPHB} to interpose an illusory duplicate of yourself between the attacker and yourself. The attack automatically misses you, then the illusion dissipates.
        - Once you use this feature, you can't use it again until you finish a {@variantrule Short Rest|XPHB|Short} or {@variantrule Long Rest|XPHB}. You can also restore your use of it by expending a level 2+ spell slot (no action required).
    - class_name: Wizard
      class_source: XPHB
      subclass_name: Illusionist
      subclass_source: XPHB
      feature: Illusory Reality
      source: XPHB
      level: 14
      entries:
        - You have learned to weave shadow magic into your illusions to give them a semi-reality. When you cast an Illusion spell with a spell slot, you can choose one inanimate, nonmagical object that is part of the illusion and make that object real. You can do this on your turn as a {@variantrule Bonus Action|XPHB} while the spell is ongoing. The object remains real for 1 minute, during which it can't deal damage or give any conditions. For example, you can create an illusion of a bridge over a chasm and then make it real and cross it.
