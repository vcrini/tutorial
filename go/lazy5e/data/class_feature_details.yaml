      level: 3
      entries:
        - As a {@variantrule Bonus Action|XPHB}, you give yourself {@variantrule Advantage|XPHB} on your next attack roll on the current turn. You can use this feature only if you haven't moved during this turn, and after you use it, your {@variantrule Speed|XPHB} is 0 until the end of the current turn.
    - class_name: Rogue
      class_source: XPHB
      feature: Ability Score Improvement
      source: XPHB
      level: 4
      entries:
        - You gain the {@feat Ability Score Improvement|XPHB} feat or another {@5etools feat|feats.html} of your choice for which you qualify. You gain this feature again at Rogue levels 8, 10, 12, and 16.
    - class_name: Rogue
      class_source: XPHB
      feature: Cunning Strike
      source: XPHB
      level: 5
      entries:
        - You've developed cunning ways to use your Sneak Attack. When you deal Sneak Attack damage, you can add one of the following Cunning Strike effects. Each effect has a die cost, which is the number of Sneak Attack damage dice you must forgo to add the effect. You remove the die before rolling, and the effect occurs immediately after the attack's damage is dealt. For example, if you add the Poison effect, remove {@dice 1d6} from the Sneak Attack's damage before rolling.
        - If a Cunning Strike effect requires a saving throw, the DC equals 8 plus your Dexterity modifier and {@variantrule Proficiency|XPHB|Proficiency Bonus}.
        - entries:
            - classFeature: 'Poison (Cost: 1d6)|Rogue|XPHB|5|XPHB'
              type: refClassFeature
            - classFeature: 'Trip (Cost: 1d6)|Rogue|XPHB|5|XPHB'
              type: refClassFeature
            - classFeature: 'Withdraw (Cost: 1d6)|Rogue|XPHB|5|XPHB'
              type: refClassFeature
          type: entries
    - class_name: Rogue
      class_source: XPHB
      feature: 'Poison (Cost: 1d6)'
      source: XPHB
      level: 5
      entries:
        - You add a toxin to your strike, forcing the target to make a Constitution saving throw. On a failed save, the target has the {@condition Poisoned|XPHB} condition for 1 minute. At the end of each of its turns, the {@condition Poisoned|XPHB} target repeats the save, ending the effect on itself on a success.
        - To use this effect, you must have a {@item Poisoner's Kit|XPHB} on your person.
    - class_name: Rogue
      class_source: XPHB
      feature: 'Trip (Cost: 1d6)'
      source: XPHB
      level: 5
      entries:
        - If the target is Large or smaller, it must succeed on a Dexterity saving throw or have the {@condition Prone|XPHB} condition.
    - class_name: Rogue
      class_source: XPHB
      feature: Uncanny Dodge
      source: XPHB
      level: 5
      entries:
        - When an attacker that you can see hits you with an attack roll, you can take a {@variantrule Reaction|XPHB} to halve the attack's damage against you (round down).
    - class_name: Rogue
      class_source: XPHB
      feature: 'Withdraw (Cost: 1d6)'
      source: XPHB
      level: 5
      entries:
        - Immediately after the attack, you move up to half your {@variantrule Speed|XPHB} without provoking {@action Opportunity Attack|XPHB|Opportunity Attacks}.
    - class_name: Rogue
      class_source: XPHB
      feature: Expertise
      source: XPHB
      level: 6
      entries:
        - You gain {@variantrule Expertise|XPHB} in two of your Skill Proficiencies of your choice.
    - class_name: Rogue
      class_source: XPHB
      feature: Evasion
      source: XPHB
      level: 7
      entries:
        - You can nimbly dodge out of the way of certain dangers. When you're subjected to an effect that allows you to make a Dexterity saving throw to take only half damage, you instead take no damage if you succeed on the saving throw and only half damage if you fail. You can't use this feature if you have the {@condition Incapacitated|XPHB} condition.
    - class_name: Rogue
      class_source: XPHB
      feature: Reliable Talent
      source: XPHB
      level: 7
      entries:
        - Whenever you make an ability check that uses one of your skill or tool proficiencies, you can treat a {@dice d20} roll of 9 or lower as a 10.
    - class_name: Rogue
      class_source: XPHB
      feature: Ability Score Improvement
      source: XPHB
      level: 8
      entries:
