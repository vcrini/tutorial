    - class_name: Cleric
      class_source: XPHB
      subclass_name: Trickery
      subclass_source: XPHB
      feature: Improved Duplicity
      source: XPHB
      level: 17
      entries:
        - The illusion of your Invoke Duplicity has grown more powerful in the following ways.
        - entries:
            - entries:
                - When you and your allies make attack rolls against a creature within 5 feet of the illusion, the attack rolls have {@variantrule Advantage|XPHB}.
              name: Shared Distraction
              type: entries
            - entries:
                - When the illusion ends, you or a creature of your choice within 5 feet of it regains a number of {@variantrule Hit Points|XPHB} equal to your Cleric level.
              name: Healing Illusion
              type: entries
          type: entries
    - class_name: Cleric
      class_source: XPHB
      subclass_name: Twilight
      subclass_source: TCE
