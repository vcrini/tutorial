        - items:
            - entry: The sidekick gains a +2 bonus to all attack rolls.
              name: Attacker
              type: item
            - entry: The sidekick can use its reaction to impose disadvantage on the attack roll of a creature within 5 feet of it whose target isn't the sidekick, provided the sidekick can see the attacker.
              name: Defender
              type: item
          style: list-hang-notitle
