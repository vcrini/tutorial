    - class_name: Sorcerer
      class_source: XPHB
      feature: Sorcerer Subclass
      source: XPHB
      level: 3
      entries:
        - You gain a Sorcerer subclass of your choice. A subclass is a specialization that grants you features at certain Sorcerer levels. For the rest of your career, you gain each of your subclass's features that are of your Sorcerer level or lower.
    - class_name: Sorcerer
      class_source: XPHB
      feature: Ability Score Improvement
      source: XPHB
      level: 4
      entries:
        - You gain the {@feat Ability Score Improvement|XPHB} feat or another {@5etools feat|feats.html} of your choice for which you qualify. You gain this feature again at Sorcerer levels 8, 12, and 16.
    - class_name: Sorcerer
      class_source: XPHB
      feature: Sorcerous Restoration
      source: XPHB
      level: 5
      entries:
        - When you finish a {@variantrule Short Rest|XPHB}, you can regain expended Sorcery Points, but no more than a number equal to half your Sorcerer level (round down). Once you use this feature, you can't do so again until you finish a {@variantrule Long Rest|XPHB}.
    - class_name: Sorcerer
      class_source: XPHB
      feature: Subclass Feature
      source: XPHB
      level: 6
      entries:
        - You gain a feature from your Sorcerer subclass.
    - class_name: Sorcerer
      class_source: XPHB
      feature: Sorcery Incarnate
      source: XPHB
      level: 7
      entries:
        - If you have no uses of Innate Sorcery left, you can use it if you spend 2 Sorcery Points when you take the {@variantrule Bonus Action|XPHB} to activate it.
        - In addition, while your Innate Sorcery feature is active, you can use up to two of your {@filter Metamagic options|optionalfeatures|feature type=MM} on each spell you cast.
    - class_name: Sorcerer
      class_source: XPHB
      feature: Ability Score Improvement
      source: XPHB
      level: 8
      entries:
        - You gain the {@feat Ability Score Improvement|XPHB} feat or another {@5etools feat|feats.html} of your choice for which you qualify.
    - class_name: Sorcerer
      class_source: XPHB
      feature: Metamagic
      source: XPHB
      level: 10
      entries:
        - Because your magic flows from within you, you can alter your spells to suit your needs; you gain two Metamagic options of your choice from the "{@filter Metamagic Options|optionalfeatures|feature type=MM|source=XPHB}" section later in this class's description.
        - You can use only one Metamagic option on a spell when you cast it, unless otherwise noted in one of those options.
        - Whenever you gain a Sorcerer level, you can replace one of your Metamagic options with one you don't know.
    - class_name: Sorcerer
      class_source: XPHB
      feature: Ability Score Improvement
      source: XPHB
      level: 12
      entries:
        - You gain the {@feat Ability Score Improvement|XPHB} feat or another {@5etools feat|feats.html} of your choice for which you qualify.
    - class_name: Sorcerer
      class_source: XPHB
      feature: Subclass Feature
      source: XPHB
      level: 14
      entries:
        - You gain a feature from your Sorcerer subclass.
    - class_name: Sorcerer
      class_source: XPHB
      feature: Ability Score Improvement
      source: XPHB
      level: 16
      entries:
        - You gain the {@feat Ability Score Improvement|XPHB} feat or another {@5etools feat|feats.html} of your choice for which you qualify.
    - class_name: Sorcerer
      class_source: XPHB
      feature: Metamagic
      source: XPHB
      level: 17
      entries:
        - Because your magic flows from within you, you can alter your spells to suit your needs; you gain two Metamagic options of your choice from the "{@filter Metamagic Options|optionalfeatures|feature type=MM|source=XPHB}" section later in this class's description.
        - You can use only one Metamagic option on a spell when you cast it, unless otherwise noted in one of those options.
