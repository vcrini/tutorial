    - class_name: Cleric
      class_source: XPHB
      subclass_name: Trickery
      subclass_source: XPHB
      feature: Blessing of the Trickster
      source: XPHB
      level: 3
      entries:
        - As a {@action Magic|XPHB} action, you can choose yourself or a willing creature within 30 feet of yourself to have {@variantrule Advantage|XPHB} on Dexterity ({@skill Stealth|XPHB}) checks. This blessing lasts until you finish a {@variantrule Long Rest|XPHB} or you use this feature again.
    - class_name: Cleric
      class_source: XPHB
      subclass_name: Trickery
      subclass_source: XPHB
      feature: Invoke Duplicity
      source: XPHB
      level: 3
      entries:
        - As a {@variantrule Bonus Action|XPHB}, you can expend one use of your Channel Divinity to create a perfect visual illusion of yourself in an unoccupied space you can see within 30 feet of yourself. The illusion is intangible and doesn't occupy its space. It lasts for 1 minute, but it ends early if you dismiss it (no action required) or have the {@condition Incapacitated|XPHB} condition. The illusion is animated and mimics your expressions and gestures. While it persists, you gain the following benefits.
        - entries:
            - You can cast spells as though you were in the illusion's space, but you must use your own senses.
          name: Cast Spells
          type: entries
        - entries:
            - When both you and your illusion are within 5 feet of a creature that can see the illusion, you have {@variantrule Advantage|XPHB} on attack rolls against that creature, given how distracting the illusion is to the target.
          name: Distract
          type: entries
        - entries:
            - As a {@variantrule Bonus Action|XPHB}, you can move the illusion up to 30 feet to an unoccupied space you can see that is within 120 feet of yourself.
          name: Move
          type: entries
    - class_name: Cleric
      class_source: XPHB
      subclass_name: Trickery
      subclass_source: XPHB
      feature: Trickery Domain
      source: XPHB
      level: 3
      entries:
        - '{@i Make Mischief and Challenge Authority}'
        - The Trickery Domain offers magic of deception, illusion, and stealth. Clerics who wield this magic are a disruptive force in the world, puncturing pride, mocking tyrants, freeing captives, and flouting hollow traditions. They prefer subterfuge and pranks to direct confrontation.
        - Gods of trickery are mischief-makers and instigators who stand as a constant challenge to the accepted order among both gods and mortals. They embody the forces of change and social upheaval, and they're patrons of thieves, scoundrels, gamblers, rebels, and liberators. Religious orders that operate in secret, especially those that seek to undermine oppressive governments or hierarchies, also draw on the power of the Trickery Domain.
        - subclassFeature: Trickery Domain Spells|Cleric|XPHB|Trickery|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Blessing of the Trickster|Cleric|XPHB|Trickery|XPHB|3
