    - class_name: Cleric
      class_source: XPHB
      feature: Divine Order
      source: XPHB
      level: 1
      entries:
        - You have dedicated yourself to one of the following sacred roles of your choice.
        - entries:
            - count: 1
              entries:
                - classFeature: Protector|Cleric|XPHB|1|XPHB
                  type: refClassFeature
                - classFeature: Thaumaturge|Cleric|XPHB|1|XPHB
                  type: refClassFeature
              type: options
          type: entries
    - class_name: Cleric
      class_source: XPHB
      feature: Protector
      source: XPHB
      level: 1
      entries:
        - Trained for battle, you gain proficiency with {@filter Martial weapons|items|type=martial weapon} and training with {@filter Heavy armor|items|type=Heavy Armor}.
    - class_name: Cleric
      class_source: XPHB
      feature: Spellcasting
      source: XPHB
      level: 1
      entries:
        - You have learned to cast spells through prayer and meditation. See {@book chapter 7|XPHB|7} for the rules on spellcasting. The information below details how you use those rules with Cleric spells, which appear on the {@filter Cleric spell list|spells|class=Cleric} later in the class's description.
        - entries:
            - entries:
                - You know three cantrips of your choice from the {@filter Cleric spell list|spells|class=Cleric}. {@spell Guidance|XPHB}, {@spell Sacred Flame|XPHB}, and {@spell Thaumaturgy|XPHB} are recommended.
                - Whenever you gain a Cleric level, you can replace one of your cantrips with another cantrip of your choice from the {@filter Cleric spell list|spells|class=Cleric}.
                - When you reach Cleric levels 4 and 10, you learn another cantrip of your choice from the {@filter Cleric spell list|spells|class=Cleric}, as shown in the Cantrips column of the Cleric Features table.
              name: Cantrips
              type: entries
            - entries:
                - The Cleric Features table shows how many spell slots you have to cast your level 1+ spells. You regain all expended slots when you finish a {@variantrule Long Rest|XPHB}.
              name: Spell Slots
              type: entries
            - entries:
                - You prepare the list of level 1+ spells that are available for you to cast with this feature. To start, choose four level 1 spells from the {@filter Cleric spell list|spells|class=Cleric}. {@spell Bless|XPHB}, {@spell Cure Wounds|XPHB}, {@spell Guiding Bolt|XPHB}, and {@spell Shield of Faith|XPHB} are recommended.
                - The number of spells on your list increases as you gain Cleric levels, as shown in the Prepared Spells column of the Cleric Features table. Whenever that number increases, choose additional spells from the {@filter Cleric spell list|spells|class=Cleric} until the number of spells on your list matches the number on the table. The chosen spells must be of a level for which you have spell slots. For example, if you're a level 3 Cleric, your list of prepared spells can include six spells of levels 1 and 2 in any combination.
                - If another Cleric feature gives you spells that you always have prepared, those spells don't count against the number of spells you can prepare with this feature, but those spells otherwise count as Cleric spells for you.
              name: Prepared Spells of Level 1+
              type: entries
            - entries:
                - Whenever you finish a {@variantrule Long Rest|XPHB}, you can change your list of prepared spells, replacing any of the spells there with other Cleric spells for which you have spell slots.
              name: Changing Your Prepared Spells
              type: entries
            - entries:
                - Wisdom is your spellcasting ability for your Cleric spells.
              name: Spellcasting Ability
              type: entries
            - entries:
                - You can use a {@item Holy Symbol|XPHB} as a {@variantrule Spellcasting Focus|XPHB} for your Cleric spells.
              name: Spellcasting Focus
              type: entries
          type: entries
    - class_name: Cleric
      class_source: XPHB
      feature: Thaumaturge
      source: XPHB
      level: 1
      entries:
        - You know one extra cantrip from the {@filter Cleric spell list|spells|class=Cleric}. In addition, your mystical connection to the divine gives you a bonus to your Intelligence ({@skill Arcana|XPHB} or {@skill Religion|XPHB}) checks. The bonus equals your Wisdom modifier (minimum of +1).
    - class_name: Cleric
      class_source: XPHB
      feature: Channel Divinity
      source: XPHB
      level: 2
      entries:
        - 'You can channel divine energy directly from the Outer Planes to fuel magical effects. You start with two such effects: Divine Spark and Turn Undead, each of which is described below. Each time you use this class''s Channel Divinity, choose which Channel Divinity effect from this class to create. You gain additional effect options at higher Cleric levels.'
        - You can use this class's Channel Divinity twice. You regain one of its expended uses when you finish a {@variantrule Short Rest|XPHB}, and you regain all expended uses when you finish a {@variantrule Long Rest|XPHB}. You gain additional uses when you reach certain Cleric levels, as shown in the Channel Divinity column of the Cleric Features table.
        - If a Channel Divinity effect requires a saving throw, the DC equals the spell save DC from this class's Spellcasting feature.
        - entries:
            - classFeature: Divine Spark|Cleric|XPHB|2|XPHB
              type: refClassFeature
            - classFeature: Turn Undead|Cleric|XPHB|2|XPHB
              type: refClassFeature
          type: entries
    - class_name: Cleric
      class_source: XPHB
      feature: Divine Spark
      source: XPHB
      level: 2
      entries:
        - As a {@action Magic|XPHB} action, you point your {@item Holy Symbol|XPHB} at another creature you can see within 30 feet of yourself and focus divine energy at it. Roll {@dice 1d8} and add your Wisdom modifier. You either restore {@variantrule Hit Points|XPHB} to the creature equal to that total or force the creature to make a Constitution saving throw. On a failed save, the creature takes Necrotic or Radiant damage (your choice) equal to that total. On a successful save, the creature takes half as much damage (round down).
        - You roll an additional {@dice d8} when you reach Cleric levels 7 ({@dice 2d8}), 13 ({@dice 3d8}), and 18 ({@dice 4d8}).
    - class_name: Cleric
      class_source: XPHB
      feature: Turn Undead
      source: XPHB
      level: 2
      entries:
        - As a {@action Magic|XPHB} action, you present your {@item Holy Symbol|XPHB} and censure Undead creatures. Each Undead of your choice within 30 feet of you must make a Wisdom saving throw. If the creature fails its save, it has the {@condition Frightened|XPHB} and {@condition Incapacitated|XPHB} conditions for 1 minute. For that duration, it tries to move as far from you as it can on its turns. This effect ends early on the creature if it takes any damage, if you have the {@condition Incapacitated|XPHB} condition, or if you die.
    - class_name: Cleric
      class_source: XPHB
      feature: Cleric Subclass
      source: XPHB
      level: 3
      entries:
        - You gain a Cleric subclass of your choice. A subclass is a specialization that grants you features at certain Cleric levels. For the rest of your career, you gain each of your subclass's features that are of your Cleric level or lower.
    - class_name: Cleric
      class_source: XPHB
      feature: Ability Score Improvement
      source: XPHB
      level: 4
      entries:
        - You gain the {@feat Ability Score Improvement|XPHB} feat or another {@5etools feat|feats.html} of your choice for which you qualify. You gain this feature again at Cleric levels 8, 12, and 16.
    - class_name: Cleric
      class_source: XPHB
      feature: Sear Undead
      source: XPHB
      level: 5
      entries:
        - Whenever you use Turn Undead, you can roll a number of d8s equal to your Wisdom modifier (minimum of {@dice 1d8}) and add the rolls together. Each Undead that fails its saving throw against that use of Turn Undead takes Radiant damage equal to the roll's total. This damage doesn't end the turn effect.
    - class_name: Cleric
      class_source: XPHB
      feature: Subclass Feature
      source: XPHB
      level: 6
      entries:
        - You gain a feature from your Cleric Subclass.
    - class_name: Cleric
      class_source: XPHB
      feature: Blessed Strikes
      source: XPHB
      level: 7
      entries:
        - Divine power infuses you in battle. You gain one of the following options of your choice (if you get either option from a Cleric subclass in an older book, use only the option you choose for this feature).
        - entries:
            - classFeature: Divine Strike|Cleric|XPHB|7
              type: refClassFeature
            - classFeature: Potent Spellcasting|Cleric|XPHB|7
              type: refClassFeature
          type: entries
    - class_name: Cleric
      class_source: XPHB
      feature: Divine Strike
      source: XPHB
      level: 7
      entries:
        - Once on each of your turns when you hit a creature with an attack roll using a weapon, you can cause the target to take an extra {@damage 1d8} Necrotic or Radiant damage (your choice).
    - class_name: Cleric
      class_source: XPHB
      feature: Potent Spellcasting
      source: XPHB
      level: 7
      entries:
        - Add your Wisdom modifier to the damage you deal with any Cleric cantrip.
    - class_name: Cleric
      class_source: XPHB
      feature: Ability Score Improvement
      source: XPHB
      level: 8
      entries:
        - You gain the {@feat Ability Score Improvement|XPHB} feat or another {@5etools feat|feats.html} of your choice for which you qualify.
    - class_name: Cleric
      class_source: XPHB
      feature: Divine Intervention
      source: XPHB
      level: 10
      entries:
        - You can call on your deity or pantheon to intervene on your behalf. As a {@action Magic|XPHB} action, choose any Cleric spell of level 5 or lower that doesn't require a {@variantrule Reaction|XPHB} to cast. As part of the same action, you cast that spell without expending a spell slot or needing Material components. You can't use this feature again until you finish a {@variantrule Long Rest|XPHB}.
    - class_name: Cleric
      class_source: XPHB
      feature: Ability Score Improvement
      source: XPHB
      level: 12
      entries:
        - You gain the {@feat Ability Score Improvement|XPHB} feat or another {@5etools feat|feats.html} of your choice for which you qualify.
    - class_name: Cleric
      class_source: XPHB
      feature: Improved Blessed Strikes
      source: XPHB
      level: 14
      entries:
        - The option you chose for Blessed Strikes grows more powerful.
        - entries:
            - entries:
                - The extra damage of your Divine Strike increases to {@damage 2d8}.
              name: Divine Strike
              type: entries
            - entries:
                - When you cast a Cleric cantrip and deal damage to a creature with it, you can give vitality to yourself or another creature within 60 feet of yourself, granting a number of {@variantrule Temporary Hit Points|XPHB} equal to twice your Wisdom modifier.
              name: Potent Spellcasting
              type: entries
          type: entries
    - class_name: Cleric
      class_source: XPHB
      feature: Ability Score Improvement
      source: XPHB
      level: 16
      entries:
        - You gain the {@feat Ability Score Improvement|XPHB} feat or another {@5etools feat|feats.html} of your choice for which you qualify.
    - class_name: Cleric
      class_source: XPHB
      feature: Subclass Feature
      source: XPHB
      level: 17
      entries:
        - You gain a feature from your Cleric Subclass.
    - class_name: Cleric
      class_source: XPHB
      feature: Epic Boon
      source: XPHB
      level: 19
      entries:
        - You gain an {@filter Epic Boon feat|feats|category=EB} or another {@5etools feat|feats.html} of your choice for which you qualify. {@feat Boon of Fate|XPHB} is recommended.
    - class_name: Cleric
      class_source: XPHB
      feature: Greater Divine Intervention
      source: XPHB
      level: 20
      entries:
        - You can call on even more powerful divine intervention. When you use your Divine Intervention feature, you can choose {@spell Wish|XPHB} when you select a spell. If you do so, you can't use Divine Intervention again until you finish {@dice 2d4} Long Rests.
    - class_name: Druid
      class_source: PHB
      feature: Druidic
      source: PHB
      level: 1
      entries:
        - You know {@language Druidic}, the secret language of druids. You can speak the language and use it to leave hidden messages. You and others who know this language automatically spot such a message. Others spot the message's presence with a successful {@dc 15} Wisdom ({@skill Perception}) check but can't decipher it without magic.
    - class_name: Druid
      class_source: PHB
      feature: Spellcasting
      source: PHB
      level: 1
      entries:
        - Drawing on the divine essence of nature itself, you can cast spells to shape that essence to your will. See {@book chapter 10|PHB|10} for the general rules of spellcasting and {@book chapter 11|PHB|11} for the {@filter druid spell list|spells|class=druid}.
        - entries:
            - At 1st level, you know two cantrips of your choice from the {@filter druid spell list|spells|level=0|class=druid}. You learn additional druid cantrips of your choice at higher levels, as shown in the Cantrips Known column of the Druid table.
          name: Cantrips
          type: entries
        - entries:
            - The Druid table shows how many spell slots you have to cast your {@filter druid spells|spells|class=druid} of 1st level and higher. To cast one of these druid spells, you must expend a slot of the spell's level or higher. You regain all expended spell slots when you finish a long rest.
            - You prepare the list of druid spells that are available for you to cast, choosing from the druid spell list. When you do so, choose a number of druid spells equal to your Wisdom modifier + your druid level (minimum of one spell). The spells must be of a level for which you have spell slots.
            - For example, if you are a 3rd-level druid, you have four 1st-level and two 2nd-level spell slots. With a Wisdom of 16, your list of prepared spells can include six spells of 1st or 2nd level, in any combination. If you prepare the 1st-level spell {@spell cure wounds}, you can cast it using a 1st-level or 2nd-level slot. Casting the spell doesn't remove it from your list of prepared spells.
            - 'You can also change your list of prepared spells when you finish a long rest. Preparing a new list of druid spells requires time spent in prayer and meditation: at least 1 minute per spell level for each spell on your list.'
          name: Preparing and Casting Spells
          type: entries
        - entries:
            - Wisdom is your spellcasting ability for your druid spells, since your magic draws upon your devotion and attunement to nature. You use your Wisdom whenever a spell refers to your spellcasting ability. In addition, you use your Wisdom modifier when setting the saving throw DC for a druid spell you cast and when making an attack roll with one.
            - attributes:
                - wis
              name: Spell
              type: abilityDc
            - attributes:
                - wis
              name: Spell
              type: abilityAttackMod
          name: Spellcasting Ability
          type: entries
        - entries:
            - You can cast a druid spell as a ritual if that spell has the ritual tag and you have the spell prepared.
          name: Ritual Casting
          type: entries
        - entries:
            - You can use a {@item druidic focus|phb} as a spellcasting focus for your druid spells.
          name: Spellcasting Focus
          type: entries
    - class_name: Druid
      class_source: PHB
      feature: Druid Circle
      source: PHB
      level: 2
      entries:
        - At 2nd level, you choose to identify with a circle of druids from the list of available circles. Your choice grants you features at 2nd level and again at 6th, 10th, and 14th level.
    - class_name: Druid
      class_source: PHB
      feature: Wild Companion
      source: TCE
      level: 2
      entries:
        - '{@i 2nd-level druid {@variantrule optional class features|tce|optional feature}}'
        - 'You gain the ability to summon a spirit that assumes an animal form: as an action, you can expend a use of your Wild Shape feature to cast the {@spell find familiar} spell, without material components.'
        - When you cast the spell in this way, the familiar is a fey instead of a beast, and the familiar disappears after a number of hours equal to half your druid level.
    - class_name: Druid
      class_source: PHB
      feature: Wild Shape
      source: PHB
      level: 2
      entries:
        - Starting at 2nd level, you can use your action to magically assume the shape of a beast that you have seen before. You can use this feature twice. You regain expended uses when you finish a short or long rest.
        - Your druid level determines the beasts you can transform into, as shown in the Beast Shapes table. At 2nd level, for example, you can transform into any beast that has a challenge rating of 1/4 or lower that doesn't have a flying or swimming speed.
        - caption: Beast Shapes
          colLabels:
            - Level
            - Max. CR
            - Limitations
            - Example
          colStyles:
            - col-2 text-center
            - col-2 text-center
            - col-5
            - col-3
          rows:
            - - 2nd
              - '{@filter 1/4|bestiary|challenge rating=[&0;&1/4]|type=beast|speed type=!fly;!swim|miscellaneous=!swarm}'
              - No flying or swimming speed
              - Wolf
            - - 4th
              - '{@filter 1/2|bestiary|challenge rating=[&0;&1/2]|type=beast|speed type=!fly|miscellaneous=!swarm}'
              - No flying speed
              - Crocodile
            - - 8th
              - '{@filter 1|bestiary|challenge rating=[&0;&1]|type=beast|miscellaneous=!swarm}'
              - —
              - Giant eagle
          type: table
        - You can stay in a beast shape for a number of hours equal to half your druid level (rounded down). You then revert to your normal form unless you expend another use of this feature. You can revert to your normal form earlier by using a bonus action on your turn. You automatically revert if you fall {@condition unconscious}, drop to 0 hit points, or die.
        - 'While you are transformed, the following rules apply:'
        - items:
            - Your game statistics are replaced by the statistics of the beast, but you retain your alignment, personality, and Intelligence, Wisdom, and Charisma scores. You also retain all of your skill and saving throw proficiencies, in addition to gaining those of the creature. If the creature has the same proficiency as you and the bonus in its stat block is higher than yours, use the creature's bonus instead of yours. If the creature has any legendary or lair actions, you can't use them.
            - When you transform, you assume the beast's hit points and Hit Dice. When you revert to your normal form, you return to the number of hit points you had before you transformed. However, if you revert as a result of dropping to 0 hit points, any excess damage carries over to your normal form. For example, if you take 10 damage in animal form and have only 1 hit point left, you revert and take 9 damage. As long as the excess damage doesn't reduce your normal form to 0 hit points, you aren't knocked {@condition unconscious}.
            - You can't cast spells, and your ability to speak or take any action that requires hands is limited to the capabilities of your beast form. Transforming doesn't break your {@status concentration} on a spell you've already cast, however, or prevent you from taking actions that are part of a spell, such as {@spell call lightning}, that you've already cast.
            - You retain the benefit of any features from your class, race, or other source and can use them if the new form is physically capable of doing so. However, you can't use any of your special senses, such as {@sense darkvision}, unless your new form also has that sense.
            - You choose whether your equipment falls to the ground in your space, merges into your new form, or is worn by it. Worn equipment functions as normal, but the DM decides whether it is practical for the new form to wear a piece of equipment, based on the creature's shape and size. Your equipment doesn't change size or shape to match the new form, and any equipment that the new form can't wear must either fall to the ground or merge with it. Equipment that merges with the form has no effect until you leave the form.
          type: list
    - class_name: Druid
      class_source: PHB
      feature: Ability Score Improvement
      source: PHB
      level: 4
      entries:
        - When you reach 4th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can't increase an ability score above 20 using this feature.
        - If your DM allows the use of feats, you may instead take a {@5etools feat|feats.html}.
    - class_name: Druid
      class_source: PHB
      feature: Cantrip Versatility
      source: TCE
      level: 4
      entries:
        - '{@i 4th-level druid {@variantrule optional class features|tce|optional feature}}'
        - Whenever you reach a level in this class that grants the Ability Score Improvement feature, you can replace one cantrip you learned from this class's Spellcasting feature with another cantrip from the {@filter druid spell list|spells|level=0|class=Druid}.
    - class_name: Druid
      class_source: PHB
      feature: Wild Shape Improvement
