    - class_name: Sorcerer
      class_source: PHB
      feature: Sorcerous Restoration
      source: PHB
      level: 20
      entries:
        - At 20th level, you regain 4 expended sorcery points whenever you finish a short rest.
    - class_name: Sorcerer
      class_source: XPHB
      feature: Innate Sorcery
      source: XPHB
      level: 1
      entries:
        - 'An event in your past left an indelible mark on you, infusing you with simmering magic. As a {@variantrule Bonus Action|XPHB}, you can unleash that magic for 1 minute, during which you gain the following benefits:'
        - items:
            - The spell save DC of your Sorcerer spells increases by 1.
            - You have {@variantrule Advantage|XPHB} on the attack rolls of Sorcerer spells you cast.
          type: list
        - You can use this feature twice, and you regain all expended uses of it when you finish a {@variantrule Long Rest|XPHB}.
    - class_name: Sorcerer
      class_source: XPHB
      feature: Spellcasting
      source: XPHB
      level: 1
      entries:
        - Drawing from your innate magic, you can cast spells. See {@book chapter 7|XPHB|7} for the rules on spellcasting. The information below details how you use those rules with Sorcerer spells, which appear in the {@filter Sorcerer spell list|spells|class=Sorcerer} later in the class's description.
        - entries:
            - entries:
                - You know four Sorcerer cantrips of your choice. {@spell Light|XPHB}, {@spell Prestidigitation|XPHB}, {@spell Shocking Grasp|XPHB}, and {@spell Sorcerous Burst|XPHB} are recommended. Whenever you gain a Sorcerer level, you can replace one of your cantrips from this feature with another Sorcerer cantrip of your choice.
                - When you reach Sorcerer levels 4 and 10, you learn another Sorcerer cantrip of your choice, as shown in the Cantrips column of the Sorcerer Features table.
              name: Cantrips
              type: entries
            - entries:
                - The Sorcerer Features table shows how many spell slots you have to cast your level 1+ spells. You regain all expended slots when you finish a {@variantrule Long Rest|XPHB}.
              name: Spell Slots
              type: entries
            - entries:
                - You prepare the list of level 1+ spells that are available for you to cast with this feature. To start, choose two level 1 Sorcerer spells. {@spell Burning Hands|XPHB} and {@spell Detect Magic|XPHB} are recommended.
                - The number of spells on your list increases as you gain Sorcerer levels, as shown in the Prepared Spells column of the Sorcerer Features table. Whenever that number increases, choose additional Sorcerer spells until the number of spells on your list matches the number in the Sorcerer Features table. The chosen spells must be of a level for which you have spell slots. For example, if you're a level 3 Sorcerer, your list of prepared spells can include six Sorcerer spells of level 1 or 2 in any combination.
                - If another Sorcerer feature gives you spells that you always have prepared, those spells don't count against the number of spells you can prepare with this feature, but those spells otherwise count as Sorcerer spells for you.
              name: Prepared Spells of Level 1+
              type: entries
            - entries:
                - Whenever you gain a Sorcerer level, you can replace one spell on your list with another Sorcerer spell for which you have spell slots.
              name: Changing Your Prepared Spells
              type: entries
            - entries:
                - Charisma is your spellcasting ability for your Sorcerer spells.
              name: Spellcasting Ability
              type: entries
            - entries:
                - You can use an {@item Arcane Focus|XPHB} as a {@variantrule Spellcasting Focus|XPHB} for your Sorcerer spells.
              name: Spellcasting Focus
              type: entries
          type: entries
    - class_name: Sorcerer
