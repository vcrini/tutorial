    - class_name: Wizard
      class_source: XPHB
      subclass_name: Evoker
      subclass_source: XPHB
      feature: Potent Cantrip
      source: XPHB
      level: 3
      entries:
        - Your damaging cantrips affect even creatures that avoid the brunt of the effect. When you cast a cantrip at a creature and you miss with the attack roll or the target succeeds on a saving throw against the cantrip, the target takes half the cantrip's damage (if any) but suffers no additional effect from the cantrip.
    - class_name: Wizard
      class_source: XPHB
      subclass_name: Evoker
      subclass_source: XPHB
      feature: Sculpt Spells
      source: XPHB
      level: 6
      entries:
        - You can create pockets of relative safety within the effects of your evocations. When you cast an Evocation spell that affects other creatures that you can see, you can choose a number of them equal to 1 plus the spell's level. The chosen creatures automatically succeed on their saving throws against the spell, and they take no damage if they would normally take half damage on a successful save.
    - class_name: Wizard
      class_source: XPHB
      subclass_name: Evoker
      subclass_source: XPHB
      feature: Empowered Evocation
      source: XPHB
      level: 10
      entries:
        - Whenever you cast a Wizard spell from the Evocation school, you can add your Intelligence modifier to one damage roll of that spell.
    - class_name: Wizard
      class_source: XPHB
      subclass_name: Evoker
      subclass_source: XPHB
      feature: Overchannel
      source: XPHB
      level: 14
      entries:
        - You can increase the power of your spells. When you cast a Wizard spell with a spell slot of levels 1–5 that deals damage, you can deal maximum damage with that spell on the turn you cast it.
        - The first time you do so, you suffer no adverse effect. If you use this feature again before you finish a {@variantrule Long Rest|XPHB}, you take {@damage 2d12} Necrotic damage for each level of the spell slot immediately after you cast it. This damage ignores {@variantrule Resistance|XPHB} and {@variantrule Immunity|XPHB}.
        - Each time you use this feature again before finishing a {@variantrule Long Rest|XPHB}, the Necrotic damage per spell level increases by {@damage 1d12}.
    - class_name: Wizard
