      subclass_source: XPHB
      feature: Disciple of Life
      source: XPHB
      level: 3
      entries:
        - When a spell you cast with a spell slot restores {@variantrule Hit Points|XPHB} to a creature, that creature regains additional {@variantrule Hit Points|XPHB} on the turn you cast the spell. The additional {@variantrule Hit Points|XPHB} equal 2 plus the spell slot's level.
    - class_name: Cleric
      class_source: XPHB
      subclass_name: Life
      subclass_source: XPHB
      feature: Life Domain
      source: XPHB
      level: 3
      entries:
        - '{@i Soothe the Hurts of the World}'
        - The Life Domain focuses on the positive energy that helps sustain all life in the multiverse. Clerics who tap into this domain are masters of healing, using that life force to cure many hurts.
        - Existence itself relies on the positive energy associated with this domain, so a Cleric of almost any religious tradition might choose it. This domain is particularly associated with agricultural deities, gods of healing or endurance, and gods of home and community. Religious orders of healing also seek the magic of this domain.
        - subclassFeature: Life Domain Spells|Cleric|XPHB|Life|XPHB|3
          type: refSubclassFeature
