    - class_name: Cleric
      class_source: XPHB
      subclass_name: Knowledge
      subclass_source: FRHoF
      feature: Blessings of Knowledge
      source: FRHoF
      level: 3
      entries:
        - 'You gain proficiency with one type of {@item Artisan''s Tools|XPHB} of your choice and in two of the following skills of your choice: {@skill Arcana|XPHB}, {@skill History|XPHB}, {@skill Nature|XPHB}, or {@skill Religion|XPHB}. You have {@variantrule Expertise|XPHB} in those two skills.'
    - class_name: Cleric
      class_source: XPHB
      subclass_name: Knowledge
      subclass_source: FRHoF
      feature: Knowledge Domain
      source: FRHoF
      level: 3
      entries:
        - '{@i Unearth Secrets and Master the Mind}'
        - The Knowledge Domain values learning and understanding above all. Clerics who tap into this domain study esoteric lore, collect old tomes, delve into secret places, and examine the processes of the mind. To them, knowledge is more valuable than material wealth, and learning is an act of worship. Libraries, universities, and other educational institutions also draw on the power of the Knowledge Domain.
        - Gods of knowledge vary from masters of arcane magic to patrons of craft and invention. In Faerûn, Clerics of the Knowledge Domain worship deities of learning and ingenuity such as {@deity Oghma|Faerûnian|FRHoF} and {@deity Gond|Faerûnian|FRHoF}, among many others.
        - subclassFeature: Blessings of Knowledge|Cleric|XPHB|Knowledge|FRHoF|3|FRHoF
          type: refSubclassFeature
        - subclassFeature: Knowledge Domain Spells|Cleric|XPHB|Knowledge|FRHoF|3|FRHoF
          type: refSubclassFeature
        - subclassFeature: Mind Magic|Cleric|XPHB|Knowledge|FRHoF|3|FRHoF
          type: refSubclassFeature
