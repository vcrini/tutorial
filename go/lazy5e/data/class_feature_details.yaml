    - class_name: Warlock
      class_source: XPHB
      feature: Eldritch Invocations
      source: XPHB
      level: 1
      entries:
        - You have unearthed Eldritch Invocations, pieces of forbidden knowledge that imbue you with an abiding magical ability or other lessons. You gain one invocation of your choice, such as Pact of the Tome. Invocations are described in the "{@filter Eldritch Invocation Options|optionalfeatures|feature type=EI|source=XPHB}" section later in this class's description.
        - entries:
            - entries:
                - If an invocation has a prerequisite, you must meet it to learn that invocation. For example, if an invocation requires you to be a level 5+ Warlock, you can select the invocation once you reach Warlock level 5.
              name: Prerequisites
              type: entries
            - entries:
                - Whenever you gain a Warlock level, you can replace one of your invocations with another one for which you qualify. You can't replace an invocation if it's a prerequisite for another invocation that you have.
              name: Replacing and Gaining Invocations
              type: entries
          type: entries
        - When you gain certain Warlock levels, you gain more invocations of your choice, as shown in the Invocations column of the Warlock Features table.
        - You can't pick the same invocation more than once unless its description says otherwise.
    - class_name: Warlock
      class_source: XPHB
      feature: Pact Magic
      source: XPHB
      level: 1
      entries:
        - 'Through occult ceremony, you have formed a pact with a mysterious entity to gain magical powers. The entity is a voice in the shadows—its identity unclear—but its boon to you is concrete: the ability to cast spells. See {@book chapter 7|XPHB|7} for the rules on spellcasting. The information below details how you use those rules with Warlock spells, which appear in the {@filter Warlock spell list|spells|class=Warlock} later in the class''s description.'
        - entries:
            - entries:
                - You know two Warlock cantrips of your choice. {@spell Eldritch Blast|XPHB} and {@spell Prestidigitation|XPHB} are recommended. Whenever you gain a Warlock level, you can replace one of your cantrips from this feature with another Warlock cantrip of your choice.
                - When you reach Warlock levels 4 and 10, you learn another Warlock cantrip of your choice, as shown in the Cantrips column of the Warlock Features table.
              name: Cantrips
              type: entries
            - entries:
                - The Warlock Features table shows how many spell slots you have to cast your Warlock spells of levels 1–5. The table also shows the level of those slots, all of which are the same level. You regain all expended Pact Magic spell slots when you finish a {@variantrule Short Rest|XPHB|Short} or {@variantrule Long Rest|XPHB}.
                - For example, when you're a level 5 Warlock, you have two level 3 spell slots. To cast the level 1 spell {@spell Witch Bolt|XPHB}, you must spend one of those slots, and you cast it as a level 3 spell.
              name: Spell Slots
              type: entries
            - entries:
                - You prepare the list of level 1+ spells that are available for you to cast with this feature. To start, choose two level 1 Warlock spells. {@spell Charm Person|XPHB} and {@spell Hex|XPHB} are recommended.
              name: Prepared Spells of Level 1+
              type: entries
          type: entries
        - The number of spells on your list increases as you gain Warlock levels, as shown in the Prepared Spells column of the Warlock Features table. Whenever that number increases, choose additional Warlock spells until the number of spells on your list matches the number in the table. The chosen spells must be of a level no higher than what's shown in the table's Slot Level column for your level. When you reach level 6, for example, you learn a new Warlock spell, which can be of levels 1–3.
        - If another Warlock feature gives you spells that you always have prepared, those spells don't count against the number of spells you can prepare with this feature, but those spells otherwise count as Warlock spells for you.
        - entries:
            - entries:
                - Whenever you gain a Warlock level, you can replace one spell on your list with another Warlock spell of an eligible level.
              name: Changing Your Prepared Spells
              type: entries
            - entries:
                - Charisma is the spellcasting ability for your Warlock spells.
              name: Spellcasting Ability
              type: entries
            - entries:
                - You can use an {@item Arcane Focus|XPHB} as a {@variantrule Spellcasting Focus|XPHB} for your Warlock spells.
              name: Spellcasting Focus
              type: entries
          type: entries
    - class_name: Warlock
      class_source: XPHB
      feature: Magical Cunning
      source: XPHB
      level: 2
      entries:
        - You can perform an esoteric rite for 1 minute. At the end of it, you regain expended Pact Magic spell slots but no more than a number equal to half your maximum (round up). Once you use this feature, you can't do so again until you finish a {@variantrule Long Rest|XPHB}.
    - class_name: Warlock
      class_source: XPHB
      feature: Warlock Subclass
      source: XPHB
      level: 3
      entries:
        - You gain a Warlock subclass of your choice. A subclass is a specialization that grants you features at certain Warlock levels. For the rest of your career, you gain each of your subclass's features that are of your Warlock level or lower.
    - class_name: Warlock
      class_source: XPHB
      feature: Ability Score Improvement
      source: XPHB
      level: 4
      entries:
        - You gain the {@feat Ability Score Improvement|XPHB} feat or another {@5etools feat|feats.html} of your choice for which you qualify. You gain this feature again at Warlock levels 8, 12, and 16.
    - class_name: Warlock
      class_source: XPHB
      feature: Subclass Feature
      source: XPHB
      level: 6
      entries:
        - You gain a feature from your Warlock subclass.
    - class_name: Warlock
      class_source: XPHB
      feature: Ability Score Improvement
      source: XPHB
      level: 8
      entries:
        - You gain the {@feat Ability Score Improvement|XPHB} Feat or another {@5etools feat|feats.html} of your choice for which you qualify.
    - class_name: Warlock
      class_source: XPHB
      feature: Contact Patron
      source: XPHB
      level: 9
      entries:
        - In the past, you usually contacted your patron through intermediaries. Now you can communicate directly; you always have the {@spell Contact Other Plane|XPHB} spell prepared. With this feature, you can cast the spell without expending a spell slot to contact your patron, and you automatically succeed on the spell's saving throw.
        - Once you cast the spell with this feature, you can't do so in this way again until you finish a {@variantrule Long Rest|XPHB}.
    - class_name: Warlock
      class_source: XPHB
      feature: Subclass Feature
      source: XPHB
      level: 10
      entries:
        - You gain a feature from your Warlock subclass.
    - class_name: Warlock
      class_source: XPHB
      feature: Mystic Arcanum
      source: XPHB
      level: 11
      entries:
        - Your patron grants you a magical secret called an arcanum. Choose one level 6 Warlock spell as this arcanum.
        - You can cast your arcanum spell once without expending a spell slot, and you must finish a {@variantrule Long Rest|XPHB} before you can cast it in this way again.
        - As shown in the Warlock Features table, you gain another Warlock spell of your choice that can be cast in this way when you reach Warlock levels 13 (level 7 spell), 15 (level 8 spell), and 17 (level 9 spell). You regain all uses of your Mystic Arcanum when you finish a {@variantrule Long Rest|XPHB}.
        - Whenever you gain a Warlock level, you can replace one of your arcanum spells with another Warlock spell of the same level.
    - class_name: Warlock
      class_source: XPHB
      feature: Ability Score Improvement
      source: XPHB
      level: 12
      entries:
        - You gain the {@feat Ability Score Improvement|XPHB} Feat or another {@5etools feat|feats.html} of your choice for which you qualify.
    - class_name: Warlock
      class_source: XPHB
      feature: Mystic Arcanum
      source: XPHB
      level: 13
      entries:
        - You gain a level 7 Warlock Spell of your choice.
    - class_name: Warlock
      class_source: XPHB
      feature: Subclass Feature
      source: XPHB
      level: 14
      entries:
        - You gain a feature from your Warlock subclass.
    - class_name: Warlock
      class_source: XPHB
