    - class_name: Rogue
      class_source: XPHB
      feature: 'Knock Out (Cost: 6d6)'
      source: XPHB
      level: 14
      entries:
        - The target must succeed on a Constitution saving throw, or it has the {@condition Unconscious|XPHB} condition for 1 minute or until it takes any damage. The {@condition Unconscious|XPHB} target repeats the save at the end of each of its turns, ending the effect on itself on a success.
    - class_name: Rogue
      class_source: XPHB
      feature: 'Obscure (Cost: 3d6)'
      source: XPHB
      level: 14
      entries:
        - The target must succeed on a Dexterity saving throw, or it has the {@condition Blinded|XPHB} condition until the end of its next turn.
    - class_name: Rogue
      class_source: XPHB
      feature: Slippery Mind
      source: XPHB
      level: 15
      entries:
        - Your cunning mind is exceptionally difficult to control. You gain proficiency in Wisdom and Charisma saving throws.
    - class_name: Rogue
      class_source: XPHB
      feature: Ability Score Improvement
      source: XPHB
      level: 16
      entries:
        - You gain the {@feat Ability Score Improvement|XPHB} feat or another {@5etools feat|feats.html} of your choice for which you qualify.
    - class_name: Rogue
      class_source: XPHB
      feature: Subclass Feature
      source: XPHB
      level: 17
      entries:
        - You gain a feature from your Rogue Subclass.
    - class_name: Rogue
      class_source: XPHB
      feature: Elusive
      source: XPHB
      level: 18
      entries:
        - You're so evasive that attackers rarely gain the upper hand against you. No attack roll can have {@variantrule Advantage|XPHB} against you unless you have the {@condition Incapacitated|XPHB} condition.
    - class_name: Rogue
      class_source: XPHB
      feature: Epic Boon
      source: XPHB
      level: 19
      entries:
        - You gain an {@filter Epic Boon feat|feats|category=EB} or another {@5etools feat|feats.html} of your choice for which you qualify. {@feat Boon of the Night Spirit|XPHB} is recommended.
    - class_name: Rogue
      class_source: XPHB
      feature: Stroke of Luck
      source: XPHB
      level: 20
      entries:
        - You have a marvelous knack for succeeding when you need to. If you fail a {@variantrule D20 Test|XPHB}, you can turn the roll into a 20.
        - Once you use this feature, you can't use it again until you finish a {@variantrule Short Rest|XPHB|Short} or {@variantrule Long Rest|XPHB}.
    - class_name: Sorcerer
      class_source: PHB
      feature: Sorcerous Origin
      source: PHB
      level: 1
      entries:
        - Choose a sorcerous origin, which describes the source of your innate magical power, from the list of available origins.
        - Your choice grants you features when you choose it at 1st level and again at 6th, 14th, and 18th level.
    - class_name: Sorcerer
      class_source: PHB
      feature: Spellcasting
      source: PHB
      level: 1
      entries:
        - An event in your past, or in the life of a parent or ancestor, left an indelible mark on you, infusing you with arcane magic. This font of magic, whatever its origin, fuels your spells. See {@book chapter 10|PHB|10} for the general rules of spellcasting and {@book chapter 11|PHB|11} for the {@filter sorcerer spell list|spells|class=sorcerer}.
        - entries:
            - At 1st level, you know four cantrips of your choice from the sorcerer spell list. You learn an additional sorcerer cantrip of your choice at 4th level and another at 10th level.
          name: Cantrips
          type: entries
        - entries:
            - The Sorcerer table shows how many spell slots you have to cast your {@filter sorcerer spells|spells|class=sorcerer} of 1st level and higher. To cast one of these sorcerer spells, you must expend a slot of the spell's level or higher. You regain all expended spell slots when you finish a long rest.
            - For example, if you know the 1st-level spell {@spell burning hands} and have a 1st-level and a 2nd-level spell slot available, you can cast {@spell burning hands} using either slot.
          name: Spell Slots
          type: entries
        - entries:
            - You know two 1st-level spells of your choice from the sorcerer spell list.
            - You learn an additional sorcerer spell of your choice at each level except 12th, 14th, 16th, 18th, 19th, and 20th. Each of these spells must be of a level for which you have spell slots. For instance, when you reach 3rd level in this class, you can learn one new spell of 1st or 2nd level.
            - Additionally, when you gain a level in this class, you can choose one of the sorcerer spells you know and replace it with another spell from the sorcerer spell list, which also must be of a level for which you have spell slots.
          name: Spells Known of 1st Level and Higher
          type: entries
        - entries:
            - Charisma is your spellcasting ability for your sorcerer spells, since the power of your magic relies on your ability to project your will into the world. You use your Charisma whenever a spell refers to your spellcasting ability. In addition, you use your Charisma modifier when setting the saving throw DC for a sorcerer spell you cast and when making an attack roll with one.
            - attributes:
                - cha
              name: Spell
              type: abilityDc
            - attributes:
                - cha
              name: Spell
              type: abilityAttackMod
          name: Spellcasting Ability
          type: entries
        - entries:
            - You can use an {@item arcane focus|phb} as a spellcasting focus for your sorcerer spells.
          name: Spellcasting Focus
          type: entries
    - class_name: Sorcerer
      class_source: PHB
      feature: Flexible Casting
      source: PHB
      level: 2
      entries:
        - You can use your sorcery points to gain additional spell slots, or sacrifice spell slots to gain additional sorcery points. You learn other ways to use your sorcery points as you reach higher levels.
        - entries:
            - You can transform unexpended sorcery points into one spell slot as a bonus action on your turn. The created spell slots vanish at the end of a long rest. The Creating Spell Slots table shows the cost of creating a spell slot of a given level. You can create spell slots no higher in level than 5th.
            - caption: Creating Spell Slots
              colLabels:
                - Spell Slot Level
                - Sorcery Point Cost
              colStyles:
                - col-6 text-center
                - col-6 text-center
              rows:
                - - 1st
                  - "2"
                - - 2nd
                  - "3"
                - - 3rd
                  - "5"
                - - 4th
                  - "6"
                - - 5th
                  - "7"
              type: table
          name: Creating Spell Slots
          type: entries
        - entries:
            - As a bonus action on your turn, you can expend one spell slot and gain a number of sorcery points equal to the slot's level.
          name: Converting a Spell Slot to Sorcery Points
          type: entries
    - class_name: Sorcerer
      class_source: PHB
      feature: Font of Magic
      source: PHB
      level: 2
      entries:
        - At 2nd level, you tap into a deep wellspring of magic within yourself. This wellspring is represented by sorcery points, which allow you to create a variety of magical effects.
        - classFeature: Sorcery Points|Sorcerer||2
          type: refClassFeature
        - classFeature: Flexible Casting|Sorcerer||2
          type: refClassFeature
    - class_name: Sorcerer
      class_source: PHB
      feature: Sorcery Points
      source: PHB
      level: 2
      entries:
        - You have 2 sorcery points, and you gain one additional point every time you level up, to a maximum of 20 at level 20. You can never have more sorcery points than shown on the table for your level. You regain all spent sorcery points when you finish a long rest.
    - class_name: Sorcerer
      class_source: PHB
      feature: Metamagic
      source: PHB
      level: 3
      entries:
        - At 3rd level, you gain the ability to twist your spells to suit your needs. You gain two of the following Metamagic options of your choice. You gain another one at 10th and 17th level.
        - You can use only one Metamagic option on a spell when you cast it, unless otherwise noted.
