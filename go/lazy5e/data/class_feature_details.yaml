          type: table
    - class_name: Sorcerer
      class_source: XPHB
      subclass_name: Draconic
      subclass_source: XPHB
      feature: Elemental Affinity
      source: XPHB
      level: 6
      entries:
        - 'Your draconic magic has an affinity with a damage type associated with dragons. Choose one of those types: Acid, Cold, Fire, Lightning, or Poison.'
        - You have {@variantrule Resistance|XPHB} to that damage type, and when you cast a spell that deals damage of that type, you can add your Charisma modifier to one damage roll of that spell.
    - class_name: Sorcerer
      class_source: XPHB
      subclass_name: Draconic
      subclass_source: XPHB
      feature: Dragon Wings
      source: XPHB
      level: 14
      entries:
        - As a {@variantrule Bonus Action|XPHB}, you can cause draconic wings to appear on your back. The wings last for 1 hour or until you dismiss them (no action required). For the duration, you have a {@variantrule Fly Speed|XPHB} of 60 feet.
        - Once you use this feature, you can't use it again until you finish a {@variantrule Long Rest|XPHB} unless you spend 3 Sorcery Points (no action required) to restore your use of it.
    - class_name: Sorcerer
      class_source: XPHB
      subclass_name: Draconic
      subclass_source: XPHB
      feature: Dragon Companion
      source: XPHB
      level: 18
      entries:
        - You can cast {@spell Summon Dragon|XPHB} without a Material component. You can also cast it once without a spell slot, and you regain the ability to cast it in this way when you finish a {@variantrule Long Rest|XPHB}.
        - Whenever you start casting the spell, you can modify it so that it doesn't require {@status Concentration|XPHB}. If you do so, the spell's duration becomes 1 minute for that casting.
    - class_name: Sorcerer
      class_source: XPHB
