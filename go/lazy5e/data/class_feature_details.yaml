    - class_name: Artificer
      class_source: EFA
      subclass_name: Battle Smith
      subclass_source: EFA
      feature: Steel Defender
      source: EFA
      level: 3
      entries:
        - Your tinkering has borne you a companion, a {@creature Steel Defender|EFA}. You determine the defender's appearance and whether it has two legs or four; your choices don't affect the defender's game statistics.
        - The {@creature Steel Defender|EFA|defender} is {@variantrule Friendly [Attitude]|XPHB|Friendly} to you and your allies and obeys you. It vanishes if you die.
        - entries:
            - In combat, the defender acts during your turn. It can move and take its {@variantrule Reaction|XPHB} on its own, but the only action it takes is the {@action Dodge|XPHB} action unless you take a {@variantrule Bonus Action|XPHB} to command it to take an action. If you have the {@condition Incapacitated|XPHB} condition, the defender acts on its own and isn't limited to the {@action Dodge|XPHB} action.
          name: The Defender in Combat
          type: entries
        - entries:
            - If the defender has died within the last hour, you can take a {@action Magic|XPHB} action to touch it and expend a spell slot. The defender returns to life after 1 minute with all its {@variantrule Hit Points|XPHB} restored.
            - Whenever you finish a {@variantrule Long Rest|XPHB}, you can create a new {@creature Steel Defender|EFA|defender} if you have {@item Smith's Tools|XPHB} in hand. If you already have a defender from this feature, the first one vanishes.
          name: Restoring or Replacing the Defender
          page: 19
          type: entries
    - class_name: Artificer
      class_source: EFA
      subclass_name: Battle Smith
      subclass_source: EFA
      feature: Tools of the Trade
      source: EFA
      level: 3
      entries:
        - You gain the following benefits.
        - entries:
            - You gain proficiency with {@item Smith's Tools|XPHB}. If you already have this proficiency, you gain proficiency with one other type of {@item Artisan's Tools|XPHB} of your choice.
          name: Tool Proficiency
          type: entries
        - entries:
            - When you craft a nonmagical or magic weapon, the amount of time required to craft it is halved.
          name: Weapon Crafting
          type: entries
    - class_name: Artificer
      class_source: EFA
      subclass_name: Battle Smith
      subclass_source: EFA
      feature: Extra Attack
      source: EFA
      level: 5
      entries:
        - You can attack twice instead of once whenever you take the {@action Attack|XPHB} action on your turn. You can forgo one of your attacks when you take the {@action Attack|XPHB} action to command your {@creature Steel Defender|EFA} to take the Force-Empowered Rend action.
    - class_name: Artificer
      class_source: EFA
      subclass_name: Battle Smith
      subclass_source: EFA
      feature: Arcane Jolt
      source: EFA
      level: 9
      entries:
        - 'When either you hit a target with an attack roll using a magic weapon or your {@creature Steel Defender|EFA} hits a target, you can channel magical energy through the strike to create one of the following effects:'
        - items:
            - entries:
                - The target takes an extra {@damage 2d6} Force damage.
              name: Destructive Energy
              type: item
            - entries:
                - Choose one creature or object you can see within 30 feet of the target. Healing energy flows into the chosen recipient, restoring {@dice 2d6} {@variantrule Hit Points|XPHB} to it.
              name: Restorative Energy
              type: item
          style: list-hang-notitle
          type: list
        - You can use this energy a number of times equal to your Intelligence modifier (minimum of once), but you can do so no more than once per turn. You regain all expended uses when you finish a {@variantrule Long Rest|XPHB}.
    - class_name: Artificer
      class_source: EFA
      subclass_name: Battle Smith
      subclass_source: EFA
      feature: Improved Defender
      source: EFA
      level: 15
      entries:
        - Your {@subclassFeature Arcane Jolt|Artificer|EFA|Battle Smith|EFA|9|EFA} and {@creature Steel Defender|EFA} have become more powerful, granting these benefits.
        - entries:
            - The extra damage and healing of your Arcane Jolt both increase to {@dice 4d6}.
          name: Improved Jolt
          type: entries
        - entries:
            - Whenever your {@creature Steel Defender|EFA} uses its Deflect Attack, the attacker takes Force damage equal to {@dice 1d4} plus your Intelligence modifier.
          name: Improved Deflection
          type: entries
    - class_name: Artificer
      class_source: EFA
      subclass_name: Cartographer
      subclass_source: EFA
      feature: Adventurer's Atlas
      source: EFA
      level: 3
      entries:
        - Whenever you finish a {@variantrule Long Rest|XPHB} while holding {@item Cartographer's Tools|XPHB}, you can use that tool to create a set of magical maps by touching at least two creatures (one of whom can be yourself), up to a maximum number of creatures equal to 1 plus your Intelligence modifier (minimum of two creatures). Each target receives a magical map, which constantly updates to show the relative position of all the map holders but is illegible to all others. The maps last until you die or until you use this feature again, at which point any existing maps created by this feature immediately vanish.
        - While carrying the map, a target gains the following benefits.
        - entries:
            - The target adds {@dice 1d4} to its {@variantrule Initiative|XPHB} rolls.
          name: Awareness
          type: entries
        - entries:
            - The target knows the location of all other map holders that are on the same plane of existence as itself. When casting a spell or creating another effect that requires being able to see the effect's target, a map holder can target another map holder regardless of sight or cover, so long as the other map holder is still within the effect's range.
          name: Positioning
          type: entries
    - class_name: Artificer
      class_source: EFA
      subclass_name: Cartographer
      subclass_source: EFA
      feature: Cartographer
      source: EFA
      level: 3
      entries:
        - '{@i Chart Advantageous Courses through Turmoil}'
        - Cartographers are the premier navigators and reconnaissance agents. Using their creations, Cartographers can highlight threats, safeguard allies, and carve portals to distant locations.
        - subclassFeature: Tools of the Trade|Artificer|EFA|Cartographer|EFA|3|EFA
          type: refSubclassFeature
        - subclassFeature: Cartographer Spells|Artificer|EFA|Cartographer|EFA|3|EFA
          type: refSubclassFeature
        - subclassFeature: Adventurer's Atlas|Artificer|EFA|Cartographer|EFA|3|EFA
          type: refSubclassFeature
        - subclassFeature: Mapping Magic|Artificer|EFA|Cartographer|EFA|3|EFA
          type: refSubclassFeature
    - class_name: Artificer
      class_source: EFA
      subclass_name: Cartographer
      subclass_source: EFA
      feature: Cartographer Spells
      source: EFA
      level: 3
      entries:
        - When you reach an Artificer level specified in the Cartographer Spells table, you thereafter always have the listed spells prepared.
        - caption: Cartographer Spells
          colLabels:
            - Artificer Level
            - Spells
          colStyles:
            - col-3 text-center
            - col-9
          page: 20
          rows:
            - - "3"
              - '{@spell Faerie Fire|XPHB}, {@spell Guiding Bolt|XPHB}, {@spell Healing Word|XPHB}'
            - - "5"
              - '{@spell Locate Object|XPHB}, {@spell Mind Spike|XPHB}'
            - - "9"
              - '{@spell Call Lightning|XPHB}, {@spell Clairvoyance|XPHB}'
            - - "13"
              - '{@spell Banishment|XPHB}, {@spell Locate Creature|XPHB}'
            - - "17"
              - '{@spell Scrying|XPHB}, {@spell Teleportation Circle|XPHB}'
          type: table
    - class_name: Artificer
      class_source: EFA
      subclass_name: Cartographer
      subclass_source: EFA
      feature: Mapping Magic
      source: EFA
      level: 3
      entries:
        - You gain the following benefits.
        - entries:
            - You can cast {@spell Faerie Fire|XPHB} without expending a spell slot, outlining the affected creatures as if in ink. You can do so a number of times equal to your Intelligence modifier (minimum of once), and you regain all expended uses when you finish a {@variantrule Long Rest|XPHB}.
          name: Illuminated Cartography
          type: entries
        - entries:
            - On your turn, you can spend an amount of movement equal to half your {@variantrule Speed|XPHB} (round down) to teleport to an unoccupied space you can see within 10 feet of yourself or within 5 feet of a creature that is within 30 feet of you and holding one of your Adventurer's Atlas maps. You can't use this benefit if your {@variantrule Speed|XPHB} is 0.
          name: Portal Jump
          type: entries
    - class_name: Artificer
      class_source: EFA
      subclass_name: Cartographer
      subclass_source: EFA
      feature: Tools of the Trade
      source: EFA
      level: 3
      entries:
        - You gain the following benefits.
        - entries:
            - You gain proficiency with {@item Calligrapher's Supplies|XPHB} and {@item Cartographer's Tools|XPHB}. If you already have one of these proficiencies, you gain proficiency with one other type of {@item Artisan's Tools|XPHB} of your choice (or with two other types if you have both).
          name: Tool Proficiency
          type: entries
        - entries:
            - When you scribe a {@item Spell Scroll|XDMG} using the crafting rules in the {@book Player's Handbook|PHB}, the amount of time required to craft it is halved.
          name: Scroll Crafting
          type: entries
    - class_name: Artificer
      class_source: EFA
      subclass_name: Cartographer
      subclass_source: EFA
      feature: Guided Precision
      source: EFA
      level: 5
      entries:
        - Once per turn, whenever you cast a spell from your Cartographer Spells list or hit a creature affected by your {@spell Faerie Fire|XPHB} with an attack roll, you can add your Intelligence modifier to one damage roll of the spell or attack.
        - In addition, taking damage can't cause you to lose {@status Concentration|XPHB} on {@spell Faerie Fire|XPHB}.
    - class_name: Artificer
      class_source: EFA
      subclass_name: Cartographer
      subclass_source: EFA
      feature: Ingenious Movement
      source: EFA
      level: 9
      entries:
        - When you use your {@classFeature Flash of Genius|Artificer|EFA|7|EFA}, you or a willing creature of your choice that you can see within 30 feet of yourself can teleport up to 30 feet to an unoccupied space you can see as part of that same {@variantrule Reaction|XPHB}.
    - class_name: Artificer
      class_source: EFA
      subclass_name: Cartographer
      subclass_source: EFA
      feature: Superior Atlas
      source: EFA
      level: 15
      entries:
        - Your Adventurer's Atlas improves, gaining the following benefits.
        - entries:
            - When a map holder would be reduced to 0 {@variantrule Hit Points|XPHB} but not killed outright, that creature can destroy its map. The creature's {@variantrule Hit Points|XPHB} instead change to a number equal to twice your Artificer level, and the creature is teleported to an unoccupied space within 5 feet of you or another map holder of its choice.
          name: Safe Haven
          type: entries
        - entries:
            - If you are one of the map holders for your Adventurer's Atlas, you can cast {@spell Find the Path|XPHB} without expending a spell slot, without preparing the spell, and without needing spell components. Once you use this benefit, you can't use it again until you finish a {@variantrule Long Rest|XPHB}.
          name: Unerring Path
          type: entries
    - class_name: Artificer
      class_source: TCE
      subclass_name: Alchemist
      subclass_source: TCE
      feature: Alchemist
      source: TCE
      level: 3
      entries:
        - An Alchemist is an expert at combining reagents to produce mystical effects. Alchemists use their creations to give life and to leech it away. Alchemy is the oldest of artificer traditions, and its versatility has long been valued during times of war and peace.
        - subclassFeature: Tool Proficiency|Artificer|TCE|Alchemist|TCE|3
          type: refSubclassFeature
        - subclassFeature: Alchemist Spells|Artificer|TCE|Alchemist|TCE|3
          type: refSubclassFeature
        - subclassFeature: Experimental Elixir|Artificer|TCE|Alchemist|TCE|3
          type: refSubclassFeature
    - class_name: Artificer
      class_source: TCE
      subclass_name: Alchemist
      subclass_source: TCE
      feature: Alchemist Spells
      source: TCE
      level: 3
      entries:
        - Starting at 3rd level, you always have certain spells prepared after you reach particular levels in this class, as shown in the Alchemist Spells table. These spells count as artificer spells for you, but they don't count against the number of artificer spells you prepare.
        - caption: Alchemist Spells
          colLabels:
