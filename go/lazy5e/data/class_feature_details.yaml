    - class_name: Sorcerer
      class_source: XPHB
      subclass_name: Draconic
      subclass_source: XPHB
      feature: Draconic Resilience
      source: XPHB
      level: 3
      entries:
        - The magic in your body manifests physical traits of your draconic gift. Your {@variantrule Hit Points|XPHB|Hit Point} maximum increases by 3, and it increases by 1 whenever you gain another Sorcerer level.
        - Parts of you are also covered by dragon-like scales. While you aren't wearing armor, your base {@variantrule Armor Class|XPHB} equals 10 plus your Dexterity and Charisma modifiers.
    - class_name: Sorcerer
      class_source: XPHB
      subclass_name: Draconic
      subclass_source: XPHB
      feature: Draconic Sorcery
      source: XPHB
      level: 3
      entries:
        - '{@i Breathe the Magic of Dragons}'
        - Your innate magic comes from the gift of a dragon. Perhaps an ancient dragon facing death bequeathed some of its magical power to you or your ancestor. You might have absorbed magic from a site infused with dragons' power. Or perhaps you handled a treasure taken from a dragon's hoard that was steeped in draconic power. Or you might have a dragon for an ancestor.
        - subclassFeature: Draconic Resilience|Sorcerer|XPHB|Draconic|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Draconic Spells|Sorcerer|XPHB|Draconic|XPHB|3
          type: refSubclassFeature
    - class_name: Sorcerer
      class_source: XPHB
      subclass_name: Draconic
      subclass_source: XPHB
      feature: Draconic Spells
      source: XPHB
      level: 3
      entries:
        - When you reach a Sorcerer level specified in the Draconic Spells table, you thereafter always have the listed spells prepared.
