    - class_name: Fighter
      class_source: PHB
      subclass_name: Battle Master
      subclass_source: PHB
      feature: Student of War
      source: PHB
      level: 3
      entries:
        - At 3rd level, you gain proficiency with one type of {@filter artisan's tools|items|source=phb|miscellaneous=mundane|type=artisan's tools} of your choice.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Battle Master
      subclass_source: PHB
      feature: Additional Maneuvers
      source: PHB
      level: 7
      entries:
        - At 7th level, you learn two additional maneuvers of your choice.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Battle Master
      subclass_source: PHB
      feature: Additional Superiority Die
      source: PHB
      level: 7
      entries:
        - You gain another superiority die at 7th level.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Battle Master
      subclass_source: PHB
      feature: Know Your Enemy
      source: PHB
      level: 7
      entries:
        - 'If you spend at least 1 minute observing or interacting with another creature outside combat, you can learn certain information about its capabilities compared to your own. The DM tells you if the creature is your equal, superior, or inferior in regard to two of the following characteristics of your choice:'
        - items:
            - Strength score
            - Dexterity score
            - Constitution score
            - Armor Class
            - Current hit points
            - Total class levels (if any)
            - Fighter class levels (if any)
          type: list
    - class_name: Fighter
      class_source: PHB
      subclass_name: Battle Master
      subclass_source: PHB
      feature: Additional Maneuvers
      source: PHB
      level: 10
      entries:
        - At 10th level, you learn two additional maneuvers of your choice.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Battle Master
      subclass_source: PHB
      feature: Improved Combat Superiority (d10)
      source: PHB
      level: 10
      entries:
        - At 10th level, your superiority dice turn into {@dice d10}s.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Battle Master
      subclass_source: PHB
      feature: Additional Maneuvers
      source: PHB
      level: 15
      entries:
        - At 15th level, you learn two additional maneuvers of your choice.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Battle Master
      subclass_source: PHB
      feature: Additional Superiority Die
      source: PHB
      level: 15
      entries:
        - You gain another superiority die at 15th level.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Battle Master
      subclass_source: PHB
      feature: Relentless
      source: PHB
      level: 15
      entries:
        - Starting at 15th level, when you roll initiative and have no superiority dice remaining, you regain 1 superiority die.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Battle Master
      subclass_source: PHB
      feature: Improved Combat Superiority (d12)
      source: PHB
      level: 18
      entries:
        - At 18th level, your superiority dice turn into {@dice d12}s.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Cavalier
      subclass_source: XGE
      feature: Bonus Proficiency
      source: XGE
      level: 3
      entries:
        - 'When you choose this archetype at 3rd level, you gain proficiency in one of the following skills of your choice: {@skill Animal Handling}, {@skill History}, {@skill Insight}, {@skill Performance}, or {@skill Persuasion}. Alternatively, you learn one language of your choice.'
    - class_name: Fighter
      class_source: PHB
      subclass_name: Cavalier
      subclass_source: XGE
      feature: Born to the Saddle
      source: XGE
      level: 3
      entries:
        - Starting at 3rd level, your mastery as a rider becomes apparent. You have advantage on saving throws made to avoid falling off your mount. If you fall off your mount and descend no more than 10 feet, you can land on your feet if you're not {@condition incapacitated}.
        - Finally, mounting or dismounting a creature costs you only 5 feet of movement, rather than half your speed.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Cavalier
      subclass_source: XGE
      feature: Cavalier
      source: XGE
      level: 3
      entries:
        - The archetypal Cavalier excels at mounted combat. Usually born among the nobility and raised at court, a Cavalier is equally at home leading a cavalry charge or exchanging repartee at a state dinner. Cavaliers also learn how to guard those in their charge from harm, often serving as the protectors of their superiors and of the weak. Compelled to right wrongs or earn prestige, many of these fighters leave their lives of comfort to embark on glorious adventure.
        - subclassFeature: Bonus Proficiency|Fighter||Cavalier|XGE|3
          type: refSubclassFeature
        - subclassFeature: Born to the Saddle|Fighter||Cavalier|XGE|3
          type: refSubclassFeature
        - subclassFeature: Unwavering Mark|Fighter||Cavalier|XGE|3
          type: refSubclassFeature
    - class_name: Fighter
      class_source: PHB
      subclass_name: Cavalier
      subclass_source: XGE
      feature: Unwavering Mark
      source: XGE
      level: 3
      entries:
        - Starting at 3rd level, you can menace your foes, foiling their attacks and punishing them for harming others. When you hit a creature with a melee weapon attack, you can mark the creature until the end of your next turn. This effect ends early if you are {@condition incapacitated} or you die, or if someone else marks the creature.
        - While it is within 5 feet of you, a creature marked by you has disadvantage on any attack roll that doesn't target you.
        - In addition, if a creature marked by you deals damage to anyone other than you, you can make a special melee weapon attack against the marked creature as a bonus action on your next turn. You have advantage on the attack roll, and if it hits, the attack's weapon deals extra damage to the target equal to half your fighter level.
        - Regardless of the number of creatures you mark, you can make this special attack a number of times equal to your Strength modifier (minimum of once), and you regain all expended uses of it when you finish a long rest.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Cavalier
      subclass_source: XGE
      feature: Warding Maneuver
      source: XGE
      level: 7
      entries:
        - At 7th level, you learn to fend off strikes directed at you, your mount, or other creatures nearby. If you or a creature you can see within 5 feet of you is hit by an attack, you can roll {@dice 1d8} as a reaction if you're wielding a melee weapon or a shield. Roll the die, and add the number rolled to the target's AC against that attack. If the attack still hits, the target has resistance against the attack's damage.
        - You can use this feature a number of times equal to your Constitution modifier (minimum of once), and you regain all expended uses of it when you finish a long rest.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Cavalier
      subclass_source: XGE
      feature: Hold the Line
      source: XGE
      level: 10
      entries:
        - At 10th level, you become a master of locking down your enemies. Creatures provoke an opportunity attack from you when they move 5 feet or more while within your reach, and if you hit a creature with an opportunity attack, the target's speed is reduced to 0 until the end of the current turn.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Cavalier
      subclass_source: XGE
      feature: Ferocious Charger
      source: XGE
      level: 15
      entries:
        - Starting at 15th level, you can run down your foes, whether you're mounted or not. If you move at least 10 feet in a straight line right before attacking a creature and you hit it with the attack, that target must succeed on a Strength saving throw ({@dc 8} + your proficiency bonus + your Strength modifier) or be knocked {@condition prone}. You can use this feature only once on each of your turns.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Cavalier
      subclass_source: XGE
      feature: Vigilant Defender
      source: XGE
      level: 18
      entries:
        - Starting at 18th level, you respond to danger with extraordinary vigilance. In combat, you get a special reaction that you can take once on every creature's turn, except your turn. You can use this special reaction only to make an opportunity attack, and you can't use it on the same turn that you take your normal reaction.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Champion
      subclass_source: PHB
      feature: Champion
      source: PHB
      level: 3
      entries:
        - The archetypal Champion focuses on the development of raw physical power honed to deadly perfection. Those who model themselves on this archetype combine rigorous training with physical excellence to deal devastating blows.
        - subclassFeature: Improved Critical|Fighter||Champion||3
          type: refSubclassFeature
    - class_name: Fighter
      class_source: PHB
      subclass_name: Champion
      subclass_source: PHB
      feature: Improved Critical
      source: PHB
      level: 3
      entries:
        - Beginning when you choose this archetype at 3rd level, your weapon attacks score a critical hit on a roll of 19 or 20.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Champion
      subclass_source: PHB
      feature: Remarkable Athlete
      source: PHB
      level: 7
      entries:
        - Starting at 7th level, you can add half your proficiency bonus (round up) to any Strength, Dexterity, or Constitution check you make that doesn't already use your proficiency bonus.
        - In addition, when you make a running long jump, the distance you can cover increases by a number of feet equal to your Strength modifier.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Champion
      subclass_source: PHB
      feature: Additional Fighting Style
      source: PHB
      level: 10
      entries:
        - At 10th level, you can choose a second option from the Fighting Style class feature.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Champion
      subclass_source: PHB
      feature: Superior Critical
      source: PHB
      level: 15
      entries:
        - Starting at 15th level, your weapon attacks score a critical hit on a roll of 18-20.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Champion
      subclass_source: PHB
      feature: Survivor
      source: PHB
      level: 18
      entries:
        - At 18th level, you attain the pinnacle of resilience in battle. At the start of each of your turns, you regain hit points equal to 5 + your Constitution modifier if you have no more than half of your hit points left. You don't gain this benefit if you have 0 hit points.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Echo Knight
      subclass_source: EGW
      feature: Echo Knight
      source: EGW
      level: 3
      entries:
        - A mysterious and feared frontline warrior of the Kryn Dynasty, the Echo Knight has mastered the art of using dunamis to summon the fading shades of unrealized timelines to aid them in battle. Surrounded by echoes of their own might, they charge into the fray as a cycling swarm of shadows and strikes.
        - subclassFeature: Manifest Echo|Fighter||Echo Knight|EGW|3
          type: refSubclassFeature
        - subclassFeature: Unleash Incarnation|Fighter||Echo Knight|EGW|3
          type: refSubclassFeature
    - class_name: Fighter
      class_source: PHB
      subclass_name: Echo Knight
      subclass_source: EGW
      feature: Manifest Echo
      source: EGW
      level: 3
      entries:
        - '{@i 3rd-level Echo Knight feature}'
        - You can use a bonus action to magically manifest an echo of yourself in an unoccupied space you can see within 15 feet of you. This echo is a magical, translucent, gray image of you that lasts until it is destroyed, until you dismiss it as a bonus action, until you manifest another echo, or until you're {@condition incapacitated}.
        - Your echo has AC 14 + your proficiency bonus, 1 hit point, and immunity to all conditions. If it has to make a saving throw, it uses your saving throw bonus for the roll. It is the same size as you, and it occupies its space. On your turn, you can mentally command the echo to move up to 30 feet in any direction (no action required). If your echo is ever more than 30 feet from you at the end of your turn, it is destroyed.
        - 'You can use the echo in the following ways:'
        - items:
            - As a bonus action, you can teleport, magically swapping places with your echo at a cost of 15 feet of your movement, regardless of the distance between the two of you.
            - When you take the {@action Attack} action on your turn, any attack you make with that action can originate from your space or the echo's space. You make this choice for each attack.
            - When a creature that you can see within 5 feet of your echo moves at least 5 feet away from it, you can use your reaction to make an opportunity attack against that creature as if you were in the echo's space.
          type: list
    - class_name: Fighter
      class_source: PHB
      subclass_name: Echo Knight
      subclass_source: EGW
      feature: Unleash Incarnation
      source: EGW
      level: 3
      entries:
        - '{@i 3rd-level Echo Knight feature}'
        - You can heighten your echo's fury. Whenever you take the {@action Attack} action, you can make one additional melee attack from the echo's position.
        - You can use this feature a number of times equal to your Constitution modifier (a minimum of once). You regain all expended uses when you finish a long rest.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Echo Knight
      subclass_source: EGW
      feature: Echo Avatar
      source: EGW
      level: 7
      entries:
        - '{@i 7th-level Echo Knight feature}'
        - You can temporarily transfer your consciousness to your echo. As an action, you can see through your echo's eyes and hear through its ears. During this time, you are {@condition deafened} and {@condition blinded}. You can sustain this effect for up to 10 minutes, and you can end it at any time (requires no action). While your echo is being used in this way, it can be up to 1,000 feet away from you without being destroyed.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Echo Knight
      subclass_source: EGW
      feature: Shadow Martyr
      source: EGW
      level: 10
      entries:
        - '{@i 10th-level Echo Knight feature}'
        - You can make your echo throw itself in front of an attack directed at another creature that you can see. Before the attack roll is made, you can use your reaction to teleport the echo to an unoccupied space within 5 feet of the targeted creature. The attack roll that triggered the reaction is instead made against your echo.
        - Once you use this feature, you can't use it again until you finish a short or long rest.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Echo Knight
      subclass_source: EGW
      feature: Reclaim Potential
      source: EGW
      level: 15
      entries:
        - '{@i 15th-level Echo Knight feature}'
        - You've learned to absorb the fleeting magic of your echo. When an echo of yours is destroyed by taking damage, you can gain a number of temporary hit points equal to {@dice 2d6} + your Constitution modifier, provided you don't already have temporary hit points.
        - You can use this feature a number of times equal to your Constitution modifier (a minimum of once). You regain all expended uses when you finish a long rest.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Echo Knight
      subclass_source: EGW
      feature: Legion of One
      source: EGW
      level: 18
      entries:
        - '{@i 18th-level Echo Knight feature}'
        - You can use a bonus action to create two echoes with your Manifest Echo feature, and these echoes can coexist. If you try to create a third echo, the previous two echoes are destroyed. Anything you can do from one echo's position can be done from the other's instead.
        - In addition, when you roll initiative and have no uses of your Unleash Incarnation feature left, you regain one use of that feature.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Eldritch Knight
      subclass_source: PHB
      feature: Eldritch Knight
      source: PHB
      level: 3
      entries:
        - The archetypal Eldritch Knight combines the martial mastery common to all fighters with a careful study of magic. Eldritch Knights use magical techniques similar to those practiced by wizards. They focus their study on two of the eight schools of magic—abjuration and evocation. Abjuration spells grant an Eldritch Knight additional protection in battle, and evocation spells deal damage to many foes at once, extending the fighter's reach in combat. These knights learn a comparatively small number of spells, committing them to memory instead of keeping them in a spellbook.
        - subclassFeature: Spellcasting|Fighter||Eldritch Knight||3
          type: refSubclassFeature
        - subclassFeature: Weapon Bond|Fighter||Eldritch Knight||3
          type: refSubclassFeature
    - class_name: Fighter
      class_source: PHB
      subclass_name: Eldritch Knight
      subclass_source: PHB
      feature: Spellcasting
      source: PHB
      level: 3
      entries:
        - When you reach 3rd level, you augment your martial prowess with the ability to cast spells. See {@book chapter 10|PHB|10} for the general rules of spellcasting and {@book chapter 11|PHB|11} for the {@filter wizard spell list|spells|class=wizard}.
        - entries:
            - You learn two cantrips of your choice from the {@filter wizard spell list|spells|class=wizard}. You learn an additional wizard cantrip of your choice at 10th level.
          name: Cantrips
          type: entries
        - entries:
            - entries:
                - The Eldritch Knight Spellcasting table shows how many spell slots you have to cast your {@filter wizard spells|spells|class=wizard} of 1st level and higher. To cast one of these spells, you must expend a slot of the spell's level or higher. You regain all expended spell slots when you finish a long rest.
                - For example, if you know the 1st-level spell {@spell shield} and have a 1st-level and a 2nd-level spell slot available, you can cast {@spell shield} using either slot.
              name: Spell Slots
              type: entries
          type: entries
        - entries:
            - entries:
                - You know three 1st-level wizard spells of your choice, two of which you must choose from the abjuration and evocation spells on the wizard spell list.
                - The Spells Known column of the Eldritch Knight Spellcasting table shows when you learn more wizard spells of 1st level or higher. Each of these spells must be an abjuration or evocation spell of your choice, and must be of a level for which you have spell slots. For instance, when you reach 7th level in this class, you can learn one new spell of 1st or 2nd level.
                - The spells you learn at 8th, 14th, and 20th level can come from any school of magic.
                - Whenever you gain a level in this class, you can replace one of the wizard spells you know with another spell of your choice from the wizard spell list. The new spell must be of a level for which you have spell slots, and it must be an abjuration or evocation spell, unless you're replacing the spell you gained at 3rd, 8th, 14th, or 20th level from any school of magic.
              name: Spells Known of 1st-Level and Higher
              type: entries
          type: entries
        - entries:
            - entries:
                - Intelligence is your spellcasting ability for your wizard spells, since you learn your spells through study and memorization. You use your Intelligence whenever a spell refers to your spellcasting ability. In addition, you use your Intelligence modifier when setting the saving throw DC for a wizard spell you cast and when making an attack roll with one.
                - attributes:
                    - int
                  name: Spell
                  type: abilityDc
                - attributes:
                    - int
                  name: Spell
                  type: abilityAttackMod
              name: Spellcasting Ability
              type: entries
          type: entries
    - class_name: Fighter
      class_source: PHB
      subclass_name: Eldritch Knight
      subclass_source: PHB
      feature: Weapon Bond
      source: PHB
      level: 3
      entries:
        - At 3rd level, you learn a ritual that creates a magical bond between yourself and one weapon. You perform the ritual over the course of 1 hour, which can be done during a short rest. The weapon must be within your reach throughout the ritual, at the conclusion of which you touch the weapon and forge the bond.
        - Once you have bonded a weapon to yourself, you can't be disarmed of that weapon unless you are {@condition incapacitated}. If it is on the same plane of existence, you can summon that weapon as a bonus action on your turn, causing it to teleport instantly to your hand.
        - You can have up to two bonded weapons, but can summon only one at a time with your bonus action. If you attempt to bond with a third weapon, you must break the bond with one of the other two.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Eldritch Knight
      subclass_source: PHB
      feature: War Magic
      source: PHB
      level: 7
      entries:
        - Beginning at 7th level, when you use your action to cast a cantrip, you can make one weapon attack as a bonus action.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Eldritch Knight
      subclass_source: PHB
      feature: Eldritch Strike
      source: PHB
      level: 10
      entries:
        - At 10th level, you learn how to make your weapon strikes undercut a creature's resistance to your spells. When you hit a creature with a weapon attack, that creature has disadvantage on the next saving throw it makes against a spell you cast before the end of your next turn.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Eldritch Knight
      subclass_source: PHB
      feature: Arcane Charge
      source: PHB
      level: 15
      entries:
        - At 15th level, you gain the ability to teleport up to 30 feet to an unoccupied space you can see when you use your Action Surge. You can teleport before or after the additional action.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Eldritch Knight
      subclass_source: PHB
      feature: Improved War Magic
      source: PHB
      level: 18
      entries:
        - Starting at 18th level, when you use your action to cast a spell, you can make one weapon attack as a bonus action.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Psi Warrior
      subclass_source: TCE
      feature: Protective Field
      source: TCE
      level: 3
      entries:
        - When you or another creature you can see within 30 feet of you takes damage, you can use your reaction to expend one Psionic Energy die, roll the die, and reduce the damage taken by the number rolled plus your Intelligence modifier (minimum reduction of 1), as you create a momentary shield of telekinetic force.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Psi Warrior
      subclass_source: TCE
      feature: Psi Warrior
      source: TCE
      level: 3
      entries:
        - Awake to the psionic power within, a Psi Warrior is a fighter who augments their physical might with psi-infused weapon strikes, telekinetic lashes, and barriers of mental force. Many githyanki train to become such warriors, as do some of the most disciplined high elves. In the world of Eberron, many young kalashtar dream of becoming Psi Warriors.
        - As a Psi Warrior, you might have honed your psionic abilities through solo discipline, unlocked it under the tutelage of a master, or refined it at an academy dedicated to wielding the mind's power as both weapon and shield.
        - subclassFeature: Psionic Power|Fighter||Psi Warrior|TCE|3
          type: refSubclassFeature
    - class_name: Fighter
      class_source: PHB
      subclass_name: Psi Warrior
      subclass_source: TCE
      feature: Psionic Power
      source: TCE
      level: 3
      entries:
        - '{@i 3rd-level Psi Warrior feature}'
        - You harbor a wellspring of psionic energy within yourself. This energy is represented by your Psionic Energy dice, which are each a {@dice d6}. You have a number of these dice equal to twice your proficiency bonus, and they fuel various psionic powers you have, which are detailed below.
        - Some of your powers expend the Psionic Energy die they use, as specified in a power's description, and you can't use a power if it requires you to use a die when your dice are all expended. You regain all your expended Psionic Energy dice when you finish a long rest. In addition, as a bonus action, you can regain one expended Psionic Energy die, but you can't do so again until you finish a short or long rest.
        - 'When you reach certain levels in this class, the size of your Psionic Energy dice increases: at 5th level ({@dice d8}), 11th level ({@dice d10}), and 17th level ({@dice d12}).'
        - The powers below use your Psionic Energy dice.
        - entries:
            - subclassFeature: Protective Field|Fighter|PHB|Psi Warrior|TCE|3
              type: refSubclassFeature
            - subclassFeature: Psionic Strike|Fighter|PHB|Psi Warrior|TCE|3
              type: refSubclassFeature
            - subclassFeature: Telekinetic Movement|Fighter|PHB|Psi Warrior|TCE|3
              type: refSubclassFeature
          style: list-hang-notitle
          type: options
    - class_name: Fighter
      class_source: PHB
      subclass_name: Psi Warrior
      subclass_source: TCE
      feature: Psionic Strike
      source: TCE
      level: 3
      entries:
        - You can propel your weapons with psionic force. Once on each of your turns, immediately after you hit a target within 30 feet of you with an attack and deal damage to it with a weapon, you can expend one Psionic Energy die, rolling it and dealing force damage to the target equal to the number rolled plus your Intelligence modifier.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Psi Warrior
      subclass_source: TCE
      feature: Telekinetic Movement
      source: TCE
      level: 3
      entries:
        - You can move an object or a creature with your mind. As an action, you target one loose object that is Large or smaller or one willing creature, other than yourself. If you can see the target and it is within 30 feet of you, you can move it up to 30 feet to an unoccupied space you can see. Alternatively, if it is a Tiny object, you can move it to or from your hand. Either way, you can move the target horizontally, vertically, or both. Once you take this action, you can't do so again until you finish a short or long rest, unless you expend a Psionic Energy die to take it again.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Psi Warrior
      subclass_source: TCE
      feature: Psi-Powered Leap
      source: TCE
      level: 7
      entries:
        - As a bonus action, you can propel your body with your mind. You gain a flying speed equal to twice your walking speed until the end of the current turn. Once you take this bonus action, you can't do so again until you finish a short or long rest, unless you expend a Psionic Energy die to take it again.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Psi Warrior
      subclass_source: TCE
      feature: Telekinetic Adept
      source: TCE
      level: 7
      entries:
        - '{@i 7th-level Psi Warrior feature}'
        - You have mastered new ways to use your telekinetic abilities, detailed below.
        - entries:
            - subclassFeature: Psi-Powered Leap|Fighter|PHB|Psi Warrior|TCE|7
              type: refSubclassFeature
            - subclassFeature: Telekinetic Thrust|Fighter|PHB|Psi Warrior|TCE|7
              type: refSubclassFeature
          style: list-hang-notitle
          type: options
    - class_name: Fighter
      class_source: PHB
      subclass_name: Psi Warrior
      subclass_source: TCE
      feature: Telekinetic Thrust
      source: TCE
      level: 7
      entries:
        - When you deal damage to a target with your Psionic Strike, you can force the target to make a Strength saving throw against a DC equal to 8 + your proficiency bonus + your Intelligence modifier. If the save fails, you can knock the target {@condition prone} or move it up to 10 feet in any direction horizontally.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Psi Warrior
      subclass_source: TCE
      feature: Guarded Mind
      source: TCE
      level: 10
      entries:
        - '{@i 10th-level Psi Warrior feature}'
        - The psionic energy flowing through you has bolstered your mind. You have resistance to psychic damage. Moreover, if you start your turn {@condition charmed} or {@condition frightened}, you can expend a Psionic Energy die and end every effect on yourself subjecting you to those conditions.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Psi Warrior
      subclass_source: TCE
      feature: Bulwark of Force
      source: TCE
      level: 15
      entries:
        - '{@i 15th-level Psi Warrior feature}'
        - You can shield yourself and others with telekinetic force. As a bonus action, you can choose creatures, which can include you, that you can see within 30 feet of you, up to a number of creatures equal to your Intelligence modifier (minimum of one creature). Each of the chosen creatures is protected by {@quickref Cover||3||half cover} for 1 minute or until you're {@condition incapacitated}.
        - Once you take this bonus action, you can't do so again until you finish a long rest, unless you expend a Psionic Energy die to take it again.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Psi Warrior
      subclass_source: TCE
      feature: Telekinetic Master
      source: TCE
      level: 18
      entries:
        - '{@i 18th-level Psi Warrior feature}'
        - Your ability to move creatures and objects with your mind is matched by few. You can cast the {@spell telekinesis} spell, requiring no components, and your spellcasting ability for the spell is Intelligence. On each of your turns while you concentrate on the spell, including the turn when you cast it, you can make one attack with a weapon as a bonus action.
        - Once you cast the spell with this feature, you can't do so again until you finish a long rest, unless you expend a Psionic Energy die to cast it again.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Purple Dragon Knight (Banneret)
      subclass_source: SCAG
      feature: Purple Dragon Knight (Banneret)
      source: SCAG
      level: 3
      entries:
        - Purple Dragon Knights are warriors who hail from the kingdom of Cormyr. Pledged to protect the crown, they take the fight against evil beyond the kingdom's borders. They are tasked with wandering the land as knights errant, relying on their judgment, bravery, and fidelity to guide them in defeating evildoers.
        - A Purple Dragon Knight inspires greatness in others by committing brave deeds in battle. The mere presence of a knight in a hamlet is enough to cause some orcs and bandits to seek easier prey. A lone knight is a skilled warrior, but a knight leading a band of allies can transform even the most poorly equipped militia into a ferocious war band.
        - A knight prefers to lead through deeds, not words. As a knight spearheads an attack, the knight's actions can awaken reserves of courage and conviction in allies that they never suspected they had.
        - subclassFeature: 'Restriction: Knighthood|Fighter||Purple Dragon Knight (Banneret)|SCAG|3'
          type: refSubclassFeature
        - subclassFeature: Rallying Cry|Fighter||Purple Dragon Knight (Banneret)|SCAG|3
          type: refSubclassFeature
    - class_name: Fighter
      class_source: PHB
      subclass_name: Purple Dragon Knight (Banneret)
      subclass_source: SCAG
      feature: Rallying Cry
      source: SCAG
      level: 3
      entries:
        - When you choose this archetype at 3rd level, you learn how to inspire your allies to fight on past their injuries.
        - When you use your Second Wind feature, you can choose up to three creatures within 60 feet of you that are allied with you. Each one regains hit points equal to your fighter level, provided that the creature can see or hear you.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Purple Dragon Knight (Banneret)
      subclass_source: SCAG
      feature: 'Restriction: Knighthood'
      source: SCAG
      level: 3
      entries:
        - Purple Dragon Knights are tied to a specific order of Cormyrean knighthood.
        - Banneret serves as the generic name for this archetype if you use it in other campaign settings or to model warlords other than the Purple Dragon Knights.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Purple Dragon Knight (Banneret)
      subclass_source: SCAG
      feature: Royal Envoy
      source: SCAG
      level: 7
      entries:
        - A Purple Dragon Knight serves as an envoy of the Cormyrean crown. Knights of high standing are expected to conduct themselves with grace.
        - 'At 7th level, you gain proficiency in the {@skill Persuasion} skill. If you are already proficient in it, you gain proficiency in one of the following skills of your choice: {@skill Animal Handling}, {@skill Insight}, {@skill Intimidation}, or {@skill Performance}.'
        - Your proficiency bonus is doubled for any ability check you make that uses {@skill Persuasion}. You receive this benefit regardless of the skill proficiency you gain from this feature.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Purple Dragon Knight (Banneret)
      subclass_source: SCAG
      feature: Inspiring Surge
      source: SCAG
      level: 10
      entries:
        - Starting at 10th level, when you use your Action Surge feature, you can choose one creature within 60 feet of you that is allied with you. That creature can make one melee or ranged weapon attack with its reaction, provided that it can see or hear you.
        - Starting at 18th level, you can choose two allies within 60 feet of you, rather than one.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Purple Dragon Knight (Banneret)
      subclass_source: SCAG
      feature: Bulwark
      source: SCAG
      level: 15
      entries:
        - Beginning at 15th level, you can extend the benefit of your Indomitable feature to an ally. When you decide to use Indomitable to reroll an Intelligence, a Wisdom, or a Charisma saving throw and you aren't {@condition incapacitated}, you can choose one ally within 60 feet of you that also failed its saving throw against the same effect. If that creature can see or hear you, it can reroll its saving throw and must use the new roll.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Purple Dragon Knight (Banneret)
      subclass_source: SCAG
      feature: Inspiring Surge
      source: SCAG
      level: 18
      entries:
        - Starting at 18th level, you can choose two allies within 60 feet of you, rather than one.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Rune Knight
      subclass_source: TCE
      feature: Bonus Proficiencies
      source: TCE
      level: 3
      entries:
        - '{@i 3rd-level Rune Knight feature}'
        - You gain proficiency with {@item smith's tools|PHB}, and you learn to speak, read, and write {@language Giant}.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Rune Knight
      subclass_source: TCE
      feature: Giant's Might
      source: TCE
      level: 3
      entries:
        - '{@i 3rd-level Rune Knight feature}'
        - 'You have learned how to imbue yourself with the might of giants. As a bonus action, you magically gain the following benefits, which last for 1 minute:'
        - items:
            - If you are smaller than Large, you become Large, along with anything you are wearing. If you lack the room to become Large, your size doesn't change.
            - You have advantage on Strength checks and Strength saving throws.
            - Once on each of your turns, one of your attacks with a weapon or an unarmed strike can deal an extra {@damage 1d6} damage to a target on a hit.
          type: list
        - You can use this feature a number of times equal to your proficiency bonus, and you regain all expended uses of it when you finish a long rest.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Rune Knight
      subclass_source: TCE
      feature: Rune Carver
      source: TCE
      level: 3
      entries:
        - '{@i 3rd-level Rune Knight feature}'
        - You can use magic runes to enhance your gear. You learn two runes of your choice, from among the runes described below, and each time you gain a level in this class, you can replace one rune you know with a different one from this feature. When you reach certain levels in this class, you learn additional runes, as shown in the Runes Known table.
        - Whenever you finish a long rest, you can touch a number of objects equal to the number of runes you know, and you inscribe a different rune onto each of the objects. To be eligible, an object must be a weapon, a suit of armor, a shield, a piece of jewelry, or something else you can wear or hold in a hand. Your rune remains on an object until you finish a long rest, and an object can bear only one of your runes at a time.
        - caption: Runes Known
          colLabels:
            - Fighter Level
            - Number of Runes
          colStyles:
            - col-6 text-center
            - col-6 text-center
          rows:
            - - 3rd
              - "2"
            - - 7th
              - "3"
            - - 10th
              - "4"
            - - 15th
              - "5"
          type: table
        - The following runes are available to you when you learn a rune. If a rune has a level requirement, you must be at least that level in this class to learn the rune. If a rune requires a saving throw, your Rune Magic save DC equals 8 + your proficiency bonus + your Constitution modifier.
        - count: 2
          entries:
            - optionalfeature: Cloud Rune|TCE
              type: refOptionalfeature
            - optionalfeature: Fire Rune|TCE
              type: refOptionalfeature
            - optionalfeature: Frost Rune|TCE
              type: refOptionalfeature
            - optionalfeature: Stone Rune|TCE
              type: refOptionalfeature
            - name: Hill Rune (7th Level or Higher)
              optionalfeature: Hill Rune|TCE
              type: refOptionalfeature
            - name: Storm Rune (7th Level or Higher)
              optionalfeature: Storm Rune|TCE
              type: refOptionalfeature
          type: options
    - class_name: Fighter
      class_source: PHB
      subclass_name: Rune Knight
      subclass_source: TCE
      feature: Rune Knight
      source: TCE
      level: 3
      entries:
        - Rune Knights enhance their martial prowess using the supernatural power of runes, an ancient practice that originated with giants. Rune cutters can be found among any family of giants, and you likely learned your methods first or second hand from such a mystical artisan. Whether you found the giant's work carved into a hill or cave, learned of the runes from a sage, or met the giant in person, you studied the giant's craft and learned how to apply magic runes to empower your equipment.
        - subclassFeature: Bonus Proficiencies|Fighter||Rune Knight|TCE|3
          type: refSubclassFeature
        - subclassFeature: Rune Carver|Fighter||Rune Knight|TCE|3
          type: refSubclassFeature
        - subclassFeature: Giant's Might|Fighter||Rune Knight|TCE|3
          type: refSubclassFeature
    - class_name: Fighter
      class_source: PHB
      subclass_name: Rune Knight
      subclass_source: TCE
      feature: Additional Rune Known
      source: TCE
      level: 7
      entries:
        - '{@i 7th-level Rune Knight feature}'
        - You learn an additional Rune.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Rune Knight
      subclass_source: TCE
      feature: Runic Shield
      source: TCE
      level: 7
      entries:
        - '{@i 7th-level Rune Knight feature}'
        - You learn to invoke your rune magic to protect your allies. When another creature you can see within 60 feet of you is hit by an attack roll, you can use your reaction to force the attacker to reroll the {@dice d20} and use the new roll.
        - You can use this feature a number of times equal to your proficiency bonus, and you regain all expended uses when you finish a long rest.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Rune Knight
      subclass_source: TCE
      feature: Additional Rune Known
      source: TCE
      level: 10
      entries:
        - '{@i 10th-level Rune Knight feature}'
        - You learn an additional Rune.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Rune Knight
      subclass_source: TCE
      feature: Great Stature
      source: TCE
      level: 10
      entries:
        - '{@i 10th-level Rune Knight feature}'
        - The magic of your runes permanently alters you. When you gain this feature, roll {@dice 3d4}. You grow a number of inches in height equal to the roll.
        - Moreover, the extra damage you deal with your Giant's Might feature increases to {@dice 1d8}.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Rune Knight
      subclass_source: TCE
      feature: Additional Rune Known
      source: TCE
      level: 15
      entries:
        - '{@i 15th-level Rune Knight feature}'
        - You learn an additional Rune.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Rune Knight
      subclass_source: TCE
      feature: Master of Runes
      source: TCE
      level: 15
      entries:
        - '{@i 15th-level Rune Knight feature}'
        - You can invoke each rune you know from your Rune Carver feature twice, rather than once, and you regain all expended uses when you finish a short or long rest.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Rune Knight
      subclass_source: TCE
      feature: Runic Juggernaut
      source: TCE
      level: 18
      entries:
        - '{@i 18th-level Rune Knight feature}'
        - You learn how to amplify your rune-powered transformation. As a result, the extra damage you deal with the Giant's Might feature increases to {@dice 1d10}. Moreover, when you use that feature, your size can increase to Huge, and while you are that size, your reach increases by 5 feet.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Samurai
      subclass_source: XGE
      feature: Bonus Proficiency
      source: XGE
      level: 3
      entries:
        - 'When you choose this archetype at 3rd level, you gain proficiency in one of the following skills of your choice: {@skill History}, {@skill Insight}, {@skill Performance}, or {@skill Persuasion}. Alternatively, you learn one language of your choice.'
    - class_name: Fighter
      class_source: PHB
      subclass_name: Samurai
      subclass_source: XGE
      feature: Fighting Spirit
      source: XGE
      level: 3
      entries:
        - Starting at 3rd level, your intensity in battle can shield you and help you strike true. As a bonus action on your turn, you can give yourself advantage on weapon attack rolls until the end of the current turn. When you do so, you also gain 5 temporary hit points. The number of temporary hit points increases when you reach certain levels in this class, increasing to 10 at 10th level and 15 at 15th level.
        - You can use this feature three times, and you regain all expended uses of it when you finish a long rest.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Samurai
      subclass_source: XGE
      feature: Samurai
      source: XGE
      level: 3
      entries:
        - 'The Samurai is a fighter who draws on an implacable fighting spirit to overcome enemies. A Samurai''s resolve is nearly unbreakable, and the enemies in a Samurai''s path have two choices: yield or die fighting.'
        - subclassFeature: Bonus Proficiency|Fighter||Samurai|XGE|3
          type: refSubclassFeature
        - subclassFeature: Fighting Spirit|Fighter||Samurai|XGE|3
          type: refSubclassFeature
    - class_name: Fighter
      class_source: PHB
      subclass_name: Samurai
      subclass_source: XGE
      feature: Elegant Courtier
      source: XGE
      level: 7
      entries:
        - Starting at 7th level, your discipline and attention to detail allow you to excel in social situations. Whenever you make a Charisma ({@skill Persuasion}) check, you gain a bonus to the check equal to your Wisdom modifier.
        - Your self-control also causes you to gain proficiency in Wisdom saving throws. If you already have this proficiency, you instead gain proficiency in Intelligence or Charisma saving throws (your choice).
    - class_name: Fighter
      class_source: PHB
      subclass_name: Samurai
      subclass_source: XGE
      feature: Tireless Spirit
      source: XGE
      level: 10
      entries:
        - Starting at 10th level, when you roll initiative and have no uses of Fighting Spirit remaining, you regain one use.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Samurai
      subclass_source: XGE
      feature: Rapid Strike
      source: XGE
      level: 15
      entries:
        - Starting at 15th level, you learn to trade accuracy for swift strikes. If you take the {@action Attack} action on your turn and have advantage on an attack roll against one of the targets, you can forgo the advantage for that roll to make an additional weapon attack against that target, as part of the same action. You can do so no more than once per turn.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Samurai
      subclass_source: XGE
      feature: Strength before Death
      source: XGE
      level: 18
      entries:
        - Starting at 18th level, your fighting spirit can delay the grasp of death. If you take damage that reduces you to 0 hit points and doesn't kill you outright, you can use your reaction to delay falling {@condition unconscious}, and you can immediately take an extra turn, interrupting the current turn. While you have 0 hit points during that extra turn, taking damage causes death saving throw failures as normal, and three death saving throw failures can still kill you. When the extra turn ends, you fall {@condition unconscious} if you still have 0 hit points.
        - Once you use this feature, you can't use it again until you finish a long rest.
    - class_name: Fighter
      class_source: XPHB
      subclass_name: Banneret
      subclass_source: FRHoF
      feature: Banneret
      source: FRHoF
      level: 3
      entries:
        - '{@i Rally Fellow Heroes with Inspiring Leadership}'
        - Bannerets are paragons of valor and leadership who protect the innocent and rally fellow adventurers to the causes of justice and freedom. Many are knights serving in Cormyr, the Silver Marches, Damara, Chessenta, or other lands across Faerûn. They wander the realms as knights errant, taking the fight against evil beyond their kingdom's borders.
        - A Banneret relies on judgment, bravery, and fidelity to the code of chivalry to guide them in defeating evildoers. A lone Banneret is a skilled warrior, but when leading a band of allies one of these warriors can transform even a poorly equipped militia into a ferocious war band.
        - subclassFeature: Knightly Envoy|Fighter|XPHB|Banneret|FRHoF|3|FRHoF
          type: refSubclassFeature
        - subclassFeature: Group Recovery|Fighter|XPHB|Banneret|FRHoF|3|FRHoF
          type: refSubclassFeature
    - class_name: Fighter
      class_source: XPHB
      subclass_name: Banneret
      subclass_source: FRHoF
      feature: Group Recovery
      source: FRHoF
      level: 3
      entries:
        - When you use your Second Wind to regain {@variantrule Hit Points|XPHB}, you can choose a number of allies within a 30-foot {@variantrule Emanation [Area of Effect]|XPHB|Emanation} originating from yourself, up to a number of allies equal to your Charisma modifier (minimum of one). Each of those allies regains {@variantrule Hit Points|XPHB} equal to {@dice 1d4} plus your Fighter level. Once you use this ability, you can't use it again until you finish a {@variantrule Short Rest|XPHB|Short} or {@variantrule Long Rest|XPHB}.
    - class_name: Fighter
      class_source: XPHB
      subclass_name: Banneret
      subclass_source: FRHoF
      feature: Knightly Envoy
      source: FRHoF
      level: 3
      entries:
        - You know how to conduct yourself with grace as a noble ambassador. You gain the following benefits.
        - entries:
            - You can cast the {@spell Comprehend Languages|XPHB} spell but only as a {@variantrule Ritual|XPHB}. Charisma is your spellcasting ability for it.
          name: Comprehension
          type: entries
        - entries:
            - You learn one language from the language tables in the Player's Handbook or chapter 2 of this book. When you finish a {@variantrule Long Rest|XPHB}, you can replace a language learned from this benefit with another language you have heard, seen signed, or read in the past 24 hours.
          name: Polyglot
          type: entries
        - entries:
            - 'You gain proficiency in one of the following skills of your choice: {@skill Insight|XPHB}, {@skill Intimidation|XPHB}, {@skill Persuasion|XPHB}, or {@skill Performance|XPHB}.'
          name: Well Spoken
          type: entries
    - class_name: Fighter
      class_source: XPHB
      subclass_name: Banneret
      subclass_source: FRHoF
      feature: Team Tactics
      source: FRHoF
      level: 7
      entries:
        - When you use Group Recovery, each chosen ally has {@variantrule Advantage|XPHB} on {@variantrule D20 Test|XPHB|D20 Tests} until the start of your next turn.
    - class_name: Fighter
      class_source: XPHB
      subclass_name: Banneret
      subclass_source: FRHoF
      feature: Rallying Surge
      source: FRHoF
      level: 10
      entries:
        - When you use your Action Surge, you can choose allies within a 30-foot {@variantrule Emanation [Area of Effect]|XPHB|Emanation} originating from yourself, up to a number of allies equal to your Charisma modifier (minimum of one). Each of those allies can immediately take a {@variantrule Reaction|XPHB} to use one of the following options.
        - entries:
            - The ally makes one attack with a weapon or an {@variantrule Unarmed Strike|XPHB}.
          name: Attack
          type: entries
        - entries:
            - The ally moves up to half its {@variantrule Speed|XPHB} without provoking an {@action Opportunity Attack|XPHB}.
          name: Move
          type: entries
    - class_name: Fighter
      class_source: XPHB
      subclass_name: Banneret
      subclass_source: FRHoF
      feature: Shared Resilience
      source: FRHoF
      level: 15
      entries:
        - When an ally you can see within 60 feet of yourself fails a saving throw, you can take a {@variantrule Reaction|XPHB} to expend a use of your Indomitable feature. The ally can immediately reroll the saving throw with a bonus equal to your Fighter level; the ally must use the new roll.
    - class_name: Fighter
      class_source: XPHB
      subclass_name: Banneret
      subclass_source: FRHoF
      feature: Inspiring Commander
      source: FRHoF
      level: 18
      entries:
        - You gain the following benefits.
        - entries:
            - The area of effect for both Group Recovery and Rallying Surge is now a 60-foot {@variantrule Emanation [Area of Effect]|XPHB|Emanation}.
          name: Bolstered Rally
          type: entries
        - entries:
            - You have {@variantrule Immunity|XPHB} to the {@condition Charmed|XPHB} and {@condition Frightened|XPHB} conditions.
          name: Unshakable Bravery
          type: entries
    - class_name: Fighter
      class_source: XPHB
      subclass_name: Battle Master
      subclass_source: XPHB
      feature: Battle Master
      source: XPHB
      level: 3
      entries:
        - '{@i Master Sophisticated Battle Maneuvers}'
        - Battle Masters are students of the art of battle, learning martial techniques passed down through generations. The most accomplished Battle Masters are well-rounded figures who combine their carefully honed combat skills with academic study in the fields of history, theory, and the arts.
        - subclassFeature: Combat Superiority|Fighter|XPHB|Battle Master|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Student of War|Fighter|XPHB|Battle Master|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Maneuver Options|Fighter|XPHB|Battle Master|XPHB|3
          type: refSubclassFeature
    - class_name: Fighter
      class_source: XPHB
      subclass_name: Battle Master
      subclass_source: XPHB
      feature: Combat Superiority
      source: XPHB
      level: 3
      entries:
        - Your experience on the battlefield has refined your fighting techniques. You learn maneuvers that are fueled by special dice called Superiority Dice.
        - entries:
            - You learn three maneuvers of your choice from the "{@filter Maneuvers Options|optionalfeatures|feature type=MV:B|source=XPHB}" section later in this subclass's description. Many maneuvers enhance an attack in some way. You can use only one maneuver per attack.
            - You learn two additional maneuvers of your choice when you reach Fighter levels 7, 10, and 15. Each time you learn new maneuvers, you can also replace one maneuver you know with a different one.
          name: Maneuvers
          type: entries
        - entries:
            - You have four Superiority Dice, which are {@dice d8|d8s}. A Superiority Die is expended when you use it. You regain all expended Superiority Dice when you finish a {@variantrule Short Rest|XPHB|Short} or {@variantrule Long Rest|XPHB}.
            - You gain an additional Superiority Die when you reach Fighter levels 7 (five dice total) and 15 (six dice total).
          name: Superiority Dice
          type: entries
        - entries:
            - If a maneuver requires a saving throw, the DC equals 8 plus your Strength or Dexterity modifier (your choice) and {@variantrule Proficiency|XPHB|Proficiency Bonus}.
          name: Saving Throws
          type: entries
    - class_name: Fighter
      class_source: XPHB
      subclass_name: Battle Master
      subclass_source: XPHB
      feature: Maneuver Options
      source: XPHB
      level: 3
      entries:
        - The maneuvers are presented here in alphabetical order.
        - count: 3
          entries:
            - optionalfeature: Ambush|XPHB
              type: refOptionalfeature
            - optionalfeature: Bait and Switch|XPHB
              type: refOptionalfeature
            - optionalfeature: Commander's Strike|XPHB
              type: refOptionalfeature
            - optionalfeature: Commanding Presence|XPHB
              type: refOptionalfeature
            - optionalfeature: Disarming Attack|XPHB
              type: refOptionalfeature
            - optionalfeature: Distracting Strike|XPHB
              type: refOptionalfeature
            - optionalfeature: Evasive Footwork|XPHB
              type: refOptionalfeature
            - optionalfeature: Feinting Attack|XPHB
              type: refOptionalfeature
            - optionalfeature: Goading Attack|XPHB
              type: refOptionalfeature
            - optionalfeature: Lunging Attack|XPHB
              type: refOptionalfeature
            - optionalfeature: Maneuvering Attack|XPHB
              type: refOptionalfeature
            - optionalfeature: Menacing Attack|XPHB
              type: refOptionalfeature
            - optionalfeature: Parry|XPHB
              type: refOptionalfeature
            - optionalfeature: Precision Attack|XPHB
              type: refOptionalfeature
            - optionalfeature: Pushing Attack|XPHB
              type: refOptionalfeature
            - optionalfeature: Rally|XPHB
              type: refOptionalfeature
            - optionalfeature: Riposte|XPHB
              type: refOptionalfeature
            - optionalfeature: Sweeping Attack|XPHB
              type: refOptionalfeature
            - optionalfeature: Tactical Assessment|XPHB
              type: refOptionalfeature
            - optionalfeature: Trip Attack|XPHB
              type: refOptionalfeature
          type: options
    - class_name: Fighter
      class_source: XPHB
      subclass_name: Battle Master
      subclass_source: XPHB
      feature: Student of War
      source: XPHB
      level: 3
      entries:
        - You gain proficiency with one type of {@item Artisan's Tools|XPHB} of your choice, and you gain proficiency in one skill of your choice from the skills available to Fighters at level 1.
    - class_name: Fighter
      class_source: XPHB
      subclass_name: Battle Master
      subclass_source: XPHB
      feature: Know Your Enemy
      source: XPHB
      level: 7
      entries:
        - As a {@variantrule Bonus Action|XPHB}, you can discern certain strengths and weaknesses of a creature you can see within 30 feet of yourself; you know whether that creature has any Immunities, Resistances, or Vulnerabilities, and if the creature has any, you know what they are.
        - Once you use this feature, you can't do so again until you finish a {@variantrule Long Rest|XPHB}. You can also restore a use of the feature by expending one Superiority Die (no action required).
    - class_name: Fighter
      class_source: XPHB
      subclass_name: Battle Master
      subclass_source: XPHB
      feature: Improved Combat Superiority
      source: XPHB
      level: 10
      entries:
        - Your Superiority Die becomes a {@dice d10}.
    - class_name: Fighter
      class_source: XPHB
      subclass_name: Battle Master
      subclass_source: XPHB
      feature: Relentless
      source: XPHB
      level: 15
      entries:
        - Once per turn, when you use a maneuver, you can roll {@dice 1d8} and use the number rolled instead of expending a Superiority Die.
    - class_name: Fighter
      class_source: XPHB
      subclass_name: Battle Master
      subclass_source: XPHB
      feature: Ultimate Combat Superiority
      source: XPHB
      level: 18
      entries:
        - Your Superiority Die becomes a {@dice d12}.
    - class_name: Fighter
      class_source: XPHB
      subclass_name: Champion
      subclass_source: XPHB
      feature: Champion
      source: XPHB
      level: 3
      entries:
        - '{@i Pursue Physical Excellence in Combat}'
        - A Champion focuses on the development of martial prowess in a relentless pursuit of victory. Champions combine rigorous training with physical excellence to deal devastating blows, withstand peril, and garner glory. Whether in athletic contests or bloody battle, Champions strive for the crown of the victor.
        - subclassFeature: Improved Critical|Fighter|XPHB|Champion|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Remarkable Athlete|Fighter|XPHB|Champion|XPHB|3
          type: refSubclassFeature
    - class_name: Fighter
      class_source: XPHB
      subclass_name: Champion
      subclass_source: XPHB
      feature: Improved Critical
      source: XPHB
      level: 3
      entries:
        - Your attack rolls with weapons and Unarmed Strikes can score a {@variantrule Critical Hit|XPHB} on a roll of 19 or 20 on the {@dice d20}.
    - class_name: Fighter
      class_source: XPHB
      subclass_name: Champion
      subclass_source: XPHB
      feature: Remarkable Athlete
      source: XPHB
      level: 3
      entries:
        - Thanks to your athleticism, you have {@variantrule Advantage|XPHB} on {@variantrule Initiative|XPHB} rolls and Strength ({@skill Athletics|XPHB}) checks.
        - In addition, immediately after you score a {@variantrule Critical Hit|XPHB}, you can move up to half your {@variantrule Speed|XPHB} without provoking {@action Opportunity Attack|XPHB|Opportunity Attacks}.
    - class_name: Fighter
      class_source: XPHB
      subclass_name: Champion
      subclass_source: XPHB
      feature: Additional Fighting Style
      source: XPHB
      level: 7
      entries:
        - You gain another {@filter Fighting Style feat|feats|category=FS} of your choice.
    - class_name: Fighter
      class_source: XPHB
      subclass_name: Champion
      subclass_source: XPHB
      feature: Heroic Warrior
      source: XPHB
      level: 10
      entries:
        - The thrill of battle drives you toward victory. During combat, you can give yourself {@variantrule Heroic Inspiration|XPHB} whenever you start your turn without it.
    - class_name: Fighter
      class_source: XPHB
      subclass_name: Champion
      subclass_source: XPHB
      feature: Superior Critical
      source: XPHB
      level: 15
      entries:
        - Your attack rolls with weapons and Unarmed Strikes can now score a {@variantrule Critical Hit|XPHB} on a roll of 18–20 on the {@dice d20}.
    - class_name: Fighter
      class_source: XPHB
      subclass_name: Champion
      subclass_source: XPHB
      feature: Survivor
      source: XPHB
      level: 18
      entries:
        - You attain the pinnacle of resilience in battle, giving you these benefits.
        - entries:
            - You have {@variantrule Advantage|XPHB} on {@variantrule Death Saving Throw|XPHB|Death Saving Throws}. Moreover, when you roll 18–20 on a {@variantrule Death Saving Throw|XPHB}, you gain the benefit of rolling a 20 on it.
          name: Defy Death
          type: entries
        - entries:
            - At the start of each of your turns, you regain {@variantrule Hit Points|XPHB} equal to 5 plus your Constitution modifier if you are {@status Bloodied|XPHB} and have at least 1 {@variantrule Hit Points|XPHB|Hit Point}.
          name: Heroic Rally
          type: entries
    - class_name: Fighter
      class_source: XPHB
      subclass_name: Eldritch Knight
      subclass_source: XPHB
      feature: Eldritch Knight
      source: XPHB
      level: 3
      entries:
        - '{@i Support Combat Skills with Arcane Magic}'
        - Eldritch Knights combine the martial mastery common to all Fighters with a careful study of magic. Their spells both complement and extend their combat skills, providing additional protection to shore up their armor and also allowing them to engage many foes at once with explosive magic.
        - subclassFeature: Spellcasting|Fighter|XPHB|Eldritch Knight|XPHB|3
          type: refSubclassFeature
        - subclassFeature: War Bond|Fighter|XPHB|Eldritch Knight|XPHB|3
          type: refSubclassFeature
    - class_name: Fighter
      class_source: XPHB
      subclass_name: Eldritch Knight
      subclass_source: XPHB
      feature: Spellcasting
      source: XPHB
      level: 3
      entries:
        - You have learned to cast spells. See {@book chapter 7|XPHB|7} for the rules on spellcasting. The information below details how you use those rules as an Eldritch Knight.
        - entries:
            - You know two cantrips of your choice from the {@filter Wizard spell list|spells|class=Wizard} (see that class's section for its list). {@spell Ray of Frost|XPHB} and {@spell Shocking Grasp|XPHB} are recommended. Whenever you gain a Fighter level, you can replace one of these cantrips with another cantrip of your choice from the {@filter Wizard spell list|spells|class=Wizard}.
            - When you reach Fighter level 10, you learn another Wizard cantrip of your choice.
          name: Cantrips
          type: entries
        - entries:
            - entries:
                - The Eldritch Knight Spellcasting table shows how many spell slots you have to cast your level 1+ spells. You regain all expended slots when you finish a {@variantrule Long Rest|XPHB}.
              name: Spell Slots
              type: entries
          type: entries
        - entries:
            - entries:
                - You prepare the list of level 1+ spells that are available for you to cast with this feature. To start, choose three level 1 spells from the {@filter Wizard spell list|spells|class=Wizard}. {@spell Burning Hands|XPHB}, {@spell Jump|XPHB}, and {@spell Shield|XPHB} are recommended.
                - The number of spells on your list increases as you gain Fighter levels, as shown in the Prepared Spells column of the Eldritch Knight Spellcasting table. Whenever that number increases, choose additional spells from the {@filter Wizard spell list|spells|class=Wizard} until the number of spells on your list matches the number on the table. The chosen spells must be of a level for which you have spell slots. For example, if you're a level 7 Fighter, your list of prepared spells can include five Wizard spells of levels 1 and 2 in any combination.
              name: Prepared Spells of Level 1+
              type: entries
          type: entries
        - entries:
            - entries:
                - Whenever you gain a Fighter level, you can replace one spell on your list with another Wizard spell for which you have spell slots.
              name: Changing your Prepared Spells
              type: entries
          type: entries
        - entries:
            - entries:
                - Intelligence is your spellcasting ability for your Wizard spells.
              name: Spellcasting Ability
              type: entries
          type: entries
        - entries:
            - entries:
                - You can use an {@item Arcane Focus|XPHB} as a {@variantrule Spellcasting Focus|XPHB} for your Wizard spells.
              name: Spellcasting Focus
              type: entries
          type: entries
    - class_name: Fighter
      class_source: XPHB
      subclass_name: Eldritch Knight
      subclass_source: XPHB
      feature: War Bond
      source: XPHB
      level: 3
      entries:
        - You learn a ritual that creates a magical bond between yourself and one weapon. You perform the ritual over the course of 1 hour, which can be done during a {@variantrule Short Rest|XPHB}. The weapon must be within your reach throughout the ritual, at the conclusion of which you touch the weapon and forge the bond. The bond fails if another Fighter is bonded to the weapon or if the weapon is a magic item to which someone else is attuned.
        - Once you have bonded a weapon to yourself, you can't be disarmed of that weapon unless you have the {@condition Incapacitated|XPHB} condition. If it is on the same plane of existence, you can summon that weapon as a {@variantrule Bonus Action|XPHB}, causing it to teleport instantly to your hand.
        - You can have up to two bonded weapons, but you can summon only one at a time with a {@variantrule Bonus Action|XPHB}. If you attempt to bond with a third weapon, you must break the bond with one of the other two.
    - class_name: Fighter
      class_source: XPHB
      subclass_name: Eldritch Knight
      subclass_source: XPHB
      feature: War Magic
      source: XPHB
      level: 7
      entries:
        - When you take the {@action Attack|XPHB} action on your turn, you can replace one of the attacks with a casting of one of your Wizard cantrips that has a casting time of an action.
    - class_name: Fighter
      class_source: XPHB
      subclass_name: Eldritch Knight
      subclass_source: XPHB
      feature: Eldritch Strike
      source: XPHB
      level: 10
      entries:
        - You learn how to make your weapon strikes undercut a creature's ability to withstand your spells. When you hit a creature with an attack using a weapon, that creature has {@variantrule Disadvantage|XPHB} on the next saving throw it makes against a spell you cast before the end of your next turn.
    - class_name: Fighter
      class_source: XPHB
      subclass_name: Eldritch Knight
      subclass_source: XPHB
      feature: Arcane Charge
      source: XPHB
      level: 15
      entries:
        - When you use your Action Surge, you can teleport up to 30 feet to an unoccupied space you can see. You can teleport before or after the additional action.
    - class_name: Fighter
      class_source: XPHB
      subclass_name: Eldritch Knight
      subclass_source: XPHB
      feature: Improved War Magic
      source: XPHB
      level: 18
      entries:
        - When you take the {@action Attack|XPHB} action on your turn, you can replace two of the attacks with a casting of one of your level 1 or level 2 Wizard spells that has a casting time of an action.
    - class_name: Fighter
      class_source: XPHB
      subclass_name: Psi Warrior
      subclass_source: XPHB
      feature: Protective Field
      source: XPHB
      level: 3
      entries:
        - When you or another creature you can see within 30 feet of you takes damage, you can take a {@variantrule Reaction|XPHB} to expend one Psionic Energy Die, roll the die, and reduce the damage taken by the number rolled plus your Intelligence modifier (minimum reduction of 1), as you create a momentary shield of telekinetic force.
    - class_name: Fighter
      class_source: XPHB
      subclass_name: Psi Warrior
      subclass_source: XPHB
      feature: Psi Warrior
      source: XPHB
      level: 3
      entries:
        - '{@i Augment Physical Might with Psionic Power}'
        - Psi Warriors awaken the power of their minds to augment their physical might. They harness this psionic power to infuse their weapon strikes, lash out with telekinetic energy, and create barriers of mental force.
        - subclassFeature: Psionic Power|Fighter|XPHB|Psi Warrior|XPHB|3
          type: refSubclassFeature
    - class_name: Fighter
      class_source: XPHB
      subclass_name: Psi Warrior
      subclass_source: XPHB
      feature: Psionic Power
      source: XPHB
      level: 3
      entries:
        - You harbor a wellspring of psionic energy within yourself. It is represented by your Psionic Energy Dice, which fuel powers you have from this subclass. The Psi Warrior Energy Dice table shows the die size and number of these dice you have when you reach certain Fighter levels.
        - caption: Psi Warrior Energy Dice
          colLabels:
            - Fighter Level
            - Die Size
            - Number
          colStyles:
            - col-4 text-center
            - col-4 text-center
            - col-4 text-center
          rows:
            - - "3"
              - '{@dice D6}'
              - "4"
            - - "5"
              - '{@dice D8}'
              - "6"
            - - "9"
              - '{@dice D8}'
              - "8"
            - - "11"
              - '{@dice D10}'
              - "8"
            - - "13"
              - '{@dice D10}'
              - "10"
            - - "17"
              - '{@dice D12}'
              - "12"
          type: table
        - Any features in this subclass that use a Psionic Energy Die use only the dice from this subclass. Some of your powers expend the Psionic Energy Die, as specified in a power's description, and you can't use a power if it requires you to use a die when all your Psionic Energy Dice are expended.
        - You regain one of your expended Psionic Energy Dice when you finish a {@variantrule Short Rest|XPHB}, and you regain all of them when you finish a {@variantrule Long Rest|XPHB}.
        - subclassFeature: Protective Field|Fighter|XPHB|Psi Warrior|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Psionic Strike|Fighter|XPHB|Psi Warrior|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Telekinetic Movement|Fighter|XPHB|Psi Warrior|XPHB|3
          type: refSubclassFeature
    - class_name: Fighter
      class_source: XPHB
      subclass_name: Psi Warrior
      subclass_source: XPHB
      feature: Psionic Strike
      source: XPHB
      level: 3
      entries:
        - You can propel your weapons with psionic force. Once on each of your turns, immediately after you hit a target within 30 feet of yourself with an attack and deal damage to it with a weapon, you can expend one Psionic Energy Die, rolling it and dealing Force damage to the target equal to the number rolled plus your Intelligence modifier.
    - class_name: Fighter
      class_source: XPHB
      subclass_name: Psi Warrior
      subclass_source: XPHB
      feature: Telekinetic Movement
      source: XPHB
      level: 3
      entries:
        - You can move an object or a creature with your mind. As a {@action Magic|XPHB} action, choose one target you can see within 30 feet of yourself; the target must be a loose object that is Large or smaller or one willing creature other than you. You transport the target up to 30 feet to an unoccupied space you can see. Alternatively, if the target is a Tiny object, you can transport it to or from your hand.
        - Once you take this action, you can't do so again until you finish a {@variantrule Short Rest|XPHB|Short} or {@variantrule Long Rest|XPHB} unless you expend a Psionic Energy Die (no action required) to restore your use of it.
    - class_name: Fighter
      class_source: XPHB
      subclass_name: Psi Warrior
      subclass_source: XPHB
      feature: Psi-Powered Leap
      source: XPHB
      level: 7
      entries:
        - As a {@variantrule Bonus Action|XPHB}, you gain a {@variantrule Fly Speed|XPHB} equal to twice your {@variantrule Speed|XPHB} until the end of the current turn. Once you take this {@variantrule Bonus Action|XPHB}, you can't do so again until you finish a {@variantrule Short Rest|XPHB|Short} or {@variantrule Long Rest|XPHB} unless you expend a Psionic Energy Die (no action required) to restore your use of it.
    - class_name: Fighter
      class_source: XPHB
      subclass_name: Psi Warrior
      subclass_source: XPHB
      feature: Telekinetic Adept
      source: XPHB
      level: 7
      entries:
        - You have mastered new ways to use your telekinetic abilities, detailed below.
        - subclassFeature: Psi-Powered Leap|Fighter|XPHB|Psi Warrior|XPHB|7
          type: refSubclassFeature
        - subclassFeature: Telekinetic Thrust|Fighter|XPHB|Psi Warrior|XPHB|7
          type: refSubclassFeature
    - class_name: Fighter
      class_source: XPHB
      subclass_name: Psi Warrior
      subclass_source: XPHB
      feature: Telekinetic Thrust
      source: XPHB
      level: 7
      entries:
        - When you deal damage to a target with your Psionic Strike, you can force the target to make a Strength saving throw ({@dc 8} plus your Intelligence modifier and {@variantrule Proficiency|XPHB|Proficiency Bonus}). On a failed save, you can give the target the {@condition Prone|XPHB} condition or transport it up to 10 feet horizontally.
    - class_name: Fighter
      class_source: XPHB
      subclass_name: Psi Warrior
      subclass_source: XPHB
      feature: Guarded Mind
      source: XPHB
      level: 10
      entries:
        - You have {@variantrule Resistance|XPHB} to Psychic damage. Moreover, if you start your turn with the {@condition Charmed|XPHB} or {@condition Frightened|XPHB} condition, you can expend a Psionic Energy Die (no action required) and end every effect on yourself giving you those conditions.
    - class_name: Fighter
      class_source: XPHB
      subclass_name: Psi Warrior
      subclass_source: XPHB
      feature: Bulwark of Force
      source: XPHB
      level: 15
      entries:
        - You can shield yourself and others with telekinetic force. As a {@variantrule Bonus Action|XPHB}, you can choose creatures, including yourself, within 30 feet of yourself, up to a number of creatures equal to your Intelligence modifier (minimum of one creature). Each of the chosen creatures has {@variantrule Cover|XPHB|Half Cover} for 1 minute or until you have the {@condition Incapacitated|XPHB} condition.
        - Once you use this feature, you can't do so again until you finish a {@variantrule Long Rest|XPHB} unless you expend a Psionic Energy Die (no action required) to restore your use of it.
    - class_name: Fighter
      class_source: XPHB
      subclass_name: Psi Warrior
      subclass_source: XPHB
      feature: Telekinetic Master
      source: XPHB
      level: 18
      entries:
        - You always have the {@spell Telekinesis|XPHB} spell prepared. With this feature, you can cast it without a spell slot or components, and your spellcasting ability for it is Intelligence. On each of your turns while you maintain {@status Concentration|XPHB} on it, including the turn when you cast it, you can make one attack with a weapon as a {@variantrule Bonus Action|XPHB}.
        - Once you cast the spell with this feature, you can't do so in this way again until you finish a {@variantrule Long Rest|XPHB} unless you expend a Psionic Energy Die (no action required) to restore your use of it.
    - class_name: Monk
      class_source: PHB
      subclass_name: Ascendant Dragon
      subclass_source: FTD
      feature: Breath of the Dragon
      source: FTD
      level: 3
      entries:
        - '{@i 3rd-level Way of the Ascendant Dragon feature}'
        - 'You can channel destructive waves of energy, like those created by the dragons you emulate. When you take the {@action Attack} action on your turn, you can replace one of the attacks with an exhalation of draconic energy in either a 20-foot cone or a 30-foot line that is 5 feet wide (your choice). Choose a damage type: acid, cold, fire, lightning, or poison. Each creature in that area must make a Dexterity saving throw against your ki save DC, taking damage of the chosen type equal to two rolls of your Martial Arts die on a failed save, or half as much damage on a successful one.'
        - At 11th level, the damage of this feature increases to three rolls of your Martial Arts die.
        - You can use this feature a number of times equal to your proficiency bonus, and you regain all expended uses when you finish a long rest. While you have no uses available, you can spend 2 ki points to use this feature again.
    - class_name: Monk
      class_source: PHB
      subclass_name: Ascendant Dragon
      subclass_source: FTD
      feature: Draconic Disciple
      source: FTD
      level: 3
      entries:
        - '{@i 3rd-level Way of the Ascendant Dragon feature}'
        - 'You can channel draconic power to magnify your presence and imbue your unarmed strikes with the essence of a dragon''s breath. You gain the following benefits:'
        - items:
            - entry: If you fail a Charisma ({@skill Intimidation}) or Charisma ({@skill Persuasion}) check, you can use your reaction to reroll the check, as you tap into the mighty presence of dragons. Once this feature turns a failure into a success, you can't use it again until you finish a long rest.
              name: Draconic Presence
              type: item
            - entry: When you damage a target with an unarmed strike, you can change the damage type to acid, cold, fire, lightning, or poison.
              name: Draconic Strike
              type: item
            - entry: You learn to speak, read, and write {@language Draconic} or one other language of your choice.
              name: Tongue of Dragons
              type: item
          style: list-hang-notitle
          type: list
    - class_name: Monk
      class_source: PHB
      subclass_name: Ascendant Dragon
      subclass_source: FTD
      feature: Way of the Ascendant Dragon
      source: FTD
      level: 3
      entries:
        - 'The dragon god Bahamut is known to travel the Material Plane in the guise of a young monk, and legend says that he founded the first monastery of the Way of the Ascendant Dragon in this guise. The fundamental teaching of this tradition holds that by emulating dragons, a monk becomes a more integrated part of the world and its magic. By altering their spirit to resonate with draconic might, monks who follow this tradition augment their prowess in battle, bolster their allies, and can even soar through the air on draconic wings. But all this power is in service of a greater goal: achieving a spiritual unity with the essence of the Material Plane.'
        - As a follower of the Way of the Ascendant Dragon, you decide how you unlocked the power of dragons within yourself. The Ascendant Dragon Origin table offers a number of possibilities.
        - caption: Ascendant Dragon Origin
          colLabels:
            - d6
            - Origin
          colStyles:
            - col-1 text-center
            - col-11
          rows:
            - - "1"
              - You honed your abilities by aligning your spirit with a dragon's world-altering power.
            - - "2"
              - A dragon personally took an active role in shaping your inner energy.
            - - "3"
              - You studied at a monastery that traces its teachings back centuries or more to a single dragon's instruction, or one that is devoted to a dragon god.
            - - "4"
              - You spent long stretches meditating in the region around an ancient dragon's lair, absorbing that lair's ambient magic.
            - - "5"
              - You found a scroll written in Draconic that contained inspiring new techniques.
            - - "6"
              - After a dream featuring a five-handed dragonborn, you awoke with the mystical breath of dragons.
          type: table
        - subclassFeature: Draconic Disciple|Monk||Ascendant Dragon|FTD|3
          type: refSubclassFeature
        - subclassFeature: Breath of the Dragon|Monk||Ascendant Dragon|FTD|3
          type: refSubclassFeature
    - class_name: Monk
      class_source: PHB
      subclass_name: Ascendant Dragon
      subclass_source: FTD
      feature: Wings Unfurled
      source: FTD
      level: 6
      entries:
        - '{@i 6th-level Way of the Ascendant Dragon feature}'
        - When you use your Step of the Wind, you can unfurl spectral draconic wings from your back that vanish at the end of your turn. While the wings exist, you have a flying speed equal to your walking speed.
        - You can use this feature a number of times equal to your proficiency bonus, and you regain all expended uses when you finish a long rest.
    - class_name: Monk
      class_source: PHB
      subclass_name: Ascendant Dragon
      subclass_source: FTD
      feature: Aspect of the Wyrm
      source: FTD
      level: 11
      entries:
        - '{@i 11th-level Way of the Ascendant Dragon feature}'
        - 'The power of your draconic spirit now radiates from you, warding your allies or inspiring fear in your enemies. As a bonus action, you can create an aura of draconic power that radiates 10 feet from you for 1 minute. For the duration, you gain one of the following effects of your choice:'
        - items:
            - entry: When you create this aura, and as a bonus action on subsequent turns, you can choose a creature within the aura. The target must succeed on a Wisdom saving throw against your ki save DC or become {@condition frightened} of you for 1 minute. The target can repeat the saving throw at the end of each of its turns, ending the effect on itself on a successful save.
              name: Frightful Presence
              type: item
            - entry: 'Choose a damage type when you activate this aura: acid, cold, fire, lightning, or poison. You and your allies within the aura have resistance to that damage.'
              name: Resistance
              type: item
          style: list-hang-notitle
          type: list
        - Once you create this aura, you can't create it again until you finish a long rest, unless you expend 3 ki points to create it again.
    - class_name: Monk
      class_source: PHB
      subclass_name: Ascendant Dragon
      subclass_source: FTD
      feature: Ascendant Aspect
      source: FTD
      level: 17
      entries:
        - '{@i 17th-level Way of the Ascendant Dragon feature}'
        - 'Your draconic spirit reaches its peak. You gain the following benefits:'
        - items:
            - entry: When you use your Breath of the Dragon, you can spend 1 ki point to augment its shape and power. The exhalation of draconic energy becomes either a 60-foot cone or a 90-foot line that is 5 feet wide (your choice), and each creature in that area takes damage equal to four rolls of your Martial Arts die on a failed save, or half as much damage on a successful one.
              name: Augment Breath
              type: item
            - entry: You gain {@sense blindsight} out to 10 feet. Within that range, you can effectively see anything that isn't behind {@quickref Cover||3||total cover}, even if you're {@condition blinded} or in darkness. Moreover, you can see an {@condition invisible} creature within that range, unless the creature successfully hides from you.
              name: Blindsight
              type: item
            - entry: When you activate your Aspect of the Wyrm, draconic fury explodes from you. Choose any number of creatures you can see in your aura. Each of those creatures must succeed on a Dexterity saving throw against your ki save DC or take {@damage 3d10} acid, cold, fire, lightning, or poison damage (your choice).
              name: Explosive Fury
              type: item
          style: list-hang-notitle
          type: list
    - class_name: Monk
      class_source: PHB
      subclass_name: Astral Self
      subclass_source: TCE
      feature: Arms of the Astral Self
      source: TCE
      level: 3
      entries:
        - '{@i 3rd-level Way of the Astral Self feature}'
        - Your mastery of your ki allows you to summon a portion of your astral self. As a bonus action, you can spend 1 ki point to summon the arms of your astral self. When you do so, each creature of your choice that you can see within 10 feet of you must succeed on a Dexterity saving throw or take force damage equal to two rolls of your Martial Arts die.
        - For 10 minutes, these spectral arms hover near your shoulders or surround your arms (your choice). You determine the arms' appearance, and they vanish early if you are {@condition incapacitated} or die.
        - 'While the spectral arms are present, you gain the following benefits:'
        - items:
            - You can use your Wisdom modifier in place of your Strength modifier when making Strength checks and Strength saving throws.
            - You can use the spectral arms to make unarmed strikes.
            - When you make an unarmed strike with the arms on your turn, your reach for it is 5 feet greater than normal.
            - The unarmed strikes you make with the arms can use your Wisdom modifier in place of your Strength or Dexterity modifier for the attack and damage rolls, and their damage type is force.
          type: list
    - class_name: Monk
      class_source: PHB
      subclass_name: Astral Self
      subclass_source: TCE
      feature: Forms of Your Astral Self
      source: TCE
      level: 3
      entries:
        - The astral self is a translucent embodiment of the monk's soul. As a result, an astral self can reflect aspects of a monk's background, ideals, flaws, and bonds, and an astral self doesn't necessarily look anything like the monk. For example, the astral self of a lanky human might be reminiscent of a minotaur-the strength of which the monk feels within. Similarly, an orc monk might manifest gossamer arms and a delicate visage, representing the gentle beauty of the orc's soul. Each astral self is unique, and some of the monks of this monastic tradition are known more for the appearance of their astral self than for their physical appearance.
        - When choosing this path, consider the quirks that define your monk. Are you obsessed with something? Are you driven by justice or a selfish desire? Any of these motivations could manifest in the form of your astral self.
    - class_name: Monk
      class_source: PHB
      subclass_name: Astral Self
      subclass_source: TCE
      feature: Way of the Astral Self
      source: TCE
      level: 3
      entries:
        - A monk who follows the Way of the Astral Self believes their body is an illusion. They see their ki as a representation of their true form, an astral self. This astral self has the capacity to be a force of order or disorder, with some monasteries training students to use their power to protect the weak and other instructing aspirants in how to manifest their true selves in service to the mighty.
        - subclassFeature: Forms of Your Astral Self|Monk||Astral Self|TCE|3
          type: refSubclassFeature
        - subclassFeature: Arms of the Astral Self|Monk||Astral Self|TCE|3
          type: refSubclassFeature
    - class_name: Monk
      class_source: PHB
      subclass_name: Astral Self
      subclass_source: TCE
      feature: Visage of the Astral Self
      source: TCE
      level: 6
      entries:
        - '{@i 6th-level Way of the Astral Self feature}'
        - You can summon the visage of your astral self. As a bonus action, or as part of the bonus action you take to activate Arms of the Astral Self, you can spend 1 ki point to summon this visage for 10 minutes. It vanishes early if you are {@condition incapacitated} or die.
        - The spectral visage covers your face like a helmet or mask. You determine its appearance.
        - While the spectral visage is present, you gain the following benefits.
        - entries:
            - You can see normally in darkness, both magical and nonmagical, to a distance of 120 feet.
          name: Astral Sight
          type: entries
        - entries:
            - You have advantage on Wisdom ({@skill Insight}) and Charisma ({@skill Intimidation}) checks.
          name: Wisdom of the Spirit
          type: entries
        - entries:
            - When you speak, you can direct your words to a creature of your choice that you can see within 60 feet of you, making it so only that creature can hear you. Alternatively, you can amplify your voice so that all creatures within 600 feet can hear you.
          name: Word of the Spirit
          type: entries
    - class_name: Monk
      class_source: PHB
      subclass_name: Astral Self
      subclass_source: TCE
      feature: Body of the Astral Self
      source: TCE
      level: 11
      entries:
        - '{@i 11th-level Way of the Astral Self feature}'
        - When you have both your astral arms and visage summoned, you can cause the body of your astral self to appear (no action required). This spectral body covers your physical form like a suit of armor, connecting with the arms and visage. You determine its appearance.
        - While the spectral body is present, you gain the following benefits.
        - entries:
            - When you take acid, cold, fire, force, lightning, or thunder damage, you can use your reaction to deflect it. When you do so, the damage you take is reduced by {@dice 1d10} + your Wisdom modifier (minimum reduction of 1).
          name: Deflect Energy
          type: entries
        - entries:
            - Once on each of your turns when you hit a target with the Arms of the Astral Self, you can deal extra damage to the target equal to your Martial Arts die.
          name: Empowered Arms
          type: entries
    - class_name: Monk
      class_source: PHB
      subclass_name: Astral Self
      subclass_source: TCE
      feature: Awakened Astral Self
      source: TCE
      level: 17
      entries:
        - '{@i 17th-level Way of the Astral Self feature}'
        - Your connection to your astral self is complete, allowing you to unleash its full potential. As a bonus action, you can spend 5 ki points to summon the arms, visage, and body of your astral self and awaken it for 10 minutes. This awakening ends early if you are {@condition incapacitated} or die.
        - While your astral self is awakened, you gain the following benefits.
        - entries:
            - You gain a +2 bonus to Armor Class.
          name: Armor of the Spirit
          type: entries
        - entries:
            - Whenever you use the Extra Attack feature to attack twice, you can instead attack three times if all the attacks are made with your astral arms.
          name: Astral Barrage
          type: entries
    - class_name: Monk
      class_source: PHB
      subclass_name: Drunken Master
      subclass_source: XGE
      feature: Bonus Proficiencies
      source: XGE
      level: 3
      entries:
        - When you choose this tradition at 3rd level, you gain proficiency in the {@skill Performance} skill if you don't already have it. Your martial arts technique mixes combat training with the precision of a dancer and the antics of a jester. You also gain proficiency with {@item brewer's supplies|phb} if you don't already have it.
    - class_name: Monk
      class_source: PHB
      subclass_name: Drunken Master
      subclass_source: XGE
      feature: Drunken Technique
      source: XGE
      level: 3
      entries:
        - At 3rd level, you learn how to twist and turn quickly as part of your Flurry of Blows. Whenever you use Flurry of Blows, you gain the benefit of the {@action Disengage} action, and your walking speed increases by 10 feet until the end of the current turn.
    - class_name: Monk
      class_source: PHB
      subclass_name: Drunken Master
      subclass_source: XGE
      feature: Way of the Drunken Master
      source: XGE
      level: 3
      entries:
        - The Way of the Drunken Master teaches its students to move with the jerky, unpredictable movements of a drunkard. A drunken master sways, tottering on unsteady feet, to present what seems like an incompetent combatant who proves frustrating to engage. The drunken master's erratic stumbles conceal a carefully executed dance of blocks, parries, advances, attacks, and retreats.
        - A drunken master often enjoys playing the fool to bring gladness to the despondent or to demonstrate humility to the arrogant, but when battle is joined, the drunken master can be a maddening, masterful foe.
        - subclassFeature: Bonus Proficiencies|Monk||Drunken Master|XGE|3
          type: refSubclassFeature
        - subclassFeature: Drunken Technique|Monk||Drunken Master|XGE|3
          type: refSubclassFeature
    - class_name: Monk
      class_source: PHB
      subclass_name: Drunken Master
      subclass_source: XGE
      feature: Leap to Your Feet
      source: XGE
      level: 6
      entries:
        - When you're {@condition prone}, you can stand up by spending 5 feet of movement, rather than half your speed.
    - class_name: Monk
      class_source: PHB
      subclass_name: Drunken Master
      subclass_source: XGE
      feature: Redirect Attack
      source: XGE
      level: 6
      entries:
        - When a creature misses you with a melee attack roll, you can spend 1 ki point as a reaction to cause that attack to hit one creature of your choice, other than the attacker, that you can see within 5 feet of you.
    - class_name: Monk
      class_source: PHB
      subclass_name: Drunken Master
      subclass_source: XGE
      feature: Tipsy Sway
      source: XGE
      level: 6
      entries:
        - Starting at 6th level, you can move in sudden, swaying ways. You gain the following benefits.
        - entries:
            - subclassFeature: Leap to Your Feet|Monk|PHB|Drunken Master|XGE|6
              type: refSubclassFeature
            - subclassFeature: Redirect Attack|Monk|PHB|Drunken Master|XGE|6
              type: refSubclassFeature
          type: options
    - class_name: Monk
      class_source: PHB
      subclass_name: Drunken Master
      subclass_source: XGE
      feature: Drunkard's Luck
      source: XGE
      level: 11
      entries:
        - Starting at 11th level, you always seem to get a lucky bounce at the right moment. When you make an ability check, an attack roll, or a saving throw and have disadvantage on the roll, you can spend 2 ki points to cancel the disadvantage for that roll.
    - class_name: Monk
      class_source: PHB
      subclass_name: Drunken Master
      subclass_source: XGE
      feature: Intoxicated Frenzy
      source: XGE
      level: 17
      entries:
        - At 17th level, you gain the ability to make an overwhelming number of attacks against a group of enemies. When you use your Flurry of Blows, you can make up to three additional attacks with it (up to a total of five Flurry of Blows attacks), provided that each Flurry of Blows attack targets a different creature this turn.
    - class_name: Monk
      class_source: PHB
      subclass_name: Four Elements
      subclass_source: PHB
      feature: Disciple of the Elements
      source: PHB
      level: 3
      entries:
        - You learn magical disciplines that harness the power of the four elements. A discipline requires you to spend ki points each time you use it.
        - You know the Elemental Attunement discipline and one other elemental discipline of your choice. You learn one additional elemental discipline of your choice at 6th, 11th, and 17th level.
        - Whenever you learn a new elemental discipline, you can also replace one elemental discipline that you already know with a different discipline.
        - entries:
            - Some elemental disciplines allow you to cast spells. See {@book chapter 10|PHB|10} of the Player's Handbook for the general rules of spellcasting. To cast one of these spells, you use its casting time and other rules, but you don't need to provide material components for it.
            - Once you reach 5th level in this class, you can spend additional ki points to increase the level of an elemental discipline spell that you cast, provided that the spell has an enhanced effect at a higher level, as {@spell burning hands} does. The spell's level increases by 1 for each additional ki point you spend. For example, if you are a 5th-level monk and use Sweeping Cinder Strike to cast {@spell burning hands}, you can spend 3 ki points to cast it as a 2nd-level spell (the discipline's base cost of 2 ki points plus 1).
            - The maximum number of ki points you can spend to cast a spell in this way (including its base ki point cost and any additional ki points you spend to increase its level) is determined by your monk level, as shown in the Spells and Ki Points table. At 5th level, you may spend up to 3 ki points; this increases to 4 ki points at 9th level, 5 at 13th level, and 6 at 17th level.
            - caption: Spells and Ki Points
              colLabels:
                - Monk Levels
                - Maximum Ki Points for a Spell
              colStyles:
                - col-5 text-center
                - col-7 text-center
              rows:
                - - 5th-8th
                  - 3
                - - 9th-12th
                  - 4
                - - 13th-16th
                  - 5
                - - 17th-20th
                  - 6
              type: table
          name: Casting Elemental Spells
          type: entries
    - class_name: Monk
      class_source: PHB
      subclass_name: Four Elements
      subclass_source: PHB
      feature: Elemental Disciplines
      source: PHB
      level: 3
      entries:
        - The elemental disciplines are presented in alphabetical order. If a discipline requires a level, you must be the level in this class to learn the discipline.
        - count: 2
          entries:
            - name: Breath of Winter (17th Level Required)
              optionalfeature: Breath of Winter
              type: refOptionalfeature
            - name: Clench of the North Wind (6th Level Required)
              optionalfeature: Clench of the North Wind
              type: refOptionalfeature
            - data:
                isRequiredOption: true
              optionalfeature: Elemental Attunement
              type: refOptionalfeature
            - name: Eternal Mountain Defense (17th Level Required)
              optionalfeature: Eternal Mountain Defense
              type: refOptionalfeature
            - optionalfeature: Fangs of the Fire Snake
              type: refOptionalfeature
            - optionalfeature: Fist of Four Thunders
              type: refOptionalfeature
            - optionalfeature: Unbroken Air
              type: refOptionalfeature
            - name: Flames of the Phoenix (11th Level Required)
              optionalfeature: Flames of the Phoenix
              type: refOptionalfeature
            - name: Gong of the Summit (6th Level Required)
              optionalfeature: Gong of the Summit
              type: refOptionalfeature
            - name: Mist Stance (11th Level Required)
              optionalfeature: Mist Stance
              type: refOptionalfeature
            - name: Ride the Wind (11th Level Required)
              optionalfeature: Ride the Wind
              type: refOptionalfeature
            - name: River of Hungry Flame (17th Level Required)
              optionalfeature: River of Hungry Flame
              type: refOptionalfeature
            - optionalfeature: Rush of the Gale Spirits
              type: refOptionalfeature
            - optionalfeature: Shape the Flowing River
              type: refOptionalfeature
            - optionalfeature: Sweeping Cinder Strike
              type: refOptionalfeature
            - optionalfeature: Water Whip
              type: refOptionalfeature
            - name: Wave of Rolling Earth (17th Level Required)
              optionalfeature: Wave of Rolling Earth
              type: refOptionalfeature
          type: options
    - class_name: Monk
      class_source: PHB
      subclass_name: Four Elements
      subclass_source: PHB
      feature: Way of the Four Elements
      source: PHB
      level: 3
      entries:
        - You follow a monastic tradition that teaches you to harness the elements. When you focus your ki, you can align yourself with the forces of creation and bend the four elements to your will, using them as an extension of your body. Some members of this tradition dedicate themselves to a single element, but others weave the elements together.
        - Many monks of this tradition tattoo their bodies with representations of their ki powers, commonly imagined as coiling dragons, but also as phoenixes, fish, plants, mountains, and cresting waves.
        - subclassFeature: Disciple of the Elements|Monk||Four Elements||3
          type: refSubclassFeature
        - subclassFeature: Elemental Disciplines|Monk||Four Elements||3
          type: refSubclassFeature
    - class_name: Monk
      class_source: PHB
      subclass_name: Four Elements
      subclass_source: PHB
      feature: Extra Elemental Discipline
      source: PHB
      level: 6
      entries:
        - You learn one additional elemental discipline of your choice. You should know 2 elemental disciplines, as well as Elemental Attunement.
        - Whenever you learn a new elemental discipline, you can also replace one elemental discipline that you already know with a different discipline.
    - class_name: Monk
      class_source: PHB
      subclass_name: Four Elements
      subclass_source: PHB
      feature: Extra Elemental Discipline
      source: PHB
      level: 11
      entries:
        - You learn one additional elemental discipline of your choice. You should know 3 elemental disciplines, as well as Elemental Attunement.
        - Whenever you learn a new elemental discipline, you can also replace one elemental discipline that you already know with a different discipline.
    - class_name: Monk
      class_source: PHB
      subclass_name: Four Elements
      subclass_source: PHB
      feature: Extra Elemental Discipline
      source: PHB
      level: 17
      entries:
        - You learn one additional elemental discipline of your choice. You should know 4 elemental disciplines, as well as Elemental Attunement.
        - Whenever you learn a new elemental discipline, you can also replace one elemental discipline that you already know with a different discipline.
    - class_name: Monk
      class_source: PHB
      subclass_name: Kensei
      subclass_source: XGE
      feature: Agile Parry
      source: XGE
      level: 3
      entries:
        - If you make an unarmed strike as part of the {@action Attack} action on your turn and are holding a kensei weapon, you can use it to defend yourself if it is a melee weapon. You gain a +2 bonus to AC until the start of your next turn, while the weapon is in your hand and you aren't {@condition incapacitated}.
    - class_name: Monk
      class_source: PHB
      subclass_name: Kensei
      subclass_source: XGE
      feature: Kensei's Shot
      source: XGE
      level: 3
      entries:
        - You can use a bonus action on your turn to make your ranged attacks with a kensei weapon more deadly. When you do so, any target you hit with a ranged attack using a kensei weapon takes an extra {@damage 1d4} damage of the weapon's type. You retain this benefit until the end of the current turn.
    - class_name: Monk
      class_source: PHB
      subclass_name: Kensei
      subclass_source: XGE
      feature: Path of the Kensei
      source: XGE
      level: 3
      entries:
        - When you choose this tradition at 3rd level, your special martial arts training leads you to master the use of certain weapons. This path also includes instruction in the deft strokes of calligraphy or painting. You gain the following benefits.
        - entries:
            - 'Choose two types of weapons to be your kensei weapons: one melee weapon and one ranged weapon. Each of these weapons can be any {@filter simple or martial weapon that lacks the heavy and special properties|items|source=phb|type=simple weapon;martial weapon|property=!heavy;!special|category=basic|miscellaneous=}. The longbow is also a valid choice. You gain proficiency with these weapons if you don''t already have it. Weapons of the chosen types are monk weapons for you. Many of this tradition''s features work only with your kensei weapons. When you reach 6th, 11th, and 17th level in this class, you can choose another type of weapon—either melee or ranged—to be a kensei weapon for you, following the criteria above.'
          name: Kensei Weapons
          type: entries
        - entries:
            - subclassFeature: Agile Parry|Monk|PHB|Kensei|XGE|3
              type: refSubclassFeature
            - subclassFeature: Kensei's Shot|Monk|PHB|Kensei|XGE|3
              type: refSubclassFeature
          type: options
        - entries:
            - You gain proficiency with your choice of {@item calligrapher's supplies|phb} or {@item painter's supplies|phb}.
          name: Way of the Brush
          type: entries
    - class_name: Monk
      class_source: PHB
      subclass_name: Kensei
      subclass_source: XGE
      feature: Way of the Kensei
      source: XGE
      level: 3
      entries:
        - Monks of the Way of the Kensei train relentlessly with their weapons, to the point where the weapon becomes an extension of the body. Founded on a mastery of sword fighting, the tradition has expanded to include many different weapons.
        - A kensei sees a weapon in much the same way a calligrapher or painter regards a pen or brush. Whatever the weapon, the kensei views it as a tool used to express the beauty and precision of the martial arts. That such mastery makes a kensei a peerless warrior is but a side effect of intense devotion, practice, and study.
        - subclassFeature: Path of the Kensei|Monk||Kensei|XGE|3
          type: refSubclassFeature
    - class_name: Monk
      class_source: PHB
      subclass_name: Kensei
      subclass_source: XGE
      feature: One with the Blade
      source: XGE
      level: 6
      entries:
        - At 6th level, you extend your ki into your kensei weapons, granting you the following benefits.
        - entries:
            - Your attacks with your kensei weapons count as magical for the purpose of overcoming resistance and immunity to nonmagical attacks and damage.
          name: Magic Kensei Weapons
          type: entries
        - entries:
            - When you hit a target with a kensei weapon, you can spend 1 ki point to cause the weapon to deal extra damage to the target equal to your Martial Arts die. You can use this feature only once on each of your turns.
          name: Deft Strike
          type: entries
    - class_name: Monk
      class_source: PHB
      subclass_name: Kensei
      subclass_source: XGE
      feature: Sharpen the Blade
      source: XGE
      level: 11
      entries:
        - At 11th level, you gain the ability to augment your weapons further with your ki. As a bonus action, you can expend up to 3 ki points to grant one kensei weapon you touch a bonus to attack and damage rolls when you attack with it. The bonus equals the number of ki points you spent. This bonus lasts for 1 minute or until you use this feature again. This feature has no effect on a magic weapon that already has a bonus to attack and damage rolls.
    - class_name: Monk
      class_source: PHB
      subclass_name: Kensei
      subclass_source: XGE
      feature: Unerring Accuracy
      source: XGE
      level: 17
      entries:
        - At 17th level, your mastery of weapons grants you extraordinary accuracy. If you miss with an attack roll using a monk weapon on your turn, you can reroll it. You can use this feature only once on each of your turns.
    - class_name: Monk
      class_source: PHB
      subclass_name: Long Death
      subclass_source: SCAG
      feature: Touch of Death
      source: SCAG
      level: 3
      entries:
        - Starting when you choose this tradition at 3rd level, your study of death allows you to extract vitality from another creature as it nears its demise. When you reduce a creature within 5 feet of you to 0 hit points, you gain temporary hit points equal to your Wisdom modifier + your monk level (minimum of 1 temporary hit point).
    - class_name: Monk
      class_source: PHB
      subclass_name: Long Death
      subclass_source: SCAG
      feature: Way of the Long Death
      source: SCAG
      level: 3
      entries:
        - Monks of the Way of the Long Death are obsessed with the meaning and mechanics of dying. They capture creatures and prepare elaborate experiments to capture, record, and understand the moments of their demise. They use this knowledge to guide their understanding of martial arts, yielding a deadly fighting style.
        - subclassFeature: Touch of Death|Monk||Long Death|SCAG|3
          type: refSubclassFeature
    - class_name: Monk
      class_source: PHB
      subclass_name: Long Death
      subclass_source: SCAG
      feature: Hour of Reaping
      source: SCAG
      level: 6
      entries:
        - At 6th level, you gain the ability to unsettle or terrify those around you as an action, for your soul has been touched by the shadow of death. When you take this action, each creature within 30 feet of you that can see you must succeed on a Wisdom saving throw or be {@condition frightened} of you until the end of your next turn.
    - class_name: Monk
      class_source: PHB
      subclass_name: Long Death
      subclass_source: SCAG
      feature: Mastery of Death
      source: SCAG
      level: 11
      entries:
        - Beginning at 11th level, you use your familiarity with death to escape its grasp. When you are reduced to 0 hit points, you can expend 1 ki point (no action required) to have 1 hit point instead.
    - class_name: Monk
      class_source: PHB
      subclass_name: Long Death
      subclass_source: SCAG
      feature: Touch of the Long Death
      source: SCAG
      level: 17
      entries:
        - Starting at 17th level, your touch can channel the energy of death into a creature. As an action, you touch one creature within 5 feet of you, and you expend 1 to 10 ki points. The target must make a Constitution saving throw, and it takes {@damage 2d10} necrotic damage per ki point spent on a failed save, or half as much damage on a successful one.
    - class_name: Monk
      class_source: PHB
      subclass_name: Mercy
      subclass_source: TCE
      feature: Hand of Harm
      source: TCE
      level: 3
      entries:
        - '{@i 3rd-level Way of Mercy feature}'
        - You use your ki to inflict wounds. When you hit a creature with an unarmed strike, you can spend 1 ki point to deal extra necrotic damage equal to one roll of your Martial Arts die + your Wisdom modifier. You can use this feature only once per turn.
    - class_name: Monk
      class_source: PHB
      subclass_name: Mercy
      subclass_source: TCE
      feature: Hand of Healing
      source: TCE
      level: 3
      entries:
        - '{@i 3rd-level Way of Mercy feature}'
        - Your mystical touch can mend wounds. As an action, you can spend 1 ki point to touch a creature and restore a number of hit points equal to a roll of your Martial Arts die + your Wisdom modifier.
        - When you use your Flurry of Blows, you can replace one of the unarmed strikes with a use of this feature without spending a ki point for the healing.
    - class_name: Monk
      class_source: PHB
      subclass_name: Mercy
      subclass_source: TCE
      feature: Implements of Mercy
      source: TCE
      level: 3
      entries:
        - '{@i 3rd-level Way of Mercy feature}'
        - You gain proficiency in the {@skill Insight} and {@skill Medicine} skills, and you gain proficiency with the {@item herbalism kit|PHB}.
        - You also gain a special mask, which you often wear when using the features of this subclass. You determine its appearance, or generate it randomly by rolling on the Merciful Mask table.
        - caption: Merciful Mask
          colLabels:
            - d6
            - Mask Appearance
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - "1"
              - Raven
            - - "2"
              - Blank and white
            - - "3"
              - Crying visage
            - - "4"
              - Laughing visage
            - - "5"
              - Skull
            - - "6"
              - Butterfly
          type: table
    - class_name: Monk
      class_source: PHB
      subclass_name: Mercy
      subclass_source: TCE
      feature: Way of Mercy
      source: TCE
      level: 3
      entries:
        - Monks of the Way of Mercy learn to manipulate the life force of others to bring aid to those in need. They are wandering physicians to the poor and hurt. However, to those beyond their help, they bring a swift end as an act of mercy.
        - Those who follow the Way of Mercy might be members of a religious order, administering to the needy and making grim choices rooted in reality rather than idealism. Some might be gentle-voiced healers, beloved by their communities, while others might be masked bringers of macabre mercies.
        - The walkers of this way usually don robes with deep cowls, and they often conceal their faces with masks, presenting themselves as the faceless bringers of life and death.
        - subclassFeature: Implements of Mercy|Monk||Mercy|TCE|3
          type: refSubclassFeature
        - subclassFeature: Hand of Healing|Monk||Mercy|TCE|3
          type: refSubclassFeature
        - subclassFeature: Hand of Harm|Monk||Mercy|TCE|3
          type: refSubclassFeature
    - class_name: Monk
      class_source: PHB
      subclass_name: Mercy
      subclass_source: TCE
      feature: Physician's Touch
      source: TCE
      level: 6
      entries:
        - '{@i 6th-level Way of Mercy feature}'
        - You can administer even greater cures with a touch, and if you feel it's necessary, you can use your knowledge to cause harm.
        - 'When you use Hand of Healing on a creature, you can also end one disease or one of the following conditions affecting the creature: {@condition blinded}, {@condition deafened}, {@condition paralyzed}, {@condition poisoned}, or {@condition stunned}.'
        - When you use Hand of Harm on a creature, you can subject that creature to the {@condition poisoned} condition until the end of your next turn.
    - class_name: Monk
      class_source: PHB
      subclass_name: Mercy
      subclass_source: TCE
      feature: Flurry of Healing and Harm
      source: TCE
      level: 11
      entries:
        - '{@i 11th-level Way of Mercy feature}'
        - You can now mete out a flurry of comfort and hurt. When you use Flurry of Blows, you can now replace each of the unarmed strikes with a use of your Hand of Healing, without spending ki points for the healing.
        - In addition, when you make an unarmed strike with Flurry of Blows, you can use Hand of Harm with that strike without spending the ki point for Hand of Harm. You can still use Hand of Harm only once per turn.
    - class_name: Monk
      class_source: PHB
      subclass_name: Mercy
      subclass_source: TCE
      feature: Hand of Ultimate Mercy
      source: TCE
      level: 17
      entries:
        - '{@i 17th-level Way of Mercy feature}'
        - 'Your mastery of life energy opens the door to the ultimate mercy. As an action, you can touch the corpse of a creature that died within the past 24 hours and expend 5 ki points. The creature then returns to life, regaining a number of hit points equal to {@dice 4d10} + your Wisdom modifier. If the creature died while subject to any of the following conditions, it revives with them removed: {@condition blinded}, {@condition deafened}, {@condition paralyzed}, {@condition poisoned}, and {@condition stunned}.'
        - Once you use this feature, you can't use it again until you finish a long rest.
    - class_name: Monk
      class_source: PHB
      subclass_name: Open Hand
      subclass_source: PHB
      feature: Open Hand Technique
      source: PHB
      level: 3
      entries:
        - You can manipulate your enemy's ki when you harness your own. Whenever you hit a creature with one of the attacks granted by your Flurry of Blows, you can impose one of the following effects on that target.
        - items:
            - It must succeed on a Dexterity saving throw or be knocked {@condition prone}.
            - It must make a Strength saving throw. If it fails, you can push it up to 15 feet away from you.
            - It can't take reactions until the end of your next turn.
          type: list
    - class_name: Monk
      class_source: PHB
      subclass_name: Open Hand
      subclass_source: PHB
      feature: Way of the Open Hand
      source: PHB
      level: 3
      entries:
        - Monks of the Way of the Open Hand are the ultimate masters of martial arts combat, whether armed or unarmed. They learn techniques to push and trip their opponents, manipulate ki to heal damage to their bodies, and practice advanced meditation that can protect them from harm.
        - subclassFeature: Open Hand Technique|Monk||Open Hand||3
          type: refSubclassFeature
    - class_name: Monk
      class_source: PHB
      subclass_name: Open Hand
      subclass_source: PHB
      feature: Wholeness of Body
      source: PHB
      level: 6
      entries:
        - You gain the ability to heal yourself. As an action, you can regain hit points equal to three times your monk level. You must finish a long rest before you can use this feature again.
    - class_name: Monk
      class_source: PHB
      subclass_name: Open Hand
      subclass_source: PHB
      feature: Tranquility
      source: PHB
      level: 11
      entries:
        - Beginning at 11th level, you can enter a special meditation that surrounds you with an aura of peace. At the end of a long rest, you gain the effect of a {@spell sanctuary} spell that lasts until the start of your next long rest (the spell can end early as normal). The saving throw DC for the spell equals 8 + your Wisdom modifier + your proficiency bonus.
    - class_name: Monk
      class_source: PHB
      subclass_name: Open Hand
      subclass_source: PHB
      feature: Quivering Palm
      source: PHB
      level: 17
      entries:
        - You gain the ability to set up lethal vibrations in someone's body. When you hit a creature with an unarmed strike, you can spend 3 ki points to start these imperceptible vibrations, which last for a number of days equal to your monk level. The vibrations are harmless unless you use your action to end them. To do so, you and the target must be on the same plane of existence. When you use this action, the creature must make a Constitution saving throw. If it fails, it is reduced to 0 hit points. If it succeeds, it takes {@damage 10d10} necrotic damage.
        - You can have only one creature under the effect of this feature at a time. You can choose to end the vibrations harmlessly without using an action.
    - class_name: Monk
      class_source: PHB
      subclass_name: Shadow
      subclass_source: PHB
      feature: Shadow Arts
      source: PHB
      level: 3
      entries:
        - You can use your ki to duplicate the effects of certain spells. As an action, you can spend 2 ki points to cast {@spell darkness}, {@spell darkvision}, {@spell pass without trace}, or {@spell silence}, without providing material components. Additionally, you gain the {@spell minor illusion} cantrip if you don't already know it.
    - class_name: Monk
      class_source: PHB
      subclass_name: Shadow
      subclass_source: PHB
      feature: Way of Shadow
      source: PHB
      level: 3
      entries:
        - Monks of the Way of Shadow follow a tradition that values stealth and subterfuge. These monks might be called ninjas or shadow dancers, and they serve as spies and assassins. Sometimes the members of a ninja monastery are family members, forming a clan sworn to secrecy about their arts and missions. Other monasteries are more like thieves' guilds, hiring out their services to nobles, rich merchants, or anyone else who can pay their fees. Regardless of their methods, the heads of these monasteries expect the unquestioning obedience of their students.
        - subclassFeature: Shadow Arts|Monk||Shadow||3
          type: refSubclassFeature
    - class_name: Monk
      class_source: PHB
      subclass_name: Shadow
      subclass_source: PHB
      feature: Shadow Step
      source: PHB
      level: 6
      entries:
        - You gain the ability to step from one shadow into another. When you are in dim light or darkness, as a bonus action you can teleport up to 60 feet to an unoccupied space you can see that is also in dim light or darkness. You then have advantage on the first melee attack you make before the end of the turn.
    - class_name: Monk
      class_source: PHB
      subclass_name: Shadow
      subclass_source: PHB
      feature: Cloak of Shadows
      source: PHB
      level: 11
      entries:
        - By 11th level, you have learned to become one with the shadows. When you are in an area of dim light or darkness, you can use your action to become {@condition invisible}. You remain {@condition invisible} until you make an attack, cast a spell, or are in an area of bright light.
    - class_name: Monk
      class_source: PHB
      subclass_name: Shadow
      subclass_source: PHB
      feature: Opportunist
      source: PHB
      level: 17
      entries:
        - At 17th level, you can exploit a creature's momentary distraction when it is hit by an attack. Whenever a creature within 5 feet of you is hit by an attack made by a creature other than you, you can use your reaction to make a melee attack against that creature.
    - class_name: Monk
      class_source: PHB
      subclass_name: Sun Soul
      subclass_source: XGE
      feature: Radiant Sun Bolt
      source: XGE
      level: 3
      entries:
        - Starting when you choose this tradition at 3rd level, you can hurl searing bolts of magical radiance.
        - You gain a new attack option that you can use with the {@action Attack} action. The special attack is a ranged spell attack with a range of 30 feet. You are proficient with it, and you add your Dexterity modifier to its attack and damage rolls. Its damage is radiant, and its damage die is a {@damage d4}. This die changes as you gain monk levels, as shown in the Martial Arts column of the Monk table.
        - When you take the {@action Attack} action on your turn and use this special attack as part of it, you can spend 1 ki point to make the special attack twice as a bonus action. When you gain the Extra Attack feature, this special attack can be used for any of the attacks you make as part of the {@action Attack} action.
    - class_name: Monk
      class_source: PHB
      subclass_name: Sun Soul
      subclass_source: XGE
      feature: Way of the Sun Soul
      source: XGE
      level: 3
      entries:
        - Monks of the Way of the Sun Soul learn to channel their life energy into searing bolts of light. They teach that meditation can unlock the ability to unleash the indomitable light shed by the soul of every living creature.
        - subclassFeature: Radiant Sun Bolt|Monk||Sun Soul|XGE|3
          type: refSubclassFeature
    - class_name: Monk
      class_source: PHB
      subclass_name: Sun Soul
      subclass_source: XGE
      feature: Searing Arc Strike
      source: XGE
      level: 6
      entries:
        - At 6th level, you gain the ability to channel your ki into searing waves of energy. Immediately after you take the {@action Attack} action on your turn, you can spend 2 ki points to cast the {@spell burning hands} spell as a bonus action.
        - You can spend additional ki points to cast {@spell burning hands} as a higher-level spell. Each additional ki point you spend increases the spell's level by 1. The maximum number of ki points (2 plus any additional points) that you can spend on the spell equals half your monk level.
    - class_name: Monk
      class_source: PHB
      subclass_name: Sun Soul
      subclass_source: XGE
      feature: Searing Sunburst
      source: XGE
      level: 11
      entries:
        - At 11th level, you gain the ability to create an orb of light that erupts into a devastating explosion. As an action, you magically create an orb and hurl it at a point you choose within 150 feet, where it erupts into a sphere of radiant light for a brief but deadly instant.
        - Each creature in that 20-foot-radius sphere must succeed on a Constitution saving throw or take {@damage 2d6} radiant damage. A creature doesn't need to make the save if the creature is behind {@quickref Cover||3||total cover} that is opaque.
        - You can increase the sphere's damage by spending ki points. Each point you spend, to a maximum of 3, increases the damage by {@damage 2d6}.
    - class_name: Monk
      class_source: PHB
      subclass_name: Sun Soul
      subclass_source: XGE
      feature: Sun Shield
      source: XGE
      level: 17
      entries:
        - At 17th level, you become wreathed in a luminous, magical aura. You shed bright light in a 30-foot radius and dim light for an additional 30 feet. You can extinguish or restore the light as a bonus action.
        - If a creature hits you with a melee attack while this light shines, you can use your reaction to deal radiant damage to the creature. The radiant damage equals 5 + your Wisdom modifier.
    - class_name: Monk
      class_source: XPHB
      subclass_name: Elements
      subclass_source: XPHB
      feature: Elemental Attunement
      source: XPHB
      level: 3
      entries:
        - At the start of your turn, you can expend 1 Focus Point to imbue yourself with elemental energy. The energy lasts for 10 minutes or until you have the {@condition Incapacitated|XPHB} condition. You gain the following benefits while this feature is active.
        - entries:
            - entries:
                - When you make an {@variantrule Unarmed Strike|XPHB}, your reach is 10 feet greater than normal, as elemental energy extends from you.
              name: Reach
              type: entries
            - entries:
                - Whenever you hit with your {@variantrule Unarmed Strike|XPHB}, you can cause it to deal your choice of Acid, Cold, Fire, Lightning, or Thunder damage rather than its normal damage type. When you deal one of these types with it, you can also force the target to make a Strength saving throw. On a failed save, you can move the target up to 10 feet toward or away from you, as elemental energy swirls around it.
              name: Elemental Strikes
              type: entries
          type: entries
    - class_name: Monk
      class_source: XPHB
      subclass_name: Elements
      subclass_source: XPHB
      feature: Manipulate Elements
      source: XPHB
      level: 3
      entries:
        - You know the {@spell Elementalism|XPHB} spell. Wisdom is your spellcasting ability for it.
    - class_name: Monk
      class_source: XPHB
      subclass_name: Elements
      subclass_source: XPHB
      feature: Warrior of the Elements
      source: XPHB
      level: 3
      entries:
        - '{@i Wield Strikes and Bursts of Elemental Power}'
        - Warriors of the Elements tap into the power of the Elemental Planes. Harnessing their supernatural focus, these Monks momentarily tame the energy of the Elemental Chaos to empower themselves in and out of battle.
        - subclassFeature: Elemental Attunement|Monk|XPHB|Elements|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Manipulate Elements|Monk|XPHB|Elements|XPHB|3
          type: refSubclassFeature
    - class_name: Monk
      class_source: XPHB
      subclass_name: Elements
      subclass_source: XPHB
      feature: Elemental Burst
      source: XPHB
      level: 6
      entries:
        - 'As a {@action Magic|XPHB} action, you can expend 2 Focus Points to cause elemental energy to burst in a 20-foot-radius {@variantrule Sphere [Area of Effect]|XPHB|Sphere} centered on a point within 120 feet of yourself. Choose a damage type: Acid, Cold, Fire, Lightning, or Thunder.'
        - Each creature in the {@variantrule Sphere [Area of Effect]|XPHB|Sphere} must make a Dexterity saving throw. On a failed save, a creature takes damage of the chosen type equal to three rolls of your Martial Arts die. On a successful save, a creature takes half as much damage.
    - class_name: Monk
      class_source: XPHB
      subclass_name: Elements
      subclass_source: XPHB
      feature: Stride of the Elements
      source: XPHB
      level: 11
      entries:
        - While your Elemental Attunement is active, you also have a {@variantrule Fly Speed|XPHB} and a {@variantrule Swim Speed|XPHB} equal to your {@variantrule Speed|XPHB}.
    - class_name: Monk
      class_source: XPHB
      subclass_name: Elements
      subclass_source: XPHB
      feature: Elemental Epitome
      source: XPHB
      level: 17
      entries:
        - While your Elemental Attunement is active, you also gain the following benefits.
        - entries:
            - 'You gain {@variantrule Resistance|XPHB} to one of the following damage types of your choice: Acid, Cold, Fire, Lightning, or Thunder. At the start of each of your turns, you can change this choice.'
          name: Damage Resistance
          type: entries
        - entries:
            - When you use your Step of the Wind, your {@variantrule Speed|XPHB} increases by 20 feet until the end of the turn. For that duration, any creature of your choice takes damage equal to one roll of your Martial Arts die when you enter a space within 5 feet of it. The damage type is your choice of Acid, Cold, Fire, Lightning, or Thunder. A creature can take this damage only once per turn.
          name: Destructive Stride
          type: entries
        - entries:
            - Once on each of your turns, you can deal extra damage to a target equal to one roll of your Martial Arts die when you hit it with an {@variantrule Unarmed Strike|XPHB}. The extra damage is the same type dealt by that strike.
          name: Empowered Strikes
          type: entries
    - class_name: Monk
      class_source: XPHB
      subclass_name: Mercy
      subclass_source: XPHB
      feature: Hand of Harm
      source: XPHB
      level: 3
      entries:
        - Once per turn when you hit a creature with an {@variantrule Unarmed Strike|XPHB} and deal damage, you can expend 1 Focus Point to deal extra Necrotic damage equal to one roll of your Martial Arts die plus your Wisdom modifier.
    - class_name: Monk
      class_source: XPHB
      subclass_name: Mercy
      subclass_source: XPHB
      feature: Hand of Healing
      source: XPHB
      level: 3
      entries:
        - As a {@action Magic|XPHB} action, you can expend 1 Focus Point to touch a creature and restore a number of {@variantrule Hit Points|XPHB} equal to a roll of your Martial Arts die plus your Wisdom modifier. When you use your Flurry of Blows, you can replace one of the Unarmed Strikes with a use of this feature without expending a Focus Point for the healing.
    - class_name: Monk
      class_source: XPHB
      subclass_name: Mercy
      subclass_source: XPHB
      feature: Implements of Mercy
      source: XPHB
      level: 3
      entries:
        - You gain proficiency in the {@skill Insight|XPHB} and {@skill Medicine|XPHB} skills and proficiency with the {@item Herbalism Kit|XPHB}.
    - class_name: Monk
      class_source: XPHB
      subclass_name: Mercy
      subclass_source: XPHB
      feature: Warrior of Mercy
      source: XPHB
      level: 3
      entries:
        - '{@i Manipulate Forces of Life and Death}'
        - Warriors of Mercy manipulate the life force of others. These Monks are wandering physicians, but they bring a swift end to their enemies. They often wear masks, presenting themselves as faceless bringers of life and death.
        - subclassFeature: Hand of Harm|Monk|XPHB|Mercy|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Hand of Healing|Monk|XPHB|Mercy|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Implements of Mercy|Monk|XPHB|Mercy|XPHB|3
          type: refSubclassFeature
    - class_name: Monk
      class_source: XPHB
      subclass_name: Mercy
      subclass_source: XPHB
      feature: Physician's Touch
      source: XPHB
      level: 6
      entries:
        - Your Hand of Harm and Hand of Healing improve, as detailed below.
        - entries:
            - entries:
                - When you use Hand of Harm on a creature, you can also give that creature the {@condition Poisoned|XPHB} condition until the end of your next turn.
              name: Hand of Harm
              type: entries
            - entries:
                - 'When you use Hand of Healing, you can also end one of the following conditions on the creature you heal: {@condition Blinded|XPHB}, {@condition Deafened|XPHB}, {@condition Paralyzed|XPHB}, {@condition Poisoned|XPHB}, or {@condition Stunned|XPHB}.'
              name: Hand of Healing
              type: entries
          type: entries
    - class_name: Monk
      class_source: XPHB
      subclass_name: Mercy
      subclass_source: XPHB
      feature: Flurry of Healing and Harm
      source: XPHB
      level: 11
      entries:
        - When you use Flurry of Blows, you can replace each of the Unarmed Strikes with a use of Hand of Healing without expending Focus Points for the healing.
        - In addition, when you make an {@variantrule Unarmed Strike|XPHB} with Flurry of Blows and deal damage, you can use Hand of Harm with that strike without expending a Focus Point for Hand of Harm. You can still use Hand of Harm only once per turn.
        - You can use these benefits a total number of times equal to your Wisdom modifier (minimum of once). You regain all expended uses when you finish a {@variantrule Long Rest|XPHB}.
    - class_name: Monk
      class_source: XPHB
      subclass_name: Mercy
      subclass_source: XPHB
      feature: Hand of Ultimate Mercy
      source: XPHB
      level: 17
      entries:
        - 'Your mastery of life energy opens the door to the ultimate mercy. As a {@action Magic|XPHB} action, you can touch the corpse of a creature that died within the past 24 hours and expend 5 Focus Points. The creature then returns to life with a number of {@variantrule Hit Points|XPHB} equal to {@dice 4d10} plus your Wisdom modifier. If the creature died with any of the following conditions, the creature revives with the conditions removed: {@condition Blinded|XPHB}, {@condition Deafened|XPHB}, {@condition Paralyzed|XPHB}, {@condition Poisoned|XPHB}, and {@condition Stunned|XPHB}.'
        - Once you use this feature, you can't use it again until you finish a {@variantrule Long Rest|XPHB}.
    - class_name: Monk
      class_source: XPHB
      subclass_name: Open Hand
      subclass_source: XPHB
      feature: Open Hand Technique
      source: XPHB
      level: 3
      entries:
        - Whenever you hit a creature with an attack granted by your Flurry of Blows, you can impose one of the following effects on that target.
        - entries:
            - The target can't make {@action Opportunity Attack|XPHB|Opportunity Attacks} until the start of its next turn.
          name: Addle
          type: entries
        - entries:
            - The target must succeed on a Strength saving throw or be pushed up to 15 feet away from you.
          name: Push
          type: entries
        - entries:
            - The target must succeed on a Dexterity saving throw or have the {@condition Prone|XPHB} condition.
          name: Topple
          type: entries
    - class_name: Monk
      class_source: XPHB
      subclass_name: Open Hand
      subclass_source: XPHB
      feature: Warrior of the Open Hand
      source: XPHB
      level: 3
      entries:
        - '{@i Master Unarmed Combat Techniques}'
        - Warriors of the Open Hand are masters of unarmed combat. They learn techniques to push and trip their opponents and manipulate their own energy to protect themselves from harm.
        - subclassFeature: Open Hand Technique|Monk|XPHB|Open Hand|XPHB|3
          type: refSubclassFeature
    - class_name: Monk
      class_source: XPHB
      subclass_name: Open Hand
      subclass_source: XPHB
      feature: Wholeness of Body
      source: XPHB
      level: 6
      entries:
        - You gain the ability to heal yourself. As a {@variantrule Bonus Action|XPHB}, you can roll your Martial Arts die. You regain a number of {@variantrule Hit Points|XPHB} equal to the number rolled plus your Wisdom modifier (minimum of 1 {@variantrule Hit Points|XPHB|Hit Point} regained).
        - You can use this feature a number of times equal to your Wisdom modifier (minimum of once), and you regain all expended uses when you finish a {@variantrule Long Rest|XPHB}.
    - class_name: Monk
      class_source: XPHB
      subclass_name: Open Hand
      subclass_source: XPHB
      feature: Fleet Step
      source: XPHB
      level: 11
      entries:
        - When you take a {@variantrule Bonus Action|XPHB} other than Step of the Wind, you can also use Step of the Wind immediately after that {@variantrule Bonus Action|XPHB}.
    - class_name: Monk
      class_source: XPHB
      subclass_name: Open Hand
      subclass_source: XPHB
      feature: Quivering Palm
      source: XPHB
      level: 17
      entries:
        - You gain the ability to set up lethal vibrations in someone's body. When you hit a creature with an {@variantrule Unarmed Strike|XPHB}, you can expend 4 Focus Points to start these imperceptible vibrations, which last for a number of days equal to your Monk level. The vibrations are harmless unless you take an action to end them. Alternatively, when you take the {@action Attack|XPHB} action on your turn, you can forgo one of the attacks to end the vibrations. To end them, you and the target must be on the same plane of existence. When you end them, the target must make a Constitution saving throw, taking {@damage 10d12} Force damage on a failed save or half as much damage on a successful one.
        - You can have only one creature under the effect of this feature at a time. You can end the vibrations harmlessly (no action required).
    - class_name: Monk
      class_source: XPHB
      subclass_name: Shadow
      subclass_source: XPHB
      feature: Darkness
      source: XPHB
      level: 3
      entries:
        - You can expend 1 Focus Point to cast the {@spell Darkness|XPHB} spell without spell components. You can see within the spell's area when you cast it with this feature. While the spell persists, you can move its area of {@variantrule Darkness|XPHB} to a space within 60 feet of yourself at the start of each of your turns.
    - class_name: Monk
      class_source: XPHB
      subclass_name: Shadow
      subclass_source: XPHB
      feature: Darkvision
      source: XPHB
      level: 3
      entries:
        - You gain {@sense Darkvision|XPHB} with a range of 60 feet. If you already have {@sense Darkvision|XPHB}, its range increases by 60 feet.
    - class_name: Monk
      class_source: XPHB
      subclass_name: Shadow
      subclass_source: XPHB
      feature: Shadow Arts
      source: XPHB
      level: 3
      entries:
        - You have learned to draw on the power of the Shadowfell, gaining the following benefits.
        - subclassFeature: Darkness|Monk|XPHB|Shadow|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Darkvision|Monk|XPHB|Shadow|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Shadowy Figments|Monk|XPHB|Shadow|XPHB|3
          type: refSubclassFeature
    - class_name: Monk
      class_source: XPHB
      subclass_name: Shadow
      subclass_source: XPHB
      feature: Shadowy Figments
      source: XPHB
      level: 3
      entries:
        - You know the {@spell Minor Illusion|XPHB} spell. Wisdom is your spellcasting ability for it.
    - class_name: Monk
      class_source: XPHB
      subclass_name: Shadow
      subclass_source: XPHB
      feature: Warrior of Shadow
      source: XPHB
      level: 3
      entries:
        - '{@i Harness Shadow Power for Stealth and Subterfuge}'
        - Warriors of Shadow practice stealth and subterfuge, harnessing the power of the Shadowfell. They are at home in darkness, able to draw gloom around themselves to hide, leap from shadow to shadow, and take on a wraithlike form.
        - subclassFeature: Shadow Arts|Monk|XPHB|Shadow|XPHB|3
          type: refSubclassFeature
    - class_name: Monk
      class_source: XPHB
      subclass_name: Shadow
      subclass_source: XPHB
      feature: Shadow Step
      source: XPHB
      level: 6
      entries:
        - While entirely within {@variantrule Dim Light|XPHB} or {@variantrule Darkness|XPHB}, you can use a {@variantrule Bonus Action|XPHB} to teleport up to 60 feet to an unoccupied space you can see that is also in {@variantrule Dim Light|XPHB} or {@variantrule Darkness|XPHB}. You then have {@variantrule Advantage|XPHB} on the next melee attack you make before the end of the current turn.
    - class_name: Monk
      class_source: XPHB
      subclass_name: Shadow
      subclass_source: XPHB
      feature: Improved Shadow Step
      source: XPHB
      level: 11
      entries:
        - You can draw on your Shadowfell connection to empower your teleportation. When you use your Shadow Step, you can expend 1 Focus Point to remove the requirement that you must start and end in {@variantrule Dim Light|XPHB} or {@variantrule Darkness|XPHB} for that use of the feature. As part of this {@variantrule Bonus Action|XPHB}, you can make an {@variantrule Unarmed Strike|XPHB} immediately after you teleport.
    - class_name: Monk
      class_source: XPHB
      subclass_name: Shadow
      subclass_source: XPHB
      feature: Cloak of Shadows
      source: XPHB
      level: 17
      entries:
        - As a {@action Magic|XPHB} action while entirely within {@variantrule Dim Light|XPHB} or {@variantrule Darkness|XPHB}, you can expend 3 Focus Points to shroud yourself with shadows for 1 minute, until you have the {@condition Incapacitated|XPHB} condition, or until you end your turn in {@variantrule Bright Light|XPHB}. While shrouded by these shadows, you gain the following benefits.
        - entries:
            - You have the {@condition Invisible|XPHB} condition.
          name: Invisibility
          type: entries
        - entries:
            - You can move through occupied spaces as if they were {@variantrule Difficult Terrain|XPHB}. If you end your turn in such a space, you are shunted to the last unoccupied space you were in.
          name: Partially Incorporeal
          type: entries
        - entries:
            - You can use your Flurry of Blows without expending any Focus Points.
          name: Shadow Flurry
          type: entries
    - class_name: Mystic
      class_source: UATheMysticClass
      subclass_name: Avatar
      subclass_source: UATheMysticClass
      feature: Armor Training
      source: UATheMysticClass
      level: 1
      entries:
        - At 1st level, you gain proficiency with medium armor and shields.
    - class_name: Mystic
      class_source: UATheMysticClass
      subclass_name: Avatar
      subclass_source: UATheMysticClass
      feature: Bonus Disciplines
      source: UATheMysticClass
      level: 1
      entries:
        - At 1st level, you learn two additional psionic disciplines of your choice. They must be chosen from among the {@filter Avatar disciplines|psionics|type=D|order=Avatar}.
    - class_name: Mystic
      class_source: UATheMysticClass
      subclass_name: Avatar
      subclass_source: UATheMysticClass
      feature: Order of the Avatar
      source: UATheMysticClass
      level: 1
      entries:
        - Mystics of the Order of the Avatar delve into the world of emotion, mastering their inner life to such an extent that they can manipulate and amplify the emotions of others with the same ease that an artist shapes clay. Known as Avatars, these mystics vary from tyrants to inspiring leaders who are loved by their followers.
        - Avatars can bring out extreme emotions in the people around them. For their allies, they can lend hope, ferocity, and courage, transforming a fighting band into a deadly, unified force. For their enemies, they bring fear, disgust, and trepidation that can make even the most hardened veteran act like a shaky rookie.
        - subclassFeature: Bonus Disciplines|Mystic|UATheMysticClass|Avatar|UATheMysticClass|1
          type: refSubclassFeature
        - subclassFeature: Armor Training|Mystic|UATheMysticClass|Avatar|UATheMysticClass|1
          type: refSubclassFeature
    - class_name: Mystic
      class_source: UATheMysticClass
      subclass_name: Avatar
      subclass_source: UATheMysticClass
      feature: Avatar of Battle
      source: UATheMysticClass
      level: 3
      entries:
        - Starting at 3rd level, you project an inspiring aura. While you aren't {@condition incapacitated}, each ally within 30 feet of you who can see you gains a +2 bonus to initiative rolls.
    - class_name: Mystic
      class_source: UATheMysticClass
      subclass_name: Avatar
      subclass_source: UATheMysticClass
      feature: Avatar of Healing
      source: UATheMysticClass
      level: 6
      entries:
        - Beginning at 6th level, you project an aura of resilience. While you aren't {@condition incapacitated}, each ally within 30 feet of you who can see you regains additional hit points equal to your Intelligence modifier (minimum of 0) whenever they regain hit points from a psionic discipline.
    - class_name: Mystic
      class_source: UATheMysticClass
      subclass_name: Avatar
      subclass_source: UATheMysticClass
      feature: Avatar of Speed
      source: UATheMysticClass
      level: 14
      entries:
        - Starting at 14th level, you project an aura of speed. While you aren't {@condition incapacitated}, any ally within 30 feet of you who can see you can take the {@action Dash} action as a bonus action.
    - class_name: Mystic
      class_source: UATheMysticClass
      subclass_name: Awakened
      subclass_source: UATheMysticClass
      feature: Awakened Talent
      source: UATheMysticClass
      level: 1
      entries:
        - 'At 1st level, you gain proficiency with two of the following skills of your choice: {@skill Animal Handling}, {@skill Deception}, {@skill Insight}, {@skill Intimidation}, {@skill Investigation}, {@skill Perception}, and {@skill Persuasion}.'
    - class_name: Mystic
      class_source: UATheMysticClass
      subclass_name: Awakened
      subclass_source: UATheMysticClass
      feature: Bonus Disciplines
      source: UATheMysticClass
      level: 1
      entries:
        - At 1st level, you learn two additional psionic disciplines of your choice. They must be chosen from among the {@filter Awakened disciplines|psionics|type=D|order=Awakened}.
    - class_name: Mystic
      class_source: UATheMysticClass
      subclass_name: Awakened
      subclass_source: UATheMysticClass
      feature: Order of the Awakened
      source: UATheMysticClass
      level: 1
      entries:
        - Mystics dedicated to the Order of the Awakened seek to unlock the full potential of the mind. By transcending the physical, the Awakened hope to attain a state of being focused on pure intellect and mental energy.
        - The Awakened are skilled at bending minds and unleashing devastating psionic attacks, and they can read the secrets of the world through psionic energy. Awakened mystics who take to adventuring excel at unraveling mysteries, solving puzzles, and defeating monsters by turning them into unwilling pawns.
        - subclassFeature: Bonus Disciplines|Mystic|UATheMysticClass|Awakened|UATheMysticClass|1
          type: refSubclassFeature
        - subclassFeature: Awakened Talent|Mystic|UATheMysticClass|Awakened|UATheMysticClass|1
          type: refSubclassFeature
    - class_name: Mystic
      class_source: UATheMysticClass
      subclass_name: Awakened
      subclass_source: UATheMysticClass
      feature: Psionic Investigation
      source: UATheMysticClass
      level: 3
      entries:
        - Starting at 3rd level, you can focus your mind to read the psionic imprint left on an object. If you hold an object and concentrate on it for 10 minutes (as if {@status concentration||concentrating} on a psionic discipline), you learn a few basic facts about it. You gain a mental image from the object's point of view, showing the last creature to hold the object within the past 24 hours.
        - You also learn of any events that have occurred within 20 feet of the object within the past hour. The events you perceive unfold from the object's perspective. You see and hear such events as if you were there, but can't use other senses.
        - Additionally, you can embed an intangible psionic sensor within the object. For the next 24 hours, you can use an action to learn the object's location relative to you (its distance and direction) and to look at the object's surroundings from its point of view as if you were there. This perception lasts until the start of your next turn.
        - Once you use this feature, you can't use it again until you finish a short or long rest.
    - class_name: Mystic
      class_source: UATheMysticClass
      subclass_name: Awakened
      subclass_source: UATheMysticClass
      feature: Psionic Surge
      source: UATheMysticClass
      level: 6
      entries:
        - Starting at 6th level, you can overload your psychic focus to batter down an opponent's defenses. You can impose disadvantage on a target's saving throw against a discipline or talent you use, but at the cost of using your psychic focus. Your psychic focus immediately ends if it's active, and you can't use it until you finish a short or long rest.
        - You can't use this feature if you can't use your psychic focus.
    - class_name: Mystic
      class_source: UATheMysticClass
      subclass_name: Awakened
      subclass_source: UATheMysticClass
      feature: Spectral Form
      source: UATheMysticClass
      level: 14
      entries:
        - At 14th level, you gain the ability to become a ghostly figure of psionic energy. As an action, you can transform into a transparent, ghostly version of yourself. While in this form, you have resistance to all damage, move at half speed, and can pass through objects and creatures while moving but can't willingly end your movement in their spaces. The form lasts for 10 minutes or until you use an action to end it.
        - Once you use this feature, you can't use it again until you finish a long rest.
    - class_name: Mystic
      class_source: UATheMysticClass
      subclass_name: Immortal
      subclass_source: UATheMysticClass
      feature: Bonus Disciplines
      source: UATheMysticClass
      level: 1
      entries:
        - At 1st level, you learn two additional psionic disciplines of your choice. They must be chosen from among the {@filter Immortal disciplines|psionics|type=D|order=Immortal}.
    - class_name: Mystic
      class_source: UATheMysticClass
      subclass_name: Immortal
      subclass_source: UATheMysticClass
      feature: Immortal Durability
      source: UATheMysticClass
      level: 1
      entries:
        - Starting at 1st level, your hit point maximum increases by 1 per mystic level.
        - In addition, while you aren't wearing armor or wielding a shield, your base AC equals 10 + your Dexterity modifier + your Constitution modifier.
    - class_name: Mystic
      class_source: UATheMysticClass
      subclass_name: Immortal
      subclass_source: UATheMysticClass
      feature: Order of the Immortal
      source: UATheMysticClass
      level: 1
      entries:
        - The Order of the Immortal uses psionic energy to augment and modify the physical form. Followers of this order are known as Immortals. They use psionic energy to modify their bodies, strengthening them against attack and turning themselves into living weapons.
        - Their mastery of the physical form grants them their name, for Immortals are notoriously difficult to kill.
        - subclassFeature: Bonus Disciplines|Mystic|UATheMysticClass|Immortal|UATheMysticClass|1
          type: refSubclassFeature
        - subclassFeature: Immortal Durability|Mystic|UATheMysticClass|Immortal|UATheMysticClass|1
          type: refSubclassFeature
    - class_name: Mystic
      class_source: UATheMysticClass
      subclass_name: Immortal
      subclass_source: UATheMysticClass
      feature: Psionic Resilience
      source: UATheMysticClass
      level: 3
      entries:
        - Starting at 3rd level, your psionic energy grants you extraordinary fortitude. At the start of each of your turns, you gain temporary hit points equal to your Intelligence modifier (minimum of 0) if you have at least 1 hit point.
    - class_name: Mystic
      class_source: UATheMysticClass
      subclass_name: Immortal
      subclass_source: UATheMysticClass
      feature: Surge of Health
      source: UATheMysticClass
      level: 6
      entries:
        - Starting at 6th level, you can draw on your psychic focus to escape death's grasp. As a reaction when you take damage, you can halve that damage against you. Your psychic focus immediately ends if it's active, and you can't use it until you finish a short or long rest.
        - You can't use this feature if you can't use your psychic focus.
    - class_name: Mystic
      class_source: UATheMysticClass
      subclass_name: Immortal
      subclass_source: UATheMysticClass
      feature: Immortal Will
      source: UATheMysticClass
      level: 14
      entries:
        - Starting at 14th level, you can draw on your reserves of psionic power to survive beyond death. At the end of your turn while at 0 hit points, you can spend 5 psi points to immediately regain a number of hit points equal to your mystic level + your Constitution modifier.
    - class_name: Mystic
      class_source: UATheMysticClass
      subclass_name: Nomad
      subclass_source: UATheMysticClass
      feature: Bonus Disciplines
      source: UATheMysticClass
      level: 1
      entries:
        - At 1st level, you learn two additional psionic disciplines of your choice. They must be chosen from among the {@filter Nomad disciplines|psionics|type=D|order=Nomad}.
    - class_name: Mystic
      class_source: UATheMysticClass
      subclass_name: Nomad
      subclass_source: UATheMysticClass
      feature: Breadth of Knowledge
      source: UATheMysticClass
      level: 1
      entries:
        - 'At 1st level, you gain the ability to extend your knowledge. When you finish a long rest, you gain two proficiencies of your choice: two tools, two skills, or one of each. You can replace one or both of these selections with languages. This benefit lasts until you finish a long rest.'
    - class_name: Mystic
      class_source: UATheMysticClass
      subclass_name: Nomad
      subclass_source: UATheMysticClass
      feature: Order of the Nomad
      source: UATheMysticClass
      level: 1
      entries:
        - Mystics of the Order of the Nomad keep their minds in a strange, rarified state. They seek to accumulate as much knowledge as possible, as they quest to unravel the mysteries of the multiverse and seek the underlying structure of all things. At the same time, they perceive a bizarre, living web of knowledge they call the noosphere.
        - Nomads, as their name indicates, delight in travel, exploration, and discovery. They desire to accumulate as much knowledge as possible, and the pursuit of secrets and hidden lore can become an obsession for them.
        - subclassFeature: Bonus Disciplines|Mystic|UATheMysticClass|Nomad|UATheMysticClass|1
          type: refSubclassFeature
        - subclassFeature: Breadth of Knowledge|Mystic|UATheMysticClass|Nomad|UATheMysticClass|1
          type: refSubclassFeature
    - class_name: Mystic
      class_source: UATheMysticClass
      subclass_name: Nomad
      subclass_source: UATheMysticClass
      feature: Memory of One Thousand Steps
      source: UATheMysticClass
      level: 3
      entries:
        - At 3rd level, you gain the ability to use psionics to recall your steps. As a reaction when you are hit by an attack, you can teleport to an unoccupied space that you occupied since the start of your last turn, and the attack misses you. Once you use this feature, you can't use it again until you finish a short or long rest.
    - class_name: Mystic
      class_source: UATheMysticClass
      subclass_name: Nomad
      subclass_source: UATheMysticClass
      feature: Superior Teleportation
      source: UATheMysticClass
      level: 6
      entries:
        - At 6th level, you gain a superior talent for teleportation. When you use a psionic discipline to teleport any distance, you can increase that distance by up to 10 feet.
    - class_name: Mystic
      class_source: UATheMysticClass
      subclass_name: Nomad
      subclass_source: UATheMysticClass
      feature: Effortless Journey
      source: UATheMysticClass
      level: 14
      entries:
        - Starting at 14th level, your mind can mystically move your body. Once on each of your turns, you can forfeit up to 30 feet of your movement to teleport the distance you forfeited. You must teleport to an unoccupied space you can see.
    - class_name: Mystic
      class_source: UATheMysticClass
      subclass_name: Soul Knife
      subclass_source: UATheMysticClass
      feature: Martial Training
      source: UATheMysticClass
      level: 1
      entries:
        - At 1st level, you gain proficiency with medium armor and martial weapons.
    - class_name: Mystic
      class_source: UATheMysticClass
      subclass_name: Soul Knife
      subclass_source: UATheMysticClass
      feature: Order of the Soul Knife
      source: UATheMysticClass
      level: 1
      entries:
        - The Order of the Soul Knife sacrifices the breadth of knowledge other mystics gain to focus on a specific psionic technique. These mystics learn to manifest a deadly weapon of pure psychic energy that they can use to cleave through foes.
        - Soul knives vary widely in their approach to this path. Some follow it out of a desire to achieve martial perfection. Others are ruthless assassins who seek to become the perfect killer.
        - subclassFeature: Martial Training|Mystic|UATheMysticClass|Soul Knife|UATheMysticClass|1
          type: refSubclassFeature
        - subclassFeature: Soul Knife|Mystic|UATheMysticClass|Soul Knife|UATheMysticClass|1
          type: refSubclassFeature
    - class_name: Mystic
      class_source: UATheMysticClass
      subclass_name: Soul Knife
      subclass_source: UATheMysticClass
      feature: Soul Knife
      source: UATheMysticClass
      level: 1
      entries:
        - Starting at 1st level, you gain the ability to manifest a blade of psychic energy. As a bonus action, you create scintillating knives of energy that project from both of your fists. You can't hold anything in your hands while manifesting these blades. You can dismiss them as a bonus action.
        - For you, a soul knife is a martial melee weapon with the light and finesse properties. It deals {@damage 1d8} psychic damage on a hit.
        - As a bonus action, you can prepare to use the blades to parry; you gain a +2 bonus to AC until the start of your next turn or until you are {@condition incapacitated}.
    - class_name: Mystic
      class_source: UATheMysticClass
      subclass_name: Soul Knife
      subclass_source: UATheMysticClass
      feature: Hone the Blade
      source: UATheMysticClass
      level: 3
      entries:
        - Starting at 3rd level, you can spend psi points to augment your soul knife's attack rolls and damage. You gain a bonus to attack and damage rolls with your soul knives depending on the number of psi points spent, as shown on the table below. This bonus lasts for 10 minutes.
        - colLabels:
            - Psi Points
            - Attack and Damage Bonus
          colStyles:
            - col-6 text-center
            - col-6 text-center
          rows:
            - - "2"
              - "+1"
            - - "5"
              - "+2"
            - - "7"
              - "+4"
          type: table
    - class_name: Mystic
      class_source: UATheMysticClass
      subclass_name: Soul Knife
      subclass_source: UATheMysticClass
      feature: Consumptive Knife
      source: UATheMysticClass
      level: 6
      entries:
        - Starting at 6th level, whenever you slay an enemy creature with a soul knife attack, you immediately regain 2 psi points.
    - class_name: Mystic
      class_source: UATheMysticClass
      subclass_name: Soul Knife
      subclass_source: UATheMysticClass
      feature: Phantom Knife
      source: UATheMysticClass
      level: 14
      entries:
        - Starting at 14th level, you can make an attack that phases through most defenses. As an action, you can make one attack with your soul knife. Treat the target's AC as 10 against this attack, regardless of the target's actual AC.
    - class_name: Mystic
      class_source: UATheMysticClass
      subclass_name: Wu Jen
      subclass_source: UATheMysticClass
      feature: Bonus Disciplines
      source: UATheMysticClass
      level: 1
      entries:
        - At 1st level, you learn two additional psionic disciplines of your choice. They must be chosen from among the {@filter Wu Jen disciplines|psionics|type=D|order=Wu Jen}.
    - class_name: Mystic
      class_source: UATheMysticClass
      subclass_name: Wu Jen
      subclass_source: UATheMysticClass
      feature: Hermit's Study
      source: UATheMysticClass
      level: 1
      entries:
        - 'At 1st level, you gain proficiency with two of the following skills of your choice: {@skill Animal Handling}, {@skill Arcana}, {@skill History}, {@skill Insight}, {@skill Medicine}, {@skill Nature}, {@skill Perception}, {@skill Religion}, or {@skill Survival}.'
    - class_name: Mystic
      class_source: UATheMysticClass
      subclass_name: Wu Jen
      subclass_source: UATheMysticClass
      feature: Order of the Wu Jen
      source: UATheMysticClass
      level: 1
      entries:
        - The Order of the Wu Jen features some of the most devoted mystics. These mystics seek to lock themselves away from the world, denying the limits of the physical world and replacing it with a reality that they create for themselves. Known as wu jens, these mystics cast their minds into the world, seize control of its fundamental principles, and rebuild it.
        - In practical terms, wu jens excel at controlling the forces of the natural world. They can hurl objects with their minds, control the four elements, and alter reality to fit their desires.
        - subclassFeature: Bonus Disciplines|Mystic|UATheMysticClass|Wu Jen|UATheMysticClass|1
          type: refSubclassFeature
        - subclassFeature: Hermit's Study|Mystic|UATheMysticClass|Wu Jen|UATheMysticClass|1
          type: refSubclassFeature
    - class_name: Mystic
      class_source: UATheMysticClass
      subclass_name: Wu Jen
      subclass_source: UATheMysticClass
      feature: Elemental Attunement
      source: UATheMysticClass
      level: 3
      entries:
        - Starting at 3rd level, when a creature's resistance reduces the damage dealt by a psionic discipline of yours, you can spend 1 psi point to cause that use of the discipline to ignore the creature's resistance. You can't spend this point if doing so would increase the discipline's cost above your psi limit.
    - class_name: Mystic
      class_source: UATheMysticClass
      subclass_name: Wu Jen
      subclass_source: UATheMysticClass
      feature: Arcane Dabbler
      source: UATheMysticClass
      level: 6
      entries:
        - At 6th level, you learn three wizard spells of your choice and always have them prepared. The spells must be of {@filter 1st through 3rd level|spells|level=1;2;3|class=wizard}.
        - As a bonus action, you can spend psi points to create spell slots that you can use to cast these spells, as well as other spells you are capable of casting. The psi-point cost of each spell slot is detailed on the table below.
        - colLabels:
            - Spell Slot Level
            - Psi Cost
          colStyles:
            - col-6 text-center
            - col-6 text-center
          rows:
            - - 1st
              - "2"
            - - 2nd
              - "3"
            - - 3rd
              - "5"
            - - 4th
              - "6"
            - - 5th
              - "7"
          type: table
        - The spell slot remains until you use it or finish a long rest. You must observe your psi limit when spending psi points to create a spell slot.
        - Whenever you gain a level in this class, you can replace on of the chosen wizard spells with a different {@filter wizard spell of 1st through 3rd level|spells|level=1;2;3|class=wizard}.
    - class_name: Mystic
      class_source: UATheMysticClass
      subclass_name: Wu Jen
      subclass_source: UATheMysticClass
      feature: Elemental Mastery
      source: UATheMysticClass
      level: 14
      entries:
        - Starting at 14th level, if you have resistance to a type of damage, you can spend 2 psi points as a reaction when you take damage of that type to ignore that damage; you gain immunity to that damage type until the end of your next turn.
    - class_name: Paladin
      class_source: PHB
      subclass_name: Ancients
      subclass_source: PHB
      feature: Channel Divinity
      source: PHB
      level: 3
      entries:
        - When you take this oath at 3rd level, you gain the following two Channel Divinity options.
        - subclassFeature: Nature's Wrath|Paladin||Ancients||3
          type: refSubclassFeature
        - subclassFeature: Turn the Faithless|Paladin||Ancients||3
          type: refSubclassFeature
    - class_name: Paladin
      class_source: PHB
      subclass_name: Ancients
      subclass_source: PHB
      feature: Nature's Wrath
      source: PHB
      level: 3
      entries:
        - You can use your Channel Divinity to invoke primeval forces to ensnare a foe. As an action, you can cause spectral vines to spring up and reach for a creature within 10 feet of you that you can see. The creature must succeed on a Strength or Dexterity saving throw (its choice) or be {@condition restrained}. While {@condition restrained} by the vines, the creature repeats the saving throw at the end of each of its turns. On a success, it frees itself and the vines vanish.
    - class_name: Paladin
      class_source: PHB
      subclass_name: Ancients
      subclass_source: PHB
      feature: Oath of the Ancients
      source: PHB
      level: 3
      entries:
        - The Oath of the Ancients is as old as the race of elves and the rituals of the druids. Sometimes called fey knights, green knights, or horned knights, paladins who swear this oath cast their lot with the side of the light in the cosmic struggle against darkness because they love the beautiful and life-giving things of the world, not necessarily because they believe in principles of honor, courage, and justice. They adorn their armor and clothing with images of growing things—leaves, antlers, or flowers—to reflect their commitment to preserving life and light in the world.
        - subclassFeature: Tenets of the Ancients|Paladin||Ancients||3
          type: refSubclassFeature
        - subclassFeature: Oath Spells|Paladin||Ancients||3
          type: refSubclassFeature
        - subclassFeature: Channel Divinity|Paladin||Ancients||3
          type: refSubclassFeature
    - class_name: Paladin
      class_source: PHB
      subclass_name: Ancients
      subclass_source: PHB
      feature: Oath Spells
      source: PHB
      level: 3
      entries:
        - You gain oath spells at the paladin levels listed.
        - caption: Oath of the Ancients Spells
          colLabels:
            - Paladin Level
            - Spells
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - 3rd
              - '{@spell ensnaring strike}, {@spell speak with animals}'
            - - 5th
              - '{@spell moonbeam}, {@spell misty step}'
            - - 9th
              - '{@spell plant growth}, {@spell protection from energy}'
            - - 13th
              - '{@spell ice storm}, {@spell stoneskin}'
            - - 17th
              - '{@spell commune with nature}, {@spell tree stride}'
          type: table
    - class_name: Paladin
      class_source: PHB
      subclass_name: Ancients
      subclass_source: PHB
      feature: Tenets of the Ancients
      source: PHB
      level: 3
      entries:
        - The tenets of the Oath of the Ancients have been preserved for uncounted centuries. This oath emphasizes the principles of good above any concerns of law or chaos. Its four central principles are simple.
        - entries:
            - entries:
                - Through your acts of mercy, kindness, and forgiveness, kindle the light of hope in the world, beating back despair.
              name: Kindle the Light
              type: entries
          type: entries
        - entries:
            - entries:
                - Where there is good, beauty, love, and laughter in the world, stand against the wickedness that would swallow it. Where life flourishes, stand against the forces that would render it barren.
              name: Shelter the Light
              type: entries
          type: entries
        - entries:
            - entries:
                - Delight in song and laughter, in beauty and art. If you allow the light to die in your own heart, you can't preserve it in the world.
              name: Preserve Your Own Light
              type: entries
          type: entries
        - entries:
            - entries:
                - Be a glorious beacon for all who live in despair. Let the light of your joy and courage shine forth in all your deeds.
              name: Be the Light
              type: entries
          type: entries
    - class_name: Paladin
      class_source: PHB
      subclass_name: Ancients
      subclass_source: PHB
      feature: Turn the Faithless
      source: PHB
      level: 3
      entries:
        - You can use your Channel Divinity to utter ancient words that are painful for fey and fiends to hear. As an action, you present your holy symbol, and each fey or fiend within 30 feet of you that can hear you must make a Wisdom saving throw. On a failed save, the creature is turned for 1 minute or until it takes damage.
        - A turned creature must spend its turns trying to move as far away from you as it can, and it can't willingly move to a space within 30 feet of you. It also can't take reactions. For its action, it can use only the {@action Dash} action or try to escape from an effect that prevents it from moving. If there's nowhere to move, the creature can use the {@action Dodge} action.
        - If the creature's true form is concealed by an illusion, shapeshifting, or other effect, that form is revealed while it is turned.
    - class_name: Paladin
      class_source: PHB
      subclass_name: Ancients
      subclass_source: PHB
      feature: Aura of Warding
      source: PHB
      level: 7
      entries:
        - Beginning at 7th level, ancient magic lies so heavily upon you that it forms an eldritch ward. You and friendly creatures within 10 feet of you have resistance to damage from spells.
        - At 18th level, the range of this aura increases to 30 feet.
    - class_name: Paladin
      class_source: PHB
      subclass_name: Ancients
      subclass_source: PHB
      feature: Undying Sentinel
      source: PHB
      level: 15
      entries:
        - Starting at 15th level, when you are reduced to 0 hit points and are not killed outright, you can choose to drop to 1 hit point instead. Once you use this ability, you can't use it again until you finish a long rest.
        - Additionally, you suffer none of the drawbacks of old age, and you can't be aged magically.
    - class_name: Paladin
      class_source: PHB
      subclass_name: Ancients
      subclass_source: PHB
      feature: Elder Champion
      source: PHB
      level: 20
      entries:
        - At 20th level, you can assume the form of an ancient force of nature, taking on an appearance you choose. For example, your skin might turn green or take on a bark-like texture, your hair might become leafy or moss-like, or you might sprout antlers or a lion-like mane.
        - 'Using your action, you undergo a transformation. For 1 minute, you gain the following benefits:'
        - items:
            - At the start of each of your turns, you regain 10 hit points.
            - Whenever you cast a paladin spell that has a casting time of 1 action, you can cast it using your bonus action instead.
            - Enemy creatures within 10 feet of you have disadvantage on saving throws against your paladin spells and Channel Divinity options.
          type: list
        - Once you use this feature, you can't use it again until you finish a long rest.
    - class_name: Paladin
      class_source: PHB
      subclass_name: Conquest
      subclass_source: XGE
      feature: Channel Divinity
      source: XGE
      level: 3
      entries:
        - When you take this oath at 3rd level, you gain the following two Channel Divinity options.
        - subclassFeature: Conquering Presence|Paladin||Conquest|XGE|3
          type: refSubclassFeature
        - subclassFeature: Guided Strike|Paladin||Conquest|XGE|3
          type: refSubclassFeature
    - class_name: Paladin
      class_source: PHB
      subclass_name: Conquest
      subclass_source: XGE
      feature: Conquering Presence
      source: XGE
      level: 3
      entries:
        - You can use your Channel Divinity to exude a terrifying presence. As an action, you force each creature of your choice that you can see within 30 feet of you to make a Wisdom saving throw. On a failed save, a creature becomes {@condition frightened} of you for 1 minute. The {@condition frightened} creature can repeat this saving throw at the end of each of its turns, ending the effect on itself on a success.
    - class_name: Paladin
      class_source: PHB
      subclass_name: Conquest
      subclass_source: XGE
      feature: Guided Strike
      source: XGE
      level: 3
      entries:
        - You can use your Channel Divinity to strike with supernatural accuracy. When you make an attack roll, you can use your Channel Divinity to gain a +10 bonus to the roll. You make this choice after you see the roll, but before the DM says whether the attack hits or misses.
    - class_name: Paladin
      class_source: PHB
      subclass_name: Conquest
      subclass_source: XGE
      feature: Oath of Conquest
      source: XGE
      level: 3
      entries:
        - The Oath of Conquest calls to paladins who seek glory in battle and the subjugation of their enemies. It isn't enough for these paladins to establish order. They must crush the forces of chaos. Sometimes called knight tyrants or iron mongers, those who swear this oath gather into grim orders that serve gods or philosophies of war and well-ordered might.
        - Some of these paladins go so far as to consort with the powers of the Nine Hells, valuing the rule of law over the balm of mercy. The archdevil Bel, warlord of Avernus, counts many of these paladins—called hell knights—as his most ardent supporters. Hell knights cover their armor with trophies taken from fallen enemies, a grim warning to any who dare oppose them and the decrees of their lords. These knights are often most fiercely resisted by other paladins of this oath, who believe that the hell knights have wandered too far into darkness.
        - subclassFeature: Tenets of Conquest|Paladin||Conquest|XGE|3
          type: refSubclassFeature
        - subclassFeature: Oath Spells|Paladin||Conquest|XGE|3
          type: refSubclassFeature
        - subclassFeature: Channel Divinity|Paladin||Conquest|XGE|3
          type: refSubclassFeature
    - class_name: Paladin
      class_source: PHB
      subclass_name: Conquest
      subclass_source: XGE
      feature: Oath Spells
      source: XGE
      level: 3
      entries:
        - You gain oath spells at the paladin levels listed.
        - caption: Oath of Conquest Spells
          colLabels:
            - Paladin Level
            - Spells
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - 3rd
              - '{@spell armor of Agathys}, {@spell command}'
            - - 5th
              - '{@spell hold person}, {@spell spiritual weapon}'
            - - 9th
              - '{@spell bestow curse}, {@spell fear}'
            - - 13th
              - '{@spell dominate beast}, {@spell stoneskin}'
            - - 17th
              - '{@spell cloudkill}, {@spell dominate person}'
          type: table
    - class_name: Paladin
      class_source: PHB
      subclass_name: Conquest
      subclass_source: XGE
      feature: Tenets of Conquest
      source: XGE
      level: 3
      entries:
        - A paladin who takes this oath has the tenets of conquest seared on the upper arm.
        - entries:
            - entries:
                - It is not enough to merely defeat an enemy in battle. Your victory must be so overwhelming that your enemies' will to fight is shattered forever. A blade can end a life. Fear can end an empire.
              name: Douse the Flame of Hope
              type: entries
            - entries:
                - Once you have conquered, tolerate no dissent. Your word is law. Those who obey it shall be favored. Those who defy it shall be punished as an example to all who might follow.
              name: Rule with an Iron Fist
              type: entries
            - entries:
                - You shall rule until a stronger one arises. Then you must grow mightier and meet the challenge, or fall to your own ruin.
              name: Strength Above All
              type: entries
          type: entries
    - class_name: Paladin
      class_source: PHB
      subclass_name: Conquest
      subclass_source: XGE
      feature: Aura of Conquest
      source: XGE
      level: 7
      entries:
        - Starting at 7th level, you constantly emanate a menacing aura while you're not {@condition incapacitated}. The aura extends 10 feet from you in every direction, but not through {@quickref Cover||3||total cover}.
        - If a creature is {@condition frightened} of you, its speed is reduced to 0 while in the aura, and that creature takes psychic damage equal to half your paladin level if it starts its turn there.
        - At 18th level, the range of this aura increases to 30 feet.
    - class_name: Paladin
      class_source: PHB
      subclass_name: Conquest
      subclass_source: XGE
      feature: Scornful Rebuke
      source: XGE
      level: 15
      entries:
        - Starting at 15th level, those who dare to strike you are psychically punished for their audacity. Whenever a creature hits you with an attack, that creature takes psychic damage equal to your Charisma modifier (minimum of 1) if you're not {@condition incapacitated}.
    - class_name: Paladin
      class_source: PHB
      subclass_name: Conquest
      subclass_source: XGE
      feature: Invincible Conqueror
      source: XGE
      level: 20
      entries:
        - 'At 20th level, you gain the ability to harness extraordinary martial prowess. As an action, you can magically become an avatar of conquest, gaining the following benefits for 1 minute:'
        - items:
            - You have resistance to all damage.
            - When you take the {@action Attack} action on your turn, you can make one additional attack as part of that action.
            - Your melee weapon attacks score a critical hit on a roll of 19 or 20 on the {@dice d20}.
          type: list
        - Once you use this feature, you can't use it again until you finish a long rest.
    - class_name: Paladin
      class_source: PHB
      subclass_name: Crown
      subclass_source: SCAG
      feature: Champion Challenge
      source: SCAG
      level: 3
      entries:
        - As a bonus action, you issue a challenge that compels other creatures to do battle with you. Each creature of your choice that you can see within 30 feet of you must make a Wisdom saving throw. On a failed save, a creature can't willingly move more than 30 feet away from you. This effect ends on the creature if you are {@condition incapacitated} or die or if the creature is more than 30 feet away from you.
    - class_name: Paladin
      class_source: PHB
      subclass_name: Crown
      subclass_source: SCAG
      feature: Channel Divinity
      source: SCAG
      level: 3
      entries:
        - When you take this oath at 3rd level, you gain the following two Channel Divinity options.
        - subclassFeature: Champion Challenge|Paladin||Crown|SCAG|3
          type: refSubclassFeature
        - subclassFeature: Turn the Tide|Paladin||Crown|SCAG|3
          type: refSubclassFeature
    - class_name: Paladin
      class_source: PHB
      subclass_name: Crown
      subclass_source: SCAG
      feature: Oath of the Crown
      source: SCAG
      level: 3
      entries:
        - The Oath of the Crown is sworn to the ideals of civilization, be it the spirit of a nation, fealty to a sovereign, or service to a deity of law and rulership. The paladins who swear this oath dedicate themselves to serving society and, in particular, the laws that hold society together. These paladins are the watchful guardians on the walls, standing against the chaotic tides of barbarism that threaten to tear down all that civilization has built, and are commonly known as guardians, exemplars, or sentinels. Often, paladins who swear this oath are members of an order of knighthood in service to a nation or sovereign, and undergo their oath as part of their admission to the order's ranks.
        - subclassFeature: Tenets of the Crown|Paladin||Crown|SCAG|3
          type: refSubclassFeature
        - subclassFeature: Oath Spells|Paladin||Crown|SCAG|3
          type: refSubclassFeature
        - subclassFeature: Channel Divinity|Paladin||Crown|SCAG|3
          type: refSubclassFeature
    - class_name: Paladin
      class_source: PHB
      subclass_name: Crown
      subclass_source: SCAG
      feature: Oath Spells
      source: SCAG
      level: 3
      entries:
        - You gain oath spells at the paladin levels listed.
        - caption: Oath of the Crown Spells
          colLabels:
            - Paladin Level
            - Spells
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - 3rd
              - '{@spell command}, {@spell compelled duel}'
            - - 5th
              - '{@spell warding bond}, {@spell zone of truth}'
            - - 9th
              - '{@spell aura of vitality}, {@spell spirit guardians}'
            - - 13th
              - '{@spell banishment}, {@spell guardian of faith}'
            - - 17th
              - '{@spell circle of power}, {@spell geas}'
          type: table
    - class_name: Paladin
      class_source: PHB
      subclass_name: Crown
      subclass_source: SCAG
      feature: Tenets of the Crown
      source: SCAG
      level: 3
      entries:
        - The tenets of the Oath of the Crown are often set by the sovereign to which their oath is sworn, but generally emphasize the following tenets.
        - entries:
            - entries:
                - The law is paramount. It is the mortar that holds the stones of civilization together, and it must be respected.
              name: Law
              type: entries
          type: entries
        - entries:
            - entries:
                - Your word is your bond. Without loyalty, oaths and laws are meaningless.
              name: Loyalty
              type: entries
          type: entries
        - entries:
            - entries:
                - You must be willing to do what needs to be done for the sake of order, even in the face of overwhelming odds. If you don't act, then who will?
              name: Courage
              type: entries
          type: entries
        - entries:
            - entries:
                - You must deal with the consequences of your actions, and you are responsible for fulfilling your duties and obligations.
              name: Responsibility
              type: entries
          type: entries
    - class_name: Paladin
      class_source: PHB
      subclass_name: Crown
      subclass_source: SCAG
      feature: Turn the Tide
      source: SCAG
      level: 3
      entries:
        - As a bonus action, you can bolster injured creatures with your Channel Divinity. Each creature of your choice that can hear you within 30 feet of you regains hit points equal to {@dice 1d6} + your Charisma modifier (minimum of 1) if it has no more than half of its hit points.
    - class_name: Paladin
      class_source: PHB
      subclass_name: Crown
      subclass_source: SCAG
      feature: Divine Allegiance
      source: SCAG
      level: 7
      entries:
        - Starting at 7th level, when a creature within 5 feet of you takes damage, you can use your reaction to magically substitute your own health for that of the target creature, causing that creature not to take the damage. Instead, you take the damage. This damage to you can't be reduced or prevented in any way.
    - class_name: Paladin
      class_source: PHB
      subclass_name: Crown
      subclass_source: SCAG
      feature: Unyielding Spirit
      source: SCAG
      level: 15
      entries:
        - Starting at 15th level, you have advantage on saving throws to avoid becoming {@condition paralyzed} or {@condition stunned}.
    - class_name: Paladin
      class_source: PHB
      subclass_name: Crown
      subclass_source: SCAG
      feature: Exalted Champion
      source: SCAG
      level: 20
      entries:
        - 'At 20th level, your presence on the field of battle is an inspiration to those dedicated to your cause. You can use your action to gain the following benefits for 1 hour:'
        - items:
            - You have resistance to bludgeoning, piercing, and slashing damage from nonmagical weapons.
            - Your allies have advantage on death saving throws while within 30 feet of you.
            - You have advantage on Wisdom saving throws, as do your allies within 30 feet of you.
          type: list
        - This effect ends early if you are {@condition incapacitated} or die. Once you use this feature, you can't use it again until you finish a long rest.
    - class_name: Paladin
      class_source: PHB
      subclass_name: Devotion
      subclass_source: PHB
      feature: Channel Divinity
      source: PHB
      level: 3
      entries:
        - When you take this oath at 3rd level, you gain the following two Channel Divinity options.
        - subclassFeature: Sacred Weapon|Paladin||Devotion||3
          type: refSubclassFeature
        - subclassFeature: Turn the Unholy|Paladin||Devotion||3
          type: refSubclassFeature
    - class_name: Paladin
      class_source: PHB
      subclass_name: Devotion
      subclass_source: PHB
      feature: Oath of Devotion
      source: PHB
      level: 3
      entries:
        - The Oath of Devotion binds a paladin to the loftiest ideals of justice, virtue, and order. Sometimes called cavaliers, white knights, or holy warriors, these paladins meet the ideal of the knight in shining armor, acting with honor in pursuit of justice and the greater good. They hold themselves to the highest standards of conduct, and some, for better or worse, hold the rest of the world to the same standards. Many who swear this oath are devoted to gods of law and good and use their gods' tenets as the measure of their devotion. They hold angels—the perfect servants of good—as their ideals, and incorporate images of angelic wings into their helmets or coats of arms.
        - subclassFeature: Tenets of Devotion|Paladin||Devotion||3
          type: refSubclassFeature
        - subclassFeature: Oath Spells|Paladin||Devotion||3
          type: refSubclassFeature
        - subclassFeature: Channel Divinity|Paladin||Devotion||3
          type: refSubclassFeature
    - class_name: Paladin
      class_source: PHB
      subclass_name: Devotion
      subclass_source: PHB
      feature: Oath Spells
      source: PHB
      level: 3
      entries:
        - You gain oath spells at the paladin levels listed.
        - caption: Oath of Devotion Spells
          colLabels:
            - Paladin Level
            - Spells
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - 3rd
              - '{@spell protection from evil and good}, {@spell sanctuary}'
            - - 5th
              - '{@spell lesser restoration}, {@spell zone of truth}'
            - - 9th
              - '{@spell beacon of hope}, {@spell dispel magic}'
            - - 13th
              - '{@spell freedom of movement}, {@spell guardian of faith}'
            - - 17th
              - '{@spell commune}, {@spell flame strike}'
          type: table
    - class_name: Paladin
      class_source: PHB
      subclass_name: Devotion
      subclass_source: PHB
      feature: Sacred Weapon
      source: PHB
      level: 3
      entries:
        - As an action, you can imbue one weapon that you are holding with positive energy, using your Channel Divinity. For 1 minute, you add your Charisma modifier to attack rolls made with that weapon (with a minimum bonus of +1). The weapon also emits bright light in a 20-foot radius and dim light 20 feet beyond that. If the weapon is not already magical, it becomes magical for the duration.
        - You can end this effect on your turn as part of any other action. If you are no longer holding or carrying this weapon, or if you fall {@condition unconscious}, this effect ends.
    - class_name: Paladin
      class_source: PHB
      subclass_name: Devotion
      subclass_source: PHB
      feature: Tenets of Devotion
      source: PHB
      level: 3
      entries:
        - Though the exact words and strictures of the Oath of Devotion vary, paladins of this oath share these tenets.
        - entries:
            - entries:
                - Don't lie or cheat. Let your word be your promise.
              name: Honesty
              type: entries
          type: entries
        - entries:
            - entries:
                - Never fear to act, though caution is wise.
              name: Courage
              type: entries
          type: entries
        - entries:
            - entries:
                - Aid others, protect the weak, and punish those who threaten them. Show mercy to your foes, but temper it with wisdom.
              name: Compassion
              type: entries
          type: entries
        - entries:
            - entries:
                - Treat others with fairness, and let your honorable deeds be an example to them. Do as much good as possible while causing the least amount of harm.
              name: Honor
              type: entries
          type: entries
        - entries:
            - entries:
                - Be responsible for your actions and their consequences, protect those entrusted to your care, and obey those who have just authority over you.
              name: Duty
              type: entries
          type: entries
    - class_name: Paladin
      class_source: PHB
      subclass_name: Devotion
      subclass_source: PHB
      feature: Turn the Unholy
      source: PHB
      level: 3
      entries:
        - As an action, you present your holy symbol and speak a prayer censuring fiends and undead, using your Channel Divinity. Each fiend or undead that can see or hear you within 30 feet of you must make a Wisdom saving throw. If the creature fails its saving throw, it is turned for 1 minute or until it takes damage.
        - A turned creature must spend its turns trying to move as far away from you as it can, and it can't willingly move to a space within 30 feet of you. It also can't take reactions. For its action, it can use only the {@action Dash} action or try to escape from an effect that prevents it from moving. If there's nowhere to move, the creature can use the {@action Dodge} action.
    - class_name: Paladin
      class_source: PHB
      subclass_name: Devotion
      subclass_source: PHB
      feature: Aura of Devotion
      source: PHB
      level: 7
      entries:
        - Starting at 7th level, you and friendly creatures within 10 feet of you can't be {@condition charmed} while you are conscious.
        - At 18th level, the range of this aura increases to 30 feet.
    - class_name: Paladin
      class_source: PHB
      subclass_name: Devotion
      subclass_source: PHB
      feature: Purity of Spirit
      source: PHB
      level: 15
      entries:
        - Beginning at 15th level, you are always under the effects of a {@spell protection from evil and good} spell.
    - class_name: Paladin
      class_source: PHB
      subclass_name: Devotion
      subclass_source: PHB
      feature: Holy Nimbus
      source: PHB
      level: 20
      entries:
        - At 20th level, as an action, you can emanate an aura of sunlight. For 1 minute, bright light shines from you in a 30-foot radius, and dim light shines 30 feet beyond that.
        - Whenever an enemy creature starts its turn in the bright light, the creature takes 10 radiant damage.
        - In addition, for the duration, you have advantage on saving throws against spells cast by fiends or undead.
        - Once you use this feature, you can't use it again until you finish a long rest.
    - class_name: Paladin
      class_source: PHB
      subclass_name: Glory
      subclass_source: TCE
      feature: Channel Divinity
      source: TCE
      level: 3
      entries:
        - '{@i 3rd-level Oath of Glory feature}'
        - You gain the following two Channel Divinity options. See the Sacred Oath class feature for how Channel Divinity works.
        - subclassFeature: Peerless Athlete|Paladin||Glory|TCE|3
          type: refSubclassFeature
        - subclassFeature: Inspiring Smite|Paladin||Glory|TCE|3
          type: refSubclassFeature
    - class_name: Paladin
      class_source: PHB
      subclass_name: Glory
      subclass_source: TCE
      feature: Inspiring Smite
      source: TCE
      level: 3
      entries:
        - Immediately after you deal damage to a creature with your Divine Smite feature, you can use your Channel Divinity as a bonus action and distribute temporary hit points to creatures of your choice within 30 feet of you, which can include you. The total number of temporary hit points equals {@dice 2d8} + your level in this class, divided among the chosen creatures however you like.
    - class_name: Paladin
      class_source: PHB
      subclass_name: Glory
      subclass_source: TCE
      feature: Oath of Glory
      source: TCE
      level: 3
      entries:
        - Paladins who take the Oath of Glory believe they and their companions are destined to achieve glory through deeds of heroism. They train diligently and encourage their companions so they're all ready when destiny calls.
        - subclassFeature: Tenets of Glory|Paladin||Glory|TCE|3
          type: refSubclassFeature
        - subclassFeature: Oath Spells|Paladin||Glory|TCE|3
          type: refSubclassFeature
        - subclassFeature: Channel Divinity|Paladin||Glory|TCE|3
          type: refSubclassFeature
    - class_name: Paladin
      class_source: PHB
      subclass_name: Glory
      subclass_source: TCE
      feature: Oath Spells
      source: TCE
      level: 3
      entries:
        - '{@i 3rd-level Oath of Glory feature}'
        - You gain oath spells at the paladin levels listed in the Oath of Glory Spells table. See the Sacred Oath class feature for how oath spells work.
        - caption: Oath of Glory Spells
          colLabels:
            - Paladin Level
            - Spells
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - 3rd
              - '{@spell guiding bolt}, {@spell heroism}'
            - - 5th
              - '{@spell enhance ability}, {@spell magic weapon}'
            - - 9th
              - '{@spell haste}, {@spell protection from energy}'
            - - 13th
              - '{@spell compulsion}, {@spell freedom of movement}'
            - - 17th
              - '{@spell commune}, {@spell flame strike}'
          type: table
    - class_name: Paladin
      class_source: PHB
      subclass_name: Glory
      subclass_source: TCE
      feature: Peerless Athlete
      source: TCE
      level: 3
      entries:
        - As a bonus action, you can use your Channel Divinity to augment your athleticism. For the next 10 minutes, you have advantage on Strength ({@skill Athletics}) and Dexterity ({@skill Acrobatics}) checks; you can carry, push, drag, and lift twice as much weight as normal; and the distance of your long and high jumps increases by 10 feet (this extra distance costs movement as normal).
    - class_name: Paladin
      class_source: PHB
      subclass_name: Glory
      subclass_source: TCE
      feature: Tenets of Glory
      source: TCE
      level: 3
      entries:
        - The tenets of the Oath of Glory drive a paladin to attempt heroics that might one day shine in legend.
        - entries:
            - Strive to be known by glorious deeds, not words.
          name: Actions over Words
          type: entries
        - entries:
            - Face hardships with courage, and encourage your allies to face them with you.
          name: Challenges Are but Tests
          type: entries
        - entries:
            - Like raw stone, your body must be worked so its potential can be realized.
          name: Hone the Body
          type: entries
        - entries:
            - You must marshal the discipline to overcome failings within yourself that threaten to dim the glory of you and your friends.
          name: Discipline the Soul
          type: entries
    - class_name: Paladin
      class_source: PHB
      subclass_name: Glory
      subclass_source: TCE
      feature: Aura of Alacrity
      source: TCE
      level: 7
      entries:
        - '{@i 7th-level Oath of Glory feature}'
        - You emanate an aura that fills you and your companions with supernatural speed, allowing you to race across a battlefield in formation. Your walking speed increases by 10 feet. In addition, if you aren't {@condition incapacitated}, the walking speed of any ally who starts their turn within 5 feet of you increases by 10 feet until the end of that turn.
        - When you reach 18th level in this class, the range of the aura increases to 10 feet.
    - class_name: Paladin
      class_source: PHB
      subclass_name: Glory
      subclass_source: TCE
      feature: Glorious Defense
      source: TCE
      level: 15
      entries:
        - '{@i 15th-level Oath of Glory feature}'
        - You can turn defense into a sudden strike. When you or another creature you can see within 10 feet of you is hit by an attack roll, you can use your reaction to grant a bonus to the target's AC against that attack, potentially causing it to miss. The bonus equals your Charisma modifier (minimum of +1). If the attack misses, you can make one weapon attack against the attacker as part of this reaction, provided the attacker is within your weapon's range.
        - You can use this feature a number of times equal to your Charisma modifier (minimum of once), and you regain all expended uses when you finish a long rest.
    - class_name: Paladin
      class_source: PHB
      subclass_name: Glory
      subclass_source: TCE
      feature: Living Legend
      source: TCE
      level: 20
      entries:
        - '{@i 20th-level Oath of Glory feature}'
        - 'You can empower yourself with the legends—whether true or exaggerated—of your great deeds. As a bonus action, you gain the following benefits for 1 minute:'
        - items:
            - You are blessed with an otherworldly presence, gaining advantage on all Charisma checks.
            - Once on each of your turns when you make a weapon attack and miss, you can cause that attack to hit instead.
            - If you fail a saving throw, you can use your reaction to reroll it. You must use this new roll.
          type: list
        - Once you use this feature, you can't use it again until you finish a long rest, unless you expend a 5th-level spell slot to use it again.
    - class_name: Paladin
      class_source: PHB
      subclass_name: Oathbreaker
      subclass_source: DMG
      feature: Channel Divinity
      source: DMG
      level: 3
      entries:
        - An Oathbreaker paladin of 3rd level or higher gains the following two Channel Divinity options.
        - subclassFeature: Control Undead|Paladin||Oathbreaker|DMG|3
          type: refSubclassFeature
        - subclassFeature: Dreadful Aspect|Paladin||Oathbreaker|DMG|3
          type: refSubclassFeature
    - class_name: Paladin
      class_source: PHB
      subclass_name: Oathbreaker
      subclass_source: DMG
      feature: Control Undead
      source: DMG
      level: 3
      entries:
        - As an action, the paladin targets one undead creature he or she can see within 30 feet of him or her. The target must make a Wisdom saving throw. On a failed save, the target must obey the paladin's commands for the next 24 hours, or until the paladin uses this Channel Divinity option again. An undead whose challenge rating is equal to or greater than the paladin's level is immune to this effect.
    - class_name: Paladin
      class_source: PHB
      subclass_name: Oathbreaker
      subclass_source: DMG
      feature: Dreadful Aspect
      source: DMG
      level: 3
      entries:
        - As an action, the paladin channels the darkest emotions and focuses them into a burst of magical menace. Each creature of the paladin's choice within 30 feet of the paladin must make a Wisdom saving throw if it can see the paladin. On a failed save, the target is {@condition frightened} of the paladin for 1 minute. If a creature {@condition frightened} by this effect ends its turn more than 30 feet away from the paladin, it can attempt another Wisdom saving throw to end the effect on it.
    - class_name: Paladin
      class_source: PHB
      subclass_name: Oathbreaker
      subclass_source: DMG
      feature: Oathbreaker
      source: DMG
      level: 3
      entries:
        - An Oathbreaker is a paladin who breaks his or her sacred oaths to pursue some dark ambition or serve an evil power. Whatever light burned in the paladin's heart has been extinguished. Only darkness remains.
        - A paladin must be evil and at least 3rd level to become an Oathbreaker. The paladin replaces the features specific to his or her Sacred Oath with Oathbreaker features.
        - subclassFeature: Oathbreaker Spells|Paladin||Oathbreaker|DMG|3
          type: refSubclassFeature
        - subclassFeature: Channel Divinity|Paladin||Oathbreaker|DMG|3
          type: refSubclassFeature
    - class_name: Paladin
      class_source: PHB
      subclass_name: Oathbreaker
      subclass_source: DMG
      feature: Oathbreaker Spells
      source: DMG
      level: 3
      entries:
        - You gain oathbreaker spells at the paladin levels listed.
        - caption: Oathbreaker Spells
          colLabels:
            - Paladin Level
            - Spells
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - 3rd
              - '{@spell hellish rebuke}, {@spell inflict wounds}'
            - - 5th
              - '{@spell crown of madness}, {@spell darkness}'
            - - 9th
              - '{@spell animate dead}, {@spell bestow curse}'
            - - 13th
              - '{@spell blight}, {@spell confusion}'
            - - 17th
              - '{@spell contagion}, {@spell dominate person}'
          type: table
    - class_name: Paladin
      class_source: PHB
      subclass_name: Oathbreaker
      subclass_source: DMG
      feature: Aura of Hate
      source: DMG
      level: 7
      entries:
        - Starting at 7th level, the paladin, as well any fiends and undead within 10 feet of the paladin, gains a bonus to melee weapon damage rolls equal to the paladin's Charisma modifier (minimum of +1). A creature can benefit from this feature from only one paladin at a time.
        - At 18th level, the range of this aura increases to 30 feet.
    - class_name: Paladin
      class_source: PHB
      subclass_name: Oathbreaker
      subclass_source: DMG
      feature: Supernatural Resistance
      source: DMG
      level: 15
      entries:
        - At 15th level, the paladin gains resistance to bludgeoning, piercing, and slashing damage from nonmagical weapons.
    - class_name: Paladin
      class_source: PHB
      subclass_name: Oathbreaker
      subclass_source: DMG
      feature: Dread Lord
      source: DMG
      level: 20
      entries:
        - At 20th level, the paladin can, as an action, surround himself or herself with an aura of gloom that lasts for 1 minute. The aura reduces any bright light in a 30-foot radius around the paladin to dim light. Whenever an enemy that is {@condition frightened} by the paladin starts its turn in the aura, it takes {@damage 4d10} psychic damage. Additionally, the paladin and creatures he or she chooses in the aura are draped in deeper shadow. Creatures that rely on sight have disadvantage on attack rolls against creatures draped in this shadow.
        - While the aura lasts, the paladin can use a bonus action on his or her turn to cause the shadows in the aura to attack one creature. The paladin makes a melee spell attack against the target. If the attack hits, the target takes necrotic damage equal to {@damage 3d10} + the paladin's Charisma modifier.
        - After activating the aura, the paladin can't do so again until he or she finishes a long rest.
    - class_name: Paladin
      class_source: PHB
      subclass_name: Redemption
      subclass_source: XGE
      feature: Channel Divinity
      source: XGE
      level: 3
      entries:
        - When you take this oath at 3rd level, you gain the following two Channel Divinity options.
        - subclassFeature: Emissary of Peace|Paladin||Redemption|XGE|3
          type: refSubclassFeature
        - subclassFeature: Rebuke the Violent|Paladin||Redemption|XGE|3
          type: refSubclassFeature
    - class_name: Paladin
      class_source: PHB
      subclass_name: Redemption
      subclass_source: XGE
      feature: Emissary of Peace
      source: XGE
      level: 3
      entries:
        - You can use your Channel Divinity to augment your presence with divine power. As a bonus action, you grant yourself a +5 bonus to Charisma ({@skill Persuasion}) checks for the next 10 minutes.
    - class_name: Paladin
      class_source: PHB
      subclass_name: Redemption
      subclass_source: XGE
      feature: Oath of Redemption
      source: XGE
      level: 3
      entries:
        - The Oath of Redemption sets a paladin on a difficult path, one that requires a holy warrior to use violence only as a last resort. Paladins who dedicate themselves to this oath believe that any person can be redeemed and that the path of benevolence and justice is one that anyone can walk. These paladins face evil creatures in the hope of turning their foes to the light, and they slay their enemies only when such a deed will clearly save other lives. Paladins who follow this path are known as redeemers.
        - While redeemers are idealists, they are no fools. Redeemers know that undead, demons, devils, and other supernatural threats can be inherently evil. Against such foes, paladins who swear this oath bring the full wrath of their weapons and spells to bear. Yet the redeemers still pray that, one day, even creatures of wickedness will invite their own redemption.
        - subclassFeature: Tenets of Redemption|Paladin||Redemption|XGE|3
          type: refSubclassFeature
        - subclassFeature: Oath Spells|Paladin||Redemption|XGE|3
          type: refSubclassFeature
        - subclassFeature: Channel Divinity|Paladin||Redemption|XGE|3
          type: refSubclassFeature
    - class_name: Paladin
      class_source: PHB
      subclass_name: Redemption
      subclass_source: XGE
      feature: Oath Spells
      source: XGE
      level: 3
      entries:
        - You gain oath spells at the paladin levels listed.
        - caption: Oath of Redemption Spells
          colLabels:
            - Paladin Level
            - Spells
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - 3rd
              - '{@spell sanctuary}, {@spell sleep}'
            - - 5th
              - '{@spell calm emotions}, {@spell hold person}'
            - - 9th
              - '{@spell counterspell}, {@spell hypnotic pattern}'
            - - 13th
              - '{@spell Otiluke''s resilient sphere}, {@spell stoneskin}'
            - - 17th
              - '{@spell hold monster}, {@spell wall of force}'
          type: table
    - class_name: Paladin
      class_source: PHB
      subclass_name: Redemption
      subclass_source: XGE
      feature: Rebuke the Violent
      source: XGE
      level: 3
      entries:
        - You can use your Channel Divinity to rebuke those who use violence. Immediately after an attacker within 30 feet of you deals damage with an attack against a creature other than you, you can use your reaction to force the attacker to make a Wisdom saving throw. On a failed save, the attacker takes radiant damage equal to the damage it just dealt. On a successful save, it takes half as much damage.
    - class_name: Paladin
      class_source: PHB
      subclass_name: Redemption
      subclass_source: XGE
      feature: Tenets of Redemption
      source: XGE
      level: 3
      entries:
        - The tenets of the Oath of Redemption hold a paladin to a high standard of peace and justice.
        - entries:
            - entries:
                - Violence is a weapon of last resort. Diplomacy and understanding are the paths to long-lasting peace.
              name: Peace
              type: entries
          type: entries
        - entries:
            - entries:
                - All people begin life in an innocent state, and it is their environment or the influence of dark forces that drives them to evil. By setting the proper example, and working to heal the wounds of a deeply flawed world, you can set anyone on a righteous path.
              name: Innocence
              type: entries
          type: entries
        - entries:
            - entries:
                - Change takes time. Those who have walked the path of the wicked must be given reminders to keep them honest and true. Once you have planted the seed of righteousness in a creature, you must work day after day to allow that seed to survive and flourish.
              name: Patience
              type: entries
          type: entries
        - entries:
            - entries:
                - Your heart and mind must stay clear, for eventually you will be forced to admit defeat. While every creature can be redeemed, some are so far along the path of evil that you have no choice but to end their lives for the greater good. Any such action must be carefully weighed and the consequences fully understood, but once you have made the decision, follow through with it knowing your path is just.
              name: Wisdom
              type: entries
          type: entries
    - class_name: Paladin
      class_source: PHB
      subclass_name: Redemption
      subclass_source: XGE
      feature: Aura of the Guardian
      source: XGE
      level: 7
      entries:
        - Starting at 7th level, you can shield others from harm at the cost of your own health. When a creature within 10 feet of you takes damage, you can use your reaction to magically take that damage, instead of that creature taking it. This feature doesn't transfer any other effects that might accompany the damage, and this damage can't be reduced in any way.
        - At 18th level, the range of this aura increases to 30 feet.
    - class_name: Paladin
      class_source: PHB
      subclass_name: Redemption
      subclass_source: XGE
      feature: Protective Spirit
      source: XGE
      level: 15
      entries:
        - Starting at 15th level, a holy presence mends your wounds in battle. You regain hit points equal to {@dice 1d6} + half your paladin level if you end your turn in combat with fewer than half of your hit points remaining and you aren't {@condition incapacitated}.
    - class_name: Paladin
      class_source: PHB
      subclass_name: Redemption
      subclass_source: XGE
      feature: Emissary of Redemption
      source: XGE
      level: 20
      entries:
        - 'At 20th level, you become an avatar of peace, which gives you two benefits:'
        - items:
            - You have resistance to all damage dealt by other creatures (their attacks, spells, and other effects).
            - Whenever a creature hits you with an attack, it takes radiant damage equal to half the damage you take from the attack.
          type: list
        - If you attack a creature, cast a spell on it, or deal damage to it by any means but this feature, neither benefit works against that creature until you finish a long rest.
    - class_name: Paladin
      class_source: PHB
      subclass_name: Vengeance
      subclass_source: PHB
      feature: Abjure Enemy
      source: PHB
      level: 3
      entries:
        - As an action, you present your holy symbol and speak a prayer of denunciation, using your Channel Divinity. Choose one creature within 60 feet of you that you can see. That creature must make a Wisdom saving throw, unless it is immune to being {@condition frightened}. Fiends and undead have disadvantage on this saving throw.
        - On a failed save, the creature is {@condition frightened} for 1 minute or until it takes any damage. While {@condition frightened}, the creature's speed is 0, and it can't benefit from any bonus to its speed.
        - On a successful save, the creature's speed is halved for 1 minute or until the creature takes any damage.
    - class_name: Paladin
      class_source: PHB
      subclass_name: Vengeance
      subclass_source: PHB
      feature: Channel Divinity
      source: PHB
      level: 3
      entries:
        - When you take this oath at 3rd level, you gain the following two Channel Divinity options.
        - subclassFeature: Abjure Enemy|Paladin||Vengeance||3
          type: refSubclassFeature
        - subclassFeature: Vow of Enmity|Paladin||Vengeance||3
          type: refSubclassFeature
    - class_name: Paladin
      class_source: PHB
      subclass_name: Vengeance
      subclass_source: PHB
      feature: Oath of Vengeance
      source: PHB
      level: 3
      entries:
        - The Oath of Vengeance is a solemn commitment to punish those who have committed a grievous sin. When evil forces slaughter helpless villagers, when an entire people turns against the will of the gods, when a thieves' guild grows too violent and powerful, when a dragon rampages through the countryside—at times like these, paladins arise and swear an Oath of Vengeance to set right that which has gone wrong. To these paladins—sometimes called avengers or dark knights—their own purity is not as important as delivering justice.
        - subclassFeature: Tenets of Vengeance|Paladin||Vengeance||3
          type: refSubclassFeature
        - subclassFeature: Oath Spells|Paladin||Vengeance||3
          type: refSubclassFeature
        - subclassFeature: Channel Divinity|Paladin||Vengeance||3
          type: refSubclassFeature
    - class_name: Paladin
      class_source: PHB
      subclass_name: Vengeance
      subclass_source: PHB
      feature: Oath Spells
      source: PHB
      level: 3
      entries:
        - You gain oath spells at the paladin levels listed.
        - caption: Oath of Vengeance Spells
          colLabels:
            - Paladin Level
            - Spells
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - 3rd
              - '{@spell bane}, {@spell hunter''s mark}'
            - - 5th
              - '{@spell hold person}, {@spell misty step}'
            - - 9th
              - '{@spell haste}, {@spell protection from energy}'
            - - 13th
              - '{@spell banishment}, {@spell dimension door}'
            - - 17th
              - '{@spell hold monster}, {@spell scrying}'
          type: table
    - class_name: Paladin
      class_source: PHB
      subclass_name: Vengeance
      subclass_source: PHB
      feature: Tenets of Vengeance
      source: PHB
      level: 3
      entries:
        - The tenets of the Oath of Vengeance vary by paladin, but all the tenets revolve around punishing wrongdoers by any means necessary. Paladins who uphold these tenets are willing to sacrifice even their own righteousness to mete out justice upon those who do evil, so the paladins are often neutral or lawful neutral in alignment. The core principles of the tenets are brutally simple.
        - entries:
            - entries:
                - Faced with a choice of fighting my sworn foes or combating a lesser evil, I choose the greater evil.
              name: Fight the Greater Evil
              type: entries
          type: entries
        - entries:
            - entries:
                - Ordinary foes might win my mercy, but my sworn enemies do not.
              name: No Mercy for the Wicked
              type: entries
          type: entries
        - entries:
            - entries:
                - My qualms can't get in the way of exterminating my foes.
              name: By Any Means Necessary
              type: entries
          type: entries
        - entries:
            - entries:
                - If my foes wreak ruin on the world, it is because I failed to stop them. I must help those harmed by their misdeeds.
              name: Restitution
              type: entries
          type: entries
    - class_name: Paladin
      class_source: PHB
      subclass_name: Vengeance
      subclass_source: PHB
      feature: Vow of Enmity
      source: PHB
      level: 3
      entries:
        - As a bonus action, you can utter a vow of enmity against a creature you can see within 10 feet of you, using your Channel Divinity. You gain advantage on attack rolls against the creature for 1 minute or until it drops to 0 hit points or falls {@condition unconscious}.
    - class_name: Paladin
      class_source: PHB
      subclass_name: Vengeance
      subclass_source: PHB
      feature: Relentless Avenger
      source: PHB
      level: 7
      entries:
        - By 7th level, your supernatural focus helps you close off a foe's retreat. When you hit a creature with an opportunity attack, you can move up to half your speed immediately after the attack and as part of the same reaction. This movement doesn't provoke opportunity attacks.
    - class_name: Paladin
      class_source: PHB
      subclass_name: Vengeance
      subclass_source: PHB
      feature: Soul of Vengeance
      source: PHB
      level: 15
      entries:
        - Starting at 15th level, the authority with which you speak your Vow of Enmity gives you greater power over your foe. When a creature under the effect of your Vow of Enmity makes an attack, you can use your reaction to make a melee weapon attack against that creature if it is within range.
    - class_name: Paladin
      class_source: PHB
      subclass_name: Vengeance
      subclass_source: PHB
      feature: Avenging Angel
      source: PHB
      level: 20
      entries:
        - 'At 20th level, you can assume the form of an angelic avenger. Using your action, you undergo a transformation. For 1 hour, you gain the following benefits:'
        - items:
            - Wings sprout from your back and grant you a flying speed of 60 feet.
            - You emanate an aura of menace in a 30-foot radius. The first time any enemy creature enters the aura or starts its turn there during a battle, the creature must succeed on a Wisdom saving throw or become {@condition frightened} of you for 1 minute or until it takes any damage. {@action Attack} rolls against the {@condition frightened} creature have advantage.
          type: list
        - Once you use this feature, you can't use it again until you finish a long rest.
    - class_name: Paladin
      class_source: PHB
      subclass_name: Watchers
      subclass_source: TCE
      feature: Abjure the Extraplanar
      source: TCE
      level: 3
      entries:
        - You can use your Channel Divinity to castigate unworldly beings. As an action, you present your holy symbol and each aberration, celestial, elemental, fey, or fiend within 30 feet of you that can hear you must make a Wisdom saving throw. On a failed save, the creature is turned for 1 minute or until it takes damage.
        - A turned creature must spend its turns trying to move as far away from you as it can, and it can't willingly end its move in a space within 30 feet of you. For its action, it can use only the {@action Dash} action or try to escape from an effect that prevents it from moving. If there's nowhere to move, the creature can take the {@action Dodge} action.
    - class_name: Paladin
      class_source: PHB
      subclass_name: Watchers
      subclass_source: TCE
      feature: Channel Divinity
      source: TCE
      level: 3
      entries:
        - '{@i 3rd-level Oath of the Watchers feature}'
        - You gain the following Channel Divinity options. See the Sacred Oath class feature for how Channel Divinity works.
        - subclassFeature: Watcher's Will|Paladin||Watchers|TCE|3
          type: refSubclassFeature
        - subclassFeature: Abjure the Extraplanar|Paladin||Watchers|TCE|3
          type: refSubclassFeature
    - class_name: Paladin
      class_source: PHB
      subclass_name: Watchers
      subclass_source: TCE
      feature: Oath of the Watchers
      source: TCE
      level: 3
      entries:
        - The Oath of the Watchers binds paladins to protect mortal realms from the predations of extraplanar creatures, many of which can lay waste to mortal soldiers. Thus, the Watchers hone their minds, spirits, and bodies to be the ultimate weapons against such threats.
        - Paladins who follow the Watchers' oath are ever vigilant in spotting the influence of extraplanar forces, often establishing a network of spies and informants to gather information on suspected cults. To a Watcher, keeping a healthy suspicion and awareness about one's surroundings is as natural as wearing armor in battle.
        - subclassFeature: Tenets of the Watchers|Paladin||Watchers|TCE|3
          type: refSubclassFeature
        - subclassFeature: Oath Spells|Paladin||Watchers|TCE|3
          type: refSubclassFeature
        - subclassFeature: Channel Divinity|Paladin||Watchers|TCE|3
          type: refSubclassFeature
    - class_name: Paladin
      class_source: PHB
      subclass_name: Watchers
      subclass_source: TCE
      feature: Oath Spells
      source: TCE
      level: 3
      entries:
        - '{@i 3rd-level Oath of the Watchers feature}'
        - You gain oath spells at the paladin levels listed in the Oath of the Watchers table. See the Sacred Oath class feature for how oath spells work.
        - caption: Oath of the Watchers Spells
          colLabels:
            - Paladin Level
            - Spells
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - 3rd
              - '{@spell alarm}, {@spell detect magic}'
            - - 5th
              - '{@spell moonbeam}, {@spell see invisibility}'
            - - 9th
              - '{@spell counterspell}, {@spell nondetection}'
            - - 13th
              - '{@spell aura of purity}, {@spell banishment}'
            - - 17th
              - '{@spell hold monster}, {@spell scrying}'
          type: table
    - class_name: Paladin
      class_source: PHB
      subclass_name: Watchers
      subclass_source: TCE
      feature: Tenets of the Watchers
      source: TCE
      level: 3
      entries:
        - A paladin who assumes the Oath of the Watchers swears to safeguard mortal realms from otherworldly threats.
        - entries:
            - The threats you face are cunning, powerful, and subversive. Be ever alert for their corruption.
          name: Vigilance
          type: entries
        - entries:
            - Never accept gifts or favors from fiends or those who truck with them. Stay true to your order, your comrades, and your duty.
          name: Loyalty
          type: entries
        - entries:
            - You are the shield against the endless terrors that lie beyond the stars. Your blade must be forever sharp and your mind keen to survive what lies beyond.
          name: Discipline
          type: entries
    - class_name: Paladin
      class_source: PHB
      subclass_name: Watchers
      subclass_source: TCE
      feature: Watcher's Will
      source: TCE
      level: 3
      entries:
        - You can use your Channel Divinity to invest your presence with the warding power of your faith. As an action, you can choose a number of creatures you can see within 30 feet of you, up to a number equal to your Charisma modifier (minimum of one creature). For 1 minute, you and the chosen creatures have advantage on Intelligence, Wisdom, and Charisma saving throws.
    - class_name: Paladin
      class_source: PHB
      subclass_name: Watchers
      subclass_source: TCE
      feature: Aura of the Sentinel
      source: TCE
      level: 7
      entries:
        - '{@i 7th-level Oath of the Watchers feature}'
        - You emit an aura of alertness while you aren't {@condition incapacitated}. When you and any creatures of your choice within 10 feet of you roll initiative, you all gain a bonus to initiative equal to your proficiency bonus.
        - At 18th level, the range of this aura increases to 30 feet.
    - class_name: Paladin
      class_source: PHB
      subclass_name: Watchers
      subclass_source: TCE
      feature: Vigilant Rebuke
      source: TCE
      level: 15
      entries:
        - '{@i 15th-level Oath of the Watchers feature}'
        - You've learned how to chastise anyone who dares wield beguilements against you and your wards. Whenever you or a creature you can see within 30 feet of you succeeds on an Intelligence, a Wisdom, or a Charisma saving throw, you can use your reaction to deal {@damage 2d8} + your Charisma modifier force damage to the creature that forced the saving throw.
    - class_name: Paladin
      class_source: PHB
      subclass_name: Watchers
      subclass_source: TCE
      feature: Mortal Bulwark
      source: TCE
      level: 20
      entries:
        - '{@i 20th-level Oath of the Watchers feature}'
        - 'You manifest a spark of divine power in defense of the mortal realms. As a bonus action, you gain the following benefits for 1 minute:'
        - items:
            - You gain {@sense truesight} with a range of 120 feet.
            - You have advantage on attack rolls against aberrations, celestials, elementals, fey, and fiends.
            - When you hit a creature with an attack roll and deal damage to it, you can also force it to make a Charisma saving throw against your spell save DC. On a failed save, the creature is magically banished to its native plane of existence if it's currently not there. On a successful save, the creature can't be banished by this feature for 24 hours.
          type: list
        - Once you use this bonus action, you can't use it again until you finish a long rest, unless you expend a 5th-level spell slot to use it again.
    - class_name: Paladin
      class_source: XPHB
      subclass_name: Ancients
      subclass_source: XPHB
      feature: Nature's Wrath
      source: XPHB
      level: 3
      entries:
        - As a {@action Magic|XPHB} action, you can expend one use of your Channel Divinity to conjure spectral vines around nearby creatures. Each creature of your choice that you can see within 15 feet of yourself must succeed on a Strength saving throw or have the {@condition Restrained|XPHB} condition for 1 minute. A {@condition Restrained|XPHB} creature repeats the save at the end of each of its turns, ending the effect on itself on a success.
    - class_name: Paladin
      class_source: XPHB
      subclass_name: Ancients
      subclass_source: XPHB
      feature: Oath of the Ancients
      source: XPHB
      level: 3
      entries:
        - '{@i Preserve Life and Light in the World}'
        - The Oath of the Ancients is as old as the first elves. Paladins who swear this oath cherish the light; they love the beautiful and life-giving things of the world more than any principles of honor, courage, and justice. They often adorn their armor and clothing with images of growing things—leaves, antlers, or flowers—to reflect their commitment to preserving life and light.
        - 'These paladins share the following tenets:'
        - items:
            - Kindle the light of hope.
            - Shelter life.
            - Delight in art and laughter.
          type: list
        - subclassFeature: Oath of the Ancients Spells|Paladin|XPHB|Ancients|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Nature's Wrath|Paladin|XPHB|Ancients|XPHB|3
          type: refSubclassFeature
    - class_name: Paladin
      class_source: XPHB
      subclass_name: Ancients
      subclass_source: XPHB
      feature: Oath of the Ancients Spells
      source: XPHB
      level: 3
      entries:
        - The magic of your oath ensures you always have certain spells ready; when you reach a Paladin level specified in the Oath of the Ancients Spells table, you thereafter always have the listed spells prepared.
        - caption: Oath of the Ancients Spells
          colLabels:
            - Paladin Level
            - Spells
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - 3rd
              - '{@spell Ensnaring Strike|XPHB}, {@spell Speak with Animals|XPHB}'
            - - 5th
              - '{@spell Misty Step|XPHB}, {@spell Moonbeam|XPHB}'
            - - 9th
              - '{@spell Plant Growth|XPHB}, {@spell Protection from Energy|XPHB}'
            - - 13th
              - '{@spell Ice Storm|XPHB}, {@spell Stoneskin|XPHB}'
            - - 17th
              - '{@spell Commune with Nature|XPHB}, {@spell Tree Stride|XPHB}'
          type: table
    - class_name: Paladin
      class_source: XPHB
      subclass_name: Ancients
      subclass_source: XPHB
      feature: Aura of Warding
      source: XPHB
      level: 7
      entries:
        - Ancient magic lies so heavily upon you that it forms an eldritch ward, blunting energy from beyond the Material Plane; you and your allies have {@variantrule Resistance|XPHB} to Necrotic, Psychic, and Radiant damage while in your Aura of Protection.
    - class_name: Paladin
      class_source: XPHB
      subclass_name: Ancients
      subclass_source: XPHB
      feature: Undying Sentinel
      source: XPHB
      level: 15
      entries:
        - When you are reduced to 0 {@variantrule Hit Points|XPHB} and not killed outright, you can drop to 1 {@variantrule Hit Points|XPHB|Hit Point} instead, and you regain a number of {@variantrule Hit Points|XPHB} equal to three times your Paladin level. Once you use this feature, you can't do so again until you finish a {@variantrule Long Rest|XPHB}.
        - Additionally, you can't be aged magically, and you cease visibly aging.
    - class_name: Paladin
      class_source: XPHB
      subclass_name: Ancients
      subclass_source: XPHB
      feature: Elder Champion
      source: XPHB
      level: 20
      entries:
        - As a {@variantrule Bonus Action|XPHB}, you can imbue your Aura of Protection with primal power, granting the benefits below for 1 minute or until you end them (no action required). Once you use this feature, you can't use it again until you finish a {@variantrule Long Rest|XPHB}. You can also restore your use of it by expending a level 5 spell slot (no action required).
        - entries:
            - Enemies in the aura have {@variantrule Disadvantage|XPHB} on saving throws against your spells and Channel Divinity options.
          name: Diminish Defiance
          type: entries
        - entries:
            - At the start of each of your turns, you regain 10 {@variantrule Hit Points|XPHB}.
          name: Regeneration
          type: entries
        - entries:
            - Whenever you cast a spell that has a casting time of an action, you can cast it using a {@variantrule Bonus Action|XPHB} instead.
          name: Swift Spells
          type: entries
    - class_name: Paladin
      class_source: XPHB
      subclass_name: Devotion
      subclass_source: XPHB
      feature: Oath of Devotion
      source: XPHB
      level: 3
      entries:
        - '{@i Uphold the Ideals of Justice and Order}'
        - The Oath of Devotion binds Paladins to the ideals of justice and order. These Paladins meet the archetype of the knight in shining armor. They hold themselves to the highest standards of conduct, and some—for better or worse—hold the rest of the world to the same standards.
        - Many who swear this oath are devoted to gods of law and good and use their gods' tenets as the measure of personal devotion. Others hold angels as their ideals and incorporate images of angelic wings into their helmets or coats of arms.
        - 'These paladins share the following tenets:'
        - items:
            - Let your word be your promise.
            - Protect the weak and never fear to act.
            - Let your honorable deeds be an example.
          type: list
        - subclassFeature: Oath of Devotion Spells|Paladin|XPHB|Devotion|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Sacred Weapon|Paladin|XPHB|Devotion|XPHB|3
          type: refSubclassFeature
    - class_name: Paladin
      class_source: XPHB
      subclass_name: Devotion
      subclass_source: XPHB
      feature: Oath of Devotion Spells
      source: XPHB
      level: 3
      entries:
        - The magic of your oath ensures you always have certain spells ready; when you reach a Paladin level specified in the Oath of Devotion Spells table, you thereafter always have the listed spells prepared.
        - caption: Oath of Devotion Spells
          colLabels:
            - Paladin Level
            - Spells
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - 3rd
              - '{@spell Protection from Evil And Good|XPHB}, {@spell Shield of Faith|XPHB}'
            - - 5th
              - '{@spell Aid|XPHB}, {@spell Zone of Truth|XPHB}'
            - - 9th
              - '{@spell Beacon of Hope|XPHB}, {@spell Dispel Magic|XPHB}'
            - - 13th
              - '{@spell Freedom of Movement|XPHB}, {@spell Guardian of Faith|XPHB}'
            - - 17th
              - '{@spell Commune|XPHB}, {@spell Flame Strike|XPHB}'
          type: table
    - class_name: Paladin
      class_source: XPHB
      subclass_name: Devotion
      subclass_source: XPHB
      feature: Sacred Weapon
      source: XPHB
      level: 3
      entries:
        - When you take the {@action Attack|XPHB} action, you can expend one use of your Channel Divinity to imbue one Melee weapon that you are holding with positive energy. For 10 minutes or until you use this feature again, you add your Charisma modifier to attack rolls you make with that weapon (minimum bonus of +1), and each time you hit with it, you cause it to deal its normal damage type or Radiant damage.
        - The weapon also emits {@variantrule Bright Light|XPHB} in a 20-foot radius and {@variantrule Dim Light|XPHB} 20 feet beyond that.
        - You can end this effect early (no action required). This effect also ends if you aren't carrying the weapon.
    - class_name: Paladin
      class_source: XPHB
      subclass_name: Devotion
      subclass_source: XPHB
      feature: Aura of Devotion
      source: XPHB
      level: 7
      entries:
        - You and your allies have {@variantrule Immunity|XPHB} to the {@condition Charmed|XPHB} condition while in your Aura of Protection. If a {@condition Charmed|XPHB} ally enters the aura, that condition has no effect on that ally while there.
    - class_name: Paladin
      class_source: XPHB
      subclass_name: Devotion
      subclass_source: XPHB
      feature: Smite of Protection
      source: XPHB
      level: 15
      entries:
        - Your magical smite now radiates protective energy. Whenever you cast {@spell Divine Smite|XPHB}, you and your allies have {@variantrule Cover|XPHB|Half Cover} while in your Aura of Protection. The aura has this benefit until the start of your next turn.
    - class_name: Paladin
      class_source: XPHB
      subclass_name: Devotion
      subclass_source: XPHB
      feature: Holy Nimbus
      source: XPHB
      level: 20
      entries:
        - As a {@variantrule Bonus Action|XPHB}, you can imbue your Aura of Protection with holy power, granting the benefits below for 10 minutes or until you end them (no action required). Once you use this feature, you can't use it again until you finish a {@variantrule Long Rest|XPHB}. You can also restore your use of it by expending a level 5 spell slot (no action required).
        - entries:
            - You have {@variantrule Advantage|XPHB} on any saving throw you are forced to make by a Fiend or an Undead.
          name: Holy Ward
          type: entries
        - entries:
            - Whenever an enemy starts its turn in the aura, that creature takes Radiant damage equal to your Charisma modifier plus your {@variantrule Proficiency|XPHB|Proficiency Bonus}.
          name: Radiant Damage
          type: entries
        - entries:
            - The aura is filled with {@variantrule Bright Light|XPHB} that is sunlight.
          name: Sunlight
          type: entries
    - class_name: Paladin
      class_source: XPHB
      subclass_name: Glory
      subclass_source: XPHB
      feature: Inspiring Smite
      source: XPHB
      level: 3
      entries:
        - Immediately after you cast {@spell Divine Smite|XPHB}, you can expend one use of your Channel Divinity and distribute {@variantrule Temporary Hit Points|XPHB} to creatures of your choice within 30 feet of yourself, which can include you. The total number of {@variantrule Temporary Hit Points|XPHB} equals {@dice 2d8} plus your Paladin level, divided among the chosen creatures however you like.
    - class_name: Paladin
      class_source: XPHB
      subclass_name: Glory
      subclass_source: XPHB
      feature: Oath of Glory
      source: XPHB
      level: 3
      entries:
        - '{@i Strive for the Heights of Heroism}'
        - Paladins who take the Oath of Glory believe they and their companions are destined to achieve glory through deeds of heroism. They train diligently and encourage their companions, so they're all ready when destiny calls.
        - 'These paladins share the following tenets:'
        - items:
            - Endeavor to be known by your deeds.
            - Face hardships with courage.
            - Inspire others to strive for glory.
          type: list
        - subclassFeature: Oath of Glory Spells|Paladin|XPHB|Glory|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Inspiring Smite|Paladin|XPHB|Glory|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Peerless Athlete|Paladin|XPHB|Glory|XPHB|3
          type: refSubclassFeature
