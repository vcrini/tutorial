    - class_name: Cleric
      class_source: XPHB
      subclass_name: Light
      subclass_source: XPHB
      feature: Radiance of the Dawn
      source: XPHB
      level: 3
      entries:
        - As a {@action Magic|XPHB} action, you present your {@item Holy Symbol|XPHB} and expend a use of your Channel Divinity to emit a flash of light in a 30-foot {@variantrule Emanation [Area of Effect]|XPHB|Emanation} originating from yourself. Any magical {@variantrule Darkness|XPHB}—such as that created by the {@spell Darkness|XPHB} spell—in that area is dispelled. Additionally, each creature of your choice in that area must make a Constitution saving throw, taking Radiant damage equal to {@dice 2d10} plus your Cleric level on a failed save or half as much damage on a successful one.
    - class_name: Cleric
      class_source: XPHB
      subclass_name: Light
      subclass_source: XPHB
      feature: Warding Flare
      source: XPHB
      level: 3
      entries:
        - When a creature that you can see within 30 feet of yourself makes an attack roll, you can take a {@variantrule Reaction|XPHB} to impose {@variantrule Disadvantage|XPHB} on the attack roll, causing light to flare before it hits or misses.
        - You can use this feature a number of times equal to your Wisdom modifier (minimum of once). You regain all expended uses when you finish a {@variantrule Long Rest|XPHB}.
    - class_name: Cleric
      class_source: XPHB
      subclass_name: Light
      subclass_source: XPHB
      feature: Improved Warding Flare
      source: XPHB
      level: 6
      entries:
        - You regain all expended uses of your Warding Flare when you finish a {@variantrule Short Rest|XPHB|Short} or {@variantrule Long Rest|XPHB}.
        - In addition, whenever you use Warding Flare, you can give the target of the triggering attack a number of {@variantrule Temporary Hit Points|XPHB} equal to {@dice 2d6} plus your Wisdom modifier.
    - class_name: Cleric
      class_source: XPHB
      subclass_name: Light
      subclass_source: XPHB
      feature: Corona of Light
      source: XPHB
      level: 17
      entries:
        - As a {@action Magic|XPHB} action, you cause yourself to emit an aura of sunlight that lasts for 1 minute or until you dismiss it (no action required). You emit {@variantrule Bright Light|XPHB} in a 60-foot radius and {@variantrule Dim Light|XPHB} for an additional 30 feet. Your enemies in the {@variantrule Bright Light|XPHB} have {@variantrule Disadvantage|XPHB} on saving throws against your Radiance of the Dawn and any spell that deals Fire or Radiant damage.
        - You can use this feature a number of times equal to your Wisdom modifier (minimum of once), and you regain all expended uses when you finish a {@variantrule Long Rest|XPHB}.
