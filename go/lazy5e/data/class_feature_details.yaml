              - '{@spell healing word}, {@spell ray of sickness}'
            - - 5th
              - '{@spell flaming sphere}, {@spell Melf''s acid arrow}'
            - - 9th
              - '{@spell gaseous form}, {@spell mass healing word}'
            - - 13th
              - '{@spell blight}, {@spell death ward}'
            - - 17th
              - '{@spell cloudkill}, {@spell raise dead}'
          type: table
    - class_name: Artificer
      class_source: TCE
      subclass_name: Alchemist
      subclass_source: TCE
      feature: Experimental Elixir
      source: TCE
      level: 3
      entries:
        - Beginning at 3rd level, whenever you finish a long rest, you can magically produce an {@i experimental elixir} in an empty flask you touch. Roll on the Experimental Elixir table for the elixir's effect, which is triggered when someone drinks the elixir. As an action, a creature can drink the elixir or administer it to an {@condition incapacitated} creature.
        - Creating an {@i experimental elixir} requires you to have {@item alchemist's supplies|PHB} on your person, and any elixir you create with this feature lasts until it is drunk or until the end of your next long rest.
        - 'When you reach certain levels in this class, you can make more elixirs at the end of a long rest: two at 6th level and three at 15th level. Roll for each elixir''s effect separately. Each elixir requires its own flask.'
        - You can create additional {@i experimental elixirs} by expending a spell slot of 1st level or higher for each one. When you do so, you use your action to create the elixir in an empty flask you touch, and you choose the elixir's effect from the Experimental Elixir table.
        - caption: Experimental Elixir
          colLabels:
            - d6
            - Effect
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - "1"
              - '{@b Healing}. The drinker regains a number of hit points equal to {@dice 2d4} + your Intelligence modifier.'
            - - "2"
              - '{@b Swiftness}. The drinker''s walking speed increases by 10 feet for 1 hour.'
            - - "3"
              - '{@b Resilience}. The drinker gains a +1 bonus to AC for 10 minutes.'
            - - "4"
              - '{@b Boldness}. The drinker can roll a {@dice d4} and add the number rolled to every attack roll and saving throw they make for the next minute.'
            - - "5"
              - '{@b Flight}. The drinker gains a flying speed of 10 feet for 10 minutes.'
            - - "6"
              - '{@b Transformation}. The drinker''s body is transformed as if by the {@spell alter self} spell. The drinker determines the transformation caused by the spell, the effects of which last for 10 minutes.'
          type: table
    - class_name: Artificer
      class_source: TCE
      subclass_name: Alchemist
      subclass_source: TCE
      feature: Tool Proficiency
      source: TCE
      level: 3
      entries:
        - When you adopt this specialization at 3rd level, you gain proficiency with {@item alchemist's supplies|PHB}. If you already have this proficiency, you gain proficiency with one other type of {@item artisan's tools|PHB} of your choice.
    - class_name: Artificer
      class_source: TCE
      subclass_name: Alchemist
      subclass_source: TCE
      feature: Alchemical Savant
      source: TCE
      level: 5
      entries:
        - At 5th level, you develop masterful command of magical chemicals, enhancing the healing and damage you create through them. Whenever you cast a spell using your {@item alchemist's supplies|PHB} as the spellcasting focus, you gain a bonus to one roll of the spell. That roll must restore hit points or be a damage roll that deals acid, fire, necrotic, or poison damage, and the bonus equals your Intelligence modifier (minimum of +1).
    - class_name: Artificer
      class_source: TCE
      subclass_name: Alchemist
      subclass_source: TCE
      feature: Restorative Reagents
      source: TCE
      level: 9
      entries:
        - 'Starting at 9th level, you can incorporate restorative reagents into some of your works:'
        - items:
            - Whenever a creature drinks an {@i experimental elixir} you created, the creature gains temporary hit points equal to {@dice 2d6} + your Intelligence modifier (minimum of 1 temporary hit point).
            - You can cast {@spell lesser restoration} without expending a spell slot and without preparing the spell, provided you use {@item alchemist's supplies|PHB} as the spellcasting focus. You can do so a number of times equal to your Intelligence modifier (minimum of once), and you regain all expended uses when you finish a long rest.
          type: list
    - class_name: Artificer
      class_source: TCE
      subclass_name: Alchemist
      subclass_source: TCE
      feature: Chemical Mastery
      source: TCE
      level: 15
      entries:
        - 'By 15th level, you have been exposed to so many chemicals that they pose little risk to you, and you can use them to quickly end certain ailments:'
        - items:
            - You gain resistance to acid damage and poison damage, and you are immune to the {@condition poisoned} condition.
            - You can cast {@spell greater restoration} and {@spell heal} without expending a spell slot, without preparing the spell, and without material components, provided you use {@item alchemist's supplies|PHB} as the spellcasting focus. Once you cast either spell with this feature, you can't cast that spell with it again until you finish a long rest.
          type: list
    - class_name: Artificer
      class_source: TCE
      subclass_name: Armorer
      subclass_source: TCE
      feature: Arcane Armor
      source: TCE
      level: 3
      entries:
        - '{@i 3rd-level Armorer feature}'
        - Your metallurgical pursuits have led to you making armor a conduit for your magic. As an action, you can turn a suit of armor you are wearing into Arcane Armor, provided you have {@item smith's tools|PHB} in hand.
        - 'You gain the following benefits while wearing this armor:'
        - items:
            - If the armor normally has a Strength requirement, the arcane armor lacks this requirement for you.
            - You can use the arcane armor as a spellcasting focus for your artificer spells.
            - The armor attaches to you and can't be removed against your will. It also expands to cover your entire body, although you can retract or deploy the helmet as a bonus action. The armor replaces any missing limbs, functioning identically to a limb it replaces.
            - You can doff or don the armor as an action. The armor continues to be Arcane Armor until you don another suit of armor or you die.
          type: list
    - class_name: Artificer
      class_source: TCE
      subclass_name: Armorer
      subclass_source: TCE
      feature: Armor Model
      source: TCE
      level: 3
      entries:
        - '{@i 3rd-level Armorer feature}'
        - 'You can customize your Arcane Armor. When you do so, choose one of the following armor models: Guardian or Infiltrator. The model you choose gives you special benefits while you wear it.'
        - Each model includes a special weapon. When you attack with that weapon, you can add your Intelligence modifier, instead of Strength or Dexterity, to the attack and damage rolls.
        - You can change the armor's model whenever you finish a short or long rest, provided you have {@item smith's tools|PHB} in hand.
        - entries:
            - entries:
                - 'You design your armor to be in the front line of conflict. It has the following features:'
                - items:
                    - subclassFeature: Thunder Gauntlets|Artificer|TCE|Armorer|TCE|3
                      type: refSubclassFeature
                    - subclassFeature: Defensive Field|Artificer|TCE|Armorer|TCE|3
                      type: refSubclassFeature
                  style: list-hang-notitle
                  type: list
              name: Guardian
              type: entries
            - entries:
                - 'You customize your armor for subtle undertakings. It has the following features:'
                - items:
                    - subclassFeature: Lightning Launcher|Artificer|TCE|Armorer|TCE|3
                      type: refSubclassFeature
                    - subclassFeature: Powered Steps|Artificer|TCE|Armorer|TCE|3
                      type: refSubclassFeature
                    - subclassFeature: Dampening Field|Artificer|TCE|Armorer|TCE|3
                      type: refSubclassFeature
                  style: list-hang-notitle
                  type: list
              name: Infiltrator
              type: entries
          type: entries
    - class_name: Artificer
      class_source: TCE
      subclass_name: Armorer
      subclass_source: TCE
      feature: Armorer
      source: TCE
      level: 3
      entries:
        - An artificer who specializes as an Armorer modifies armor to function almost like a second skin. The armor is enhanced to hone the artificer's magic, unleash potent attacks, and generate a formidable defense. The artificer bonds with this armor, becoming one with it even as they experiment with it and refine its magical capabilities.
        - subclassFeature: Tools of the Trade|Artificer|TCE|Armorer|TCE|3
          type: refSubclassFeature
        - subclassFeature: Armorer Spells|Artificer|TCE|Armorer|TCE|3
          type: refSubclassFeature
        - subclassFeature: Arcane Armor|Artificer|TCE|Armorer|TCE|3
          type: refSubclassFeature
        - subclassFeature: Armor Model|Artificer|TCE|Armorer|TCE|3
          type: refSubclassFeature
    - class_name: Artificer
      class_source: TCE
      subclass_name: Armorer
      subclass_source: TCE
      feature: Armorer Spells
      source: TCE
      level: 3
      entries:
        - '{@i 3rd-level Armorer feature}'
        - You always have certain spells prepared after you reach particular levels in this class, as shown in the Armorer Spells table. These spells count as artificer spells for you, but they don't count against the number of artificer spells you prepare.
        - caption: Armorer Spells
          colLabels:
            - Artificer Level
            - Spell
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - 3rd
              - '{@spell magic missile}, {@spell thunderwave}'
            - - 5th
              - '{@spell mirror image}, {@spell shatter}'
            - - 9th
              - '{@spell hypnotic pattern}, {@spell lightning bolt}'
            - - 13th
              - '{@spell fire shield}, {@spell greater invisibility}'
            - - 17th
              - '{@spell passwall}, {@spell wall of force}'
          type: table
    - class_name: Artificer
      class_source: TCE
      subclass_name: Armorer
      subclass_source: TCE
      feature: Dampening Field
      source: TCE
      level: 3
      entries:
        - You have advantage on Dexterity ({@skill Stealth}) checks. If the armor normally imposes disadvantage on such checks, the advantage and disadvantage cancel each other, as normal.
    - class_name: Artificer
      class_source: TCE
      subclass_name: Armorer
      subclass_source: TCE
      feature: Defensive Field
      source: TCE
      level: 3
      entries:
        - As a bonus action, you can gain temporary hit points equal to your level in this class, replacing any temporary hit points you already have. You lose these temporary hit points if you doff the armor. You can use this bonus action a number of times equal to your proficiency bonus, and you regain all expended uses when you finish a long rest.
    - class_name: Artificer
      class_source: TCE
      subclass_name: Armorer
      subclass_source: TCE
      feature: Lightning Launcher
      source: TCE
      level: 3
      entries:
        - A gemlike node appears on one of your armored fists or on the chest (your choice). It counts as a simple ranged weapon, with a normal range of 90 feet and a long range of 300 feet, and it deals {@damage 1d6} lightning damage on a hit. Once on each of your turns when you hit a creature with it, you can deal an extra {@damage 1d6} lightning damage to that target.
    - class_name: Artificer
      class_source: TCE
      subclass_name: Armorer
      subclass_source: TCE
      feature: Powered Steps
      source: TCE
      level: 3
      entries:
        - Your walking speed increases by 5 feet.
    - class_name: Artificer
      class_source: TCE
      subclass_name: Armorer
      subclass_source: TCE
      feature: Thunder Gauntlets
      source: TCE
      level: 3
      entries:
        - Each of the armor's gauntlets counts as a simple melee weapon while you aren't holding anything in it, and it deals {@damage 1d8} thunder damage on a hit. A creature hit by the gauntlet has disadvantage on attack rolls against targets other than you until the start of your next turn, as the armor magically emits a distracting pulse when the creature attacks someone else.
    - class_name: Artificer
      class_source: TCE
      subclass_name: Armorer
      subclass_source: TCE
      feature: Tools of the Trade
      source: TCE
      level: 3
      entries:
        - '{@i 3rd-level Armorer feature}'
        - You gain proficiency with heavy armor. You also gain proficiency with {@item smith's tools|PHB}. If you already have this tool proficiency, you gain proficiency with one other type of {@item artisan's tools|PHB} of your choice.
    - class_name: Artificer
      class_source: TCE
      subclass_name: Armorer
      subclass_source: TCE
      feature: Extra Attack
      source: TCE
      level: 5
      entries:
        - '{@i 5th-level Armorer feature}'
        - You can attack twice, rather than once, whenever you take the {@action Attack} action on your turn.
    - class_name: Artificer
      class_source: TCE
      subclass_name: Armorer
      subclass_source: TCE
      feature: Armor Modifications
      source: TCE
      level: 9
      entries:
        - '{@i 9th-level Armorer feature}'
        - 'You learn how to use your artificer infusions to specially modify your Arcane Armor. That armor now counts as separate items for the purposes of your Infuse Items feature: armor (the chest piece), boots, helmet, and the armor''s special weapon. Each of those items can bear one of your infusions, and the infusions transfer over if you change your armor''s model with the Armor Model feature. In addition, the maximum number of items you can infuse at once increases by 2, but those extra items must be part of your Arcane Armor.'
    - class_name: Artificer
      class_source: TCE
      subclass_name: Armorer
      subclass_source: TCE
      feature: Guardian
      source: TCE
      level: 15
      entries:
        - When a Huge or smaller creature you can see ends its turn within 30 feet of you, you can use your reaction to magically force it to make a Strength saving throw against your spell save DC. On a failed save, you pull the creature up to 25 feet directly to an unoccupied space. If you pull the target to a space within 5 feet of you, you can make a melee weapon attack against it as part of this reaction.
        - You can use this reaction a number of times equal to your proficiency bonus, and you regain all expended uses of it when you finish a long rest.
    - class_name: Artificer
      class_source: TCE
      subclass_name: Armorer
      subclass_source: TCE
      feature: Infiltrator
      source: TCE
      level: 15
      entries:
        - Any creature that takes lightning damage from your Lightning Launcher glimmers with magical light until the start of your next turn. The glimmering creature sheds dim light in a 5-foot radius, and it has disadvantage on attack rolls against you, as the light jolts it if it attacks you. In addition, the next attack roll against it has advantage, and if that attack hits, the target takes an extra {@damage 1d6} lightning damage.
    - class_name: Artificer
      class_source: TCE
      subclass_name: Armorer
      subclass_source: TCE
      feature: Perfected Armor
      source: TCE
      level: 15
      entries:
        - '{@i 15th-level Armorer feature}'
        - Your Arcane Armor gains additional benefits based on its model, as shown below.
        - subclassFeature: Guardian|Artificer|TCE|Armorer|TCE|15
          type: refSubclassFeature
        - subclassFeature: Infiltrator|Artificer|TCE|Armorer|TCE|15
          type: refSubclassFeature
    - class_name: Artificer
      class_source: TCE
      subclass_name: Artillerist
      subclass_source: TCE
      feature: Artillerist
      source: TCE
      level: 3
      entries:
        - An Artillerist specializes in using magic to hurl energy, projectiles, and explosions on a battlefield. This destructive power was valued by all the armies of the Last War. Now that the war is over, some members of this specialization have sought to build a more peaceful world by using their powers to fight the resurgence of strife in Khorvaire.
        - 'The gnome artificer Vi, an unlikely yet key member of House Cannith''s warforged project, has been especially vocal about making things right: "It''s about time we fixed things instead of blowing them all to hell."'
        - subclassFeature: Tool Proficiency|Artificer|TCE|Artillerist|TCE|3
          type: refSubclassFeature
        - subclassFeature: Artillerist Spells|Artificer|TCE|Artillerist|TCE|3
          type: refSubclassFeature
        - subclassFeature: Eldritch Cannon|Artificer|TCE|Artillerist|TCE|3
          type: refSubclassFeature
    - class_name: Artificer
      class_source: TCE
      subclass_name: Artillerist
      subclass_source: TCE
      feature: Artillerist Spells
      source: TCE
      level: 3
      entries:
        - Starting at 3rd level, you always have certain spells prepared after you reach particular levels in this class, as shown in the Artillerist Spells table. These spells count as artificer spells for you, but they don't count against the number of artificer spells you prepare.
        - caption: Artillerist Spells
          colLabels:
            - Artificer Level
            - Spell
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - 3rd
              - '{@spell shield}, {@spell thunderwave}'
            - - 5th
              - '{@spell scorching ray}, {@spell shatter}'
            - - 9th
              - '{@spell fireball}, {@spell wind wall}'
            - - 13th
              - '{@spell ice storm}, {@spell wall of fire}'
            - - 17th
              - '{@spell cone of cold}, {@spell wall of force}'
          type: table
    - class_name: Artificer
      class_source: TCE
      subclass_name: Artillerist
      subclass_source: TCE
      feature: Eldritch Cannon
      source: TCE
      level: 3
      entries:
        - At 3rd level, you learn how to create a magical cannon. Using {@item woodcarver's tools|PHB} or {@item smith's tools|PHB}, you can take an action to magically create a Small or Tiny eldritch cannon in an unoccupied space on a horizontal surface within 5 feet of you. A Small eldritch cannon occupies its space, and a Tiny one can be held in one hand.
        - Once you create a cannon, you can't do so again until you finish a long rest or until you expend a spell slot of 1st level or higher. You can have only one cannon at a time and can't create one while your cannon is present.
        - The cannon is a magical object. Regardless of size, the cannon has an AC of 18 and a number of hit points equal to five times your artificer level. It is immune to poison damage and psychic damage, and all conditions. If it is forced to make an ability check or a saving throw, treat all its ability scores as 10 (+0). If the {@spell mending} spell is cast on it, it regains {@dice 2d6} hit points. It disappears if it is reduced to 0 hit points or after 1 hour. You can dismiss it early as an action.
        - When you create the cannon, you determine its appearance and whether it has legs. You also decide which type it is, choosing from the options on the Eldritch Cannons table. On each of your turns, you can take a bonus action to cause the cannon to activate if you are within 60 feet of it. As part of the same bonus action, you can direct the cannon to walk or climb up to 15 feet to an unoccupied space, provided it has legs.
        - caption: Eldritch Cannons
          colLabels:
            - Cannon
            - Activation
          colStyles:
            - col-2
            - col-10
          rows:
            - - '{@object Eldritch Cannon, Flamethrower|TCE|Flamethrower}'
              - The cannon exhales fire in an adjacent 15-foot cone that you designate. Each creature in that area must make a Dexterity saving throw against your spell save DC, taking {@damage 2d8} fire damage on a failed save or half as much damage on a successful one. The fire ignites any flammable objects in the area that aren't being worn or carried.
            - - '{@object Eldritch Cannon, Force Ballista|TCE|Force Ballista}'
              - Make a ranged spell attack, originating from the cannon, at one creature or object within 120 feet of it. On a hit, the target takes {@damage 2d8} force damage, and if the target is a creature, it is pushed up to 5 feet away from the cannon.
            - - '{@object Eldritch Cannon, Protector|TCE|Protector}'
              - The cannon emits a burst of positive energy that grants itself and each creature of your choice within 10 feet of it a number of temporary hit points equal to {@damage 1d8} + your Intelligence modifier (minimum of +1).
          type: table
    - class_name: Artificer
      class_source: TCE
      subclass_name: Artillerist
      subclass_source: TCE
      feature: Tool Proficiency
      source: TCE
      level: 3
      entries:
        - When you adopt this specialization at 3rd level, you gain proficiency with {@item woodcarver's tools|PHB}. If you already have this proficiency, you gain proficiency with one other type of {@item artisan's tools|PHB} of your choice.
    - class_name: Artificer
      class_source: TCE
      subclass_name: Artillerist
      subclass_source: TCE
      feature: Arcane Firearm
      source: TCE
      level: 5
      entries:
        - At 5th level, you know how to turn a wand, staff, or rod into an arcane firearm, a conduit for your destructive spells. When you finish a long rest, you can use {@item woodcarver's tools|PHB} to carve special sigils into a wand, staff, or rod and thereby turn it into your arcane firearm. The sigils disappear from the object if you later carve them on a different item. The sigils otherwise last indefinitely.
        - You can use your arcane firearm as a spellcasting focus for your artificer spells. When you cast an artificer spell through the firearm, roll a {@damage d8}, and you gain a bonus to one of the spell's damage rolls equal to the number rolled.
    - class_name: Artificer
      class_source: TCE
      subclass_name: Artillerist
      subclass_source: TCE
      feature: Explosive Cannon
      source: TCE
      level: 9
      entries:
        - 'Starting at 9th level, every eldritch cannon you create is more destructive:'
        - items:
            - The cannon's damage rolls all increase by {@damage 1d8}.
            - As an action, you can command the cannon to detonate if you are within 60 feet of it. Doing so destroys the cannon and forces each creature within 20 feet of it to make a Dexterity saving throw against your spell save DC, taking {@damage 3d8} force damage on a failed save or half as much damage on a successful one.
          type: list
    - class_name: Artificer
      class_source: TCE
      subclass_name: Artillerist
      subclass_source: TCE
      feature: Fortified Position
      source: TCE
      level: 15
      entries:
        - 'Starting at 15th level, you''re a master at forming well-defended emplacements using Eldritch Cannon:'
        - items:
            - You and your allies have {@quickref Cover||3||half cover} while within 10 feet of a cannon you create with Eldritch Cannon, as a result of a shimmering field of magical protection that the cannon emits.
            - You can now have two cannons at the same time. You can create two with the same action (but not the same spell slot), and you can activate both of them with the same bonus action. You determine whether the cannons are identical to each other or different. You can't create a third cannon while you have two.
          type: list
    - class_name: Artificer
      class_source: TCE
      subclass_name: Battle Smith
      subclass_source: TCE
      feature: Battle Ready
      source: TCE
      level: 3
      entries:
        - 'When you reach 3rd level, your combat training and your experiments with magic have paid off in two ways:'
        - items:
            - You gain proficiency with {@filter martial weapons|items|type=martial weapon}.
            - When you attack with a magic weapon, you can use your Intelligence modifier, instead of Strength or Dexterity modifier, for the attack and damage rolls.
          type: list
    - class_name: Artificer
      class_source: TCE
      subclass_name: Battle Smith
      subclass_source: TCE
      feature: Battle Smith
      source: TCE
      level: 3
      entries:
        - Armies require protection, and someone has to put things back together if defenses fail. A combination of protector and medic, a Battle Smith is an expert at defending others and repairing both material and personnel. To aid in their work, Battle Smiths are usually accompanied by a steel defender, a protective companion of their own creation. Many soldiers tell stories of nearly dying before being saved by a Battle Smith and a steel defender.
        - Battle Smiths played a key role in House Cannith's work on battle constructs and the original warforged, and after the Last War, these artificers led efforts to aid those who were injured in the war's horrific battles.
        - subclassFeature: Tool Proficiency|Artificer|TCE|Battle Smith|TCE|3
          type: refSubclassFeature
        - subclassFeature: Battle Smith Spells|Artificer|TCE|Battle Smith|TCE|3
          type: refSubclassFeature
        - subclassFeature: Battle Ready|Artificer|TCE|Battle Smith|TCE|3
          type: refSubclassFeature
        - subclassFeature: Steel Defender|Artificer|TCE|Battle Smith|TCE|3
          type: refSubclassFeature
    - class_name: Artificer
      class_source: TCE
      subclass_name: Battle Smith
      subclass_source: TCE
      feature: Battle Smith Spells
      source: TCE
      level: 3
      entries:
        - Starting at 3rd level, you always have certain spells prepared after you reach particular levels in this class, as shown in the Battle Smith Spells table. These spells count as artificer spells for you, but they don't count against the number of artificer spells you prepare.
        - caption: Battle Smith Spells
          colLabels:
            - Artificer Level
            - Spell
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - 3rd
              - '{@spell heroism}, {@spell shield}'
            - - 5th
              - '{@spell branding smite}, {@spell warding bond}'
            - - 9th
              - '{@spell aura of vitality}, {@spell conjure barrage}'
            - - 13th
              - '{@spell aura of purity}, {@spell fire shield}'
            - - 17th
              - '{@spell banishing smite}, {@spell mass cure wounds}'
          type: table
    - class_name: Artificer
      class_source: TCE
      subclass_name: Battle Smith
      subclass_source: TCE
      feature: Steel Defender
      source: TCE
      level: 3
      entries:
        - By 3rd level, your tinkering has borne you a faithful companion, a {@creature steel defender|tce}. It is friendly to you and your companions, and it obeys your commands. See this creature's game statistics in the steel defender stat block, which uses your proficiency bonus (PB) in several places. You determine the creature's appearance and whether it has two legs or four; your choice has no effect on its game statistics.
        - In combat, the defender shares your initiative count, but it takes its turn immediately after yours. It can move and use its reaction on its own, but the only action it takes on its turn is the {@action Dodge} action, unless you take a bonus action on your turn to command it to take another action. That action can be one in its stat block or some other action. If you are {@condition incapacitated}, the defender can take any action of its choice, not just {@action Dodge}.
        - If the {@spell mending} spell is cast on it, it regains {@dice 2d6} hit points. If it has died within the last hour, you can use your {@item smith's tools|PHB} as an action to revive it, provided you are within 5 feet of it and you expend a spell slot of 1st level or higher. The steel defender returns to life after 1 minute with all its hit points restored.
        - At the end of a long rest, you can create a new steel defender if you have your {@item smith's tools|PHB} with you. If you already have a steel defender from this feature, the first one immediately perishes. The defender also perishes if you die.
    - class_name: Artificer
      class_source: TCE
      subclass_name: Battle Smith
      subclass_source: TCE
      feature: Tool Proficiency
      source: TCE
      level: 3
      entries:
        - When you adopt this specialization at 3rd level, you gain proficiency with {@item smith's tools|PHB}. If you already have this proficiency, you gain proficiency with one other type of {@item artisan's tools|PHB} of your choice.
    - class_name: Artificer
      class_source: TCE
      subclass_name: Battle Smith
      subclass_source: TCE
      feature: Extra Attack
      source: TCE
      level: 5
      entries:
        - Starting at 5th level, you can attack twice, rather than once, whenever you take the {@action Attack} action on your turn.
    - class_name: Artificer
      class_source: TCE
      subclass_name: Battle Smith
      subclass_source: TCE
      feature: Arcane Jolt
      source: TCE
      level: 9
      entries:
        - 'At 9th level, you learn new ways to channel arcane energy to harm or heal. When either you hit a target with a magic weapon attack or your steel defender hits a target, you can channel magical energy through the strike to create one of the following effects:'
        - items:
            - The target takes an extra {@damage 2d6} force damage.
            - Choose one creature or object you can see within 30 feet of the target. Healing energy flows into the chosen recipient, restoring {@dice 2d6} hit points to it.
          type: list
        - You can use this energy a number of times equal to your Intelligence modifier (minimum of once), but you can do so no more than once on a turn. You regain all expended uses when you finish a long rest.
    - class_name: Artificer
      class_source: TCE
      subclass_name: Battle Smith
      subclass_source: TCE
      feature: Improved Defender
      source: TCE
      level: 15
      entries:
        - 'At 15th level, your Arcane Jolt and steel defender become more powerful:'
        - items:
            - The extra damage and the healing of your Arcane Jolt both increase to {@damage 4d6}.
            - Your steel defender gains a +2 bonus to Armor Class.
            - Whenever your steel defender uses its Deflect Attack, the attacker takes force damage equal to {@damage 1d4} + your Intelligence modifier.
          type: list
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Ancestral Guardian
      subclass_source: XGE
      feature: Ancestral Protectors
      source: XGE
      level: 3
      entries:
        - Starting when you choose this path at 3rd level, spectral warriors appear when you enter your rage. While you're raging, the first creature you hit with an attack on your turn becomes the target of the warriors, which hinder its attacks. Until the start of your next turn, that target has disadvantage on any attack roll that isn't against you, and when the target hits a creature other than you with an attack, that creature has resistance to the damage dealt by the attack. The effect on the target ends early if your rage ends.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Ancestral Guardian
      subclass_source: XGE
      feature: Path of the Ancestral Guardian
      source: XGE
      level: 3
      entries:
        - Some barbarians hail from cultures that revere their ancestors. These tribes teach that the warriors of the past linger in the world as mighty spirits, who can guide and protect the living. When a barbarian who follows this path rages, the barbarian contacts the spirit world and calls on these guardian spirits for aid.
        - Barbarians who draw on their ancestral guardians can better fight to protect their tribes and their allies. In order to cement ties to their ancestral guardians, barbarians who follow this path cover themselves in elaborate tattoos that celebrate their ancestors' deeds. These tattoos tell sagas of victories against terrible monsters and other fearsome rivals.
        - subclassFeature: Ancestral Protectors|Barbarian||Ancestral Guardian|XGE|3
          type: refSubclassFeature
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Ancestral Guardian
      subclass_source: XGE
      feature: Spirit Shield
      source: XGE
      level: 6
      entries:
        - Beginning at 6th level, the guardian spirits that aid you can provide supernatural protection to those you defend. If you are raging and another creature you can see within 30 feet of you takes damage, you can use your reaction to reduce that damage by {@dice 2d6}.
        - 'When you reach certain levels in this class, you can reduce the damage by more: by {@dice 3d6} at 10th level and by {@dice 4d6} at 14th level.'
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Ancestral Guardian
      subclass_source: XGE
      feature: Consult the Spirits
      source: XGE
      level: 10
      entries:
        - At 10th level, you gain the ability to consult with your ancestral spirits. When you do so, you cast the {@spell augury} or {@spell clairvoyance} spell, without using a spell slot or material components. Rather than creating a spherical sensor, this use of {@spell clairvoyance} invisibly summons one of your ancestral spirits to the chosen location. Wisdom is your spellcasting ability for these spells.
        - After you cast either spell in this way, you can't use this feature again until you finish a short or long rest.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Ancestral Guardian
      subclass_source: XGE
      feature: Vengeful Ancestors
      source: XGE
      level: 14
      entries:
        - At 14th level, your ancestral spirits grow powerful enough to retaliate. When you use your Spirit Shield to reduce the damage of an attack, the attacker takes an amount of force damage equal to the damage that your Spirit Shield prevents.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Battlerager
      subclass_source: SCAG
      feature: Battlerager Armor
      source: SCAG
      level: 3
      entries:
        - When you choose this path at 3rd level, you gain the ability to use {@item spiked armor|scag} as a weapon.
        - While you are wearing {@item spiked armor|scag} and are raging, you can use a bonus action to make one melee weapon attack with your armor spikes at a target within 5 feet of you. If the attack hits, the spikes deal {@damage 1d4} piercing damage. You use your Strength modifier for the attack and damage rolls.
        - Additionally, when you use the {@action Attack} action to grapple a creature, the target takes 3 piercing damage if your grapple check succeeds.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Battlerager
      subclass_source: SCAG
      feature: Path of the Battlerager
      source: SCAG
      level: 3
      entries:
        - Known as Kuldjargh (literally "axe idiot") in Dwarvish, battleragers are dwarf followers of the gods of war and take the Path of the Battlerager. They specialize in wearing bulky, {@item spiked armor|scag} and throwing themselves into combat, striking with their body itself and giving themselves over to the fury of battle.
        - subclassFeature: Restriction—Dwarves Only|Barbarian||Battlerager|SCAG|3
          type: refSubclassFeature
        - subclassFeature: Battlerager Armor|Barbarian||Battlerager|SCAG|3
          type: refSubclassFeature
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Battlerager
      subclass_source: SCAG
      feature: Restriction—Dwarves Only
      source: SCAG
      level: 3
      entries:
        - Only dwarves can follow the Path of the Battlerager. The battlerager fills a particular niche in dwarven society and culture.
        - Your DM can lift this restriction to better suit the campaign. The restriction exists for the Forgotten Realms. It might not apply to your DM's setting or your DM's version of the Realms.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Battlerager
      subclass_source: SCAG
      feature: Reckless Abandon
      source: SCAG
      level: 6
      entries:
        - Beginning at 6th level, when you use Reckless Attack while raging, you also gain temporary hit points equal to your Constitution modifier (minimum of 1). They vanish if any of them are left when your rage ends.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Battlerager
      subclass_source: SCAG
      feature: Battlerager Charge
      source: SCAG
      level: 10
      entries:
        - Beginning at 10th level, you can take the {@action Dash} action as a bonus action while you are raging.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Battlerager
      subclass_source: SCAG
      feature: Spiked Retribution
      source: SCAG
      level: 14
      entries:
        - Starting at 14th level, when a creature within 5 feet of you hits you with a melee attack, the attacker takes 3 piercing damage if you are raging, aren't {@condition incapacitated}, and are wearing {@item spiked armor|scag}.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Beast
      subclass_source: TCE
      feature: Form of the Beast
      source: TCE
      level: 3
      entries:
        - '{@i 3rd-level Path of the Beast feature}'
        - When you enter your rage, you can transform, revealing the bestial power within you. Until the rage ends, you manifest a natural weapon. It counts as a simple melee weapon for you, and you add your Strength modifier to the attack and damage rolls when you attack with it, as normal.
        - 'You choose the weapon''s form each time you rage:'
        - items:
            - entry: Your mouth transforms into a bestial muzzle or great mandibles (your choice). It deals {@damage 1d8} piercing damage on a hit. Once on each of your turns when you damage a creature with this bite, you regain a number of hit points equal to your proficiency bonus, provided you have less than half your hit points when you hit.
              name: Bite
              type: item
            - entry: Each of your hands transforms into a claw, which you can use as a weapon if it's empty. It deals {@damage 1d6} slashing damage on a hit. Once on each of your turns when you attack with a claw using the {@action Attack} action, you can make one additional claw attack as part of the same action.
              name: Claws
              type: item
            - entry: You grow a lashing, spiny tail, which deals {@damage 1d8} piercing damage on a hit and has the reach property. If a creature you can see within 10 feet of you hits you with an attack roll, you can use your reaction to swipe your tail and roll a {@dice d8}, applying a bonus to your AC equal to the number rolled, potentially causing the attack to miss you.
              name: Tail
              type: item
          style: list-hang-notitle
          type: list
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Beast
      subclass_source: TCE
      feature: Path of the Beast
      source: TCE
      level: 3
      entries:
        - Barbarians who walk the Path of the Beast draw their rage from a bestial spark burning within their souls. That beast bursts forth in the throes of rage, physically transforming the barbarian.
        - Such a barbarian might be inhabited by a primal spirit or be descended from shape-shifters. You can choose the origin of your feral might or determine it by rolling on the Origin of the Beast table.
        - caption: Origin of the Beast
          colLabels:
            - d4
            - Origin
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - "1"
              - One of your parents is a lycanthrope, and you've inherited some of their curse.
            - - "2"
              - You are descended from an archdruid and inherited the ability to partially change shape.
            - - "3"
              - A fey spirit gifted you with the ability to adopt different bestial aspects.
            - - "4"
              - An ancient animal spirit dwells within you, allowing you to walk this path.
          type: table
        - subclassFeature: Form of the Beast|Barbarian||Beast|TCE|3
          type: refSubclassFeature
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Beast
      subclass_source: TCE
      feature: Bestial Soul
      source: TCE
      level: 6
      entries:
        - '{@i 6th-level Path of the Beast feature}'
        - The feral power within you increases, causing the natural weapons of your Form of the Beast to count as magical for the purpose of overcoming resistance and immunity to nonmagical attacks and damage.
        - 'You can also alter your form to help you adapt to your surroundings. When you finish a short or long rest, choose one of the following benefits, which lasts until you finish your next short or long rest:'
        - items:
            - You gain a swimming speed equal to your walking speed, and you can breathe underwater.
            - You gain a climbing speed equal to your walking speed, and you can climb difficult surfaces, including upside down on ceilings, without needing to make an ability check.
            - When you jump, you can make a Strength ({@skill Athletics}) check and extend your jump by a number of feet equal to the check's total. You can make this special check only once per turn.
          type: list
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Beast
      subclass_source: TCE
      feature: Infectious Fury
      source: TCE
      level: 10
      entries:
        - '{@i 10th-level Path of the Beast feature}'
        - 'When you hit a creature with your natural weapons while you are raging, the beast within you can curse your target with rabid fury. The target must succeed on a Wisdom saving throw (DC equal to 8 + your Constitution modifier + your proficiency bonus) or suffer one of the following effects (your choice):'
        - items:
            - The target must use its reaction to make a melee attack against another creature of your choice that you can see.
            - The target takes {@damage 2d12} psychic damage.
          type: list
        - You can use this feature a number of times equal to your proficiency bonus, and you regain all expended uses when you finish a long rest.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Beast
      subclass_source: TCE
      feature: Call the Hunt
      source: TCE
      level: 14
      entries:
        - '{@i 14th-level Path of the Beast feature}'
        - The beast within you grows so powerful that you can spread its ferocity to others and gain resilience from them joining your hunt. When you enter your rage, you can choose a number of other willing creatures you can see within 30 feet of you equal to your Constitution modifier (minimum of one creature).
        - 'You gain 5 temporary hit points for each creature that accepts this feature. Until the rage ends, the chosen creatures can each use the following benefit once on each of their turns: when the creature hits a target with an attack roll and deals damage to it, the creature can roll a {@dice d6} and gain a bonus to the damage equal to the number rolled.'
        - You can use this feature a number of times equal to your proficiency bonus, and you regain all expended uses when you finish a long rest.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Berserker
      subclass_source: PHB
      feature: Frenzy
      source: PHB
      level: 3
      entries:
        - Starting when you choose this path at 3rd level, you can go into a frenzy when you rage. If you do so, for the duration of your rage you can make a single melee weapon attack as a bonus action on each of your turns after this one. When your rage ends, you suffer one level of {@condition exhaustion}.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Berserker
      subclass_source: PHB
      feature: Path of the Berserker
      source: PHB
      level: 3
      entries:
        - For some barbarians, rage is a means to an end—that end being violence. The Path of the Berserker is a path of untrammeled fury, slick with blood. As you enter the berserker's rage, you thrill in the chaos of battle, heedless of your own health or well-being.
        - subclassFeature: Frenzy|Barbarian||Berserker||3
          type: refSubclassFeature
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Berserker
      subclass_source: PHB
      feature: Mindless Rage
      source: PHB
      level: 6
      entries:
        - Beginning at 6th level, you can't be {@condition charmed} or {@condition frightened} while raging. If you are {@condition charmed} or {@condition frightened} when you enter your rage, the effect is suspended for the duration of the rage.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Berserker
      subclass_source: PHB
      feature: Intimidating Presence
      source: PHB
      level: 10
      entries:
        - Beginning at 10th level, you can use your action to frighten someone with your menacing presence. When you do so, choose one creature that you can see within 30 feet of you. If the creature can see or hear you, it must succeed on a Wisdom saving throw (DC equal to 8 + your proficiency bonus + your Charisma modifier) or be {@condition frightened} of you until the end of your next turn. On subsequent turns, you can use your action to extend the duration of this effect on the {@condition frightened} creature until the end of your next turn. This effect ends if the creature ends its turn out of line of sight or more than 60 feet away from you.
        - If the creature succeeds on its saving throw, you can't use this feature on that creature again for 24 hours.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Berserker
      subclass_source: PHB
      feature: Retaliation
      source: PHB
      level: 14
      entries:
        - Starting at 14th level, when you take damage from a creature that is within 5 feet of you, you can use your reaction to make a melee weapon attack against that creature.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Giant
      subclass_source: BGG
      feature: Giant Power
      source: BGG
      level: 3
      entries:
        - '{@i 3rd-Level Path of the Giant Feature}'
        - 'When you choose this path, you learn to speak, read, and write Giant or one other language of your choice if you already know Giant. Additionally, you learn a cantrip of your choice: either {@spell druidcraft} or {@spell thaumaturgy}. Wisdom is your spellcasting ability for this spell.'
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Giant
      subclass_source: BGG
      feature: Giant's Havoc
      source: BGG
      level: 3
      entries:
        - '{@i 3rd-Level Path of the Giant Feature}'
        - 'Your rages pull strength from the primal might of giants, transforming you into a hulking force of destruction. While raging, you gain the following benefits:'
        - items:
            - entry: When you make a successful ranged attack with a thrown weapon using Strength, you can add your Rage Damage bonus to the attack's damage roll.
              name: Crushing Throw
              type: item
            - entry: Your reach increases by 5 feet, and if you are smaller than Large, you become Large, along with anything you are wearing. If there isn't enough room for you to increase your size, your size doesn't change.
              name: Giant Stature
              type: item
          style: list-hang-notitle
          type: list
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Giant
      subclass_source: BGG
      feature: Path of the Giant
      source: BGG
      level: 3
      entries:
        - Barbarians who walk the Path of the Giant draw strength from the same primal forces as giants. As they rage, these barbarians surge with elemental power and grow in size, taking on forms that evoke the glory of giants. Some barbarians look like oversized versions of themselves, perhaps with a hint of elemental energy flaring in their eyes and around their weapons. Others transform more dramatically, taking on the appearance of an actual giant or a form similar to an Elemental, wreathed in fire, frost, or lightning.
        - subclassFeature: Giant Power|Barbarian||Giant|BGG|3
          type: refSubclassFeature
        - subclassFeature: Giant's Havoc|Barbarian||Giant|BGG|3
          type: refSubclassFeature
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Giant
      subclass_source: BGG
      feature: Elemental Cleaver
      source: BGG
      level: 6
      entries:
        - '{@i 6th-Level Path of the Giant Feature}'
        - Your bond with the elemental might of giants grows, and you learn to infuse weapons with primordial energy.
        - 'When you enter your rage, you can choose one weapon that you are holding and infuse it with one of the following damage types: acid, cold, fire, thunder, or lightning. While you wield the infused weapon during your rage, the weapon''s damage type changes to the chosen type, it deals an extra {@damage 1d6} damage of the chosen type when it hits, and it gains the thrown property, with a normal range of 20 feet and a long range of 60 feet. If you throw the weapon, it reappears in your hand the instant after it hits or misses a target. The infused weapon''s benefits are suppressed while a creature other than you wields it.'
        - While raging and holding the infused weapon, you can use a bonus action to change the infused weapon's current damage type to another one from the damage type options above.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Giant
      subclass_source: BGG
      feature: Mighty Impel
      source: BGG
      level: 10
      entries:
        - '{@i 10th-Level Path of the Giant Feature}'
        - Your connection to giant strength allows you to hurl both allies and enemies on the battlefield. As a bonus action while raging, you can choose one Medium or smaller creature within your reach and move it to an unoccupied space you can see within 30 feet of yourself. An unwilling creature must succeed on a Strength saving throw (DC equals 8 + your proficiency bonus + your Strength modifier) to avoid the effect.
        - If, at the end of this movement, the thrown creature isn't on a surface or liquid that can support it, the creature falls, taking damage as normal and landing {@condition prone}.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Giant
      subclass_source: BGG
      feature: Demiurgic Colossus
      source: BGG
      level: 14
      entries:
        - '{@i 14th-Level Path of the Giant Feature}'
        - The primordial power of your rage intensifies. When you rage, your reach increases by 10 feet, your size can increase to Large or Huge (your choice), and you can use your Mighty Impel to move creatures that are Large or smaller.
        - In addition, the extra damage dealt by your Elemental Cleaver feature increases to {@dice 2d6}.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Storm Herald
      subclass_source: XGE
      feature: Desert
      source: XGE
      level: 3
      entries:
        - When this effect is activated, all other creatures in your aura take 2 fire damage each. The damage increases when you reach certain levels in this class, increasing to 3 at 5th level, 4 at 10th level, 5 at 15th level, and 6 at 20th level.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Storm Herald
      subclass_source: XGE
      feature: Path of the Storm Herald
      source: XGE
      level: 3
      entries:
        - All barbarians harbor a fury within. Their rage grants them superior strength, durability, and speed. Barbarians who follow the Path of the Storm Herald learn to transform that rage into a mantle of primal magic, which swirls around them. When in a fury, a barbarian of this path taps into the forces of nature to create powerful magical effects.
        - Storm heralds are typically elite champions who train alongside druids, rangers, and others sworn to protect nature. Other storm heralds hone their craft in lodges in regions wracked by storms, in the frozen reaches at the world's end, or deep in the hottest deserts.
        - subclassFeature: Storm Aura|Barbarian||Storm Herald|XGE|3
          type: refSubclassFeature
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Storm Herald
      subclass_source: XGE
      feature: Sea
      source: XGE
      level: 3
      entries:
        - When this effect is activated, you can choose one other creature you can see in your aura. The target must make a Dexterity saving throw. The target takes {@damage 1d6} lightning damage on a failed save, or half as much damage on a successful one. The damage increases when you reach certain levels in this class, increasing to {@damage 2d6} at 10th level, {@damage 3d6} at 15th level, and {@damage 4d6} at 20th level.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Storm Herald
      subclass_source: XGE
      feature: Storm Aura
      source: XGE
      level: 3
      entries:
        - Starting at 3rd level, you emanate a stormy, magical aura while you rage. The aura extends 10 feet from you in every direction, but not through {@quickref Cover||3||total cover}.
        - Your aura has an effect that activates when you enter your rage, and you can activate the effect again on each of your turns as a bonus action. Choose desert, sea, or tundra. Your aura's effect depends on that chosen environment, as detailed below. You can change your environment choice whenever you gain a level in this class.
        - If your aura's effects require a saving throw, the DC equals 8 + your proficiency bonus + your Constitution modifier.
        - entries:
            - subclassFeature: Desert|Barbarian|PHB|Storm Herald|XGE|3
              type: refSubclassFeature
            - subclassFeature: Sea|Barbarian|PHB|Storm Herald|XGE|3
              type: refSubclassFeature
            - subclassFeature: Tundra|Barbarian|PHB|Storm Herald|XGE|3
              type: refSubclassFeature
          type: options
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Storm Herald
      subclass_source: XGE
      feature: Tundra
      source: XGE
      level: 3
      entries:
        - When this effect is activated, each creature of your choice in your aura gains 2 temporary hit points, as icy spirits inure it to suffering. The temporary hit points increase when you reach certain levels in this class, increasing to 3 at 5th level, 4 at 10th level, 5 at 15th level, and 6 at 20th level.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Storm Herald
      subclass_source: XGE
      feature: Desert
      source: XGE
      level: 6
      entries:
        - You gain resistance to fire damage, and you don't suffer the effects of extreme heat, as described in the Dungeon Master's Guide. Moreover, as an action, you can touch a flammable object that isn't being worn or carried by anyone else and set it on fire.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Storm Herald
      subclass_source: XGE
      feature: Sea
      source: XGE
      level: 6
      entries:
        - You gain resistance to lightning damage, and you can breathe underwater. You also gain a swimming speed of 30 feet.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Storm Herald
      subclass_source: XGE
      feature: Storm Soul
      source: XGE
      level: 6
      entries:
        - At 6th level, the storm grants you benefits even when your aura isn't active. The benefits are based on the environment you chose for your Storm Aura.
        - entries:
            - subclassFeature: Desert|Barbarian|PHB|Storm Herald|XGE|6
              type: refSubclassFeature
            - subclassFeature: Sea|Barbarian|PHB|Storm Herald|XGE|6
              type: refSubclassFeature
            - subclassFeature: Tundra|Barbarian|PHB|Storm Herald|XGE|6
              type: refSubclassFeature
          type: options
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Storm Herald
      subclass_source: XGE
      feature: Tundra
      source: XGE
      level: 6
      entries:
        - You gain resistance to cold damage, and you don't suffer the effects of extreme cold, as described in the Dungeon Master's Guide. Moreover, as an action, you can touch water and turn a 5-foot cube of it into ice, which melts after 1 minute. This action fails if a creature is in the cube.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Storm Herald
      subclass_source: XGE
      feature: Shielding Storm
      source: XGE
      level: 10
      entries:
        - At 10th level, you learn to use your mastery of the storm to protect others. Each creature of your choice has the damage resistance you gained from the Storm Soul feature while the creature is in your Storm Aura.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Storm Herald
      subclass_source: XGE
      feature: Desert
      source: XGE
      level: 14
      entries:
        - Immediately after a creature in your aura hits you with an attack, you can use your reaction to force that creature to make a Dexterity saving throw. On a failed save, the creature takes fire damage equal to half your barbarian level.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Storm Herald
      subclass_source: XGE
      feature: Raging Storm
      source: XGE
      level: 14
      entries:
        - At 14th level, the power of the storm you channel grows mightier, lashing out at your foes. The effect is based on the environment you chose for your Storm Aura.
        - entries:
            - subclassFeature: Desert|Barbarian|PHB|Storm Herald|XGE|14
              type: refSubclassFeature
            - subclassFeature: Sea|Barbarian|PHB|Storm Herald|XGE|14
              type: refSubclassFeature
            - subclassFeature: Tundra|Barbarian|PHB|Storm Herald|XGE|14
              type: refSubclassFeature
          type: options
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Storm Herald
      subclass_source: XGE
      feature: Sea
      source: XGE
      level: 14
      entries:
        - When you hit a creature in your aura with an attack, you can use your reaction to force that creature to make a Strength saving throw. On a failed save, the creature is knocked {@condition prone}, as if struck by a wave.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Storm Herald
      subclass_source: XGE
      feature: Tundra
      source: XGE
      level: 14
      entries:
        - Whenever the effect of your Storm Aura is activated, you can choose one creature you can see in the aura. That creature must succeed on a Strength saving throw, or its speed is reduced to 0 until the start of your next turn, as magical frost covers it.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Totem Warrior
      subclass_source: PHB
      feature: Bear
      source: PHB
      level: 3
      entries:
        - While raging, you have resistance to all damage except psychic damage. The spirit of the bear makes you tough enough to stand up to any punishment.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Totem Warrior
      subclass_source: PHB
      feature: Eagle
      source: PHB
      level: 3
      entries:
        - While you're raging and aren't wearing heavy armor, other creatures have disadvantage on opportunity attack rolls against you, and you can use the {@action Dash} action as a bonus action on your turn. The spirit of the eagle makes you into a predator who can weave through the fray with ease.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Totem Warrior
      subclass_source: PHB
      feature: Elk
      source: SCAG
      level: 3
      entries:
        - While you're raging and aren't wearing heavy armor, your walking speed increases by 15 feet. The spirit of the elk makes you extraordinarily swift.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Totem Warrior
      subclass_source: PHB
      feature: Path of the Totem Warrior
      source: PHB
      level: 3
      entries:
        - The Path of the Totem Warrior is a spiritual journey, as the barbarian accepts a spirit animal as guide, protector, and inspiration. In battle, your totem spirit fills you with supernatural might, adding magical fuel to your barbarian rage.
        - Most barbarian tribes consider a totem animal to be kin to a particular clan. In such cases, it is unusual for an individual to have more than one totem animal spirit, though exceptions exist.
        - subclassFeature: Spirit Seeker|Barbarian||Totem Warrior||3
          type: refSubclassFeature
        - subclassFeature: Totem Spirit|Barbarian||Totem Warrior||3
          type: refSubclassFeature
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Totem Warrior
      subclass_source: PHB
      feature: Spirit Seeker
      source: PHB
      level: 3
      entries:
        - Yours is a path that seeks attunement with the natural world, giving you a kinship with beasts. At 3rd level when you adopt this path, you gain the ability to cast the {@spell beast sense} and {@spell speak with animals} spells, but only as rituals, as described in {@book chapter 10|PHB|10|rituals}.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Totem Warrior
      subclass_source: PHB
      feature: Tiger
      source: SCAG
      level: 3
      entries:
        - While raging, you can add 10 feet to your long jump distance and 3 feet to your high jump distance. The spirit of the tiger empowers your leaps.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Totem Warrior
      subclass_source: PHB
      feature: Totem Spirit
      source: PHB
      level: 3
      entries:
        - At 3rd level, when you adopt this path, you choose a totem spirit and gain its feature. You must make or acquire a physical totem object—an amulet or similar adornment—that incorporates fur or feathers, claws, teeth, or bones of the totem animal. At your option, you also gain minor physical attributes that are reminiscent of your totem spirit. For example, if you have a bear totem spirit, you might be unusually hairy and thick-skinned, or if your totem is the eagle, your eyes turn bright yellow.
        - Your totem animal might be an animal related to those listed here but more appropriate to your homeland. For example, you could choose a hawk or vulture in place of an eagle.
        - count: 1
          entries:
            - subclassFeature: Bear|Barbarian||Totem Warrior||3
              type: refSubclassFeature
            - subclassFeature: Eagle|Barbarian||Totem Warrior||3
              type: refSubclassFeature
            - subclassFeature: Elk|Barbarian|PHB|Totem Warrior||3|SCAG
              type: refSubclassFeature
            - subclassFeature: Tiger|Barbarian|PHB|Totem Warrior||3|SCAG
              type: refSubclassFeature
            - subclassFeature: Wolf|Barbarian||Totem Warrior||3
              type: refSubclassFeature
          type: options
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Totem Warrior
      subclass_source: PHB
      feature: Wolf
      source: PHB
      level: 3
      entries:
        - While you're raging, your friends have advantage on melee attack rolls against any creature within 5 feet of you that is hostile to you. The spirit of the wolf makes you a leader of hunters.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Totem Warrior
      subclass_source: PHB
      feature: Aspect of the Beast
      source: PHB
      level: 6
      entries:
        - At 6th level, you gain a magical benefit based on the totem animal of your choice. You can choose the same animal you selected at 3rd level or a different one.
        - count: 1
          entries:
            - subclassFeature: Bear|Barbarian||Totem Warrior||6
              type: refSubclassFeature
            - subclassFeature: Eagle|Barbarian||Totem Warrior||6
              type: refSubclassFeature
            - subclassFeature: Elk|Barbarian|PHB|Totem Warrior||6|SCAG
              type: refSubclassFeature
            - subclassFeature: Tiger|Barbarian|PHB|Totem Warrior||6|SCAG
              type: refSubclassFeature
            - subclassFeature: Wolf|Barbarian||Totem Warrior||6
              type: refSubclassFeature
          type: options
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Totem Warrior
      subclass_source: PHB
      feature: Bear
      source: PHB
      level: 6
      entries:
        - You gain the might of a bear. Your carrying capacity (including maximum load and maximum lift) is doubled, and you have advantage on Strength checks made to push, pull, lift, or break objects.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Totem Warrior
      subclass_source: PHB
      feature: Eagle
      source: PHB
      level: 6
      entries:
        - You gain the eyesight of an eagle. You can see up to 1 mile away with no difficulty, able to discern even fine details as though looking at something no more than 100 feet away from you. Additionally, dim light doesn't impose disadvantage on your Wisdom ({@skill Perception}) checks.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Totem Warrior
      subclass_source: PHB
      feature: Elk
      source: SCAG
      level: 6
      entries:
        - Whether mounted or on foot, your travel pace is doubled, as is the travel pace of up to ten companions while they're within 60 feet of you and you're not {@condition incapacitated}. The elk spirit helps you roam far and fast.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Totem Warrior
      subclass_source: PHB
      feature: Tiger
      source: SCAG
      level: 6
      entries:
        - 'You gain proficiency in two skills from the following list: {@skill Athletics}, {@skill Acrobatics}, {@skill Stealth}, and {@skill Survival}. The cat spirit hones your survival instincts.'
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Totem Warrior
      subclass_source: PHB
      feature: Wolf
      source: PHB
      level: 6
      entries:
        - You gain the hunting sensibilities of a wolf. You can track other creatures while traveling at a fast pace, and you can move stealthily while traveling at a normal pace.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Totem Warrior
      subclass_source: PHB
      feature: Spirit Walker
      source: PHB
      level: 10
      entries:
        - At 10th level, you can cast the {@spell commune with nature} spell, but only as a ritual. When you do so, a spiritual version of one of the animals you chose for Totem Spirit or Aspect of the Beast appears to you to convey the information you seek.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Totem Warrior
      subclass_source: PHB
      feature: Bear
      source: PHB
      level: 14
      entries:
        - While you're raging, any creature within 5 feet of you that's hostile to you has disadvantage on attack rolls against targets other than you or another character with this feature. An enemy is immune to this effect if it can't see or hear you or if it can't be {@condition frightened}.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Totem Warrior
      subclass_source: PHB
      feature: Eagle
      source: PHB
      level: 14
      entries:
        - While raging, you have a flying speed equal to your current walking speed. This benefit works only in short bursts; you fall if you end your turn in the air and nothing else is holding you aloft.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Totem Warrior
      subclass_source: PHB
      feature: Elk
      source: SCAG
      level: 14
      entries:
        - While raging, you can use a bonus action during your move to pass through the space of a Large or smaller creature. That creature must succeed on a Strength saving throw ({@dc 8} + your Strength bonus + your proficiency bonus) or be knocked {@condition prone} and take bludgeoning damage equal to {@damage 1d12} + your Strength modifier.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Totem Warrior
      subclass_source: PHB
      feature: Tiger
      source: SCAG
      level: 14
      entries:
        - While you're raging, if you move at least 20 feet in a straight line toward a Large or smaller target right before making a melee weapon attack against it, you can use a bonus action to make an additional melee weapon attack against it.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Totem Warrior
      subclass_source: PHB
      feature: Totemic Attunement
      source: PHB
      level: 14
      entries:
        - At 14th level, you gain a magical benefit based on a totem animal of your choice. You can choose the same animal you selected previously or a different one.
        - count: 1
          entries:
            - subclassFeature: Bear|Barbarian||Totem Warrior||14
              type: refSubclassFeature
            - subclassFeature: Eagle|Barbarian||Totem Warrior||14
              type: refSubclassFeature
            - subclassFeature: Elk|Barbarian|PHB|Totem Warrior||14|SCAG
              type: refSubclassFeature
            - subclassFeature: Tiger|Barbarian|PHB|Totem Warrior||14|SCAG
              type: refSubclassFeature
            - subclassFeature: Wolf|Barbarian||Totem Warrior||14
              type: refSubclassFeature
          type: options
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Totem Warrior
      subclass_source: PHB
      feature: Wolf
      source: PHB
      level: 14
      entries:
        - While you're raging, you can use a bonus action on your turn to knock a Large or smaller creature {@condition prone} when you hit it with melee weapon attack.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Wild Magic
      subclass_source: TCE
      feature: Magic Awareness
      source: TCE
      level: 3
      entries:
        - '{@i 3rd-level Path of Wild Magic feature}'
        - As an action, you can open your awareness to the presence of concentrated magic. Until the end of your next turn, you know the location of any spell or magic item within 60 feet of you that isn't behind {@quickref Cover||3||total cover}. When you sense a spell, you learn which school of magic it belongs to.
        - You can use this feature a number of times equal to your proficiency bonus, and you regain all expended uses when you finish a long rest.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Wild Magic
      subclass_source: TCE
      feature: Path of Wild Magic
      source: TCE
      level: 3
      entries:
        - Many places in the multiverse abound with beauty, intense emotion, and rampant magic; the Feywild, the Upper Planes, and other realms of supernatural power radiate with such forces and can profoundly influence people. As folk of deep feeling, barbarians are especially susceptible to these wild influences, with some barbarians being transformed by the magic. These magic-suffused barbarians walk the Path of Wild Magic. Elf, tiefling, aasimar, and genasi barbarians often seek this path, eager to manifest the otherworldly magic of their ancestors.
        - subclassFeature: Magic Awareness|Barbarian||Wild Magic|TCE|3
          type: refSubclassFeature
        - subclassFeature: Wild Surge|Barbarian||Wild Magic|TCE|3
          type: refSubclassFeature
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Wild Magic
      subclass_source: TCE
      feature: Wild Surge
      source: TCE
      level: 3
      entries:
        - '{@i 3rd-level Path of Wild Magic feature}'
        - The magical energy roiling inside you sometimes erupts from you. When you enter your rage, roll on the Wild Magic table to determine the magical effect produced.
        - If the effect requires a saving throw, the DC equals 8 + your proficiency bonus + your Constitution modifier.
        - caption: Wild Magic
          colLabels:
            - d8
            - Magical Effect
          colStyles:
            - col-2 text-center
            - col-10
          data:
            genTables:
                tableInclude: true
          rows:
            - - "1"
              - Shadowy tendrils lash around you. Each creature of your choice that you can see within 30 feet of you must succeed on a Constitution saving throw or take {@damage 1d12} necrotic damage. You also gain {@dice 1d12} temporary hit points.
            - - "2"
              - You teleport up to 30 feet to an unoccupied space you can see. Until your rage ends, you can use this effect again on each of your turns as a bonus action.
            - - "3"
              - An intangible spirit, which looks like a {@creature flumph} or a {@creature pixie} (your choice), appears within 5 feet of one creature of your choice that you can see within 30 feet of you. At the end of the current turn, the spirit explodes, and each creature within 5 feet of it must succeed on a Dexterity saving throw or take {@damage 1d6} force damage. Until your rage ends, you can use this effect again, summoning another spirit, on each of your turns as a bonus action.
            - - "4"
              - Magic infuses one weapon of your choice that you are holding. Until your rage ends, the weapon's damage type changes to force, and it gains the light and thrown properties, with a normal range of 20 feet and a long range of 60 feet. If the weapon leaves your hand, the weapon reappears in your hand at the end of the current turn.
            - - "5"
              - Whenever a creature hits you with an attack roll before your rage ends, that creature takes {@damage 1d6} force damage, as magic lashes out in retribution.
            - - "6"
              - Until your rage ends, you are surrounded by multi colored, protective lights; you gain a +1 bonus to AC, and while within 10 feet of you, your allies gain the same bonus.
            - - "7"
              - Flowers and vines temporarily grow around you. Until your rage ends, the ground within 15 feet of you is {@quickref difficult terrain||3} for your enemies.
            - - "8"
              - A bolt of light shoots from your chest. Another creature of your choice that you can see within 30 feet of you must succeed on a Constitution saving throw or take {@damage 1d6} radiant damage and be {@condition blinded} until the start of your next turn. Until your rage ends, you can use this effect again on each of your turns as a bonus action.
          type: table
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Wild Magic
      subclass_source: TCE
      feature: Bolstering Magic
      source: TCE
      level: 6
      entries:
        - '{@i 6th-level Path of Wild Magic feature}'
        - 'You can harness your wild magic to bolster yourself or a companion. As an action, you can touch one creature (which can be yourself) and confer one of the following benefits of your choice to that creature:'
        - items:
            - For 10 minutes, the creature can roll a {@dice d3} whenever making an attack roll or an ability check and add the number rolled to the {@dice d20} roll.
            - Roll a {@dice d3}. The creature regains one expended spell slot, the level of which equals the number rolled or lower (the creature's choice). Once a creature receives this benefit, that creature can't receive it again until after a long rest.
          type: list
        - You can take this action a number of times equal to your proficiency bonus, and you regain all expended uses when you finish a long rest.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Wild Magic
      subclass_source: TCE
      feature: Unstable Backlash
      source: TCE
      level: 10
      entries:
        - '{@i 10th-level Path of Wild Magic feature}'
        - When you are imperiled during your rage, the magic within you can lash out; immediately after you take damage or fail a saving throw while raging, you can use your reaction to roll on the Wild Magic table and immediately produce the effect rolled. This effect replaces your current Wild Magic effect.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Wild Magic
      subclass_source: TCE
      feature: Controlled Surge
      source: TCE
      level: 14
      entries:
        - '{@i 14th-level Path of Wild Magic feature}'
        - Whenever you roll on the Wild Magic table, you can roll the die twice and choose which of the two effects to unleash. If you roll the same number on both dice, you can ignore the number and choose any effect on the table.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Zealot
      subclass_source: XGE
      feature: Divine Fury
      source: XGE
      level: 3
      entries:
        - Starting when you choose this path at 3rd level, you can channel divine fury into your weapon strikes. While you're raging, the first creature you hit on each of your turns with a weapon attack takes extra damage equal to {@damage 1d6} + half your barbarian level. The extra damage is necrotic or radiant; you choose the type of damage when you gain this feature.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Zealot
      subclass_source: XGE
      feature: Path of the Zealot
      source: XGE
      level: 3
      entries:
        - Some deities inspire their followers to pitch themselves into a ferocious battle fury. These barbarians are zealots—warriors who channel their rage into powerful displays of divine power.
        - A variety of gods across the worlds of D&D inspire their followers to embrace this path. Tempus from the Forgotten Realms and Hextor and Erythnul of Greyhawk are all prime examples. In general, the gods who inspire zealots are deities of combat, destruction, and violence. Not all are evil, but few are good.
        - subclassFeature: Divine Fury|Barbarian||Zealot|XGE|3
          type: refSubclassFeature
        - subclassFeature: Warrior of the Gods|Barbarian||Zealot|XGE|3
          type: refSubclassFeature
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Zealot
      subclass_source: XGE
      feature: Warrior of the Gods
      source: XGE
      level: 3
      entries:
        - At 3rd level, your soul is marked for endless battle. If a spell, such as {@spell raise dead}, has the sole effect of restoring you to life (but not undeath), the caster doesn't need material components to cast the spell on you.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Zealot
      subclass_source: XGE
      feature: Fanatical Focus
      source: XGE
      level: 6
      entries:
        - Starting at 6th level, the divine power that fuels your rage can protect you. If you fail a saving throw while you're raging, you can reroll it, and you must use the new roll. You can use this ability only once per rage.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Zealot
      subclass_source: XGE
      feature: Zealous Presence
      source: XGE
      level: 10
      entries:
        - At 10th level, you learn to channel divine power to inspire zealotry in others. As a bonus action, you unleash a battle cry infused with divine energy. Up to ten other creatures of your choice within 60 feet of you that can hear you gain advantage on attack rolls and saving throws until the start of your next turn.
        - Once you use this feature, you can't use it again until you finish a long rest.
    - class_name: Barbarian
      class_source: PHB
      subclass_name: Zealot
      subclass_source: XGE
      feature: Rage beyond Death
      source: XGE
      level: 14
      entries:
        - Beginning at 14th level, the divine power that fuels your rage allows you to shrug off fatal blows.
        - While you're raging, having 0 hit points doesn't knock you {@condition unconscious}. You still must make death saving throws, and you suffer the normal effects of taking damage while at 0 hit points. However, if you would die due to failing death saving throws, you don't die until your rage ends, and you die then only if you still have 0 hit points.
    - class_name: Barbarian
      class_source: XPHB
      subclass_name: Berserker
      subclass_source: XPHB
      feature: Frenzy
      source: XPHB
      level: 3
      entries:
        - If you use Reckless Attack while your Rage is active, you deal extra damage to the first target you hit on your turn with a Strength-based attack. To determine the extra damage, roll a number of d6s equal to your Rage Damage bonus, and add them together. The damage has the same type as the weapon or {@variantrule Unarmed Strike|XPHB} used for the attack.
    - class_name: Barbarian
      class_source: XPHB
      subclass_name: Berserker
      subclass_source: XPHB
      feature: Path of the Berserker
      source: XPHB
      level: 3
      entries:
        - '{@i Channel Rage into Violent Fury}'
        - Barbarians who walk the Path of the Berserker direct their Rage primarily toward violence. Their path is one of untrammeled fury, and they thrill in the chaos of battle as they allow their Rage to seize and empower them.
        - subclassFeature: Frenzy|Barbarian|XPHB|Berserker|XPHB|3
          type: refSubclassFeature
    - class_name: Barbarian
      class_source: XPHB
      subclass_name: Berserker
      subclass_source: XPHB
      feature: Mindless Rage
      source: XPHB
      level: 6
      entries:
        - You have {@variantrule Immunity|XPHB} to the {@condition Charmed|XPHB} and {@condition Frightened|XPHB} conditions while your Rage is active. If you're {@condition Charmed|XPHB} or {@condition Frightened|XPHB} when you enter your Rage, the condition ends on you.
    - class_name: Barbarian
      class_source: XPHB
      subclass_name: Berserker
      subclass_source: XPHB
      feature: Retaliation
      source: XPHB
      level: 10
      entries:
        - When you take damage from a creature that is within 5 feet of you, you can take a {@variantrule Reaction|XPHB} to make one melee attack against that creature, using a weapon or an {@variantrule Unarmed Strike|XPHB}.
    - class_name: Barbarian
      class_source: XPHB
      subclass_name: Berserker
      subclass_source: XPHB
      feature: Intimidating Presence
      source: XPHB
      level: 14
      entries:
        - As a {@variantrule Bonus Action|XPHB}, you can strike terror into others with your menacing presence and primal power. When you do so, each creature of your choice in a 30-foot {@variantrule Emanation [Area of Effect]|XPHB|Emanation} originating from you must make a Wisdom saving throw ({@dc 8} plus your Strength modifier and {@variantrule Proficiency|XPHB|Proficiency Bonus}). On a failed save, a creature has the {@condition Frightened|XPHB} condition for 1 minute. At the end of each of the {@condition Frightened|XPHB} creature's turns, the creature repeats the save, ending the effect on itself on a success.
        - Once you use this feature, you can't use it again until you finish a {@variantrule Long Rest|XPHB} unless you expend a use of your Rage (no action required) to restore your use of it.
    - class_name: Barbarian
      class_source: XPHB
      subclass_name: Wild Heart
      subclass_source: XPHB
      feature: Animal Speaker
      source: XPHB
      level: 3
      entries:
        - You can cast the {@spell Beast Sense|XPHB} and {@spell Speak with Animals|XPHB} spells but only as Rituals. Wisdom is your spellcasting ability for them.
    - class_name: Barbarian
      class_source: XPHB
      subclass_name: Wild Heart
      subclass_source: XPHB
      feature: Path of the Wild Heart
      source: XPHB
      level: 3
      entries:
        - '{@i Walk in Community with the Animal World}'
        - Barbarians who follow the Path of the Wild Heart view themselves as kin to animals. These Barbarians learn magical means to communicate with animals, and their Rage heightens their connection to animals as it fills them with supernatural might.
        - subclassFeature: Animal Speaker|Barbarian|XPHB|Wild Heart|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Rage of the Wilds|Barbarian|XPHB|Wild Heart|XPHB|3
          type: refSubclassFeature
    - class_name: Barbarian
      class_source: XPHB
      subclass_name: Wild Heart
      subclass_source: XPHB
      feature: Rage of the Wilds
      source: XPHB
      level: 3
      entries:
        - Your Rage taps into the primal power of animals. Whenever you activate your Rage, you gain one of the following options of your choice.
        - entries:
            - While your Rage is active, you have {@variantrule Resistance|XPHB} to every damage type except Force, Necrotic, Psychic, and Radiant.
          name: Bear
          type: entries
        - entries:
            - When you activate your Rage, you can take the {@action Disengage|XPHB} and {@action Dash|XPHB} actions as part of that {@variantrule Bonus Action|XPHB}. While your Rage is active, you can take a {@variantrule Bonus Action|XPHB} to take both of those actions.
          name: Eagle
          type: entries
        - entries:
            - While your Rage is active, your allies have {@variantrule Advantage|XPHB} on attack rolls against any enemy of yours within 5 feet of you.
          name: Wolf
          type: entries
    - class_name: Barbarian
      class_source: XPHB
      subclass_name: Wild Heart
      subclass_source: XPHB
      feature: Aspect of the Wilds
      source: XPHB
      level: 6
      entries:
        - You gain one of the following options of your choice. Whenever you finish a {@variantrule Long Rest|XPHB}, you can change your choice.
        - entries:
            - You have {@sense Darkvision|XPHB} with a range of 60 feet. If you already have {@sense Darkvision|XPHB}, its range increases by 60 feet.
          name: Owl
          type: entries
        - entries:
            - You have a {@variantrule Climb Speed|XPHB} equal to your {@variantrule Speed|XPHB}.
          name: Panther
          type: entries
        - entries:
            - You have a {@variantrule Swim Speed|XPHB} equal to your {@variantrule Speed|XPHB}.
          name: Salmon
          type: entries
    - class_name: Barbarian
      class_source: XPHB
      subclass_name: Wild Heart
      subclass_source: XPHB
      feature: Nature Speaker
      source: XPHB
      level: 10
      entries:
        - You can cast the {@spell Commune with Nature|XPHB} spell but only as a {@variantrule Ritual|XPHB}. Wisdom is your spellcasting ability for it.
    - class_name: Barbarian
      class_source: XPHB
      subclass_name: Wild Heart
      subclass_source: XPHB
      feature: Power of the Wilds
      source: XPHB
      level: 14
      entries:
        - Whenever you activate your Rage, you gain one of the following options of your choice.
        - entries:
            - While your Rage is active, you have a {@variantrule Fly Speed|XPHB} equal to your {@variantrule Speed|XPHB} if you aren't wearing any armor.
          name: Falcon
          type: entries
        - entries:
            - While your Rage is active, any of your enemies within 5 feet of you have {@variantrule Disadvantage|XPHB} on attack rolls against targets other than you or another Barbarian who has this option active.
          name: Lion
          type: entries
        - entries:
            - While your Rage is active, you can cause a Large or smaller creature to have the {@condition Prone|XPHB} condition when you hit it with a melee attack.
          name: Ram
          type: entries
    - class_name: Barbarian
      class_source: XPHB
      subclass_name: World Tree
      subclass_source: XPHB
      feature: Path of the World Tree
      source: XPHB
      level: 3
      entries:
        - '{@i Trace the Roots and Branches of the Multiverse}'
        - Barbarians who follow the Path of the World Tree connect with the cosmic tree Yggdrasil through their Rage. This tree grows among the Outer Planes, connecting them to each other and the Material Plane. These Barbarians draw on the tree's magic for vitality and as a means of dimensional travel.
        - subclassFeature: Vitality of the Tree|Barbarian|XPHB|World Tree|XPHB|3
          type: refSubclassFeature
    - class_name: Barbarian
      class_source: XPHB
      subclass_name: World Tree
      subclass_source: XPHB
      feature: Vitality of the Tree
      source: XPHB
      level: 3
      entries:
        - Your Rage taps into the life force of the World Tree. You gain the following benefits.
        - entries:
            - entries:
                - When you activate your Rage, you gain a number of {@variantrule Temporary Hit Points|XPHB} equal to your Barbarian level.
              name: Vitality Surge
              type: entries
            - entries:
                - At the start of each of your turns while your Rage is active, you can choose another creature within 10 feet of yourself to gain {@variantrule Temporary Hit Points|XPHB}. To determine the number of {@variantrule Temporary Hit Points|XPHB}, roll a number of d6s equal to your Rage Damage bonus, and add them together. If any of these {@variantrule Temporary Hit Points|XPHB} remain when your Rage ends, they vanish.
              name: Life-Giving Force
              type: entries
          type: entries
    - class_name: Barbarian
      class_source: XPHB
      subclass_name: World Tree
      subclass_source: XPHB
      feature: Branches of the Tree
      source: XPHB
      level: 6
      entries:
        - Whenever a creature you can see starts its turn within 30 feet of you while your Rage is active, you can take a {@variantrule Reaction|XPHB} to summon spectral branches of the World Tree around it. The target must succeed on a Strength saving throw ({@dc 8} plus your Strength modifier and {@variantrule Proficiency|XPHB|Proficiency Bonus}) or be teleported to an unoccupied space you can see within 5 feet of yourself or in the nearest unoccupied space you can see. After the target teleports, you can reduce its {@variantrule Speed|XPHB} to 0 until the end of the current turn.
    - class_name: Barbarian
      class_source: XPHB
      subclass_name: World Tree
      subclass_source: XPHB
      feature: Battering Roots
      source: XPHB
      level: 10
      entries:
        - During your turn, your reach is 10 feet greater with any {@filter Melee weapon that has the Heavy or Versatile property|items|type=melee weapon|property=heavy;versatile}, as tendrils of the World Tree extend from you. When you hit with such a weapon on your turn, you can activate the {@itemMastery Push|XPHB} or {@itemMastery Topple|XPHB} mastery property in addition to a different mastery property you're using with that weapon.
    - class_name: Barbarian
      class_source: XPHB
      subclass_name: World Tree
      subclass_source: XPHB
      feature: Travel Along the Tree
      source: XPHB
      level: 14
      entries:
        - When you activate your Rage and as a {@variantrule Bonus Action|XPHB} while your Rage is active, you can teleport up to 60 feet to an unoccupied space you can see.
        - In addition, once per Rage, you can increase the range of that teleport to 150 feet. When you do so, you can also bring up to six willing creatures who are within 10 feet of you. Each creature teleports to an unoccupied space of your choice within 10 feet of your destination space.
    - class_name: Barbarian
      class_source: XPHB
      subclass_name: Zealot
      subclass_source: XPHB
      feature: Divine Fury
      source: XPHB
      level: 3
      entries:
        - You can channel divine power into your strikes. On each of your turns while your Rage is active, the first creature you hit with a weapon or an {@variantrule Unarmed Strike|XPHB} takes extra damage equal to {@dice 1d6} plus half your Barbarian level (round down). The extra damage is Necrotic or Radiant; you choose the type each time you deal the damage.
    - class_name: Barbarian
      class_source: XPHB
      subclass_name: Zealot
      subclass_source: XPHB
      feature: Path of the Zealot
      source: XPHB
      level: 3
      entries:
        - '{@i Rage in Ecstatic Union with a God}'
        - Barbarians who walk the Path of the Zealot receive boons from a god or pantheon. These Barbarians experience their Rage as an ecstatic episode of divine union that infuses them with power. They are often allies to the priests and other followers of their god or pantheon.
        - subclassFeature: Divine Fury|Barbarian|XPHB|Zealot|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Warrior of the Gods|Barbarian|XPHB|Zealot|XPHB|3
          type: refSubclassFeature
    - class_name: Barbarian
      class_source: XPHB
      subclass_name: Zealot
      subclass_source: XPHB
      feature: Warrior of the Gods
      source: XPHB
      level: 3
      entries:
        - A divine entity helps ensure you can continue the fight. You have a pool of four d12s that you can spend to heal yourself. As a {@variantrule Bonus Action|XPHB}, you can expend dice from the pool, roll them, and regain a number of {@variantrule Hit Points|XPHB} equal to the roll's total.
        - Your pool regains all expended dice when you finish a {@variantrule Long Rest|XPHB}.
        - The pool's maximum number of dice increases by one when you reach Barbarian levels 6 (5 dice), 12 (6 dice), and 17 (7 dice).
    - class_name: Barbarian
      class_source: XPHB
      subclass_name: Zealot
      subclass_source: XPHB
      feature: Fanatical Focus
      source: XPHB
      level: 6
      entries:
        - Once per active Rage, if you fail a saving throw, you can reroll it with a bonus equal to your Rage Damage bonus, and you must use the new roll.
    - class_name: Barbarian
      class_source: XPHB
      subclass_name: Zealot
      subclass_source: XPHB
      feature: Zealous Presence
      source: XPHB
      level: 10
      entries:
        - As a {@variantrule Bonus Action|XPHB}, you unleash a battle cry infused with divine energy. Up to ten other creatures of your choice within 60 feet of you gain {@variantrule Advantage|XPHB} on attack rolls and saving throws until the start of your next turn.
        - Once you use this feature, you can't use it again until you finish a {@variantrule Long Rest|XPHB} unless you expend a use of your Rage (no action required) to restore your use of it.
    - class_name: Barbarian
      class_source: XPHB
      subclass_name: Zealot
      subclass_source: XPHB
      feature: Rage of the Gods
      source: XPHB
      level: 14
      entries:
        - When you activate your Rage, you can assume the form of a divine warrior. This form lasts for 1 minute or until you drop to 0 {@variantrule Hit Points|XPHB}. Once you use this feature, you can't do so again until you finish a {@variantrule Long Rest|XPHB}.
        - While in this form, you gain the benefits below.
        - entries:
            - You have a {@variantrule Fly Speed|XPHB} equal to your {@variantrule Speed|XPHB} and can hover.
          name: Flight
          type: entries
        - entries:
            - You have {@variantrule Resistance|XPHB} to Necrotic, Psychic, and Radiant damage.
          name: Resistance
          type: entries
        - entries:
            - When a creature within 30 feet of you would drop to 0 {@variantrule Hit Points|XPHB}, you can take a {@variantrule Reaction|XPHB} to expend a use of your Rage to instead change the target's {@variantrule Hit Points|XPHB} to a number equal to your Barbarian level.
          name: Revivification
          type: entries
    - class_name: Bard
      class_source: PHB
      subclass_name: Creation
      subclass_source: TCE
      feature: College of Creation
      source: TCE
      level: 3
      entries:
        - 'Bards believe the cosmos is a work of art-the creation of the first dragons and gods. That creative work included harmonies that continue to resound through existence today, a power known as the Song of Creation. The bards of the College of Creation draw on that primeval song through dance, music, and poetry, and their teachers share this lesson:'
        - '"Before the sun and the moon, there was the Song, and its music awoke the first dawn. Its melodies so delighted the stones and trees that some of them gained a voice of their own. And now they sing too. Learn the Song, students, and you too can teach the mountains to sing and dance."'
        - Dwarves and gnomes often encourage their bards to become students of the Song of Creation. And among dragonborn, the Song of Creation is revered, for legends portray Bahamut and Tiamat-the greatest of dragons-as two of the song's first singers.
        - subclassFeature: Mote of Potential|Bard||Creation|TCE|3
          type: refSubclassFeature
        - subclassFeature: Performance of Creation|Bard||Creation|TCE|3
          type: refSubclassFeature
    - class_name: Bard
      class_source: PHB
      subclass_name: Creation
      subclass_source: TCE
      feature: Mote of Potential
      source: TCE
      level: 3
      entries:
        - '{@i 3rd-level College of Creation feature}'
        - Whenever you give a creature a Bardic Inspiration die, you can utter a note from the Song of Creation to create a Tiny mote of potential, which orbits within 5 feet of that creature. The mote is intangible and invulnerable, and it lasts until the Bardic Inspiration die is lost. The mote looks like a musical note, a star, a flower, or another symbol of art or life that you choose.
        - 'When the creature uses the Bardic Inspiration die, the mote provides an additional effect based on whether the die benefits an ability check, an attack roll, or a saving throw, as detailed below:'
        - items:
            - entry: When the creature rolls the Bardic Inspiration die to add it to an ability check, the creature can roll the Bardic Inspiration die again and choose which roll to use, as the mote pops and emits colorful, harmless sparks for a moment.
              name: Ability Check
              type: item
            - entry: Immediately after the creature rolls the Bardic Inspiration die to add it to an attack roll against a target, the mote thunderously shatters. The target and each creature of your choice that you can see within 5 feet of it must succeed on a Constitution saving throw against your spell save DC or take thunder damage equal to the number rolled on the Bardic Inspiration die.
              name: Attack Roll
              type: item
            - entry: Immediately after the creature rolls the Bardic Inspiration die and adds it to a saving throw, the mote vanishes with the sound of soft music, causing the creature to gain temporary hit points equal to the number rolled on the Bardic Inspiration die plus your Charisma modifier (minimum of 1 temporary hit point).
              name: Saving Throw
              type: item
          style: list-hang-notitle
          type: list
    - class_name: Bard
      class_source: PHB
      subclass_name: Creation
      subclass_source: TCE
      feature: Performance of Creation
      source: TCE
      level: 3
      entries:
        - '{@i 3rd-level College of Creation feature}'
        - As an action, you can channel the magic of the Song of Creation to create one nonmagical item of your choice in an unoccupied space within 10 feet of you. The item must appear on a surface or in a liquid that can support it. The gp value of the item can't be more than 20 times your bard level, and the item must be Medium or smaller. The item glimmers softly, and a creature can faintly hear music when touching it. The created item disappears after a number of hours equal to your proficiency bonus. For examples of items you can create, see the equipment chapter of the {@book Player's Handbook|PHB|5}.
        - Once you create an item with this feature, you can't do so again until you finish a long rest, unless you expend a spell slot of 2nd level or higher to use this feature again. You can have only one item created by this feature at a time; if you use this action and already have an item from this feature, the first one immediately vanishes.
        - The size of the item you can create with this feature increases by one size category when you reach 6th level (Large) and 14th level (Huge).
    - class_name: Bard
      class_source: PHB
      subclass_name: Creation
      subclass_source: TCE
      feature: Animating Performance
      source: TCE
      level: 6
      entries:
        - '{@i 6th-level College of Creation feature}'
        - As an action, you can animate one Large or smaller nonmagical item within 30 feet of you that isn't being worn or carried. The animate item uses the {@creature Dancing Item|TCE} stat block, which uses your proficiency bonus (PB). The item is friendly to you and your companions and obeys your commands. It lives for 1 hour, until it is reduced to 0 hit points, or until you die.
        - In combat, the item shares your initiative count, but it takes its turn immediately after yours. It can move and use its reaction on its own, but the only action it takes on its turn is the {@action Dodge} action, unless you take a bonus action on your turn to command it to take another action. That action can be one in its stat block or some other action. If you are {@condition incapacitated}, the item can take any action of its choice, not just {@action Dodge}.
        - When you use your Bardic Inspiration feature, you can command the item as part of the same bonus action you use for Bardic Inspiration.
        - Once you animate an item with this feature, you can't do so again until you finish a long rest, unless you expend a spell slot of 3rd level or higher to use this feature again. You can have only one item animated by this feature at a time; if you use this action and already have a {@creature dancing item|TCE} from this feature, the first one immediately becomes inanimate.
    - class_name: Bard
      class_source: PHB
      subclass_name: Creation
      subclass_source: TCE
      feature: Creative Crescendo
      source: TCE
      level: 14
      entries:
        - '{@i 14th-level College of Creation feature}'
        - When you use your Performance of Creation feature, you can create more than one item at once. The number of items equals your Charisma modifier (minimum of two items). If you create an item that would exceed that number, you choose which of the previously created items disappears. Only one of these items can be of the maximum size you can create; the rest must be Small or Tiny.
        - You are no longer limited by gp value when creating items with Performance of Creation.
    - class_name: Bard
      class_source: PHB
      subclass_name: Eloquence
      subclass_source: TCE
      feature: College of Eloquence
      source: TCE
      level: 3
      entries:
        - Adherents of the College of Eloquence master the art of oratory. Persuasion is regarded as a high art, and a well-reasoned, well-spoken argument often proves more persuasive than facts. These bards wield a blend of logic and theatrical wordplay, winning over skeptics and detractors with logical arguments and plucking at heartstrings to appeal to the emotions of audiences.
        - subclassFeature: Silver Tongue|Bard||Eloquence|TCE|3
          type: refSubclassFeature
        - subclassFeature: Unsettling Words|Bard||Eloquence|TCE|3
          type: refSubclassFeature
    - class_name: Bard
      class_source: PHB
      subclass_name: Eloquence
      subclass_source: TCE
      feature: Silver Tongue
      source: TCE
      level: 3
      entries:
        - '{@i 3rd-level College of Eloquence feature}'
        - You are a master at saying the right thing at the right time. When you make a Charisma ({@skill Persuasion}) or Charisma ({@skill Deception}) check, you can treat a {@dice d20} roll of 9 or lower as a 10.
    - class_name: Bard
      class_source: PHB
      subclass_name: Eloquence
      subclass_source: TCE
      feature: Unsettling Words
      source: TCE
      level: 3
      entries:
        - '{@i 3rd-level College of Eloquence feature}'
        - You can spin words laced with magic that unsettle a creature and cause it to doubt itself. As a bonus action, you can expend one use of your Bardic Inspiration and choose one creature you can see within 60 feet of you. Roll the Bardic Inspiration die. The creature must subtract the number rolled from the next saving throw it makes before the start of your next turn.
    - class_name: Bard
      class_source: PHB
      subclass_name: Eloquence
      subclass_source: TCE
      feature: Unfailing Inspiration
      source: TCE
      level: 6
      entries:
        - '{@i 6th-level College of Eloquence feature}'
        - Your inspiring words are so persuasive that others feel driven to succeed. When a creature adds one of your Bardic Inspiration dice to its ability check, attack roll, or saving throw and the roll fails, the creature can keep the Bardic Inspiration die.
    - class_name: Bard
      class_source: PHB
      subclass_name: Eloquence
      subclass_source: TCE
      feature: Universal Speech
      source: TCE
      level: 6
      entries:
        - '{@i 6th-level College of Eloquence feature}'
        - You have gained the ability to make your speech intelligible to any creature. As an action, choose one or more creatures within 60 feet of you, up to a number equal to your Charisma modifier (minimum of one creature). The chosen creatures can magically understand you, regardless of the language you speak, for 1 hour.
        - Once you use this feature, you can't use it again until you finish a long rest, unless you expend a spell slot to use it again.
    - class_name: Bard
      class_source: PHB
      subclass_name: Eloquence
      subclass_source: TCE
      feature: Infectious Inspiration
      source: TCE
      level: 14
      entries:
        - '{@i 14th-level College of Eloquence feature}'
        - When you successfully inspire someone, the power of your eloquence can now spread to someone else. When a creature within 60 feet of you adds one of your Bardic Inspiration dice to its ability check, attack roll, or saving throw and the roll succeeds, you can use your reaction to encourage a different creature (other than yourself) that can hear you within 60 feet of you, giving it a Bardic Inspiration die without expending any of your Bardic Inspiration uses.
        - You can use this reaction a number of times equal to your Charisma modifier (minimum of once), and you regain all expended uses when you finish a long rest.
    - class_name: Bard
      class_source: PHB
      subclass_name: Glamour
      subclass_source: XGE
      feature: College of Glamour
      source: XGE
      level: 3
      entries:
        - The College of Glamour is the home of bards who mastered their craft in the vibrant realm of the Feywild or under the tutelage of someone who dwelled there. Tutored by satyrs, eladrin, and other fey, these bards learn to use their magic to delight and captivate others.
        - The bards of this college are regarded with a mixture of awe and fear. Their performances are the stuff of legend. These bards are so eloquent that a speech or song that one of them performs can cause captors to release the bard unharmed and can lull a furious dragon into complacency. The same magic that allows them to quell beasts can also bend minds. Villainous bards of this college can leech off a community for weeks, misusing their magic to turn their hosts into thralls. Heroic bards of this college instead use this power to gladden the downtrodden and undermine oppressors.
        - subclassFeature: Mantle of Inspiration|Bard||Glamour|XGE|3
          type: refSubclassFeature
        - subclassFeature: Enthralling Performance|Bard||Glamour|XGE|3
          type: refSubclassFeature
    - class_name: Bard
      class_source: PHB
      subclass_name: Glamour
      subclass_source: XGE
      feature: Enthralling Performance
      source: XGE
      level: 3
      entries:
        - Starting at 3rd level, you can charge your performance with seductive, fey magic.
        - If you perform for at least 1 minute, you can attempt to inspire wonder in your audience by singing, reciting a poem, or dancing. At the end of the performance, choose a number of humanoids within 60 feet of you who watched and listened to all of it, up to a number equal to your Charisma modifier (minimum of one). Each target must succeed on a Wisdom saving throw against your spell save DC or be {@condition charmed} by you. While {@condition charmed} in this way, the target idolizes you, it speaks glowingly of you to anyone who talks to it, and it hinders anyone who opposes you, although it avoids violence unless it was already inclined to fight on your behalf. This effect ends on a target after 1 hour, if it takes any damage, if you attack it, or if it witnesses you attacking or damaging any of its allies.
        - If a target succeeds on its saving throw, the target has no hint that you tried to charm it.
        - Once you use this feature, you can't use it again until you finish a short or long rest.
    - class_name: Bard
      class_source: PHB
      subclass_name: Glamour
      subclass_source: XGE
      feature: Mantle of Inspiration
      source: XGE
      level: 3
      entries:
        - When you join the College of Glamour at 3rd level, you gain the ability to weave a song of fey magic that imbues your allies with vigor and speed.
        - As a bonus action, you can expend one use of your Bardic Inspiration to grant yourself a wondrous appearance. When you do so, choose a number of creatures you can see and that can see you within 60 feet of you, up to a number equal to your Charisma modifier (minimum of one). Each of them gains 5 temporary hit points. When a creature gains these temporary hit points, it can immediately use its reaction to move up to its speed, without provoking opportunity attacks.
        - The number of temporary hit points increases when you reach certain levels in this class, increasing to 8 at 5th level, 11 at 10th level, and 14 at 15th level.
    - class_name: Bard
      class_source: PHB
      subclass_name: Glamour
      subclass_source: XGE
      feature: Mantle of Majesty
      source: XGE
      level: 6
      entries:
        - At 6th level, you gain the ability to cloak yourself in a fey magic that makes others want to serve you. As a bonus action, you cast {@spell command}, without expending a spell slot, and you take on an appearance of unearthly beauty for 1 minute or until your {@status concentration} ends (as if you were {@status concentration||concentrating} on a spell). During this time, you can cast {@spell command} as a bonus action on each of your turns, without expending a spell slot.
        - Any creature {@condition charmed} by you automatically fails its saving throw against the {@spell command} you cast with this feature.
        - Once you use this feature, you can't use it again until you finish a long rest.
    - class_name: Bard
      class_source: PHB
      subclass_name: Glamour
      subclass_source: XGE
      feature: Unbreakable Majesty
      source: XGE
      level: 14
      entries:
        - At 14th level, your appearance permanently gains an otherworldly aspect that makes you look more lovely and fierce.
        - In addition, as a bonus action, you can assume a magically majestic presence for 1 minute or until you are {@condition incapacitated}. For the duration, whenever any creature tries to attack you for the first time on a turn, the attacker must make a Charisma saving throw against your spell save DC. On a failed save, it can't attack you on this turn, and it must choose a new target for its attack or the attack is wasted. On a successful save, it can attack you on this turn, but it has disadvantage on any saving throw it makes against your spells on your next turn.
        - Once you assume this majestic presence, you can't do so again until you finish a short or long rest.
    - class_name: Bard
      class_source: PHB
      subclass_name: Lore
      subclass_source: PHB
      feature: Bonus Proficiencies
      source: PHB
      level: 3
      entries:
        - When you join the College of Lore at 3rd level, you gain proficiency with three skills of your choice.
    - class_name: Bard
      class_source: PHB
      subclass_name: Lore
      subclass_source: PHB
      feature: College of Lore
      source: PHB
      level: 3
      entries:
        - Bards of the College of Lore know something about most things, collecting bits of knowledge from sources as diverse as scholarly tomes and peasant tales. Whether singing folk ballads in taverns or elaborate compositions in royal courts, these bards use their gifts to hold audiences spellbound. When the applause dies down, the audience members might find themselves questioning everything they held to be true, from their faith in the priesthood of the local temple to their loyalty to the king.
        - The loyalty of these bards lies in the pursuit of beauty and truth, not in fealty to a monarch or following the tenets of a deity. A noble who keeps such a bard as a herald or advisor knows that the bard would rather be honest than politic.
        - The college's members gather in libraries and sometimes in actual colleges, complete with classrooms and dormitories, to share their lore with one another. They also meet at festivals or affairs of state, where they can expose corruption, unravel lies, and poke fun at self-important figures of authority.
        - subclassFeature: Bonus Proficiencies|Bard||Lore||3
          type: refSubclassFeature
        - subclassFeature: Cutting Words|Bard||Lore||3
          type: refSubclassFeature
    - class_name: Bard
      class_source: PHB
      subclass_name: Lore
      subclass_source: PHB
      feature: Cutting Words
      source: PHB
      level: 3
      entries:
        - Also at 3rd level, you learn how to use your wit to distract, confuse, and otherwise sap the confidence and competence of others. When a creature that you can see within 60 feet of you makes an attack roll, an ability check, or a damage roll, you can use your reaction to expend one of your uses of Bardic Inspiration, rolling a Bardic Inspiration die and subtracting the number rolled from the creature's roll. You can choose to use this feature after the creature makes its roll, but before the DM determines whether the attack roll or ability check succeeds or fails, or before the creature deals its damage. The creature is immune if it can't hear you or if it's immune to being {@condition charmed}.
    - class_name: Bard
      class_source: PHB
      subclass_name: Lore
      subclass_source: PHB
      feature: Additional Magical Secrets
      source: PHB
      level: 6
      entries:
        - At 6th level, you learn two spells of your choice from any class. A spell you choose must be of a level you can cast, as shown on the Bard table, or a cantrip. The chosen spells count as bard spells for you but don't count against the number of bard spells you know.
    - class_name: Bard
      class_source: PHB
      subclass_name: Lore
      subclass_source: PHB
      feature: Peerless Skill
      source: PHB
      level: 14
      entries:
        - Starting at 14th level, when you make an ability check, you can expend one use of Bardic Inspiration. Roll a Bardic Inspiration die and add the number rolled to your ability check. You can choose to do so after you roll the die for the ability check, but before the DM tells you whether you succeed or fail.
    - class_name: Bard
      class_source: PHB
      subclass_name: Spirits
      subclass_source: VRGR
      feature: College of Spirits
      source: VRGR
      level: 3
      entries:
        - Bards of the College of Spirits seek tales with inherent power—be they legends, histories, or fictions—and bring their subjects to life. Using occult trappings, these bards conjure spiritual embodiments of powerful forces to change the world once more. Such spirits are capricious, though, and what a bard summons isn't always entirely under their control.
        - subclassFeature: Guiding Whispers|Bard||Spirits|VRGR|3
          type: refSubclassFeature
        - subclassFeature: Spiritual Focus|Bard||Spirits|VRGR|3
          type: refSubclassFeature
        - subclassFeature: Tales from Beyond|Bard||Spirits|VRGR|3
          type: refSubclassFeature
    - class_name: Bard
      class_source: PHB
      subclass_name: Spirits
      subclass_source: VRGR
      feature: Guiding Whispers
      source: VRGR
      level: 3
      entries:
        - '{@i 3rd-level College of Spirits feature}'
        - You can reach out to spirits to guide you and others. You learn the {@spell guidance} cantrip, which doesn't count against the number of bard cantrips you know. For you, it has a range of 60 feet when you cast it.
    - class_name: Bard
      class_source: PHB
      subclass_name: Spirits
      subclass_source: VRGR
      feature: Spiritual Focus
      source: VRGR
      level: 3
      entries:
        - '{@i 3rd-level College of Spirits feature}'
        - 'You employ tools that aid you in channeling spirits, be they historical figures or fictional archetypes. You can use the following objects as a spellcasting focus for your bard spells: a candle, crystal ball, skull, spirit board, or {@deck tarokka deck|CoS}.'
        - Starting at 6th level, when you cast a bard spell that deals damage or restores hit points through the Spiritual Focus, roll a {@dice d6}, and you gain a bonus to one damage or healing roll of the spell equal to the number rolled.
    - class_name: Bard
      class_source: PHB
      subclass_name: Spirits
      subclass_source: VRGR
      feature: Tales from Beyond
      source: VRGR
      level: 3
      entries:
        - '{@i 3rd-level College of Spirits feature}'
        - You reach out to spirits who tell their tales through you. While you are holding your Spiritual Focus, you can use a bonus action to expend one use of your Bardic Inspiration and roll on the Spirit Tales table using your Bardic Inspiration die to determine the tale the spirits direct you to tell. You retain the tale in mind until you bestow the tale's effect or you finish a short or long rest.
        - You can use an action to choose one creature you can see within 30 feet of you (this can be you) to be the target of the tale's effect. Once you do so, you can't bestow the tale's effect again until you roll it again.
        - You can retain only one of these tales in mind at a time, and rolling on the Spirit Tales table immediately ends the effect of the previous tale.
        - If the tale requires a saving throw, the DC equals your spell save DC.
        - caption: Spirit Tales
          colLabels:
            - Bardic Insp. Die
            - Tale Told Through You
          colStyles:
            - col-2 text-center
            - col-10
          data:
            genTables:
                tableInclude: true
          rows:
            - - "1"
              - Tale of the Clever Animal. For the next 10 minutes, whenever the target makes an Intelligence, a Wisdom, or a Charisma check, the target can roll an extra die immediately after rolling the {@dice d20} and add the extra die's number to the check. The extra die is the same type as your Bardic Inspiration die.
            - - "2"
              - Tale of the Renowned Duelist. You make a melee spell attack against the target. On a hit, the target takes force damage equal to two rolls of your Bardic Inspiration die + your Charisma modifier.
            - - "3"
              - Tale of the Beloved Friends. The target and another creature of its choice it can see within 5 feet of it gains temporary hit points equal to a roll of your Bardic Inspiration die + your Charisma modifier.
            - - "4"
              - Tale of the Runaway. The target can immediately use its reaction to teleport up to 30 feet to an unoccupied space it can see. When the target teleports, it can choose a number of creatures it can see within 30 feet of it up to your Charisma modifier (minimum of 0) to immediately use the same reaction.
            - - "5"
              - Tale of the Avenger. For 1 minute, any creature that hits the target with a melee attack takes force damage equal to a roll of your Bardic Inspiration die.
            - - "6"
              - Tale of the Traveler. The target gains temporary hit points equal to a roll of your Bardic Inspiration die + your bard level. While it has these temporary hit points, the target's walking speed increases by 10 feet and it gains a +1 bonus to its AC.
            - - "7"
              - Tale of the Beguiler. The target must succeed on a Wisdom saving throw or take psychic damage equal to two rolls of your Bardic Inspiration die, and the target is {@condition incapacitated} until the end of its next turn.
            - - "8"
              - Tale of the Phantom. The target becomes {@condition invisible} until the end of its next turn or until it hits a creature with an attack. If the target hits a creature with an attack during this invisibility, the creature it hits takes necrotic damage equal to a roll of your Bardic Inspiration die and is {@condition frightened} of the target until the end of the {@condition frightened} creature's next turn.
            - - "9"
              - Tale of the Brute. Each creature of the target's choice it can see within 30 feet of it must make a Strength saving throw. On a failed save, a creature takes thunder damage equal to three rolls of your Bardic Inspiration die and is knocked {@condition prone}. A creature that succeeds on its saving throw takes half as much damage and isn't knocked {@condition prone}.
            - - "10"
              - Tale of the Dragon. The target spews fire from the mouth in a 30-foot cone. Each creature in that area must make a Dexterity saving throw, taking fire damage equal to four rolls of your Bardic Inspiration die on a failed save, or half as much damage on a successful one.
            - - "11"
              - 'Tale of the Angel. The target regains hit points equal to two rolls of your Bardic Inspiration die + your Charisma modifier, and you end one condition from the following list affecting the target: {@condition blinded}, {@condition deafened}, {@condition paralyzed}, {@condition petrified}, or {@condition poisoned}.'
            - - "12"
              - Tale of the Mind-Bender. You evoke an incomprehensible fable from an otherworldly being. The target must succeed on an Intelligence saving throw or take psychic damage equal to three rolls of your Bardic Inspiration die and be {@condition stunned} until the end of its next turn.
          type: table
    - class_name: Bard
      class_source: PHB
      subclass_name: Spirits
      subclass_source: VRGR
      feature: Spirit Session
      source: VRGR
      level: 6
      entries:
        - '{@i 6th-level College of Spirits feature}'
        - Spirits provide you with supernatural insights. You can conduct an hour-long ritual channeling spirits (which can be done during a short or long rest) using your Spiritual Focus. You can conduct the ritual with a number of willing creatures equal to your proficiency bonus (including yourself). At the end of the ritual, you temporarily learn {@filter one spell of your choice from any class|spells|school=d;n|level=0;1;2;3;4;5;6}.
        - The spell you choose must be of a level equal to the number of creatures that conducted the ritual or less, the spell must be of a level you can cast, and it must be in the school of divination or necromancy. The chosen spell counts as a bard spell for you but doesn't count against the number of bard spells you know.
        - Once you perform the ritual, you can't do so again until you start a long rest, and you know the chosen spell until you start a long rest.
    - class_name: Bard
      class_source: PHB
      subclass_name: Spirits
      subclass_source: VRGR
      feature: Mystical Connection
      source: VRGR
      level: 14
      entries:
        - '{@i 14th-level College of Spirits feature}'
        - You now have the ability to nudge the spirits of Tales from Beyond toward certain tales. Whenever you roll on the Spirit Tales table, you can roll the die twice and choose which of the two effects to bestow. If you roll the same number on both dice, you can ignore the number and choose any effect on the table.
        - entries:
            - Storytellers, like bards of the College of Spirits, often give voice to tales inspired by some greater theme or body of work. When determining what stories you tell, consider what unites them. Do they all feature characters from a specific group, like archetypes from the {@deck tarokka deck|CoS}, figures from constellations, childhood imaginary friends, or characters in a particular storybook? Or are your inspirations more general, incorporating historic champions, mythological heroes, or urban legends? Use the tales you tell to define your niche as a storytelling adventurer.
          name: Spirit Tales
          type: inset
    - class_name: Bard
      class_source: PHB
      subclass_name: Swords
      subclass_source: XGE
      feature: Blade Flourish
      source: XGE
      level: 3
      entries:
        - At 3rd level, you learn to perform impressive displays of martial prowess and speed.
        - Whenever you take the {@action Attack} action on your turn, your walking speed increases by 10 feet until the end of the turn, and if a weapon attack that you make as part of this action hits a creature, you can use one of the following Blade Flourish options of your choice. You can use only one Blade Flourish option per turn.
        - entries:
            - subclassFeature: Defensive Flourish|Bard|PHB|Swords|XGE|3
              type: refSubclassFeature
            - subclassFeature: Slashing Flourish|Bard|PHB|Swords|XGE|3
              type: refSubclassFeature
            - subclassFeature: Mobile Flourish|Bard|PHB|Swords|XGE|3
              type: refSubclassFeature
          type: options
    - class_name: Bard
      class_source: PHB
      subclass_name: Swords
      subclass_source: XGE
      feature: Bonus Proficiencies
      source: XGE
      level: 3
      entries:
        - When you join the College of Swords at 3rd level, you gain proficiency with medium armor and the {@item scimitar|phb}.
        - If you're proficient with a simple or martial melee weapon, you can use it as a spellcasting focus for your bard spells.
    - class_name: Bard
      class_source: PHB
      subclass_name: Swords
      subclass_source: XGE
      feature: College of Swords
      source: XGE
      level: 3
      entries:
        - Bards of the College of Swords are called blades, and they entertain through daring feats of weapon prowess. Blades perform stunts such as sword swallowing, knife throwing and juggling, and mock combats. Though they use their weapons to entertain, they are also highly trained and skilled warriors in their own right.
        - Their talent with weapons inspires many blades to lead double lives. One blade might use a circus troupe as cover for nefarious deeds such as assassination, robbery, and blackmail. Other blades strike at the wicked, bringing justice to bear against the cruel and powerful. Most troupes are happy to accept a blade's talent for the excitement it adds to a performance, but few entertainers fully trust a blade in their ranks.
        - Blades who abandon their lives as entertainers have often run into trouble that makes maintaining their secret activities impossible. A blade caught stealing or engaging in vigilante justice is too great a liability for most troupes. With their weapon skills and magic, these blades either take up work as enforcers for thieves' guilds or strike out on their own as adventurers.
        - subclassFeature: Bonus Proficiencies|Bard||Swords|XGE|3
          type: refSubclassFeature
        - subclassFeature: Fighting Style|Bard||Swords|XGE|3
          type: refSubclassFeature
        - subclassFeature: Blade Flourish|Bard||Swords|XGE|3
          type: refSubclassFeature
    - class_name: Bard
      class_source: PHB
      subclass_name: Swords
      subclass_source: XGE
      feature: Defensive Flourish
      source: XGE
      level: 3
      entries:
        - You can expend one use of your Bardic Inspiration to cause the weapon to deal extra damage to the target you hit. The damage equals the number you roll on the Bardic Inspiration die. You also add the number rolled to your AC until the start of your next turn.
    - class_name: Bard
      class_source: PHB
      subclass_name: Swords
      subclass_source: XGE
      feature: Fighting Style
      source: XGE
      level: 3
      entries:
        - At 3rd level, you adopt a style of fighting as your specialty. Choose one of the following options. You can't take a Fighting Style option more than once, even if something in the game lets you choose again.
        - count: 1
          entries:
            - optionalfeature: Dueling
              type: refOptionalfeature
            - optionalfeature: Two-Weapon Fighting
              type: refOptionalfeature
          type: options
    - class_name: Bard
      class_source: PHB
      subclass_name: Swords
      subclass_source: XGE
      feature: Mobile Flourish
      source: XGE
      level: 3
      entries:
        - You can expend one use of your Bardic Inspiration to cause the weapon to deal extra damage to the target you hit. The damage equals the number you roll on the Bardic Inspiration die. You can also push the target up to 5 feet away from you, plus a number of feet equal to the number you roll on that die. You can then immediately use your reaction to move up to your walking speed to an unoccupied space within 5 feet of the target.
    - class_name: Bard
      class_source: PHB
      subclass_name: Swords
      subclass_source: XGE
      feature: Slashing Flourish
      source: XGE
      level: 3
      entries:
        - You can expend one use of your Bardic Inspiration to cause the weapon to deal extra damage to the target you hit and to any other creature of your choice that you can see within 5 feet of you. The damage equals the number you roll on the Bardic Inspiration die.
    - class_name: Bard
      class_source: PHB
      subclass_name: Swords
      subclass_source: XGE
      feature: Extra Attack
      source: XGE
      level: 6
      entries:
        - Starting at 6th level, you can attack twice, instead of once, whenever you take the {@action Attack} action on your turn.
    - class_name: Bard
      class_source: PHB
      subclass_name: Swords
      subclass_source: XGE
      feature: Master's Flourish
      source: XGE
      level: 14
      entries:
        - Starting at 14th level, whenever you use a Blade Flourish option, you can roll a {@dice d6} and use it instead of expending a Bardic Inspiration die.
    - class_name: Bard
      class_source: PHB
      subclass_name: Valor
      subclass_source: PHB
      feature: Bonus Proficiencies
      source: PHB
      level: 3
      entries:
        - When you join the College of Valor at 3rd level, you gain proficiency with medium armor, shields, and martial weapons.
    - class_name: Bard
      class_source: PHB
      subclass_name: Valor
      subclass_source: PHB
      feature: College of Valor
      source: PHB
      level: 3
      entries:
        - Bards of the College of Valor are daring skalds whose tales keep alive the memory of the great heroes of the past, and thereby inspire a new generation of heroes. These bards gather in mead halls or around great bonfires to sing the deeds of the mighty, both past and present. They travel the land to witness great events firsthand and to ensure that the memory of those events doesn't pass from the world. With their songs, they inspire others to reach the same heights of accomplishment as the heroes of old.
        - subclassFeature: Bonus Proficiencies|Bard||Valor||3
          type: refSubclassFeature
        - subclassFeature: Combat Inspiration|Bard||Valor||3
          type: refSubclassFeature
    - class_name: Bard
      class_source: PHB
      subclass_name: Valor
      subclass_source: PHB
      feature: Combat Inspiration
      source: PHB
      level: 3
      entries:
        - Also at 3rd level, you learn to inspire others in battle. A creature that has a Bardic Inspiration die from you can roll that die and add the number rolled to a weapon damage roll it just made. Alternatively, when an attack roll is made against the creature, it can use its reaction to roll the Bardic Inspiration die and add the number rolled to its AC against that attack, after seeing the roll but before knowing whether it hits or misses.
    - class_name: Bard
      class_source: PHB
      subclass_name: Valor
      subclass_source: PHB
      feature: Extra Attack
      source: PHB
      level: 6
      entries:
        - Starting at 6th level, you can attack twice, instead of once, whenever you take the {@action Attack} action on your turn.
    - class_name: Bard
      class_source: PHB
      subclass_name: Valor
      subclass_source: PHB
      feature: Battle Magic
      source: PHB
      level: 14
      entries:
        - At 14th level, you have mastered the art of weaving spellcasting and weapon use into a single harmonious act. When you use your action to cast a bard spell, you can make one weapon attack as a bonus action.
    - class_name: Bard
      class_source: PHB
      subclass_name: Whispers
      subclass_source: XGE
      feature: College of Whispers
      source: XGE
      level: 3
      entries:
        - Most folk are happy to welcome a bard into their midst. Bards of the College of Whispers use this to their advantage. They appear to be like other bards, sharing news, singing songs, and telling tales to the audiences they gather. In truth, the College of Whispers teaches its students that they are wolves among sheep. These bards use their knowledge and magic to uncover secrets and turn them against others through extortion and threats.
        - Many other bards hate the College of Whispers, viewing it as a parasite that uses a bard's reputation to acquire wealth and power. For this reason, members of this college rarely reveal their true nature. They typically claim to follow some other college, or they keep their actual calling secret in order to infiltrate and exploit royal courts and other settings of power.
        - subclassFeature: Psychic Blades|Bard||Whispers|XGE|3
          type: refSubclassFeature
        - subclassFeature: Words of Terror|Bard||Whispers|XGE|3
          type: refSubclassFeature
    - class_name: Bard
      class_source: PHB
      subclass_name: Whispers
      subclass_source: XGE
      feature: Psychic Blades
      source: XGE
      level: 3
      entries:
        - When you join the College of Whispers at 3rd level, you gain the ability to make your weapon attacks magically toxic to a creature's mind.
        - When you hit a creature with a weapon attack, you can expend one use of your Bardic Inspiration to deal an extra {@damage 2d6} psychic damage to that target. You can do so only once per round on your turn.
        - The psychic damage increases when you reach certain levels in this class, increasing to {@damage 3d6} at 5th level, {@damage 5d6} at 10th level, and {@damage 8d6} at 15th level.
    - class_name: Bard
      class_source: PHB
      subclass_name: Whispers
      subclass_source: XGE
      feature: Words of Terror
      source: XGE
      level: 3
      entries:
        - At 3rd level, you learn to infuse innocent-seeming words with an insidious magic that can inspire terror.
        - If you speak to a humanoid alone for at least 1 minute, you can attempt to seed paranoia in its mind. At the end of the conversation, the target must succeed on a Wisdom saving throw against your spell save DC or be {@condition frightened} of you or another creature of your choice. The target is {@condition frightened} in this way for 1 hour, until it is attacked or damaged, or until it witnesses its allies being attacked or damaged.
        - If the target succeeds on its saving throw, the target has no hint that you tried to frighten it.
        - Once you use this feature, you can't use it again until you finish a short or long rest.
    - class_name: Bard
      class_source: PHB
      subclass_name: Whispers
      subclass_source: XGE
      feature: Mantle of Whispers
      source: XGE
      level: 6
      entries:
        - At 6th level, you gain the ability to adopt a humanoid's persona. When a humanoid dies within 30 feet of you, you can magically capture its shadow using your reaction. You retain this shadow until you use it or you finish a long rest.
        - You can use the shadow as an action. When you do so, it vanishes, magically transforming into a disguise that appears on you. You now look like the dead person, but healthy and alive. This disguise lasts for 1 hour or until you end it as a bonus action.
        - While you're in the disguise, you gain access to all information that the humanoid would freely share with a casual acquaintance. Such information includes general details on its background and personal life, but doesn't include secrets. The information is enough that you can pass yourself off as the person by drawing on its memories.
        - Another creature can see through this disguise by succeeding on a Wisdom ({@skill Insight}) check contested by your Charisma ({@skill Deception}) check. You gain a +5 bonus to your check.
        - Once you capture a shadow with this feature, you can't capture another one with it until you finish a short or long rest.
    - class_name: Bard
      class_source: PHB
      subclass_name: Whispers
      subclass_source: XGE
      feature: Shadow Lore
      source: XGE
      level: 14
      entries:
        - At 14th level, you gain the ability to weave dark magic into your words and tap into a creature's deepest fears.
        - As an action, you magically whisper a phrase that only one creature of your choice within 30 feet of you can hear. The target must make a Wisdom saving throw against your spell save DC. It automatically succeeds if it doesn't share a language with you or if it can't hear you. On a successful saving throw, your whisper sounds like unintelligible mumbling and has no effect.
        - On a failed saving throw, the target is {@condition charmed} by you for the next 8 hours or until you or your allies attack it, damage it, or force it to make a saving throw. It interprets the whispers as a description of its most mortifying secret. You gain no knowledge of this secret, but the target is convinced you know it.
        - The {@condition charmed} creature obeys your commands for fear that you will reveal its secret. It won't risk its life for you or fight for you, unless it was already inclined to do so. It grants you favors and gifts it would offer to a close friend.
        - When the effect ends, the creature has no understanding of why it held you in such fear.
        - Once you use this feature, you can't use it again until you finish a long rest.
    - class_name: Bard
      class_source: XPHB
      subclass_name: Dance
      subclass_source: XPHB
      feature: Agile Strikes
      source: XPHB
      level: 3
      entries:
        - When you expend a use of your Bardic Inspiration as part of an action, a {@variantrule Bonus Action|XPHB}, or a {@variantrule Reaction|XPHB}, you can make one {@variantrule Unarmed Strike|XPHB} as part of that action, {@variantrule Bonus Action|XPHB}, or {@variantrule Reaction|XPHB}.
    - class_name: Bard
      class_source: XPHB
      subclass_name: Dance
      subclass_source: XPHB
      feature: Bardic Damage
      source: XPHB
      level: 3
      entries:
        - You can use Dexterity instead of Strength for the attack rolls of your Unarmed Strikes. When you deal damage with an {@variantrule Unarmed Strike|XPHB}, you can deal Bludgeoning damage equal to a roll of your Bardic Inspiration die plus your Dexterity modifier, instead of the strike's normal damage. This roll doesn't expend the die.
    - class_name: Bard
      class_source: XPHB
      subclass_name: Dance
      subclass_source: XPHB
      feature: College of Dance
      source: XPHB
      level: 3
      entries:
        - '{@i Move in Harmony with the Cosmos}'
        - Bards of the College of Dance know that the Words of Creation can't be contained within speech or song; the words are uttered by the movements of celestial bodies and flow through the motions of the smallest creatures. These Bards practice a way of being in harmony with the whirling cosmos that emphasizes agility, speed, and grace.
        - subclassFeature: Dazzling Footwork|Bard|XPHB|Dance|XPHB|3
          type: refSubclassFeature
    - class_name: Bard
      class_source: XPHB
      subclass_name: Dance
      subclass_source: XPHB
      feature: Dance Virtuoso
      source: XPHB
      level: 3
      entries:
        - You have {@variantrule Advantage|XPHB} on any Charisma ({@skill Performance|XPHB}) check you make that involves you dancing.
    - class_name: Bard
      class_source: XPHB
      subclass_name: Dance
      subclass_source: XPHB
      feature: Dazzling Footwork
      source: XPHB
      level: 3
      entries:
        - While you aren't wearing armor or wielding a {@item Shield|XPHB}, you gain the following benefits.
        - subclassFeature: Dance Virtuoso|Bard|XPHB|Dance|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Unarmored Defense|Bard|XPHB|Dance|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Agile Strikes|Bard|XPHB|Dance|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Bardic Damage|Bard|XPHB|Dance|XPHB|3
          type: refSubclassFeature
    - class_name: Bard
      class_source: XPHB
      subclass_name: Dance
      subclass_source: XPHB
      feature: Unarmored Defense
      source: XPHB
      level: 3
      entries:
        - Your base {@variantrule Armor Class|XPHB} equals 10 plus your Dexterity and Charisma modifiers.
    - class_name: Bard
      class_source: XPHB
      subclass_name: Dance
      subclass_source: XPHB
      feature: Inspiring Movement
      source: XPHB
      level: 6
      entries:
        - When an enemy you can see ends its turn within 5 feet of you, you can take a {@variantrule Reaction|XPHB} and expend one use of your Bardic Inspiration to move up to half your {@variantrule Speed|XPHB}. Then one ally of your choice within 30 feet of you can also move up to half their {@variantrule Speed|XPHB} using their {@variantrule Reaction|XPHB}.
        - None of this feature's movement provokes {@action Opportunity Attack|XPHB|Opportunity Attacks}.
    - class_name: Bard
      class_source: XPHB
      subclass_name: Dance
      subclass_source: XPHB
      feature: Tandem Footwork
      source: XPHB
      level: 6
      entries:
        - When you roll {@variantrule Initiative|XPHB}, you can expend one use of your Bardic Inspiration if you don't have the {@condition Incapacitated|XPHB} condition. When you do so, roll your Bardic Inspiration die; you and each ally within 30 feet of you who can see or hear you gains a bonus to {@variantrule Initiative|XPHB} equal to the number rolled.
    - class_name: Bard
      class_source: XPHB
      subclass_name: Dance
      subclass_source: XPHB
      feature: Leading Evasion
      source: XPHB
      level: 14
      entries:
        - When you are subjected to an effect that allows you to make a Dexterity saving throw to take only half damage, you instead take no damage if you succeed on the saving throw and only half damage if you fail. If any creatures within 5 feet of you are making the same Dexterity saving throw, you can share this benefit with them for that save.
        - You can't use this feature if you have the {@condition Incapacitated|XPHB} condition.
    - class_name: Bard
      class_source: XPHB
      subclass_name: Glamour
      subclass_source: XPHB
      feature: Beguiling Magic
      source: XPHB
      level: 3
      entries:
        - You always have the {@spell Charm Person|XPHB} and {@spell Mirror Image|XPHB} spells prepared.
        - In addition, immediately after you cast an Enchantment or Illusion spell using a spell slot, you can cause a creature you can see within 60 feet of yourself to make a Wisdom saving throw against your spell save DC. On a failed save, the target has the {@condition Charmed|XPHB} or {@condition Frightened|XPHB} condition (your choice) for 1 minute. The target repeats the save at the end of each of its turns, ending the effect on itself on a success.
        - Once you use this benefit, you can't use it again until you finish a {@variantrule Long Rest|XPHB}. You can also restore your use of it by expending one use of your Bardic Inspiration (no action required).
    - class_name: Bard
      class_source: XPHB
      subclass_name: Glamour
      subclass_source: XPHB
      feature: College of Glamour
      source: XPHB
      level: 3
      entries:
        - '{@i Weave Beguiling Fey Magic}'
        - The College of Glamour traces its origins to the beguiling magic of the Feywild. Bards who study this magic weave threads of beauty and terror into their songs and stories, and the mightiest among them can cloak themselves in otherworldly majesty. Their performances stir up wistful longing for forgotten innocence, evoke unconscious memories of long-held fears, and tug at the emotions of even the most hard-hearted listeners.
        - subclassFeature: Beguiling Magic|Bard|XPHB|Glamour|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Mantle of Inspiration|Bard|XPHB|Glamour|XPHB|3
          type: refSubclassFeature
    - class_name: Bard
      class_source: XPHB
      subclass_name: Glamour
      subclass_source: XPHB
      feature: Mantle of Inspiration
      source: XPHB
      level: 3
      entries:
        - You can weave fey magic into a song or dance to fill others with vigor. As a {@variantrule Bonus Action|XPHB}, you can expend a use of Bardic Inspiration, rolling a Bardic Inspiration die. When you do so, choose a number of other creatures within 60 feet of yourself, up to a number equal to your Charisma modifier (minimum of one creature). Each of those creatures gains a number of {@variantrule Temporary Hit Points|XPHB} equal to two times the number rolled on the Bardic Inspiration die, and then each can use its {@variantrule Reaction|XPHB} to move up to its {@variantrule Speed|XPHB} without provoking {@action Opportunity Attack|XPHB|Opportunity Attacks}.
    - class_name: Bard
      class_source: XPHB
      subclass_name: Glamour
      subclass_source: XPHB
      feature: Mantle of Majesty
      source: XPHB
      level: 6
      entries:
        - You always have the {@spell Command|XPHB} spell prepared.
        - As a {@variantrule Bonus Action|XPHB}, you cast {@spell Command|XPHB} without expending a spell slot, and you take on an unearthly appearance for 1 minute or until your {@status Concentration|XPHB} ends. During this time, you can cast {@spell Command|XPHB} as a {@variantrule Bonus Action|XPHB} without expending a spell slot.
        - Any creature {@condition Charmed|XPHB} by you automatically fails its saving throw against the {@spell Command|XPHB} you cast with this feature.
        - Once you use this feature, you can't use it again until you finish a {@variantrule Long Rest|XPHB}. You can also restore your use of it by expending a level 3+ spell slot (no action required).
    - class_name: Bard
      class_source: XPHB
      subclass_name: Glamour
      subclass_source: XPHB
      feature: Unbreakable Majesty
      source: XPHB
      level: 14
      entries:
        - As a {@variantrule Bonus Action|XPHB}, you can assume a magically majestic presence for 1 minute or until you have the {@condition Incapacitated|XPHB} condition. For the duration, whenever any creature hits you with an attack roll for the first time on a turn, the attacker must succeed on a Charisma saving throw against your spell save DC, or the attack misses instead, as the creature recoils from your majesty.
        - Once you assume this majestic presence, you can't do so again until you finish a {@variantrule Short Rest|XPHB|Short} or {@variantrule Long Rest|XPHB}.
    - class_name: Bard
      class_source: XPHB
      subclass_name: Lore
      subclass_source: XPHB
      feature: Bonus Proficiencies
      source: XPHB
      level: 3
      entries:
        - You gain proficiency with three skills of your choice.
    - class_name: Bard
      class_source: XPHB
      subclass_name: Lore
      subclass_source: XPHB
      feature: College of Lore
      source: XPHB
      level: 3
      entries:
        - '{@i Plumb the Depths of Magical Knowledge}'
        - Bards of the College of Lore collect spells and secrets from diverse sources, such as scholarly tomes, mystical rites, and peasant tales. The college's members gather in libraries and universities to share their lore with one another. They also meet at festivals or affairs of state, where they can expose corruption, unravel lies, and poke fun at self-important figures of authority.
        - subclassFeature: Bonus Proficiencies|Bard|XPHB|Lore|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Cutting Words|Bard|XPHB|Lore|XPHB|3
          type: refSubclassFeature
    - class_name: Bard
      class_source: XPHB
      subclass_name: Lore
      subclass_source: XPHB
      feature: Cutting Words
      source: XPHB
      level: 3
      entries:
        - You learn to use your wit to supernaturally distract, confuse, and otherwise sap the confidence and competence of others. When a creature that you can see within 60 feet of yourself makes a damage roll or succeeds on an ability check or attack roll, you can take a {@variantrule Reaction|XPHB} to expend one use of your Bardic Inspiration; roll your Bardic Inspiration die, and subtract the number rolled from the creature's roll, reducing the damage or potentially turning the success into a failure.
    - class_name: Bard
      class_source: XPHB
      subclass_name: Lore
      subclass_source: XPHB
      feature: Magical Discoveries
      source: XPHB
      level: 6
      entries:
        - You learn two spells of your choice. These spells can come from the {@filter Cleric|spells|class=Cleric}, {@filter Druid|spells|class=Druid}, or {@filter Wizard spell list|spells|class=Wizard} or any combination thereof (see a class's section for its spell list). A spell you choose must be a cantrip or a spell for which you have spell slots, as shown in the Bard Features table.
        - You always have the chosen spells prepared, and whenever you gain a Bard level, you can replace one of the spells with another spell that meets these requirements.
    - class_name: Bard
      class_source: XPHB
      subclass_name: Lore
      subclass_source: XPHB
      feature: Peerless Skill
      source: XPHB
      level: 14
      entries:
        - When you make an ability check or attack roll and fail, you can expend one use of Bardic Inspiration; roll the Bardic Inspiration die, and add the number rolled to the {@dice d20}, potentially turning a failure into a success. On a failure, the Bardic Inspiration isn't expended.
    - class_name: Bard
      class_source: XPHB
      subclass_name: Moon
      subclass_source: FRHoF
      feature: College of the Moon
      source: FRHoF
      level: 3
      entries:
        - '{@i Inspire Allies with Primal Tales}'
        - The College of the Moon traces its origins to the ancient druidic circles of the Moonshae Isles, who entrusted the first Bards of this tradition with chronicling the stories of the islands and their people. Bards of this college draw from the isles' fey magic and the primal power of the moonwells to bolster their allies, protect the natural world, and inspire their bardic works.
        - subclassFeature: Moon's Inspiration|Bard|XPHB|Moon|FRHoF|3|FRHoF
          type: refSubclassFeature
        - subclassFeature: Primal Lore|Bard|XPHB|Moon|FRHoF|3|FRHoF
          type: refSubclassFeature
    - class_name: Bard
      class_source: XPHB
      subclass_name: Moon
      subclass_source: FRHoF
      feature: Moon's Inspiration
      source: FRHoF
      level: 3
      entries:
        - The primal and ever-changing power of the moon flows through you, granting you the following benefits.
        - entries:
            - When you take a {@variantrule Bonus Action|XPHB} to give a creature a Bardic Inspiration die, you can have the {@condition Invisible|XPHB} condition and teleport up to 30 feet to an unoccupied space you can see as part of that {@variantrule Bonus Action|XPHB}. This invisibility lasts until the start of your next turn and ends early immediately after you make an attack roll, deal damage, or cast a spell.
          name: Inspired Eclipse
          type: entries
        - entries:
            - Once per turn when you restore {@variantrule Hit Points|XPHB} to a creature with a spell, you can expend a Bardic Inspiration die and increase the amount of {@variantrule Hit Points|XPHB} restored by a number equal to a roll of the Bardic Inspiration die. The creature's {@variantrule Speed|XPHB} also increases by 10 feet until the end of its next turn.
          name: Lunar Vitality
          type: entries
    - class_name: Bard
      class_source: XPHB
      subclass_name: Moon
      subclass_source: FRHoF
      feature: Primal Lore
      source: FRHoF
      level: 3
      entries:
        - You learn Druidic and one cantrip from the Druid spell list. It counts as a Bard spell for you but doesn't count against the number of cantrips you know. Whenever you gain a Bard level, you can replace this cantrip with another cantrip of your choice from the Druid spell list.
        - 'Additionally, choose one of the following skills: {@skill Animal Handling|XPHB}, {@skill Insight|XPHB}, {@skill Medicine|XPHB}, {@skill Nature|XPHB}, {@skill Perception|XPHB}, or {@skill Survival|XPHB}. You have proficiency in that skill.'
    - class_name: Bard
      class_source: XPHB
      subclass_name: Moon
      subclass_source: FRHoF
      feature: Blessing of Moonlight
      source: FRHoF
      level: 6
      entries:
        - You always have the {@spell Moonbeam|XPHB} spell prepared.
        - When you cast {@spell Moonbeam|XPHB}, you can modify the spell so that you glow faintly while the spell is active. While glowing, you shed {@variantrule Dim Light|XPHB} out to 5 feet, and whenever a creature fails its saving throw against the effects of this Moonbeam, another creature of your choice that you can see within 60 feet of yourself regains {@dice 2d4} {@variantrule Hit Points|XPHB}.
        - Once you use this feature to modify a casting of Moonbeam, you can't use it again until you finish a {@variantrule Long Rest|XPHB}.
    - class_name: Bard
      class_source: XPHB
      subclass_name: Moon
      subclass_source: FRHoF
      feature: Eventide's Splendor
      source: FRHoF
      level: 14
      entries:
        - You become suffused with the might of the moon, improving your Moon's Inspiration in the following ways.
        - entries:
            - When you use Inspired Eclipse, the creature who received the Bardic Inspiration die can also have the {@condition Invisible|XPHB} condition and immediately take a {@variantrule Reaction|XPHB} to teleport up to 30 feet to an unoccupied space it can see. The creature remains {@condition Invisible|XPHB} until the start of its next turn.
          name: Shadow of the New Moon
          type: entries
        - entries:
            - When you use Lunar Vitality, you can roll {@dice 1d6} and use the number rolled in place of expending a Bardic Inspiration die.
          name: Vibrance of the Full Moon
          type: entries
    - class_name: Bard
      class_source: XPHB
      subclass_name: Valor
      subclass_source: XPHB
      feature: College of Valor
      source: XPHB
      level: 3
      entries:
        - '{@i Sing the Deeds of Ancient Heroes}'
        - Bards of the College of Valor are daring storytellers whose tales preserve the memory of the great heroes of the past. These Bards sing the deeds of the mighty in vaulted halls or to crowds gathered around great bonfires. They travel to witness great events firsthand and to ensure that the memory of these events doesn't pass away. With their songs, they inspire new generations to reach the same heights of accomplishment as the heroes of old.
        - subclassFeature: Combat Inspiration|Bard|XPHB|Valor|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Martial Training|Bard|XPHB|Valor|XPHB|3
          type: refSubclassFeature
    - class_name: Bard
      class_source: XPHB
      subclass_name: Valor
      subclass_source: XPHB
      feature: Combat Inspiration
      source: XPHB
      level: 3
      entries:
        - You can use your wit to turn the tide of battle. A creature that has a Bardic Inspiration die from you can use it for one of the following effects.
        - entries:
            - When the creature is hit by an attack roll, that creature can use its {@variantrule Reaction|XPHB} to roll the Bardic Inspiration die and add the number rolled to its AC against that attack, potentially causing the attack to miss.
          name: Defense
          type: entries
        - entries:
            - Immediately after the creature hits a target with an attack roll, the creature can roll the Bardic Inspiration die and add the number rolled to the attack's damage against the target.
          name: Offense
          type: entries
    - class_name: Bard
      class_source: XPHB
      subclass_name: Valor
      subclass_source: XPHB
      feature: Martial Training
      source: XPHB
      level: 3
      entries:
        - You gain proficiency with {@filter Martial weapons|items|type=martial weapon} and training with {@filter Medium armor|items|type=Medium Armor} and {@item Shield|XPHB|Shields}.
        - In addition, you can use a Simple or Martial weapon as a {@variantrule Spellcasting Focus|XPHB} to cast spells from your {@filter Bard spell list|spells|class=Bard}.
    - class_name: Bard
      class_source: XPHB
      subclass_name: Valor
      subclass_source: XPHB
      feature: Extra Attack
      source: XPHB
      level: 6
      entries:
        - You can attack twice instead of once whenever you take the {@action Attack|XPHB} action on your turn.
        - In addition, you can cast one of your cantrips that has a casting time of an action in place of one of those attacks.
    - class_name: Bard
      class_source: XPHB
      subclass_name: Valor
      subclass_source: XPHB
      feature: Battle Magic
      source: XPHB
      level: 14
      entries:
        - After you cast a spell that has a casting time of an action, you can make one attack with a weapon as a {@variantrule Bonus Action|XPHB}.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Ambition (PSA)
      subclass_source: PSA
      feature: Ambition Domain (PSA)
      source: PSA
      level: 1
      entries:
        - entries:
            - The worthy shall strive for greatness—supremacy in life leads to supremacy in the afterlife.
          type: quote
        - Bontu has fully embraced this dictum, and though she expends little effort in teaching it, she surely leads by example. Her viziers subtly plant the seeds that flower into the ambition the God-Pharaoh desires. Through insinuation, they remind acolytes and initiates alike that achieving one's place in the afterlife at the expense of others is not shameful, but is proof of the initiate's determination and drive. Nothing is more important than that drive, they suggest—not the bonds of a crop, not friendship or love. Not even devotion to a deity.
        - At each indicated cleric level, add the listed spells to your spells prepared.
        - caption: Ambition Domain Spells
          colLabels:
            - Cleric Level
            - Spells
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - 1st
              - '{@spell bane}, {@spell disguise self}'
            - - 3rd
              - '{@spell mirror image}, {@spell ray of enfeeblement}'
            - - 5th
              - '{@spell bestow curse}, {@spell vampiric touch}'
            - - 7th
              - '{@spell death ward}, {@spell dimension door}'
            - - 9th
              - '{@spell dominate person}, {@spell modify memory}'
          type: table
        - subclassFeature: Warding Flare|Cleric||Ambition (PSA)|PSA|1
          type: refSubclassFeature
    - class_name: Cleric
      class_source: PHB
      subclass_name: Ambition (PSA)
      subclass_source: PSA
      feature: Warding Flare
      source: PSA
      level: 1
      entries:
        - When you choose this domain at 1st level, you can interpose divine light between yourself and an attacking enemy. When you are attacked by a creature within 30 feet of you that you can see, you can use your reaction to impose disadvantage on the attack roll, causing light to flare before the attacker before it hits or misses. An attacker that can't be {@condition blinded} is immune to this feature.
        - You can use this feature a number of times equal to your Wisdom modifier (a minimum of once). You regain all expended uses when you finish a long rest.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Ambition (PSA)
      subclass_source: PSA
      feature: 'Channel Divinity: Invoke Duplicity'
      source: PSA
      level: 2
      entries:
        - Starting at 2nd level, you can use your Channel Divinity to create an illusory duplicate of yourself.
        - As an action, you create a perfect illusion of yourself that lasts for 1 minute, or until you lose your {@status concentration} (as if you were {@status concentration||concentrating} on a spell). The illusion appears in an unoccupied space that you can see within 30 feet of you. As a bonus action on your turn, you can move the illusion up to 30 feet to a space you can see, but it must remain within 120 feet of you.
        - For the duration, you can cast spells as though you were in the illusion's space, but you must use your own senses. Additionally, when both you and your illusion are within 5 feet of a creature that can see the illusion, you have advantage on attack rolls against that creature, given how distracting the illusion is to the target.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Ambition (PSA)
      subclass_source: PSA
      feature: 'Channel Divinity: Cloak of Shadows'
      source: PSA
      level: 6
      entries:
        - Starting at 6th level, you can use your Channel Divinity to vanish. As an action, you become {@condition invisible} until the end of your next turn. You become visible if you attack or cast a spell.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Ambition (PSA)
      subclass_source: PSA
      feature: Blessed Strikes
      source: TCE
      level: 8
      entries:
        - '{@i 8th-level cleric {@variantrule optional class features|tce|optional feature}, which replaces the Potent Spellcasting feature}'
        - You are blessed with divine might in battle. When a creature takes damage from one of your cantrips or weapon attacks, you can also deal {@damage 1d8} radiant damage to that creature. Once you deal this damage, you can't use this feature again until the start of your next turn.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Ambition (PSA)
      subclass_source: PSA
      feature: Potent Spellcasting
      source: PSA
      level: 8
      entries:
        - Starting at 8th level, you add your Wisdom modifier to the damage you deal with any cleric cantrip.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Ambition (PSA)
      subclass_source: PSA
      feature: Improved Duplicity
      source: PSA
      level: 17
      entries:
        - At 17th level, you can create up to four duplicates of yourself, instead of one, when you use Invoke Duplicity. As a bonus action on your turn, you can move any number of them up to 30 feet, to a maximum range of 120 feet.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Arcana
      subclass_source: SCAG
      feature: Arcana Domain
      source: SCAG
      level: 1
      entries:
        - Magic is an energy that suffuses the multiverse and that fuels both destruction and creation. Gods of the Arcana domain know the secrets and potential of magic intimately. For some of these gods, magical knowledge is a great responsibility that comes with a special understanding of the nature of reality. Other gods of Arcana see magic as pure power, to be used as its wielder sees fit.
        - The gods of this domain are often associated with knowledge, as learning and arcane power tend to go hand-in-hand. In the Realms, deities of this domain include {@deity Azuth|Faerûnian|SCAG} and {@deity Mystra|Faerûnian|SCAG}, as well as {@deity Corellon Larethian|Elven|SCAG} of the elven pantheon. In other worlds, this domain includes {@deity Hecate|Greek}, {@deity Math Mathonwy|Celtic}, and {@deity Isis|Egyptian}; the triple moon gods of {@deity Solinari|Dragonlance}, {@deity Lunitari|Dragonlance}, and {@deity Nuitari|Dragonlance} of Krynn; and {@deity Boccob|Greyhawk}, {@deity Vecna|Greyhawk}, and {@deity Wee Jas|Greyhawk} of Greyhawk.
        - At each indicated cleric level, add the listed spells to your spells prepared. They do not count towards your limit.
        - caption: Arcana Domain Spells
          colLabels:
            - Cleric Level
            - Spells
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - 1st
              - '{@spell detect magic}, {@spell magic missile}'
            - - 3rd
              - '{@spell magic weapon}, {@spell Nystul''s magic aura}'
            - - 5th
              - '{@spell dispel magic}, {@spell magic circle}'
            - - 7th
              - '{@spell arcane eye}, {@spell Leomund''s secret chest}'
            - - 9th
              - '{@spell planar binding}, {@spell teleportation circle}'
          type: table
        - subclassFeature: Arcane Initiate|Cleric||Arcana|SCAG|1
          type: refSubclassFeature
    - class_name: Cleric
      class_source: PHB
      subclass_name: Arcana
      subclass_source: SCAG
      feature: Arcane Initiate
      source: SCAG
      level: 1
      entries:
        - When you choose this domain at 1st level, you gain proficiency in the {@skill Arcana} skill, and you gain two cantrips of your choice from the {@filter wizard spell list|spells|class=wizard|level=0}. For you, these cantrips count as cleric cantrips.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Arcana
      subclass_source: SCAG
      feature: 'Channel Divinity: Arcane Abjuration'
      source: SCAG
      level: 2
      entries:
        - Starting at 2nd level, you can use your Channel Divinity to abjure otherworldly creatures.
        - As an action, you present your holy symbol, and one celestial, elemental, fey, or fiend of your choice that is within 30 feet of you must make a Wisdom saving throw, provided that the creature can see or hear you. If the creature fails its saving throw, it is turned for 1 minute or until it takes any damage.
        - A turned creature must spend its turns trying to move as far away from you as it can, and it can't willingly end its move in a space within 30 feet of you. It also can't take reactions. For its action, it can use only the {@action Dash} action or try to escape from an effect that prevents it from moving. If there's nowhere to move, then the creature can use the {@action Dodge} action.
        - After you reach 5th level, when a creature fails its saving throw against your Arcane Abjuration feature, the creature is banished for 1 minute (as in the {@spell banishment} spell, no {@status concentration} required) if it isn't on its plane of origin, and its challenge rating is at or below a certain threshold, as shown below.
        - caption: Arcane Banishment
          colLabels:
            - Cleric level
            - Banishes Creatures of CR...
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - 5th
              - 1/2 or lower
            - - 8th
              - 1 or lower
            - - 11th
              - 2 or lower
            - - 14th
              - 3 or lower
            - - 17th
              - 4 or lower
          type: table
    - class_name: Cleric
      class_source: PHB
      subclass_name: Arcana
      subclass_source: SCAG
      feature: Spell Breaker
      source: SCAG
      level: 6
      entries:
        - Starting at 6th level, when you restore hit points to an ally with a spell of 1st level or higher, you can also end one spell of your choice on that creature. The level of the spell you end must be equal to or lower than the level of the spell slot you use to cast the healing spell.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Arcana
      subclass_source: SCAG
      feature: Blessed Strikes
      source: TCE
      level: 8
      entries:
        - '{@i 8th-level cleric {@variantrule optional class features|tce|optional feature}, which replaces the Potent Spellcasting feature}'
        - You are blessed with divine might in battle. When a creature takes damage from one of your cantrips or weapon attacks, you can also deal {@damage 1d8} radiant damage to that creature. Once you deal this damage, you can't use this feature again until the start of your next turn.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Arcana
      subclass_source: SCAG
      feature: Potent Spellcasting
      source: SCAG
      level: 8
      entries:
        - Starting at 8th level, you add your Wisdom modifier to the damage you deal with any cleric cantrip.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Arcana
      subclass_source: SCAG
      feature: Arcane Mastery
      source: SCAG
      level: 17
      entries:
        - 'At 17th level, you choose four spells from the Wizard spell list, one from each of the following levels: 6th, 7th, 8th, and 9th. You add them to your list of domain spells. Like your other domain spells, they are always prepared and count as cleric spells for you.'
    - class_name: Cleric
      class_source: PHB
      subclass_name: Death
      subclass_source: DMG
      feature: Bonus Proficiency
      source: DMG
      level: 1
      entries:
        - When the cleric chooses this domain at 1st level, he or she gains proficiency with martial weapons.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Death
      subclass_source: DMG
      feature: Death Domain
      source: DMG
      level: 1
      entries:
        - The Death domain is concerned with the forces that cause death, as well as the negative energy that gives rise to undead creatures. Deities such as {@deity Chemosh|Dragonlance}, {@deity Myrkul}, and {@deity Wee Jas|Greyhawk} are patrons of necromancers, death knights, liches, mummy lords, and vampires. Gods of the Death domain also embody murder ({@deity Anubis|Egyptian}, {@deity Bhaal}, and Pyremius), pain ({@deity Iuz|Greyhawk} or {@deity Loviatar}), disease or poison ({@deity Incabulos|Greyhawk}, {@deity Talona}, or {@deity Morgion|Dragonlance}), and the underworld ({@deity Hades|Greek} and {@deity Hel|Norse}).
        - At each indicated cleric level, add the listed spells to your spells prepared. They do not count towards your limit.
        - caption: Death Domain Spells
          colLabels:
            - Cleric Level
            - Spells
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - 1st
              - '{@spell false life}, {@spell ray of sickness}'
            - - 3rd
              - '{@spell blindness/deafness}, {@spell ray of enfeeblement}'
            - - 5th
              - '{@spell animate dead}, {@spell vampiric touch}'
            - - 7th
              - '{@spell blight}, {@spell death ward}'
            - - 9th
              - '{@spell antilife shell}, {@spell cloudkill}'
          type: table
        - subclassFeature: Bonus Proficiency|Cleric||Death|DMG|1
          type: refSubclassFeature
        - subclassFeature: Reaper|Cleric||Death|DMG|1
          type: refSubclassFeature
    - class_name: Cleric
      class_source: PHB
      subclass_name: Death
      subclass_source: DMG
      feature: Reaper
      source: DMG
      level: 1
      entries:
        - At 1st level, the cleric learns one {@filter necromancy cantrip|spells|level=0|school=N} of his or her choice from any spell list. When the cleric casts a necromancy cantrip that normally targets only one creature, the spell can instead target two creatures within range and within 5 feet of each other.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Death
      subclass_source: DMG
      feature: 'Channel Divinity: Touch of Death'
      source: DMG
      level: 2
      entries:
        - Starting at 2nd level, the cleric can use Channel Divinity to destroy another creature's life force by touch.
        - When the cleric hits a creature with a melee attack, the cleric can use Channel Divinity to deal extra necrotic damage to the target. The damage equals 5 + twice his or her cleric level.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Death
      subclass_source: DMG
      feature: Inescapable Destruction
      source: DMG
      level: 6
      entries:
        - Starting at 6th level, the cleric's ability to channel negative energy becomes more potent. Necrotic damage dealt by the character's cleric spells and Channel Divinity options ignores resistance to necrotic damage.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Death
      subclass_source: DMG
      feature: Blessed Strikes
      source: TCE
      level: 8
      entries:
        - '{@i 8th-level cleric {@variantrule optional class features|tce|optional feature}, which replaces the Divine Strike feature}'
        - You are blessed with divine might in battle. When a creature takes damage from one of your cantrips or weapon attacks, you can also deal {@damage 1d8} radiant damage to that creature. Once you deal this damage, you can't use this feature again until the start of your next turn.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Death
      subclass_source: DMG
      feature: Divine Strike
      source: DMG
      level: 8
      entries:
        - At 8th level, the cleric gains the ability to infuse his or her weapon strikes with necrotic energy. Once on each of the cleric's turns when he or she hits a creature with a weapon attack, the cleric can cause the attack to deal an extra {@damage 1d8} necrotic damage to the target. When the cleric reaches 14th level, the extra damage increases to {@damage 2d8}.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Death
      subclass_source: DMG
      feature: Improved Reaper
      source: DMG
      level: 17
      entries:
        - Starting at 17th level, when the cleric casts a Necromancy spell of 1st through 5th-level that targets only one creature, the spell can instead target two creatures within range and within 5 feet of each other. If the spell consumes its material components, the cleric must provide them for each target.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Forge
      subclass_source: XGE
      feature: Blessing of the Forge
      source: XGE
      level: 1
      entries:
        - At 1st level, you gain the ability to imbue magic into a weapon or armor. At the end of a long rest, you can touch one nonmagical object that is a suit of armor or a {@filter simple or martial weapon|items|source=phb|category=basic|type=martial weapon;simple weapon}. Until the end of your next long rest or until you die, the object becomes a magic item, granting a +1 bonus to AC if it's armor or a +1 bonus to attack and damage rolls if it's a weapon.
        - Once you use this feature, you can't use it again until you finish a long rest.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Forge
      subclass_source: XGE
      feature: Bonus Proficiency
      source: XGE
      level: 1
      entries:
        - When you choose this domain at 1st level, you gain proficiency with heavy armor and {@item smith's tools|phb}.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Forge
      subclass_source: XGE
      feature: Forge Domain
      source: XGE
      level: 1
      entries:
        - The gods of the forge are patrons of artisans who work with metal, from a humble blacksmith who keeps a village in horseshoes and plow blades to the mighty elf artisan whose diamond-tipped arrows of mithral have felled demon lords. The gods of the forge teach that, with patience and hard work, even the most intractable metal can be transformed from a lump of ore to a beautifully wrought object. Clerics of these deities search for objects lost to the forces of darkness, liberate mines overrun by orcs, and uncover rare and wondrous materials necessary to create potent magic items. Followers of these gods take great pride in their work, and they are willing to craft and use heavy armor and powerful weapons to protect them. Deities of this domain include {@deity Gond}, {@deity Reorx|Dragonlance}, {@deity Onatar|Eberron}, {@deity Moradin|Nonhuman}, {@deity Hephaestus|Greek}, and {@deity Goibhniu|Celtic}.
        - At each indicated cleric level, add the listed spells to your spells prepared.
        - caption: Forge Domain Spells
          colLabels:
            - Cleric Level
            - Spells
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - 1st
              - '{@spell identify}, {@spell searing smite}'
            - - 3rd
              - '{@spell heat metal}, {@spell magic weapon}'
            - - 5th
              - '{@spell elemental weapon}, {@spell protection from energy}'
            - - 7th
              - '{@spell fabricate}, {@spell wall of fire}'
            - - 9th
              - '{@spell animate objects}, {@spell creation}'
          type: table
        - subclassFeature: Bonus Proficiency|Cleric||Forge|XGE|1
          type: refSubclassFeature
        - subclassFeature: Blessing of the Forge|Cleric||Forge|XGE|1
          type: refSubclassFeature
    - class_name: Cleric
      class_source: PHB
      subclass_name: Forge
      subclass_source: XGE
      feature: 'Channel Divinity: Artisan''s Blessing'
      source: XGE
      level: 2
      entries:
        - Starting at 2nd level, you can use your Channel Divinity to create simple items.
        - 'You conduct an hour-long ritual that crafts a nonmagical item that must include some metal: a {@filter simple or martial weapon|items|source=phb|category=basic|type=martial weapon;simple weapon}, a suit of armor, ten pieces of ammunition, a set of tools, or another metal object (see chapter 5, "Equipment," in the Player''s Handbook for examples of these items). The creation is completed at the end of the hour, coalescing in an unoccupied space of your choice on a surface within 5 feet of you.'
        - The thing you create can be something that is worth no more than 100 gp. As part of this ritual, you must lay out metal, which can include coins, with a value equal to the creation. The metal irretrievably coalesces and transforms into the creation at the ritual's end, magically forming even nonmetal parts of the creation. The ritual can create a duplicate of a nonmagical item that contains metal, such as a key, if you possess the original during the ritual.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Forge
      subclass_source: XGE
      feature: Soul of the Forge
      source: XGE
      level: 6
      entries:
        - 'Starting at 6th level, your mastery of the forge grants you special abilities:'
        - items:
            - You gain resistance to fire damage.
            - While wearing heavy armor, you gain a +1 bonus to AC.
          type: list
    - class_name: Cleric
      class_source: PHB
      subclass_name: Forge
      subclass_source: XGE
      feature: Blessed Strikes
      source: TCE
      level: 8
      entries:
        - '{@i 8th-level cleric {@variantrule optional class features|tce|optional feature}, which replaces the Divine Strike feature}'
        - You are blessed with divine might in battle. When a creature takes damage from one of your cantrips or weapon attacks, you can also deal {@damage 1d8} radiant damage to that creature. Once you deal this damage, you can't use this feature again until the start of your next turn.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Forge
      subclass_source: XGE
      feature: Divine Strike
      source: XGE
      level: 8
      entries:
        - At 8th level, you gain the ability to infuse your weapon strikes with the fiery power of the forge. Once on each of your turns when you hit a creature with a weapon attack, you can cause the attack to deal an extra {@damage 1d8} fire damage to the target. When you reach 14th level, the extra damage increases to {@damage 2d8}.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Forge
      subclass_source: XGE
      feature: Saint of Forge and Fire
      source: XGE
      level: 17
      entries:
        - 'At 17th level, your blessed affinity with fire and metal becomes more powerful:'
        - items:
            - You gain immunity to fire damage,
            - While wearing heavy armor, you have resistance to bludgeoning, piercing, and slashing damage from nonmagical attacks.
          type: list
    - class_name: Cleric
      class_source: PHB
      subclass_name: Grave
      subclass_source: XGE
      feature: Circle of Mortality
      source: XGE
      level: 1
      entries:
        - At 1st level, you gain the ability to manipulate the line between life and death. When you would normally roll one or more dice to restore hit points with a spell to a creature at 0 hit points, you instead use the highest number possible for each die.
        - In addition, you learn the {@spell spare the dying} cantrip, which doesn't count against the number of cleric cantrips you know. For you, it has a range of 30 feet, and you can cast it as a bonus action.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Grave
      subclass_source: XGE
      feature: Eyes of the Grave
      source: XGE
      level: 1
      entries:
        - At 1st level, you gain the ability to occasionally sense the presence of the undead, whose existence is an insult to the natural cycle of life. As an action, you can open your awareness to magically detect undead. Until the end of your next turn, you know the location of any undead within 60 feet of you that isn't behind {@quickref Cover||3||total cover} and that isn't protected from divination magic. This sense doesn't tell you anything about a creature's capabilities or identity.
        - You can use this feature a number of times equal to your Wisdom modifier (minimum of once). You regain all expended uses when you finish a long rest.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Grave
      subclass_source: XGE
      feature: Grave Domain
      source: XGE
      level: 1
      entries:
        - Gods of the grave watch over the line between life and death. To these deities, death and the afterlife are a foundational part of the multiverse. To desecrate the peace of the dead is an abomination. Deities of the grave include {@deity Kelemvor}, {@deity Wee Jas|Greyhawk}, the ancestral spirits of {@deity the Undying Court|Eberron}, {@deity Hades|Greek}, {@deity Anubis|Egyptian}, and {@deity Osiris|Egyptian}. Followers of these deities seek to put wandering spirits to rest, destroy the undead, and ease the suffering of the dying. Their magic also allows them to stave off death for a time, particularly for a person who still has some great work to accomplish in the world. This is a delay of death, not a denial of it, for death will eventually get its due.
        - caption: Grave Domain Spells
          colLabels:
            - Cleric Level
            - Spells
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - 1st
              - '{@spell bane}, {@spell false life}'
            - - 3rd
              - '{@spell gentle repose}, {@spell ray of enfeeblement}'
            - - 5th
              - '{@spell revivify}, {@spell vampiric touch}'
            - - 7th
              - '{@spell blight}, {@spell death ward}'
            - - 9th
              - '{@spell antilife shell}, {@spell raise dead}'
          type: table
        - subclassFeature: Circle of Mortality|Cleric||Grave|XGE|1
          type: refSubclassFeature
        - subclassFeature: Eyes of the Grave|Cleric||Grave|XGE|1
          type: refSubclassFeature
    - class_name: Cleric
      class_source: PHB
      subclass_name: Grave
      subclass_source: XGE
      feature: 'Channel Divinity: Path to the Grave'
      source: XGE
      level: 2
      entries:
        - Starting at 2nd level, you can use your Channel Divinity to mark another creature's life force for termination.
        - As an action, you choose one creature you can see within 30 feet of you, cursing it until the end of your next turn. The next time you or an ally of yours hits the cursed creature with an attack, the creature has vulnerability to all of that attack's damage, and then the curse ends.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Grave
      subclass_source: XGE
      feature: Sentinel at Death's Door
      source: XGE
      level: 6
      entries:
        - At 6th level, you gain the ability to impede death's progress. As a reaction when you or a creature you can see within 30 feet of you suffers a critical hit, you can turn that hit into a normal hit. Any effects triggered by a critical hit are canceled.
        - You can use this feature a number of times equal to your Wisdom modifier (minimum of once). You regain all expended uses when you finish a long rest.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Grave
      subclass_source: XGE
      feature: Blessed Strikes
      source: TCE
      level: 8
      entries:
        - '{@i 8th-level cleric {@variantrule optional class features|tce|optional feature}, which replaces the Potent Spellcasting feature}'
        - You are blessed with divine might in battle. When a creature takes damage from one of your cantrips or weapon attacks, you can also deal {@damage 1d8} radiant damage to that creature. Once you deal this damage, you can't use this feature again until the start of your next turn.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Grave
      subclass_source: XGE
      feature: Potent Spellcasting
      source: XGE
      level: 8
      entries:
        - Starting at 8th level, you add your Wisdom modifier to the damage you deal with any cleric cantrip.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Grave
      subclass_source: XGE
      feature: Keeper of Souls
      source: XGE
      level: 17
      entries:
        - Starting at 17th level, you can seize a trace of vitality from a parting soul and use it to heal the living. When an enemy you can see dies within 60 feet of you, you or one creature of your choice that is within 60 feet of you regains hit points equal to the enemy's number of Hit Dice. You can use this feature only if you aren't {@condition incapacitated}. Once you use it, you can't do so again until the start of your next turn.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Knowledge (PSA)
      subclass_source: PSA
      feature: Knowledge Domain (PSA)
      source: PSA
      level: 1
      entries:
        - entries:
            - The worthy shall cultivate a nimble mind that can perceive the wonders beyond imagination that wait in the afterlife.
          type: quote
        - Kefnet's task is to pass on this teaching of the God-Pharaoh and elucidate its meaning. He teaches that the afterlife will be inhabited only by those who have proved by their wits that they are worthy of dwelling in the glorious presence of the God-Pharaoh. He trains acolytes and initiates to push their limits and challenge their mental capacity with spells of ever-greater power.
        - Kefnet's domain is identical to the {@class Cleric|PHB|Knowledge domain in the Player's Handbook|Knowledge|PHB}.
        - subclassFeature: Knowledge Domain|Cleric||Knowledge||1
          type: refSubclassFeature
    - class_name: Cleric
      class_source: PHB
      subclass_name: Knowledge
      subclass_source: PHB
      feature: Blessings of Knowledge
      source: PHB
      level: 1
      entries:
        - 'At 1st level, you learn two languages of your choice. You also become proficient in your choice of two of the following skills: {@skill Arcana}, {@skill History}, {@skill Nature}, or {@skill Religion}.'
        - Your proficiency bonus is doubled for any ability check you make that uses either of those skills.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Knowledge
      subclass_source: PHB
      feature: Knowledge Domain
      source: PHB
      level: 1
      entries:
        - The gods of knowledge—including {@deity Oghma}, {@deity Boccob|Greyhawk}, {@deity Gilean|Dragonlance}, {@deity Aureon|Eberron}, and {@deity Thoth|Egyptian}—value learning and understanding above all. Some teach that knowledge is to be gathered and shared in libraries and universities, or promote the practical knowledge of craft and invention. Some deities hoard knowledge and keep its secrets to themselves. And some promise their followers that they will gain tremendous power if they unlock the secrets of the multiverse. Followers of these gods study esoteric lore, collect old tomes, delve into the secret places of the earth, and learn all they can. Some gods of knowledge promote the practical knowledge of craft and invention, including smith deities like {@deity Gond}, {@deity Reorx|Dragonlance}, {@deity Onatar|Eberron}, {@deity Moradin|Nonhuman}, {@deity Hephaestus|Greek}, and {@deity Goibhniu|Celtic}.
        - At each indicated cleric level, you add the listed spells to your spells prepared.
        - caption: Knowledge Domain Spells
          colLabels:
            - Cleric Level
            - Spells
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - 1st
              - '{@spell command}, {@spell identify}'
            - - 3rd
              - '{@spell augury}, {@spell suggestion}'
            - - 5th
              - '{@spell nondetection}, {@spell speak with dead}'
            - - 7th
              - '{@spell arcane eye}, {@spell confusion}'
            - - 9th
              - '{@spell legend lore}, {@spell scrying}'
          type: table
        - subclassFeature: Blessings of Knowledge|Cleric||Knowledge||1
          type: refSubclassFeature
    - class_name: Cleric
      class_source: PHB
      subclass_name: Knowledge
      subclass_source: PHB
      feature: 'Channel Divinity: Knowledge of the Ages'
      source: PHB
      level: 2
      entries:
        - Starting at 2nd level, you can use your Channel Divinity to tap into a divine well of knowledge. As an action, you choose one skill or tool. For 10 minutes, you have proficiency with the chosen skill or tool.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Knowledge
      subclass_source: PHB
      feature: 'Channel Divinity: Read Thoughts'
      source: PHB
      level: 6
      entries:
        - At 6th level, you can use your Channel Divinity to read a creature's thoughts. You can then use your access to the creature's mind to command it.
        - As an action, choose one creature that you can see within 60 feet of you. That creature must make a Wisdom saving throw. If the creature succeeds on the saving throw, you can't use this feature on it again until you finish a long rest.
        - If the creature fails its save, you can read its surface thoughts (those foremost in its mind, reflecting its current emotions and what it is actively thinking about) when it is within 60 feet of you. This effect lasts for 1 minute.
        - During that time, you can use your action to end this effect and cast the {@spell suggestion} spell on the creature without expending a spell slot. The target automatically fails its saving throw against the spell.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Knowledge
      subclass_source: PHB
      feature: Blessed Strikes
      source: TCE
      level: 8
      entries:
        - '{@i 8th-level cleric {@variantrule optional class features|tce|optional feature}, which replaces the Potent Spellcasting feature}'
        - You are blessed with divine might in battle. When a creature takes damage from one of your cantrips or weapon attacks, you can also deal {@damage 1d8} radiant damage to that creature. Once you deal this damage, you can't use this feature again until the start of your next turn.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Knowledge
      subclass_source: PHB
      feature: Potent Spellcasting
      source: PHB
      level: 8
      entries:
        - Starting at 8th level, you add your Wisdom modifier to the damage you deal with any cleric cantrip.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Knowledge
      subclass_source: PHB
      feature: Visions of the Past
      source: PHB
      level: 17
      entries:
        - Starting at 17th level, you can call up visions of the past that relate to an object you hold or your immediate surroundings. You spend at least 1 minute in meditation and prayer, then receive dreamlike, shadowy glimpses of recent events. You can meditate in this way for a number of minutes equal to your Wisdom score and must maintain {@status concentration} during that time, as if you were casting a spell.
        - Once you use this feature, you can't use it again until you finish a short or long rest.
        - entries:
            - entries:
                - Holding an object as you meditate, you can see visions of the object's previous owner. After meditating for 1 minute, you learn how the owner acquired and lost the object, as well as the most recent significant event involving the object and that owner. If the object was owned by another creature in the recent past (within a number of days equal to your Wisdom score), you can spend 1 additional minute for each owner to learn the same information about that creature.
              name: Object Reading
              type: entries
          type: entries
        - entries:
            - entries:
                - As you meditate, you see visions of recent events in your immediate vicinity (a room, street, tunnel, clearing, or the like, up to a 50-foot cube), going back a number of days equal to your Wisdom score. For each minute you meditate, you learn about one significant event, beginning with the most recent. Significant events typically involve powerful emotions, such as battles and betrayals, marriages and murders, births and funerals. However, they might also include more mundane events that are nevertheless important in your current situation.
              name: Area Reading
              type: entries
          type: entries
    - class_name: Cleric
      class_source: PHB
      subclass_name: Life
      subclass_source: PHB
      feature: Bonus Proficiency
      source: PHB
      level: 1
      entries:
        - When you choose this domain at 1st level, you gain proficiency with heavy armor.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Life
      subclass_source: PHB
      feature: Disciple of Life
      source: PHB
      level: 1
      entries:
        - Also starting at 1st level, your healing spells are more effective. Whenever you use a spell of 1st level or higher to restore hit points to a creature, the creature regains additional hit points equal to 2 + the spell's level.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Life
      subclass_source: PHB
      feature: Life Domain
      source: PHB
      level: 1
      entries:
        - The Life domain focuses on the vibrant positive energy—one of the fundamental forces of the universe—that sustains all life. The gods of life promote vitality and health through healing the sick and wounded, caring for those in need, and driving away the forces of death and undeath. Almost any non-evil deity can claim influence over this domain, particularly agricultural deities (such as {@deity Chauntea}, {@deity Arawai|Eberron}, and {@deity Demeter|Greek}), sun gods (such as {@deity Lathander}, {@deity Pelor|Greyhawk}, and {@deity Re-Horakhty|Egyptian}), gods of healing or endurance (such as {@deity Ilmater}, {@deity Mishakal|Dragonlance}, {@deity Apollo|Greek}, and {@deity Diancecht|Celtic}), and gods of home and community (such as {@deity Hestia|Greek}, {@deity Hathor|Egyptian}, and {@deity Boldrei|Eberron}).
        - At each indicated cleric level, you add the listed spells to your spells prepared.
        - caption: Life Domain Spells
          colLabels:
            - Cleric Level
            - Spells
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - 1st
              - '{@spell bless}, {@spell cure wounds}'
            - - 3rd
              - '{@spell lesser restoration}, {@spell spiritual weapon}'
            - - 5th
              - '{@spell beacon of hope}, {@spell revivify}'
            - - 7th
              - '{@spell death ward}, {@spell guardian of faith}'
            - - 9th
              - '{@spell mass cure wounds}, {@spell raise dead}'
          type: table
        - subclassFeature: Bonus Proficiency|Cleric||Life||1
          type: refSubclassFeature
        - subclassFeature: Disciple of Life|Cleric||Life||1
          type: refSubclassFeature
    - class_name: Cleric
      class_source: PHB
      subclass_name: Life
      subclass_source: PHB
      feature: 'Channel Divinity: Preserve Life'
      source: PHB
      level: 2
      entries:
        - Starting at 2nd level, you can use your Channel Divinity to heal the badly injured.
        - As an action, you present your holy symbol and evoke healing energy that can restore a number of hit points equal to five times your cleric level. Choose any creatures within 30 feet of you, and divide those hit points among them. This feature can restore a creature to no more than half of its hit point maximum. You can't use this feature on an undead or a construct.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Life
      subclass_source: PHB
      feature: Blessed Healer
      source: PHB
      level: 6
      entries:
        - Beginning at 6th level, the healing spells you cast on others heal you as well. When you cast a spell of 1st level or higher that restores hit points to a creature other than you, you regain hit points equal to 2 + the spell's level.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Life
      subclass_source: PHB
      feature: Blessed Strikes
      source: TCE
      level: 8
      entries:
        - '{@i 8th-level cleric {@variantrule optional class features|tce|optional feature}, which replaces the Divine Strike feature}'
        - You are blessed with divine might in battle. When a creature takes damage from one of your cantrips or weapon attacks, you can also deal {@damage 1d8} radiant damage to that creature. Once you deal this damage, you can't use this feature again until the start of your next turn.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Life
      subclass_source: PHB
      feature: Divine Strike
      source: PHB
      level: 8
      entries:
        - At 8th level, you gain the ability to infuse your weapon strikes with divine energy. Once on each of your turns when you hit a creature with a weapon attack, you can cause the attack to deal an extra {@damage 1d8} radiant damage to the target. When you reach 14th level, the extra damage increases to {@damage 2d8}.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Life
      subclass_source: PHB
      feature: Supreme Healing
      source: PHB
      level: 17
      entries:
        - Starting at 17th level, when you would normally roll one or more dice to restore hit points with a spell, you instead use the highest number possible for each die. For example, instead of restoring {@dice 2d6} hit points to a creature, you restore 12.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Light
      subclass_source: PHB
      feature: Bonus Cantrip
      source: PHB
      level: 1
      entries:
        - When you choose this domain at 1st level, you gain the {@spell light} cantrip if you don't already know it. This cantrip doesn't count against the number of cleric cantrips you know.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Light
      subclass_source: PHB
      feature: Light Domain
      source: PHB
      level: 1
      entries:
        - Gods of light—including {@deity Helm}, {@deity Lathander}, {@deity Pholtus|Greyhawk}, {@deity Branchala|Dragonlance}, {@deity the Silver Flame|Eberron}, {@deity Belenus|Celtic}, {@deity Apollo|Greek}, and {@deity Re-Horakhty|Egyptian}—promote the ideals of rebirth and renewal, truth, vigilance, and beauty, often using the symbol of the sun. Some of these gods are portrayed as the sun itself or as a charioteer who guides the sun across the sky. Others are tireless sentinels whose eyes pierce every shadow and see through every deception. Some are deities of beauty and artistry, who teach that art is a vehicle for the soul's improvement. Clerics of a god of light are enlightened souls infused with radiance and the power of their gods' discerning vision, charged with chasing away lies and burning away darkness.
        - At each indicated cleric level, you add the listed spells to your spells prepared.
        - caption: Light Domain Spells
          colLabels:
            - Cleric Level
            - Spells
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - 1st
              - '{@spell burning hands}, {@spell faerie fire}'
            - - 3rd
              - '{@spell flaming sphere}, {@spell scorching ray}'
            - - 5th
              - '{@spell daylight}, {@spell fireball}'
            - - 7th
              - '{@spell guardian of faith}, {@spell wall of fire}'
            - - 9th
              - '{@spell flame strike}, {@spell scrying}'
          type: table
        - subclassFeature: Bonus Cantrip|Cleric||Light||1
          type: refSubclassFeature
        - subclassFeature: Warding Flare|Cleric||Light||1
          type: refSubclassFeature
    - class_name: Cleric
      class_source: PHB
      subclass_name: Light
      subclass_source: PHB
      feature: Warding Flare
      source: PHB
      level: 1
      entries:
        - Also at 1st level, you can interpose divine light between yourself and an attacking enemy. When you are attacked by a creature within 30 feet of you that you can see, you can use your reaction to impose disadvantage on the attack roll, causing light to flare before the attacker before it hits or misses. An attacker that can't be {@condition blinded} is immune to this feature.
        - You can use this feature a number of times equal to your Wisdom modifier (a minimum of once). You regain all expended uses when you finish a long rest.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Light
      subclass_source: PHB
      feature: 'Channel Divinity: Radiance of the Dawn'
      source: PHB
      level: 2
      entries:
        - Starting at 2nd level, you can use your Channel Divinity to harness sunlight, banishing darkness and dealing radiant damage to your foes.
        - As an action, you present your holy symbol, and any magical darkness within 30 feet of you is dispelled. Additionally, each hostile creature within 30 feet of you must make a Constitution saving throw. A creature takes radiant damage equal to {@damage 2d10} + your cleric level on a failed saving throw, and half as much damage on a successful one. A creature that has {@quickref Cover||3||total cover} from you is not affected.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Light
      subclass_source: PHB
      feature: Improved Flare
      source: PHB
      level: 6
      entries:
        - Starting at 6th level, you can also use your Warding Flare feature when a creature that you can see within 30 feet of you attacks a creature other than you.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Light
      subclass_source: PHB
      feature: Blessed Strikes
      source: TCE
      level: 8
      entries:
        - '{@i 8th-level cleric {@variantrule optional class features|tce|optional feature}, which replaces the Potent Spellcasting feature}'
        - You are blessed with divine might in battle. When a creature takes damage from one of your cantrips or weapon attacks, you can also deal {@damage 1d8} radiant damage to that creature. Once you deal this damage, you can't use this feature again until the start of your next turn.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Light
      subclass_source: PHB
      feature: Potent Spellcasting
      source: PHB
      level: 8
      entries:
        - Starting at 8th level, you add your Wisdom modifier to the damage you deal with any cleric cantrip.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Light
      subclass_source: PHB
      feature: Corona of Light
      source: PHB
      level: 17
      entries:
        - Starting at 17th level, you can use your action to activate an aura of sunlight that lasts for 1 minute or until you dismiss it using another action. You emit bright light in a 60-foot radius and dim light 30 feet beyond that. Your enemies in the bright light have disadvantage on saving throws against any spell that deals fire or radiant damage.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Nature
      subclass_source: PHB
      feature: Acolyte of Nature
      source: PHB
      level: 1
      entries:
        - 'At 1st level, you learn one druid cantrip of your choice. This cantrip doesn''t count against the number of cleric cantrips you know. You also gain proficiency in one of the following skills of your choice: {@skill Animal Handling}, {@skill Nature}, or {@skill Survival}.'
    - class_name: Cleric
      class_source: PHB
      subclass_name: Nature
      subclass_source: PHB
      feature: Bonus Proficiency
      source: PHB
      level: 1
      entries:
        - Also at 1st level, you gain proficiency with heavy armor.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Nature
      subclass_source: PHB
      feature: Nature Domain
      source: PHB
      level: 1
      entries:
        - Gods of nature are as varied as the natural world itself, from inscrutable gods of the deep forests (such as {@deity Silvanus}, {@deity Obad-Hai|Greyhawk}, {@deity Chislev|Dragonlance}, {@deity Balinor|Eberron}, and {@deity Pan|Greek}) to friendly deities associated with particular springs and groves (such as {@deity Eldath}). Druids revere nature as a whole and might serve one of these deities, practicing mysterious rites and reciting all-but-forgotten prayers in their own secret tongue. But many of these gods have clerics as well, champions who take a more active role in advancing the interests of a particular nature god. These clerics might hunt the evil monstrosities that despoil the woodlands, bless the harvest of the faithful, or wither the crops of those who anger their gods.
        - At each indicated cleric level, you add the listed spells to your spells prepared.
        - caption: Nature Domain Spells
          colLabels:
            - Cleric Level
            - Spells
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - 1st
              - '{@spell animal friendship}, {@spell speak with animals}'
            - - 3rd
              - '{@spell barkskin}, {@spell spike growth}'
            - - 5th
              - '{@spell plant growth}, {@spell wind wall}'
            - - 7th
              - '{@spell dominate beast}, {@spell grasping vine}'
            - - 9th
              - '{@spell insect plague}, {@spell tree stride}'
          type: table
        - subclassFeature: Acolyte of Nature|Cleric||Nature||1
          type: refSubclassFeature
        - subclassFeature: Bonus Proficiency|Cleric||Nature||1
          type: refSubclassFeature
    - class_name: Cleric
      class_source: PHB
      subclass_name: Nature
      subclass_source: PHB
      feature: 'Channel Divinity: Charm Animals and Plants'
      source: PHB
      level: 2
      entries:
        - Starting at 2nd level, you can use your Channel Divinity to charm animals and plants.
        - As an action, you present your holy symbol and invoke the name of your deity. Each beast or plant creature that can see you within 30 feet of you must make a Wisdom saving throw. If the creature fails its saving throw, it is {@condition charmed} by you for 1 minute or until it takes damage. While it is {@condition charmed} by you, it is friendly to you and other creatures you designate.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Nature
      subclass_source: PHB
      feature: Dampen Elements
      source: PHB
      level: 6
      entries:
        - Starting at 6th level, when you or a creature within 30 feet of you takes acid, cold, fire, lightning, or thunder damage, you can use your reaction to grant resistance to the creature against that instance of the damage.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Nature
      subclass_source: PHB
      feature: Blessed Strikes
      source: TCE
      level: 8
      entries:
        - '{@i 8th-level cleric {@variantrule optional class features|tce|optional feature}, which replaces the Divine Strike feature}'
        - You are blessed with divine might in battle. When a creature takes damage from one of your cantrips or weapon attacks, you can also deal {@damage 1d8} radiant damage to that creature. Once you deal this damage, you can't use this feature again until the start of your next turn.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Nature
      subclass_source: PHB
      feature: Divine Strike
      source: PHB
      level: 8
      entries:
        - At 8th level, you gain the ability to infuse your weapon strikes with divine energy. Once on each of your turns when you hit a creature with a weapon attack, you can cause the attack to deal an extra {@damage 1d8} cold, fire, or lightning damage (your choice) to the target. When you reach 14th level, the extra damage increases to {@damage 2d8}.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Nature
      subclass_source: PHB
      feature: Master of Nature
      source: PHB
      level: 17
      entries:
        - At 17th level, you gain the ability to command animals and plant creatures. While creatures are {@condition charmed} by your Charm Animals and Plants feature, you can take a bonus action on your turn to verbally command what each of those creatures will do on its next turn.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Order
      subclass_source: TCE
      feature: Bonus Proficiencies
      source: TCE
      level: 1
      entries:
        - When you choose this domain at 1st level, you gain proficiency with heavy armor. You also gain proficiency in the {@skill Intimidation} or {@skill Persuasion} skill (your choice).
    - class_name: Cleric
      class_source: PHB
      subclass_name: Order
      subclass_source: TCE
      feature: Order Domain
      source: TCE
      level: 1
      entries:
        - The Order Domain represents discipline, as well as devotion to a society or an institution and strict obedience to the laws governing it. On Ravnica, the domain is favored by clerics of the Azorius Senate, who use it to maintain and enforce the law, and of the Orzhov Syndicate, who exploit law and order for their personal gain. On other worlds, gods who grant access to this domain include {@deity Bane}, {@deity Tyr}, {@deity Majere|Dragonlance}, {@deity Erathis|Dawn War|DMG}, {@deity Pholtus|Greyhawk}, {@deity Wee Jas|Greyhawk}, {@deity Aureon|Eberron}, {@deity Maglubiyet|Nonhuman}, {@deity Nuada|Celtic}, {@deity Athena|Greek}, {@deity Anubis|Egyptian}, {@deity Forseti|Norse}, and {@deity Asmodeus|Dawn War|DMG}.
        - The ideal of order is obedience to the law above all else, rather than to a specific individual or the passing influence of emotion or popular rule. Clerics of order are typically concerned with how things are done, rather than whether an action's results are just. Following the law and obeying its edicts is critical, especially when it benefits these clerics and their guilds or deities.
        - Law establishes hierarchies. Those selected by the law to lead must be obeyed. Those who obey must do so to the best of their ability. In this manner, law creates an intricate web of obligations that allows society to forge order and security in a chaotic multiverse.
        - At each indicated cleric level, you add the listed spells to your spells prepared.
        - caption: Order Domain Spells
          colLabels:
            - Cleric Level
            - Spells
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - 1st
              - '{@spell command}, {@spell heroism}'
            - - 3rd
              - '{@spell hold person}, {@spell zone of truth}'
            - - 5th
              - '{@spell mass healing word}, {@spell slow}'
            - - 7th
              - '{@spell compulsion}, {@spell locate creature}'
            - - 9th
              - '{@spell commune}, {@spell dominate person}'
          type: table
        - subclassFeature: Bonus Proficiencies|Cleric||Order|TCE|1
          type: refSubclassFeature
        - subclassFeature: Voice of Authority|Cleric||Order|TCE|1
          type: refSubclassFeature
    - class_name: Cleric
      class_source: PHB
      subclass_name: Order
      subclass_source: TCE
      feature: Voice of Authority
      source: TCE
      level: 1
      entries:
        - Starting at 1st level, you can invoke the power of law to drive an ally to attack. If you cast a spell with a spell slot of 1st level or higher and target an ally with the spell, that ally can use their reaction immediately after the spell to make one weapon attack against a creature of your choice that you can see.
        - If the spell targets more than one ally, you choose the ally who can make the attack.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Order
      subclass_source: TCE
      feature: 'Channel Divinity: Order''s Demand'
      source: TCE
      level: 2
      entries:
        - Starting at 2nd level, you can use your Channel Divinity to exert an intimidating presence over others.
        - As an action, you present your holy symbol, and each creature of your choice that can see or hear you within 30 feet of you must succeed on a Wisdom saving throw or be {@condition charmed} by you until the end of your next turn or until the {@condition charmed} creature takes any damage. You can also cause any of the {@condition charmed} creatures to drop what they are holding when they fail the saving throw.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Order
      subclass_source: TCE
      feature: Embodiment of the Law
      source: TCE
      level: 6
      entries:
        - At 6th level, you become remarkably adept at channeling magical energy to compel others.
        - If you cast a spell of the enchantment school using a spell slot of 1st level or higher, you can change the spell's casting time to 1 bonus action for this casting, provided the spell's casting time is normally 1 action.
        - You can use this feature a number of times equal to your Wisdom modifier (minimum of once), and you regain all expended uses of it when you finish a long rest.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Order
      subclass_source: TCE
      feature: Blessed Strikes
      source: TCE
      level: 8
      entries:
        - '{@i 8th-level cleric {@variantrule optional class features|tce|optional feature}, which replaces the Divine Strike feature}'
        - You are blessed with divine might in battle. When a creature takes damage from one of your cantrips or weapon attacks, you can also deal {@damage 1d8} radiant damage to that creature. Once you deal this damage, you can't use this feature again until the start of your next turn.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Order
      subclass_source: TCE
      feature: Divine Strike
      source: TCE
      level: 8
      entries:
        - At 8th level, you gain the ability to infuse your weapon strikes with divine energy. Once on each of your turns when you hit a creature with a weapon attack, you can cause the attack to deal an extra {@damage 1d8} psychic damage to the target. When you reach 14th level, the extra damage increases to {@damage 2d8}.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Order
      subclass_source: TCE
      feature: Order's Wrath
      source: TCE
      level: 17
      entries:
        - Starting at 17th level, enemies you designate for destruction wilt under the combined efforts of you and your allies. If you deal your Divine Strike damage to a creature on your turn, you can curse that creature until the start of your next turn. The next time one of your allies hits the cursed creature with an attack, the target also takes {@damage 2d8} psychic damage, and the curse ends. You can curse a creature in this way only once per turn.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Peace
      subclass_source: TCE
      feature: Emboldening Bond
      source: TCE
      level: 1
      entries:
        - '{@i 1st-level Peace Domain feature}'
        - You can forge an empowering bond among people who are at peace with one another. As an action, you choose a number of willing creatures within 30 feet of you (this can include yourself) equal to your proficiency bonus. You create a magical bond among them for 10 minutes or until you use this feature again. While any bonded creature is within 30 feet of another, the creature can roll a {@dice d4} and add the number rolled to an attack roll, an ability check, or a saving throw it makes. Each creature can add the {@dice d4} no more than once per turn.
        - You can use this feature a number of times equal to your proficiency bonus, and you regain all expended uses when you finish a long rest.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Peace
      subclass_source: TCE
      feature: Implement of Peace
      source: TCE
      level: 1
      entries:
        - '{@i 1st-level Peace Domain feature}'
        - You gain proficiency in the {@skill Insight}, {@skill Performance}, or {@skill Persuasion} skill (your choice).
    - class_name: Cleric
      class_source: PHB
      subclass_name: Peace
      subclass_source: TCE
      feature: Peace Domain
      source: TCE
      level: 1
      entries:
        - The balm of peace thrives at the heart of healthy communities, between friendly nations, and in the souls of the kindhearted. The gods of peace inspire people of all sorts to resolve conflict and to stand up against those forces that try to prevent peace from flourishing. See the Peace Deities table for a list of some of the gods associated with this domain.
        - Clerics of the Peace Domain preside over the signing of treaties, and they are often asked to arbitrate in disputes. These clerics' blessings draw people together and help them shoulder one another's burdens, and the clerics' magic aids those who are driven to fight for the way of peace.
        - caption: Peace Deities
          colLabels:
            - Example Deity
            - Pantheon
          colStyles:
            - col-6 text-center
            - col-6 text-center
          rows:
            - - '{@deity Angharradh|Elven|SCAG}'
              - Elven
            - - '{@deity Berronar Truesilver|Dwarven|SCAG}'
              - Dwarven
            - - '{@deity Boldrei|Eberron}'
              - Eberron
            - - '{@deity Cyrrollalee|Halfling|SCAG}'
              - Halfling
            - - '{@deity Eldath}'
              - Forgotten Realms
            - - '{@deity Gaerdal Ironhand|Gnomish|SCAG}'
              - Gnomish
            - - '{@deity Paladine|Dragonlance}'
              - Dragonlance
            - - '{@deity Rao|Greyhawk}'
              - Greyhawk
          type: table
        - entries:
            - '{@i 1st-level Peace Domain feature}'
            - You gain domain spells at the cleric levels listed in the Peace Domain Spells table. See the Divine Domain class feature for how domain spells work.
            - caption: Peace Domain Spells
              colLabels:
                - Cleric Level
                - Spells
              colStyles:
                - col-2 text-center
                - col-10
              rows:
                - - 1st
                  - '{@spell heroism}, {@spell sanctuary}'
                - - 3rd
                  - '{@spell aid}, {@spell warding bond}'
                - - 5th
                  - '{@spell beacon of hope}, {@spell sending}'
                - - 7th
                  - '{@spell aura of purity}, {@spell Otiluke''s resilient sphere}'
                - - 9th
                  - '{@spell greater restoration}, {@spell Rary''s telepathic bond}'
              type: table
          name: Domain Spells
          type: entries
        - subclassFeature: Implement of Peace|Cleric||Peace|TCE|1
          type: refSubclassFeature
        - subclassFeature: Emboldening Bond|Cleric||Peace|TCE|1
          type: refSubclassFeature
    - class_name: Cleric
      class_source: PHB
      subclass_name: Peace
      subclass_source: TCE
      feature: 'Channel Divinity: Balm of Peace'
      source: TCE
      level: 2
      entries:
        - '{@i 2nd-level Peace Domain feature}'
        - You can use your Channel Divinity to make your very presence a soothing balm. As an action, you can move up to your speed, without provoking opportunity attacks, and when you move within 5 feet of any other creature during this action, you can restore a number of hit points to that creature equal to {@dice 2d6} + your Wisdom modifier (minimum of 1 hit point). A creature can receive this healing only once whenever you take this action.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Peace
      subclass_source: TCE
      feature: Protective Bond
      source: TCE
      level: 6
      entries:
        - '{@i 6th-level Peace Domain feature}'
        - The bond you forge between people helps them protect each other. When a creature affected by your Emboldening Bond feature is about to take damage, a second bonded creature within 30 feet of the first can use its reaction to teleport to an unoccupied space within 5 feet of the first creature. The second creature then takes all the damage instead.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Peace
      subclass_source: TCE
      feature: Blessed Strikes
      source: TCE
      level: 8
      entries:
        - '{@i 8th-level cleric {@variantrule optional class features|tce|optional feature}, which replaces the Potent Spellcasting feature}'
        - You are blessed with divine might in battle. When a creature takes damage from one of your cantrips or weapon attacks, you can also deal {@damage 1d8} radiant damage to that creature. Once you deal this damage, you can't use this feature again until the start of your next turn.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Peace
      subclass_source: TCE
      feature: Potent Spellcasting
      source: TCE
      level: 8
      entries:
        - '{@i 8th-level Peace Domain feature}'
        - You add your Wisdom modifier to the damage you deal with any cleric cantrip.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Peace
      subclass_source: TCE
      feature: Expansive Bond
      source: TCE
      level: 17
      entries:
        - '{@i 17th-level Peace Domain feature}'
        - The benefits of your Emboldening Bond and Protective Bond features now work when the creatures are within 60 feet of each other. Moreover, when a creature uses Protective Bond to take someone else's damage, the creature has resistance to that damage.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Solidarity (PSA)
      subclass_source: PSA
      feature: Bonus Proficiency
      source: PSA
      level: 1
      entries:
        - When you choose this domain at 1st level, you gain proficiency with heavy armor.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Solidarity (PSA)
      subclass_source: PSA
      feature: Solidarity Domain (PSA)
      source: PSA
      level: 1
      entries:
        - entries:
            - The worthy must know and respect all others whom the God-Pharaoh deems worthy, for in the afterlife, all will be united in purpose and action.
          type: quote
        - 'Oketra is charged with expounding upon this teaching of the God-Pharaoh, instilling in every initiate the virtue of solidarity. She forges each group of children into a crop of acolytes with just one purpose: to be judged worthy of a glorious afterlife. And she instills in each crop the ability to unite in a single action in pursuit of that purpose. She is fond of poetic imagery to communicate her ideals.'
        - At each indicated cleric level, add the listed spells to your spells prepared.
        - caption: Solidarity Domain Spells
          colLabels:
            - Cleric Level
            - Spells
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - 1st
              - '{@spell bless}, {@spell guiding bolt}'
            - - 3rd
              - '{@spell aid}, {@spell warding bond}'
            - - 5th
              - '{@spell beacon of hope}, {@spell crusader''s mantle}'
            - - 7th
              - '{@spell aura of life}, {@spell guardian of faith}'
            - - 9th
              - '{@spell circle of power}, {@spell mass cure wounds}'
          type: table
        - subclassFeature: Bonus Proficiency|Cleric||Solidarity (PSA)|PSA|1
          type: refSubclassFeature
        - subclassFeature: Solidarity's Action|Cleric||Solidarity (PSA)|PSA|1
          type: refSubclassFeature
    - class_name: Cleric
      class_source: PHB
      subclass_name: Solidarity (PSA)
      subclass_source: PSA
      feature: Solidarity's Action
      source: PSA
      level: 1
      entries:
        - Also at 1st level, when you take the {@action Help} action to aid an ally's attack, you can make one weapon attack as a bonus action. You can use this feature a number of times equal to your Wisdom modifier (minimum of once). You regain expended uses when you finish a long rest.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Solidarity (PSA)
      subclass_source: PSA
      feature: 'Channel Divinity: Preserve Life'
      source: PSA
      level: 2
      entries:
        - Starting at 2nd level, you can use your Channel Divinity to heal the badly injured.
        - As an action, you present your holy symbol and evoke healing energy that can restore a number of hit points equal to five times your cleric level. Choose any creatures within 30 feet of you, and divide those hit points among them. This feature can restore a creature to no more than half of its hit point maximum. You can't use this feature on an undead or a construct.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Solidarity (PSA)
      subclass_source: PSA
      feature: Oketra's Blessing
      source: PSA
      level: 6
      entries:
        - At 6th level, when a creature within 30 feet of you makes an attack roll, you can use your reaction to grant that creature a +10 bonus to the roll, using your Channel Divinity. You make this choice after you see the roll, but before the DM says whether the attack hits or misses.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Solidarity (PSA)
      subclass_source: PSA
      feature: Blessed Strikes
      source: TCE
      level: 8
      entries:
        - '{@i 8th-level cleric {@variantrule optional class features|tce|optional feature}, which replaces the Divine Strike feature}'
        - You are blessed with divine might in battle. When a creature takes damage from one of your cantrips or weapon attacks, you can also deal {@damage 1d8} radiant damage to that creature. Once you deal this damage, you can't use this feature again until the start of your next turn.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Solidarity (PSA)
      subclass_source: PSA
      feature: Divine Strike
      source: PSA
      level: 8
      entries:
        - At 8th level, you gain the ability to infuse your weapon strikes with divine energy. Once on each of your turns when you hit a creature with a weapon attack, you can cause the attack to deal an extra {@damage 1d8} damage of the same type dealt by the weapon to the target. When you reach 14th level, the extra damage increases to {@damage 2d8}.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Solidarity (PSA)
      subclass_source: PSA
      feature: Supreme Healing
      source: PSA
      level: 17
      entries:
        - Starting at 17th level, when you would normally roll one or more dice to restore hit points with a spell, you instead use the highest number possible for each die. For example, instead of restoring {@dice 2d6} hit points to a creature, you restore 12.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Strength (PSA)
      subclass_source: PSA
      feature: Acolyte of Strength
      source: PSA
      level: 1
      entries:
        - 'At 1st level, you learn one druid cantrip of your choice. You also gain proficiency in one of the following skills of your choice: {@skill Animal Handling}, {@skill Athletics}, {@skill Nature}, or {@skill Survival}.'
    - class_name: Cleric
      class_source: PHB
      subclass_name: Strength (PSA)
      subclass_source: PSA
      feature: Bonus Proficiency
      source: PSA
      level: 1
      entries:
        - Also at 1st level, you gain proficiency with heavy armor.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Strength (PSA)
      subclass_source: PSA
      feature: Strength Domain (PSA)
      source: PSA
      level: 1
      entries:
        - entries:
            - The worthy shall hone a strong body that can withstand the boundless energies of the afterlife.
          type: quote
        - It falls to Rhonas to instill this teaching in those who would enter the afterlife—but to his mind, the words themselves don't matter. Strength can't be taught. It must be built through practice and training. Rhonas demonstrates his teachings by his example, rather than by giving his students any kind of academic instruction. He welcomes the people of Naktamun to stand by the Hekma and watch him as he storms into the desert to battle the greatest horrors. He encourages them to observe his indomitable strength, for though they will never equal it, they can aspire to mimicry. He invites them to scrutinize every move and practice what they see.
        - At each indicated cleric level, add the listed spells to your spells prepared.
        - caption: Strength Domain Spells
          colLabels:
            - Cleric Level
            - Spells
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - 1st
              - '{@spell divine favor}, {@spell shield of faith}'
            - - 3rd
              - '{@spell enhance ability}, {@spell protection from poison}'
            - - 5th
              - '{@spell haste}, {@spell protection from energy}'
            - - 7th
              - '{@spell dominate beast}, {@spell stoneskin}'
            - - 9th
              - '{@spell destructive wave}, {@spell insect plague}'
          type: table
        - subclassFeature: Acolyte of Strength|Cleric||Strength (PSA)|PSA|1
          type: refSubclassFeature
        - subclassFeature: Bonus Proficiency|Cleric||Strength (PSA)|PSA|1
          type: refSubclassFeature
    - class_name: Cleric
      class_source: PHB
      subclass_name: Strength (PSA)
      subclass_source: PSA
      feature: 'Channel Divinity: Feat of Strength'
      source: PSA
      level: 2
      entries:
        - At 2nd level, you can use your Channel Divinity to enhance your physical might. When you make an attack roll, ability check, or saving throw using Strength, you can use your Channel Divinity to gain a +10 bonus to the roll. You make this choice after you see the roll, but before the DM says whether the roll succeeds or fails.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Strength (PSA)
      subclass_source: PSA
      feature: Rhonas's Blessing
      source: PSA
      level: 6
      entries:
        - At 6th level, when a creature within 30 feet of you makes an attack roll, ability check, or saving throw using Strength, you can use your reaction to grant that creature a +10 bonus to the roll, using your Channel Divinity. You make this choice after you see the roll, but before the DM says whether the roll succeeds or fail.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Strength (PSA)
      subclass_source: PSA
      feature: Blessed Strikes
      source: TCE
      level: 8
      entries:
        - '{@i 8th-level cleric {@variantrule optional class features|tce|optional feature}, which replaces the Divine Strike feature}'
        - You are blessed with divine might in battle. When a creature takes damage from one of your cantrips or weapon attacks, you can also deal {@damage 1d8} radiant damage to that creature. Once you deal this damage, you can't use this feature again until the start of your next turn.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Strength (PSA)
      subclass_source: PSA
      feature: Divine Strike
      source: PSA
      level: 8
      entries:
        - At 8th level, you gain the ability to infuse your weapon strikes with divine energy. Once on each of your turns when you hit a creature with a weapon attack, you can cause the attack to deal an extra {@damage 1d8} damage of the same type dealt by the weapon to the target. When you reach 14th level, the extra damage increases to {@damage 2d8}.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Strength (PSA)
      subclass_source: PSA
      feature: Avatar of Battle
      source: PSA
      level: 17
      entries:
        - At 17th level, you gain resistance to bludgeoning, piercing, and slashing damage from nonmagical attacks.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Tempest
      subclass_source: PHB
      feature: Bonus Proficiencies
      source: PHB
      level: 1
      entries:
        - At 1st level, you gain proficiency with martial weapons and heavy armor.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Tempest
      subclass_source: PHB
      feature: Tempest Domain
      source: PHB
      level: 1
      entries:
        - Gods whose portfolios include the Tempest domain—including {@deity Talos}, {@deity Umberlee}, {@deity Kord|Greyhawk}, {@deity Zeboim|Dragonlance}, {@deity the Devourer|Eberron}, {@deity Zeus|Greek}, and {@deity Thor|Norse}—govern storms, sea, and sky. They include gods of lightning and thunder, gods of earthquakes, some fire gods, and certain gods of violence, physical strength, and courage. In some pantheons, a god of this domain rules over other deities and is known for swift justice delivered by thunderbolts. In the pantheons of seafaring people, gods of this domain are ocean deities and the patrons of sailors. Tempest gods send their clerics to inspire fear in the common folk, either to keep those folk on the path of righteousness or to encourage them to offer sacrifices of propitiation to ward off divine wrath.
        - At each indicated cleric level, you add the listed spells to your spells prepared.
        - caption: Tempest Domain Spells
          colLabels:
            - Cleric Level
            - Spells
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - 1st
              - '{@spell fog cloud}, {@spell thunderwave}'
            - - 3rd
              - '{@spell gust of wind}, {@spell shatter}'
            - - 5th
              - '{@spell call lightning}, {@spell sleet storm}'
            - - 7th
              - '{@spell control water}, {@spell ice storm}'
            - - 9th
              - '{@spell destructive wave}, {@spell insect plague}'
          type: table
        - subclassFeature: Bonus Proficiencies|Cleric||Tempest||1
          type: refSubclassFeature
        - subclassFeature: Wrath of the Storm|Cleric||Tempest||1
          type: refSubclassFeature
    - class_name: Cleric
      class_source: PHB
      subclass_name: Tempest
      subclass_source: PHB
      feature: Wrath of the Storm
      source: PHB
      level: 1
      entries:
        - Also at 1st level, you can thunderously rebuke attackers. When a creature within 5 feet of you that you can see hits you with an attack, you can use your reaction to cause the creature to make a Dexterity saving throw. The creature takes {@damage 2d8} lightning or thunder damage (your choice) on a failed saving throw, and half as much damage on a successful one.
        - You can use this feature a number of times equal to your Wisdom modifier (a minimum of once). You regain all expended uses when you finish a long rest.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Tempest
      subclass_source: PHB
      feature: 'Channel Divinity: Destructive Wrath'
      source: PHB
      level: 2
      entries:
        - Starting at 2nd level, you can use your Channel Divinity to wield the power of the storm with unchecked ferocity.
        - When you roll lightning or thunder damage, you can use your Channel Divinity to deal maximum damage, instead of rolling.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Tempest
      subclass_source: PHB
      feature: Thunderbolt Strike
      source: PHB
      level: 6
      entries:
        - At 6th level, when you deal lightning damage to a Large or smaller creature, you can also push it up to 10 feet away from you.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Tempest
      subclass_source: PHB
      feature: Blessed Strikes
      source: TCE
      level: 8
      entries:
        - '{@i 8th-level cleric {@variantrule optional class features|tce|optional feature}, which replaces the Divine Strike feature}'
        - You are blessed with divine might in battle. When a creature takes damage from one of your cantrips or weapon attacks, you can also deal {@damage 1d8} radiant damage to that creature. Once you deal this damage, you can't use this feature again until the start of your next turn.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Tempest
      subclass_source: PHB
      feature: Divine Strike
      source: PHB
      level: 8
      entries:
        - At 8th level, you gain the ability to infuse your weapon strikes with divine energy. Once on each of your turns when you hit a creature with a weapon attack, you can cause the attack to deal an extra {@damage 1d8} thunder damage to the target. When you reach 14th level, the extra damage increases to {@damage 2d8}.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Tempest
      subclass_source: PHB
      feature: Stormborn
      source: PHB
      level: 17
      entries:
        - At 17th level, you have a flying speed equal to your current walking speed whenever you are not underground or indoors.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Trickery
      subclass_source: PHB
      feature: Blessing of the Trickster
      source: PHB
      level: 1
      entries:
        - Starting when you choose this domain at 1st level, you can use your action to touch a willing creature other than yourself to give it advantage on Dexterity ({@skill Stealth}) checks. This blessing lasts for 1 hour or until you use this feature again.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Trickery
      subclass_source: PHB
      feature: Trickery Domain
      source: PHB
      level: 1
      entries:
        - Gods of trickery—such as {@deity Tymora}, {@deity Beshaba}, {@deity Olidammara|Greyhawk}, {@deity the Traveler|Eberron}, {@deity Garl Glittergold|Nonhuman}, and {@deity Loki|Norse}—are mischief-makers and instigators who stand as a constant challenge to the accepted order among both gods and mortals. They're patrons of thieves, scoundrels, gamblers, rebels, and liberators. Their clerics are a disruptive force in the world, puncturing pride, mocking tyrants, stealing from the rich, freeing captives, and flouting hollow traditions. They prefer subterfuge, pranks, deception, and theft rather than direct confrontation.
        - At each indicated cleric level, you add the listed spells to your spells prepared.
        - caption: Trickery Domain Spells
          colLabels:
            - Cleric Level
            - Spells
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - 1st
              - '{@spell charm person}, {@spell disguise self}'
            - - 3rd
              - '{@spell mirror image}, {@spell pass without trace}'
            - - 5th
              - '{@spell blink}, {@spell dispel magic}'
            - - 7th
              - '{@spell dimension door}, {@spell polymorph}'
            - - 9th
              - '{@spell dominate person}, {@spell modify memory}'
          type: table
        - subclassFeature: Blessing of the Trickster|Cleric||Trickery||1
          type: refSubclassFeature
    - class_name: Cleric
      class_source: PHB
      subclass_name: Trickery
      subclass_source: PHB
      feature: 'Channel Divinity: Invoke Duplicity'
      source: PHB
      level: 2
      entries:
        - Starting at 2nd level, you can use your Channel Divinity to create an illusory duplicate of yourself.
        - As an action, you create a perfect illusion of yourself that lasts for 1 minute, or until you lose your {@status concentration} (as if you were {@status concentration||concentrating} on a spell). The illusion appears in an unoccupied space that you can see within 30 feet of you. As a bonus action on your turn, you can move the illusion up to 30 feet to a space you can see, but it must remain within 120 feet of you.
        - For the duration, you can cast spells as though you were in the illusion's space, but you must use your own senses. Additionally, when both you and your illusion are within 5 feet of a creature that can see the illusion, you have advantage on attack rolls against that creature, given how distracting the illusion is to the target.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Trickery
      subclass_source: PHB
      feature: 'Channel Divinity: Cloak of Shadows'
      source: PHB
      level: 6
      entries:
        - Starting at 6th level, you can use your Channel Divinity to vanish.
        - As an action, you become {@condition invisible} until the end of your next turn. You become visible if you attack or cast a spell.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Trickery
      subclass_source: PHB
      feature: Blessed Strikes
      source: TCE
      level: 8
      entries:
        - '{@i 8th-level cleric {@variantrule optional class features|tce|optional feature}, which replaces the Divine Strike feature}'
        - You are blessed with divine might in battle. When a creature takes damage from one of your cantrips or weapon attacks, you can also deal {@damage 1d8} radiant damage to that creature. Once you deal this damage, you can't use this feature again until the start of your next turn.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Trickery
      subclass_source: PHB
      feature: Divine Strike
      source: PHB
      level: 8
      entries:
        - At 8th level, you gain the ability to infuse your weapon strikes with poison—a gift from your deity. Once on each of your turns when you hit a creature with a weapon attack, you can cause the attack to deal an extra {@damage 1d8} poison damage to the target. When you reach 14th level, the extra damage increases to {@damage 2d8}.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Trickery
      subclass_source: PHB
      feature: Improved Duplicity
      source: PHB
      level: 17
      entries:
        - At 17th level, you can create up to four duplicates of yourself, instead of one, when you use Invoke Duplicity. As a bonus action on your turn, you can move any number of them up to 30 feet, to a maximum range of 120 feet.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Twilight
      subclass_source: TCE
      feature: Bonus Proficiencies
      source: TCE
      level: 1
      entries:
        - '{@i 1st-level Twilight Domain feature}'
        - You gain proficiency with martial weapons and heavy armor.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Twilight
      subclass_source: TCE
      feature: Eyes of Night
      source: TCE
      level: 1
      entries:
        - '{@i 1st-level Twilight Domain feature}'
        - You can see through the deepest gloom. You have {@sense darkvision} out to a range of 300 feet. In that radius, you can see in dim light as if it were bright light and in darkness as if it were dim light.
        - As an action, you can magically share the {@sense darkvision} of this feature with willing creatures you can see within 10 feet of you, up to a number of creatures equal to your Wisdom modifier (minimum of one creature). The shared {@sense darkvision} lasts for 1 hour. Once you share it, you can't do so again until you finish a long rest, unless you expend a spell slot of any level to share it again.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Twilight
      subclass_source: TCE
      feature: Twilight Domain
      source: TCE
      level: 1
      entries:
        - The twilit transition from light into darkness often brings calm and even joy, as the day's labors end and the hours of rest begin. The darkness can also bring terrors, but the gods of twilight guard against the horrors of the night.
        - Clerics who serve these deities-examples of which appear on the Twilight Deities table-bring comfort to those who seek rest and protect them by venturing into the encroaching darkness to ensure that the dark is a comfort, not a terror.
        - caption: Twilight Deities
          colLabels:
            - Example Deity
            - Pantheon
          colStyles:
            - col-6 text-center
            - col-6 text-center
          rows:
            - - '{@deity Boldrei|Eberron}'
              - Eberron
            - - '{@deity Celestian|Greyhawk}'
              - Greyhawk
            - - '{@deity Dol Arrah|Eberron}'
              - Eberron
            - - '{@deity Helm}'
              - Forgotten Realms
            - - '{@deity Ilmater}'
              - Forgotten Realms
            - - '{@deity Mishakal|Dragonlance}'
              - Dragonlance
            - - '{@deity Selûne}'
              - Forgotten Realms
            - - '{@deity Yondalla|Nonhuman}'
              - Halfling
          type: table
        - entries:
            - '{@i 1st-level Twilight Domain feature}'
            - You gain domain spells at the cleric levels listed in the Twilight Domain Spells table. See the Divine Domain class feature for how domain spells work.
            - caption: Twilight Domain Spells
              colLabels:
                - Cleric Level
                - Spells
              colStyles:
                - col-2 text-center
                - col-10
              rows:
                - - 1st
                  - '{@spell faerie fire}, {@spell sleep}'
                - - 3rd
                  - '{@spell moonbeam}, {@spell see invisibility}'
                - - 5th
                  - '{@spell aura of vitality}, {@spell Leomund''s tiny hut}'
                - - 7th
                  - '{@spell aura of life}, {@spell greater invisibility}'
                - - 9th
                  - '{@spell circle of power}, {@spell mislead}'
              type: table
          name: Domain Spells
          type: entries
        - subclassFeature: Bonus Proficiencies|Cleric||Twilight|TCE|1
          type: refSubclassFeature
        - subclassFeature: Eyes of Night|Cleric||Twilight|TCE|1
          type: refSubclassFeature
        - subclassFeature: Vigilant Blessing|Cleric||Twilight|TCE|1
          type: refSubclassFeature
    - class_name: Cleric
      class_source: PHB
      subclass_name: Twilight
      subclass_source: TCE
      feature: Vigilant Blessing
      source: TCE
      level: 1
      entries:
        - '{@i 1st-level Twilight Domain feature}'
        - The night has taught you to be vigilant. As an action, you give one creature you touch (including possibly yourself) advantage on the next initiative roll the creature makes. This benefit ends immediately after the roll or if you use this feature again.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Twilight
      subclass_source: TCE
      feature: 'Channel Divinity: Twilight Sanctuary'
      source: TCE
      level: 2
      entries:
        - '{@i 2nd-level Twilight Domain feature}'
        - You can use your Channel Divinity to refresh your allies with soothing twilight.
        - 'As an action, you present your holy symbol, and a sphere of twilight emanates from you. The sphere is centered on you, has a 30-foot radius, and is filled with dim light. The sphere moves with you, and it lasts for 1 minute or until you are {@condition incapacitated} or die. Whenever a creature (including you) ends its turn in the sphere, you can grant that creature one of these benefits:'
        - items:
            - You grant it temporary hit points equal to {@dice 1d6} plus your cleric level.
            - You end one effect on it causing it to be {@condition charmed} or {@condition frightened}.
          type: list
    - class_name: Cleric
      class_source: PHB
      subclass_name: Twilight
      subclass_source: TCE
      feature: Steps of Night
      source: TCE
      level: 6
      entries:
        - '{@i 6th-level Twilight Domain feature}'
        - You can draw on the mystical power of night to rise into the air. As a bonus action when you are in dim light or darkness, you can magically give yourself a flying speed equal to your walking speed for 1 minute. You can use this bonus action a number of times equal to your proficiency bonus, and you regain all expended uses when you finish a long rest.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Twilight
      subclass_source: TCE
      feature: Blessed Strikes
      source: TCE
      level: 8
      entries:
        - '{@i 8th-level cleric {@variantrule optional class features|tce|optional feature}, which replaces the Divine Strike feature}'
        - You are blessed with divine might in battle. When a creature takes damage from one of your cantrips or weapon attacks, you can also deal {@damage 1d8} radiant damage to that creature. Once you deal this damage, you can't use this feature again until the start of your next turn.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Twilight
      subclass_source: TCE
      feature: Divine Strike
      source: TCE
      level: 8
      entries:
        - '{@i 8th-level Twilight Domain feature}'
        - You gain the ability to infuse your weapon strikes with divine energy. Once on each of your turns when you hit a creature with a weapon attack, you can cause the attack to deal an extra {@damage 1d8} radiant damage. When you reach 14th level, the extra damage increases to {@damage 2d8}.
    - class_name: Cleric
      class_source: PHB
      subclass_name: Twilight
      subclass_source: TCE
      feature: Twilight Shroud
      source: TCE
      level: 17
      entries:
        - '{@i 17th-level Twilight Domain feature}'
        - 'The twilight that you summon offers a protective embrace: you and your allies have {@quickref Cover||3||half cover} while in the sphere created by your Twilight Sanctuary.'
    - class_name: Cleric
      class_source: PHB
      subclass_name: War
      subclass_source: PHB
      feature: Bonus Proficiencies
      source: PHB
      level: 1
      entries:
        - At 1st level, you gain proficiency with martial weapons and heavy armor.
    - class_name: Cleric
      class_source: PHB
      subclass_name: War
      subclass_source: PHB
      feature: War Domain
      source: PHB
      level: 1
      entries:
        - War has many manifestations. It can make heroes of ordinary people. It can be desperate and horrific, with acts of cruelty and cowardice eclipsing instances of excellence and courage. In either case, the gods of war watch over warriors and reward them for their great deeds. The clerics of such gods excel in battle, inspiring others to fight the good fight or offering acts of violence as prayers. Gods of war include champions of honor and chivalry (such as {@deity Torm}, {@deity Heironeous|Greyhawk}, and {@deity Kiri-Jolith|Dragonlance}) as well as gods of destruction and pillage (such as {@deity Erythnul|Greyhawk}, {@deity the Fury|Eberron}, {@deity Gruumsh|Nonhuman}, and {@deity Ares|Greek}) and gods of conquest and domination (such as {@deity Bane}, {@deity Hextor|Greyhawk}, and {@deity Maglubiyet|Nonhuman}). Other war gods (such as {@deity Tempus}, {@deity Nike|Greek}, and {@deity Nuada|Celtic}) take a more neutral stance, promoting war in all its manifestations and supporting warriors in any circumstance.
        - At each indicated cleric level, add the listed spells to your spells prepared.
