    - class_name: Wizard
      class_source: PHB
      feature: Arcane Tradition feature
      source: PHB
      level: 14
      entries:
        - At 14th level, you gain a feature granted by your Arcane Tradition.
    - class_name: Wizard
      class_source: PHB
      feature: Ability Score Improvement
      source: PHB
      level: 16
      entries:
        - When you reach 16th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can't increase an ability score above 20 using this feature.
        - If your DM allows the use of feats, you may instead take a {@5etools feat|feats.html}.
    - class_name: Wizard
      class_source: PHB
      feature: Spell Mastery
      source: PHB
      level: 18
      entries:
        - At 18th level, you have achieved such mastery over certain spells that you can cast them at will. Choose a 1st-level wizard spell and a 2nd-level wizard spell that are in your spellbook. You can cast those spells at their lowest level without expending a spell slot when you have them prepared. If you want to cast either spell at a higher level, you must expend a spell slot as normal.
        - By spending 8 hours in study, you can exchange one or both of the spells you chose for different spells of the same levels.
    - class_name: Wizard
      class_source: PHB
      feature: Ability Score Improvement
      source: PHB
      level: 19
      entries:
        - When you reach 19th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can't increase an ability score above 20 using this feature.
        - If your DM allows the use of feats, you may instead take a {@5etools feat|feats.html}.
    - class_name: Wizard
      class_source: PHB
      feature: Signature Spells
      source: PHB
      level: 20
      entries:
        - When you reach 20th level, you gain mastery over two powerful spells and can cast them with little effort. Choose two 3rd-level wizard spells in your spellbook as your signature spells. You always have these spells prepared, they don't count against the number of spells you have prepared, and you can cast each of them once at 3rd level without expending a spell slot. When you do so, you can't do so again until you finish a short or long rest.
        - If you want to cast either spell at a higher level, you must expend a spell slot as normal.
    - class_name: Wizard
      class_source: XPHB
      feature: Arcane Recovery
      source: XPHB
      level: 1
      entries:
        - You can regain some of your magical energy by studying your spellbook. When you finish a {@variantrule Short Rest|XPHB}, you can choose expended spell slots to recover. The spell slots can have a combined level equal to no more than half your Wizard level (round up), and none of the slots can be level 6 or higher. For example, if you're a level 4 Wizard, you can recover up to two levels' worth of spell slots, regaining either one level 2 spell slot or two level 1 spell slots.
        - Once you use this feature, you can't do so again until you finish a {@variantrule Long Rest|XPHB}.
    - class_name: Wizard
      class_source: XPHB
      feature: Ritual Adept
      source: XPHB
      level: 1
      entries:
        - You can cast any spell as a {@variantrule Ritual|XPHB} if that spell has the {@variantrule Ritual|XPHB} tag and the spell is in your spellbook. You needn't have the spell prepared, but you must read from the book to cast a spell in this way.
    - class_name: Wizard
      class_source: XPHB
      feature: Spellcasting
      source: XPHB
      level: 1
      entries:
        - As a student of arcane magic, you have learned to cast spells. See {@book chapter 7|XPHB|7} for the rules on spellcasting. The information below details how you use those rules with Wizard spells, which appear in the {@filter Wizard spell list|spells|class=Wizard} later in the class's description.
        - entries:
            - entries:
                - You know three Wizard cantrips of your choice. {@spell Light|XPHB}, {@spell Mage Hand|XPHB}, and {@spell Ray of Frost|XPHB} are recommended. Whenever you finish a {@variantrule Long Rest|XPHB}, you can replace one of your cantrips from this feature with another Wizard cantrip of your choice.
                - When you reach Wizard levels 4 and 10, you learn another Wizard cantrip of your choice, as shown in the Cantrips column of the Wizard Features table.
              name: Cantrips
              type: entries
            - entries:
                - 'Your wizardly apprenticeship culminated in the creation of a unique book: your spellbook. It is a Tiny object that weighs 3 pounds, contains 100 pages, and can be read only by you or someone casting {@spell Identify|XPHB}. You determine the book''s appearance and materials, such as a gilt-edged tome or a collection of vellum bound with twine.'
                - The book contains the level 1+ spells you know. It starts with six level 1 Wizard spells of your choice. {@spell Detect Magic|XPHB}, {@spell Feather Fall|XPHB}, {@spell Mage Armor|XPHB}, {@spell Magic Missile|XPHB}, {@spell Sleep|XPHB}, and {@spell Thunderwave|XPHB} are recommended.
                - Whenever you gain a Wizard level after 1, add two Wizard spells of your choice to your spellbook. Each of these spells must be of a level for which you have spell slots, as shown in the Wizard Features table. The spells are the culmination of arcane research you do regularly.
              name: Spellbook
              type: entries
            - entries:
                - The Wizard Features table shows how many spell slots you have to cast your level 1+ spells. You regain all expended slots when you finish a {@variantrule Long Rest|XPHB}.
              name: Spell Slots
              type: entries
            - entries:
                - You prepare the list of level 1+ spells that are available for you to cast with this feature. To do so, choose four spells from your spellbook. The chosen spells must be of a level for which you have spell slots.
                - The number of spells on your list increases as you gain Wizard levels, as shown in the Prepared Spells column of the Wizard Features table. Whenever that number increases, choose additional Wizard spells until the number of spells on your list matches the number in the table. The chosen spells must be of a level for which you have spell slots. For example, if you're a level 3 Wizard, your list of prepared spells can include six spells of levels 1 and 2 in any combination, chosen from your spellbook.
                - If another Wizard feature gives you spells that you always have prepared, those spells don't count against the number of spells you can prepare with this feature, but those spells otherwise count as Wizard spells for you.
              name: Prepared Spells of Level 1+
              type: entries
            - entries:
                - Whenever you finish a {@variantrule Long Rest|XPHB}, you can change your list of prepared spells, replacing any of the spells there with spells from your spellbook.
              name: Changing Your Prepared Spells
              type: entries
            - entries:
                - Intelligence is your spellcasting ability for your Wizard spells.
              name: Spellcasting Ability
              type: entries
            - entries:
                - You can use an {@item Arcane Focus|XPHB} or your spellbook as a {@variantrule Spellcasting Focus|XPHB} for your Wizard spells.
              name: Spellcasting Focus
              type: entries
            - entries:
                - The spells you add to your spellbook as you gain levels reflect your ongoing magical research, but you might find other spells during your adventures that you can add to the book. You could discover a Wizard spell on a {@item Spell Scroll|XDMG}, for example, and then copy it into your spellbook.
                - entries:
                    - When you find a level 1+ Wizard spell, you can copy it into your spellbook if it's of a level you can prepare and if you have time to copy it. For each level of the spell, the transcription takes 2 hours and costs 50 GP. Afterward you can prepare the spell like the other spells in your spellbook.
                  name: Copying a Spell into the Book
                  type: entries
                - entries:
                    - You can copy a spell from your spellbook into another book. This is like copying a new spell into your spellbook but faster, since you already know how to cast the spell. You need spend only 1 hour and 10 GP for each level of the copied spell.
                    - If you lose your spellbook, you can use the same procedure to transcribe the Wizard spells that you have prepared into a new spellbook. Filling out the remainder of the new book requires you to find new spells to do so. For this reason, many wizards keep a backup spellbook.
                  name: Copying the Book
                  type: entries
              name: Expanding and Replacing a Spellbook
              type: inset
          type: entries
    - class_name: Wizard
      class_source: XPHB
      feature: Scholar
      source: XPHB
      level: 2
      entries:
        - 'While studying magic, you also specialized in another field of study. Choose one of the following skills in which you have proficiency: {@skill Arcana|XPHB}, {@skill History|XPHB}, {@skill Investigation|XPHB}, {@skill Medicine|XPHB}, {@skill Nature|XPHB}, or {@skill Religion|XPHB}. You have {@variantrule Expertise|XPHB} in the chosen skill.'
    - class_name: Wizard
      class_source: XPHB
      feature: Wizard Subclass
      source: XPHB
      level: 3
      entries:
        - You gain a Wizard subclass of your choice. A subclass is a specialization that grants you features at certain Wizard levels. For the rest of your career, you gain each of your subclass's features that are of your Wizard level or lower.
    - class_name: Wizard
      class_source: XPHB
      feature: Ability Score Improvement
      source: XPHB
      level: 4
      entries:
        - You gain the {@feat Ability Score Improvement|XPHB} feat or another {@5etools feat|feats.html} of your choice for which you qualify. You gain this feature again at Wizard levels 8, 12, and 16.
    - class_name: Wizard
      class_source: XPHB
      feature: Memorize Spell
      source: XPHB
      level: 5
      entries:
        - Whenever you finish a {@variantrule Short Rest|XPHB}, you can study your spellbook and replace one of the level 1+ Wizard spells you have prepared for your Spellcasting feature with another level 1+ spell from the book.
    - class_name: Wizard
      class_source: XPHB
      feature: Subclass Feature
      source: XPHB
      level: 6
      entries:
        - You gain a feature from your Wizard Subclass.
    - class_name: Wizard
      class_source: XPHB
      feature: Ability Score Improvement
      source: XPHB
      level: 8
      entries:
        - You gain the {@feat Ability Score Improvement|XPHB} Feat or another {@5etools feat|feats.html} of your choice for which you qualify.
    - class_name: Wizard
      class_source: XPHB
      feature: Subclass Feature
      source: XPHB
      level: 10
      entries:
        - You gain a feature from your Wizard Subclass.
    - class_name: Wizard
      class_source: XPHB
      feature: Ability Score Improvement
      source: XPHB
      level: 12
      entries:
        - You gain the {@feat Ability Score Improvement|XPHB} Feat or another {@5etools feat|feats.html} of your choice for which you qualify.
    - class_name: Wizard
      class_source: XPHB
      feature: Subclass Feature
      source: XPHB
      level: 14
      entries:
        - You gain a feature from your Wizard Subclass.
    - class_name: Wizard
      class_source: XPHB
      feature: Ability Score Improvement
      source: XPHB
      level: 16
      entries:
        - You gain the {@feat Ability Score Improvement|XPHB} Feat or another {@5etools feat|feats.html} of your choice for which you qualify.
    - class_name: Wizard
      class_source: XPHB
      feature: Spell Mastery
      source: XPHB
      level: 18
      entries:
        - You have achieved such mastery over certain spells that you can cast them at will. Choose a level 1 and a level 2 spell in your spellbook that have a casting time of an action. You always have those spells prepared, and you can cast them at their lowest level without expending a spell slot. To cast either spell at a higher level, you must expend a spell slot.
        - Whenever you finish a {@variantrule Long Rest|XPHB}, you can study your spellbook and replace one of those spells with an eligible spell of the same level from the book.
    - class_name: Wizard
      class_source: XPHB
      feature: Epic Boon
      source: XPHB
      level: 19
      entries:
        - You gain an {@filter Epic Boon feat|feats|category=EB} or another {@5etools feat|feats.html} of your choice for which you qualify. {@feat Boon of Spell Recall|XPHB} is recommended.
    - class_name: Wizard
      class_source: XPHB
      feature: Signature Spells
      source: XPHB
      level: 20
      entries:
        - Choose two level 3 spells in your spellbook as your signature spells. You always have these spells prepared, and you can cast each of them once at level 3 without expending a spell slot. When you do so, you can't cast them in this way again until you finish a {@variantrule Short Rest|XPHB|Short} or {@variantrule Long Rest|XPHB}. To cast either spell at a higher level, you must expend a spell slot.
subclass_features:
    - class_name: Artificer
      class_source: EFA
      subclass_name: Alchemist
      subclass_source: EFA
      feature: Alchemist
      source: EFA
      level: 3
      entries:
        - '{@i Craft Magic Elixirs and Potions}'
        - An Alchemist is an expert at combining reagents to produce magical effects. Alchemists use their creations to give life and to leech it away.
        - subclassFeature: Tools of the Trade|Artificer|EFA|Alchemist|EFA|3|EFA
          type: refSubclassFeature
        - subclassFeature: Alchemist Spells|Artificer|EFA|Alchemist|EFA|3|EFA
          type: refSubclassFeature
        - subclassFeature: Experimental Elixir|Artificer|EFA|Alchemist|EFA|3|EFA
          type: refSubclassFeature
    - class_name: Artificer
      class_source: EFA
      subclass_name: Alchemist
      subclass_source: EFA
      feature: Alchemist Spells
      source: EFA
      level: 3
      entries:
        - When you reach an Artificer level specified in the Alchemist Spells table, you thereafter always have the listed spells prepared.
        - caption: Alchemist Spells
          colLabels:
            - Artificer Level
            - Spells
          colStyles:
            - col-3 text-center
            - col-9
          page: 13
          rows:
            - - "3"
              - '{@spell Healing Word|XPHB}, {@spell Ray of Sickness|XPHB}'
            - - "5"
              - '{@spell Flaming Sphere|XPHB}, {@spell Melf''s Acid Arrow|XPHB}'
            - - "9"
              - '{@spell Gaseous Form|XPHB}, {@spell Mass Healing Word|XPHB}'
            - - "13"
              - '{@spell Death Ward|XPHB}, {@spell Vitriolic Sphere|XPHB}'
            - - "17"
              - '{@spell Cloudkill|XPHB}, {@spell Raise Dead|XPHB}'
          type: table
    - class_name: Artificer
      class_source: EFA
      subclass_name: Alchemist
      subclass_source: EFA
      feature: Experimental Elixir
      source: EFA
      level: 3
      entries:
        - Whenever you finish a {@variantrule Long Rest|XPHB} while holding {@item Alchemist's Supplies|XPHB}, you can use that tool to magically produce two elixirs. For each elixir, roll on the Experimental Elixir table for the elixir's effect, which is triggered when someone drinks the elixir. The elixir appears in a vial, and the vial vanishes when the elixir is drunk or poured out. If any elixir remains when you finish a {@variantrule Long Rest|XPHB}, the elixir and its vial vanish.
        - entries:
            - As a {@variantrule Bonus Action|XPHB}, a creature can drink the elixir or administer it to another creature within 5 feet of itself.
          name: Drinking an Elixir
          type: entries
        - entries:
            - As a {@action Magic|XPHB} action while holding {@item Alchemist's Supplies|XPHB}, you can expend one spell slot to create another elixir. When you do so, you choose its effect from the Experimental Elixir table rather than rolling.
            - 'When you reach certain Artificer levels, you can make an additional elixir at the end of each {@variantrule Long Rest|XPHB}: a total of three at level 5, four at level 9, and five at level 15.'
          name: Creating Additional Elixirs
          type: entries
        - caption: Experimental Elixir
          colLabels:
            - 1d6
            - Effect
          colStyles:
            - col-2 text-center
            - col-10
          page: 13
          rows:
            - - "1"
              - '{@b Healing.} The drinker regains a number of {@variantrule Hit Points|XPHB} equal to {@dice 2d8} plus your Intelligence modifier. The number of {@variantrule Hit Points|XPHB} restored increases by {@dice 1d8} when you reach Artificer levels 9 ({@dice 3d8}) and 15 ({@dice 4d8}).'
            - - "2"
              - '{@b Swiftness.} The drinker''s {@variantrule Speed|XPHB} increases by 10 feet for 1 hour. This bonus increases when you reach Artificer levels 9 (15 feet) and 15 (20 feet).'
            - - "3"
              - '{@b Resilience.} The drinker gains a +1 bonus to AC for 10 minutes. The duration increases when you reach Artificer levels 9 (1 hour) and 15 (8 hours).'
            - - "4"
              - '{@b Boldness.} The drinker can roll {@dice 1d4} and add the number rolled to every attack roll and saving throw they make for the next minute. The duration increases when you reach Artificer levels 9 (10 minutes) and 15 (1 hour).'
            - - "5"
              - '{@b Flight.} The drinker gains a {@variantrule Fly Speed|XPHB} of 10 feet for 10 minutes. The {@variantrule Fly Speed|XPHB} increases when you reach Artificer levels 9 (20 feet) and 15 (30 feet).'
            - - "6"
              - You determine the elixir's effect by choosing one of the other rows in this table.
          type: table
    - class_name: Artificer
      class_source: EFA
      subclass_name: Alchemist
      subclass_source: EFA
      feature: Tools of the Trade
      source: EFA
      level: 3
      entries:
        - You gain the following benefits.
        - entries:
            - You gain proficiency with {@item Alchemist's Supplies|XPHB} and the {@item Herbalism Kit|XPHB}. If you already have one of these proficiencies, you gain proficiency with one other type of {@item Artisan's Tools|XPHB} of your choice (or with two other types if you have both).
          name: Tool Proficiency
          type: entries
        - entries:
            - When you brew a potion using the crafting rules in the {@book Dungeon Master's Guide|XDMG|6|Crafting Magic Items}, the amount of time required to craft it is halved.
          name: Potion Crafting
          type: entries
    - class_name: Artificer
      class_source: EFA
      subclass_name: Alchemist
      subclass_source: EFA
      feature: Alchemical Savant
      source: EFA
      level: 5
      entries:
        - Whenever you cast a spell using your {@item Alchemist's Supplies|XPHB} as the {@variantrule Spellcasting Focus|XPHB}, you gain a bonus to one roll of the spell. That roll must restore {@variantrule Hit Points|XPHB} or be a damage roll that deals Acid, Fire, or Poison damage. The bonus equals your Intelligence modifier (minimum bonus of +1).
    - class_name: Artificer
      class_source: EFA
      subclass_name: Alchemist
      subclass_source: EFA
      feature: Restorative Reagents
      source: EFA
      level: 9
      entries:
        - You can cast {@spell Lesser Restoration|XPHB} without expending a spell slot and without preparing the spell, provided you use {@item Alchemist's Supplies|XPHB} as the {@variantrule Spellcasting Focus|XPHB}. You can do so a number of times equal to your Intelligence modifier (minimum of once), and you regain all expended uses when you finish a {@variantrule Long Rest|XPHB}.
    - class_name: Artificer
      class_source: EFA
      subclass_name: Alchemist
      subclass_source: EFA
      feature: Chemical Mastery
      source: EFA
      level: 15
      entries:
        - You gain the following benefits.
        - entries:
            - When you cast an Artificer spell that deals Acid, Fire, or Poison damage to a target, you can also deal {@damage 2d8} Force damage to that target. You can use this benefit only once on each of your turns.
          name: Alchemical Eruption
          type: entries
        - entries:
            - You gain {@variantrule Resistance|XPHB} to Acid damage and Poison damage. You also gain {@variantrule Immunity|XPHB} to the {@condition Poisoned|XPHB} condition.
          name: Chemical Resistance
          type: entries
        - entries:
            - You can cast {@spell Tasha's Bubbling Cauldron|XPHB} without expending a spell slot, without preparing the spell, and without Material components, provided you use {@item Alchemist's Supplies|XPHB} as the {@variantrule Spellcasting Focus|XPHB}. Once you use this feature, you can't use it again until you finish a {@variantrule Long Rest|XPHB}.
          name: Conjured Cauldron
          type: entries
    - class_name: Artificer
      class_source: EFA
      subclass_name: Armorer
      subclass_source: EFA
      feature: Arcane Armor
      source: EFA
      level: 3
      entries:
        - As a {@action Magic|XPHB} action while you have {@item Smith's Tools|XPHB} in hand, you can turn a suit of armor you are wearing into Arcane Armor. The armor continues to be Arcane Armor until you don another suit of armor or you die.
        - You gain the following benefits while wearing your Arcane Armor.
        - entries:
            - If the armor normally has a Strength requirement, the Arcane Armor lacks this requirement for you.
          name: No Strength Requirement
          type: entries
        - entries:
            - You can don or doff the armor as a {@action Utilize|XPHB} action. The armor can't be removed against your will.
          name: Quick Don and Doff
          type: entries
        - entries:
            - You can use the Arcane Armor as a {@variantrule Spellcasting Focus|XPHB} for your Artificer spells.
          name: Spellcasting Focus
          type: entries
    - class_name: Artificer
      class_source: EFA
      subclass_name: Armorer
      subclass_source: EFA
      feature: Armor Model
      source: EFA
      level: 3
      entries:
        - 'You can customize your Arcane Armor. When you do so, choose one of the following armor models: {@subclassFeature Dreadnaught|Artificer|EFA|Armorer|EFA|3|EFA}, {@subclassFeature Guardian|Artificer|EFA|Armorer|EFA|3|EFA}, or {@subclassFeature Infiltrator|Artificer|EFA|Armorer|EFA|3|EFA}. The model you choose gives you special benefits while you wear it.'
        - Each model includes a special weapon. When you attack with that weapon, you can add your Intelligence modifier, instead of your Strength or Dexterity modifier, to the attack and damage rolls.
        - You can change the armor's model whenever you finish a {@variantrule Short Rest|XPHB|Short} or {@variantrule Long Rest|XPHB} if you have {@item Smith's Tools|XPHB} in hand.
        - subclassFeature: Dreadnaught|Artificer|EFA|Armorer|EFA|3|EFA
          type: refSubclassFeature
        - subclassFeature: Guardian|Artificer|EFA|Armorer|EFA|3|EFA
          type: refSubclassFeature
        - subclassFeature: Infiltrator|Artificer|EFA|Armorer|EFA|3|EFA
          type: refSubclassFeature
    - class_name: Artificer
      class_source: EFA
      subclass_name: Armorer
      subclass_source: EFA
      feature: Armorer
      source: EFA
      level: 3
      entries:
        - '{@i Craft Magic Armor to Enhance Your Abilities}'
        - An Armorer modifies armor to function almost like a second skin. The armor is enhanced to hone the Armorer's magic, unleash potent attacks, and generate a formidable defense.
        - subclassFeature: Tools of the Trade|Artificer|EFA|Armorer|EFA|3|EFA
          type: refSubclassFeature
        - subclassFeature: Armorer Spells|Artificer|EFA|Armorer|EFA|3|EFA
          type: refSubclassFeature
        - subclassFeature: Arcane Armor|Artificer|EFA|Armorer|EFA|3|EFA
          type: refSubclassFeature
        - subclassFeature: Armor Model|Artificer|EFA|Armorer|EFA|3|EFA
          type: refSubclassFeature
    - class_name: Artificer
      class_source: EFA
      subclass_name: Armorer
      subclass_source: EFA
      feature: Armorer Spells
      source: EFA
      level: 3
      entries:
        - When you reach an Artificer level specified in the Armorer Spells table, you thereafter always have the listed spells prepared.
        - caption: Armorer Spells
          colLabels:
            - Artificer Level
            - Spells
          colStyles:
            - col-3 text-center
            - col-9
          page: 15
          rows:
            - - "3"
              - '{@spell Magic Missile|XPHB}, {@spell Thunderwave|XPHB}'
            - - "5"
              - '{@spell Mirror Image|XPHB}, {@spell Shatter|XPHB}'
            - - "9"
              - '{@spell Hypnotic Pattern|XPHB}, {@spell Lightning Bolt|XPHB}'
            - - "13"
              - '{@spell Fire Shield|XPHB}, {@spell Greater Invisibility|XPHB}'
            - - "17"
              - '{@spell Passwall|XPHB}, {@spell Wall of Force|XPHB}'
          type: table
    - class_name: Artificer
      class_source: EFA
      subclass_name: Armorer
      subclass_source: EFA
      feature: Dreadnaught
      source: EFA
      level: 3
      entries:
        - 'You design your armor to become a towering juggernaut in battle. It has the following features:'
        - items:
            - entries:
                - An arcane wrecking ball or sledgehammer projects from your armor. The demolisher counts as a Simple Melee weapon with the {@itemProperty R|XPHB|Reach} property, and it deals {@damage 1d10} Force damage on a hit. If you hit a creature that is at least one size smaller than you with the demolisher, you can push the creature up to 10 feet straight away from yourself or pull the creature up to 10 feet toward yourself.
              name: Force Demolisher
              type: item
            - entries:
                - As a {@variantrule Bonus Action|XPHB}, you transform and enlarge your armor for 1 minute. For the duration, your reach increases by 5 feet, and if you are smaller than Large, you become Large, along with anything you are wearing. If there isn't enough room for you to increase your size, your size doesn't change. You can use this {@variantrule Bonus Action|XPHB} a number of times equal to your Intelligence modifier (minimum of once). You regain all expended uses when you finish a {@variantrule Long Rest|XPHB}.
              name: Giant Stature
              type: item
          style: list-hang-notitle
          type: list
    - class_name: Artificer
      class_source: EFA
      subclass_name: Armorer
      subclass_source: EFA
      feature: Guardian
      source: EFA
      level: 3
      entries:
        - 'You design your armor to be in the front line of conflict. It has the following features:'
        - entries:
            - You can discharge concussive blasts with strikes from your armor. The pulse counts as a Simple Melee weapon and deals {@damage 1d8} Thunder damage on a hit. A creature hit by the pulse has {@variantrule Disadvantage|XPHB} on attack rolls against targets other than you until the start of your next turn.
          name: Thunder Pulse
          type: item
        - entries:
            - While {@status Bloodied|XPHB}, you can take a {@variantrule Bonus Action|XPHB} to gain {@variantrule Temporary Hit Points|XPHB} equal to your Artificer level. You lose these {@variantrule Temporary Hit Points|XPHB} if you doff the armor.
          name: Defensive Field
          type: item
    - class_name: Artificer
      class_source: EFA
      subclass_name: Armorer
      subclass_source: EFA
      feature: Infiltrator
      source: EFA
      level: 3
      entries:
        - 'You customize your armor for subtler undertakings. It has the following features:'
        - items:
            - entries:
                - A gemlike node appears on your armor, from which you can shoot bolts of lightning. The launcher counts as a Simple Ranged weapon with a normal range of 90 feet and a long range of 300 feet, and it deals {@damage 1d6} Lightning damage on a hit. Once on each of your turns when you hit a creature with the launcher, you can deal an extra {@damage 1d6} Lightning damage to that target.
              name: Lightning Launcher
              type: item
            - entries:
                - Your {@variantrule Speed|XPHB} increases by 5 feet.
              name: Powered Steps
              type: item
            - entries:
                - You have {@variantrule Advantage|XPHB} on Dexterity ({@skill Stealth|XPHB}) checks. If the armor imposes {@variantrule Disadvantage|XPHB} on such checks, the {@variantrule Advantage|XPHB} and {@variantrule Disadvantage|XPHB} cancel each other, as normal.
              name: Dampening Field
              type: item
          style: list-hang-notitle
          type: list
    - class_name: Artificer
      class_source: EFA
      subclass_name: Armorer
      subclass_source: EFA
