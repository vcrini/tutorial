    - class_name: Druid
      class_source: XPHB
      feature: Epic Boon
      source: XPHB
      level: 19
      entries:
        - You gain an {@filter Epic Boon feat|feats|category=EB} or another {@5etools feat|feats.html} of your choice for which you qualify. {@feat Boon of Dimensional Travel|XPHB} is recommended.
    - class_name: Druid
      class_source: XPHB
      feature: Archdruid
      source: XPHB
      level: 20
      entries:
        - The vitality of nature constantly blooms within you, granting you the following benefits.
        - entries:
            - entries:
                - Whenever you roll {@variantrule Initiative|XPHB} and have no uses of Wild Shape left, you regain one expended use of it.
              name: Evergreen Wild Shape
              type: entries
            - entries:
                - You can convert uses of Wild Shape into a spell slot (no action required). Choose a number of your unexpended uses of Wild Shape and convert them into a single spell slot, with each use contributing 2 spell levels. For example, if you convert two uses of Wild Shape, you produce a level 4 spell slot. Once you use this benefit, you can't do so again until you finish a {@variantrule Long Rest|XPHB}.
