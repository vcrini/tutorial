    - class_name: Cleric
      class_source: XPHB
      subclass_name: Life
      subclass_source: XPHB
      feature: Preserve Life
      source: XPHB
      level: 3
      entries:
        - As a {@action Magic|XPHB} action, you present your {@item Holy Symbol|XPHB} and expend a use of your Channel Divinity to evoke healing energy that can restore a number of {@variantrule Hit Points|XPHB} equal to five times your Cleric level. Choose {@status Bloodied|XPHB} creatures within 30 feet of yourself (which can include you), and divide those {@variantrule Hit Points|XPHB} among them. This feature can restore a creature to no more than half its {@variantrule Hit Points|XPHB|Hit Point} maximum.
    - class_name: Cleric
      class_source: XPHB
      subclass_name: Life
      subclass_source: XPHB
      feature: Blessed Healer
      source: XPHB
      level: 6
      entries:
        - The healing spells you cast on others heal you as well. Immediately after you cast a spell with a spell slot that restores {@variantrule Hit Points|XPHB} to one creature other than you, you regain {@variantrule Hit Points|XPHB} equal to 2 plus the spell slot's level.
    - class_name: Cleric
      class_source: XPHB
      subclass_name: Life
      subclass_source: XPHB
      feature: Supreme Healing
      source: XPHB
      level: 17
      entries:
        - When you would normally roll one or more dice to restore {@variantrule Hit Points|XPHB} to a creature with a spell or Channel Divinity, don't roll those dice for the healing; instead use the highest number possible for each die. For example, instead of restoring {@dice 2d6} {@variantrule Hit Points|XPHB} to a creature with a spell, you restore 12.
