      class_source: XPHB
      subclass_name: Knowledge
      subclass_source: FRHoF
      feature: Knowledge Domain Spells
      source: FRHoF
      level: 3
      entries:
        - When you reach a Cleric level specified in the Knowledge Domain Spells table, you thereafter always have the listed spells prepared.
        - colLabels:
            - Cleric Level
            - Spells
          colStyles:
            - col-2 text-center
            - col-10
          footnotes:
