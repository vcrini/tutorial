    - class_name: Sorcerer
      class_source: XPHB
      subclass_name: Spellfire
      subclass_source: FRHoF
      feature: Bolstering Flames
      source: FRHoF
      level: 3
      entries:
        - You or one creature you can see within 30 feet of yourself gains {@variantrule Temporary Hit Points|XPHB} equal to {@dice 1d4} plus your Charisma modifier.
    - class_name: Sorcerer
      class_source: XPHB
      subclass_name: Spellfire
      subclass_source: FRHoF
      feature: Radiant Fire
      source: FRHoF
      level: 3
      entries:
        - One creature you can see within 30 feet of yourself takes {@damage 1d4} Fire or Radiant damage (your choice).
    - class_name: Sorcerer
      class_source: XPHB
      subclass_name: Spellfire
      subclass_source: FRHoF
      feature: Spellfire Burst
      source: FRHoF
      level: 3
      entries:
        - When you spend at least 1 Sorcery Point as part of the {@action Magic|XPHB} action or a {@variantrule Bonus Action|XPHB} on your turn, you can unleash one of the following magical effects of your choice. You can do so only once per turn.
        - subclassFeature: Bolstering Flames|Sorcerer|XPHB|Spellfire|FRHoF|3|FRHoF
          type: refSubclassFeature
        - subclassFeature: Radiant Fire|Sorcerer|XPHB|Spellfire|FRHoF|3|FRHoF
          type: refSubclassFeature
    - class_name: Sorcerer
      class_source: XPHB
      subclass_name: Spellfire
      subclass_source: FRHoF
      feature: Spellfire Sorcery
      source: FRHoF
      level: 3
      entries:
        - '{@i Wield Raw Magic}'
        - 'Your innate power stems from the source of magic itself: the Weave. This connection manifests as a rare ability known as spellfire, and you surge with radiant bursts of this raw magic. Your talent with spellfire allows you to heal allies, sear enemies, and absorb powerful spells.'
        - Wielders of spellfire tend to have a penchant for wandering. Many travel between cosmopolitan settlements, such as those along the Sword Coast, and wield their magic in service of the common good. Others realize their own strange powers by roaming equally strange lands, from the magic-blasted wastes of the desert of Anauroch to the god-touched wilds of the Old Empires. Wherever they go in the Realms, spellfire Sorcerers are courted by factions with interests in the arcane arts, such as the Harpers, Cult of the Dragon, and Red Wizards.
        - subclassFeature: Spellfire Burst|Sorcerer|XPHB|Spellfire|FRHoF|3|FRHoF
          type: refSubclassFeature
        - subclassFeature: Spellfire Spells|Sorcerer|XPHB|Spellfire|FRHoF|3|FRHoF
          type: refSubclassFeature
    - class_name: Sorcerer
      class_source: XPHB
      subclass_name: Spellfire
      subclass_source: FRHoF
      feature: Spellfire Spells
      source: FRHoF
      level: 3
      entries:
        - When you reach a Sorcerer level specified in the Spellfire Spells table, you thereafter always have the listed spells prepared.
        - colLabels:
            - Sorcerer Level
            - Spells
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - "3"
              - '{@spell Cure Wounds|XPHB}, {@spell Guiding Bolt|XPHB}, {@spell Lesser Restoration|XPHB}, {@spell Scorching Ray|XPHB}'
            - - "5"
              - '{@spell Aura of Vitality|XPHB}, {@spell Dispel Magic|XPHB}'
            - - "7"
              - '{@spell Fire Shield|XPHB}, {@spell Wall of Fire|XPHB}'
            - - "9"
              - '{@spell Greater Restoration|XPHB}, {@spell Flame Strike|XPHB}'
          type: table
    - class_name: Sorcerer
      class_source: XPHB
      subclass_name: Spellfire
      subclass_source: FRHoF
      feature: Absorb Spells
      source: FRHoF
      level: 6
      entries:
        - You always have {@spell Counterspell|XPHB} prepared.
        - Additionally, whenever a target fails the saving throw against a {@spell Counterspell|XPHB} you cast, you regain {@dice 1d4} Sorcery Points.
    - class_name: Sorcerer
      class_source: XPHB
      subclass_name: Spellfire
      subclass_source: FRHoF
      feature: Honed Spellfire
      source: FRHoF
      level: 14
      entries:
        - Your {@subclassFeature Spellfire Burst|Sorcerer|XPHB|Spellfire|FRHoF|3|FRHoF} improves. You add your {@class Sorcerer|XPHB} level to the {@variantrule Temporary Hit Points|XPHB} gained from {@subclassFeature Bolstering Flames|Sorcerer|XPHB|Spellfire|FRHoF|3|FRHoF}, and the damage of {@subclassFeature Radiant Fire|Sorcerer|XPHB|Spellfire|FRHoF|3|FRHoF} increases to {@dice 1d8}.
    - class_name: Sorcerer
      class_source: XPHB
      subclass_name: Spellfire
      subclass_source: FRHoF
      feature: Crown of Spellfire
      source: FRHoF
      level: 18
      entries:
        - When you use {@classFeature Innate Sorcery|Sorcerer|XPHB|1}, you can alter it and infuse yourself with the essence of spellfire, gaining the following benefits while this use of Innate Sorcery is active. Once you use this feature to alter Innate Sorcery, you can't use it again until you finish a {@variantrule Long Rest|XPHB} unless you spend 5 Sorcery Points (no action required) to restore your use of it.
        - entries:
            - Once per turn when you are hit by an attack roll, you can expend a number of {@variantrule Hit Point Dice|XPHB}, up to a maximum equal to your Charisma modifier (minimum of one). Roll the expended dice, and reduce the amount of damage from that attack equal to the total rolled.
          name: Burning Life Force
          page: 8
          type: entries
        - entries:
            - You gain a {@variantrule Fly Speed|XPHB} of 60 feet and can hover.
          name: Flight
          page: 8
          type: entries
        - entries:
            - When you're subjected to a spell or magical effect that allows you to make a saving throw to take only half damage, you instead take no damage if you succeed on the saving throw and only half damage if you fail. You can't use this benefit if you have the {@condition Incapacitated|XPHB} condition.
          name: Spell Avoidance
          page: 8
          type: entries
    - class_name: Sorcerer
      class_source: XPHB
      subclass_name: Storm
      subclass_source: XGE
      feature: Storm Sorcery
      source: XGE
      level: 3
    - class_name: Sorcerer
      class_source: XPHB
      subclass_name: Wild Magic
      subclass_source: XPHB
      feature: Tides of Chaos
      source: XPHB
      level: 3
      entries:
        - You can manipulate chaos itself to give yourself {@variantrule Advantage|XPHB} on one {@variantrule D20 Test|XPHB} before you roll the {@dice d20}. Once you do so, you must cast a Sorcerer spell with a spell slot or finish a {@variantrule Long Rest|XPHB} before you can use this feature again.
        - If you do cast a Sorcerer spell with a spell slot before you finish a {@variantrule Long Rest|XPHB}, you automatically roll on the {@table Wild Magic Surge|XPHB} table.
    - class_name: Sorcerer
      class_source: XPHB
      subclass_name: Wild Magic
      subclass_source: XPHB
      feature: Wild Magic Sorcery
      source: XPHB
      level: 3
      entries:
        - '{@i Unleash Chaotic Magic}'
        - Your innate magic stems from the forces of chaos that underlie the order of creation. You or an ancestor might have endured exposure to raw magic, perhaps through a planar portal leading to Limbo or the Elemental Planes. Perhaps you were blessed by a fey being or marked by a demon. Or your magic could be a fluke with no apparent cause. Whatever its source, this magic churns within you, waiting for any outlet.
        - subclassFeature: Wild Magic Surge|Sorcerer|XPHB|Wild Magic|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Tides of Chaos|Sorcerer|XPHB|Wild Magic|XPHB|3
          type: refSubclassFeature
    - class_name: Sorcerer
      class_source: XPHB
      subclass_name: Wild Magic
      subclass_source: XPHB
      feature: Wild Magic Surge
      source: XPHB
      level: 3
      entries:
        - Your spellcasting can unleash surges of untamed magic. Once per turn, you can roll {@dice 1d20} immediately after you cast a Sorcerer spell with a spell slot. If you roll a 20, roll on the Wild Magic Surge table to create a magical effect.
        - If the magical effect is a spell, it is too wild to be affected by your Metamagic.
        - caption: Wild Magic Surge
          colLabels:
            - '{@dice 1d100}'
            - Effect
          colStyles:
            - col-1 text-center
            - col-11
          data:
            genTables:
                tableInclude: true
          rows:
            - - 01–04
              - Roll on this table at the start of each of your turns for the next minute, ignoring this result on subsequent rolls.
            - - 05–08
              - 'A creature that is Friendly toward you appears in a random unoccupied space within 60 feet of you. The creature is under the DM''s control and disappears 1 minute later. Roll {@dice 1d4} to determine the creature: on a 1, a Modron Duodrone appears; on a 2, a Flumph appears; on a 3, a Modron Monodrone appears; on a 4, a Unicorn appears. See the Monster Manual for the creature''s stat block.'
            - - 09–12
              - For the next minute, you regain 5 {@variantrule Hit Points|XPHB} at the start of each of your turns.
            - - 13–16
              - Creatures have {@variantrule Disadvantage|XPHB} on saving throws against the next spell you cast in the next minute that involves a saving throw.
            - - 17–20
              - 'You are subjected to an effect that lasts for 1 minute unless its description says otherwise. Roll {@dice 1d8} to determine the effect: on a 1, you''re surrounded by faint, ethereal music only you and creatures within 5 feet of you can hear; on a 2, your size increases by one size category; on a 3, you grow a long beard made of feathers that remains until you sneeze, at which point the feathers explode from your face and vanish; on a 4, you must shout when you speak; on a 5, illusory butterflies flutter in the air within 10 feet of you; on a 6, an eye appears on your forehead, granting you {@variantrule Advantage|XPHB} on Wisdom ({@skill Perception|XPHB}) checks; on an 7, pink bubbles float out of your mouth whenever you speak; on an 8, your skin turns a vibrant shade of blue for 24 hours or until the effect is ended by a {@spell Remove Curse|XPHB} spell.'
            - - 21–24
              - For the next minute, all your spells with a casting time of an action have a casting time of a {@variantrule Bonus Action|XPHB}.
            - - 25–28
              - You are transported to the Astral Plane until the end of your next turn. You then return to the space you previously occupied or the nearest unoccupied space if that space is occupied.
            - - 29–32
              - The next time you cast a spell that deals damage within the next minute, don't roll the spell's damage dice for the damage. Instead use the highest number possible for each damage die.
            - - 33–36
              - You have {@variantrule Resistance|XPHB} to all damage for the next minute.
            - - 37–40
              - You turn into a potted plant until the start of your next turn. While you're a plant, you have the {@condition Incapacitated|XPHB} condition and have {@variantrule Vulnerability|XPHB} to all damage. If you drop to 0 {@variantrule Hit Points|XPHB}, your pot breaks, and your form reverts.
            - - 41–44
              - For the next minute, you can teleport up to 20 feet as a {@variantrule Bonus Action|XPHB} on each of your turns.
            - - 45–48
              - You and up to three creatures you choose within 30 feet of you have the {@condition Invisible|XPHB} condition for 1 minute. This invisibility ends on a creature immediately after it makes an attack roll, deals damage, or casts a spell.
            - - 49–52
              - A spectral shield hovers near you for the next minute, granting you a +2 bonus to AC and immunity to {@spell Magic Missile|XPHB}.
            - - 53–56
              - You can take one extra action on this turn.
            - - 57–60
              - 'You cast a random spell. If the spell normally requires {@status Concentration|XPHB}, it doesn''t require {@status Concentration|XPHB} in this case; the spell lasts for its full duration. Roll {@dice 1d10} to determine the spell: on a 1, {@spell Confusion|XPHB}; on a 2, {@spell Fireball|XPHB}; on a 3, {@spell Fog Cloud|XPHB}; on a 4, {@spell Fly|XPHB} (cast on a random creature within 60 feet of you), on a 5, {@spell Grease|XPHB}; on a 6, {@spell Levitate|XPHB} (cast on yourself); on a 7, {@spell Magic Missile|XPHB} (cast as a level 5 spell); on an 8, {@spell Mirror Image|XPHB}; on a 9, {@spell Polymorph|XPHB} (cast on yourself), and if you fail the saving throw, you turn into a Goat (see appendix B); on a 10, {@spell See Invisibility|XPHB}.'
            - - 61–64
              - For the next minute, any flammable, nonmagical object you touch that isn't being worn or carried by another creature bursts into flame, takes {@damage 1d4} Fire damage, and is burning.
            - - 65–68
              - If you die within the next hour, you immediately revive as if by the {@spell Reincarnate|XPHB} spell.
            - - 69–72
              - You have the {@condition Frightened|XPHB} condition until the end of your next turn. The DM determines the source of your fear.
            - - 73–76
              - You teleport up to 60 feet to an unoccupied space you can see.
            - - 77–80
              - A random creature within 60 feet of you has the {@condition Poisoned|XPHB} condition for {@dice 1d4} hours.
            - - 81–84
              - You radiate {@variantrule Bright Light|XPHB} in a 30-foot radius for the next minute. Any creature that ends its turn within 5 feet of you has the {@condition Blinded|XPHB} condition until the end of its next turn.
            - - 85–88
              - Up to three creatures of your choice that you can see within 30 feet of you take {@damage 1d10} Necrotic damage. You regain {@variantrule Hit Points|XPHB} equal to the sum of the Necrotic damage dealt.
            - - 89–92
              - Up to three creatures of your choice that you can see within 30 feet of you take {@damage 4d10} Lightning damage.
            - - 93–96
              - You and all creatures within 30 feet of you have {@variantrule Vulnerability|XPHB} to Piercing damage for the next minute.
            - - 97–00
              - Roll {@dice 1d6} On a 1, you regain {@dice 2d10} {@variantrule Hit Points|XPHB}; on a 2, one ally of your choice within 300 feet of you regains {@dice 2d10} {@variantrule Hit Points|XPHB}; on a 3, you regain your lowest-level expended spell slot; on a 4, one ally of your choice within 300 feet of you regains their lowest-level expended spell slot; on a 5, you regain all your expended Sorcery Points; on a 6, all the effects of row 17–20 affect you simultaneously.
          type: table
    - class_name: Sorcerer
      class_source: XPHB
      subclass_name: Wild Magic
      subclass_source: XPHB
      feature: Bend Luck
      source: XPHB
      level: 6
      entries:
        - You have the ability to twist fate using your wild magic. Immediately after another creature you can see rolls the {@dice d20} for a {@variantrule D20 Test|XPHB}, you can take a {@variantrule Reaction|XPHB} and spend 1 Sorcery Point to roll {@dice 1d4} and apply the number rolled as a bonus or penalty (your choice) to the {@dice d20} roll.
    - class_name: Sorcerer
      class_source: XPHB
      subclass_name: Wild Magic
      subclass_source: XPHB
      feature: Controlled Chaos
      source: XPHB
      level: 14
      entries:
        - You gain a modicum of control over the surges of your wild magic. Whenever you roll on the Wild Magic Surge table, you can roll twice and use either number.
    - class_name: Sorcerer
      class_source: XPHB
      subclass_name: Wild Magic
      subclass_source: XPHB
      feature: Tamed Surge
      source: XPHB
      level: 18
      entries:
        - Immediately after you cast a Sorcerer spell with a spell slot, you can create an effect of your choice from the {@table Wild Magic Surge|XPHB} table instead of rolling on that table. You can choose any effect in the table except for the final row, and if the chosen effect involves a roll, you must make it.
        - Once you use this feature, you can't do so again until you finish a {@variantrule Long Rest|XPHB}.
    - class_name: Sorcerer
      class_source: XPHB
      subclass_name: Wild
      subclass_source: PHB
      feature: Wild Magic
      source: PHB
      level: 3
    - class_name: Warlock
      class_source: PHB
      subclass_name: Archfey
      subclass_source: PHB
      feature: Fey Presence
      source: PHB
      level: 1
      entries:
        - Starting at 1st level, your patron bestows upon you the ability to project the beguiling and fearsome presence of the fey. As an action, you can cause each creature in a 10-foot cube originating from you to make a Wisdom saving throw against your warlock spell save DC. The creatures that fail their saving throws are all {@condition charmed} or {@condition frightened} by you (your choice) until the end of your next turn.
        - Once you use this feature, you can't use it again until you finish a short or long rest.
    - class_name: Warlock
      class_source: PHB
      subclass_name: Archfey
      subclass_source: PHB
      feature: The Archfey
      source: PHB
      level: 1
      entries:
        - Your patron is a lord or lady of the fey, a creature of legend who holds secrets that were forgotten before the mortal races were born. This being's motivations are often inscrutable, and sometimes whimsical, and might involve a striving for greater magical power or the settling of age-old grudges. Beings of this sort include the Prince of Frost; the Queen of Air and Darkness, ruler of the Gloaming Court; Titania of the Summer Court; her consort Oberon, the Green Lord; Hyrsam, the Prince of Fools; and ancient hags.
        - entries:
            - The Archfey lets you choose from an expanded list of spells when you learn a warlock spell. The following spells are added to the warlock spell list for you.
            - caption: Archfey Expanded Spells
              colLabels:
                - Spell Level
                - Spells
              colStyles:
                - col-2 text-center
                - col-10
              rows:
                - - 1st
                  - '{@spell faerie fire}, {@spell sleep}'
                - - 2nd
                  - '{@spell calm emotions}, {@spell phantasmal force}'
                - - 3rd
                  - '{@spell blink}, {@spell plant growth}'
                - - 4th
                  - '{@spell dominate beast}, {@spell greater invisibility}'
                - - 5th
                  - '{@spell dominate person}, {@spell seeming}'
              type: table
          name: Expanded Spell List
          type: entries
        - subclassFeature: Fey Presence|Warlock||Archfey||1
          type: refSubclassFeature
    - class_name: Warlock
      class_source: PHB
      subclass_name: Archfey
      subclass_source: PHB
      feature: Misty Escape
      source: PHB
      level: 6
      entries:
        - Starting at 6th level, you can vanish in a puff of mist in response to harm. When you take damage, you can use your reaction to turn {@condition invisible} and teleport up to 60 feet to an unoccupied space you can see. You remain {@condition invisible} until the start of your next turn or until you attack or cast a spell.
        - Once you use this feature, you can't use it again until you finish a short or long rest.
    - class_name: Warlock
      class_source: PHB
      subclass_name: Archfey
      subclass_source: PHB
      feature: Beguiling Defenses
      source: PHB
      level: 10
      entries:
        - Beginning at 10th level, your patron teaches you how to turn the mind-affecting magic of your enemies against them. You are immune to being {@condition charmed}, and when another creature attempts to charm you, you can use your reaction to attempt to turn the charm back on that creature. The creature must succeed on a Wisdom saving throw against your warlock spell save DC or be {@condition charmed} by you for 1 minute or until the creature takes any damage.
    - class_name: Warlock
      class_source: PHB
      subclass_name: Archfey
      subclass_source: PHB
      feature: Dark Delirium
      source: PHB
      level: 14
      entries:
        - Starting at 14th level, you can plunge a creature into an illusory realm. As an action, choose a creature that you can see within 60 feet of you. It must make a Wisdom saving throw against your warlock spell save DC. On a failed save, it is {@condition charmed} or {@condition frightened} by you (your choice) for 1 minute or until your {@status concentration} is broken (as if you are {@status concentration||concentrating} on a spell). This effect ends early if the creature takes any damage.
        - Until this illusion ends, the creature thinks it is lost in a misty realm, the appearance of which you choose. The creature can see and hear only itself, you, and the illusion.
        - You must finish a short or long rest before you can use this feature again.
    - class_name: Warlock
      class_source: PHB
      subclass_name: Celestial
      subclass_source: XGE
      feature: Bonus Cantrips
      source: XGE
      level: 1
      entries:
        - At 1st level, you learn the {@spell sacred flame} and {@spell light} cantrips. They count as warlock cantrips for you, but they don't count against your number of cantrips known.
    - class_name: Warlock
      class_source: PHB
      subclass_name: Celestial
      subclass_source: XGE
      feature: Healing Light
      source: XGE
      level: 1
      entries:
        - At 1st level, you gain the ability to channel celestial energy to heal wounds. You have a pool of {@dice d6}s that you spend to fuel this healing. The number of dice in the pool equals 1 + your warlock level.
        - As a bonus action, you can heal one creature you can see within 60 feet of you, spending dice from the pool. The maximum number of dice you can spend at once equals your Charisma modifier (minimum of one die). Roll the dice you spend, add them together, and restore a number of hit points equal to the total.
        - Your pool regains all expended dice when you finish a long rest.
    - class_name: Warlock
      class_source: PHB
      subclass_name: Celestial
      subclass_source: XGE
      feature: The Celestial
      source: XGE
      level: 1
      entries:
        - Your patron is a powerful being of the Upper Planes. You have bound yourself to an ancient empyrean, solar, ki-rin, unicorn, or other entity that resides in the planes of everlasting bliss. Your pact with that being allows you to experience the barest touch of the holy light that illuminates the multiverse.
        - Being connected to such power can cause changes in your behavior and beliefs. You might find yourself driven to annihilate the undead, to defeat fiends, and to protect the innocent. At times, your heart might also be filled with a longing for the celestial realm of your patron, and a desire to wander that paradise for the rest of your days. But you know that your mission is among mortals for now, and that your pact binds you to bring light to the dark places of the world.
        - entries:
            - The Celestial lets you choose from an expanded list of spells when you learn a warlock spell. The following spells are added to the warlock spell list for you.
            - caption: Celestial Expanded Spells
              colLabels:
                - Spell Level
                - Spells
              colStyles:
                - col-2 text-center
                - col-10
              rows:
                - - 1st
                  - '{@spell cure wounds}, {@spell guiding bolt}'
                - - 2nd
                  - '{@spell flaming sphere}, {@spell lesser restoration}'
                - - 3rd
                  - '{@spell daylight}, {@spell revivify}'
                - - 4th
                  - '{@spell guardian of faith}, {@spell wall of fire}'
                - - 5th
                  - '{@spell flame strike}, {@spell greater restoration}'
              type: table
          name: Expanded Spell List
          type: entries
        - subclassFeature: Bonus Cantrips|Warlock||Celestial|XGE|1
          type: refSubclassFeature
        - subclassFeature: Healing Light|Warlock||Celestial|XGE|1
          type: refSubclassFeature
    - class_name: Warlock
      class_source: PHB
      subclass_name: Celestial
      subclass_source: XGE
      feature: Radiant Soul
      source: XGE
      level: 6
      entries:
        - Starting at 6th level, your link to the Celestial allows you to serve as a conduit for radiant energy. You have resistance to radiant damage, and when you cast a spell that deals radiant or fire damage, you can add your Charisma modifier to one radiant or fire damage roll of that spell against one of its targets.
    - class_name: Warlock
      class_source: PHB
      subclass_name: Celestial
      subclass_source: XGE
      feature: Celestial Resilience
      source: XGE
      level: 10
      entries:
        - Starting at 10th level, you gain temporary hit points whenever you finish a short or long rest. These temporary hit points equal your warlock level + your Charisma modifier. Additionally, choose up to five creatures you can see at the end of the rest. Those creatures each gain temporary hit points equal to half your warlock level + your Charisma modifier.
    - class_name: Warlock
      class_source: PHB
      subclass_name: Celestial
      subclass_source: XGE
      feature: Searing Vengeance
      source: XGE
      level: 14
      entries:
        - Starting at 14th level, the radiant energy you channel allows you to resist death. When you have to make a death saving throw at the start of your turn, you can instead spring back to your feet with a burst of radiant energy. You regain hit points equal to half your hit point maximum, and then you stand up if you so choose. Each creature of your choice that is within 30 feet of you takes radiant damage equal to {@dice 2d8} + your Charisma modifier, and it is {@condition blinded} until the end of the current turn.
        - Once you use this feature, you can't use it again until you finish a long rest.
    - class_name: Warlock
      class_source: PHB
      subclass_name: Fathomless
      subclass_source: TCE
      feature: Gift of the Sea
      source: TCE
      level: 1
      entries:
        - '{@i 1st-level Fathomless feature}'
        - You gain a swimming speed of 40 feet, and you can breathe underwater.
    - class_name: Warlock
      class_source: PHB
      subclass_name: Fathomless
      subclass_source: TCE
      feature: Tentacle of the Deeps
      source: TCE
      level: 1
      entries:
        - '{@i 1st-level Fathomless feature}'
        - You can magically summon a spectral tentacle that strikes at your foes. As a bonus action, you create a 10-foot-long tentacle at a point you can see within 60 feet of you. The tentacle lasts for 1 minute or until you use this feature to create another tentacle.
        - When you create the tentacle, you can make a melee spell attack against one creature within 10 feet of it. On a hit, the target takes {@damage 1d8} cold damage, and its speed is reduced by 10 feet until the start of your next turn. When you reach 10th level in this class, the damage increases to {@damage 2d8}.
        - As a bonus action on your turn, you can move the tentacle up to 30 feet and repeat the attack.
        - You can summon the tentacle a number of times equal to your proficiency bonus, and you regain all expended uses when you finish a long rest.
    - class_name: Warlock
      class_source: PHB
      subclass_name: Fathomless
      subclass_source: TCE
      feature: The Fathomless
      source: TCE
      level: 1
      entries:
        - You have plunged into a pact with the deeps. An entity of the ocean, the Elemental Plane of Water, or another otherworldly sea now allows you to draw on its thalassic power. Is it merely using you to learn about terrestrial realms, or does it want you to open cosmic floodgates and drown the world?
        - Perhaps you were born into a generational cult that venerates the Fathomless and its spawn. Or you might have been shipwrecked and on the brink of drowning when your patron's grasp offered you a chance at life. Whatever the reason for your pact, the sea and its unknown depths call to you.
        - Entities of the deep that might empower a warlock include krakens, ancient water elementals, godlike hallucinations dreamed into being by kuo-toa, merfolk demigods, and sea hag covens.
        - entries:
            - '{@i 1st-level Fathomless feature}'
            - The Fathomless lets you choose from an expanded list of spells when you learn a warlock spell. The following spells are added to the warlock spell list for you.
            - caption: Fathomless Expanded Spells
              colLabels:
                - Spell Level
                - Spells
              colStyles:
                - col-2 text-center
                - col-10
              rows:
                - - 1st
                  - '{@spell create or destroy water}, {@spell thunderwave}'
                - - 2nd
                  - '{@spell gust of wind}, {@spell silence}'
                - - 3rd
                  - '{@spell lightning bolt}, {@spell sleet storm}'
                - - 4th
                  - '{@spell control water}, {@spell summon elemental|tce} (water only)'
                - - 5th
                  - '{@spell Bigby''s hand} (appears as a tentacle), {@spell cone of cold}'
              type: table
          name: Expanded Spell List
          type: entries
        - subclassFeature: Tentacle of the Deeps|Warlock||Fathomless|TCE|1
          type: refSubclassFeature
        - subclassFeature: Gift of the Sea|Warlock||Fathomless|TCE|1
          type: refSubclassFeature
    - class_name: Warlock
      class_source: PHB
      subclass_name: Fathomless
      subclass_source: TCE
      feature: Guardian Coil
      source: TCE
      level: 6
      entries:
        - '{@i 6th-level Fathomless feature}'
        - Your Tentacle of the Deeps can defend you and others, interposing itself between them and harm. When you or a creature you can see takes damage while within 10 feet of the tentacle, you can use your reaction to choose one of those creatures and reduce the damage to that creature by {@dice 1d8}. When you reach 10th level in this class, the damage reduced by the tentacle increases to {@dice 2d8}.
    - class_name: Warlock
      class_source: PHB
      subclass_name: Fathomless
      subclass_source: TCE
      feature: Oceanic Soul
      source: TCE
      level: 6
      entries:
        - '{@i 6th-level Fathomless feature}'
        - You are now even more at home in the depths. You gain resistance to cold damage. In addition, when you are fully submerged, any creature that is also fully submerged can understand your speech, and you can understand theirs.
    - class_name: Warlock
      class_source: PHB
      subclass_name: Fathomless
      subclass_source: TCE
      feature: Grasping Tentacles
      source: TCE
      level: 10
      entries:
        - '{@i 10th-level Fathomless feature}'
        - You learn the spell {@spell Evard's black tentacles}. It counts as a warlock spell for you, but it doesn't count against the number of spells you know. You can also cast it once without a spell slot, and you regain the ability to do so when you finish a long rest.
        - Whenever you cast this spell, your patron's magic bolsters you, granting you a number of temporary hit points equal to your warlock level. Moreover, damage can't break your {@status concentration} on this spell.
    - class_name: Warlock
      class_source: PHB
      subclass_name: Fathomless
      subclass_source: TCE
      feature: Fathomless Plunge
      source: TCE
      level: 14
      entries:
        - '{@i 14th-level Fathomless feature}'
        - You can magically open temporary conduits to watery destinations. As an action, you can teleport yourself and up to five other willing creatures that you can see within 30 feet of you. Amid a whirl of tentacles, you all vanish and then reappear up to 1 mile away in a body of water you've seen (pond size or larger) or within 30 feet of it, each of you appearing in an unoccupied space within 30 feet of the others.
        - Once you use this feature, you can't use it again until you finish a short or long rest.
    - class_name: Warlock
      class_source: PHB
      subclass_name: Fiend
      subclass_source: PHB
      feature: Dark One's Blessing
      source: PHB
      level: 1
      entries:
        - Starting at 1st level, when you reduce a hostile creature to 0 hit points, you gain temporary hit points equal to your Charisma modifier + your warlock level (minimum of 1).
    - class_name: Warlock
      class_source: PHB
      subclass_name: Fiend
      subclass_source: PHB
      feature: The Fiend
      source: PHB
      level: 1
      entries:
        - You have made a pact with a fiend from the lower planes of existence, a being whose aims are evil, even if you strive against those aims. Such beings desire the corruption or destruction of all things, ultimately including you. Fiends powerful enough to forge a pact include demon lords such as Demogorgon, Orcus, Fraz-Urb'luu, and Baphomet; archdevils such as Asmodeus, Dispater, Mephistopheles, and Belial; pit fiends and balors that are especially mighty; and ultroloths and other lords of the yugoloths.
        - entries:
            - The Fiend lets you choose from an expanded list of spells when you learn a warlock spell. The following spells are added to the warlock spell list for you.
            - caption: Fiend Expanded Spells
              colLabels:
                - Spell Level
                - Spells
              colStyles:
                - col-2 text-center
                - col-10
              rows:
                - - 1st
                  - '{@spell burning hands}, {@spell command}'
                - - 2nd
                  - '{@spell blindness/deafness}, {@spell scorching ray}'
                - - 3rd
                  - '{@spell fireball}, {@spell stinking cloud}'
                - - 4th
                  - '{@spell fire shield}, {@spell wall of fire}'
                - - 5th
                  - '{@spell flame strike}, {@spell hallow}'
              type: table
          name: Expanded Spell List
          type: entries
        - subclassFeature: Dark One's Blessing|Warlock||Fiend||1
          type: refSubclassFeature
    - class_name: Warlock
      class_source: PHB
      subclass_name: Fiend
      subclass_source: PHB
      feature: Dark One's Own Luck
      source: PHB
      level: 6
      entries:
        - Starting at 6th level, you can call on your patron to alter fate in your favor. When you make an ability check or a saving throw, you can use this feature to add a {@dice d10} to your roll. You can do so after seeing the initial roll but before any of the roll's effects occur.
        - Once you use this feature, you can't use it again until you finish a short or long rest.
    - class_name: Warlock
      class_source: PHB
      subclass_name: Fiend
      subclass_source: PHB
      feature: Fiendish Resilience
      source: PHB
      level: 10
      entries:
        - Starting at 10th level, you can choose one damage type when you finish a short or long rest. You gain resistance to that damage type until you choose a different one with this feature. Damage from magical weapons or silver weapons ignores this resistance.
    - class_name: Warlock
      class_source: PHB
      subclass_name: Fiend
      subclass_source: PHB
      feature: Hurl Through Hell
      source: PHB
      level: 14
      entries:
        - Starting at 14th level, when you hit a creature with an attack, you can use this feature to instantly transport the target through the lower planes. The creature disappears and hurtles through a nightmare landscape.
        - At the end of your next turn, the target returns to the space it previously occupied, or the nearest unoccupied space. If the target is not a fiend, it takes {@damage 10d10} psychic damage as it reels from its horrific experience.
        - Once you use this feature, you can't use it again until you finish a long rest.
    - class_name: Warlock
      class_source: PHB
      subclass_name: Genie
      subclass_source: TCE
      feature: Bottled Respite
      source: TCE
      level: 1
      entries:
        - As an action, you can magically vanish and enter your vessel, which remains in the space you left. The interior of the vessel is an extradimensional space in the shape of a 20-foot-radius cylinder, 20 feet high, and resembles your vessel. The interior is appointed with cushions and low tables and is a comfortable temperature. While inside, you can hear the area around your vessel as if you were in its space. You can remain inside the vessel up to a number of hours equal to twice your proficiency bonus. You exit the vessel early if you use a bonus action to leave, if you die, or if the vessel is destroyed. When you exit the vessel, you appear in the unoccupied space closest to it. Any objects left in the vessel remain there until carried out, and if the vessel is destroyed, every object stored there harmlessly appears in the unoccupied spaces closest to the vessel's former space. Once you enter the vessel, you can't enter again until you finish a long rest.
    - class_name: Warlock
      class_source: PHB
      subclass_name: Genie
      subclass_source: TCE
      feature: Genie's Vessel
      source: TCE
      level: 1
      entries:
        - '{@i 1st-level Genie feature}'
        - Your patron gifts you a magical vessel that grants you a measure of the genie's power. The vessel is a Tiny object, and you can use it as a spellcasting focus for your warlock spells. You decide what the object is, or you can determine what it is randomly by rolling on the Genie's Vessel table.
        - caption: Genie's Vessel
          colLabels:
            - d6
            - Vessel
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - "1"
              - Oil lamp
            - - "2"
              - Urn
            - - "3"
              - Ring with a compartment
            - - "4"
              - Stoppered bottle
            - - "5"
              - Hollow statuette
            - - "6"
              - Ornate lantern
          type: table
        - 'While you are touching the vessel, you can use it in the following ways:'
        - entries:
            - subclassFeature: Bottled Respite|Warlock|PHB|Genie|TCE|1
              type: refSubclassFeature
            - subclassFeature: Genie's Wrath|Warlock|PHB|Genie|TCE|1
              type: refSubclassFeature
          style: list-hang-notitle
          type: options
        - The vessel's AC equals your spell save DC. Its hit points equal your warlock level plus your proficiency bonus, and it is immune to poison and psychic damage.
        - If the vessel is destroyed or you lose it, you can perform a 1-hour ceremony to receive a replacement from your patron. This ceremony can be performed during a short or long rest, and the previous vessel is destroyed if it still exists. The vessel vanishes in a flare of elemental power when you die.
    - class_name: Warlock
      class_source: PHB
      subclass_name: Genie
      subclass_source: TCE
      feature: Genie's Wrath
      source: TCE
      level: 1
      entries:
        - 'Once during each of your turns when you hit with an attack roll, you can deal extra damage to the target equal to your proficiency bonus. The type of this damage is determined by your patron: bludgeoning (dao), thunder (djinni), fire (efreeti), or cold (marid).'
    - class_name: Warlock
      class_source: PHB
      subclass_name: Genie
      subclass_source: TCE
      feature: The Genie
      source: TCE
      level: 1
      entries:
        - You have made a pact with one of the rarest kinds of genie, a noble genie. Such entities rule vast fiefs on the Elemental Planes and have great influence over lesser genies and elemental creatures. Noble genies are varied in their motivations, but most are arrogant and wield power that rivals that of lesser deities. They delight in turning the table on mortals, who often bind genies into servitude, and readily enter into pacts that expand their reach.
        - You choose your patron's kind or determine it randomly, using the Genie Kind table.
        - caption: Genie Kind
          colLabels:
            - d4
            - Kind
            - Element
          colStyles:
            - col-2 text-center
            - col-5
            - col-5
          rows:
            - - 1
              - '{@creature Dao}'
              - Earth
            - - 2
              - '{@creature Djinni}'
              - Air
            - - 3
              - '{@creature Efreeti}'
              - Fire
            - - 4
              - '{@creature Marid}'
              - Water
          type: table
        - entries:
            - '{@i 1st-level Genie feature}'
            - 'The Genie lets you choose from an expanded list of spells when you learn a warlock spell. The Genie Expanded Spells table shows the genie spells that are added to the warlock spell list for you, along with the spells associated in the table with your patron''s kind: dao, djinni, efreeti, or marid.'
            - caption: Genie Expanded Spells
              colLabels:
                - Spell Level
                - Genie Spells
                - Dao Spells
                - Djinni Spells
                - Efreeti Spells
                - Marid Spells
              colStyles:
                - col-1 text-center
                - col-2-2
                - col-2-2
                - col-2-2
                - col-2-2
                - col-2-2
              rows:
                - - 1st
                  - '{@spell detect evil and good}'
                  - '{@spell sanctuary}'
                  - '{@spell thunderwave}'
                  - '{@spell burning hands}'
                  - '{@spell fog cloud}'
                - - 2nd
                  - '{@spell phantasmal force}'
                  - '{@spell spike growth}'
                  - '{@spell gust of wind}'
                  - '{@spell scorching ray}'
                  - '{@spell blur}'
                - - 3rd
                  - '{@spell create food and water}'
                  - '{@spell meld into stone}'
                  - '{@spell wind wall}'
                  - '{@spell fireball}'
                  - '{@spell sleet storm}'
                - - 4th
                  - '{@spell phantasmal killer}'
                  - '{@spell stone shape}'
                  - '{@spell greater invisibility}'
                  - '{@spell fire shield}'
                  - '{@spell control water}'
                - - 5th
                  - '{@spell creation}'
                  - '{@spell wall of stone}'
                  - '{@spell seeming}'
                  - '{@spell flame strike}'
                  - '{@spell cone of cold}'
                - - 9th
                  - '{@spell wish}'
                  - —
                  - —
                  - —
                  - —
              type: table
          name: Expanded Spell List
          type: entries
        - subclassFeature: Genie's Vessel|Warlock||Genie|TCE|1
          type: refSubclassFeature
    - class_name: Warlock
      class_source: PHB
      subclass_name: Genie
      subclass_source: TCE
      feature: Elemental Gift
      source: TCE
      level: 6
      entries:
        - '{@i 6th-level Genie feature}'
        - 'You begin to take on characteristics of your patron''s kind. You now have resistance to a damage type determined by your patron''s kind: bludgeoning (dao), thunder (djinni), fire (efreeti), or cold (marid).'
        - In addition, as a bonus action, you can give yourself a flying speed of 30 feet that lasts for 10 minutes, during which you can hover. You can use this bonus action a number of times equal to your proficiency bonus, and you regain all expended uses when you finish a long rest.
    - class_name: Warlock
      class_source: PHB
      subclass_name: Genie
      subclass_source: TCE
      feature: Sanctuary Vessel
      source: TCE
      level: 10
      entries:
        - '{@i 10th-level Genie feature}'
        - When you enter your Genie's Vessel via the Bottled Respite feature, you can now choose up to five willing creatures that you can see within 30 feet of you, and the chosen creatures are drawn into the vessel with you.
        - As a bonus action, you can eject any number of creatures from the vessel, and everyone is ejected if you leave or die or if the vessel is destroyed.
        - In addition, anyone (including you) who remains within the vessel for at least 10 minutes gains the benefit of finishing a short rest, and anyone can add your proficiency bonus to the number of hit points they regain if they spend any Hit Dice as part of a short rest there.
    - class_name: Warlock
      class_source: PHB
      subclass_name: Genie
      subclass_source: TCE
      feature: Limited Wish
      source: TCE
      level: 14
      entries:
        - '{@i 14th-level Genie feature}'
        - You entreat your patron to grant you a small wish. As an action, you can speak your desire to your Genie's Vessel, requesting the effect of one {@filter spell that is 6th level or lower and has a casting time of 1 action|spells|cast time=action|level=0;1;2;3;4;5;6}. The spell can be from any class's spell list, and you don't need to meet the requirements in that spell, including costly components; the spell simply takes effect as part of this action.
        - Once you use this feature, you can't use it again until you finish {@dice 1d4} long rests.
    - class_name: Warlock
      class_source: PHB
      subclass_name: Great Old One
      subclass_source: PHB
      feature: Awakened Mind
      source: PHB
      level: 1
      entries:
        - Starting at 1st level, your alien knowledge gives you the ability to touch the minds of other creatures. You can telepathically speak to any creature you can see within 30 feet of you. You don't need to share a language with the creature for it to understand your telepathic utterances, but the creature must be able to understand at least one language.
    - class_name: Warlock
      class_source: PHB
      subclass_name: Great Old One
      subclass_source: PHB
      feature: The Great Old One
      source: PHB
      level: 1
      entries:
        - Your patron is a mysterious entity whose nature is utterly foreign to the fabric of reality. It might come from the Far Realm, the space beyond reality, or it could be one of the elder gods known only in legends. Its motives are incomprehensible to mortals, and its knowledge so immense and ancient that even the greatest libraries pale in comparison to the vast secrets it holds. The Great Old One might be unaware of your existence or entirely indifferent to you, but the secrets you have learned allow you to draw your magic from it. Entities of this type include Ghaunadar, called That Which Lurks; Tharizdun, the Chained God; Dendar, the Night Serpent; Zargon, the Returner; Great Cthulhu; and other unfathomable beings.
        - entries:
            - The Great Old One lets you choose from an expanded list of spells when you learn a warlock spell. The following spells are added to the warlock spell list for you.
            - caption: Great Old One Expanded Spells
              colLabels:
                - Spell Level
                - Spells
              colStyles:
                - col-2 text-center
                - col-10
              rows:
                - - 1st
                  - '{@spell dissonant whispers}, {@spell Tasha''s hideous laughter}'
                - - 2nd
                  - '{@spell detect thoughts}, {@spell phantasmal force}'
                - - 3rd
                  - '{@spell clairvoyance}, {@spell sending}'
                - - 4th
                  - '{@spell dominate beast}, {@spell Evard''s black tentacles}'
                - - 5th
                  - '{@spell dominate person}, {@spell telekinesis}'
              type: table
          name: Expanded Spell List
          type: entries
        - subclassFeature: Awakened Mind|Warlock||Great Old One||1
          type: refSubclassFeature
    - class_name: Warlock
      class_source: PHB
      subclass_name: Great Old One
      subclass_source: PHB
      feature: Entropic Ward
      source: PHB
      level: 6
      entries:
        - At 6th level, you learn to magically ward yourself against attack and to turn an enemy's failed strike into good luck for yourself. When a creature makes an attack roll against you, you can use your reaction to impose disadvantage on that roll. If the attack misses you, your next attack roll against the creature has advantage if you make it before the end of your next turn.
        - Once you use this feature, you can't use it again until you finish a short or long rest.
    - class_name: Warlock
      class_source: PHB
      subclass_name: Great Old One
      subclass_source: PHB
      feature: Thought Shield
      source: PHB
      level: 10
      entries:
        - Starting at 10th level, your thoughts can't be read by telepathy or other means unless you allow it. You also have resistance to psychic damage, and whenever a creature deals psychic damage to you, that creature takes the same amount of damage that you do.
    - class_name: Warlock
      class_source: PHB
      subclass_name: Great Old One
      subclass_source: PHB
      feature: Create Thrall
      source: PHB
      level: 14
      entries:
        - At 14th level, you gain the ability to infect a humanoid's mind with the alien magic of your patron. You can use your action to touch an {@condition incapacitated} humanoid. That creature is then {@condition charmed} by you until a {@spell remove curse} spell is cast on it, the {@condition charmed} condition is removed from it, or you use this feature again.
        - You can communicate telepathically with the {@condition charmed} creature as long as the two of you are on the same plane of existence.
    - class_name: Warlock
      class_source: PHB
      subclass_name: Hexblade
      subclass_source: XGE
      feature: Hex Warrior
      source: XGE
      level: 1
      entries:
        - At 1st level, you acquire the training necessary to effectively arm yourself for battle. You gain proficiency with medium armor, shields, and martial weapons.
        - The influence of your patron also allows you to mystically channel your will through a particular weapon. Whenever you finish a long rest, you can touch one weapon that you are proficient with and that lacks the two-handed property. When you attack with that weapon, you can use your Charisma modifier, instead of Strength or Dexterity, for the attack and damage rolls. This benefit lasts until you finish a long rest. If you later gain the Pact of the Blade feature, this benefit extends to every pact weapon you conjure with that feature, no matter the weapon's type.
    - class_name: Warlock
      class_source: PHB
      subclass_name: Hexblade
      subclass_source: XGE
      feature: Hexblade's Curse
      source: XGE
      level: 1
      entries:
        - 'Starting at 1st level, you gain the ability to place a baleful curse on someone. As a bonus action, choose one creature you can see within 30 feet of you. The target is cursed for 1 minute. The curse ends early if the target dies, you die, or you are {@condition incapacitated}. Until the curse ends, you gain the following benefits:'
        - items:
            - You gain a bonus to damage rolls against the cursed target. The bonus equals your proficiency bonus.
            - Any attack roll you make against the cursed target is a critical hit on a roll of 19 or 20 on the {@dice d20}.
            - If the cursed target dies, you regain hit points equal to your warlock level + your Charisma modifier (minimum of 1 hit point).
          type: list
        - You can't use this feature again until you finish a short or long rest.
    - class_name: Warlock
      class_source: PHB
      subclass_name: Hexblade
      subclass_source: XGE
      feature: The Hexblade
      source: XGE
      level: 1
      entries:
        - You have made your pact with a mysterious entity from the Shadowfell—a force that manifests in sentient magic weapons carved from the stuff of shadow. The mighty sword Blackrazor is the most notable of these weapons, which have been spread across the multiverse over the ages. The shadowy force behind these weapons can offer power to warlocks who form pacts with it. Many Hexblade warlocks create weapons that emulate those formed in the Shadowfell. Others forgo such arms, content to weave the dark magic of that plane into their spellcasting.
        - Because the Raven Queen is known to have forged the first of these weapons, many sages speculate that she and the force are one and that the weapons, along with Hexblade warlocks, are tools she uses to manipulate events on the Material Plane to her inscrutable ends.
        - entries:
            - The Hexblade lets you choose from an expanded list of spells when you learn a warlock spell. The following spells are added to the warlock spell list for you.
            - caption: Hexblade Expanded Spells
              colLabels:
                - Spell Level
                - Spells
              colStyles:
                - col-2 text-center
                - col-10
              rows:
                - - 1st
                  - '{@spell shield}, {@spell wrathful smite}'
                - - 2nd
                  - '{@spell blur}, {@spell branding smite}'
                - - 3rd
                  - '{@spell blink}, {@spell elemental weapon}'
                - - 4th
                  - '{@spell phantasmal killer}, {@spell staggering smite}'
                - - 5th
                  - '{@spell banishing smite}, {@spell cone of cold}'
              type: table
          name: Expanded Spell List
          type: entries
        - subclassFeature: Hexblade's Curse|Warlock||Hexblade|XGE|1
          type: refSubclassFeature
        - subclassFeature: Hex Warrior|Warlock||Hexblade|XGE|1
          type: refSubclassFeature
    - class_name: Warlock
      class_source: PHB
      subclass_name: Hexblade
      subclass_source: XGE
      feature: Accursed Specter
      source: XGE
      level: 6
      entries:
        - Starting at 6th level, you can curse the soul of a person you slay, temporarily binding it to your service. When you slay a humanoid, you can cause its spirit to rise from its corpse as a {@creature specter}, the statistics for which are in the Monster Manual. When the specter appears, it gains temporary hit points equal to half your warlock level. Roll initiative for the specter, which has its own turns. It obeys your verbal commands, and it gains a special bonus to its attack rolls equal to your Charisma modifier (minimum of +0).
        - The specter remains in your service until the end of your next long rest, at which point it vanishes to the afterlife.
        - Once you bind a specter with this feature, you can't use the feature again until you finish a long rest.
    - class_name: Warlock
      class_source: PHB
      subclass_name: Hexblade
      subclass_source: XGE
      feature: Armor of Hexes
      source: XGE
      level: 10
      entries:
        - At 10th level, your hex grows more powerful. If the target cursed by your Hexblade's Curse hits you with an attack roll, you can use your reaction to roll a {@dice d6}. On a 4 or higher, the attack instead misses you, regardless of its roll.
    - class_name: Warlock
      class_source: PHB
      subclass_name: Hexblade
      subclass_source: XGE
      feature: Master of Hexes
      source: XGE
      level: 14
      entries:
        - Starting at 14th level, you can spread your Hexblade's Curse from a slain creature to another creature. When the creature cursed by your Hexblade's Curse dies, you can apply the curse to a different creature you can see within 30 feet of you, provided you aren't {@condition incapacitated}. When you apply the curse in this way, you don't regain hit points from the death of the previously cursed creature.
    - class_name: Warlock
      class_source: PHB
      subclass_name: Undead
      subclass_source: VRGR
      feature: Form of Dread
      source: VRGR
      level: 1
      entries:
        - '{@i 1st-level Undead feature}'
        - 'You manifest an aspect of your patron''s dreadful power. As a bonus action, you transform for 1 minute. You gain the following benefits while transformed:'
        - items:
            - You gain temporary hit points equal to {@dice 1d10} + your warlock level.
            - Once during each of your turns, when you hit a creature with an attack roll, you can force it to make a Wisdom saving throw, and if the saving throw fails, the target is {@condition frightened} of you until the end of your next turn.
            - You are immune to the {@condition frightened} condition.
          type: list
        - You can transform a number of times equal to your proficiency bonus, and you regain all expended uses when you finish a long rest.
        - The appearance of your Form of Dread reflects some aspect of your patron. For example, your form could be a shroud of shadows forming the crown and robes of your lich patron, or your body might glow with glyphs from ancient funerary rites and be surrounded by desert winds, suggesting your mummy patron.
    - class_name: Warlock
      class_source: PHB
      subclass_name: Undead
      subclass_source: VRGR
      feature: The Undead
      source: VRGR
      level: 1
      entries:
        - You've made a pact with a deathless being, a creature that defies the cycle and life and death, forsaking its mortal shell so it might eternally pursue its unfathomable ambitions. For such beings, time and morality are fleeting things, the concerns of those for whom grains of sand still rush through life's hourglass. Having once been mortal themselves, these ancient undead know firsthand the paths of ambition and the routes past the doors of death. They eagerly share this profane knowledge, along with other secrets, with those who work their will among the living.
        - Beings of this type include the demilich Acererak, the vampire tyrant Kas the Bloody-Handed, the githyanki lich-queen Vlaakith, the dracolich Dragotha, the undead pharaoh Ankhtepot, and the elusive Darklord, Azalin Rex.
        - entries:
            - '{@i 1st-level Undead feature}'
            - The Undead lets you choose from an expanded list of spells when you learn a warlock spell. The following spells are added to the warlock spell list for you.
            - caption: Undead Expanded Spells
              colLabels:
                - Spell Level
                - Spells
              colStyles:
                - col-2 text-center
                - col-10
              rows:
                - - 1st
                  - '{@spell bane}, {@spell false life}'
                - - 2nd
                  - '{@spell blindness/deafness}, {@spell phantasmal force}'
                - - 3rd
                  - '{@spell phantom steed}, {@spell speak with dead}'
                - - 4th
                  - '{@spell death ward}, {@spell greater invisibility}'
                - - 5th
                  - '{@spell antilife shell}, {@spell cloudkill}'
              type: table
          name: Expanded Spell List
          type: entries
        - subclassFeature: Form of Dread|Warlock||Undead|VRGR|1
          type: refSubclassFeature
    - class_name: Warlock
      class_source: PHB
      subclass_name: Undead
      subclass_source: VRGR
      feature: Grave Touched
      source: VRGR
      level: 6
      entries:
        - '{@i 6th-level Undead feature}'
        - Your patron's powers have a profound effect on your body and magic. You don't need to eat, drink, or breathe.
        - In addition, once during each of your turns, when you hit a creature with an attack roll and roll damage against the creature, you can replace the damage type with necrotic damage. While you are using your Form of Dread, you can roll one additional damage die when determining the necrotic damage the target takes.
    - class_name: Warlock
      class_source: PHB
      subclass_name: Undead
      subclass_source: VRGR
      feature: Necrotic Husk
      source: VRGR
      level: 10
      entries:
        - '{@i 10th-level Undead feature}'
        - Your connection to undeath and necrotic energy now saturates your body. You have resistance to necrotic damage. If you are transformed using your Form of Dread, you instead become immune to necrotic damage.
        - In addition, when you would be reduced to 0 hit points, you can use your reaction to drop to 1 hit point instead and cause your body to erupt with deathly energy. Each creature of your choice that is within 30 feet of you takes necrotic damage equal to {@damage 2d10} + your warlock level. You then gain 1 level of {@condition exhaustion}. Once you use this reaction, you can't do so again until you finish {@dice 1d4} long rests.
    - class_name: Warlock
      class_source: PHB
      subclass_name: Undead
      subclass_source: VRGR
      feature: Spirit Projection
      source: VRGR
      level: 14
      entries:
        - '{@i 14th-level Undead feature}'
        - Your spirit can become untethered from your physical form. As an action, you can project your spirit from your body. The body you leave behind is {@condition unconscious} and in a state of suspended animation.
        - Your spirit resembles your mortal form in almost every way, replicating your game statistics but not your possessions. Any damage or other effects that apply to your spirit or physical body affects the other. Your spirit can remain outside your body for up to 1 hour or until your {@status concentration} is broken (as if {@status concentration||concentrating} on a spell). When your projection ends, your spirit returns to your body or your body magically teleports to your spirit's space (your choice).
        - 'While projecting your spirit, you gain the following benefits:'
        - items:
            - Your spirit and body gain resistance to bludgeoning, piercing, and slashing damage.
            - When you cast a spell of the conjuration or necromancy school, the spell doesn't require verbal or somatic components or material components that lack a gold cost.
            - You have a flying speed equal to your walking speed and can hover. You can move through creatures and objects as if they were {@quickref difficult terrain||3}, but you take {@damage 1d10} force damage if you end your turn inside a creature or an object.
            - While you are using your Form of Dread, once during each of your turns when you deal necrotic damage to a creature, you regain hit points equal to half the amount of necrotic damage dealt.
          type: list
        - Once you use this feature, you can't do so again until you finish a long rest.
    - class_name: Warlock
      class_source: PHB
      subclass_name: Undying
      subclass_source: SCAG
      feature: Among the Dead
      source: SCAG
      level: 1
      entries:
        - Starting at 1st level, you learn the {@spell spare the dying} cantrip, which counts as a warlock cantrip for you. You also have advantage on saving throws against any disease.
        - Additionally, undead have difficulty harming you. If an undead targets you directly with an attack or a harmful spell, that creature must make a Wisdom saving throw against your spell save DC (an undead needn't make the save when it includes you in an area effect, such as the explosion of {@spell fireball}). On a failed save, the creature must choose a new target or forfeit targeting someone instead of you, potentially wasting the attack or spell. On a successful save, the creature is immune to this effect for 24 hours. An undead is also immune to this effect for 24 hours if you target it with an attack or a harmful spell.
    - class_name: Warlock
      class_source: PHB
      subclass_name: Undying
      subclass_source: SCAG
      feature: The Undying
      source: SCAG
      level: 1
      entries:
        - Death holds no sway over your patron, who has unlocked the secrets of everlasting life, although such a prize—like all power—comes at a price. Once mortal, the Undying has seen mortal lifetimes pass like the seasons, like the flicker of endless days and nights. It has the secrets of the ages to share, secrets of life and death. Beings of this sort include Vecna, Lord of the Hand and the Eye; the dread Iuz; the lich-queen Vol; the Undying Court of Aerenal; Vlaakith, lich-queen of the githyanki; and the deathless wizard Fistandantilus.
        - In the Realms, Undying patrons include Larloch the Shadow King, legendary master of Warlock's Crypt, and Gilgeam, the God-King of Unther.
        - entries:
            - The Undying lets you choose from an expanded list of spells when you learn a warlock spell. The following spells are added to the warlock spell list for you.
            - caption: Undying Expanded Spells
              colLabels:
                - Spell Level
                - Spells
              colStyles:
                - col-2 text-center
                - col-10
              rows:
                - - 1st
                  - '{@spell false life}, {@spell ray of sickness}'
                - - 2nd
                  - '{@spell blindness/deafness}, {@spell silence}'
                - - 3rd
                  - '{@spell feign death}, {@spell speak with dead}'
                - - 4th
                  - '{@spell aura of life}, {@spell death ward}'
                - - 5th
                  - '{@spell contagion}, {@spell legend lore}'
              type: table
          name: Expanded Spell List
          type: entries
        - subclassFeature: Among the Dead|Warlock||Undying|SCAG|1
          type: refSubclassFeature
    - class_name: Warlock
      class_source: PHB
      subclass_name: Undying
      subclass_source: SCAG
      feature: Defy Death
      source: SCAG
      level: 6
      entries:
        - Starting at 6th level, you can give yourself vitality when you cheat death or when you help someone else cheat it. You can regain hit points equal to {@dice 1d8} + your Constitution modifier (minimum of 1 hit point) when you succeed on a death saving throw or when you stabilize a creature with {@spell spare the dying}.
        - Once you use this feature, you can't use it again until you finish a long rest.
    - class_name: Warlock
      class_source: PHB
      subclass_name: Undying
      subclass_source: SCAG
      feature: Undying Nature
      source: SCAG
      level: 10
      entries:
        - Beginning at 10th level, you can hold your breath indefinitely, and you don't require food, water, or sleep, although you still require rest to reduce {@condition exhaustion} and still benefit from finishing short and long rests.
        - In addition, you age at a slower rate. For every 10 years that pass, your body ages only 1 year, and you are immune to being magically aged.
    - class_name: Warlock
      class_source: PHB
      subclass_name: Undying
      subclass_source: SCAG
      feature: Indestructible Life
      source: SCAG
      level: 14
      entries:
        - When you reach 14th level, you partake some of the true secrets of the Undying. On your turn, you can use a bonus action to regain hit points equal to {@dice 1d8} + your warlock level. Additionally, if you put a severed body part of yours back in place when you use this feature, the part reattaches.
        - Once you use this feature, you can't use it again until you finish a short or long rest.
    - class_name: Warlock
      class_source: XPHB
      subclass_name: Archfey
      subclass_source: PHB
      feature: The Archfey
      source: PHB
      level: 3
    - class_name: Warlock
      class_source: XPHB
      subclass_name: Archfey
      subclass_source: XPHB
      feature: Archfey Patron
      source: XPHB
      level: 3
      entries:
        - '{@i Bargain with Whimsical Fey}'
        - Your pact draws on the power of the Feywild. When you choose this subclass, you might make a deal with an archfey, such as the Prince of Frost; the Queen of Air and Darkness, ruler of the Gloaming Court; Titania of the Summer Court; or an ancient hag. Or you might call on a spectrum of Fey, weaving a web of favors and debts. Whoever they are, your patron is often inscrutable and whimsical.
        - subclassFeature: Archfey Spells|Warlock|XPHB|Archfey|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Steps of the Fey|Warlock|XPHB|Archfey|XPHB|3
          type: refSubclassFeature
    - class_name: Warlock
      class_source: XPHB
      subclass_name: Archfey
      subclass_source: XPHB
      feature: Archfey Spells
      source: XPHB
      level: 3
      entries:
        - The magic of your patron ensures you always have certain spells ready; when you reach a Warlock level specified in the Archfey Spells table, you thereafter always have the listed spells prepared.
        - caption: Archfey Spells
          colLabels:
            - Warlock Level
            - Spells
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - "3"
              - '{@spell Calm Emotions|XPHB}, {@spell Faerie Fire|XPHB}, {@spell Misty Step|XPHB}, {@spell Phantasmal Force|XPHB}, {@spell Sleep|XPHB}'
            - - "5"
              - '{@spell Blink|XPHB}, {@spell Plant Growth|XPHB}'
            - - "7"
              - '{@spell Dominate Beast|XPHB}, {@spell Greater Invisibility|XPHB}'
            - - "9"
              - '{@spell Dominate Person|XPHB}, {@spell Seeming|XPHB}'
          type: table
    - class_name: Warlock
      class_source: XPHB
      subclass_name: Archfey
      subclass_source: XPHB
      feature: Steps of the Fey
      source: XPHB
      level: 3
      entries:
        - Your patron grants you the ability to move between the boundaries of the planes. You can cast {@spell Misty Step|XPHB} without expending a spell slot a number of times equal to your Charisma modifier (minimum of once), and you regain all expended uses when you finish a {@variantrule Long Rest|XPHB}.
        - In addition, whenever you cast that spell, you can choose one of the following additional effects.
        - entries:
            - entries:
                - Immediately after you teleport, you or one creature you can see within 10 feet of yourself gains {@dice 1d10} {@variantrule Temporary Hit Points|XPHB}.
              name: Refreshing Step
              type: entries
            - entries:
                - Creatures within 5 feet of the space you left must succeed on a Wisdom saving throw against your spell save DC or have {@variantrule Disadvantage|XPHB} on attack rolls against creatures other than you until the start of your next turn.
              name: Taunting Step
              type: entries
          type: entries
    - class_name: Warlock
      class_source: XPHB
      subclass_name: Archfey
      subclass_source: XPHB
      feature: Misty Escape
      source: XPHB
      level: 6
      entries:
        - You can cast {@spell Misty Step|XPHB} as a {@variantrule Reaction|XPHB} in response to taking damage.
        - In addition, the following effects are now among your Steps of the Fey options.
        - entries:
            - entries:
                - You have the {@condition Invisible|XPHB} condition until the start of your next turn or until immediately after you make an attack roll, deal damage, or cast a spell.
              name: Disappearing Step
              type: entries
            - entries:
                - Creatures within 5 feet of the space you left or the space you appear in (your choice) must succeed on a Wisdom saving throw against your spell save DC or take {@damage 2d10} Psychic damage.
              name: Dreadful Step
              type: entries
          type: entries
    - class_name: Warlock
      class_source: XPHB
      subclass_name: Archfey
      subclass_source: XPHB
      feature: Beguiling Defenses
      source: XPHB
      level: 10
      entries:
        - Your patron teaches you how to guard your mind and body. You are immune to the {@condition Charmed|XPHB} condition.
        - In addition, immediately after a creature you can see hits you with an attack roll, you can take a {@variantrule Reaction|XPHB} to reduce the damage you take by half (round down), and you can force the attacker to make a Wisdom saving throw against your spell save DC. On a failed save, the attacker takes Psychic damage equal to the damage you take. Once you use this {@variantrule Reaction|XPHB}, you can't use it again until you finish a {@variantrule Long Rest|XPHB} unless you expend a Pact Magic spell slot (no action required) to restore your use of it.
    - class_name: Warlock
      class_source: XPHB
      subclass_name: Archfey
      subclass_source: XPHB
      feature: Bewitching Magic
      source: XPHB
      level: 14
      entries:
        - Your patron grants you the ability to weave your magic with teleportation. Immediately after you cast an Enchantment or Illusion spell using an action and a spell slot, you can cast {@spell Misty Step|XPHB} as part of the same action and without expending a spell slot.
    - class_name: Warlock
      class_source: XPHB
      subclass_name: Celestial
      subclass_source: XGE
      feature: The Celestial
      source: XGE
      level: 3
    - class_name: Warlock
      class_source: XPHB
      subclass_name: Celestial
      subclass_source: XPHB
      feature: Celestial Patron
      source: XPHB
      level: 3
      entries:
        - '{@i Call on the Power of the Heavens}'
        - Your pact draws on the Upper Planes, the realms of everlasting bliss. You might enter an agreement with an empyrean, a couatl, a sphinx, a unicorn, or another heavenly entity. Or you might call on numerous such beings as you pursue goals aligned with theirs. Your pact allows you to experience a hint of the holy light that illuminates the multiverse.
        - subclassFeature: Celestial Spells|Warlock|XPHB|Celestial|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Healing Light|Warlock|XPHB|Celestial|XPHB|3
          type: refSubclassFeature
    - class_name: Warlock
      class_source: XPHB
      subclass_name: Celestial
      subclass_source: XPHB
      feature: Celestial Spells
      source: XPHB
      level: 3
      entries:
        - The magic of your patron ensures you always have certain spells ready; when you reach a Warlock level specified in the Celestial Spells table, you thereafter always have the listed spells prepared.
        - caption: Celestial Spells
          colLabels:
            - Warlock Level
            - Spells
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - "3"
              - '{@spell Aid|XPHB}, {@spell Cure Wounds|XPHB}, {@spell Guiding Bolt|XPHB}, {@spell Lesser Restoration|XPHB}, {@spell Light|XPHB}, {@spell Sacred Flame|XPHB}'
            - - "5"
              - '{@spell Daylight|XPHB}, {@spell Revivify|XPHB}'
            - - "7"
              - '{@spell Guardian of Faith|XPHB}, {@spell Wall of Fire|XPHB}'
            - - "9"
              - '{@spell Greater Restoration|XPHB}, {@spell Summon Celestial|XPHB}'
          type: table
    - class_name: Warlock
      class_source: XPHB
      subclass_name: Celestial
      subclass_source: XPHB
      feature: Healing Light
      source: XPHB
      level: 3
      entries:
        - You gain the ability to channel celestial energy to heal wounds. You have a pool of d6s to fuel this healing. The number of dice in the pool equals 1 plus your Warlock level.
        - As a {@variantrule Bonus Action|XPHB}, you can heal yourself or one creature you can see within 60 feet of yourself, expending dice from the pool. The maximum number of dice you can expend at once equals your Charisma modifier (minimum of one die). Roll the dice you expend, and restore a number of {@variantrule Hit Points|XPHB} equal to the roll's total. Your pool regains all expended dice when you finish a {@variantrule Long Rest|XPHB}.
    - class_name: Warlock
      class_source: XPHB
      subclass_name: Celestial
      subclass_source: XPHB
      feature: Radiant Soul
      source: XPHB
      level: 6
      entries:
        - Your link to your patron allows you to serve as a conduit for radiant energy. You have {@variantrule Resistance|XPHB} to Radiant damage. Once per turn, when a spell you cast deals Radiant or Fire damage, you can add your Charisma modifier to that spell's damage against one of the spell's targets.
    - class_name: Warlock
      class_source: XPHB
      subclass_name: Celestial
      subclass_source: XPHB
      feature: Celestial Resilience
      source: XPHB
      level: 10
      entries:
        - You gain {@variantrule Temporary Hit Points|XPHB} whenever you use your Magical Cunning feature or finish a {@variantrule Short Rest|XPHB|Short} or {@variantrule Long Rest|XPHB}. These {@variantrule Temporary Hit Points|XPHB} equal your Warlock level plus your Charisma modifier. Additionally, choose up to five creatures you can see when you gain the points. Those creatures each gain {@variantrule Temporary Hit Points|XPHB} equal to half your Warlock level plus your Charisma modifier.
    - class_name: Warlock
      class_source: XPHB
      subclass_name: Celestial
      subclass_source: XPHB
      feature: Searing Vengeance
      source: XPHB
      level: 14
      entries:
        - When you or an ally within 60 feet of you is about to make a {@variantrule Death Saving Throw|XPHB}, you can unleash radiant energy to save the creature. The creature regains {@variantrule Hit Points|XPHB} equal to half its {@variantrule Hit Points|XPHB|Hit Point} maximum and can end the {@condition Prone|XPHB} condition on itself. Each creature of your choice that is within 30 feet of the creature takes Radiant damage equal to {@dice 2d8} plus your Charisma modifier, and each has the {@condition Blinded|XPHB} condition until the end of the current turn.
        - Once you use this feature, you can't use it again until you finish a {@variantrule Long Rest|XPHB}.
    - class_name: Warlock
      class_source: XPHB
      subclass_name: Fathomless
      subclass_source: TCE
      feature: The Fathomless
      source: TCE
      level: 3
    - class_name: Warlock
      class_source: XPHB
      subclass_name: Fiend
      subclass_source: PHB
      feature: The Fiend
      source: PHB
      level: 3
    - class_name: Warlock
      class_source: XPHB
      subclass_name: Fiend
      subclass_source: XPHB
      feature: Dark One's Blessing
      source: XPHB
      level: 3
      entries:
        - When you reduce an enemy to 0 {@variantrule Hit Points|XPHB}, you gain {@variantrule Temporary Hit Points|XPHB} equal to your Charisma modifier plus your Warlock level (minimum of 1 {@variantrule Temporary Hit Points|XPHB|Temporary Hit Point}). You also gain this benefit if someone else reduces an enemy within 10 feet of you to 0 {@variantrule Hit Points|XPHB}.
    - class_name: Warlock
      class_source: XPHB
      subclass_name: Fiend
      subclass_source: XPHB
      feature: Fiend Patron
      source: XPHB
      level: 3
      entries:
        - '{@i Make a Deal with the Lower Planes}'
        - Your pact draws on the Lower Planes, the realms of perdition. You might forge a bargain with a demon lord such as Demogorgon or Orcus; an archdevil such as Asmodeus; or a pit fiend, balor, yugoloth, or night hag that is especially mighty. That patron's aims are evil—the corruption or destruction of all things, ultimately including you—and your path is defined by the extent to which you strive against those aims.
        - subclassFeature: Fiend Spells|Warlock|XPHB|Fiend|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Dark One's Blessing|Warlock|XPHB|Fiend|XPHB|3
          type: refSubclassFeature
    - class_name: Warlock
      class_source: XPHB
      subclass_name: Fiend
      subclass_source: XPHB
      feature: Fiend Spells
      source: XPHB
      level: 3
      entries:
        - The magic of your patron ensures you always have certain spells ready; when you reach a Warlock level specified in the Fiend Spells table, you thereafter always have the listed spells prepared.
        - caption: Fiend Spells
          colLabels:
            - Warlock Level
            - Spells
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - "3"
              - '{@spell Burning Hands|XPHB}, {@spell Command|XPHB}, {@spell Scorching Ray|XPHB}, {@spell Suggestion|XPHB}'
            - - "5"
              - '{@spell Fireball|XPHB}, {@spell Stinking Cloud|XPHB}'
            - - "7"
              - '{@spell Fire Shield|XPHB}, {@spell Wall of Fire|XPHB}'
            - - "9"
              - '{@spell Geas|XPHB}, {@spell Insect Plague|XPHB}'
          type: table
    - class_name: Warlock
      class_source: XPHB
      subclass_name: Fiend
      subclass_source: XPHB
      feature: Dark One's Own Luck
      source: XPHB
      level: 6
      entries:
        - You can call on your fiendish patron to alter fate in your favor. When you make an ability check or a saving throw, you can use this feature to add {@dice 1d10} to your roll. You can do so after seeing the roll but before any of the roll's effects occur.
        - You can use this feature a number of times equal to your Charisma modifier (minimum of once), but you can use it no more than once per roll. You regain all expended uses when you finish a {@variantrule Long Rest|XPHB}.
    - class_name: Warlock
      class_source: XPHB
      subclass_name: Fiend
      subclass_source: XPHB
      feature: Fiendish Resilience
      source: XPHB
      level: 10
      entries:
        - Choose one damage type, other than Force, whenever you finish a {@variantrule Short Rest|XPHB|Short} or {@variantrule Long Rest|XPHB}. You have {@variantrule Resistance|XPHB} to that damage type until you choose a different one with this feature.
    - class_name: Warlock
      class_source: XPHB
      subclass_name: Fiend
      subclass_source: XPHB
      feature: Hurl Through Hell
      source: XPHB
      level: 14
      entries:
        - Once per turn when you hit a creature with an attack roll, you can try to instantly transport the target through the Lower Planes. The target must succeed on a Charisma saving throw against your spell save DC, or the target disappears and hurtles through a nightmare landscape. The target takes {@damage 8d10} Psychic damage if it isn't a Fiend, and it has the {@condition Incapacitated|XPHB} condition until the end of your next turn, when it returns to the space it previously occupied or the nearest unoccupied space.
        - Once you use this feature, you can't use it again until you finish a {@variantrule Long Rest|XPHB} unless you expend a Pact Magic spell slot (no action required) to restore your use of it.
    - class_name: Warlock
      class_source: XPHB
      subclass_name: Genie
      subclass_source: TCE
      feature: The Genie
      source: TCE
      level: 3
    - class_name: Warlock
      class_source: XPHB
      subclass_name: Great Old One
      subclass_source: PHB
      feature: The Great Old One
      source: PHB
      level: 3
    - class_name: Warlock
      class_source: XPHB
      subclass_name: Great Old One
      subclass_source: XPHB
      feature: Awakened Mind
      source: XPHB
      level: 3
      entries:
        - You can form a telepathic connection between your mind and the mind of another. As a {@variantrule Bonus Action|XPHB}, choose one creature you can see within 30 feet of yourself. You and the chosen creature can communicate telepathically with each other while the two of you are within a number of miles of each other equal to your Charisma modifier (minimum of 1 mile). To understand each other, you each must mentally use a language the other knows.
        - The telepathic connection lasts for a number of minutes equal to your Warlock level. It ends early if you use this feature to connect with a different creature.
    - class_name: Warlock
      class_source: XPHB
      subclass_name: Great Old One
      subclass_source: XPHB
      feature: Great Old One Patron
      source: XPHB
      level: 3
      entries:
        - '{@i Unearth Forbidden Lore of Ineffable Beings}'
        - When you choose this subclass, you might bind yourself to an unspeakable being from the Far Realm or an elder god—a being such as Tharizdun, the Chained God; Zargon, the Returner; Hadar, the Dark Hunger; or Great Cthulhu. Or you might invoke several entities without yoking yourself to one. The motives of these beings are incomprehensible, and the Great Old One might be indifferent to your existence. But the secrets you've learned nevertheless allow you to draw strange magic from it.
        - subclassFeature: Great Old One Spells|Warlock|XPHB|Great Old One|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Awakened Mind|Warlock|XPHB|Great Old One|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Psychic Spells|Warlock|XPHB|Great Old One|XPHB|3
          type: refSubclassFeature
    - class_name: Warlock
      class_source: XPHB
      subclass_name: Great Old One
      subclass_source: XPHB
      feature: Great Old One Spells
      source: XPHB
      level: 3
      entries:
        - The magic of your patron ensures you always have certain spells ready; when you reach a Warlock level specified in the Great Old One Spells table, you thereafter always have the listed spells prepared.
        - caption: Great Old One Spells
          colLabels:
            - Warlock Level
            - Spells
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - "3"
              - '{@spell Detect Thoughts|XPHB}, {@spell Dissonant Whispers|XPHB}, {@spell Phantasmal Force|XPHB}, {@spell Tasha''s Hideous Laughter|XPHB}'
            - - "5"
              - '{@spell Clairvoyance|XPHB}, {@spell Hunger of Hadar|XPHB}'
            - - "7"
              - '{@spell Confusion|XPHB}, {@spell Summon Aberration|XPHB}'
            - - "9"
              - '{@spell Modify Memory|XPHB}, {@spell Telekinesis|XPHB}'
          type: table
    - class_name: Warlock
      class_source: XPHB
      subclass_name: Great Old One
      subclass_source: XPHB
      feature: Psychic Spells
      source: XPHB
      level: 3
      entries:
        - When you cast a Warlock spell that deals damage, you can change its damage type to Psychic. In addition, when you cast a Warlock spell that is an {@filter Enchantment|spells|class=Warlock|school=E} or {@filter Illusion|spells|class=Warlock|school=I}, you can do so without Verbal or Somatic components.
    - class_name: Warlock
      class_source: XPHB
      subclass_name: Great Old One
      subclass_source: XPHB
      feature: Clairvoyant Combatant
      source: XPHB
      level: 6
      entries:
        - When you form a telepathic bond with a creature using your Awakened Mind, you can force that creature to make a Wisdom saving throw against your spell save DC. On a failed save, the creature has {@variantrule Disadvantage|XPHB} on attack rolls against you, and you have {@variantrule Advantage|XPHB} on attack rolls against that creature for the duration of the bond.
        - Once you use this feature, you can't use it again until you finish a {@variantrule Short Rest|XPHB|Short} or {@variantrule Long Rest|XPHB} unless you expend a Pact Magic spell slot (no action required) to restore your use of it.
    - class_name: Warlock
      class_source: XPHB
      subclass_name: Great Old One
      subclass_source: XPHB
      feature: Eldritch Hex
      source: XPHB
      level: 10
      entries:
        - Your alien patron grants you a powerful curse. You always have the {@spell Hex|XPHB} spell prepared. When you cast {@spell Hex|XPHB} and choose an ability, the target also has {@variantrule Disadvantage|XPHB} on saving throws of the chosen ability for the duration of the spell.
    - class_name: Warlock
      class_source: XPHB
      subclass_name: Great Old One
      subclass_source: XPHB
      feature: Thought Shield
      source: XPHB
      level: 10
      entries:
        - Your thoughts can't be read by telepathy or other means unless you allow it. You also have {@variantrule Resistance|XPHB} to Psychic damage, and whenever a creature deals Psychic damage to you, that creature takes the same amount of damage that you take.
    - class_name: Warlock
      class_source: XPHB
      subclass_name: Great Old One
      subclass_source: XPHB
      feature: Create Thrall
      source: XPHB
      level: 14
      entries:
        - When you cast {@spell Summon Aberration|XPHB}, you can modify it so that it doesn't require {@status Concentration|XPHB}. If you do so, the spell's duration becomes 1 minute for that casting, and when summoned, the Aberration has a number of {@variantrule Temporary Hit Points|XPHB} equal to your Warlock level plus your Charisma modifier.
        - In addition, the first time each turn the Aberration hits a creature under the effect of your {@spell Hex|XPHB}, the Aberration deals extra Psychic damage to the target equal to the bonus damage of that spell.
    - class_name: Warlock
      class_source: XPHB
      subclass_name: Hexblade
      subclass_source: XGE
      feature: The Hexblade
      source: XGE
      level: 3
    - class_name: Warlock
      class_source: XPHB
      subclass_name: Undead
      subclass_source: VRGR
      feature: The Undead
      source: VRGR
      level: 3
    - class_name: Warlock
      class_source: XPHB
      subclass_name: Undying
      subclass_source: SCAG
      feature: The Undying
      source: SCAG
      level: 3
    - class_name: Wizard
      class_source: PHB
      subclass_name: Abjuration
      subclass_source: PHB
      feature: Abjuration Savant
      source: PHB
      level: 2
      entries:
        - Beginning when you select this school at 2nd level, the gold and time you must spend to copy an abjuration spell into your spellbook is halved.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Abjuration
      subclass_source: PHB
      feature: Arcane Ward
      source: PHB
      level: 2
      entries:
        - Starting at 2nd level, you can weave magic around yourself for protection. When you cast an {@filter abjuration spell of 1st level or higher|spells|school=A|level=!0}, you can simultaneously use a strand of the spell's magic to create a magical ward on yourself that lasts until you finish a long rest. The ward has a hit point maximum equal to twice your wizard level + your Intelligence modifier. Whenever you take damage, the ward takes the damage instead. If this damage reduces the ward to 0 hit points, you take any remaining damage.
        - While the ward has 0 hit points, it can't absorb damage, but its magic remains. Whenever you cast an {@filter abjuration spell of 1st level or higher|spells|school=A|level=!0}, the ward regains a number of hit points equal to twice the level of the spell.
        - Once you create the ward, you can't create it again until you finish a long rest.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Abjuration
      subclass_source: PHB
      feature: School of Abjuration
      source: PHB
      level: 2
      entries:
        - The School of Abjuration emphasizes magic that blocks, banishes, or protects. Detractors of this school say that its tradition is about denial, negation rather than positive assertion. You understand, however, that ending harmful effects, protecting the weak, and banishing evil influences is anything but a philosophical void. It is a proud and respected vocation.
        - Called abjurers, members of this school are sought when baleful spirits require exorcism, when important locations must be guarded against magical spying, and when portals to other planes of existence must be closed.
        - subclassFeature: Abjuration Savant|Wizard||Abjuration||2
          type: refSubclassFeature
        - subclassFeature: Arcane Ward|Wizard||Abjuration||2
          type: refSubclassFeature
    - class_name: Wizard
      class_source: PHB
      subclass_name: Abjuration
      subclass_source: PHB
      feature: Projected Ward
      source: PHB
      level: 6
      entries:
        - Starting at 6th level, when a creature that you can see within 30 feet of you takes damage, you can use your reaction to cause your Arcane Ward to absorb that damage. If this damage reduces the ward to 0 hit points, the warded creature takes any remaining damage.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Abjuration
      subclass_source: PHB
      feature: Improved Abjuration
      source: PHB
      level: 10
      entries:
        - Beginning at 10th level, when you cast an abjuration spell that requires you to make an ability check as a part of casting that spell (as in {@spell counterspell} and {@spell dispel magic}), you add your proficiency bonus to that ability check.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Abjuration
      subclass_source: PHB
      feature: Spell Resistance
      source: PHB
      level: 14
      entries:
        - Starting at 14th level, you have advantage on saving throws against spells.
        - Furthermore, you have resistance against the damage of spells.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Bladesinging
      subclass_source: TCE
      feature: Bladesinger Styles
      source: TCE
      level: 2
      entries:
        - From its inception as a martial and magical art, Bladesinging has been tied to the sword, more specifically the longsword. Yet many generations of study gave rise to various styles of Bladesinging based on the melee weapon employed. The techniques of these styles are passed from master to students in small schools, some of which have a building dedicated to instruction. Even the newest styles are hundreds of years old, but are still taught by their original creators due to the long lives of elves. Most schools of Bladesinging are in Evermeet or Evereska. One was started in Myth Drannor, but the city's destruction has scattered those students who survived.
        - Styles of Bladesinging are broadly categorized based on the type of weapon employed, and each is associated with a category of animal. Within that style are specializations named after specific animal types, based on the types of spells employed, the techniques of the master, and the particular weapon used. Bladesingers who apprentice to a master typically get a tattoo of their chosen style's animal. Some bladesingers learn multiple styles and bear many tattoos, wearing a warning on their skin of their deadly skills.
        - entries:
            - Styles that employ a sword belong to this family. The lion style, the eldest, trains practitioners in the use of the longsword and doesn't favor any particular type of spells. Leopard style focuses on the shortsword and spells of illusion and stealth. Red tiger, a style just three centuries old, has its bladesingers using the scimitar in a whirling dance of defense from which they launch into sudden leaps and attacks.
          name: Cat
          type: entries
        - entries:
            - Styles that focus on the use of a hafted weapon, such as an axe or hammer, have been grouped together as bird styles, yet they vary wildly. All relatively new styles, they use weapons not typically favored by elves. Eagle-style bladesingers use small handaxes, and many maneuvers in the style focus on fluid ways to throw the weapon and draw a new one. Raven style uses a war pick, and spells associated with it grant the bladesinger more agility in combat.
          name: Bird
          type: entries
        - entries:
            - Practitioners of these styles use a flail, chain, or whip. Viper style uses a whip, despite its inelegance as a weapon, and has almost as long a history as the lion style. Its masters punctuate their bladesong with a stunningly rapid rhythm of whip cracks, which can keep many foes at bay and allow the bladesinger space to cast the cruel spells of poison and disease favored by the style.
          name: Snake
          type: entries
    - class_name: Wizard
      class_source: PHB
      subclass_name: Bladesinging
      subclass_source: TCE
      feature: Bladesinging
      source: TCE
      level: 2
      entries:
        - Bladesingers master a tradition of wizardry that incorporates swordplay and dance. Originally created by elves, this tradition has been adopted by non-elf practitioners, who honor and expand on the elven ways.
        - In combat, a bladesinger uses a series of intricate, elegant maneuvers that fend off harm and allow the bladesinger to channel magic into devastating attacks and a cunning defense. Many who have observed a bladesinger at work remember the display as one of the more beautiful experiences in their life, a glorious dance accompanied by a singing blade.
        - subclassFeature: Training in War and Song (Bladesinging)|Wizard||Bladesinging|TCE|2
          type: refSubclassFeature
        - subclassFeature: Bladesong|Wizard||Bladesinging|TCE|2
          type: refSubclassFeature
        - subclassFeature: Bladesinger Styles|Wizard||Bladesinging|TCE|2
          type: refSubclassFeature
    - class_name: Wizard
      class_source: PHB
      subclass_name: Bladesinging
      subclass_source: TCE
      feature: Bladesong
      source: TCE
      level: 2
      entries:
        - Starting at 2nd level, you can invoke a secret elven magic called the Bladesong, provided you aren't wearing medium or heavy armor or using a shield. It graces you with supernatural speed, agility, and focus.
        - You can use a bonus action to start the Bladesong, which lasts for 1 minute. It ends early if you are {@condition incapacitated}, if you don medium or heavy armor or a shield, or if you use two hands to make an attack with a weapon. You can also dismiss Bladesong at any time you choose (no action required).
        - 'While your bladesong is active, you gain the following benefits:'
        - items:
            - You gain a bonus to your AC equal to your Intelligence modifier (minimum of +1).
            - Your walking speed increases by 10 feet.
            - You have advantage on Dexterity ({@skill Acrobatics}) checks.
            - You gain a bonus to any Constitution saving throws you make to maintain {@status concentration} on a spell. The bonus equals your Intelligence modifier (minimum of +1).
          type: list
        - You can use this feature a number of times equal to your proficiency bonus, and you regain all expended uses of it when you finish a long rest.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Bladesinging
      subclass_source: TCE
      feature: Training in War and Song (Bladesinging)
      source: TCE
      level: 2
      entries:
        - When you adopt this tradition at 2nd level, you gain proficiency with light armor, and you gain proficiency with one type of one-handed melee weapon of your choice.
        - You also gain proficiency in the {@skill Performance} skill if you don't already have it.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Bladesinging
      subclass_source: TCE
      feature: Extra Attack
      source: TCE
      level: 6
      entries:
        - Starting at 6th level, you can attack twice, instead of once, whenever you take the {@action Attack} action on your turn. Moreover, you can cast one of your cantrips in place of one of those attacks.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Bladesinging
      subclass_source: TCE
      feature: Song of Defense
      source: TCE
      level: 10
      entries:
        - Beginning at 10th level, you can direct your magic to absorb damage while your bladesong is active. When you take damage, you can use your reaction to expend one spell slot and reduce that damage to you by an amount equal to five times the spell's slot level.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Bladesinging
      subclass_source: TCE
      feature: Song of Victory
      source: TCE
      level: 14
      entries:
        - Starting at 14th level, you add your Intelligence modifier (minimum of +1) to the damage of your melee weapon attacks while your Bladesong is active.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Chronurgy
      subclass_source: EGW
      feature: Chronal Shift
      source: EGW
      level: 2
      entries:
        - '{@i 2nd-level Chronurgy Magic feature}'
        - You can magically exert limited control over the flow of time around a creature. As a reaction, after you or a creature you can see within 30 feet of you makes an attack roll, an ability check, or a saving throw, you can force the creature to reroll. You make this decision after you see whether the roll succeeds or fails. The target must use the result of the second roll.
        - You can use this ability twice, and you regain any expended uses when you finish a long rest.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Chronurgy
      subclass_source: EGW
      feature: Chronurgy Magic
      source: EGW
      level: 2
      entries:
        - Focusing on the manipulation of time, those who follow the Chronurgy tradition learn to alter the pace of reality to their liking. Using the ramping of anticipatory dunamis energy, these mages can bend the flow of time as adroitly as a skilled musician plays an instrument, lending themselves and their allies an advantage in the blink of an eye.
        - '{@note Note: This subclass has access to {@book Dunamancy Spells|EGW|5|Dunamancy Spells}}.'
        - subclassFeature: Chronal Shift|Wizard||Chronurgy|EGW|2
          type: refSubclassFeature
        - subclassFeature: Temporal Awareness|Wizard||Chronurgy|EGW|2
          type: refSubclassFeature
    - class_name: Wizard
      class_source: PHB
      subclass_name: Chronurgy
      subclass_source: EGW
      feature: Temporal Awareness
      source: EGW
      level: 2
      entries:
        - '{@i 2nd-level Chronurgy Magic feature}'
        - You can add your Intelligence modifier to your initiative rolls.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Chronurgy
      subclass_source: EGW
      feature: Momentary Stasis
      source: EGW
      level: 6
      entries:
        - '{@i 6th-level Chronurgy Magic feature}'
        - As an action, you can magically force a Large or smaller creature you can see within 60 feet of you to make a Constitution saving throw against your spell save DC. Unless the saving throw is a success, the creature is encased in a field of magical energy until the end of your next turn or until the creature takes any damage. While encased in this way, the creature is {@condition incapacitated} and has a speed of 0.
        - You can use this feature a number of times equal to your Intelligence modifier (a minimum of once). You regain all expended uses when you finish a long rest.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Chronurgy
      subclass_source: EGW
      feature: Arcane Abeyance
      source: EGW
      level: 10
      entries:
        - '{@i 10th-level Chronurgy Magic feature}'
        - When you cast a spell using a spell slot of 4th level or lower, you can condense the spell's magic into a mote. The spell is frozen in time at the moment of casting and held within a gray bead for 1 hour. This bead is a Tiny object with AC 15 and 1 hit point, and it is immune to poison and psychic damage. When the duration ends, or if the bead is destroyed, it vanishes in a flash of light, and the spell is lost.
        - A creature holding the bead can use its action to release the spell within, whereupon the bead disappears. The spell uses your spell attack bonus and save DC, and the spell treats the creature who released it as the caster for all other purposes.
        - Once you create a bead with this feature, you can't do so again until you finish a short or long rest.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Chronurgy
      subclass_source: EGW
      feature: Convergent Future
      source: EGW
      level: 14
      entries:
        - '{@i 14th-level Chronurgy Magic feature}'
        - You can peer through possible futures and magically pull one of them into events around you, ensuring a particular outcome. When you or a creature you can see within 60 feet of you makes an attack roll, an ability check, or a saving throw, you can use your reaction to ignore the die roll and decide whether the number rolled is the minimum needed to succeed or one less than that number (your choice).
        - When you use this feature, you gain one level of {@condition exhaustion}. Only by finishing a long rest can you remove a level of {@condition exhaustion} gained in this way.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Conjuration
      subclass_source: PHB
      feature: Conjuration Savant
      source: PHB
      level: 2
      entries:
        - Beginning when you select this school at 2nd level, the gold and time you must spend to copy a conjuration spell into your spellbook is halved.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Conjuration
      subclass_source: PHB
      feature: Minor Conjuration
      source: PHB
      level: 2
      entries:
        - Starting at 2nd level when you select this school, you can use your action to conjure up an inanimate object in your hand or on the ground in an unoccupied space that you can see within 10 feet of you. This object can be no larger than 3 feet on a side and weigh no more than 10 pounds, and its form must be that of a nonmagical object that you have seen. The object is visibly magical, radiating dim light out to 5 feet.
        - The object disappears after 1 hour, when you use this feature again, if it takes any damage, or if it deals any damage.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Conjuration
      subclass_source: PHB
      feature: School of Conjuration
      source: PHB
      level: 2
      entries:
        - As a conjurer, you favor spells that produce objects and creatures out of thin air. You can conjure billowing clouds of killing fog or summon creatures from elsewhere to fight on your behalf. As your mastery grows, you learn spells of transportation and can teleport yourself across vast distances, even to other planes of existence, in an instant.
        - subclassFeature: Conjuration Savant|Wizard||Conjuration||2
          type: refSubclassFeature
        - subclassFeature: Minor Conjuration|Wizard||Conjuration||2
          type: refSubclassFeature
    - class_name: Wizard
      class_source: PHB
      subclass_name: Conjuration
      subclass_source: PHB
      feature: Benign Transposition
      source: PHB
      level: 6
      entries:
        - Starting at 6th level, you can use your action to teleport up to 30 feet to an unoccupied space that you can see. Alternatively, you can choose a space within range that is occupied by a Small or Medium creature. If that creature is willing, you both teleport, swapping places.
        - Once you use this feature, you can't use it again until you finish a long rest or you cast a conjuration spell of 1st level or higher.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Conjuration
      subclass_source: PHB
      feature: Focused Conjuration
      source: PHB
      level: 10
      entries:
        - Beginning at 10th level, while you are {@status concentration||concentrating} on a conjuration spell, your {@status concentration} can't be broken as a result of taking damage.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Conjuration
      subclass_source: PHB
      feature: Durable Summons
      source: PHB
      level: 14
      entries:
        - Starting at 14th level, any creature that you summon or create with a conjuration spell has 30 temporary hit points.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Divination
      subclass_source: PHB
      feature: Divination Savant
      source: PHB
      level: 2
      entries:
        - Beginning when you select this school at 2nd level, the gold and time you must spend to copy a divination spell into your spellbook is halved.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Divination
      subclass_source: PHB
      feature: Portent
      source: PHB
      level: 2
      entries:
        - Starting at 2nd level when you choose this school, glimpses of the future begin to press in on your awareness. When you finish a long rest, roll two {@dice d20}s and record the numbers rolled. You can replace any attack roll, saving throw, or ability check made by you or a creature that you can see with one of these foretelling rolls. You must choose to do so before the roll, and you can replace a roll in this way only once per turn.
        - Each foretelling roll can be used only once. When you finish a long rest, you lose any unused foretelling rolls.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Divination
      subclass_source: PHB
      feature: School of Divination
      source: PHB
      level: 2
      entries:
        - The counsel of a diviner is sought by royalty and commoners alike, for all seek a clearer understanding of the past, present, and future. As a diviner, you strive to part the veils of space, time, and consciousness so that you can see clearly. You work to master spells of discernment, remote viewing, supernatural knowledge, and foresight.
        - subclassFeature: Divination Savant|Wizard||Divination||2
          type: refSubclassFeature
        - subclassFeature: Portent|Wizard||Divination||2
          type: refSubclassFeature
    - class_name: Wizard
      class_source: PHB
      subclass_name: Divination
      subclass_source: PHB
      feature: Expert Divination
      source: PHB
      level: 6
      entries:
        - Beginning at 6th level, casting divination spells comes so easily to you that it expends only a fraction of your spellcasting efforts. When you cast a {@filter divination spell of 2nd level or higher|spells|school=D} using a spell slot, you regain one expended spell slot. The slot you regain must be of a level lower than the spell you cast and can't be higher than 5th level.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Divination
      subclass_source: PHB
      feature: The Third Eye
      source: PHB
      level: 10
      entries:
        - Starting at 10th level, you can use your action to increase your powers of perception. When you do so, choose one of the following benefits, which lasts until you are {@condition incapacitated} or you take a short or long rest. You can't use the feature again until you finish a rest.
        - entries:
            - entries:
                - You gain {@sense darkvision} out to a range of 60 feet.
              name: Darkvision
              type: entries
            - entries:
                - You can see into the Ethereal Plane within 60 feet of you.
              name: Ethereal Sight
              type: entries
            - entries:
                - You can read any language.
              name: Greater Comprehension
              type: entries
            - entries:
                - You can see {@condition invisible} creatures and objects within 10 feet of you that are within line of sight.
              name: See Invisibility
              type: entries
          type: options
    - class_name: Wizard
      class_source: PHB
      subclass_name: Divination
      subclass_source: PHB
      feature: Greater Portent
      source: PHB
      level: 14
      entries:
        - Starting at 14th level, the visions in your dreams intensify and paint a more accurate picture in your mind of what is to come. You roll three {@dice d20}s for your Portent feature, rather than two.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Enchantment
      subclass_source: PHB
      feature: Enchantment Savant
      source: PHB
      level: 2
      entries:
        - Beginning when you select this school at 2nd level, the gold and time you must spend to copy an enchantment spell into your spellbook is halved.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Enchantment
      subclass_source: PHB
      feature: Hypnotic Gaze
      source: PHB
      level: 2
      entries:
        - Starting at 2nd level when you choose this school, your soft words and enchanting gaze can magically enthrall another creature. As an action, choose one creature that you can see within 5 feet of you. If the target can see or hear you, it must succeed on a Wisdom saving throw against your wizard spell save DC or be {@condition charmed} by you until the end of your next turn. The {@condition charmed} creature's speed drops to 0, and the creature is {@condition incapacitated} and visibly dazed.
        - On subsequent turns, you can use your action to maintain this effect, extending its duration until the end of your next turn. However, the effect ends if you move more than 5 feet away from the creature, if the creature can neither see nor hear you, or if the creature takes damage.
        - Once the effect ends, or if the creature succeeds on its initial saving throw against this effect, you can't use this feature on that creature again until you finish a long rest.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Enchantment
      subclass_source: PHB
      feature: School of Enchantment
      source: PHB
      level: 2
      entries:
        - As a member of the School of Enchantment, you have honed your ability to magically entrance and beguile other people and monsters. Some enchanters are peacemakers who bewitch the violent to lay down their arms and charm the cruel into showing mercy. Others are tyrants who magically bind the unwilling into their service. Most enchanters fall somewhere in between.
        - subclassFeature: Enchantment Savant|Wizard||Enchantment||2
          type: refSubclassFeature
        - subclassFeature: Hypnotic Gaze|Wizard||Enchantment||2
          type: refSubclassFeature
    - class_name: Wizard
      class_source: PHB
      subclass_name: Enchantment
      subclass_source: PHB
      feature: Instinctive Charm
      source: PHB
      level: 6
      entries:
        - Beginning at 6th level, when a creature you can see within 30 feet of you makes an attack roll against you, you can use your reaction to divert the attack, provided that another creature is within the attack's range. The attacker must make a Wisdom saving throw against your wizard spell save DC. On a failed save, the attacker must target the creature that is closest to it, not including you or itself. If multiple creatures are closest, the attacker chooses which one to target. On a successful save, you can't use this feature on the attacker again until you finish a long rest.
        - You must choose to use this feature before knowing whether the attack hits or misses. Creatures that can't be {@condition charmed} are immune to this effect.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Enchantment
      subclass_source: PHB
      feature: Split Enchantment
      source: PHB
      level: 10
      entries:
        - Starting at 10th level, when you cast an enchantment spell of 1st level or higher that targets only one creature, you can have it target a second creature.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Enchantment
      subclass_source: PHB
      feature: Alter Memories
      source: PHB
      level: 14
      entries:
        - At 14th level, you gain the ability to make a creature unaware of your magical influence on it. When you cast an enchantment spell to charm one or more creatures, you can alter one creature's understanding so that it remains unaware of being {@condition charmed}.
        - Additionally, once before the spell expires, you can use your action to try to make the chosen creature forget some of the time it spent {@condition charmed}. The creature must succeed on an Intelligence saving throw against your wizard spell save DC or lose a number of hours of its memories equal to 1 + your Charisma modifier (minimum of 1). You can make the creature forget less time, and the amount of time can't exceed the duration of your enchantment spell.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Evocation
      subclass_source: PHB
      feature: Evocation Savant
      source: PHB
      level: 2
      entries:
        - Beginning when you select this school at 2nd level, the gold and time you must spend to copy an evocation spell into your spellbook is halved.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Evocation
      subclass_source: PHB
      feature: School of Evocation
      source: PHB
      level: 2
      entries:
        - You focus your study on magic that creates powerful elemental effects such as bitter cold, searing flame, rolling thunder, crackling lightning, and burning acid. Some evokers find employment in military forces, serving as artillery to blast enemy armies from afar. Others use their spectacular power to protect the weak, while some seek their own gain as bandits, adventurers, or aspiring tyrants.
        - subclassFeature: Evocation Savant|Wizard||Evocation||2
          type: refSubclassFeature
        - subclassFeature: Sculpt Spells|Wizard||Evocation||2
          type: refSubclassFeature
    - class_name: Wizard
      class_source: PHB
      subclass_name: Evocation
      subclass_source: PHB
      feature: Sculpt Spells
      source: PHB
      level: 2
      entries:
        - Beginning at 2nd level, you can create pockets of relative safety within the effects of your evocation spells. When you cast an evocation spell that affects other creatures that you can see, you can choose a number of them equal to 1 + the spell's level. The chosen creatures automatically succeed on their saving throws against the spell, and they take no damage if they would normally take half damage on a successful save.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Evocation
      subclass_source: PHB
      feature: Potent Cantrip
      source: PHB
      level: 6
      entries:
        - Starting at 6th level, your damaging cantrips affect even creatures that avoid the brunt of the effect. When a creature succeeds on a saving throw against your cantrip, the creature takes half the cantrip's damage (if any) but suffers no additional effect from the cantrip.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Evocation
      subclass_source: PHB
      feature: Empowered Evocation
      source: PHB
      level: 10
      entries:
        - Beginning at 10th level, you can add your Intelligence modifier to one damage roll of any wizard evocation spell you cast.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Evocation
      subclass_source: PHB
      feature: Overchannel
      source: PHB
      level: 14
      entries:
        - Starting at 14th level, you can increase the power of your simpler spells. When you cast a wizard spell of 1st through 5th-level that deals damage, you can deal maximum damage with that spell.
        - The first time you do so, you suffer no adverse effect. If you use this feature again before you finish a long rest, you take {@damage 2d12} necrotic damage for each level of the spell, immediately after you cast it. Each time you use this feature again before finishing a long rest, the necrotic damage per spell level increases by {@damage 1d12}. This damage ignores resistance and immunity.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Graviturgy
      subclass_source: EGW
      feature: Adjust Density
      source: EGW
      level: 2
      entries:
        - '{@i 2nd-level Graviturgy Magic feature}'
        - As an action, you can magically alter the weight of one object or creature you can see within 30 feet of you. The object or creature must be Large or smaller. The target's weight is halved or doubled for up to 1 minute or until your {@status concentration} ends (as if you were {@status concentration||concentrating} on a spell).
        - While the weight of a creature is halved by this effect, the creature's speed increases by 10 feet, it can jump twice as far as normal, and it has disadvantage on Strength checks and Strength saving throws. While the weight of a creature is doubled by this effect, the creature's speed is reduced by 10 feet, and it has advantage on Strength checks and Strength saving throws.
        - Upon reaching 10th level in this class, you can target an object or a creature that is Huge or smaller.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Graviturgy
      subclass_source: EGW
      feature: Graviturgy Magic
      source: EGW
      level: 2
      entries:
        - Understanding and mastering the forces that draw bodies of matter together or drive them apart, the students of the Graviturgy arcane tradition learn to further bend and manipulate the violent energy of gravity to their benefit, and the terrible detriment of their enemies.
        - '{@note Note: This subclass has access to {@book Dunamancy Spells|EGW|5|Dunamancy Spells}}.'
        - subclassFeature: Adjust Density|Wizard||Graviturgy|EGW|2
          type: refSubclassFeature
    - class_name: Wizard
      class_source: PHB
      subclass_name: Graviturgy
      subclass_source: EGW
      feature: Gravity Well
      source: EGW
      level: 6
      entries:
        - '{@i 6th-level Graviturgy Magic feature}'
        - 'You''ve learned how to manipulate gravity around a living being: whenever you cast a spell on a creature, you can move the target 5 feet to an unoccupied space of your choice if the target is willing to move, the spell hits it with an attack, or it fails a saving throw against the spell.'
    - class_name: Wizard
      class_source: PHB
      subclass_name: Graviturgy
      subclass_source: EGW
      feature: Violent Attraction
      source: EGW
      level: 10
      entries:
        - '{@i 10th-level Graviturgy Magic feature}'
        - When another creature that you can see within 60 feet of you hits with a weapon attack, you can use your reaction to increase the attack's velocity, causing the attack's target to take an extra {@damage 1d10} damage of the weapon's type.
        - Alternatively, if a creature within 60 feet of you takes damage from a fall, you can use your reaction to increase the fall's damage by {@damage 2d10}.
        - You can use this feature a number of times equal to your Intelligence modifier (a minimum of once). You regain all expended uses when you finish a long rest.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Graviturgy
      subclass_source: EGW
      feature: Event Horizon
      source: EGW
      level: 14
      entries:
        - '{@i 14th-level Graviturgy Magic feature}'
        - As an action, you can magically emit a powerful field of gravitational energy that tugs at other creatures for up to 1 minute or until your {@status concentration} ends (as if you were {@status concentration||concentrating} on a spell). For the duration, whenever a creature hostile to you starts its turn within 30 feet of you, it must make a Strength saving throw against your spell save DC. On a failed save, it takes {@damage 2d10} force damage, and its speed is reduced to 0 until the start of its next turn. On a successful save, it takes half as much damage, and every foot it moves this turn costs 2 extra feet of movement.
        - Once you use this feature, you can't do so again until you finish a long rest or until you expend a spell slot of 3rd level or higher on it.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Illusion
      subclass_source: PHB
      feature: Illusion Savant
      source: PHB
      level: 2
      entries:
        - Beginning when you select this school at 2nd level, the gold and time you must spend to copy an illusion spell into your spellbook is halved.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Illusion
      subclass_source: PHB
      feature: Improved Minor Illusion
      source: PHB
      level: 2
      entries:
        - When you choose this school at 2nd level, you learn the {@spell minor illusion} cantrip. If you already know this cantrip, you learn a different wizard cantrip of your choice. The cantrip doesn't count against your number of cantrips known.
        - When you cast {@spell minor illusion}, you can create both a sound and an image with a single casting of the spell.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Illusion
      subclass_source: PHB
      feature: School of Illusion
      source: PHB
      level: 2
      entries:
        - You focus your studies on magic that dazzles the senses, befuddles the mind, and tricks even the wisest folk. Your magic is subtle, but the illusions crafted by your keen mind make the impossible seem real. Some illusionists—including many gnome wizards—are benign tricksters who use their spells to entertain. Others are more sinister masters of deception, using their illusions to frighten and fool others for their personal gain.
        - subclassFeature: Illusion Savant|Wizard||Illusion||2
          type: refSubclassFeature
        - subclassFeature: Improved Minor Illusion|Wizard||Illusion||2
          type: refSubclassFeature
    - class_name: Wizard
      class_source: PHB
      subclass_name: Illusion
      subclass_source: PHB
      feature: Malleable Illusions
      source: PHB
      level: 6
      entries:
        - Starting at 6th level, when you cast an illusion spell that has a duration of 1 minute or longer, you can use your action to change the nature of that illusion (using the spell's normal parameters for the illusion), provided that you can see the illusion.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Illusion
      subclass_source: PHB
      feature: Illusory Self
      source: PHB
      level: 10
      entries:
        - Beginning at 10th level, you can create an illusory duplicate of yourself as an instant, almost instinctual reaction to danger. When a creature makes an attack roll against you, you can use your reaction to interpose the illusory duplicate between the attacker and yourself. The attack automatically misses you, then the illusion dissipates.
        - Once you use this feature, you can't use it again until you finish a short or long rest.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Illusion
      subclass_source: PHB
      feature: Illusory Reality
      source: PHB
      level: 14
      entries:
        - By 14th level, you have learned the secret of weaving shadow magic into your illusions to give them a semi-reality. When you cast an illusion spell of 1st level or higher, you can choose one inanimate, nonmagical object that is part of the illusion and make that object real. You can do this on your turn as a bonus action while the spell is ongoing. The object remains real for 1 minute. For example, you can create an illusion of a bridge over a chasm and then make it real long enough for your allies to cross.
        - The object can't deal damage or otherwise directly harm anyone.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Necromancy
      subclass_source: PHB
      feature: Grim Harvest
      source: PHB
      level: 2
      entries:
        - At 2nd level, you gain the ability to reap life energy from creatures you kill with your spells. Once per turn when you kill one or more creatures with a spell of 1st level or higher, you regain hit points equal to twice the spell's level, or three times its level if the spell belongs to the {@filter School of Necromancy|spells|school=N}. You don't gain this benefit for killing constructs or undead.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Necromancy
      subclass_source: PHB
      feature: Necromancy Savant
      source: PHB
      level: 2
      entries:
        - Beginning when you select this school at 2nd level, the gold and time you must spend to copy a necromancy spell into your spellbook is halved.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Necromancy
      subclass_source: PHB
      feature: School of Necromancy
      source: PHB
      level: 2
      entries:
        - The School of Necromancy explores the cosmic forces of life, death, and undeath. As you focus your studies in this tradition, you learn to manipulate the energy that animates all living things. As you progress, you learn to sap the life force from a creature as your magic destroys its body, transforming that vital energy into magical power you can manipulate.
        - Most people see necromancers as menacing, or even villainous, due to the close association with death. Not all necromancers are evil, but the forces they manipulate are considered taboo by many societies.
        - subclassFeature: Necromancy Savant|Wizard||Necromancy||2
          type: refSubclassFeature
        - subclassFeature: Grim Harvest|Wizard||Necromancy||2
          type: refSubclassFeature
    - class_name: Wizard
      class_source: PHB
      subclass_name: Necromancy
      subclass_source: PHB
      feature: Undead Thralls
      source: PHB
      level: 6
      entries:
        - At 6th level, you add the {@spell animate dead} spell to your spellbook if it is not there already. When you cast {@spell animate dead}, you can target one additional corpse or pile of bones, creating another zombie or skeleton, as appropriate.
        - 'Whenever you create an undead using a necromancy spell, it has additional benefits:'
        - items:
            - The creature's hit point maximum is increased by an amount equal to your wizard level.
            - The creature adds your proficiency bonus to its weapon damage rolls.
          type: list
    - class_name: Wizard
      class_source: PHB
      subclass_name: Necromancy
      subclass_source: PHB
      feature: Inured to Undeath
      source: PHB
      level: 10
      entries:
        - Beginning at 10th level, you have resistance to necrotic damage, and your hit point maximum can't be reduced. You have spent so much time dealing with undead and the forces that animate them that you have become inured to some of their worst effects.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Necromancy
      subclass_source: PHB
      feature: Command Undead
      source: PHB
      level: 14
      entries:
        - Starting at 14th level, you can use magic to bring undead under your control, even those created by other wizards. As an action, you can choose one undead that you can see within 60 feet of you. That creature must make a Charisma saving throw against your wizard spell save DC. If it succeeds, you can't use this feature on it again. If it fails, it becomes friendly to you and obeys your commands until you use this feature again.
        - Intelligent undead are harder to control in this way. If the target has an Intelligence of 8 or higher, it has advantage on the saving throw. If it fails the saving throw and has an Intelligence of 12 or higher, it can repeat the saving throw at the end of every hour until it succeeds and breaks free.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Scribes
      subclass_source: TCE
      feature: Awakened Spellbook
      source: TCE
      level: 2
      entries:
        - '{@i 2nd-level Order of Scribes feature}'
        - Using specially prepared inks and ancient incantations passed down by your wizardly order, you have awakened an arcane sentience within your spellbook.
        - 'While you are holding the book, it grants you the following benefits:'
        - items:
            - You can use the book as a spellcasting focus for your wizard spells.
            - When you cast a wizard spell with a spell slot, you can temporarily replace its damage type with a type that appears in another spell in your spellbook, which magically alters the spell's formula for this casting only. The latter spell must be of the same level as the spell slot you expend.
            - When you cast a wizard spell as a ritual, you can use the spell's normal casting time, rather than adding 10 minutes to it. Once you use this benefit, you can't do so again until you finish a long rest.
          type: list
        - If necessary, you can replace the book over the course of a short rest by using your Wizardly Quill to write arcane sigils in a blank book or a magic spellbook to which you're attuned. At the end of the rest, your spellbook's consciousness is summoned into the new book, which the consciousness transforms into your spellbook, along with all its spells. If the previous book still existed somewhere, all the spells vanish from its pages.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Scribes
      subclass_source: TCE
      feature: Order of Scribes
      source: TCE
      level: 2
      entries:
        - Magic of the book-that's what many folk call wizardry. The name is apt, given how much time wizards spend poring over tomes and penning theories about the nature of magic. It's rare to see wizards traveling without books and scrolls sprouting from their bags, and a wizard would go to great lengths to plumb an archive of ancient knowledge.
        - 'Among wizards, the Order of Scribes is the most bookish. It takes many forms in different worlds, but its primary mission is the same everywhere: recording magical discoveries so that wizardry can flourish. And while all wizards value spellbooks, a wizard in the Order of Scribes magically awakens their book, turning it into a trusted companion. All wizards study books, but a wizardly scribe talks to theirs!'
        - subclassFeature: Wizardly Quill|Wizard||Scribes|TCE|2
          type: refSubclassFeature
        - subclassFeature: Awakened Spellbook|Wizard||Scribes|TCE|2
          type: refSubclassFeature
    - class_name: Wizard
      class_source: PHB
      subclass_name: Scribes
      subclass_source: TCE
      feature: Wizardly Quill
      source: TCE
      level: 2
      entries:
        - '{@i 2nd-level Order of Scribes feature}'
        - 'As a bonus action, you can magically create a Tiny quill in your free hand. The magic quill has the following properties:'
        - items:
            - The quill doesn't require ink. When you write with it, it produces ink in a color of your choice on the writing surface.
            - The time you must spend to copy a spell into your spellbook equals 2 minutes per spell level if you use the quill for the transcription.
            - You can erase anything you write with the quill if you wave the feather over the text as a bonus action, provided the text is within 5 feet of you.
          type: list
        - This quill disappears if you create another one or if you die.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Scribes
      subclass_source: TCE
      feature: Manifest Mind
      source: TCE
      level: 6
      entries:
        - '{@i 6th-level Order of Scribes feature}'
        - You can conjure forth the mind of your Awakened Spellbook. As a bonus action while the book is on your person, you can cause the mind to manifest as a Tiny spectral object, hovering in an unoccupied space of your choice within 60 feet of you. The spectral mind is intangible and doesn't occupy its space, and it sheds dim light in a 10-foot radius. It looks like a ghostly tome, a cascade of text, or a scholar from the past (your choice).
        - While manifested, the spectral mind can hear and see, and it has {@sense darkvision} with a range of 60 feet. The mind can telepathically share with you what it sees and hears (no action required).
        - Whenever you cast a wizard spell on your turn, you can cast it as if you were in the spectral mind's space, instead of your own, using its senses. You can do so a number of times per day equal to your proficiency bonus, and you regain all expended uses when you finish a long rest.
        - As a bonus action, you can cause the spectral mind to hover up to 30 feet to an unoccupied space that you or it can see. It can pass through creatures but not objects.
        - The spectral mind stops manifesting if it is ever more than 300 feet away from you, if someone casts {@spell dispel magic} on it, if the Awakened Spellbook is destroyed, if you die, or if you dismiss the spectral mind as a bonus action.
        - Once you conjure the mind, you can't do so again until you finish a long rest, unless you expend a spell slot of any level to conjure it again.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Scribes
      subclass_source: TCE
      feature: Master Scrivener
      source: TCE
      level: 10
      entries:
        - '{@i 10th-level Order of Scribes feature}'
        - Whenever you finish a long rest, you can create one magic scroll by touching your Wizardly Quill to a blank piece of paper or parchment and causing one spell from your Awakened Spellbook to be copied onto the scroll. The spellbook must be within 5 feet of you when you make the scroll.
        - The chosen spell must be of 1st or 2nd level and must have a casting time of 1 action. Once in the scroll, the spell's power is enhanced, counting as one level higher than normal. You can cast the spell from the scroll by reading it as an action. The scroll is unintelligible to anyone else, and the spell vanishes from the scroll when you cast it or when you finish your next long rest.
        - You are also adept at crafting spell scrolls, which are described in the treasure chapter of the Dungeon Master's Guide. The gold and time you must spend to make such a scroll are halved if you use your Wizardly Quill.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Scribes
      subclass_source: TCE
      feature: One with the Word
      source: TCE
      level: 14
      entries:
        - '{@i 14th-level Order of Scribes feature}'
        - Your connection to your Awakened Spellbook has become so profound that your soul has become entwined with it. While the book is on your person, you have advantage on all Intelligence ({@skill Arcana}) checks, as the spellbook helps you remember magical lore.
        - Moreover, if you take damage while your spellbook's mind is manifested, you can prevent all of that damage to you by using your reaction to dismiss the spectral mind, using its magic to save yourself. Then roll {@dice 3d6}. The spellbook temporarily loses spells of your choice that have a combined spell level equal to that roll or higher. For example, if the roll's total is 9, spells vanish from the book that have a combined level of at least 9, which could mean one 9th-level spell, three 3rd-level spells, or some other combination. If there aren't enough spells in the book to cover this cost, you drop to 0 hit points.
        - Until you finish {@dice 1d6} long rests, you are incapable of casting the lost spells, even if you find them on a scroll or in another spellbook. After you finish the required number of rests, the spells reappear in the spellbook.
        - Once you use this reaction, you can't do so again until you finish a long rest.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Transmutation
      subclass_source: PHB
      feature: Minor Alchemy
      source: PHB
      level: 2
      entries:
        - Starting at 2nd level when you select this school, you can temporarily alter the physical properties of one nonmagical object, changing it from one substance into another. You perform a special alchemical procedure on one object composed entirely of wood, stone (but not a gemstone), iron, copper, or silver, transforming it into a different one of those materials. For each 10 minutes you spend performing the procedure, you can transform up to 1 cubic foot of material. After 1 hour, or until you lose your {@status concentration} (as if you were {@status concentration||concentrating} on a spell), the material reverts to its original substance.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Transmutation
      subclass_source: PHB
      feature: School of Transmutation
      source: PHB
      level: 2
      entries:
        - You are a student of spells that modify energy and matter. To you, the world is not a fixed thing, but eminently mutable, and you delight in being an agent of change. You wield the raw stuff of creation and learn to alter both physical forms and mental qualities. Your magic gives you the tools to become a smith on reality's forge.
        - Some transmuters are tinkerers and pranksters, turning people into toads and transforming copper into silver for fun and occasional profit. Others pursue their magical studies with deadly seriousness, seeking the power of the gods to make and destroy worlds.
        - subclassFeature: Transmutation Savant|Wizard||Transmutation||2
          type: refSubclassFeature
        - subclassFeature: Minor Alchemy|Wizard||Transmutation||2
          type: refSubclassFeature
    - class_name: Wizard
      class_source: PHB
      subclass_name: Transmutation
      subclass_source: PHB
      feature: Transmutation Savant
      source: PHB
      level: 2
      entries:
        - Beginning when you select this school at 2nd level, the gold and time you must spend to copy a transmutation spell into your spellbook is halved.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Transmutation
      subclass_source: PHB
      feature: Transmuter's Stone
      source: PHB
      level: 6
      entries:
        - 'Starting at 6th level, you can spend 8 hours creating a transmuter''s stone that stores transmutation magic. You can benefit from the stone yourself or give it to another creature. A creature gains a benefit of your choice as long as the stone is in the creature''s possession. When you create the stone, choose the benefit from the following options:'
        - items:
            - Darkvision out to a range of 60 feet, as described in chapter 8.
            - An increase to speed of 10 feet while the creature is unencumbered.
            - Proficiency in Constitution saving throws.
            - Resistance to acid, cold, fire, lightning, or thunder damage (your choice whenever you choose this benefit).
          type: list
        - Each time you cast a transmutation spell of 1st level or higher, you can change the effect of your stone if the stone is on your person.
        - If you create a new transmuter's stone, the previous one ceases to function.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Transmutation
      subclass_source: PHB
      feature: Shapechanger
      source: PHB
      level: 10
      entries:
        - At 10th level, you add the {@spell polymorph} spell to your spellbook, if it is not there already. You can cast {@spell polymorph} without expending a spell slot. When you do so, you can target only yourself and transform into a {@filter beast whose challenge rating is 1 or lower|bestiary|challenge rating=[&0;&1]|type=beast|miscellaneous=!swarm}.
        - Once you cast {@spell polymorph} in this way, you can't do so again until you finish a short or long rest, though you can still cast it normally using an available spell slot.
    - class_name: Wizard
      class_source: PHB
      subclass_name: Transmutation
      subclass_source: PHB
      feature: Master Transmuter
      source: PHB
      level: 14
      entries:
        - Starting at 14th level, you can use your action to consume the reserve of transmutation magic stored within your transmuter's stone in a single burst. When you do so, choose one of the following effects. Your transmuter's stone is destroyed and can't be remade until you finish a long rest.
        - entries:
            - entries:
                - You can transmute one nonmagical object—no larger than a 5-foot cube—into another nonmagical object of similar size and mass and of equal or lesser value. You must spend 10 minutes handling the object to transform it.
              name: Major Transformation
              type: entries
            - entries:
                - You remove all curses, diseases, and poisons affecting a creature that you touch with the transmuter's stone. The creature also regains all its hit points.
              name: Panacea
              type: entries
            - entries:
                - You cast the {@spell raise dead} spell on a creature you touch with the transmuter's stone, without expending a spell slot or needing to have the spell in your spellbook.
              name: Restore Life
              type: entries
            - entries:
                - You touch the transmuter's stone to a willing creature, and that creature's apparent age is reduced by {@dice 3d10} years, to a minimum of 13 years. This effect doesn't extend the creature's lifespan.
              name: Restore Youth
              type: entries
          type: options
    - class_name: Wizard
      class_source: PHB
      subclass_name: War
      subclass_source: XGE
      feature: Arcane Deflection
      source: XGE
      level: 2
      entries:
        - At 2nd level, you have learned to weave your magic to fortify yourself against harm. When you are hit by an attack or you fail a saving throw, you can use your reaction to gain a +2 bonus to your AC against that attack or a +4 bonus to that saving throw.
        - When you use this feature, you can't cast spells other than cantrips until the end of your next turn.
    - class_name: Wizard
      class_source: PHB
      subclass_name: War
      subclass_source: XGE
      feature: Tactical Wit
      source: XGE
      level: 2
      entries:
        - Starting at 2nd level, your keen ability to assess tactical situations allows you to act quickly in battle. You can give yourself a bonus to your initiative rolls equal to your Intelligence modifier.
    - class_name: Wizard
      class_source: PHB
      subclass_name: War
      subclass_source: XGE
      feature: War Magic
      source: XGE
      level: 2
      entries:
        - A variety of arcane colleges specialize in training wizards for war. The tradition of War Magic blends principles of evocation and abjuration, rather than specializing in either of those schools. It teaches techniques that empower a caster's spells, while also providing methods for wizards to bolster their own defenses.
        - Followers of this tradition are known as war mages. They see their magic as both a weapon and armor, a resource superior to any piece of steel. War mages act fast in battle, using their spells to seize tactical control of a situation. Their spells strike hard, while their defensive skills foil their opponents' attempts to counterattack. War mages are also adept at turning other spellcasters' magical energy against them.
        - 'In great battles, a war mage often works with evokers, abjurers, and other types of wizards. Evokers, in particular, sometimes tease war mages for splitting their attention between offense and defense. A war mage''s typical response: "What good is being able to throw a mighty {@spell fireball} if I die before I can cast it?"'
        - subclassFeature: Arcane Deflection|Wizard||War|XGE|2
          type: refSubclassFeature
        - subclassFeature: Tactical Wit|Wizard||War|XGE|2
          type: refSubclassFeature
    - class_name: Wizard
      class_source: PHB
      subclass_name: War
      subclass_source: XGE
      feature: Power Surge
      source: XGE
      level: 6
      entries:
        - Starting at 6th level, you can store magical energy within yourself to later empower your damaging spells. In its stored form, this energy is called a power surge.
        - You can store a maximum number of power surges equal to your Intelligence modifier (minimum of one). Whenever you finish a long rest, your number of power surges resets to one. Whenever you successfully end a spell with {@spell dispel magic} or {@spell counterspell}, you gain one power surge, as you steal magic from the spell you foiled. If you end a short rest with no power surges, you gain one power surge.
        - Once per turn when you deal damage to a creature or object with a wizard spell, you can spend one power surge to deal extra force damage to that target. The extra damage equals half your wizard level.
    - class_name: Wizard
      class_source: PHB
      subclass_name: War
      subclass_source: XGE
      feature: Durable Magic
      source: XGE
      level: 10
      entries:
        - Beginning at 10th level, the magic you channel helps ward off harm. While you maintain {@status concentration} on a spell, you have a +2 bonus to AC and all saving throws.
    - class_name: Wizard
      class_source: PHB
      subclass_name: War
      subclass_source: XGE
      feature: Deflecting Shroud
      source: XGE
      level: 14
      entries:
        - At 14th level, your Arcane Deflection becomes infused with deadly magic. When you use your Arcane Deflection feature, you can cause magical energy to arc from you. Up to three creatures of your choice that you can see within 60 feet of you each take force damage equal to half your wizard level.
    - class_name: Wizard
      class_source: XPHB
      subclass_name: Abjuration
      subclass_source: PHB
      feature: School of Abjuration
      source: PHB
      level: 3
    - class_name: Wizard
      class_source: XPHB
      subclass_name: Abjurer
      subclass_source: XPHB
      feature: Abjuration Savant
      source: XPHB
      level: 3
      entries:
        - Choose two {@filter Wizard spells from the Abjuration school|spells|level=0;1;2|class=Wizard|school=A}, each of which must be no higher than level 2, and add them to your spellbook for free.
        - In addition, whenever you gain access to a new level of spell slots in this class, you can add one Wizard spell from the Abjuration school to your spellbook for free. The chosen spell must be of a level for which you have spell slots.
    - class_name: Wizard
      class_source: XPHB
      subclass_name: Abjurer
      subclass_source: XPHB
      feature: Abjurer
      source: XPHB
      level: 3
      entries:
        - '{@i Shield Companions and Banish Foes}'
        - Your study of magic is focused on spells that block, banish, or protect—ending harmful effects, banishing evil influences, and protecting the weak. Abjurers are sought when baleful spirits require exorcism, when locations must be guarded against magical spying, and when portals to other planes of existence must be closed. Adventuring parties value Abjurers for the protection they provide against a variety of hostile magic and other attacks.
        - subclassFeature: Abjuration Savant|Wizard|XPHB|Abjurer|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Arcane Ward|Wizard|XPHB|Abjurer|XPHB|3
          type: refSubclassFeature
    - class_name: Wizard
      class_source: XPHB
      subclass_name: Abjurer
      subclass_source: XPHB
      feature: Arcane Ward
      source: XPHB
      level: 3
      entries:
        - You can weave magic around yourself for protection. When you cast an Abjuration spell with a spell slot, you can simultaneously use a strand of the spell's magic to create a magical ward on yourself that lasts until you finish a {@variantrule Long Rest|XPHB}. The ward has a {@variantrule Hit Points|XPHB|Hit Point} maximum equal to twice your Wizard level plus your Intelligence modifier. Whenever you take damage, the ward takes the damage instead, and if you have any Resistances or Vulnerabilities, apply them before reducing the ward's {@variantrule Hit Points|XPHB}. If the damage reduces the ward to 0 {@variantrule Hit Points|XPHB}, you take any remaining damage. While the ward has 0 {@variantrule Hit Points|XPHB}, it can't absorb damage, but its magic remains.
        - Whenever you cast an Abjuration spell with a spell slot, the ward regains a number of {@variantrule Hit Points|XPHB} equal to twice the level of the spell slot. Alternatively, as a {@variantrule Bonus Action|XPHB}, you can expend a spell slot, and the ward regains a number of {@variantrule Hit Points|XPHB} equal to twice the level of the spell slot expended.
        - Once you create the ward, you can't create it again until you finish a {@variantrule Long Rest|XPHB}.
    - class_name: Wizard
      class_source: XPHB
      subclass_name: Abjurer
      subclass_source: XPHB
      feature: Projected Ward
      source: XPHB
      level: 6
      entries:
        - When a creature that you can see within 30 feet of yourself takes damage, you can take a {@variantrule Reaction|XPHB} to cause your Arcane Ward to absorb that damage. If this damage reduces the ward to 0 {@variantrule Hit Points|XPHB}, the warded creature takes any remaining damage. If that creature has any Resistances or Vulnerabilities, apply them before reducing the ward's {@variantrule Hit Points|XPHB}.
    - class_name: Wizard
      class_source: XPHB
      subclass_name: Abjurer
      subclass_source: XPHB
      feature: Spell Breaker
      source: XPHB
      level: 10
      entries:
        - You always have the {@spell Counterspell|XPHB} and {@spell Dispel Magic|XPHB} spells prepared. In addition, you can cast {@spell Dispel Magic|XPHB} as a {@variantrule Bonus Action|XPHB}, and you can add your {@variantrule Proficiency|XPHB|Proficiency Bonus} to its ability check.
        - When you cast either spell with a spell slot, that slot isn't expended if the spell fails to stop a spell.
    - class_name: Wizard
      class_source: XPHB
      subclass_name: Abjurer
      subclass_source: XPHB
      feature: Spell Resistance
      source: XPHB
      level: 14
      entries:
        - You have {@variantrule Advantage|XPHB} on saving throws against spells, and you have {@variantrule Resistance|XPHB} to the damage of spells.
    - class_name: Wizard
      class_source: XPHB
      subclass_name: Bladesinger
      subclass_source: FRHoF
      feature: Bladesinger
      source: FRHoF
      level: 3
      entries:
        - '{@i Wield Weapon and Wizardry in Elegant Tandem}'
        - Bladesingers master a tradition of wizardry that incorporates swordplay and dance. In combat, a Bladesinger uses intricate, elegant maneuvers that fend off harm and allow the Bladesinger to channel magic into devastating attacks and a cunning defense. Many who have observed a Bladesinger at work remember the display as one of the more beautiful experiences in their life—a glorious dance accompanied by a singing blade.
        - Bladesinging is associated with the ancient elven societies that first mastered the art and coined the term. Even today, most Bladesingers still hail from old elven realms, such as Myth Drannor, or from non-elven societies that share land and history with elves, such as the Silver Marches. Wherever they hail from, Bladesingers take their talents all across the Realms to help common people and perform heroic deeds. Most communities greet the arrival of a Bladesinger as a good omen.
        - subclassFeature: Bladesong|Wizard|XPHB|Bladesinger|FRHoF|3|FRHoF
          type: refSubclassFeature
        - subclassFeature: Training in War and Song|Wizard|XPHB|Bladesinger|FRHoF|3|FRHoF
          type: refSubclassFeature
    - class_name: Wizard
      class_source: XPHB
      subclass_name: Bladesinger
      subclass_source: FRHoF
      feature: Bladesong
      source: FRHoF
      level: 3
      entries:
        - As a {@variantrule Bonus Action|XPHB}, you invoke an elven magic called the Bladesong, provided you aren't wearing armor or using a Shield.
        - The Bladesong lasts for 1 minute and ends early if you have the {@condition Incapacitated|XPHB} condition, if you don armor or a Shield, or if you use two hands to make an attack with a weapon. You can dismiss the Bladesong at any time (no action required).
        - While the Bladesong is active, you gain the following benefits. You can invoke the Bladesong a number of times equal to your Intelligence modifier (minimum of once), and you regain all expended uses when you finish a {@variantrule Long Rest|XPHB}. You regain one expended use when you use Arcane Recovery.
        - entries:
            - You gain a bonus to your AC equal to your Intelligence modifier (minimum of +1), and your {@variantrule Speed|XPHB} increases by 10 feet. In addition, you have {@variantrule Advantage|XPHB} on Dexterity ({@skill Acrobatics|XPHB}) checks.
          name: Agility
          type: entries
        - entries:
            - Whenever you attack with a weapon with which you have proficiency, you can use your Intelligence modifier for the attack and damage rolls instead of using Strength or Dexterity.
          name: Bladework
          type: entries
        - entries:
            - When you make a Constitution saving throw to maintain {@status Concentration|XPHB}, you can add your Intelligence modifier to the total.
          name: Focus
          type: entries
    - class_name: Wizard
      class_source: XPHB
      subclass_name: Bladesinger
      subclass_source: FRHoF
      feature: Training in War and Song
      source: FRHoF
      level: 3
      entries:
        - You gain proficiency with all Melee Martial weapons that don't have the {@itemProperty 2H|XPHB|Two-Handed} or {@itemProperty H|XPHB|Heavy} property. You can use a Melee weapon with which you have proficiency as a {@variantrule Spellcasting Focus|XPHB} for your Wizard spells.
        - 'You also gain proficiency in one of the following skills of your choice: {@skill Acrobatics|XPHB}, {@skill Athletics|XPHB}, {@skill Performance|XPHB}, or {@skill Persuasion|XPHB}.'
    - class_name: Wizard
      class_source: XPHB
      subclass_name: Bladesinger
      subclass_source: FRHoF
      feature: Extra Attack
      source: FRHoF
      level: 6
      entries:
        - You can attack twice, instead of once, whenever you take the {@action Attack|XPHB} action on your turn. Moreover, you can cast {@filter one of your Wizard cantrips that has a casting time of an action|spells|level=0|class=wizard|cast time=action} in place of one of those attacks.
    - class_name: Wizard
      class_source: XPHB
      subclass_name: Bladesinger
      subclass_source: FRHoF
      feature: Song of Defense
      source: FRHoF
      level: 10
      entries:
        - When you take damage while your Bladesong is active, you can take a {@variantrule Reaction|XPHB} to expend one spell slot and reduce the damage taken by an amount equal to five times the spell slot's level.
    - class_name: Wizard
      class_source: XPHB
      subclass_name: Bladesinger
      subclass_source: FRHoF
      feature: Song of Victory
      source: FRHoF
      level: 14
      entries:
        - After you cast a spell that has a casting time of an action, you can make one attack with a weapon as a {@variantrule Bonus Action|XPHB}.
    - class_name: Wizard
      class_source: XPHB
      subclass_name: Bladesinging
      subclass_source: TCE
      feature: Bladesinging
      source: TCE
      level: 3
    - class_name: Wizard
      class_source: XPHB
      subclass_name: Chronurgy
      subclass_source: EGW
      feature: Chronurgy Magic
      source: EGW
      level: 3
    - class_name: Wizard
      class_source: XPHB
      subclass_name: Conjuration
      subclass_source: PHB
      feature: School of Conjuration
      source: PHB
      level: 3
    - class_name: Wizard
      class_source: XPHB
      subclass_name: Divination
      subclass_source: PHB
      feature: School of Divination
      source: PHB
      level: 3
    - class_name: Wizard
      class_source: XPHB
      subclass_name: Diviner
      subclass_source: XPHB
      feature: Divination Savant
      source: XPHB
      level: 3
      entries:
        - Choose two {@filter Wizard spells from the Divination school|spells|level=0;1;2|class=Wizard|school=D}, each of which must be no higher than level 2, and add them to your spellbook for free.
        - In addition, whenever you gain access to a new level of spell slots in this class, you can add one {@filter Wizard spell from the Divination school|spells|class=Wizard|school=D} to your spellbook for free. The chosen spell must be of a level for which you have spell slots.
    - class_name: Wizard
      class_source: XPHB
      subclass_name: Diviner
      subclass_source: XPHB
      feature: Diviner
      source: XPHB
      level: 3
      entries:
        - '{@i Learn the Secrets of the Multiverse}'
        - The counsel of a Diviner is sought by those who want a clearer understanding of the past, present, and future. As a Diviner, you strive to part the veils of space, time, and consciousness. You work to master spells of discernment, remote viewing, supernatural knowledge, and foresight.
        - subclassFeature: Divination Savant|Wizard|XPHB|Diviner|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Portent|Wizard|XPHB|Diviner|XPHB|3
          type: refSubclassFeature
    - class_name: Wizard
      class_source: XPHB
      subclass_name: Diviner
      subclass_source: XPHB
      feature: Portent
      source: XPHB
      level: 3
      entries:
        - Glimpses of the future begin to press on your awareness. Whenever you finish a {@variantrule Long Rest|XPHB}, roll two d20s and record the numbers rolled. You can replace any {@variantrule D20 Test|XPHB} made by you or a creature that you can see with one of these foretelling rolls. You must choose to do so before the roll, and you can replace a roll in this way only once per turn.
        - Each foretelling roll can be used only once. When you finish a {@variantrule Long Rest|XPHB}, you lose any unused foretelling rolls.
    - class_name: Wizard
      class_source: XPHB
      subclass_name: Diviner
      subclass_source: XPHB
      feature: Expert Divination
      source: XPHB
      level: 6
      entries:
        - Casting Divination spells comes so easily to you that it expends only a fraction of your spellcasting efforts. When you cast a Divination spell using a level 2+ spell slot, you regain one expended spell slot. The slot you regain must be of a level lower than the slot you expended and can't be higher than level 5.
    - class_name: Wizard
      class_source: XPHB
      subclass_name: Diviner
      subclass_source: XPHB
      feature: The Third Eye
      source: XPHB
      level: 10
      entries:
        - You can increase your powers of perception. As a {@variantrule Bonus Action|XPHB}, choose one of the following benefits, which lasts until you start a {@variantrule Short Rest|XPHB|Short} or {@variantrule Long Rest|XPHB}. You can't use this feature again until you finish a {@variantrule Short Rest|XPHB|Short} or {@variantrule Long Rest|XPHB}.
        - entries:
            - entries:
                - You gain {@sense Darkvision|XPHB} with a range of 120 feet.
              name: Darkvision
              type: entries
            - entries:
                - You can read any language.
              name: Greater Comprehension
              type: entries
            - entries:
                - You can cast {@spell See Invisibility|XPHB} without expending a spell slot.
              name: See Invisibility
              type: entries
          type: entries
