    - class_name: Druid
      class_source: PHB
      subclass_name: Land
      subclass_source: PHB
      feature: Natural Recovery
      source: PHB
      level: 2
      entries:
        - Starting at 2nd level, you can regain some of your magical energy by sitting in meditation and communing with nature. During a short rest, you choose expended spell slots to recover. The spell slots can have a combined level that is equal to or less than half your druid level (rounded up), and none of the slots can be 6th level or higher. You can't use this feature again until you finish a long rest.
        - For example, when you are a 4th-level druid, you can recover up to two levels worth of spell slots. You can recover either a 2nd-level slot or two 1st-level slots.
    - class_name: Druid
      class_source: PHB
      subclass_name: Land
      subclass_source: PHB
      feature: Land's Stride
      source: PHB
      level: 6
      entries:
        - Starting at 6th level, moving through nonmagical {@quickref difficult terrain||3} costs you no extra movement. You can also pass through nonmagical plants without being slowed by them and without taking damage from them if they have thorns, spines, or a similar hazard.
        - In addition, you have advantage on saving throws against plants that are magically created or manipulated to impede movement, such as those created by the {@spell entangle} spell.
    - class_name: Druid
      class_source: PHB
      subclass_name: Land
      subclass_source: PHB
      feature: Nature's Ward
      source: PHB
      level: 10
      entries:
        - When you reach 10th level, you can't be {@condition charmed} or {@condition frightened} by elementals or fey, and you are immune to poison and disease.
    - class_name: Druid
      class_source: PHB
      subclass_name: Land
      subclass_source: PHB
      feature: Nature's Sanctuary
      source: PHB
      level: 14
      entries:
        - When you reach 14th level, creatures of the natural world sense your connection to nature and become hesitant to attack you. When a beast or plant creature attacks you, that creature must make a Wisdom saving throw against your druid spell save DC. On a failed save, the creature must choose a different target, or the attack automatically misses. On a successful save, the creature is immune to this effect for 24 hours.
        - The creature is aware of this effect before it makes its attack against you.
    - class_name: Druid
      class_source: PHB
      subclass_name: Moon
      subclass_source: PHB
      feature: Circle Forms
      source: PHB
      level: 2
      entries:
        - The rites of your circle grant you the ability to transform into more dangerous animal forms. Starting at 2nd level, you can use your Wild Shape to transform into a {@filter beast with a challenge rating as high as 1|bestiary|challenge rating=[&0;&1]|type=beast|speed type=!fly;!swim|miscellaneous=!swarm} (you ignore the Max. CR column of the Beast Shapes table, but must abide by the other limitations there).
        - Starting at 6th level, you can transform into a beast with a challenge rating as high as your druid level divided by 3, rounded down.
        - caption: Circle of the Moon Beast Shapes
          colLabels:
            - Level
            - Max. CR
            - Limitations
          colStyles:
            - col-2 text-center
            - col-2 text-center
            - col-8
          rows:
            - - 2nd
              - '{@filter 1|bestiary|challenge rating=[&0;&1]|type=beast|speed type=!fly;!swim|miscellaneous=!swarm}'
              - No flying or swimming speed
            - - 4th
              - '{@filter 1|bestiary|challenge rating=[&0;&1]|type=beast|speed type=!fly|miscellaneous=!swarm}'
              - No flying speed
            - - 6th
              - '{@filter 2|bestiary|challenge rating=[&0;&2]|type=beast|speed type=!fly|miscellaneous=!swarm}'
              - No flying speed
            - - 8th
              - '{@filter 2|bestiary|challenge rating=[&0;&2]|type=beast|miscellaneous=!swarm}'
              - —
            - - 9th
              - '{@filter 3|bestiary|challenge rating=[&0;&3]|type=beast|miscellaneous=!swarm}'
              - —
            - - 12th
              - '{@filter 4|bestiary|challenge rating=[&0;&4]|type=beast|miscellaneous=!swarm}'
              - —
            - - 15th
              - '{@filter 5|bestiary|challenge rating=[&0;&5]|type=beast|miscellaneous=!swarm}'
              - —
            - - 18th
              - '{@filter 6|bestiary|challenge rating=[&0;&6]|type=beast|miscellaneous=!swarm}'
              - —
          type: table
    - class_name: Druid
      class_source: PHB
      subclass_name: Moon
      subclass_source: PHB
      feature: Circle of the Moon
      source: PHB
      level: 2
      entries:
        - Druids of the Circle of the Moon are fierce guardians of the wilds. Their order gathers under the full moon to share news and trade warnings. They haunt the deepest parts of the wilderness, where they might go for weeks on end before crossing paths with another humanoid creature, let alone another druid.
        - Changeable as the moon, a druid of this circle might prowl as a great cat one night, soar over the treetops as an eagle the next day, and crash through the undergrowth in bear form to drive off a trespassing monster. The wild is in the druid's blood.
        - subclassFeature: Combat Wild Shape|Druid||Moon||2
          type: refSubclassFeature
        - subclassFeature: Circle Forms|Druid||Moon||2
          type: refSubclassFeature
    - class_name: Druid
      class_source: PHB
      subclass_name: Moon
      subclass_source: PHB
      feature: Combat Wild Shape
      source: PHB
      level: 2
      entries:
        - You gain the ability to use Wild Shape on your turn as a bonus action, rather than as an action.
        - Additionally, while you are transformed by Wild Shape, you can use a bonus action to expend one spell slot to regain {@dice 1d8} hit points per level of the spell slot expended.
    - class_name: Druid
      class_source: PHB
      subclass_name: Moon
      subclass_source: PHB
      feature: Primal Strike
      source: PHB
      level: 6
      entries:
        - Starting at 6th level, your attacks in beast form count as magical for the purpose of overcoming resistance and immunity to nonmagical attacks and damage.
    - class_name: Druid
      class_source: PHB
      subclass_name: Moon
      subclass_source: PHB
      feature: Elemental Wild Shape
      source: PHB
      level: 10
      entries:
        - At 10th level, you can expend two uses of Wild Shape at the same time to transform into an {@creature air elemental}, an {@creature earth elemental}, a {@creature fire elemental}, or a {@creature water elemental}.
    - class_name: Druid
      class_source: PHB
      subclass_name: Moon
      subclass_source: PHB
      feature: Thousand Forms
      source: PHB
      level: 14
      entries:
        - By 14th level, you have learned to use magic to alter your physical form in more subtle ways. You can cast the {@spell alter self} spell at will.
    - class_name: Druid
      class_source: PHB
      subclass_name: Shepherd
      subclass_source: XGE
      feature: Circle of the Shepherd
      source: XGE
      level: 2
      entries:
        - Druids of the Circle of the Shepherd commune with the spirits of nature, especially the spirits of beasts and the fey, and call to those spirits for aid. These druids recognize that all living things play a role in the natural world, yet they focus on protecting animals and fey creatures that have difficulty defending themselves. Shepherds, as they are known, see such creatures as their charges. They ward off monsters that threaten them, rebuke hunters who kill more prey than necessary, and prevent civilization from encroaching on rare animal habitats and on sites sacred to the fey. Many of these druids are happiest far from cities and towns, content to spend their days in the company of animals and the fey creatures of the wilds.
        - Members of this circle become adventurers to oppose forces that threaten their charges or to seek knowledge and power that will help them safeguard their charges better. Wherever these druids go, the spirits of the wilderness are with them.
        - subclassFeature: Speech of the Woods|Druid||Shepherd|XGE|2
          type: refSubclassFeature
        - subclassFeature: Spirit Totem|Druid||Shepherd|XGE|2
          type: refSubclassFeature
    - class_name: Druid
      class_source: PHB
      subclass_name: Shepherd
      subclass_source: XGE
      feature: Speech of the Woods
      source: XGE
      level: 2
      entries:
        - At 2nd level, you gain the ability to converse with beasts and many fey.
        - You learn to speak, read, and write {@language Sylvan}. In addition, beasts can understand your speech, and you gain the ability to decipher their noises and motions. Most beasts lack the intelligence to convey or understand sophisticated concepts, but a friendly beast could relay what it has seen or heard in the recent past. This ability doesn't grant you friendship with beasts, though you can combine this ability with gifts to curry favor with them as you would with any nonplayer character.
    - class_name: Druid
      class_source: PHB
      subclass_name: Shepherd
      subclass_source: XGE
      feature: Spirit Totem
      source: XGE
      level: 2
      entries:
        - Starting at 2nd level, you can call forth nature spirits to influence the world around you. As a bonus action, you can magically summon an incorporeal spirit to a point you can see within 60 feet of you. The spirit creates an aura in a 30-foot radius around that point. It counts as neither a creature nor an object, though it has the spectral appearance of the creature it represents.
        - As a bonus action, you can move the spirit up to 60 feet to a point you can see.
        - The spirit persists for 1 minute or until you're {@condition incapacitated}. Once you use this feature, you can't use it again until you finish a short or long rest.
        - The effect of the spirit's aura depends on the type of spirit you summon from the options below.
        - entries:
            - The bear spirit grants you and your allies its might and endurance. Each creature of your choice in the aura when the spirit appears gains temporary hit points equal to 5 + your druid level. In addition, you and your allies gain advantage on Strength checks and Strength saving throws while in the aura.
          name: Bear Spirit
          type: entries
        - entries:
            - The hawk spirit is a consummate hunter, aiding you and your allies with its keen sight. When a creature makes an attack roll against a target in the spirit's aura, you can use your reaction to grant advantage to that attack roll. In addition, you and your allies have advantage on Wisdom ({@skill Perception}) checks while in the aura.
          name: Hawk Spirit
          type: entries
        - entries:
            - The unicorn spirit lends its protection to those nearby. You and your allies gain advantage on all ability checks made to detect creatures in the spirit's aura. In addition, if you cast a spell using a spell slot that restores hit points to any creature inside or outside the aura, each creature of your choice in the aura also regains hit points equal to your druid level.
          name: Unicorn Spirit
          type: entries
    - class_name: Druid
      class_source: PHB
      subclass_name: Shepherd
      subclass_source: XGE
      feature: Mighty Summoner
      source: XGE
      level: 6
      entries:
        - 'Starting at 6th level, beasts and fey that you conjure are more resilient than normal. Any beast or fey summoned or created by a spell that you cast gains the following benefits:'
        - items:
            - 'The creature appears with more hit points than normal: 2 extra hit points per Hit Die it has.'
            - The damage from its natural weapons is considered magical for the purpose of overcoming immunity and resistance to nonmagical attacks and damage.
          type: list
    - class_name: Druid
      class_source: PHB
      subclass_name: Shepherd
      subclass_source: XGE
      feature: Guardian Spirit
      source: XGE
      level: 10
      entries:
        - Beginning at 10th level, your Spirit Totem safeguards the beasts and fey that you call forth with your magic. When a beast or fey that you summoned or created with a spell ends its turn in your Spirit Totem aura, that creature regains a number of hit points equal to half your druid level.
    - class_name: Druid
      class_source: PHB
      subclass_name: Shepherd
      subclass_source: XGE
      feature: Faithful Summons
      source: XGE
      level: 14
      entries:
        - Starting at 14th level, the nature spirits you commune with protect you when you are the most defenseless. If you are reduced to 0 hit points or are {@condition incapacitated} against your will, you can immediately gain the benefits of {@spell conjure animals} as if it were cast using a 9th-level spell slot. It summons four beasts of your choice that are challenge rating 2 or lower. The conjured beasts appear within 20 feet of you. If they receive no commands from you, they protect you from harm and attack your foes. The spell lasts for 1 hour, requiring no {@status concentration}, or until you dismiss it (no action required).
        - Once you use this feature, you can't use it again until you finish a long rest.
    - class_name: Druid
      class_source: PHB
      subclass_name: Spores
      subclass_source: TCE
      feature: Circle of Spores
      source: TCE
      level: 2
      entries:
        - Druids of the Circle of Spores find beauty in decay. They see within mold and other fungi the ability to transform lifeless material into abundant, albeit somewhat strange, life.
        - These druids believe that life and death are parts of a grand cycle, with one leading to the other and then back again. Death isn't the end of life, but instead a change of state that sees life shift into a new form.
        - Druids of this circle have a complex relationship with the undead. Unlike most other druids, they see nothing inherently wrong with undeath, which they consider to be a companion to life and death. But these druids believe that the natural cycle is healthiest when each segment of it is vibrant and changing. Undead that seek to replace all life with undeath, or that try to avoid passing to a final rest, violate the cycle and must be thwarted.
        - subclassFeature: Circle Spells|Druid||Spores|TCE|2
          type: refSubclassFeature
        - subclassFeature: Halo of Spores|Druid||Spores|TCE|2
          type: refSubclassFeature
        - subclassFeature: Symbiotic Entity|Druid||Spores|TCE|2
          type: refSubclassFeature
    - class_name: Druid
      class_source: PHB
      subclass_name: Spores
      subclass_source: TCE
      feature: Circle Spells
      source: TCE
      level: 2
      entries:
        - Your symbiotic link to fungus and your ability to tap into the cycle of life and death grants you access to certain spells. At 2nd level, you learn the {@spell chill touch} cantrip. At 3rd, 5th, 7th, and 9th level you gain access to the spells listed for that level in the Circle of Spores Spells table.
        - Once you gain access to one of these spells, you always have it prepared, and it doesn't count against the number of spells you can prepare each day. If you gain access to a spell that doesn't appear on the druid spell list, the spell is nonetheless a druid spell for you.
        - caption: Circle of Spores Spells
          colLabels:
            - Druid Level
            - Circle Spells
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - 3rd
              - '{@spell blindness/deafness}, {@spell gentle repose}'
            - - 5th
              - '{@spell animate dead}, {@spell gaseous form}'
            - - 7th
              - '{@spell blight}, {@spell confusion}'
            - - 9th
              - '{@spell cloudkill}, {@spell contagion}'
          type: table
    - class_name: Druid
      class_source: PHB
      subclass_name: Spores
      subclass_source: TCE
      feature: Halo of Spores
      source: TCE
      level: 2
      entries:
        - Starting at 2nd level, you are surrounded by invisible, necrotic spores that are harmless until you unleash them on a creature nearby. When a creature you can see moves into a space within 10 feet of you or starts its turn there, you can use your reaction to deal {@damage 1d4} necrotic damage to that creature unless it succeeds on a Constitution saving throw against your spell save DC. The necrotic damage increases to {@damage 1d6} at 6th level, {@damage 1d8} at 10th level, and {@damage 1d10} at 14th level.
    - class_name: Druid
      class_source: PHB
      subclass_name: Spores
      subclass_source: TCE
      feature: Symbiotic Entity
      source: TCE
      level: 2
      entries:
        - 'At 2nd level, you gain the ability to channel magic into your spores. As an action, you can expend a use of your Wild Shape feature to awaken those spores, rather than transforming into a beast form, and you gain 4 temporary hit points for each level you have in this class. While this feature is active, you gain the following benefits:'
        - items:
            - When you deal your Halo of Spores damage, roll the damage die a second time and add it to the total.
            - Your melee weapon attacks deal an extra {@damage 1d6} necrotic damage to any target they hit.
          type: list
        - These benefits last for 10 minutes, until you lose all these temporary hit points, or until you use your Wild Shape again.
    - class_name: Druid
      class_source: PHB
      subclass_name: Spores
      subclass_source: TCE
      feature: Fungal Infestation
      source: TCE
      level: 6
      entries:
        - At 6th level, your spores gain the ability to infest a corpse and animate it. If a beast or a humanoid that is Small or Medium dies within 10 feet of you, you can use your reaction to animate it, causing it to stand up immediately with 1 hit point. The creature uses the {@creature zombie} stat block in the {@book Monster Manual|MM}. It remains animate for 1 hour, after which time it collapses and dies.
        - In combat, the zombie's turn comes immediately after yours. It obeys your mental commands, and the only action it can take is the {@action Attack} action, making one melee attack.
        - You can use this feature a number of times equal to your Wisdom modifier (minimum of once), and you regain all expended uses of it when you finish a long rest.
    - class_name: Druid
      class_source: PHB
      subclass_name: Spores
      subclass_source: TCE
      feature: Spreading Spores
      source: TCE
      level: 10
      entries:
        - At 10th level, you gain the ability to seed an area with deadly spores. As a bonus action while your Symbiotic Entity feature is active, you can hurl spores up to 30 feet away, where they swirl in a 10-foot cube for 1 minute. The spores disappear early if you use this feature again, if you dismiss them as a bonus action, or if your Symbiotic Entity feature is no longer active.
        - Whenever a creature moves into the cube or starts its turn there, that creature takes your Halo of Spores damage, unless the creature succeeds on a Constitution saving throw against your spell save DC. A creature can take this damage no more than once per turn.
        - While the cube of spores persists, you can't use your Halo of Spores reaction.
    - class_name: Druid
      class_source: PHB
      subclass_name: Spores
      subclass_source: TCE
      feature: Fungal Body
      source: TCE
      level: 14
      entries:
        - 'At 14th level, the fungal spores in your body alter you: you can''t be {@condition blinded}, {@condition deafened}, {@condition frightened}, or {@condition poisoned}, and any critical hit against you counts as a normal hit instead, unless you''re {@condition incapacitated}.'
    - class_name: Druid
      class_source: PHB
      subclass_name: Stars
      subclass_source: TCE
      feature: Archer
      source: TCE
      level: 2
      entries:
        - A constellation of an archer appears on you. When you activate this form, and as a bonus action on your subsequent turns while it lasts, you can make a ranged spell attack, hurling a luminous arrow that targets one creature within 60 feet of you. On a hit, the attack deals radiant damage equal to {@damage 1d8} + your Wisdom modifier.
    - class_name: Druid
      class_source: PHB
      subclass_name: Stars
      subclass_source: TCE
      feature: Chalice
      source: TCE
      level: 2
      entries:
        - A constellation of a life-giving goblet appears on you. Whenever you cast a spell using a spell slot that restores hit points to a creature, you or another creature within 30 feet of you can regain hit points equal to {@dice 1d8} + your Wisdom modifier.
    - class_name: Druid
      class_source: PHB
      subclass_name: Stars
      subclass_source: TCE
      feature: Circle of Stars
      source: TCE
      level: 2
      entries:
        - The Circle of Stars allows druids to draw on the power of starlight. These druids have tracked heavenly patterns since time immemorial, discovering secrets hidden amid the constellations. By revealing and understanding these secrets, the Circle of the Stars seeks to harness the powers of the cosmos.
        - Many druids of this circle keep records of the constellations and the stars' effects on the world. Some groups document these observations at megalithic sites, which serve as enigmatic libraries of lore. These repositories might take the form of stone circles, pyramids, petroglyphs, and underground temples-any construction durable enough to protect the circle's sacred knowledge even against a great cataclysm.
        - subclassFeature: Star Map|Druid||Stars|TCE|2
          type: refSubclassFeature
        - subclassFeature: Starry Form|Druid||Stars|TCE|2
          type: refSubclassFeature
    - class_name: Druid
      class_source: PHB
      subclass_name: Stars
      subclass_source: TCE
      feature: Dragon
      source: TCE
      level: 2
      entries:
        - A constellation of a wise dragon appears on you. When you make an Intelligence or a Wisdom check or a Constitution saving throw to maintain {@status concentration} on a spell, you can treat a roll of 9 or lower on the {@dice d20} as a 10.
    - class_name: Druid
      class_source: PHB
      subclass_name: Stars
      subclass_source: TCE
      feature: Star Map
      source: TCE
      level: 2
      entries:
        - '{@i 2nd-level Circle of the Stars feature}'
        - You've created a star chart as part of your heavenly studies. It is a Tiny object and can serve as a spellcasting focus for your druid spells. You determine its form by rolling on the Star Map table or by choosing one.
        - caption: Star Map
          colLabels:
            - d6
            - Map Form
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - "1"
              - A scroll covered with depictions of constellations
            - - "2"
              - A stone tablet with fine holes drilled through it
            - - "3"
              - A speckled owlbear hide, tooled with raised marks
            - - "4"
              - A collection of maps bound in an ebony cover
            - - "5"
              - A crystal that projects starry patterns when placed before a light
            - - "6"
              - Glass disks that depict constellations
          type: table
        - 'While holding this map, you have these benefits:'
        - items:
            - You know the {@spell guidance} cantrip.
            - You have the {@spell guiding bolt} spell prepared. It counts as a druid spell for you, and it doesn't count against the number of spells you can have prepared.
            - You can cast {@spell guiding bolt} without expending a spell slot. You can do so a number of times equal to your proficiency bonus, and you regain all expended uses when you finish a long rest.
          type: list
        - If you lose the map, you can perform a 1-hour ceremony to magically create a replacement. This ceremony can be performed during a short or long rest, and it destroys the previous map.
    - class_name: Druid
      class_source: PHB
      subclass_name: Stars
      subclass_source: TCE
      feature: Starry Form
      source: TCE
      level: 2
      entries:
        - '{@i 2nd-level Circle of the Stars feature}'
        - As a bonus action, you can expend a use of your Wild Shape feature to take on a starry form, rather than transforming into a beast.
        - While in your starry form, you retain your game statistics, but your body becomes luminous; your joints glimmer like stars, and glowing lines connect them as on a star chart. This form sheds bright light in a 10-foot radius and dim light for an additional 10 feet. The form lasts for 10 minutes. It ends early if you dismiss it (no action required), are {@condition incapacitated}, die, or use this feature again.
        - 'Whenever you assume your starry form, choose which of the following constellations glimmers on your body; your choice gives you certain benefits while in the form:'
        - subclassFeature: Archer|Druid||Stars|TCE|2
          type: refSubclassFeature
        - subclassFeature: Chalice|Druid||Stars|TCE|2
          type: refSubclassFeature
        - subclassFeature: Dragon|Druid||Stars|TCE|2
          type: refSubclassFeature
    - class_name: Druid
      class_source: PHB
      subclass_name: Stars
      subclass_source: TCE
      feature: Cosmic Omen
      source: TCE
      level: 6
      entries:
        - '{@i 6th-level Circle of the Stars feature}'
        - 'Whenever you finish a long rest, you can consult your Star Map for omens. When you do so, roll a die. Until you finish your next long rest, you gain access to a special reaction based on whether you rolled an even or an odd number on the die:'
        - items:
            - entry: Whenever a creature you can see within 30 feet of you is about to make an attack roll, a saving throw, or an ability check, you can use your reaction to roll a {@dice d6} and add the number rolled to the total.
              name: Weal (even)
              type: item
            - entry: Whenever a creature you can see within 30 feet of you is about to make an attack roll, a saving throw, or an ability check, you can use your reaction to roll a {@dice d6} and subtract the number rolled from the total.
              name: Woe (odd)
              type: item
          style: list-hang-notitle
          type: list
        - You can use this reaction a number of times equal to your proficiency bonus, and you regain all expended uses when you finish a long rest.
    - class_name: Druid
      class_source: PHB
      subclass_name: Stars
      subclass_source: TCE
      feature: Twinkling Constellations
      source: TCE
      level: 10
      entries:
        - '{@i 10th-level Circle of the Stars feature}'
        - The constellations of your Starry Form improve. The {@damage 1d8} of the Archer and the Chalice becomes {@damage 2d8}, and while the Dragon is active, you have a flying speed of 20 feet and can hover.
        - Moreover, at the start of each of your turns while in your Starry Form, you can change which constellation glimmers on your body.
    - class_name: Druid
      class_source: PHB
      subclass_name: Stars
      subclass_source: TCE
      feature: Full of Stars
      source: TCE
      level: 14
      entries:
        - '{@i 14th-level Circle of the Stars feature}'
        - While in your Starry Form, you become partially incorporeal, giving you resistance to bludgeoning, piercing, and slashing damage.
    - class_name: Druid
      class_source: PHB
      subclass_name: Wildfire
      subclass_source: TCE
      feature: Circle of Wildfire
      source: TCE
      level: 2
      entries:
        - Druids within the Circle of Wildfire understand that destruction is sometimes the precursor of creation, such as when a forest fire promotes later growth. These druids bond with a primal spirit that harbors both destructive and creative power, allowing the druids to create controlled flames that burn away one thing but give life to another.
        - subclassFeature: Circle Spells|Druid||Wildfire|TCE|2
          type: refSubclassFeature
        - subclassFeature: Summon Wildfire Spirit|Druid||Wildfire|TCE|2
          type: refSubclassFeature
    - class_name: Druid
      class_source: PHB
      subclass_name: Wildfire
      subclass_source: TCE
      feature: Circle Spells
      source: TCE
      level: 2
      entries:
        - '{@i 2nd-level Circle of Wildfire feature}'
        - You have formed a bond with a wildfire spirit, a primal being of creation and destruction. Your link with this spirit grants you access to some spells when you reach certain levels in this class, as shown on the Circle of Wildfire Spells table.
        - Once you gain access to one of these spells, you always have it prepared, and it doesn't count against the number of spells you can prepare each day. If you gain access to a spell that doesn't appear on the druid spell list, the spell is nonetheless a druid spell for you.
        - caption: Circle of Wildfire Spells
          colLabels:
            - Druid Level
            - Circle Spells
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - 2nd
              - '{@spell burning hands}, {@spell cure wounds}'
            - - 3rd
              - '{@spell flaming sphere}, {@spell scorching ray}'
            - - 5th
              - '{@spell plant growth}, {@spell revivify}'
            - - 7th
              - '{@spell aura of life}, {@spell fire shield}'
            - - 9th
              - '{@spell flame strike}, {@spell mass cure wounds}'
          type: table
    - class_name: Druid
      class_source: PHB
      subclass_name: Wildfire
      subclass_source: TCE
      feature: Summon Wildfire Spirit
      source: TCE
      level: 2
      entries:
        - '{@i 2nd-level Circle of Wildfire feature}'
        - You can summon the primal spirit bound to your soul. As an action, you can expend one use of your Wild Shape feature to summon your wildfire spirit, rather than assuming a beast form.
        - The spirit appears in an unoccupied space of your choice that you can see within 30 feet of you. Each creature within 10 feet of the spirit (other than you) when it appears must succeed on a Dexterity saving throw against your spell save DC or take {@damage 2d6} fire damage.
        - The spirit is friendly to you and your companions and obeys your commands. See this creature's game statistics in the {@creature Wildfire Spirit|TCE} stat block, which uses your proficiency bonus (PB) in several places. You determine the spirit's appearance. Some spirits take the form of a humanoid figure made of gnarled branches covered in flame, while others look like beasts wreathed in fire.
        - In combat, the spirit shares your initiative count, but it takes its turn immediately after yours. The only action it takes on its turn is the {@action Dodge} action, unless you take a bonus action on your turn to command it to take another action. That action can be one in its stat block or some other action. If you are {@condition incapacitated}, the spirit can take any action of its choice, not just {@action Dodge}.
        - The spirit manifests for 1 hour, until it is reduced to 0 hit points, until you use this feature to summon the spirit again, or until you die.
    - class_name: Druid
      class_source: PHB
      subclass_name: Wildfire
      subclass_source: TCE
      feature: Enhanced Bond
      source: TCE
      level: 6
      entries:
        - '{@i 6th-level Circle of Wildfire feature}'
        - The bond with your wildfire spirit enhances your destructive and restorative spells. Whenever you cast a spell that deals fire damage or restores hit points while your wildfire spirit is summoned, roll a {@dice d8}, and you gain a bonus equal to the number rolled to one damage or healing roll of the spell.
        - In addition, when you cast a spell with a range other than self, the spell can originate from you or your wildfire spirit.
    - class_name: Druid
      class_source: PHB
      subclass_name: Wildfire
      subclass_source: TCE
      feature: Cauterizing Flames
      source: TCE
      level: 10
      entries:
        - '{@i 10th-level Circle of Wildfire feature}'
        - You gain the ability to turn death into magical flames that can heal or incinerate. When a Small or larger creature dies within 30 feet of you or your wildfire spirit, a harmless spectral flame springs forth in the dead creature's space and flickers there for 1 minute. When a creature you can see enters that space, you can use your reaction to extinguish the spectral flame there and either heal the creature or deal fire damage to it. The healing or damage equals {@dice 2d10} + your Wisdom modifier.
        - You can use this reaction a number of times equal to your proficiency bonus, and you regain all expended uses when you finish a long rest.
    - class_name: Druid
      class_source: PHB
      subclass_name: Wildfire
      subclass_source: TCE
      feature: Blazing Revival
      source: TCE
      level: 14
      entries:
        - '{@i 14th-level Circle of Wildfire feature}'
        - The bond with your wildfire spirit can save you from death. If the spirit is within 120 feet of you when you are reduced to 0 hit points and thereby fall {@condition unconscious}, you can cause the spirit to drop to 0 hit points. You then regain half your hit points and immediately rise to your feet.
        - Once you use this feature, you can't use it again until you finish a long rest.
    - class_name: Druid
      class_source: XPHB
      subclass_name: Dreams
      subclass_source: XGE
      feature: Circle of Dreams
      source: XGE
      level: 3
    - class_name: Druid
      class_source: XPHB
      subclass_name: Land
      subclass_source: PHB
      feature: Circle of the Land
      source: PHB
      level: 3
    - class_name: Druid
      class_source: XPHB
      subclass_name: Land
      subclass_source: XPHB
      feature: Circle of the Land
      source: XPHB
      level: 3
      entries:
        - '{@i Celebrate Connection to the Natural World}'
        - The Circle of the Land comprises mystics and sages who safeguard ancient knowledge and rites. These Druids meet within sacred circles of trees or standing stones to whisper primal secrets in Druidic. The circle's wisest members preside as the chief priests of their communities.
        - subclassFeature: Circle of the Land Spells|Druid|XPHB|Land|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Land's Aid|Druid|XPHB|Land|XPHB|3
          type: refSubclassFeature
    - class_name: Druid
      class_source: XPHB
      subclass_name: Land
      subclass_source: XPHB
      feature: Circle of the Land Spells
      source: XPHB
      level: 3
      entries:
        - 'Whenever you finish a {@variantrule Long Rest|XPHB}, choose one type of land: arid, polar, temperate, or tropical. Consult the table below that corresponds to the chosen type; you have the spells listed for your Druid level and lower prepared.'
        - caption: Arid Land
          colLabels:
            - Druid Level
            - Circle Spells
          colStyles:
            - col-1 text-center
            - col-11
          rows:
            - - 3rd
              - '{@spell Blur|XPHB}, {@spell Burning Hands|XPHB}, {@spell Fire Bolt|XPHB}'
            - - 5th
              - '{@spell Fireball|XPHB}'
            - - 7th
              - '{@spell Blight|XPHB}'
            - - 9th
              - '{@spell Wall of Stone|XPHB}'
          type: table
        - caption: Polar Land
          colLabels:
            - Druid Level
            - Circle Spells
          colStyles:
            - col-1 text-center
            - col-11
          rows:
            - - 3rd
              - '{@spell Fog Cloud|XPHB}, {@spell Hold Person|XPHB}, {@spell Ray of Frost|XPHB}'
            - - 5th
              - '{@spell Sleet Storm|XPHB}'
            - - 7th
              - '{@spell Ice Storm|XPHB}'
            - - 9th
              - '{@spell Cone of Cold|XPHB}'
          type: table
        - caption: Temperate Land
          colLabels:
            - Druid Level
            - Circle Spells
          colStyles:
            - col-1 text-center
            - col-11
          rows:
            - - 3rd
              - '{@spell Misty Step|XPHB}, {@spell Shocking Grasp|XPHB}, {@spell Sleep|XPHB}'
            - - 5th
              - '{@spell Lightning Bolt|XPHB}'
            - - 7th
              - '{@spell Freedom of Movement|XPHB}'
            - - 9th
              - '{@spell Tree Stride|XPHB}'
          type: table
        - caption: Tropical Land
          colLabels:
            - Druid Level
            - Circle Spells
          colStyles:
            - col-1 text-center
            - col-11
          rows:
            - - 3rd
              - '{@spell Acid Splash|XPHB}, {@spell Ray of Sickness|XPHB}, {@spell Web|XPHB}'
            - - 5th
              - '{@spell Stinking Cloud|XPHB}'
            - - 7th
              - '{@spell Polymorph|XPHB}'
            - - 9th
              - '{@spell Insect Plague|XPHB}'
          type: table
    - class_name: Druid
      class_source: XPHB
      subclass_name: Land
      subclass_source: XPHB
      feature: Land's Aid
      source: XPHB
      level: 3
      entries:
        - As a {@action Magic|XPHB} action, you can expend a use of your Wild Shape and choose a point within 60 feet of yourself. Vitality-giving flowers and life-draining thorns appear for a moment in a 10-foot-radius {@variantrule Sphere [Area of Effect]|XPHB|Sphere} centered on that point. Each creature of your choice in the {@variantrule Sphere [Area of Effect]|XPHB|Sphere} must make a Constitution saving throw against your spell save DC, taking {@damage 2d6} Necrotic damage on a failed save or half as much damage on a successful one. One creature of your choice in that area regains {@dice 2d6} {@variantrule Hit Points|XPHB}.
        - The damage and healing increase by {@dice 1d6} when you reach Druid levels 10 ({@dice 3d6}) and 14 ({@dice 4d6}).
    - class_name: Druid
      class_source: XPHB
      subclass_name: Land
      subclass_source: XPHB
      feature: Natural Recovery
      source: XPHB
      level: 6
      entries:
        - You can cast one of the level 1+ spells that you have prepared from your Circle Spells feature without expending a spell slot, and you must finish a {@variantrule Long Rest|XPHB} before you do so again.
        - In addition, when you finish a {@variantrule Short Rest|XPHB}, you can choose expended spell slots to recover. The spell slots can have a combined level that is equal to or less than half your Druid level (round up), and none of them can be level 6+. For example, if you're a level 6 Druid, you can recover up to three levels' worth of spell slots. You can recover a level 3 spell slot, a level 2 and a level 1 spell slot, or three level 1 spell slots. Once you recover spell slots with this feature, you can't do so again until you finish a {@variantrule Long Rest|XPHB}.
    - class_name: Druid
      class_source: XPHB
      subclass_name: Land
      subclass_source: XPHB
      feature: Nature's Ward
      source: XPHB
      level: 10
      entries:
        - You are immune to the {@condition Poisoned|XPHB} condition, and you have {@variantrule Resistance|XPHB} to a damage type associated with your current land choice in the Circle Spells feature, as shown in the {@skill Nature|XPHB}'s Ward table.
        - entries:
            - caption: Nature's Ward
              colLabels:
                - Land Type
                - Resistance
              colStyles:
                - col-6
                - col-6
              rows:
                - - Arid
                  - Fire
                - - Polar
                  - Cold
                - - Temperate
                  - Lightning
                - - Tropical
                  - Poison
              type: table
          type: entries
    - class_name: Druid
      class_source: XPHB
      subclass_name: Land
      subclass_source: XPHB
      feature: Nature's Sanctuary
      source: XPHB
      level: 14
      entries:
        - As a {@action Magic|XPHB} action, you can expend a use of your Wild Shape and cause spectral trees and vines to appear in a 15-foot {@variantrule Cube [Area of Effect]|XPHB|Cube} on the ground within 120 feet of yourself. They last there for 1 minute or until you have the {@condition Incapacitated|XPHB} condition or die. You and your allies have {@variantrule Cover|XPHB|Half Cover} while in that area, and your allies gain the current {@variantrule Resistance|XPHB} of your {@skill Nature|XPHB}'s Ward while there.
        - As a {@variantrule Bonus Action|XPHB}, you can move the {@variantrule Cube [Area of Effect]|XPHB|Cube} up to 60 feet to ground within 120 feet of yourself.
    - class_name: Druid
      class_source: XPHB
      subclass_name: Moon
      subclass_source: PHB
      feature: Circle of the Moon
      source: PHB
      level: 3
    - class_name: Druid
      class_source: XPHB
      subclass_name: Moon
      subclass_source: XPHB
      feature: Circle Forms
      source: XPHB
      level: 3
      entries:
        - You can channel lunar magic when you assume a Wild Shape form, granting you the benefits below.
        - entries:
            - entries:
                - The maximum {@variantrule Challenge Rating|XPHB} for the form equals your Druid level divided by 3 (round down).
              name: Challenge Rating
              type: entries
            - entries:
                - Until you leave the form, your AC equals 13 plus your Wisdom modifier if that total is higher than the Beast's AC.
              name: Armor Class
              type: entries
            - entries:
                - You gain a number of {@variantrule Temporary Hit Points|XPHB} equal to three times your Druid level.
              name: Temporary Hit Points
              type: entries
          type: entries
    - class_name: Druid
      class_source: XPHB
      subclass_name: Moon
      subclass_source: XPHB
      feature: Circle of the Moon
      source: XPHB
      level: 3
      entries:
        - '{@i Adopt Animal Forms to Guard the Wilds}'
        - Druids of the Circle of the Moon draw on lunar magic to transform themselves. Their order gathers under the moon to share news and perform rituals.
        - Changeable as the moon, a Druid of this circle might prowl as a great cat one night, soar over the treetops as an eagle the next day, and then crash through undergrowth as a bear to drive off a trespassing monster. The wild is in the Druid's blood.
        - subclassFeature: Circle of the Moon Spells|Druid|XPHB|Moon|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Circle Forms|Druid|XPHB|Moon|XPHB|3
          type: refSubclassFeature
    - class_name: Druid
      class_source: XPHB
      subclass_name: Moon
      subclass_source: XPHB
      feature: Circle of the Moon Spells
      source: XPHB
      level: 3
      entries:
        - When you reach a Druid level specified in the Circle of the Moon Spells table, you thereafter always have the listed spells prepared.
        - In addition, you can cast the spells from this feature while you're in a Wild Shape form.
        - caption: Circle of the Moon Spells
          colLabels:
            - Druid Level
            - Prepared Spells
          colStyles:
            - col-1 text-center
            - col-11
          rows:
            - - "3"
              - '{@spell Cure Wounds|XPHB}, {@spell Moonbeam|XPHB}, {@spell Starry Wisp|XPHB}'
            - - "5"
              - '{@spell Conjure Animals|XPHB}'
            - - "7"
              - '{@spell Fount of Moonlight|XPHB}'
            - - "9"
              - '{@spell Mass Cure Wounds|XPHB}'
          type: table
    - class_name: Druid
      class_source: XPHB
      subclass_name: Moon
      subclass_source: XPHB
      feature: Improved Circle Forms
      source: XPHB
      level: 6
      entries:
        - While in a Wild Shape form, you gain the following benefits.
        - entries:
            - entries:
                - Each of your attacks in a Wild Shape form can deal its normal damage type or Radiant damage. You make this choice each time you hit with those attacks.
              name: Lunar Radiance
              type: entries
            - entries:
                - You can add your Wisdom modifier to your Constitution saving throws.
              name: Increased Toughness
              type: entries
          type: entries
    - class_name: Druid
      class_source: XPHB
      subclass_name: Moon
      subclass_source: XPHB
      feature: Moonlight Step
      source: XPHB
      level: 10
      entries:
        - You magically transport yourself, reappearing amid a burst of moonlight. As a {@variantrule Bonus Action|XPHB}, you teleport up to 30 feet to an unoccupied space you can see, and you have {@variantrule Advantage|XPHB} on the next attack roll you make before the end of this turn.
        - You can use this feature a number of times equal to your Wisdom modifier (minimum of once), and you regain all expended uses when you finish a {@variantrule Long Rest|XPHB}. You can also regain uses by expending a level 2+ spell slot for each use you want to restore (no action required).
    - class_name: Druid
      class_source: XPHB
      subclass_name: Moon
      subclass_source: XPHB
      feature: Lunar Form
      source: XPHB
      level: 14
      entries:
        - The power of the moon suffuses you, granting you the following benefits.
        - entries:
            - entries:
                - Once per turn, you can deal an extra {@damage 2d10} Radiant damage to a target you hit with a Wild Shape form's attack.
              name: Improved Lunar Radiance
              type: entries
            - entries:
                - Whenever you use Moonlight Step, you can also teleport one willing creature. That creature must be within 10 feet of you, and you teleport it to an unoccupied space you can see within 10 feet of your destination space.
              name: Shared Moonlight
              type: entries
          type: entries
    - class_name: Druid
      class_source: XPHB
      subclass_name: Sea
      subclass_source: XPHB
      feature: Circle of the Sea
      source: XPHB
      level: 3
      entries:
        - '{@i Become One with Tides and Storms}'
        - Druids of the Circle of the Sea draw on the tempestuous forces of oceans and storms. Some view themselves as embodiments of nature's wrath, seeking vengeance against those who despoil nature. Others seek mystical unity with nature by attuning themselves to the ebb and flow of the tides, following the rush of currents and waves and listening to the inscrutable whispers and roars of the winds.
        - subclassFeature: Circle of the Sea Spells|Druid|XPHB|Sea|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Wrath of the Sea|Druid|XPHB|Sea|XPHB|3
          type: refSubclassFeature
    - class_name: Druid
      class_source: XPHB
      subclass_name: Sea
      subclass_source: XPHB
      feature: Circle of the Sea Spells
      source: XPHB
      level: 3
      entries:
        - When you reach a Druid level specified in the Circle of the Sea Spells table, you thereafter always have the listed spells prepared.
        - caption: Circle of the Sea Spells
          colLabels:
            - Druid Level
            - Prepared Spells
          colStyles:
            - col-1 text-center
            - col-11
          rows:
            - - 3rd
              - '{@spell Fog Cloud|XPHB}, {@spell Gust of Wind|XPHB}, {@spell Ray of Frost|XPHB}, {@spell Shatter|XPHB}, {@spell Thunderwave|XPHB}'
            - - 5th
              - '{@spell Lightning Bolt|XPHB}, {@spell Water Breathing|XPHB}'
            - - 7th
              - '{@spell Control Water|XPHB}, {@spell Ice Storm|XPHB}'
            - - 9th
              - '{@spell Conjure Elemental|XPHB}, {@spell Hold Monster|XPHB}'
          type: table
    - class_name: Druid
      class_source: XPHB
      subclass_name: Sea
      subclass_source: XPHB
      feature: Wrath of the Sea
      source: XPHB
      level: 3
      entries:
        - As a {@variantrule Bonus Action|XPHB}, you can expend a use of your Wild Shape to manifest a 5-foot {@variantrule Emanation [Area of Effect]|XPHB|Emanation} that takes the form of ocean spray that surrounds you for 10 minutes. It ends early if you dismiss it (no action required), manifest it again, or have the {@condition Incapacitated|XPHB} condition.
        - When you manifest the {@variantrule Emanation [Area of Effect]|XPHB|Emanation} and as a {@variantrule Bonus Action|XPHB} on your subsequent turns, you can choose another creature you can see in the {@variantrule Emanation [Area of Effect]|XPHB|Emanation}. The target must succeed on a Constitution saving throw against your spell save DC or take Cold damage and, if the creature is Large or smaller, be pushed up to 15 feet away from you. To determine this damage, roll a number of d6s equal to your Wisdom modifier (minimum of one die).
    - class_name: Druid
      class_source: XPHB
      subclass_name: Sea
      subclass_source: XPHB
      feature: Aquatic Affinity
      source: XPHB
      level: 6
      entries:
        - The size of the {@variantrule Emanation [Area of Effect]|XPHB|Emanation} created by your Wrath of the Sea increases to 10 feet.
        - In addition, you gain a {@variantrule Swim Speed|XPHB} equal to your {@variantrule Speed|XPHB}.
    - class_name: Druid
      class_source: XPHB
      subclass_name: Sea
      subclass_source: XPHB
      feature: Stormborn
      source: XPHB
      level: 10
      entries:
        - Your Wrath of the Sea confers two more benefits while active, as detailed below.
        - entries:
            - You gain a {@variantrule Fly Speed|XPHB} equal to your {@variantrule Speed|XPHB}.
          name: Flight
          type: entries
        - entries:
            - You have {@variantrule Resistance|XPHB} to Cold, Lightning, and Thunder damage.
          name: Resistance
          type: entries
    - class_name: Druid
      class_source: XPHB
      subclass_name: Sea
      subclass_source: XPHB
      feature: Oceanic Gift
      source: XPHB
      level: 14
      entries:
        - Instead of manifesting the {@variantrule Emanation [Area of Effect]|XPHB|Emanation} of Wrath of the Sea around yourself, you can manifest it around one willing creature within 60 feet of yourself. That creature gains all the benefits of the {@variantrule Emanation [Area of Effect]|XPHB|Emanation} and uses your spell save DC and Wisdom modifier for it.
        - In addition, you can manifest the {@variantrule Emanation [Area of Effect]|XPHB|Emanation} around both the other creature and yourself if you expend two uses of your Wild Shape instead of one when manifesting it.
    - class_name: Druid
      class_source: XPHB
      subclass_name: Shepherd
      subclass_source: XGE
      feature: Circle of the Shepherd
      source: XGE
      level: 3
    - class_name: Druid
      class_source: XPHB
      subclass_name: Spores
      subclass_source: TCE
      feature: Circle of Spores
      source: TCE
      level: 3
    - class_name: Druid
      class_source: XPHB
      subclass_name: Stars
      subclass_source: TCE
      feature: Circle of Stars
      source: TCE
      level: 3
    - class_name: Druid
      class_source: XPHB
      subclass_name: Stars
      subclass_source: XPHB
      feature: Archer
      source: XPHB
      level: 3
      entries:
        - A constellation of an archer appears on you. When you activate this form and as a {@variantrule Bonus Action|XPHB} on your subsequent turns while it lasts, you can make a ranged spell attack, hurling a luminous arrow that targets one creature within 60 feet of yourself. On a hit, the attack deals Radiant damage equal to {@damage 1d8} plus your Wisdom modifier.
    - class_name: Druid
      class_source: XPHB
      subclass_name: Stars
      subclass_source: XPHB
      feature: Chalice
      source: XPHB
      level: 3
      entries:
        - A constellation of a life-giving goblet appears on you. Whenever you cast a spell using a spell slot that restores {@variantrule Hit Points|XPHB} to a creature, you or another creature within 30 feet of you can regain {@variantrule Hit Points|XPHB} equal to {@dice 1d8} plus your Wisdom modifier.
    - class_name: Druid
      class_source: XPHB
      subclass_name: Stars
      subclass_source: XPHB
      feature: Circle of the Stars
      source: XPHB
      level: 3
      entries:
        - '{@i Harness Secrets Hidden in Constellations}'
        - The Circle of the Stars has tracked heavenly patterns since time immemorial, discovering secrets hidden amid the constellations. By understanding these secrets, the Druids of this circle seek to harness the powers of the cosmos.
        - subclassFeature: Star Map|Druid|XPHB|Stars|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Starry Form|Druid|XPHB|Stars|XPHB|3
          type: refSubclassFeature
    - class_name: Druid
      class_source: XPHB
      subclass_name: Stars
      subclass_source: XPHB
      feature: Dragon
      source: XPHB
      level: 3
      entries:
        - A constellation of a wise dragon appears on you. When you make an Intelligence or a Wisdom check or a Constitution saving throw to maintain {@status Concentration|XPHB}, you can treat a roll of 9 or lower on the {@dice d20} as a 10.
    - class_name: Druid
      class_source: XPHB
      subclass_name: Stars
      subclass_source: XPHB
      feature: Star Map
      source: XPHB
      level: 3
      entries:
        - You've created a star chart as part of your heavenly studies. It is a Tiny object, and you can use it as a {@variantrule Spellcasting Focus|XPHB} for your Druid spells. You determine its form by rolling on the Star Map table or by choosing one.
        - While holding the map, you have the {@spell Guidance|XPHB} and {@spell Guiding Bolt|XPHB} spells prepared, and you can cast {@spell Guiding Bolt|XPHB} without expending a spell slot. You can cast it in that way a number of times equal to your Wisdom modifier (minimum of once), and you regain all expended uses when you finish a {@variantrule Long Rest|XPHB}.
        - If you lose the map, you can perform a 1-hour ceremony to magically create a replacement. This ceremony can be performed during a {@variantrule Short Rest|XPHB|Short} or {@variantrule Long Rest|XPHB}, and it destroys the previous map.
        - caption: Star Map
          colLabels:
            - '{@dice 1d6}'
            - Map Form
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - "1"
              - A scroll bearing depictions of constellations
            - - "2"
              - A stone tablet with fine holes drilled through it
            - - "3"
              - An owlbear hide tooled with stellar symbols
            - - "4"
              - A collection of maps bound in an ebony cover
            - - "5"
              - A crystal engraved with starry patterns
            - - "6"
              - A glass disk etched with constellations
          type: table
    - class_name: Druid
      class_source: XPHB
      subclass_name: Stars
      subclass_source: XPHB
      feature: Starry Form
      source: XPHB
      level: 3
      entries:
        - As a {@variantrule Bonus Action|XPHB}, you can expend a use of your Wild Shape feature to take on a starry form rather than shape-shifting.
        - While in your starry form, you retain your game statistics, but your body becomes luminous, your joints glimmer like stars, and glowing lines connect them as on a star chart. This form sheds {@variantrule Bright Light|XPHB} in a 10-foot radius and {@variantrule Dim Light|XPHB} for an additional 10 feet. The form lasts for 10 minutes. It ends early if you dismiss it (no action required), have the {@condition Incapacitated|XPHB} condition, or use this feature again.
        - Whenever you assume your starry form, choose which of the following constellations glimmers on your body; your choice gives you certain benefits while in the form.
        - subclassFeature: Archer|Druid|XPHB|Stars|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Chalice|Druid|XPHB|Stars|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Dragon|Druid|XPHB|Stars|XPHB|3
          type: refSubclassFeature
    - class_name: Druid
      class_source: XPHB
      subclass_name: Stars
      subclass_source: XPHB
      feature: Cosmic Omen
      source: XPHB
      level: 6
      entries:
        - 'Whenever you finish a {@variantrule Long Rest|XPHB}, you can consult your Star Map for omens and roll a die. Until you finish your next {@variantrule Long Rest|XPHB}, you gain access to a special {@variantrule Reaction|XPHB} based on whether you rolled an even or an odd number on the die:'
        - items:
            - entries:
                - Whenever a creature you can see within 30 feet of you is about to make a {@variantrule D20 Test|XPHB}, you can take a {@variantrule Reaction|XPHB} to roll {@dice 1d6} and add the number rolled to the total.
              name: Weal (even)
              type: item
            - entries:
                - Whenever a creature you can see within 30 feet of you is about to make a {@variantrule D20 Test|XPHB}, you can take a {@variantrule Reaction|XPHB} to roll {@dice 1d6} and subtract the number rolled from the total.
              name: Woe (odd)
              type: item
          style: list-hang-notitle
          type: list
        - You can use this {@variantrule Reaction|XPHB} a number of times equal to your Wisdom modifier (minimum of once), and you regain all expended uses when you finish a {@variantrule Long Rest|XPHB}.
    - class_name: Druid
      class_source: XPHB
      subclass_name: Stars
      subclass_source: XPHB
      feature: Twinkling Constellations
      source: XPHB
      level: 10
      entries:
        - The constellations of your Starry Form improve. The {@damage 1d8} of the Archer and the Chalice becomes {@damage 2d8}, and while the Dragon is active, you have a {@variantrule Fly Speed|XPHB} of 20 feet and can hover.
        - Moreover, at the start of each of your turns while in your Starry Form, you can change which constellation glimmers on your body.
    - class_name: Druid
      class_source: XPHB
      subclass_name: Stars
      subclass_source: XPHB
      feature: Full of Stars
      source: XPHB
      level: 14
      entries:
        - While in your Starry Form, you become partially incorporeal, giving you {@variantrule Resistance|XPHB} to Bludgeoning, Piercing, and Slashing damage.
    - class_name: Druid
      class_source: XPHB
      subclass_name: Wildfire
      subclass_source: TCE
      feature: Circle of Wildfire
      source: TCE
      level: 3
    - class_name: Fighter
      class_source: PHB
      subclass_name: Arcane Archer
      subclass_source: XGE
      feature: Arcane Archer
      source: XGE
      level: 3
      entries:
        - An Arcane Archer studies a unique elven method of archery that weaves magic into attacks to produce supernatural effects. Arcane Archers are some of the most elite warriors among the elves. They stand watch over the fringes of elven domains, keeping a keen eye out for trespassers and using magic-infused arrows to defeat monsters and invaders before they can reach elven settlements. Over the centuries, the methods of these elf archers have been learned by members of other races who can also balance arcane aptitude with archery.
        - subclassFeature: Arcane Archer Lore|Fighter||Arcane Archer|XGE|3
          type: refSubclassFeature
        - subclassFeature: Arcane Shot|Fighter||Arcane Archer|XGE|3
          type: refSubclassFeature
        - subclassFeature: Arcane Shot Options|Fighter||Arcane Archer|XGE|3
          type: refSubclassFeature
    - class_name: Fighter
      class_source: PHB
      subclass_name: Arcane Archer
      subclass_source: XGE
      feature: Arcane Archer Lore
      source: XGE
      level: 3
      entries:
        - At 3rd level, you learn magical theory or some of the secrets of nature—typical for practitioners of this elven martial tradition. You choose to gain proficiency in either the {@skill Arcana} or the {@skill Nature} skill, and you choose to learn either the {@spell prestidigitation} or the {@spell druidcraft} cantrip.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Arcane Archer
      subclass_source: XGE
      feature: Arcane Shot
      source: XGE
      level: 3
      entries:
        - At 3rd level, you learn to unleash special magical effects with some of your shots. When you gain this feature, you learn two Arcane Shot options of your choice (see "Arcane Shot Options" below).
        - Once per turn when you fire an arrow from a shortbow or longbow as part of the {@action Attack} action, you can apply one of your Arcane Shot options to that arrow. You decide to use the option when the arrow hits a creature, unless the option doesn't involve an attack roll. You have two uses of this ability, and you regain all expended uses of it when you finish a short or long rest.
        - 'You gain an additional Arcane Shot option of your choice when you reach certain levels in this class: 7th, 10th, 15th, and 18th level. Each option also improves when you become an 18th-level fighter.'
    - class_name: Fighter
      class_source: PHB
      subclass_name: Arcane Archer
      subclass_source: XGE
      feature: Arcane Shot Options
      source: XGE
      level: 3
      entries:
        - The Arcane Shot feature lets you choose options for it at certain levels. The options are presented here in alphabetical order. They are all magical effects, and each one is associated with one of the schools of magic.
        - 'If an option requires a saving throw, your Arcane Shot save DC is calculated as follows:'
        - attributes:
            - int
          name: Arcane Shot
          type: abilityDc
        - count: 2
          entries:
            - optionalfeature: Banishing Arrow|XGE
              type: refOptionalfeature
            - optionalfeature: Beguiling Arrow|XGE
              type: refOptionalfeature
            - optionalfeature: Bursting Arrow|XGE
              type: refOptionalfeature
            - optionalfeature: Enfeebling Arrow|XGE
              type: refOptionalfeature
            - optionalfeature: Grasping Arrow|XGE
              type: refOptionalfeature
            - optionalfeature: Piercing Arrow|XGE
              type: refOptionalfeature
            - optionalfeature: Seeking Arrow|XGE
              type: refOptionalfeature
            - optionalfeature: Shadow Arrow|XGE
              type: refOptionalfeature
          type: options
    - class_name: Fighter
      class_source: PHB
      subclass_name: Arcane Archer
      subclass_source: XGE
      feature: Additional Arcane Shot Option
      source: XGE
      level: 7
      entries:
        - You gain an additional Arcane Shot option of your choice when you reach 7th level.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Arcane Archer
      subclass_source: XGE
      feature: Curving Shot
      source: XGE
      level: 7
      entries:
        - At 7th level, you learn how to direct an errant arrow toward a new target. When you make an attack roll with a magic arrow and miss, you can use a bonus action to reroll the attack roll against a different target within 60 feet of the original target.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Arcane Archer
      subclass_source: XGE
      feature: Magic Arrow
      source: XGE
      level: 7
      entries:
        - At 7th level, you gain the ability to infuse arrows with magic. Whenever you fire a nonmagical arrow from a shortbow or longbow, you can make it magical for the purpose of overcoming resistance and immunity to nonmagical attacks and damage. The magic fades from the arrow immediately after it hits or misses its target.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Arcane Archer
      subclass_source: XGE
      feature: Additional Arcane Shot Option
      source: XGE
      level: 10
      entries:
        - You gain an additional Arcane Shot option of your choice when you reach 10th level.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Arcane Archer
      subclass_source: XGE
      feature: Additional Arcane Shot Option
      source: XGE
      level: 15
      entries:
        - You gain an additional Arcane Shot option of your choice when you reach 15th level.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Arcane Archer
      subclass_source: XGE
      feature: Ever-Ready Shot
      source: XGE
      level: 15
      entries:
        - Starting at 15th level, your magical archery is available whenever battle starts. If you roll initiative and have no uses of Arcane Shot remaining, you regain one use of it.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Arcane Archer
      subclass_source: XGE
      feature: Additional Arcane Shot Option
      source: XGE
      level: 18
      entries:
        - You gain an additional Arcane Shot option of your choice when you reach 18th level. Each option also improves when you become an 18th-level fighter.
    - class_name: Fighter
      class_source: PHB
      subclass_name: Battle Master
      subclass_source: PHB
      feature: Battle Master
      source: PHB
      level: 3
      entries:
        - Those who emulate the archetypal Battle Master employ martial techniques passed down through generations. To a Battle Master, combat is an academic field, sometimes including subjects beyond battle such as weaponsmithing and calligraphy. Not every fighter absorbs the lessons of history, theory, and artistry that are reflected in the Battle Master archetype, but those who do are well-rounded fighters of great skill and knowledge.
        - subclassFeature: Student of War|Fighter||Battle Master||3
          type: refSubclassFeature
        - subclassFeature: Combat Superiority|Fighter||Battle Master||3
          type: refSubclassFeature
        - subclassFeature: Maneuvers|Fighter||Battle Master||3
          type: refSubclassFeature
        - subclassFeature: Maneuver Options|Fighter||Battle Master||3|TCE
          type: refSubclassFeature
    - class_name: Fighter
      class_source: PHB
      subclass_name: Battle Master
      subclass_source: PHB
      feature: Combat Superiority
      source: PHB
      level: 3
      entries:
        - When you choose this archetype at 3rd level, you learn maneuvers that are fueled by special dice called superiority dice.
        - entries:
            - entries:
                - You learn three maneuvers of your choice, which are listed under "Maneuvers" below. Many maneuvers enhance an attack in some way. You can use only one maneuver per attack.
                - You learn two additional maneuvers of your choice at 7th, 10th, and 15th level. Each time you learn new maneuvers, you can also replace one maneuver you know with a different one.
              name: Maneuvers
              type: entries
          type: entries
        - entries:
            - entries:
                - You have four superiority dice, which are {@dice d8}s. A superiority die is expended when you use it. You regain all of your expended superiority dice when you finish a short or long rest.
                - You gain another superiority die at 7th level and one more at 15th level.
              name: Superiority Dice
              type: entries
          type: entries
