    - class_name: Sorcerer
      class_source: XPHB
      feature: Epic Boon
      source: XPHB
      level: 19
      entries:
        - You gain an {@filter Epic Boon feat|feats|category=EB} or another {@5etools feat|feats.html} of your choice for which you qualify. {@feat Boon of Dimensional Travel|XPHB} is recommended.
    - class_name: Sorcerer
      class_source: XPHB
      feature: Arcane Apotheosis
      source: XPHB
      level: 20
      entries:
        - While your Innate Sorcery feature is active, you can use one Metamagic option on each of your turns without spending Sorcery Points on it.
    - class_name: Spellcaster Sidekick
      class_source: TCE
      feature: Bonus Proficiencies
      source: TCE
      level: 1
      entries:
        - '{@i 1st-level Spellcaster feature}'
        - 'The sidekick gains proficiency in one saving throw of your choice: Wisdom, Intelligence, or Charisma.'
        - 'In addition, the sidekick gains proficiency in two skills of your choice from the following list: {@skill Arcana}, {@skill History}, {@skill Insight}, {@skill Investigation}, {@skill Medicine}, {@skill Performance}, {@skill Persuasion}, and {@skill Religion}.'
        - The sidekick gains proficiency with light armor, and if it is a humanoid or has a {@filter simple or martial weapon|items|source=phb|category=basic|type=martial weapon;simple weapon} in its stat block, it also gains proficiency with all simple weapons.
    - class_name: Spellcaster Sidekick
      class_source: TCE
      feature: Sidekick Class
      source: TCE
      level: 1
      entries:
        - To gain the Spellcaster class, a creature must have at least one language in its stat block that it can speak.
        - '{@note Note: this class is intended for NPC {@variantrule sidekicks|tce}.}'
    - class_name: Spellcaster Sidekick
      class_source: TCE
      feature: Spellcasting
      source: TCE
      level: 1
      entries:
        - '{@i 1st-level Spellcaster feature}'
        - 'The sidekick gains the ability to cast spells. (If the creature already has the Spellcasting trait, this feature replaces that trait.) Choose the Spellcaster''s role: Mage, Healer, or Prodigy. This choice determines the spell list and spellcasting ability used by the sidekick, as shown on the Spellcasting table.'
        - caption: Spellcasting
          colLabels:
            - Role
            - Spell List
            - Ability
          colStyles:
            - col-4 text-center
            - col-4 text-center
            - col-4 text-center
          rows:
            - - Mage
              - '{@filter Wizard|spells|class=Wizard}'
              - Intelligence
            - - Healer
              - '{@filter Cleric and Druid|spells|class=Cleric;Druid}'
              - Wisdom
            - - Prodigy
              - '{@filter Bard and Warlock|spells|class=Bard;Warlock}'
              - Charisma
          type: table
        - entries:
            - entries:
                - The Spellcaster table shows how many spell slots the sidekick has to cast its Spellcaster spells of 1st level and higher. To cast one of these spells, the sidekick must expend a slot of the spell's level or higher. The sidekick regains all expended spell slots when it finishes a long rest.
              name: Spell Slots
              type: entries
            - entries:
                - 'The sidekick knows two cantrips and one 1st-level spell of your choice from its spell list. Here are recommendations for a 1st-level spellcaster of each role:'
                - items:
                    - entry: '{@spell mage hand}, {@spell ray of frost}, {@spell thunderwave}'
                      name: 'Mage:'
                      type: item
                    - entry: '{@spell cure wounds}, {@spell guidance}, {@spell sacred flame}'
                      name: 'Healer:'
                      type: item
                    - entry: '{@spell eldritch blast}, {@spell healing word}, {@spell light}'
                      name: 'Prodigy:'
                      type: item
                    - The Cantrips Known and Spells Known columns of the Spellcaster table shows when the sidekick learns more spells of your choice. Each of the spells in the Spells Known column must be of a level for which the sidekick has spell slots, as shown on the table. For instance, when the sidekick reaches 5th level in this class, it can learn one new spell of 1st or 2nd level.
                    - Additionally, when the sidekick gains a level in this class, you can choose one of the spells it knows from this class and replace it with another spell from its spell list. The new spell must be a cantrip or of a level for which the sidekick has spell slots.
                  style: list-hang-notitle
                  type: list
              name: Spells Known
              type: entries
            - entries:
                - The sidekick's spellcasting ability for these spells depends on the choice you made on the Spellcasting table.
                - The sidekick uses its spellcasting ability whenever a spell refers to that ability. In addition, it uses its spellcasting ability modifier when setting the saving throw DC for a spell it casts and when making an attack roll with one.
                - attributes:
                    - spellcasting
                  name: Spell
                  type: abilityDc
                - attributes:
                    - spellcasting
                  name: Spell
                  type: abilityAttackMod
              name: Spellcasting Ability
              type: entries
            - entries:
                - The sidekick can use a focus for its spells depending on the choice you made on the Spellcasting table. A Mage can use an arcane focus, a Healer can use a holy symbol, and a Prodigy can use an arcane focus or a {@item musical instrument|PHB}.
              name: Spellcasting Focus
              type: entries
          type: entries
    - class_name: Spellcaster Sidekick
