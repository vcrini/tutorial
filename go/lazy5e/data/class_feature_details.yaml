    - class_name: Expert Sidekick
      class_source: TCE
      feature: Bonus Proficiencies
      source: TCE
      level: 1
      entries:
        - '{@i 1st-level Expert feature}'
        - 'The sidekick gains proficiency in one saving throw of your choice: Dexterity, Intelligence, or Charisma.'
        - In addition, the sidekick gains proficiency in five skills of your choice, and it gains proficiency with light armor. If it is a humanoid or has a {@filter simple or martial weapon|items|source=phb|category=basic|type=martial weapon;simple weapon} in its stat block, it also gains proficiency with all simple weapons and with two tools of your choice.
    - class_name: Expert Sidekick
      class_source: TCE
      feature: Helpful
      source: TCE
      level: 1
      entries:
        - '{@i 1st-level Expert feature}'
        - The sidekick is adept at giving well-timed assistance; the sidekick can take the {@action Help} action as a bonus action.
    - class_name: Expert Sidekick
      class_source: TCE
      feature: Sidekick Class
      source: TCE
      level: 1
      entries:
        - To gain the Expert class, a creature must have at least one language in its stat block that it can speak.
        - '{@note Note: this class is intended for NPC {@variantrule sidekicks|tce}.}'
    - class_name: Expert Sidekick
      class_source: TCE
      feature: Cunning Action
      source: TCE
      level: 2
      entries:
        - '{@i 2nd-level Expert feature}'
        - The sidekick's agility or quick thinking allows it to act speedily. On its turn in combat, it can take the {@action Dash}, {@action Disengage}, or {@action Hide} action as a bonus action.
    - class_name: Expert Sidekick
      class_source: TCE
      feature: Expertise
      source: TCE
      level: 3
      entries:
        - '{@i 3rd-level Expert feature}'
        - Choose two of the sidekick's skill proficiencies. The sidekick's proficiency bonus is doubled for any ability check it makes that uses any of the chosen proficiencies.
        - At 15th level, choose two more of the sidekick's skill proficiencies to gain this benefit.
    - class_name: Expert Sidekick
      class_source: TCE
      feature: Ability Score Improvement
      source: TCE
      level: 4
      entries:
        - '{@i 4th-level Expert feature}'
        - At 4th level and again at 8th, 10th, 12th, 16th, and 19th level, the sidekick increases one ability score of your choice by 2, or the sidekick increases two ability scores of your choice by 1. The sidekick can't increase an ability score above 20 using this feature.
        - If your DM allows the use of feats, the sidekick may instead take a {@5etools feat|feats.html}.
    - class_name: Expert Sidekick
      class_source: TCE
      feature: Coordinated Strike
      source: TCE
      level: 6
      entries:
        - '{@i 6th-level Expert feature}'
        - The sidekick is adept at fighting in concert with a companion. When the sidekick uses its Helpful feature to aid an ally in attacking a creature, that target can be up to 30 feet away from the sidekick, and the sidekick can deal an extra {@damage 2d6} damage to it the next time the sidekick hits it with an attack roll before the end of the current turn. The extra damage is the same type of damage dealt by the attack.
    - class_name: Expert Sidekick
      class_source: TCE
      feature: Evasion
      source: TCE
      level: 7
      entries:
        - '{@i 7th-level Expert feature}'
        - Because of extraordinary good luck, the sidekick is skilled at avoiding danger. When the sidekick is subjected to an effect that allows it to make a Dexterity saving throw to take only half damage, it instead takes no damage if it succeeds on the saving throw, and only half damage if it failed. The sidekick doesn't benefit from this feature while {@condition incapacitated}.
    - class_name: Expert Sidekick
      class_source: TCE
      feature: Ability Score Improvement
      source: TCE
      level: 8
      entries:
        - '{@i 8th-level Expert feature}'
        - At 4th level and again at 8th, 10th, 12th, 16th, and 19th level, the sidekick increases one ability score of your choice by 2, or the sidekick increases two ability scores of your choice by 1. The sidekick can't increase an ability score above 20 using this feature.
        - If your DM allows the use of feats, the sidekick may instead take a {@5etools feat|feats.html}.
    - class_name: Expert Sidekick
      class_source: TCE
      feature: Ability Score Improvement
      source: TCE
      level: 10
      entries:
        - '{@i 10th-level Expert feature}'
        - At 4th level and again at 8th, 10th, 12th, 16th, and 19th level, the sidekick increases one ability score of your choice by 2, or the sidekick increases two ability scores of your choice by 1. The sidekick can't increase an ability score above 20 using this feature.
        - If your DM allows the use of feats, the sidekick may instead take a {@5etools feat|feats.html}.
    - class_name: Expert Sidekick
      class_source: TCE
      feature: Inspiring Help
      source: TCE
      level: 11
      entries:
        - '{@i 11th-level Expert feature}'
        - When the sidekick takes the {@action Help} action, the creature who receives the help also gains a {@dice 1d6} bonus to the {@dice d20} roll. If that roll is an attack roll, the creature can forgo adding the bonus to it, and then if the attack hits, the creature can add the bonus to the attack's damage roll against one target.
        - At 20th level, the bonus increases to {@dice 2d6}.
    - class_name: Expert Sidekick
      class_source: TCE
      feature: Ability Score Improvement
      source: TCE
      level: 12
      entries:
        - '{@i 12th-level Expert feature}'
        - At 4th level and again at 8th, 10th, 12th, 16th, and 19th level, the sidekick increases one ability score of your choice by 2, or the sidekick increases two ability scores of your choice by 1. The sidekick can't increase an ability score above 20 using this feature.
        - If your DM allows the use of feats, the sidekick may instead take a {@5etools feat|feats.html}.
    - class_name: Expert Sidekick
      class_source: TCE
      feature: Reliable Talent
      source: TCE
      level: 14
      entries:
        - '{@i 14th-level Expert feature}'
        - The sidekick has refined its skills to an exceptional degree. Whenever the sidekick makes an ability check that includes its whole proficiency bonus, it can treat a {@dice d20} roll of 9 or lower as a 10.
    - class_name: Expert Sidekick
      class_source: TCE
      feature: Expertise
      source: TCE
