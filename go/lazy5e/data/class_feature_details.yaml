    - class_name: Monk
      class_source: PHB
      feature: Martial Arts
      source: PHB
      level: 1
      entries:
        - Your practice of martial arts gives you mastery of combat styles that use unarmed strikes and monk weapons, which are {@item shortsword|phb|shortswords} and any {@filter simple melee weapons that don't have the two-handed or heavy property|items|source=phb|category=basic|type=simple weapon;melee weapon=sand|property=!heavy;!two-handed}.
        - You gain the following benefits while you are unarmed or wielding only monk weapons and you aren't wearing armor or wielding a {@item shield|phb}.
        - items:
            - You can use Dexterity instead of Strength for the attack and damage rolls of your unarmed strikes and monk weapons.
            - You can roll a {@dice d4} in place of the normal damage of your unarmed strike or monk weapon. This die changes as you gain monk levels, as shown in the Martial Arts column of the Monk table.
            - When you use the {@action Attack} action with an unarmed strike or a monk weapon on your turn, you can make one unarmed strike as a bonus action. For example, if you take the {@action Attack} action and attack with a quarterstaff, you can also make an unarmed strike as a bonus action, assuming you haven't already taken a bonus action this turn.
          type: list
        - Certain monasteries use specialized forms of the monk weapons. For example, you might use a club that is two lengths of wood connected by a short chain (called a nunchaku) or a sickle with a shorter, straighter blade (called a kama).
    - class_name: Monk
      class_source: PHB
      feature: Unarmored Defense
      source: PHB
      level: 1
      entries:
        - Beginning at 1st level, while you are wearing no armor and not wielding a shield, your AC equals 10 + your Dexterity modifier + your Wisdom modifier.
    - class_name: Monk
      class_source: PHB
      feature: Dedicated Weapon
      source: TCE
      level: 2
      entries:
        - '{@i 2nd-level monk {@variantrule optional class features|tce|optional feature}}'
        - You train yourself to use a variety of weapons as monk weapons, not just simple melee weapons and shortswords. Whenever you finish a short or long rest, you can touch one weapon, focus your ki on it, and then count that weapon as a monk weapon until you use this feature again.
        - 'The chosen weapon must meet these criteria:'
        - items:
            - The weapon must be a {@filter simple or martial weapon|items|source=phb|category=basic|type=martial weapon;simple weapon|property=!heavy;!special}.
            - You must be proficient with it.
            - It must lack the heavy and special properties.
          type: list
    - class_name: Monk
      class_source: PHB
      feature: Flurry of Blows
      source: PHB
      level: 2
      entries:
        - Immediately after you take the {@action Attack} action on your turn, you can spend 1 ki point to make two unarmed strikes as a bonus action.
    - class_name: Monk
      class_source: PHB
      feature: Ki
      source: PHB
      level: 2
      entries:
        - Starting at 2nd level, your training allows you to harness the mystic energy of ki. Your access to this energy is represented by a number of ki points. Your monk level determines the number of points you have, as shown in the Ki Points column of the Monk table.
        - 'You can spend these points to fuel various ki features. You start knowing three such features: Flurry of Blows, Patient Defense, and Step of the Wind. You learn more ki features as you gain levels in this class.'
        - When you spend a ki point, it is unavailable until you finish a short or long rest, at the end of which you draw all of your expended ki back into yourself. You must spend at least 30 minutes of the rest meditating to regain your ki points.
        - 'Some of your ki features require your target to make a saving throw to resist the feature''s effects. The saving throw DC is calculated as follows:'
        - attributes:
            - wis
          name: Ki
          type: abilityDc
        - entries:
            - classFeature: Flurry of Blows|Monk||2
              type: refClassFeature
            - classFeature: Patient Defense|Monk||2
              type: refClassFeature
            - classFeature: Step of the Wind|Monk||2
              type: refClassFeature
          type: entries
    - class_name: Monk
      class_source: PHB
      feature: Patient Defense
      source: PHB
      level: 2
      entries:
        - You can spend 1 ki point to take the {@action Dodge} action as a bonus action on your turn.
    - class_name: Monk
      class_source: PHB
      feature: Step of the Wind
      source: PHB
      level: 2
      entries:
        - You can spend 1 ki point to take the {@action Disengage} or {@action Dash} action as a bonus action on your turn, and your jump distance is doubled for the turn.
    - class_name: Monk
      class_source: PHB
      feature: Unarmored Movement
      source: PHB
      level: 2
      entries:
        - Starting at 2nd level, your speed increases by 10 feet while you are not wearing armor or wielding a shield. This bonus increases when you reach certain monk levels, as shown in the Monk table.
        - At 9th level, you gain the ability to move along vertical surfaces and across liquids on your turn without falling during the move.
    - class_name: Monk
      class_source: PHB
      feature: Deflect Missiles
      source: PHB
      level: 3
      entries:
        - Starting at 3rd level, you can use your reaction to deflect or catch the missile when you are hit by a ranged weapon attack. When you do so, the damage you take from the attack is reduced by {@dice 1d10} + your Dexterity modifier + your monk level.
        - If you reduce the damage to 0, you can catch the missile if it is small enough for you to hold in one hand and you have at least one hand free. If you catch a missile in this way, you can spend 1 ki point to make a ranged attack (range 20/60 feet) with the weapon or piece of ammunition you just caught, as part of the same reaction. You make this attack with proficiency, regardless of your weapon proficiencies, and the missile counts as a monk weapon for the attack.
    - class_name: Monk
      class_source: PHB
      feature: Ki-Fueled Attack
      source: TCE
      level: 3
      entries:
        - '{@i 3rd-level monk {@variantrule optional class features|tce|optional feature}}'
        - If you spend 1 ki point or more as part of your action on your turn, you can make one attack with an unarmed strike or a monk weapon as a bonus action before the end of the turn.
    - class_name: Monk
      class_source: PHB
      feature: Monastic Tradition
      source: PHB
      level: 3
      entries:
        - When you reach 3rd level, you commit yourself to a monastic tradition, chosen from the list of available traditions. Your tradition grants you features at 3rd level and again at 6th, 11th, and 17th level.
    - class_name: Monk
      class_source: PHB
      feature: Ability Score Improvement
      source: PHB
      level: 4
      entries:
        - When you reach 4th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can't increase an ability score above 20 using this feature.
        - If your DM allows the use of feats, you may instead take a {@5etools feat|feats.html}.
    - class_name: Monk
      class_source: PHB
      feature: Quickened Healing
      source: TCE
      level: 4
      entries:
        - '{@i 4th-level monk {@variantrule optional class features|tce|optional feature}}'
        - As an action, you can spend 2 ki points and roll a Martial Arts die. You regain a number of hit points equal to the number rolled plus your proficiency bonus.
    - class_name: Monk
      class_source: PHB
      feature: Slow Fall
      source: PHB
      level: 4
      entries:
        - Beginning at 4th level, you can use your reaction when you fall to reduce any falling damage you take by an amount equal to five times your monk level.
    - class_name: Monk
      class_source: PHB
      feature: Extra Attack
      source: PHB
      level: 5
      entries:
        - Beginning at 5th level, you can attack twice, instead of once, whenever you take the {@action Attack} action on your turn.
    - class_name: Monk
      class_source: PHB
      feature: Focused Aim
      source: TCE
      level: 5
      entries:
        - '{@i 5th-level monk {@variantrule optional class features|tce|optional feature}}'
        - When you miss with an attack roll, you can spend 1 to 3 ki points to increase your attack roll by 2 for each of these ki points you spend, potentially turning the miss into a hit.
    - class_name: Monk
      class_source: PHB
      feature: Stunning Strike
      source: PHB
      level: 5
      entries:
        - Starting at 5th level, you can interfere with the flow of ki in an opponent's body. When you hit another creature with a melee weapon attack, you can spend 1 ki point to attempt a stunning strike. The target must succeed on a Constitution saving throw or be {@condition stunned} until the end of your next turn.
    - class_name: Monk
      class_source: PHB
      feature: Ki-Empowered Strikes
      source: PHB
      level: 6
      entries:
        - Starting at 6th level, your unarmed strikes count as magical for the purpose of overcoming resistance and immunity to nonmagical attacks and damage.
    - class_name: Monk
      class_source: PHB
      feature: Monastic Tradition feature
      source: PHB
      level: 6
      entries:
        - At 6th level, you gain one feature granted by your Monastic Tradition.
    - class_name: Monk
      class_source: PHB
      feature: Evasion
      source: PHB
      level: 7
      entries:
        - At 7th level, your instinctive agility lets you dodge out of the way of certain area effects, such as a blue dragon's lightning breath or a {@spell fireball} spell. When you are subjected to an effect that allows you to make a Dexterity saving throw to take only half damage, you instead take no damage if you succeed on the saving throw, and only half damage if you fail.
    - class_name: Monk
      class_source: PHB
      feature: Stillness of Mind
      source: PHB
      level: 7
      entries:
        - Starting at 7th level, you can use your action to end one effect on yourself that is causing you to be {@condition charmed} or {@condition frightened}.
    - class_name: Monk
      class_source: PHB
      feature: Ability Score Improvement
      source: PHB
      level: 8
      entries:
        - When you reach 8th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can't increase an ability score above 20 using this feature.
        - If your DM allows the use of feats, you may instead take a {@5etools feat|feats.html}.
    - class_name: Monk
      class_source: PHB
      feature: Unarmored Movement improvement
      source: PHB
      level: 9
      entries:
        - At 9th level, you gain the ability to move along vertical surfaces and across liquids on your turn without falling during the move.
    - class_name: Monk
      class_source: PHB
      feature: Purity of Body
      source: PHB
      level: 10
      entries:
        - At 10th level, your mastery of the ki flowing through you makes you immune to disease and poison.
    - class_name: Monk
      class_source: PHB
      feature: Monastic Tradition feature
      source: PHB
      level: 11
      entries:
        - At 11th level, you gain one feature granted by your Monastic Tradition.
    - class_name: Monk
      class_source: PHB
      feature: Ability Score Improvement
      source: PHB
      level: 12
      entries:
        - When you reach 12th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can't increase an ability score above 20 using this feature.
        - If your DM allows the use of feats, you may instead take a {@5etools feat|feats.html}.
    - class_name: Monk
      class_source: PHB
      feature: Tongue of the Sun and Moon
      source: PHB
      level: 13
      entries:
        - Starting at 13th level, you learn to touch the ki of other minds so that you understand all spoken languages. Moreover, any creature that can understand a language can understand what you say.
    - class_name: Monk
      class_source: PHB
      feature: Diamond Soul
      source: PHB
      level: 14
      entries:
        - Beginning at 14th level, your mastery of ki grants you proficiency in all saving throws.
        - Additionally, whenever you make a saving throw and fail, you can spend 1 ki point to reroll it and take the second result.
    - class_name: Monk
      class_source: PHB
      feature: Timeless Body
      source: PHB
      level: 15
      entries:
        - At 15th level, your ki sustains you so that you suffer none of the frailty of old age, and you can't be aged magically. You can still die of old age, however. In addition, you no longer need food or water.
    - class_name: Monk
      class_source: PHB
      feature: Ability Score Improvement
      source: PHB
      level: 16
      entries:
        - When you reach 16th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can't increase an ability score above 20 using this feature.
        - If your DM allows the use of feats, you may instead take a {@5etools feat|feats.html}.
    - class_name: Monk
      class_source: PHB
      feature: Monastic Tradition feature
      source: PHB
      level: 17
      entries:
        - At 17th level, you gain one feature granted by your Monastic Tradition.
    - class_name: Monk
      class_source: PHB
      feature: Empty Body
      source: PHB
      level: 18
      entries:
        - Beginning at 18th level, you can use your action to spend 4 ki points to become {@condition invisible} for 1 minute. During that time, you also have resistance to all damage but force damage.
        - Additionally, you can spend 8 ki points to cast the {@spell astral projection} spell, without needing material components. When you do so, you can't take any other creatures with you.
    - class_name: Monk
      class_source: PHB
      feature: Ability Score Improvement
      source: PHB
      level: 19
      entries:
        - When you reach 19th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can't increase an ability score above 20 using this feature.
        - If your DM allows the use of feats, you may instead take a {@5etools feat|feats.html}.
    - class_name: Monk
      class_source: PHB
      feature: Perfect Self
      source: PHB
      level: 20
      entries:
        - At 20th level, when you roll for initiative and have no ki points remaining, you regain 4 ki points.
    - class_name: Monk
      class_source: XPHB
      feature: Bonus Unarmed Strike
      source: XPHB
      level: 1
      entries:
        - You can make an {@variantrule Unarmed Strike|XPHB} as a {@variantrule Bonus Action|XPHB}.
    - class_name: Monk
      class_source: XPHB
      feature: Dexterous Attacks
      source: XPHB
      level: 1
      entries:
        - You can use your Dexterity modifier instead of your Strength modifier for the attack and damage rolls of your Unarmed Strikes and Monk weapons. In addition, when you use the Grapple or Shove option of your {@variantrule Unarmed Strike|XPHB}, you can use your Dexterity modifier instead of your Strength modifier to determine the save DC.
    - class_name: Monk
      class_source: XPHB
      feature: Martial Arts
      source: XPHB
      level: 1
      entries:
        - 'Your practice of martial arts gives you mastery of combat styles that use your {@variantrule Unarmed Strike|XPHB} and Monk weapons, which are the following:'
        - items:
            - '{@filter Simple Melee Weapons|items|type=simple weapon;melee weapon=sand}'
            - '{@filter Martial Melee Weapons that have the Light property|items|type=martial weapon;melee weapon=sand|property=light}'
          type: list
        - You gain the following benefits while you are unarmed or wielding only Monk weapons and you aren't wearing armor or wielding a {@item Shield|XPHB}.
        - entries:
            - classFeature: Bonus Unarmed Strike|Monk|XPHB|1
              type: refClassFeature
            - classFeature: Martial Arts Die|Monk|XPHB|1
              type: refClassFeature
            - classFeature: Dexterous Attacks|Monk|XPHB|1
              type: refClassFeature
          type: entries
    - class_name: Monk
      class_source: XPHB
      feature: Martial Arts Die
      source: XPHB
      level: 1
      entries:
        - You can roll {@damage 1d6} in place of the normal damage of your {@variantrule Unarmed Strike|XPHB} or Monk weapons. This die changes as you gain Monk levels, as shown in the Martial Arts column of the Monk Features table.
    - class_name: Monk
      class_source: XPHB
      feature: Unarmored Defense
      source: XPHB
      level: 1
      entries:
        - While you aren't wearing armor or wielding a {@item Shield|XPHB}, your base {@variantrule Armor Class|XPHB} equals 10 plus your Dexterity and Wisdom modifiers.
    - class_name: Monk
      class_source: XPHB
      feature: Flurry of Blows
      source: XPHB
      level: 2
      entries:
        - You can expend 1 Focus Point to make two Unarmed Strikes as a {@variantrule Bonus Action|XPHB}.
    - class_name: Monk
      class_source: XPHB
      feature: Monk's Focus
      source: XPHB
      level: 2
      entries:
        - Your focus and martial training allow you to harness a well of extraordinary energy within yourself. This energy is represented by Focus Points. Your Monk level determines the number of points you have, as shown in the Focus Points column of the Monk Features table.
        - 'You can expend these points to enhance or fuel certain Monk features. You start knowing three such features: Flurry of Blows, Patient Defense, and Step of the Wind, each of which is detailed below.'
        - When you expend a Focus Point, it is unavailable until you finish a {@variantrule Short Rest|XPHB|Short} or {@variantrule Long Rest|XPHB}, at the end of which you regain all your expended points.
        - Some features that use Focus Points require your target to make a saving throw. The save DC equals 8 plus your Wisdom modifier and {@variantrule Proficiency|XPHB|Proficiency Bonus}.
        - entries:
            - classFeature: Flurry of Blows|Monk|XPHB|2
              type: refClassFeature
            - classFeature: Patient Defense|Monk|XPHB|2
              type: refClassFeature
            - classFeature: Step of the Wind|Monk|XPHB|2
              type: refClassFeature
          type: entries
    - class_name: Monk
      class_source: XPHB
      feature: Patient Defense
      source: XPHB
      level: 2
      entries:
        - You can take the {@action Disengage|XPHB} action as a {@variantrule Bonus Action|XPHB}. Alternatively, you can expend 1 Focus Point to take both the {@action Disengage|XPHB} and the {@action Dodge|XPHB} actions as a {@variantrule Bonus Action|XPHB}.
    - class_name: Monk
      class_source: XPHB
      feature: Step of the Wind
      source: XPHB
      level: 2
      entries:
        - You can take the {@action Dash|XPHB} action as a {@variantrule Bonus Action|XPHB}. Alternatively, you can expend 1 Focus Point to take both the {@action Disengage|XPHB} and {@action Dash|XPHB} actions as a {@variantrule Bonus Action|XPHB}, and your jump distance is doubled for the turn.
    - class_name: Monk
      class_source: XPHB
      feature: Unarmored Movement
      source: XPHB
      level: 2
      entries:
        - Your speed increases by 10 feet while you aren't wearing armor or wielding a {@item Shield|XPHB}. This bonus increases when you reach certain Monk levels, as shown on the Monk Features table.
    - class_name: Monk
      class_source: XPHB
      feature: Uncanny Metabolism
      source: XPHB
      level: 2
      entries:
        - When you roll {@variantrule Initiative|XPHB}, you can regain all expended Focus Points. When you do so, roll your Martial Arts die, and regain a number of {@variantrule Hit Points|XPHB} equal to your Monk level plus the number rolled.
        - Once you use this feature, you can't use it again until you finish a {@variantrule Long Rest|XPHB}.
    - class_name: Monk
      class_source: XPHB
      feature: Deflect Attacks
      source: XPHB
      level: 3
      entries:
        - When an attack roll hits you and its damage includes Bludgeoning, Piercing, or Slashing damage, you can take a {@variantrule Reaction|XPHB} to reduce the attack's total damage against you. The reduction equals {@dice 1d10} plus your Dexterity modifier and Monk level.
        - If you reduce the damage to 0, you can expend 1 Focus Point to redirect some of the attack's force. If you do so, choose a creature you can see within 5 feet of yourself if the attack was a melee attack or a creature you can see within 60 feet of yourself that isn't behind {@variantrule Cover|XPHB|Total Cover} if the attack was a ranged attack. That creature must succeed on a Dexterity saving throw or take damage equal to two rolls of your Martial Arts die plus your Dexterity modifier. The damage is the same type dealt by the attack.
    - class_name: Monk
      class_source: XPHB
      feature: Monk Subclass
      source: XPHB
      level: 3
      entries:
        - You gain a Monk subclass of your choice. A subclass is a specialization that grants you features at certain Monk levels. For the rest of your career, you gain each of your subclass's features that are of your Monk level or lower.
    - class_name: Monk
      class_source: XPHB
      feature: Ability Score Improvement
      source: XPHB
      level: 4
      entries:
        - You gain the {@feat Ability Score Improvement|XPHB} feat or another {@5etools feat|feats.html} of your choice for which you qualify. You gain this feature again at Monk levels 8, 12, and 16.
    - class_name: Monk
      class_source: XPHB
      feature: Slow Fall
      source: XPHB
      level: 4
      entries:
        - You can take a {@variantrule Reaction|XPHB} when you fall to reduce any damage you take from the fall by an amount equal to five times your Monk level.
    - class_name: Monk
      class_source: XPHB
      feature: Extra Attack
      source: XPHB
      level: 5
      entries:
        - You can attack twice instead of once whenever you take the {@action Attack|XPHB} action on your turn.
    - class_name: Monk
      class_source: XPHB
      feature: Stunning Strike
      source: XPHB
      level: 5
      entries:
        - Once per turn when you hit a creature with a Monk weapon or an {@variantrule Unarmed Strike|XPHB}, you can expend 1 Focus Point to attempt a stunning strike. The target must make a Constitution saving throw. On a failed save, the target has the {@condition Stunned|XPHB} condition until the start of your next turn. On a successful save, the target's {@variantrule Speed|XPHB} is halved until the start of your next turn, and the next attack roll made against the target before then has {@variantrule Advantage|XPHB}.
    - class_name: Monk
      class_source: XPHB
      feature: Empowered Strikes
      source: XPHB
      level: 6
      entries:
        - Whenever you deal damage with your {@variantrule Unarmed Strike|XPHB}, it can deal your choice of Force damage or its normal damage type.
    - class_name: Monk
      class_source: XPHB
      feature: Subclass Feature
      source: XPHB
      level: 6
      entries:
        - You gain a feature from your Monk subclass.
    - class_name: Monk
      class_source: XPHB
      feature: Evasion
      source: XPHB
      level: 7
      entries:
        - When you're subjected to an effect that allows you to make a Dexterity saving throw to take only half damage, you instead take no damage if you succeed on the saving throw and only half damage if you fail.
        - You don't benefit from this feature if you have the {@condition Incapacitated|XPHB} condition.
    - class_name: Monk
      class_source: XPHB
      feature: Ability Score Improvement
      source: XPHB
      level: 8
      entries:
        - You gain the {@feat Ability Score Improvement|XPHB} feat or another {@5etools feat|feats.html} of your choice for which you qualify.
    - class_name: Monk
      class_source: XPHB
      feature: Acrobatic Movement
      source: XPHB
      level: 9
      entries:
        - While you aren't wearing armor or wielding a {@item Shield|XPHB}, you gain the ability to move along vertical surfaces and across liquids on your turn without falling during the movement.
    - class_name: Monk
      class_source: XPHB
      feature: Heightened Focus
      source: XPHB
      level: 10
      entries:
        - Your Flurry of Blows, Patient Defense, and Step of the Wind gain the following benefits.
        - entries:
            - entries:
                - You can expend 1 Focus Point to use Flurry of Blows and make three Unarmed Strikes with it instead of two.
              name: Flurry of Blows
              type: entries
            - entries:
                - When you expend a Focus Point to use Patient Defense, you gain a number of {@variantrule Temporary Hit Points|XPHB} equal to two rolls of your Martial Arts die.
              name: Patient Defense
              type: entries
            - entries:
                - When you expend a Focus Point to use Step of the Wind, you can choose a willing creature within 5 feet of yourself that is Large or smaller. You move the creature with you until the end of your turn. The creature's movement doesn't provoke {@action Opportunity Attack|XPHB|Opportunity Attacks}.
              name: Step of the Wind
              type: entries
          name: ""
          type: entries
    - class_name: Monk
      class_source: XPHB
      feature: Self-Restoration
      source: XPHB
      level: 10
      entries:
        - 'Through sheer force of will, you can remove one of the following conditions from yourself at the end of each of your turns: {@condition Charmed|XPHB}, {@condition Frightened|XPHB}, or {@condition Poisoned|XPHB}.'
        - In addition, forgoing food and drink doesn't give you levels of {@condition Exhaustion|XPHB}.
    - class_name: Monk
      class_source: XPHB
      feature: Subclass Feature
      source: XPHB
      level: 11
      entries:
        - You gain a feature from your Monk subclass.
    - class_name: Monk
      class_source: XPHB
      feature: Ability Score Improvement
      source: XPHB
      level: 12
      entries:
        - You gain the {@feat Ability Score Improvement|XPHB} feat or another {@5etools feat|feats.html} of your choice for which you qualify.
    - class_name: Monk
      class_source: XPHB
      feature: Deflect Energy
      source: XPHB
      level: 13
      entries:
        - You can now use your Deflect Attacks feature against attacks that deal any damage type, not just Bludgeoning, Piercing, or Slashing.
    - class_name: Monk
      class_source: XPHB
      feature: Disciplined Survivor
      source: XPHB
      level: 14
      entries:
        - Your physical and mental discipline grant you proficiency in all saving throws.
        - Additionally, whenever you make a saving throw and fail, you can expend 1 Focus Point to reroll it, and you must use the new roll.
    - class_name: Monk
      class_source: XPHB
      feature: Perfect Focus
      source: XPHB
      level: 15
      entries:
        - When you roll {@variantrule Initiative|XPHB} and don't use Uncanny Metabolism, you regain expended Focus Points until you have 4 if you have 3 or fewer.
    - class_name: Monk
      class_source: XPHB
      feature: Ability Score Improvement
      source: XPHB
      level: 16
      entries:
        - You gain the {@feat Ability Score Improvement|XPHB} feat or another {@5etools feat|feats.html} of your choice for which you qualify.
    - class_name: Monk
      class_source: XPHB
      feature: Subclass Feature
      source: XPHB
      level: 17
      entries:
        - You gain a feature from your Monk subclass.
    - class_name: Monk
      class_source: XPHB
      feature: Superior Defense
      source: XPHB
      level: 18
      entries:
        - At the start of your turn, you can expend 3 Focus Points to bolster yourself against harm for 1 minute or until you have the {@condition Incapacitated|XPHB} condition. During that time, you have {@variantrule Resistance|XPHB} to all damage except Force damage.
    - class_name: Monk
      class_source: XPHB
      feature: Epic Boon
      source: XPHB
      level: 19
      entries:
        - You gain an {@filter Epic Boon feat|feats|category=EB} or another {@5etools feat|feats.html} of your choice for which you qualify. {@feat Boon of Irresistible Offense|XPHB} is recommended.
    - class_name: Monk
      class_source: XPHB
      feature: Body and Mind
      source: XPHB
      level: 20
      entries:
        - You have developed your body and mind to new heights. Your Dexterity and Wisdom scores increase by 4, to a maximum of 25.
    - class_name: Mystic
      class_source: UATheMysticClass
      feature: Mystic Order
      source: UATheMysticClass
      level: 1
      entries:
        - At 1st level, you choose a Mystic Order from the list of available orders. Each order specializes in a specific approach to psionics.
        - Your order gives you features when you choose it at 1st level and additional features at 3rd, 6th, and 14th level.
    - class_name: Mystic
      class_source: UATheMysticClass
      feature: Psionic Disciplines and Talents
      source: UATheMysticClass
      level: 1
      entries:
        - '{@filter Psionic talents|psionics|type=T} and {@filter disciplines|psionics|type=D} are the heart of a mystic''s craft. They are the mental exercises and psionic formulae used to forge will into tangible, magical effects.'
        - Psionic disciplines were each discovered by different orders and tend to reflect their creators' specialties. However, a mystic can learn any discipline regardless of its associated order.
    - class_name: Mystic
      class_source: UATheMysticClass
      feature: Psionics
      source: UATheMysticClass
      level: 1
      entries:
        - As a student of psionics, you can master and use psionic talents and disciplines, the rules for which appear at the end of this document. Psionics is a special form of magic use, distinct from spellcasting.
        - entries:
            - A {@filter psionic talent|psionics|type=T} is a minor psionic effect you have mastered. At 1st level, you know one psionic talent of your choice. You learn additional talents of your choice at higher levels. The Talents Known column of the Mystic table shows the total number of talents you know at each level; when that number goes up for you, choose a new talent.
          name: Psionic Talents
          type: entries
        - entries:
            - A {@filter psionic discipline|psionics|type=D} is a rigid set of mental exercises that allows a mystic to manifest psionic power. A mystic masters only a few disciplines at a time.
            - At 1st level, you know one psionic discipline of your choice. The Disciplines Known column of the Mystic table shows the total number of disciplines you know at each level; when that number goes up for you, choose a new discipline.
            - In addition, whenever you gain a level in this class, you can replace one discipline you know with a different one of your choice.
          name: Psionic Disciplines
          type: entries
        - entries:
            - You have an internal reservoir of energy that can be devoted to psionic disciplines you know. This energy is represented by psi points. Each psionic discipline describes effects you can create with it by spending a certain number of psi points. A psionic talent requires no psi points.
            - The number of psi points you have is based on your mystic level, as shown in the Psi Points column of the Mystic table. The number shown for your level is your psi point maximum. Your psi point total returns to its maximum when you finish a long rest. The number of psi points you have can't go below 0 or over your maximum.
          name: Psi Points
          type: entries
        - entries:
            - Though you have access to a potent amount of psionic energy, it takes training and practice to channel that energy. There is a limit on the number of psi points you can spend to activate a psionic discipline. The limit is based on your mystic level, as shown in the Psi Limit column of the Mystic table. For example, as a 3rd-level mystic, you can spend no more than 3 psi points on a discipline each time you use it, no matter how many psi points you have.
          name: Psi Limit
          type: entries
        - entries:
            - You can focus psionic energy on one of your psionic disciplines to draw ongoing benefits from it. As a bonus action, you can choose one of your psionic disciplines and gain its psychic focus benefit, which is detailed in that discipline's description. The benefit lasts until you are {@condition incapacitated} or until you use another bonus action to choose a different focus benefit.
            - You can have only one psychic focus benefit at a time, and using the psychic focus of one discipline doesn't limit your ability to use other disciplines.
          name: Psychic Focus
          type: entries
        - entries:
            - Intelligence is your psionic ability for your psionic disciplines. You use your Intelligence modifier when setting the saving throw DC for a psionic discipline or when making an attack roll with one.
            - attributes:
                - int
              name: Discipline
              type: abilityDc
            - attributes:
                - int
              name: Discipline
              type: abilityAttackMod
          name: Psionic Ability
          type: entries
    - class_name: Mystic
      class_source: UATheMysticClass
      feature: Using a Discipline
      source: UATheMysticClass
      level: 1
      entries:
        - Each psionic discipline has several ways you can use it, all contained in its description. The discipline specifies the type of action and number of psi points it requires. It also details whether you must concentrate on its effects, how many targets it affects, what saving throws it requires, and so on.
        - The following sections go into more detail on using a discipline. Psionic disciplines are magical and function similarly to spells.
        - entries:
            - The Psychic Focus section of a discipline describes the benefit you gain when you choose that discipline for your psychic focus.
          name: Psychic Focus
          type: entries
        - entries:
            - A discipline provides different options for how to use it with your psi points. Each effect option has a name, and the psi point cost of that option appears in parentheses after its name. You must spend that number of psi points to use that option, while abiding by your psi limit. If you don't have enough psi points left, or the cost is above your psi limit, you can't use the option.
            - Some options show a range of psi points, rather than a specific cost. To use that option, you must spend a number of points within that point range, still abiding by your psi limit. Some options let you spend additional psi points to increase a discipline's potency. Again, you must abide by your psi limit, and you must spend all the points when you first use the discipline; you can't decide to spend additional points once you see the discipline in action.
            - Each option notes specific information about its effect, including any action required to use it and its range.
          name: Effect Options and Psi Points
          type: entries
        - entries:
            - Disciplines don't require the components that many spells require. Using a discipline requires no spoken words, gestures, or materials. The power of psionics comes from the mind.
          name: Components
          type: entries
        - entries:
            - An effect option in a discipline specifies how long its effect lasts.
            - entries:
                - If no duration is specified, the effect of the option is instantaneous.
              name: Instantaneous
              type: entries
            - entries:
                - Some options require {@status concentration} to maintain their effects. This requirement is noted with "conc." after the option's psi point cost. The "conc." notation is followed by the maximum duration of the {@status concentration}. For example, if an option says "conc., 1 min.," you can concentrate on its effect for up to 1 minute.
                - Concentrating on a discipline follows the same rules as {@status concentration||concentrating} on a spell. This rule means you can't concentrate on a spell and a discipline at the same time, nor can you concentrate on two disciplines at the same time. See {@book chapter 10|PHB|10}, "Spellcasting," in the Player's Handbook for how {@status concentration} works.
              name: Concentration
              type: entries
          name: Duration
          type: entries
        - entries:
            - Psionic disciplines use the same rules as spells for determining targets and areas of effect, as presented in {@book chapter 10|PHB|10}, "Spellcasting," of the Player's Handbook.
          name: Targets and Areas of Effect
          type: entries
        - entries:
            - If a discipline requires a saving throw, it specifies the type of save and the results of a successful or failed saving throw. The DC is determined by your psionic ability.
            - Some disciplines require you to make an attack roll to determine whether the discipline's effect hits its target. The attack roll uses your psionic ability.
          name: Saving Throws and Attack Rolls
          type: entries
        - entries:
            - The effects of different psionic disciplines add together while the durations of the disciplines overlap. Likewise, different options from a psionic discipline combine if they are active at the same time. However, a specific option from a psionic discipline doesn't combine with itself if the option is used multiple times. Instead, the most potent effect—usually dependent on how many psi points were used to create the effect—applies while the durations of the effects overlap.
            - Psionics and spells are separate effects, and therefore their benefits and drawbacks overlap. A psionic effect that reproduces a spell is an exception to this rule.
          name: Combining Psionic Effects
          type: entries
    - class_name: Mystic
      class_source: UATheMysticClass
      feature: Mystical Recovery
      source: UATheMysticClass
      level: 2
      entries:
        - Starting at 2nd level, you can draw vigor from the psi energy you use to power your psionic disciplines.
        - Immediately after you spend psi points on a psionic discipline, you can take a bonus action to regain hit points equal to the number of psi points you spent.
    - class_name: Mystic
      class_source: UATheMysticClass
      feature: Telepathy
      source: UATheMysticClass
      level: 2
      entries:
        - At 2nd level, your mind awakens to the ability to communicate via telepathy. You can telepathically speak to any creature you can see within 120 feet of you in this manner. You don't need to share a language with the creature for it to understand your telepathic messages, but the creature must be able to understand at least one language or be telepathic itself.
    - class_name: Mystic
      class_source: UATheMysticClass
      feature: Mystic Order feature
      source: UATheMysticClass
      level: 3
      entries:
        - At 3rd level, you gain another feature from your Mystic Order.
    - class_name: Mystic
      class_source: UATheMysticClass
      feature: Ability Score Improvement
      source: UATheMysticClass
      level: 4
      entries:
        - When you reach 4th level, and again at 8th, 12th, 16th, and 19th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can't increase an ability score above 20 using this feature.
    - class_name: Mystic
      class_source: UATheMysticClass
      feature: Strength of Mind
      source: UATheMysticClass
      level: 4
      entries:
        - Even the simplest psionic technique requires a deep understanding of how psionic energy can augment mind and body. This understanding allows you to alter your defenses to better deal with threats.
        - Starting at 4th level, you can replace your proficiency in Wisdom saving throws whenever you finish a short or long rest. To do so, choose Strength, Dexterity, Constitution, or Charisma. You gain proficiency in saves using that ability, instead of Wisdom. This change lasts until you finish your next short or long rest.
    - class_name: Mystic
      class_source: UATheMysticClass
      feature: Mystic Order feature
      source: UATheMysticClass
      level: 6
      entries:
        - At 6th level, you gain another feature from your Mystic Order.
    - class_name: Mystic
      class_source: UATheMysticClass
      feature: Ability Score Improvement
      source: UATheMysticClass
      level: 8
      entries:
        - When you reach 4th level, and again at 8th, 12th, 16th, and 19th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can't increase an ability score above 20 using this feature.
    - class_name: Mystic
      class_source: UATheMysticClass
      feature: Potent Psionics (1d8)
      source: UATheMysticClass
      level: 8
      entries:
        - At 8th level, you gain the ability to infuse your weapon attacks with psychic energy. Once on each of your turns when you hit a creature with a weapon, you can deal an extra {@damage 1d8} psychic damage to that target. When you reach 14th level, this extra damage increases to {@damage 2d8}.
        - In addition, you add your Intelligence modifier to any damage roll you make for a {@filter psionic talent|psionics|type=T}.
    - class_name: Mystic
      class_source: UATheMysticClass
      feature: Consumptive Power
      source: UATheMysticClass
      level: 10
      entries:
        - At 10th level, you gain the ability to sacrifice your physical durability in exchange for psionic power. When activating a psionic discipline, you can pay its psi point cost with your hit points, instead of using any psi points. Your current hit points and hit point maximum are both reduced by the number of hit points you spend. This reduction can't be lessened in any way, and the reduction to your hit point maximum lasts until you finish a long rest.
        - Once you use this feature, you can't use it again until you finish a long rest.
    - class_name: Mystic
      class_source: UATheMysticClass
      feature: Psionic Mastery (1/Day)
      source: UATheMysticClass
      level: 11
      entries:
        - Beginning at 11th level, your mastery of psionic energy allows you to push your mind beyond its normal limits. As an action, you gain 9 special psi points that you can spend only on disciplines that require an action or a bonus action to use. You can use all 9 points on one discipline, or you can spread them across multiple disciplines. You can't also spend your normal psi points on these disciplines; you can spend only the special points gained from this feature. When you finish a long rest, you lose any of these special points that you haven't spent.
        - If more than one of the disciplines you activate with these points require {@status concentration}, you can concentrate on all of them. Activating one of them ends any effect you were already {@status concentration||concentrating} on, and if you begin {@status concentration||concentrating} on an effect that doesn't use these special points, the disciplines end that you're {@status concentration||concentrating} on.
        - At 15th level, the pool of psi points you gain from this feature increases to 11.
        - You have one use of this feature, and you regain any expended use of it with a long rest. You gain one additional use of this feature at 13th, 15th, and 17th level.
    - class_name: Mystic
      class_source: UATheMysticClass
      feature: Ability Score Improvement
      source: UATheMysticClass
      level: 12
      entries:
        - When you reach 4th level, and again at 8th, 12th, 16th, and 19th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can't increase an ability score above 20 using this feature.
    - class_name: Mystic
      class_source: UATheMysticClass
      feature: Psionic Mastery (2/Day)
      source: UATheMysticClass
      level: 13
      entries:
        - At 13th level, you can use your Psionic Mastery twice per day.
    - class_name: Mystic
      class_source: UATheMysticClass
      feature: Mystic Order feature
      source: UATheMysticClass
      level: 14
      entries:
        - At 14th level, you gain another feature from your Mystic Order.
    - class_name: Mystic
      class_source: UATheMysticClass
      feature: Potent Psionics (2d8)
      source: UATheMysticClass
      level: 14
      entries:
        - At 14th level, your Potent Psionics damage increased to {@damage 2d8}.
    - class_name: Mystic
      class_source: UATheMysticClass
      feature: Psionic Mastery (3/Day)
      source: UATheMysticClass
      level: 15
      entries:
        - At 15th level, you can use your Psionic Mastery three times per day.
    - class_name: Mystic
      class_source: UATheMysticClass
      feature: Ability Score Improvement
      source: UATheMysticClass
      level: 16
      entries:
        - When you reach 4th level, and again at 8th, 12th, 16th, and 19th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can't increase an ability score above 20 using this feature.
    - class_name: Mystic
      class_source: UATheMysticClass
      feature: Psionic Mastery (4/Day)
      source: UATheMysticClass
      level: 17
      entries:
        - At 17th level, you can use your Psionic Mastery four times per day.
    - class_name: Mystic
      class_source: UATheMysticClass
      feature: Ability Score Improvement
      source: UATheMysticClass
      level: 19
      entries:
        - When you reach 4th level, and again at 8th, 12th, 16th, and 19th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can't increase an ability score above 20 using this feature.
    - class_name: Mystic
      class_source: UATheMysticClass
      feature: Psionic Body
      source: UATheMysticClass
      level: 20
      entries:
        - 'At 20th level, your mastery of psionic power causes your mind to transcend the body. Your physical form is infused with psionic energy. You gain the following benefits:'
        - items:
            - You gain resistance to bludgeoning, piercing, and slashing damage.
            - You no longer age.
            - You are immune to disease, poison damage, and the {@condition poisoned} condition.
            - If you die, roll a {@dice d20}. On a 10 or higher, you discorporate with 0 hit points, instead of dying, and you fall {@condition unconscious}. You and your gear disappear. You appear at a spot of your choice {@dice 1d3} days later on the plane of existence where you died, having gained the benefits of one long rest.
          type: list
    - class_name: Paladin
      class_source: PHB
      feature: Divine Sense
      source: PHB
      level: 1
      entries:
        - The presence of strong evil registers on your senses like a noxious odor, and powerful good rings like heavenly music in your ears. As an action, you can open your awareness to detect such forces. Until the end of your next turn, you know the location of any celestial, fiend, or undead within 60 feet of you that is not behind {@quickref Cover||3||total cover}. You know the type (celestial, fiend, or undead) of any being whose presence you sense, but not its identity (the vampire Count Strahd von Zarovich, for instance). Within the same radius, you also detect the presence of any place or object that has been consecrated or desecrated, as with the {@spell hallow} spell.
        - You can use this feature a number of times equal to 1 + your Charisma modifier. When you finish a long rest, you regain all expended uses.
    - class_name: Paladin
      class_source: PHB
      feature: Lay on Hands
      source: PHB
      level: 1
      entries:
        - Your blessed touch can heal wounds. You have a pool of healing power that replenishes when you take a long rest. With that pool, you can restore a total number of hit points equal to your paladin level × 5.
        - As an action, you can touch a creature and draw power from the pool to restore a number of hit points to that creature, up to the maximum amount remaining in your pool.
        - Alternatively, you can expend 5 hit points from your pool of healing to cure the target of one disease or neutralize one poison affecting it. You can cure multiple diseases and neutralize multiple poisons with a single use of Lay on Hands, expending hit points separately for each one.
        - This feature has no effect on undead and constructs.
    - class_name: Paladin
      class_source: PHB
      feature: Divine Smite
      source: PHB
      level: 2
      entries:
        - Starting at 2nd level, when you hit a creature with a melee weapon attack, you can expend one spell slot to deal radiant damage to the target, in addition to the weapon's damage. The extra damage is {@damage 2d8} for a 1st-level spell slot, plus {@damage 1d8} for each spell level higher than 1st, to a maximum of {@damage 5d8}. The damage increases by {@damage 1d8} if the target is an undead or a fiend, to a maximum of {@damage 6d8}.
    - class_name: Paladin
      class_source: PHB
      feature: Fighting Style
      source: PHB
      level: 2
      entries:
        - At 2nd level, you adopt a particular style of fighting as your specialty. Choose one of the following options. You can't take the same Fighting Style option more than once, even if you get to choose again.
        - count: 1
          entries:
            - optionalfeature: Defense
              type: refOptionalfeature
            - optionalfeature: Dueling
              type: refOptionalfeature
            - optionalfeature: Great Weapon Fighting
              type: refOptionalfeature
            - optionalfeature: Protection
              type: refOptionalfeature
            - optionalfeature: Blessed Warrior|TCE
              type: refOptionalfeature
            - optionalfeature: Blind Fighting|TCE
              type: refOptionalfeature
            - optionalfeature: Interception|TCE
              type: refOptionalfeature
          type: options
    - class_name: Paladin
      class_source: PHB
      feature: Spellcasting
      source: PHB
      level: 2
      entries:
        - By 2nd level, you have learned to draw on divine magic through meditation and prayer to cast spells as a cleric does. See {@book chapter 10|PHB|10} for the general rules of spellcasting and {@book chapter 11|PHB|11} for the {@filter paladin spell list|spells|class=paladin}.
        - entries:
            - The Paladin table shows how many spell slots you have to cast your {@filter paladin spells|spells|class=paladin}. To cast one of your paladin spells of 1st level or higher, you must expend a slot of the spell's level or higher. You regain all expended spell slots when you finish a long rest.
            - You prepare the list of paladin spells that are available for you to cast, choosing from the paladin spell list. When you do so, choose a number of paladin spells equal to your Charisma modifier + half your paladin level, rounded down (minimum of one spell). The spells must be of a level for which you have spell slots.
            - For example, if you are a 5th-level paladin, you have four 1st-level and two 2nd-level spell slots. With a Charisma of 14, your list of prepared spells can include four spells of 1st or 2nd-level, in any combination. If you prepare the 1st-level spell {@spell cure wounds}, you can cast it using a 1st-level or a 2nd-level slot. Casting the spell doesn't remove it from your list of prepared spells.
            - 'You can change your list of prepared spells when you finish a long rest. Preparing a new list of paladin spells requires time spent in prayer and meditation: at least 1 minute per spell level for each spell on your list.'
          name: Preparing and Casting Spells
          type: entries
        - entries:
            - Charisma is your spellcasting ability for your paladin spells, since their power derives from the strength of your convictions. You use your Charisma whenever a spell refers to your spellcasting ability. In addition, you use your Charisma modifier when setting the saving throw DC for a paladin spell you cast and when making an attack roll with one.
            - attributes:
                - cha
              name: Spell
              type: abilityDc
            - attributes:
                - cha
              name: Spell
              type: abilityAttackMod
          name: Spellcasting Ability
          type: entries
        - entries:
            - You can use a {@item holy symbol|phb} as a spellcasting focus for your paladin spells.
          name: Spellcasting Focus
          type: entries
    - class_name: Paladin
      class_source: PHB
      feature: Channel Divinity
      source: PHB
      level: 3
      entries:
        - Your oath allows you to channel divine energy to fuel magical effects. Each Channel Divinity option provided by your oath explains how to use it.
        - When you use your Channel Divinity, you choose which option to use. You must then finish a short or long rest to use your Channel Divinity again.
        - Some Channel Divinity effects require saving throws. When you use such an effect from this class, the DC equals your paladin spell save DC.
    - class_name: Paladin
      class_source: PHB
      feature: 'Channel Divinity: Harness Divine Power'
      source: TCE
      level: 3
      entries:
        - '{@i 3rd-level paladin {@variantrule optional class features|tce|optional feature}}'
        - 'You can expend a use of your Channel Divinity to fuel your spells. As a bonus action, you touch your holy symbol, utter a prayer, and regain one expended spell slot, the level of which can be no higher than half your proficiency bonus (rounded up). The number of times you can use this feature is based on the level you''ve reached in this class: 3rd level, once; 7th level, twice; and 15th level, thrice. You regain all expended uses when you finish a long rest.'
    - class_name: Paladin
      class_source: PHB
      feature: Divine Health
      source: PHB
      level: 3
      entries:
        - By 3rd level, the divine magic flowing through you makes you immune to disease.
    - class_name: Paladin
      class_source: PHB
      feature: Sacred Oath
      source: PHB
      level: 3
      entries:
        - When you reach 3rd level, you swear the oath that binds you as a paladin forever. Up to this time you have been in a preparatory stage, committed to the path but not yet sworn to it. Now you choose from the list of available oaths.
        - Your choice grants you features at 3rd level and again at 7th, 15th, and 20th level. Those features include oath spells and the Channel Divinity feature.
        - entries:
            - Each oath has a list of associated spells. You gain access to these spells at the levels specified in the oath description. Once you gain access to an oath spell, you always have it prepared. Oath spells don't count against the number of spells you can prepare each day.
            - If you gain an oath spell that doesn't appear on the paladin spell list, the spell is nonetheless a paladin spell for you.
          name: Oath Spells
          type: entries
        - classFeature: Channel Divinity|Paladin||3
          type: refClassFeature
        - classFeature: 'Channel Divinity: Harness Divine Power|Paladin||3|TCE'
          type: refClassFeature
        - entries:
            - A paladin tries to hold to the highest standards of conduct, but even the most virtuous paladin is fallible. Sometimes the right path proves too demanding, sometimes a situation calls for the lesser of two evils, and sometimes the heat of emotion causes a paladin to transgress his or her oath.
            - A paladin who has broken a vow typically seeks absolution from a cleric who shares his or her faith or from another paladin of the same order. The paladin might spend an all-night vigil in prayer as a sign of penitence, or undertake a fast or similar act of self-denial. After a rite of confession and forgiveness, the paladin starts fresh.
            - If a paladin willfully violates his or her oath and shows no sign of repentance, the consequences can be more serious. At the DM's discretion, an impenitent paladin might be forced to abandon this class and adopt another, or perhaps to take the Oathbreaker paladin option that appears in the Dungeon Master's Guide.
          name: Breaking Your Oath
          type: inset
    - class_name: Paladin
      class_source: PHB
      feature: Ability Score Improvement
      source: PHB
      level: 4
      entries:
        - When you reach 4th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can't increase an ability score above 20 using this feature.
        - If your DM allows the use of feats, you may instead take a {@5etools feat|feats.html}.
    - class_name: Paladin
      class_source: PHB
      feature: Martial Versatility
      source: TCE
      level: 4
      entries:
        - '{@i 4th-level paladin {@variantrule optional class features|tce|optional feature}}'
        - Whenever you reach a level in this class that grants the Ability Score Improvement feature, you can replace a {@filter fighting style|optionalfeatures|feature type=FS:P} you know with another fighting style available to paladins. This replacement represents a shift of focus in your martial practice.
    - class_name: Paladin
      class_source: PHB
      feature: Extra Attack
      source: PHB
      level: 5
      entries:
        - Beginning at 5th level, you can attack twice, instead of once, whenever you take the {@action Attack} action on your turn.
    - class_name: Paladin
      class_source: PHB
      feature: Aura of Protection
      source: PHB
      level: 6
      entries:
        - Starting at 6th level, whenever you or a friendly creature within 10 feet of you must make a saving throw, the creature gains a bonus to the saving throw equal to your Charisma modifier (with a minimum bonus of +1). You must be conscious to grant this bonus.
        - At 18th level, the range of this aura increases to 30 feet.
    - class_name: Paladin
      class_source: PHB
      feature: Sacred Oath feature
      source: PHB
      level: 7
      entries:
        - At 7th level, you gain a feature granted to you by your Sacred Oath.
    - class_name: Paladin
      class_source: PHB
      feature: Ability Score Improvement
      source: PHB
      level: 8
      entries:
        - When you reach 8th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can't increase an ability score above 20 using this feature.
        - If your DM allows the use of feats, you may instead take a {@5etools feat|feats.html}.
    - class_name: Paladin
      class_source: PHB
      feature: Aura of Courage
      source: PHB
      level: 10
      entries:
        - Starting at 10th level, you and friendly creatures within 10 feet of you can't be {@condition frightened} while you are conscious.
        - At 18th level, the range of this aura increases to 30 feet.
    - class_name: Paladin
      class_source: PHB
      feature: Improved Divine Smite
      source: PHB
      level: 11
      entries:
        - By 11th level, you are so suffused with righteous might that all your melee weapon strikes carry divine power with them. Whenever you hit a creature with a melee weapon, the creature takes an extra {@damage 1d8} radiant damage.
    - class_name: Paladin
      class_source: PHB
      feature: Ability Score Improvement
      source: PHB
      level: 12
      entries:
        - When you reach 12th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can't increase an ability score above 20 using this feature.
        - If your DM allows the use of feats, you may instead take a {@5etools feat|feats.html}.
    - class_name: Paladin
      class_source: PHB
      feature: Cleansing Touch
      source: PHB
      level: 14
      entries:
        - Beginning at 14th level, you can use your action to end one spell on yourself or on one willing creature that you touch.
        - You can use this feature a number of times equal to your Charisma modifier (a minimum of once). You regain expended uses when you finish a long rest.
    - class_name: Paladin
      class_source: PHB
      feature: Sacred Oath feature
      source: PHB
      level: 15
      entries:
        - At 15th level, you gain a feature granted to you by your Sacred Oath.
    - class_name: Paladin
      class_source: PHB
      feature: Ability Score Improvement
      source: PHB
      level: 16
      entries:
        - When you reach 16th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can't increase an ability score above 20 using this feature.
        - If your DM allows the use of feats, you may instead take a {@5etools feat|feats.html}.
    - class_name: Paladin
      class_source: PHB
      feature: Aura improvements
      source: PHB
      level: 18
      entries:
        - At 18th level, the range of your Aura of Protection increases to 30 feet.
    - class_name: Paladin
      class_source: PHB
      feature: Ability Score Improvement
      source: PHB
      level: 19
      entries:
        - When you reach 19th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can't increase an ability score above 20 using this feature.
        - If your DM allows the use of feats, you may instead take a {@5etools feat|feats.html}.
    - class_name: Paladin
      class_source: PHB
      feature: Sacred Oath feature
      source: PHB
      level: 20
      entries:
        - At 20th level, you gain a feature granted to you by your Sacred Oath.
    - class_name: Paladin
      class_source: XPHB
      feature: Lay on Hands
      source: XPHB
      level: 1
      entries:
        - Your blessed touch can heal wounds. You have a pool of healing power that replenishes when you finish a {@variantrule Long Rest|XPHB}. With that pool, you can restore a total number of {@variantrule Hit Points|XPHB} equal to five times your Paladin level.
        - As a {@variantrule Bonus Action|XPHB}, you can touch a creature (which could be yourself) and draw power from the pool of healing to restore a number of {@variantrule Hit Points|XPHB} to that creature, up to the maximum amount remaining in the pool.
        - You can also expend 5 {@variantrule Hit Points|XPHB} from the pool of healing power to remove the {@condition Poisoned|XPHB} condition from the creature; those points don't also restore {@variantrule Hit Points|XPHB} to the creature.
    - class_name: Paladin
      class_source: XPHB
      feature: Spellcasting
      source: XPHB
      level: 1
      entries:
        - You have learned to cast spells through prayer and meditation. See {@book chapter 7|XPHB|7} for the rules on spellcasting. The information below details how you use those rules with Paladin spells, which appear in the {@filter Paladin spell list|spells|class=Paladin} later in the class's description.
        - entries:
            - entries:
                - The Paladin Features table shows how many spell slots you have to cast your level 1+ spells. You regain all expended slots when you finish a {@variantrule Long Rest|XPHB}.
              name: Spell Slots
              type: entries
            - entries:
                - You prepare the list of level 1+ spells that are available for you to cast with this feature. To start, choose two {@filter level 1 Paladin spells|spells|class=Paladin|level=1}. {@spell Heroism|XPHB} and {@spell Searing Smite|XPHB} are recommended.
                - The number of spells on your list increases as you gain Paladin levels, as shown in the Prepared Spells column of the Paladin Features table. Whenever that number increases, choose additional Paladin spells until the number of spells on your list matches the number in the Paladin Features table. The chosen spells must be of a level for which you have spell slots. For example, if you're a level 5 Paladin, your list of prepared spells can include six Paladin spells of level 1 or 2 in any combination.
                - If another Paladin feature gives you spells that you always have prepared, those spells don't count against the number of spells you can prepare with this feature, but those spells otherwise count as Paladin spells for you.
              name: Prepared Spells of Level 1+
              type: entries
            - entries:
                - Whenever you finish a {@variantrule Long Rest|XPHB}, you can replace one spell on your list with another Paladin spell for which you have spell slots.
              name: Changing Your Prepared Spells
              type: entries
            - entries:
                - Charisma is your spellcasting ability for your Paladin spells.
              name: Spellcasting Ability
              type: entries
            - entries:
                - You can use a {@item Holy Symbol|XPHB} as a {@variantrule Spellcasting Focus|XPHB} for your Paladin spells.
              name: Spellcasting Focus
              type: entries
          type: entries
    - class_name: Paladin
      class_source: XPHB
      feature: Weapon Mastery
      source: XPHB
      level: 1
      entries:
        - Your training with weapons allows you to use the {@variantrule weapon mastery properties|XPHB|mastery properties} of two kinds of {@filter weapons|items|type=simple weapon;martial weapon} of your choice with which you have proficiency, such as {@item Longsword|XPHB|Longswords} and {@item Javelin|XPHB|Javelins}.
        - Whenever you finish a {@variantrule Long Rest|XPHB}, you can change the kinds of weapons you chose. For example, you could switch to using the {@variantrule weapon mastery properties|XPHB|mastery properties} of {@item Halberd|XPHB|Halberds} and {@item Flail|XPHB|Flails}.
    - class_name: Paladin
      class_source: XPHB
      feature: Fighting Style
      source: XPHB
      level: 2
      entries:
        - You gain a {@filter Fighting Style feat|feats|category=FS} of your choice. Instead of choosing one of those feats, you can choose the option below.
        - entries:
            - feat: Blessed Warrior|XPHB
              type: refFeat
          type: entries
    - class_name: Paladin
      class_source: XPHB
      feature: Paladin's Smite
      source: XPHB
      level: 2
      entries:
        - You always have the {@spell Divine Smite|XPHB} spell prepared. In addition, you can cast it without expending a spell slot, but you must finish a {@variantrule Long Rest|XPHB} before you can cast it in this way again.
    - class_name: Paladin
      class_source: XPHB
      feature: Channel Divinity
      source: XPHB
      level: 3
      entries:
        - 'You can channel divine energy directly from the Outer Planes, using it to fuel magical effects. You start with one such effect: Divine Sense, which is described below. Other Paladin features give additional Channel Divinity effect options. Each time you use this class''s Channel Divinity, you choose which effect from this class to create.'
        - You can use this class's Channel Divinity twice. You regain one of its expended uses when you finish a {@variantrule Short Rest|XPHB}, and you regain all expended uses when you finish a {@variantrule Long Rest|XPHB}. You gain an additional use when you reach Paladin level 11.
        - If a Channel Divinity effect requires a saving throw, the DC equals the spell save DC from this class's Spellcasting feature.
        - entries:
            - classFeature: Divine Sense|Paladin|XPHB|3|XPHB
              type: refClassFeature
          type: entries
    - class_name: Paladin
      class_source: XPHB
      feature: Divine Sense
      source: XPHB
      level: 3
      entries:
        - As a {@variantrule Bonus Action|XPHB}, you can open your awareness to detect Celestials, Fiends, and Undead. For the next 10 minutes or until you have the {@condition Incapacitated|XPHB} condition, you know the location of any creature of those types within 60 feet of yourself, and you know its creature type. Within the same radius, you also detect the presence of any place or object that has been consecrated or desecrated, as with the {@spell Hallow|XPHB} spell.
    - class_name: Paladin
      class_source: XPHB
      feature: Paladin Subclass
      source: XPHB
      level: 3
      entries:
        - You gain a Paladin subclass of your choice. A subclass is a specialization that grants you features at certain Paladin levels. For the rest of your career, you gain each of your subclass's features that are of your Paladin level or lower.
        - entries:
            - A Paladin tries to hold to the highest standards of conduct, but even the most dedicated are fallible. Sometimes a Paladin transgresses their oath.
            - A Paladin who has broken a vow typically seeks absolution, spending an all-night vigil as a sign of penitence or undertaking a fast. After a rite of forgiveness, the Paladin starts fresh.
            - If your Paladin unrepentantly violates their oath, talk to your DM. Your Paladin should probably take a more appropriate subclass or even abandon the class and adopt another one.
          name: Breaking Your Oath
          type: inset
    - class_name: Paladin
      class_source: XPHB
      feature: Ability Score Improvement
      source: XPHB
      level: 4
      entries:
        - You gain the {@feat Ability Score Improvement|XPHB} feat or another {@5etools feat|feats.html} of your choice for which you qualify. You gain this feature again at Paladin levels 8, 12, and 16.
    - class_name: Paladin
      class_source: XPHB
      feature: Extra Attack
      source: XPHB
      level: 5
      entries:
        - You can attack twice instead of once whenever you take the {@action Attack|XPHB} action on your turn.
    - class_name: Paladin
      class_source: XPHB
      feature: Faithful Steed
      source: XPHB
      level: 5
      entries:
        - You can call on the aid of an otherworldly steed. You always have the {@spell Find Steed|XPHB} spell prepared.
        - You can also cast the spell once without expending a spell slot, and you regain the ability to do so when you finish a {@variantrule Long Rest|XPHB}.
    - class_name: Paladin
      class_source: XPHB
      feature: Aura of Protection
      source: XPHB
      level: 6
      entries:
        - You radiate a protective, unseeable aura in a 10-foot {@variantrule Emanation [Area of Effect]|XPHB|Emanation} that originates from you. The aura is inactive while you have the {@condition Incapacitated|XPHB} condition.
        - You and your allies in the aura gain a bonus to saving throws equal to your Charisma modifier (minimum bonus of +1).
        - If another Paladin is present, a creature can benefit from only one Aura of Protection at a time; the creature chooses which aura while in them.
    - class_name: Paladin
      class_source: XPHB
      feature: Subclass Feature
      source: XPHB
      level: 7
      entries:
        - You gain a feature from your Paladin Subclass.
    - class_name: Paladin
      class_source: XPHB
      feature: Ability Score Improvement
      source: XPHB
      level: 8
      entries:
        - You gain the {@feat Ability Score Improvement|XPHB} Feat or another {@5etools feat|feats.html} of your choice for which you qualify.
    - class_name: Paladin
      class_source: XPHB
      feature: Abjure Foes
      source: XPHB
      level: 9
      entries:
        - 'As a {@action Magic|XPHB} action, you can expend one use of this class''s Channel Divinity to overwhelm foes with awe. As you present your {@item Holy Symbol|XPHB} or weapon, you can target a number of creatures equal to your Charisma modifier (minimum of one creature) that you can see within 60 feet of yourself. Each target must succeed on a Wisdom saving throw or have the {@condition Frightened|XPHB} condition for 1 minute or until it takes any damage. While {@condition Frightened|XPHB} in this way, a target can do only one of the following on its turns: move, take an action, or take a {@variantrule Bonus Action|XPHB}.'
    - class_name: Paladin
      class_source: XPHB
      feature: Aura of Courage
      source: XPHB
      level: 10
      entries:
        - You and your allies have {@variantrule Immunity|XPHB} to the {@condition Frightened|XPHB} condition while in your Aura of Protection. If a {@condition Frightened|XPHB} ally enters the aura, that condition has no effect on that ally while there.
    - class_name: Paladin
      class_source: XPHB
      feature: Radiant Strikes
      source: XPHB
      level: 11
      entries:
        - Your strikes now carry supernatural power. When you hit a target with an attack roll using a Melee weapon or an {@variantrule Unarmed Strike|XPHB}, the target takes an extra {@damage 1d8} Radiant damage.
    - class_name: Paladin
      class_source: XPHB
      feature: Ability Score Improvement
      source: XPHB
      level: 12
      entries:
        - You gain the {@feat Ability Score Improvement|XPHB} Feat or another {@5etools feat|feats.html} of your choice for which you qualify.
    - class_name: Paladin
      class_source: XPHB
      feature: Restoring Touch
      source: XPHB
      level: 14
      entries:
        - 'When you use Lay On Hands on a creature, you can also remove one or more of the following conditions from the creature: {@condition Blinded|XPHB}, {@condition Charmed|XPHB}, {@condition Deafened|XPHB}, {@condition Frightened|XPHB}, {@condition Paralyzed|XPHB}, or {@condition Stunned|XPHB}. You must expend 5 {@variantrule Hit Points|XPHB} from the healing pool of Lay On Hands for each of these conditions you remove; those points don''t also restore {@variantrule Hit Points|XPHB} to the creature.'
    - class_name: Paladin
      class_source: XPHB
      feature: Subclass Feature
      source: XPHB
      level: 15
      entries:
        - You gain a feature from your Paladin Subclass.
    - class_name: Paladin
      class_source: XPHB
      feature: Ability Score Improvement
      source: XPHB
      level: 16
      entries:
        - You gain the {@feat Ability Score Improvement|XPHB} Feat or another {@5etools feat|feats.html} of your choice for which you qualify.
    - class_name: Paladin
      class_source: XPHB
      feature: Aura Expansion
      source: XPHB
      level: 18
      entries:
        - Your Aura of Protection is now a 30-foot {@variantrule Emanation [Area of Effect]|XPHB|Emanation}.
    - class_name: Paladin
      class_source: XPHB
      feature: Epic Boon
      source: XPHB
      level: 19
      entries:
        - You gain an {@filter Epic Boon feat|feats|category=EB} or another {@5etools feat|feats.html} of your choice for which you qualify. {@feat Boon of Truesight|XPHB} is recommended.
    - class_name: Paladin
      class_source: XPHB
      feature: Subclass Feature
      source: XPHB
      level: 20
      entries:
        - You gain a feature from your Paladin Subclass.
    - class_name: Ranger
      class_source: PHB
      feature: Deft Explorer
      source: TCE
      level: 1
      entries:
        - '{@i 1st-level ranger {@variantrule optional class features|tce|optional feature}, which replaces the Natural Explorer feature}'
        - You are an unsurpassed explorer and survivor, both in the wilderness and in dealing with others on your travels. You gain the Canny benefit below, and you gain an additional benefit below when you reach 6th level and 10th level in this class.
        - entries:
            - Choose one of your skill proficiencies. Your proficiency bonus is doubled for any ability check you make that uses the chosen skill.
            - You can also speak, read, and write two additional languages of your choice.
          name: Canny
          type: entries
    - class_name: Ranger
      class_source: PHB
      feature: Favored Enemy
      source: PHB
      level: 1
      entries:
        - Beginning at 1st level, you have significant experience studying, tracking, hunting, and even talking to a certain type of enemy.
        - 'Choose a type of favored enemy: {@filter aberrations|bestiary|type=aberration}, {@filter beasts|bestiary|type=beast}, {@filter celestials|bestiary|type=celestial}, {@filter constructs|bestiary|type=construct}, {@filter dragons|bestiary|type=dragon}, {@filter elementals|bestiary|type=elemental}, {@filter fey|bestiary|type=fey}, {@filter fiends|bestiary|type=fiend}, {@filter giants|bestiary|type=giant}, {@filter monstrosities|bestiary|type=monstrosity}, {@filter oozes|bestiary|type=ooze}, {@filter plants|bestiary|type=plant}, or {@filter undead|bestiary|type=undead}. Alternatively, you can select two races of {@filter humanoid|bestiary|type=humanoid} (such as {@creature gnoll||gnolls} and {@creature orc||orcs}) as favored enemies.'
        - You have advantage on Wisdom ({@skill Survival}) checks to track your favored enemies, as well as on Intelligence checks to recall information about them.
        - When you gain this feature, you also learn one language of your choice that is spoken by your favored enemies, if they speak one at all.
        - You choose one additional favored enemy, as well as an associated language, at 6th and 14th level. As you gain levels, your choices should reflect the types of monsters you have encountered on your adventures.
    - class_name: Ranger
      class_source: PHB
      feature: Favored Foe
      source: TCE
      level: 1
      entries:
        - '{@i 1st-level ranger {@variantrule optional class features|tce|optional feature}, which replaces the Favored Enemy feature and works with the Foe Slayer feature}'
        - When you hit a creature with an attack roll, you can call on your mystical bond with nature to mark the target as your favored enemy for 1 minute or until you lose your {@status concentration} (as if you were {@status concentration||concentrating} on a spell).
        - The first time on each of your turns that you hit the favored enemy and deal damage to it, including when you mark it, you can increase that damage by {@damage 1d4}.
        - You can use this feature to mark a favored enemy a number of times equal to your proficiency bonus, and you regain all expended uses when you finish a long rest.
        - 'This feature''s extra damage increases when you reach certain levels in this class: to {@damage 1d6} at 6th level and to {@damage 1d8} at 14th level.'
    - class_name: Ranger
      class_source: PHB
      feature: Natural Explorer
      source: PHB
      level: 1
      entries:
        - 'You are particularly familiar with one type of natural environment and are adept at traveling and surviving in such regions. Choose one type of favored terrain: arctic, coast, desert, forest, grassland, mountain, swamp, or the Underdark. When you make an Intelligence or Wisdom check related to your favored terrain, your proficiency bonus is doubled if you are using a skill that you''re proficient in.'
        - 'While traveling for an hour or more in your favored terrain, you gain the following benefits:'
        - items:
            - Difficult terrain doesn't slow your group's travel.
            - Your group can't become lost except by magical means.
            - Even when you are engaged in another activity while traveling (such as foraging, navigating, or tracking), you remain alert to danger.
            - If you are traveling alone, you can move stealthily at a normal pace.
            - When you forage, you find twice as much food as you normally would.
            - While tracking other creatures, you also learn their exact number, their sizes, and how long ago they passed through the area.
          type: list
        - You choose additional favored terrain types at 6th and 10th level.
    - class_name: Ranger
      class_source: PHB
      feature: Fighting Style
      source: PHB
      level: 2
      entries:
        - At 2nd level, you adopt a particular style of fighting as your specialty. Choose one of the following options. You can't take a Fighting Style option more than once, even if you later get to choose again.
        - count: 1
          entries:
            - optionalfeature: Archery
              type: refOptionalfeature
            - optionalfeature: Defense
              type: refOptionalfeature
            - optionalfeature: Dueling
              type: refOptionalfeature
            - optionalfeature: Two-Weapon Fighting
              type: refOptionalfeature
            - optionalfeature: Blind Fighting|TCE
              type: refOptionalfeature
            - optionalfeature: Druidic Warrior|TCE
              type: refOptionalfeature
            - optionalfeature: Thrown Weapon Fighting|TCE
              type: refOptionalfeature
          type: options
    - class_name: Ranger
      class_source: PHB
      feature: Spellcasting
      source: PHB
      level: 2
      entries:
        - By the time you reach 2nd level, you have learned to use the magical essence of nature to cast spells, much as a druid does. See {@book chapter 10|PHB|10} for the general rules of spellcasting and {@book chapter 11|PHB|11} for the {@filter ranger spell list|spells|class=ranger}.
        - entries:
            - The Ranger table shows how many spell slots you have to cast your {@filter ranger spells|spells|class=ranger} of 1st level and higher. To cast one of these spells, you must expend a slot of the spell's level or higher. You regain all expended spell slots when you finish a long rest.
            - For example, if you know the 1st-level spell {@spell animal friendship} and have a 1st-level and a 2nd-level spell slot available, you can cast {@spell animal friendship} using either slot.
          name: Spell Slots
          type: entries
        - entries:
            - You know two 1st-level spells of your choice from the ranger spell list.
            - The Spells Known column of the Ranger table shows when you learn more ranger spells of your choice. Each of these spells must be of a level for which you have spell slots. For instance, when you reach 5th level in this class, you can learn one new spell of 1st or 2nd level.
            - Additionally, when you gain a level in this class, you can choose one of the ranger spells you know and replace it with another spell from the ranger spell list, which also must be of a level for which you have spell slots.
          name: Spells Known of 1st Level and Higher
          type: entries
        - entries:
            - Wisdom is your spellcasting ability for your ranger spells, since your magic draws on your attunement to nature. You use your Wisdom whenever a spell refers to your spellcasting ability. In addition, you use your Wisdom modifier when setting the saving throw DC for a ranger spell you cast and when making an attack roll with one.
            - attributes:
                - wis
              name: Spell
              type: abilityDc
            - attributes:
                - wis
              name: Spell
              type: abilityAttackMod
          name: Spellcasting Ability
          type: entries
    - class_name: Ranger
      class_source: PHB
      feature: Spellcasting Focus
      source: TCE
      level: 2
      entries:
        - '{@i 2nd-level ranger {@variantrule optional class features|tce|optional feature}}'
        - You can use a {@item druidic focus|phb} as a spellcasting focus for your ranger spells. A druidic focus might be a sprig of mistletoe or holly, a wand or rod made of yew or another special wood, a staff drawn whole from a living tree, or an object incorporating feathers, fur, bones, and teeth from sacred animals.
    - class_name: Ranger
      class_source: PHB
      feature: Primal Awareness
      source: TCE
      level: 3
      entries:
        - '{@i 3rd-level ranger {@variantrule optional class features|tce|optional feature}, which replaces the Primeval Awareness feature}'
        - 'You can focus your awareness through the interconnections of nature: you learn additional spells when you reach certain levels in this class if you don''t already know them, as shown in the Primal Awareness Spells table. These spells don''t count against the number of ranger spells you know.'
        - caption: Primal Awareness Spells
          colLabels:
            - Ranger Level
            - Spell
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - 3rd
              - '{@spell speak with animals}'
            - - 5th
              - '{@spell beast sense}'
            - - 9th
              - '{@spell speak with plants}'
            - - 13th
              - '{@spell locate creature}'
            - - 17th
              - '{@spell commune with nature}'
          type: table
        - You can cast each of these spells once without expending a spell slot. Once you cast a spell in this way, you can't do so again until you finish a long rest.
    - class_name: Ranger
      class_source: PHB
      feature: Primeval Awareness
      source: PHB
      level: 3
      entries:
        - 'Beginning at 3rd level, you can use your action and expend one ranger spell slot to focus your awareness on the region around you. For 1 minute per level of the spell slot you expend, you can sense whether the following types of creatures are present within 1 mile of you (or within up to 6 miles if you are in your favored terrain): aberrations, celestials, dragons, elementals, fey, fiends, and undead. This feature doesn''t reveal the creatures'' location or number.'
    - class_name: Ranger
      class_source: PHB
      feature: Ranger Archetype
      source: PHB
      level: 3
      entries:
        - At 3rd level, you choose an archetype that you strive to emulate from the list of available archetypes. Your choice grants features at 3rd level, and again at 7th, 11th, and 15th level.
    - class_name: Ranger
      class_source: PHB
      feature: Ability Score Improvement
      source: PHB
      level: 4
      entries:
        - When you reach 4th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can't increase an ability score above 20 using this feature.
        - If your DM allows the use of feats, you may instead take a {@5etools feat|feats.html}.
    - class_name: Ranger
      class_source: PHB
      feature: Martial Versatility
      source: TCE
      level: 4
      entries:
        - '{@i 4th-level ranger {@variantrule optional class features|tce|optional feature}}'
        - Whenever you reach a level in this class that grants the Ability Score Improvement feature, you can replace a fighting style you know with another fighting style available to rangers. This replacement represents a shift of focus in your martial practice.
    - class_name: Ranger
      class_source: PHB
      feature: Extra Attack
      source: PHB
      level: 5
      entries:
        - Beginning at 5th level, you can attack twice, instead of once, whenever you take the {@action Attack} action on your turn.
    - class_name: Ranger
      class_source: PHB
      feature: Deft Explorer Improvement
      source: TCE
      level: 6
      entries:
        - You gain an additional benefit when you reach 6th level in this class.
        - entries:
            - Your walking speed increases by 5, and you gain a climbing speed and a swimming speed equal to your walking speed.
          name: Roving
          type: entries
    - class_name: Ranger
      class_source: PHB
      feature: Favored Enemy and Natural Explorer improvements
      source: PHB
      level: 6
      entries:
        - At 6th level, you gain an additional favored terrain.
        - At 6th level, you choose one additional favored enemy, as well as an associated language. Your choice should reflect the types of monsters you have encountered on your adventures.
    - class_name: Ranger
      class_source: PHB
      feature: Ranger Archetype feature
      source: PHB
      level: 7
      entries:
        - At 7th level, you gain a feature granted to you by your Ranger Archetype.
    - class_name: Ranger
      class_source: PHB
      feature: Ability Score Improvement
      source: PHB
      level: 8
      entries:
        - When you reach 8th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can't increase an ability score above 20 using this feature.
        - If your DM allows the use of feats, you may instead take a {@5etools feat|feats.html}.
    - class_name: Ranger
      class_source: PHB
      feature: Land's Stride
      source: PHB
      level: 8
      entries:
        - Starting at 8th level, moving through nonmagical {@quickref difficult terrain||3} costs you no extra movement. You can also pass through nonmagical plants without being slowed by them and without taking damage from them if they have thorns, spines, or a similar hazard.
        - In addition, you have advantage on saving throws against plants that are magically created or manipulated to impede movement, such as those created by the {@spell entangle} spell.
    - class_name: Ranger
      class_source: PHB
      feature: Deft Explorer Improvement
      source: TCE
      level: 10
      entries:
        - You gain an additional benefit when you reach 10th level in this class.
        - entries:
            - As an action, you can give yourself a number of temporary hit points equal to {@dice 1d8} + your Wisdom modifier (minimum of 1 temporary hit point). You can use this action a number of times equal to your proficiency bonus, and you regain all expended uses when you finish a long rest.
            - In addition, whenever you finish a short rest, your {@condition exhaustion} level, if any, is decreased by 1.
          name: Tireless
          type: entries
    - class_name: Ranger
      class_source: PHB
      feature: Hide in Plain Sight
      source: PHB
      level: 10
      entries:
        - Starting at 10th level, you can spend 1 minute creating camouflage for yourself. You must have access to fresh mud, dirt, plants, soot, and other naturally occurring materials with which to create your camouflage.
        - Once you are camouflaged in this way, you can try to hide by pressing yourself up against a solid surface, such as a tree or wall, that is at least as tall and wide as you are. You gain a +10 bonus to Dexterity ({@skill Stealth}) checks as long as you remain there without moving or taking actions. Once you move or take an action or a reaction, you must camouflage yourself again to gain this benefit.
    - class_name: Ranger
      class_source: PHB
      feature: Natural Explorer improvement
      source: PHB
      level: 10
      entries:
        - You gain an additional favored terrain.
    - class_name: Ranger
      class_source: PHB
      feature: Nature's Veil
      source: TCE
      level: 10
      entries:
        - '{@i 10th-level ranger {@variantrule optional class features|tce|optional feature}, which replaces the Hide in Plain Sight feature}'
        - You draw on the powers of nature to hide yourself from view briefly. As a bonus action, you can magically become {@condition invisible}, along with any equipment you are wearing or carrying, until the start of your next turn.
        - You can use this feature a number of times equal to your proficiency bonus, and you regain all expended uses when you finish a long rest.
    - class_name: Ranger
      class_source: PHB
      feature: Ranger Archetype feature
      source: PHB
      level: 11
      entries:
        - At 11th level, you gain a feature granted to you by your Ranger Archetype.
    - class_name: Ranger
      class_source: PHB
      feature: Ability Score Improvement
      source: PHB
      level: 12
      entries:
        - When you reach 12th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can't increase an ability score above 20 using this feature.
        - If your DM allows the use of feats, you may instead take a {@5etools feat|feats.html}.
    - class_name: Ranger
      class_source: PHB
      feature: Favored Enemy improvement
      source: PHB
      level: 14
      entries:
        - At 14th level, you choose one additional favored enemy, as well as an associated language. Your choice should reflect the types of monsters you have encountered on your adventures.
    - class_name: Ranger
      class_source: PHB
      feature: Vanish
      source: PHB
      level: 14
      entries:
        - Starting at 14th level, you can use the {@action Hide} action as a bonus action on your turn. Also, you can't be tracked by nonmagical means, unless you choose to leave a trail.
    - class_name: Ranger
      class_source: PHB
      feature: Ranger Archetype feature
      source: PHB
      level: 15
      entries:
        - At 15th level, you gain a feature granted to you by your Ranger Archetype.
    - class_name: Ranger
      class_source: PHB
      feature: Ability Score Improvement
      source: PHB
      level: 16
      entries:
        - When you reach 16th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can't increase an ability score above 20 using this feature.
        - If your DM allows the use of feats, you may instead take a {@5etools feat|feats.html}.
    - class_name: Ranger
      class_source: PHB
      feature: Feral Senses
      source: PHB
      level: 18
      entries:
        - At 18th level, you gain preternatural senses that help you fight creatures you can't see. When you attack a creature you can't see, your inability to see it doesn't impose disadvantage on your attack rolls against it. You are also aware of the location of any {@condition invisible} creature within 30 feet of you, provided that the creature isn't hidden from you and you aren't {@condition blinded} or {@condition deafened}.
    - class_name: Ranger
      class_source: PHB
      feature: Ability Score Improvement
      source: PHB
      level: 19
      entries:
        - When you reach 19th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can't increase an ability score above 20 using this feature.
        - If your DM allows the use of feats, you may instead take a {@5etools feat|feats.html}.
    - class_name: Ranger
      class_source: PHB
      feature: Foe Slayer
      source: PHB
      level: 20
      entries:
        - At 20th level, you become an unparalleled hunter of your enemies. Once on each of your turns, you can add your Wisdom modifier to the attack roll or the damage roll of an attack you make against one of your favored enemies. You can choose to use this feature before or after the roll, but before any effects of the roll are applied.
    - class_name: Ranger
      class_source: XPHB
      feature: Favored Enemy
      source: XPHB
      level: 1
      entries:
        - You always have the {@spell Hunter's Mark|XPHB} spell prepared. You can cast it twice without expending a spell slot, and you regain all expended uses of this ability when you finish a {@variantrule Long Rest|XPHB}.
        - The number of times you can cast the spell without a spell slot increases when you reach certain Ranger levels, as shown in the Favored Enemy column of the Ranger Features table.
    - class_name: Ranger
      class_source: XPHB
      feature: Spellcasting
      source: XPHB
      level: 1
      entries:
        - You have learned to channel the magical essence of nature to cast spells. See {@book chapter 7|XPHB|7} for the rules on spellcasting. The information below details how you use those rules with Ranger spells, which appear in the {@filter Ranger spell list|spells|class=Ranger} later in the class's description.
        - entries:
            - entries:
                - The Ranger Features table shows how many spell slots you have to cast your level 1+ spells. You regain all expended slots when you finish a {@variantrule Long Rest|XPHB}.
              name: Spell Slots
              type: entries
            - entries:
                - You prepare the list of level 1+ spells that are available for you to cast with this feature. To start, choose two {@filter level 1 Ranger spells|spells|class=Ranger|level=1}. {@spell Cure Wounds|XPHB} and {@spell Ensnaring Strike|XPHB} are recommended.
                - The number of spells on your list increases as you gain Ranger levels, as shown in the Prepared Spells column of the Ranger Features table. Whenever that number increases, choose additional Ranger spells until the number of spells on your list matches the number in the Ranger Features table. The chosen spells must be of a level for which you have spell slots. For example, if you're a level 5 Ranger, your list of prepared spells can include six Ranger spells of level 1 or 2 in any combination.
                - If another Ranger feature gives you spells that you always have prepared, those spells don't count against the number of spells you can prepare with this feature, but those spells otherwise count as Ranger spells for you.
              name: Prepared Spells of Level 1+
              type: entries
            - entries:
                - Whenever you finish a {@variantrule Long Rest|XPHB}, you can replace one spell on your list with another Ranger spell for which you have spell slots.
              name: Changing Your Prepared Spells
              type: entries
            - entries:
                - Wisdom is your spellcasting ability for your Ranger spells.
              name: Spellcasting Ability
              type: entries
            - entries:
                - You can use a {@item Druidic Focus|XPHB} as a {@variantrule Spellcasting Focus|XPHB} for your Ranger spells.
              name: Spellcasting Focus
              type: entries
          type: entries
    - class_name: Ranger
      class_source: XPHB
      feature: Weapon Mastery
      source: XPHB
      level: 1
      entries:
        - Your training with weapons allows you to use the {@variantrule weapon mastery properties|XPHB|mastery properties} of two kinds of {@filter weapons|items|type=simple weapon;martial weapon} of your choice with which you have proficiency, such as {@item Longbow|XPHB|Longbows} and {@item Shortsword|XPHB|Shortswords}.
        - Whenever you finish a {@variantrule Long Rest|XPHB}, you can change the kinds of weapons you chose. For example, you could switch to using the {@variantrule weapon mastery properties|XPHB|mastery properties} of {@item Scimitar|XPHB|Scimitars} and {@item Longsword|XPHB|Longswords}.
    - class_name: Ranger
      class_source: XPHB
      feature: Deft Explorer
      source: XPHB
      level: 2
      entries:
        - Thanks to your travels, you gain the following benefits.
        - entries:
            - entries:
                - Choose one of your skill proficiencies with which you lack {@variantrule Expertise|XPHB}. You gain {@variantrule Expertise|XPHB} in that skill.
              name: Expertise
              type: entries
            - entries:
                - You know two languages of your choice from the language tables in {@book chapter 2|XPHB|2|Choose Languages}.
              name: Languages
              type: entries
          type: entries
    - class_name: Ranger
      class_source: XPHB
      feature: Fighting Style
      source: XPHB
      level: 2
      entries:
        - You gain a {@filter Fighting Style feat|feats|category=FS} of your choice. Instead of choosing one of those feats, you can choose the option below.
        - entries:
            - feat: Druidic Warrior|XPHB
              type: refFeat
          type: entries
    - class_name: Ranger
      class_source: XPHB
      feature: Ranger Subclass
      source: XPHB
      level: 3
      entries:
        - You gain a Ranger subclass of your choice. A subclass is a specialization that grants you features at certain Ranger levels. For the rest of your career, you gain each of your subclass's features that are of your Ranger level or lower.
    - class_name: Ranger
      class_source: XPHB
      feature: Ability Score Improvement
      source: XPHB
      level: 4
      entries:
        - You gain the {@feat Ability Score Improvement|XPHB} feat or another {@5etools feat|feats.html} of your choice for which you qualify. You gain this feature again at Ranger levels 8, 12, and 16.
    - class_name: Ranger
      class_source: XPHB
      feature: Extra Attack
      source: XPHB
      level: 5
      entries:
        - You can attack twice instead of once whenever you take the {@action Attack|XPHB} action on your turn.
    - class_name: Ranger
      class_source: XPHB
      feature: Roving
      source: XPHB
      level: 6
      entries:
        - Your {@variantrule Speed|XPHB} increases by 10 feet while you aren't wearing Heavy armor. You also have a {@variantrule Climb Speed|XPHB} and a {@variantrule Swim Speed|XPHB} equal to your {@variantrule Speed|XPHB}.
    - class_name: Ranger
      class_source: XPHB
      feature: Subclass Feature
      source: XPHB
      level: 7
      entries:
        - You gain a feature from your Ranger Subclass.
    - class_name: Ranger
      class_source: XPHB
      feature: Ability Score Improvement
      source: XPHB
      level: 8
      entries:
        - You gain the {@feat Ability Score Improvement|XPHB} feat or another {@5etools feat|feats.html} of your choice for which you qualify.
    - class_name: Ranger
      class_source: XPHB
      feature: Expertise
      source: XPHB
      level: 9
      entries:
        - Choose two of your skill proficiencies with which you lack {@variantrule Expertise|XPHB}. You gain {@variantrule Expertise|XPHB} in those skills.
    - class_name: Ranger
      class_source: XPHB
      feature: Tireless
      source: XPHB
      level: 10
      entries:
        - Primal forces now help fuel you on your journeys, granting you the following benefits.
        - entries:
            - entries:
                - As a {@action Magic|XPHB} action, you can give yourself a number of {@variantrule Temporary Hit Points|XPHB} equal to {@dice 1d8} plus your Wisdom modifier (minimum of 1). You can use this action a number of times equal to your Wisdom modifier (minimum of once), and you regain all expended uses when you finish a {@variantrule Long Rest|XPHB}.
              name: Temporary Hit Points
              type: entries
            - entries:
                - Whenever you finish a {@variantrule Short Rest|XPHB}, your {@condition Exhaustion|XPHB} level, if any, decreases by 1.
              name: Decrease Exhaustion
              type: entries
          type: entries
    - class_name: Ranger
      class_source: XPHB
      feature: Subclass Feature
      source: XPHB
      level: 11
      entries:
        - You gain a feature from your Ranger Subclass.
    - class_name: Ranger
      class_source: XPHB
      feature: Ability Score Improvement
      source: XPHB
      level: 12
      entries:
        - You gain the {@feat Ability Score Improvement|XPHB} feat or another {@5etools feat|feats.html} of your choice for which you qualify.
    - class_name: Ranger
      class_source: XPHB
      feature: Relentless Hunter
      source: XPHB
      level: 13
      entries:
        - Taking damage can't break your {@status Concentration|XPHB} on Hunter's Mark.
    - class_name: Ranger
      class_source: XPHB
      feature: Nature's Veil
      source: XPHB
      level: 14
      entries:
        - You invoke spirits of nature to magically hide yourself. As a {@variantrule Bonus Action|XPHB}, you can give yourself the {@condition Invisible|XPHB} condition until the end of your next turn.
        - You can use this feature a number of times equal to your Wisdom modifier (minimum of once), and you regain all expended uses when you finish a {@variantrule Long Rest|XPHB}.
    - class_name: Ranger
      class_source: XPHB
      feature: Subclass Feature
      source: XPHB
      level: 15
      entries:
        - You gain a feature from your Ranger Subclass.
    - class_name: Ranger
      class_source: XPHB
      feature: Ability Score Improvement
      source: XPHB
      level: 16
      entries:
        - You gain the {@feat Ability Score Improvement|XPHB} feat or another {@5etools feat|feats.html} of your choice for which you qualify.
    - class_name: Ranger
      class_source: XPHB
      feature: Precise Hunter
      source: XPHB
      level: 17
      entries:
        - You have {@variantrule Advantage|XPHB} on attack rolls against the creature currently marked by your Hunter's Mark.
    - class_name: Ranger
      class_source: XPHB
      feature: Feral Senses
      source: XPHB
      level: 18
      entries:
        - Your connection to the forces of nature grants you {@sense Blindsight|XPHB} with a range of 30 feet.
    - class_name: Ranger
      class_source: XPHB
      feature: Epic Boon
      source: XPHB
      level: 19
      entries:
        - You gain an {@filter Epic Boon feat|feats|category=EB} or another {@5etools feat|feats.html} of your choice for which you qualify. {@feat Boon of Dimensional Travel|XPHB} is recommended.
    - class_name: Ranger
      class_source: XPHB
      feature: Foe Slayer
      source: XPHB
      level: 20
      entries:
        - The damage die of your Hunter's Mark is a {@damage d10} rather than a {@damage d6}.
    - class_name: Rogue
      class_source: PHB
      feature: Expertise
      source: PHB
      level: 1
      entries:
        - At 1st level, choose two of your skill proficiencies, or one of your skill proficiencies and your proficiency with {@item thieves' tools|phb}. Your proficiency bonus is doubled for any ability check you make that uses either of the chosen proficiencies.
        - At 6th level, you can choose two more of your proficiencies (in skills or with {@item thieves' tools|phb}) to gain this benefit.
    - class_name: Rogue
      class_source: PHB
      feature: Sneak Attack
      source: PHB
      level: 1
      entries:
        - Beginning at 1st level, you know how to strike subtly and exploit a foe's distraction. Once per turn, you can deal an extra {@damage 1d6} damage to one creature you hit with an attack if you have advantage on the attack roll. The attack must use a finesse or a ranged weapon.
        - You don't need advantage on the attack roll if another enemy of the target is within 5 feet of it, that enemy isn't {@condition incapacitated}, and you don't have disadvantage on the attack roll.
        - The amount of the extra damage increases as you gain levels in this class, as shown in the Sneak Attack column of the Rogue table.
    - class_name: Rogue
      class_source: PHB
      feature: Thieves' Cant
      source: PHB
      level: 1
      entries:
        - During your rogue training you learned thieves' cant, a secret mix of dialect, jargon, and code that allows you to hide messages in seemingly normal conversation. Only another creature that knows thieves' cant understands such messages. It takes four times longer to convey such a message than it does to speak the same idea plainly.
        - In addition, you understand a set of secret signs and symbols used to convey short, simple messages, such as whether an area is dangerous or the territory of a thieves' guild, whether loot is nearby, or whether the people in an area are easy marks or will provide a safe house for thieves on the run.
    - class_name: Rogue
      class_source: PHB
      feature: Cunning Action
      source: PHB
      level: 2
      entries:
        - Starting at 2nd level, your quick thinking and agility allow you to move and act quickly. You can take a bonus action on each of your turns in combat. This action can be used only to take the {@action Dash}, {@action Disengage}, or {@action Hide} action.
    - class_name: Rogue
      class_source: PHB
      feature: Roguish Archetype
      source: PHB
      level: 3
      entries:
        - At 3rd level, you choose an archetype that you emulate in the exercise of your rogue abilities from the list of available archetypes. Your archetype choice grants you features at 3rd level and then again at 9th, 13th, and 17th level.
    - class_name: Rogue
      class_source: PHB
      feature: Steady Aim
      source: TCE
      level: 3
      entries:
        - '{@i 3rd-level rogue {@variantrule optional class features|tce|optional feature}}'
        - As a bonus action, you give yourself advantage on your next attack roll on the current turn. You can use this bonus action only if you haven't moved during this turn, and after you use the bonus action, your speed is 0 until the end of the current turn.
    - class_name: Rogue
      class_source: PHB
      feature: Ability Score Improvement
      source: PHB
      level: 4
      entries:
        - When you reach 4th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can't increase an ability score above 20 using this feature.
        - If your DM allows the use of feats, you may instead take a {@5etools feat|feats.html}.
    - class_name: Rogue
      class_source: PHB
      feature: Uncanny Dodge
      source: PHB
      level: 5
      entries:
        - Starting at 5th level, when an attacker that you can see hits you with an attack, you can use your reaction to halve the attack's damage against you.
    - class_name: Rogue
      class_source: PHB
      feature: Expertise
      source: PHB
      level: 6
      entries:
        - At 6th level, you can choose two more of your proficiencies (in skills or with {@item thieves' tools|phb}) to gain the benefit of Expertise.
    - class_name: Rogue
      class_source: PHB
      feature: Evasion
      source: PHB
      level: 7
      entries:
        - Beginning at 7th level, you can nimbly dodge out of the way of certain area effects, such as a red dragon's fiery breath or an {@spell ice storm} spell. When you are subjected to an effect that allows you to make a Dexterity saving throw to take only half damage, you instead take no damage if you succeed on the saving throw, and only half damage if you fail.
    - class_name: Rogue
      class_source: PHB
      feature: Ability Score Improvement
      source: PHB
      level: 8
      entries:
        - When you reach 8th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can't increase an ability score above 20 using this feature.
        - If your DM allows the use of feats, you may instead take a {@5etools feat|feats.html}.
    - class_name: Rogue
      class_source: PHB
      feature: Roguish Archetype feature
      source: PHB
      level: 9
      entries:
        - At 9th level, you gain a feature granted by your Roguish Archetype.
    - class_name: Rogue
      class_source: PHB
      feature: Ability Score Improvement
      source: PHB
      level: 10
      entries:
        - When you reach 10th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can't increase an ability score above 20 using this feature.
        - If your DM allows the use of feats, you may instead take a {@5etools feat|feats.html}.
    - class_name: Rogue
      class_source: PHB
      feature: Reliable Talent
      source: PHB
      level: 11
      entries:
        - By 11th level, you have refined your chosen skills until they approach perfection. Whenever you make an ability check that lets you add your proficiency bonus, you can treat a {@dice d20} roll of 9 or lower as a 10.
    - class_name: Rogue
      class_source: PHB
      feature: Ability Score Improvement
      source: PHB
      level: 12
      entries:
        - When you reach 12th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can't increase an ability score above 20 using this feature.
        - If your DM allows the use of feats, you may instead take a {@5etools feat|feats.html}.
    - class_name: Rogue
      class_source: PHB
      feature: Roguish Archetype feature
      source: PHB
      level: 13
      entries:
        - At 13th level, you gain a feature granted by your Roguish Archetype.
    - class_name: Rogue
      class_source: PHB
      feature: Blindsense
      source: PHB
      level: 14
      entries:
        - Starting at 14th level, if you are able to hear, you are aware of the location of any hidden or {@condition invisible} creature within 10 feet of you.
    - class_name: Rogue
      class_source: PHB
      feature: Slippery Mind
      source: PHB
      level: 15
      entries:
        - By 15th level, you have acquired greater mental strength. You gain proficiency in Wisdom saving throws.
    - class_name: Rogue
      class_source: PHB
      feature: Ability Score Improvement
      source: PHB
      level: 16
      entries:
        - When you reach 16th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can't increase an ability score above 20 using this feature.
        - If your DM allows the use of feats, you may instead take a {@5etools feat|feats.html}.
    - class_name: Rogue
      class_source: PHB
      feature: Roguish Archetype feature
      source: PHB
      level: 17
      entries:
        - At 17th level, you gain a feature granted by your Roguish Archetype.
    - class_name: Rogue
      class_source: PHB
      feature: Elusive
      source: PHB
      level: 18
      entries:
        - Beginning at 18th level, you are so evasive that attackers rarely gain the upper hand against you. No attack roll has advantage against you while you aren't {@condition incapacitated}.
    - class_name: Rogue
      class_source: PHB
      feature: Ability Score Improvement
      source: PHB
      level: 19
      entries:
        - When you reach 19th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. As normal, you can't increase an ability score above 20 using this feature.
        - If your DM allows the use of feats, you may instead take a {@5etools feat|feats.html}.
    - class_name: Rogue
      class_source: PHB
      feature: Stroke of Luck
      source: PHB
      level: 20
      entries:
        - At 20th level, you have an uncanny knack for succeeding when you need to. If your attack misses a target within range, you can turn the miss into a hit. Alternatively, if you fail an ability check, you can treat the {@dice d20} roll as a 20.
        - Once you use this feature, you can't use it again until you finish a short or long rest.
    - class_name: Rogue
      class_source: XPHB
      feature: Expertise
      source: XPHB
      level: 1
      entries:
        - You gain {@variantrule Expertise|XPHB} in two of your skill proficiencies of your choice. {@skill Sleight of Hand|XPHB} and {@skill Stealth|XPHB} are recommended if you have proficiency in them.
        - At Rogue level 6, you gain {@variantrule Expertise|XPHB} in two more of your skill proficiencies of your choice.
    - class_name: Rogue
      class_source: XPHB
      feature: Sneak Attack
      source: XPHB
      level: 1
      entries:
        - You know how to strike subtly and exploit a foe's distraction. Once per turn, you can deal an extra {@damage 1d6} damage to one creature you hit with an attack roll if you have {@variantrule Advantage|XPHB} on the roll and the attack uses a Finesse or a Ranged weapon. The extra damage's type is the same as the weapon's type.
        - You don't need {@variantrule Advantage|XPHB} on the attack roll if at least one of your allies is within 5 feet of the target, the ally doesn't have the {@condition Incapacitated|XPHB} condition, and you don't have {@variantrule Disadvantage|XPHB} on the attack roll.
        - The extra damage increases as you gain Rogue levels, as shown in the Sneak Attack column of the Rogue Features table.
    - class_name: Rogue
      class_source: XPHB
      feature: Thieves' Cant
      source: XPHB
      level: 1
      entries:
        - You picked up various languages in the communities where you plied your roguish talents. You know Thieves' Cant and one other language of your choice, which you choose from the language tables in {@book chapter 2|XPHB|2|Choose Languages}.
    - class_name: Rogue
      class_source: XPHB
      feature: Weapon Mastery
      source: XPHB
      level: 1
      entries:
        - Your training with weapons allows you to use the {@variantrule weapon mastery properties|XPHB|mastery properties} of two kinds of {@filter weapons|items|type=simple weapon;martial weapon} of your choice with which you have proficiency, such as {@item Dagger|XPHB|Daggers} and {@item Shortbow|XPHB|Shortbows}.
        - Whenever you finish a {@variantrule Long Rest|XPHB}, you can change the kinds of weapons you chose. For example, you could switch to using the {@variantrule weapon mastery properties|XPHB|mastery properties} of {@item Scimitar|XPHB|Scimitars} and {@item Shortsword|XPHB|Shortswords}.
