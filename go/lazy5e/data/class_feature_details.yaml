              - '{@spell Fly|XPHB}, {@spell Gaseous Form|XPHB}'
            - - "13"
              - '{@spell Conjure Minor Elementals|XPHB}, {@spell Summon Elemental|XPHB}'
            - - "17"
              - '{@spell Banishing Smite|XPHB}, {@spell Contact Other Plane|XPHB}'
          type: table
    - class_name: Paladin
      class_source: XPHB
      subclass_name: Noble Genies
      subclass_source: FRHoF
      feature: Genie's Splendor
      source: FRHoF
      level: 3
      entries:
        - When you aren't wearing any armor, your base {@variantrule Armor Class|XPHB} equals 10 plus your Dexterity and Charisma modifiers. You can use a Shield and still gain this benefit.
        - 'You also gain proficiency in one of the following skills of your choice: {@skill Acrobatics|XPHB}, {@skill Intimidation|XPHB}, {@skill Performance|XPHB}, or {@skill Persuasion|XPHB}.'
    - class_name: Paladin
      class_source: XPHB
      subclass_name: Noble Genies
      subclass_source: FRHoF
      feature: Marid's Surge
      source: FRHoF
      level: 3
      entries:
        - The target of your Divine Smite and each creature of your choice in a 10-foot {@variantrule Emanation [Area of Effect]|XPHB|Emanation} originating from you make a Strength saving throw against your spell save DC. On a failed save, a creature is pushed 15 feet straight away from you and has the {@condition Prone|XPHB} condition.
    - class_name: Paladin
      class_source: XPHB
      subclass_name: Noble Genies
      subclass_source: FRHoF
      feature: Oath of the Noble Genies
      source: FRHoF
      level: 3
      entries:
        - '{@i Brandish the Elemental Splendor of Genies}'
        - Paladins sworn to the Oath of the Noble Genies revere the forces of the Elemental Planes. Through taking this oath, Paladins draw power from the four different types of genies—dao, masters of earth; djinn, masters of air; efreet, masters of fire; and marids, masters of water. In Faerûn, many Paladins who swear this oath hail from Calimshan, a land teeming with genies.
        - 'Paladins who swear this oath often undertake quests that take them all over the Realms and across the multiverse—including the Elemental Planes. These paladins share the following tenets:'
        - items:
            - Sow the seeds of creation amid the ashes of destruction.
            - Lead with splendor and grace.
            - Respect the elements, and fear their wrath.
          page: 5
          type: list
        - subclassFeature: Elemental Smite|Paladin|XPHB|Noble Genies|FRHoF|3|FRHoF
          type: refSubclassFeature
        - subclassFeature: Genie Spells|Paladin|XPHB|Noble Genies|FRHoF|3|FRHoF
          type: refSubclassFeature
        - subclassFeature: Genie's Splendor|Paladin|XPHB|Noble Genies|FRHoF|3|FRHoF
          type: refSubclassFeature
    - class_name: Paladin
      class_source: XPHB
      subclass_name: Noble Genies
      subclass_source: FRHoF
      feature: Aura of Elemental Shielding
      source: FRHoF
      level: 7
      entries:
        - 'Choose one of the following damage types: Acid, Cold, Fire, Lightning, or Thunder. You and your allies have {@variantrule Resistance|XPHB} to that damage type while in your Aura of Protection.'
        - At the start of each of your turns, you can change the damage type affected by this feature to one of the other listed options (no action required).
    - class_name: Paladin
      class_source: XPHB
      subclass_name: Noble Genies
      subclass_source: FRHoF
      feature: Elemental Rebuke
      source: FRHoF
      level: 15
      entries:
        - 'When you are hit by an attack roll, you can take a {@variantrule Reaction|XPHB} to halve the attack''s damage against yourself (round down) and force the attacker to make a Dexterity saving throw against your spell save DC. On a failed save, the attacker takes damage equal to {@dice 2d10} plus your Charisma modifier of one of the following types (your choice): Acid, Cold, Fire, Lightning, or Thunder. On a successful save, the attacker takes half as much damage.'
        - You can use this feature a number of times equal to your Charisma modifier (minimum of once), and you regain all expended uses when you finish a {@variantrule Long Rest|XPHB}.
    - class_name: Paladin
      class_source: XPHB
      subclass_name: Noble Genies
      subclass_source: FRHoF
      feature: Noble Scion
      source: FRHoF
      level: 20
      entries:
        - As a {@variantrule Bonus Action|XPHB}, you gain the benefits below for 10 minutes or until you end them (no action required). Once you use this feature, you can't use it again until you finish a {@variantrule Long Rest|XPHB}. You can also restore your use of it by expending a level 5 spell slot (no action required).
        - entries:
            - You have a {@variantrule Fly Speed|XPHB} of 60 feet and can hover.
          name: Flight
          page: 5
          type: entries
        - entries:
            - When you or an ally in your {@classFeature Aura of Protection|Paladin|XPHB|6|XPHB} fails a {@variantrule D20 Test|XPHB}, you can take a {@variantrule Reaction|XPHB} to make the {@variantrule D20 Test|XPHB} succeed instead.
          name: Minor Wish
          page: 5
          type: entries
    - class_name: Paladin
      class_source: XPHB
      subclass_name: Vengeance
      subclass_source: XPHB
      feature: Oath of Vengeance
      source: XPHB
      level: 3
      entries:
        - '{@i Punish Evildoers at Any Cost}'
        - The Oath of Vengeance is a solemn commitment to punish those who have committed grievously evil acts. When evil armies slaughter helpless villagers, when a tyrant defies the will of the gods, when a thieves' guild grows too violent, when a dragon rampages through the countryside—at times like these, paladins arise and swear an Oath of Vengeance to set right what has gone wrong.
        - 'These paladins share the following tenets:'
        - items:
            - Show the wicked no mercy.
            - Fight injustice and its causes.
            - Aid those harmed by injustice.
          type: list
        - subclassFeature: Oath of Vengeance Spells|Paladin|XPHB|Vengeance|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Vow of Enmity|Paladin|XPHB|Vengeance|XPHB|3
          type: refSubclassFeature
    - class_name: Paladin
      class_source: XPHB
      subclass_name: Vengeance
      subclass_source: XPHB
      feature: Oath of Vengeance Spells
      source: XPHB
      level: 3
      entries:
        - The magic of your oath ensures you always have certain spells ready; when you reach a Paladin level specified in the Oath of Vengeance Spells table, you thereafter always have the listed spells prepared.
        - caption: Oath of Vengeance Spells
          colLabels:
            - Paladin Level
            - Spells
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - 3rd
              - '{@spell Bane|XPHB}, {@spell Hunter''s Mark|XPHB}'
            - - 5th
              - '{@spell Hold Person|XPHB}, {@spell Misty Step|XPHB}'
            - - 9th
              - '{@spell Haste|XPHB}, {@spell Protection from Energy|XPHB}'
            - - 13th
              - '{@spell Banishment|XPHB}, {@spell Dimension Door|XPHB}'
            - - 17th
              - '{@spell Hold Monster|XPHB}, {@spell Scrying|XPHB}'
          type: table
    - class_name: Paladin
      class_source: XPHB
      subclass_name: Vengeance
      subclass_source: XPHB
      feature: Vow of Enmity
      source: XPHB
      level: 3
      entries:
        - When you take the {@action Attack|XPHB} action, you can expend one use of your Channel Divinity to utter a vow of enmity against a creature you can see within 30 feet of yourself. You have {@variantrule Advantage|XPHB} on attack rolls against the creature for 1 minute or until you use this feature again.
        - If the creature drops to 0 {@variantrule Hit Points|XPHB} before the vow ends, you can transfer the vow to a different creature within 30 feet of yourself (no action required).
    - class_name: Paladin
      class_source: XPHB
      subclass_name: Vengeance
      subclass_source: XPHB
      feature: Relentless Avenger
      source: XPHB
      level: 7
      entries:
        - Your supernatural focus helps you close off a foe's retreat. When you hit a creature with an {@action Opportunity Attack|XPHB}, you can reduce the creature's {@variantrule Speed|XPHB} to 0 until the end of the current turn. You can then move up to half your {@variantrule Speed|XPHB} as part of the same {@variantrule Reaction|XPHB}. This movement doesn't provoke {@action Opportunity Attack|XPHB|Opportunity Attacks}.
    - class_name: Paladin
      class_source: XPHB
      subclass_name: Vengeance
      subclass_source: XPHB
      feature: Soul of Vengeance
      source: XPHB
      level: 15
      entries:
        - Immediately after a creature under the effect of your Vow of Enmity hits or misses with an attack roll, you can take a {@variantrule Reaction|XPHB} to make a melee attack against that creature if it's within range.
    - class_name: Paladin
      class_source: XPHB
      subclass_name: Vengeance
      subclass_source: XPHB
      feature: Avenging Angel
      source: XPHB
      level: 20
      entries:
        - As a {@variantrule Bonus Action|XPHB}, you gain the benefits below for 10 minutes or until you end them (no action required). Once you use this feature, you can't use it again until you finish a {@variantrule Long Rest|XPHB}. You can also restore your use of it by expending a level 5 spell slot (no action required).
        - entries:
            - You sprout spectral wings on your back, have a {@variantrule Fly Speed|XPHB} of 60 feet, and can hover.
          name: Flight
          type: entries
        - entries:
            - Whenever an enemy starts its turn in your Aura of Protection, that creature must succeed on a Wisdom saving throw or have the {@condition Frightened|XPHB} condition for 1 minute or until it takes any damage. {@action Attack|XPHB} rolls against the {@condition Frightened|XPHB} creature have {@variantrule Advantage|XPHB}.
          name: Frightful Aura
          type: entries
    - class_name: Ranger
      class_source: PHB
      subclass_name: Beast Master
      subclass_source: PHB
      feature: Beast Master
      source: PHB
      level: 3
      entries:
        - The Beast Master archetype embodies a friendship between the civilized races and the beasts of the world. United in focus, beast and ranger work as one to fight the monstrous foes that threaten civilization and the wilderness alike. Emulating the Beast Master archetype means committing yourself to this ideal, working in partnership with an animal as its companion and friend.
        - subclassFeature: Ranger's Companion|Ranger||Beast Master||3
          type: refSubclassFeature
        - subclassFeature: Primal Companion|Ranger||Beast Master||3|TCE
          type: refSubclassFeature
    - class_name: Ranger
      class_source: PHB
      subclass_name: Beast Master
      subclass_source: PHB
      feature: Primal Companion
      source: TCE
      level: 3
      entries:
        - '{@i 3rd-level Beast Master variant feature, which replaces the Ranger''s Companion feature}'
        - You magically summon a primal beast, which draws strength from your bond with nature. The beast is friendly to you and your companions and obeys your commands. Choose its stat block—{@creature Beast of the Land|TCE}, {@creature Beast of the Sea|TCE}, or {@creature Beast of the Sky|TCE}—which uses your proficiency bonus (PB) in several places. You also determine the kind of animal the beast is, choosing a kind appropriate for the stat block. Whatever kind you choose, the beast bears primal markings, indicating its mystical origin.
        - In combat, the beast acts during your turn. It can move and use its reaction on its own, but the only action it takes is the {@action Dodge} action, unless you take a bonus action on your turn to command it to take another action. That action can be one in its stat block or some other action. You can also sacrifice one of your attacks when you take the {@action Attack} action to command the beast to take the {@action Attack} action. If you are {@condition incapacitated}, the beast can take any action of its choice, not just {@action Dodge}.
        - If the beast has died within the last hour, you can use your action to touch it and expend a spell slot of 1st level or higher. The beast returns to life after 1 minute with all its hit points restored.
        - When you finish a long rest, you can summon a different primal beast. The new beast appears in an unoccupied space within 5 feet of you, and you choose its stat block and appearance. If you already have a beast from this feature, it vanishes when the new beast appears. The beast also vanishes if you die.
    - class_name: Ranger
      class_source: PHB
      subclass_name: Beast Master
      subclass_source: PHB
      feature: Ranger's Companion
      source: PHB
      level: 3
      entries:
        - You gain a beast companion that accompanies you on your adventures and is trained to fight alongside you. Choose a {@filter beast that is no larger than Medium and that has a challenge rating of 1/4 or lower|bestiary|challenge rating=[&0;&1/4]|type=beast|size=f;d;t;s;m|miscellaneous=!swarm}. Add your proficiency bonus to the beast's AC, attack rolls, and damage rolls, as well as to any saving throws and skills it is proficient in. Its hit point maximum equals its normal maximum or four times your ranger level, whichever is higher. Like any creature, the beast can spend Hit Dice during a short rest.
        - The beast obeys your commands as best as it can. It takes its turn on your initiative. On your turn, you can verbally command the beast where to move (no action required by you). You can use your action to verbally command it to take the {@action Attack}, {@action Dash}, {@action Disengage}, or {@action Help} action. If you don't issue a command, the beast takes the {@action Dodge} action. Once you have the Extra Attack feature, you can make one weapon attack yourself when you command the beast to take the {@action Attack} action.
        - If you are {@condition incapacitated} or absent, your beast companion acts on its own, focusing on protecting you and itself. It never requires your command to use its reaction, such as when making an opportunity attack.
        - While traveling through your favored terrain with only the beast, you can move stealthily at a normal pace.
        - If the beast dies, you can obtain a new companion by spending 8 hours magically bonding with a beast that isn't hostile to you and that meets the requirements.
    - class_name: Ranger
      class_source: PHB
      subclass_name: Beast Master
      subclass_source: PHB
      feature: Exceptional Training
      source: PHB
      level: 7
      entries:
        - Beginning at 7th level, on any of your turns when your beast companion doesn't attack, you can use a bonus action to command the beast to take the {@action Dash}, {@action Disengage}, or {@action Help} action on its turn. In addition, the beast's attacks now count as magical for the purpose of overcoming resistance and immunity to nonmagical attacks and damage.
    - class_name: Ranger
      class_source: PHB
      subclass_name: Beast Master
      subclass_source: PHB
      feature: Bestial Fury
      source: PHB
      level: 11
      entries:
        - Starting at 11th level, when you command your beast companion to take the {@action Attack} action, the beast can make two attacks, or it can take the Multiattack action if it has that action.
    - class_name: Ranger
      class_source: PHB
      subclass_name: Beast Master
      subclass_source: PHB
      feature: Share Spells
      source: PHB
      level: 15
      entries:
        - Beginning at 15th level, when you cast a spell targeting yourself, you can also affect your beast companion with the spell if the beast is within 30 feet of you.
    - class_name: Ranger
      class_source: PHB
      subclass_name: Drakewarden
      subclass_source: FTD
      feature: Draconic Gift
      source: FTD
      level: 3
      entries:
        - '{@i 3rd-level Drakewarden feature}'
        - 'The bond you share with your drake creates a connection to dragonkind, granting you understanding and empowering your presence. You gain the following benefits:'
        - items:
            - entry: You learn the {@spell thaumaturgy} cantrip, which is a ranger spell for you.
              name: Thaumaturgy
              type: item
            - entry: You learn to speak, read, and write Draconic or one other language of your choice.
              name: Tongue of Dragons
              type: item
          style: list-hang-notitle
          type: list
    - class_name: Ranger
      class_source: PHB
      subclass_name: Drakewarden
      subclass_source: FTD
      feature: Drake Companion
      source: FTD
      level: 3
      entries:
        - '{@i 3rd-level Drakewarden feature}'
        - As an action, you can magically summon the drake that is bound to you. It appears in an unoccupied space of your choice within 30 feet of you.
        - The drake is friendly to you and your companions, and it obeys your commands. See its game statistics in the accompanying {@creature Drake Companion|FTD} stat block, which uses your proficiency bonus (PB) in several places. Whenever you summon the drake, choose a damage type listed in its Draconic Essence trait. You can determine the cosmetic characteristics of the drake, such as its color, its scale texture, or any visible effect of its Draconic Essence; your choice has no effect on its game statistics.
        - In combat, the drake shares your initiative count, but it takes its turn immediately after yours. It can move and use its reaction on its own, but the only action it takes on its turn is the {@action Dodge} action, unless you take a bonus action on your turn to command it to take another action. That action can be one in its stat block or some other action. If you are {@condition incapacitated}, the drake can take any action of its choice, not just {@action Dodge}.
        - The drake remains until it is reduced to 0 hit points, until you use this feature to summon the drake again, or until you die. Anything the drake was wearing or carrying is left behind when the drake vanishes.
        - Once you summon the drake, you can't do so again until you finish a long rest, unless you expend a spell slot of 1st level or higher to summon it.
    - class_name: Ranger
      class_source: PHB
      subclass_name: Drakewarden
      subclass_source: FTD
      feature: Drakewarden
      source: FTD
      level: 3
      entries:
        - Your connection to the natural world takes the form of a draconic spirit, which can manifest in physical form as a drake. As your powers grow, your drake grows as well, blossoming from a small four-legged companion to a majestic winged creature large and strong enough for you to ride. Along the way, you gain an increasing share of the awe-inspiring power of dragons.
        - Consider the source of the draconic spirit you have bonded with. The Drakewarden Origin table offers examples.
        - caption: Drakewarden Origin
          colLabels:
            - d6
            - Origin
          colStyles:
            - col-1 text-center
            - col-11
          rows:
            - - "1"
              - You studied a dragon's scale or claw, or a trinket from a dragon's hoard, creating your bond through that token's lingering draconic magic.
            - - "2"
              - A secret order of rangers who collect and guard draconic lore taught you their ways.
            - - "3"
              - A dragon gave you a geode or gemstone to care for. To your surprise, the drake hatched from that stone.
            - - "4"
              - You ingested a few drops of dragon blood, forever infusing your nature magic with draconic power.
            - - "5"
              - An ancient Draconic inscription on a standing stone empowered you when you read it aloud.
            - - "6"
              - You had a vivid dream of a mysterious figure accompanied by seven yellow canaries, who warned you of impending doom. When you awoke, your drake was there, watching you.
          type: table
        - subclassFeature: Draconic Gift|Ranger||Drakewarden|FTD|3
          type: refSubclassFeature
        - subclassFeature: Drake Companion|Ranger||Drakewarden|FTD|3
          type: refSubclassFeature
    - class_name: Ranger
      class_source: PHB
      subclass_name: Drakewarden
      subclass_source: FTD
      feature: Bond of Fang and Scale
      source: FTD
      level: 7
      entries:
        - '{@i 7th-level Drakewarden feature}'
        - The bond you share with your drake intensifies, protecting you and stoking the drake's fury. When you summon your drake, it grows wings on its back and gains a flying speed equal to its walking speed.
        - 'In addition, while your drake is summoned, you and the drake gain the following benefits:'
        - items:
            - entries:
                - The drake grows to Medium size. Reflecting your special bond, you can use the drake as a mount if your size is Medium or smaller. While you are riding your drake, it can't use the flying speed of this feature.
              name: Drake Mount
              type: item
            - entries:
                - The drake's Bite attack deals an extra {@damage 1d6} damage of the type chosen for the drake's Draconic Essence.
              name: Magic Fang
              type: item
            - entries:
                - You gain resistance to the damage type chosen for the drake's Draconic Essence.
              name: Resistance
              type: item
          style: list-hang-notitle
          type: list
    - class_name: Ranger
      class_source: PHB
      subclass_name: Drakewarden
      subclass_source: FTD
      feature: Drake's Breath
      source: FTD
      level: 11
      entries:
        - '{@i 11th-level Drakewarden feature}'
        - As an action, you can exhale a 30-foot cone of damaging breath or cause your drake to exhale it. Choose acid, cold, fire, lightning, or poison damage (your choice doesn't have to match your drake's Draconic Essence). Each creature in the cone must make a Dexterity saving throw against your spell save DC, taking {@damage 8d6} damage on a failed save, or half as much damage on a successful one.
        - This damage increases to {@damage 10d6} when you reach 15th level in this class.
        - Once you use this feature, you can't do so again until you finish a long rest, unless you expend a spell slot of 3rd level or higher to use it again.
    - class_name: Ranger
      class_source: PHB
      subclass_name: Drakewarden
      subclass_source: FTD
      feature: Perfected Bond
      source: FTD
      level: 15
      entries:
        - '{@i 15th-level Drakewarden feature}'
        - 'Your bond to your drake reaches the pinnacle of its power. While your drake is summoned, you and the drake gain the following benefits:'
        - items:
            - entries:
                - The drake's Bite attack deals an extra {@damage 1d6} damage of the type chosen for its Draconic Essence (for a total of {@damage 2d6} extra damage).
              name: Empowered Bite
              type: item
            - entries:
                - The drake grows to Large size. When you ride your drake, it is no longer prohibited from using the flying speed of Bond of Fang and Scale.
              name: Large Drake
              type: item
            - entries:
                - When either you or the drake takes damage while you're within 30 feet of each other, you can use your reaction to give yourself or the drake resistance to that instance of damage. You can use this reaction a number of times equal to your proficiency bonus, and you regain all expended uses when you finish a long rest.
              name: Reflexive Resistance
              type: item
          style: list-hang-notitle
          type: list
    - class_name: Ranger
      class_source: PHB
      subclass_name: Fey Wanderer
      subclass_source: TCE
      feature: Dreadful Strikes
      source: TCE
      level: 3
      entries:
        - '{@i 3rd-level Fey Wanderer feature}'
        - You can augment your weapon strikes with mind-scarring magic, drawn from the gloomy hollows of the Feywild. When you hit a creature with a weapon, you can deal an extra {@damage 1d4} psychic damage to the target, which can take this extra damage only once per turn.
        - The extra damage increases to {@damage 1d6} when you reach 11th level in this class.
    - class_name: Ranger
      class_source: PHB
      subclass_name: Fey Wanderer
      subclass_source: TCE
      feature: Fey Wanderer
      source: TCE
      level: 3
      entries:
        - A fey mystique surrounds you, thanks to the boon of an archfey, the shining fruit you ate from a talking tree, the magic spring you swam in, or some other auspicious event. However you acquired your fey magic, you are now a Fey Wanderer, a ranger who represents both the mortal and the fey realms. As you wander the multiverse, your joyful laughter brightens the hearts of the downtrodden, and your martial prowess strikes terror in your foes, for great is the mirth of the fey and dreadful is their fury.
        - subclassFeature: Dreadful Strikes|Ranger||Fey Wanderer|TCE|3
          type: refSubclassFeature
        - subclassFeature: Fey Wanderer Magic|Ranger||Fey Wanderer|TCE|3
          type: refSubclassFeature
        - subclassFeature: Otherworldly Glamour|Ranger||Fey Wanderer|TCE|3
          type: refSubclassFeature
    - class_name: Ranger
      class_source: PHB
      subclass_name: Fey Wanderer
      subclass_source: TCE
      feature: Fey Wanderer Magic
      source: TCE
      level: 3
      entries:
        - '{@i 3rd-level Fey Wanderer feature}'
        - You learn an additional spell when you reach certain levels in this class, as shown in the Fey Wanderer Spells table. Each spell counts as a ranger spell for you, but it doesn't count against the number of ranger spells you know.
        - caption: Fey Wanderer Spells
          colLabels:
            - Ranger Level
            - Spells
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - 3rd
              - '{@spell charm person}'
            - - 5th
              - '{@spell misty step}'
            - - 9th
              - '{@spell dispel magic}'
            - - 13th
              - '{@spell dimension door}'
            - - 17th
              - '{@spell mislead}'
          type: table
        - You also possess a preternatural blessing from a fey ally or a place of fey power. Choose your blessing from the Feywild Gifts table or determine it randomly.
        - caption: Feywild Gifts
          colLabels:
            - d6
            - Gift
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - "1"
              - Illusory butterflies flutter around you while you take a short or long rest.
            - - "2"
              - Fresh, seasonal flowers sprout from your hair each dawn.
            - - "3"
              - You faintly smell of cinnamon, lavender, nutmeg, or another comforting herb or spice.
            - - "4"
              - Your shadow dances while no one is looking directly at it.
            - - "5"
              - Horns or antlers sprout from your head.
            - - "6"
              - Your skin and hair change color to match the season at each dawn.
          type: table
    - class_name: Ranger
      class_source: PHB
      subclass_name: Fey Wanderer
      subclass_source: TCE
      feature: Otherworldly Glamour
      source: TCE
      level: 3
      entries:
        - '{@i 3rd-level Fey Wanderer feature}'
        - Your fey qualities give you a supernatural charm. As a result, whenever you make a Charisma check, you gain a bonus to the check equal to your Wisdom modifier (minimum of +1).
        - 'In addition, you gain proficiency in one of the following skills of your choice: {@skill Deception}, {@skill Performance}, or {@skill Persuasion}.'
    - class_name: Ranger
      class_source: PHB
      subclass_name: Fey Wanderer
      subclass_source: TCE
      feature: Beguiling Twist
      source: TCE
      level: 7
      entries:
        - '{@i 7th-level Fey Wanderer feature}'
        - The magic of the Feywild guards your mind. You have advantage on saving throws against being {@condition charmed} or {@condition frightened}.
        - In addition, whenever you or a creature you can see within 120 feet of you succeeds on a saving throw against being {@condition charmed} or {@condition frightened}, you can use your reaction to force a different creature you can see within 120 feet of you to make a Wisdom saving throw against your spell save DC. If the save fails, the target is {@condition charmed} or {@condition frightened} by you (your choice) for 1 minute. The target can repeat the saving throw at the end of each of its turns, ending the effect on itself on a successful save.
    - class_name: Ranger
      class_source: PHB
      subclass_name: Fey Wanderer
      subclass_source: TCE
      feature: Fey Reinforcements
      source: TCE
      level: 11
      entries:
        - '{@i 11th-level Fey Wanderer feature}'
        - 'The royal courts of the Feywild have blessed you with the assistance of fey beings: you know {@spell summon fey|tce}. It doesn''t count against the number of ranger spells you know, and you can cast it without a material component. You can also cast it once without a spell slot, and you regain the ability to do so when you finish a long rest.'
        - Whenever you start casting the spell, you can modify it so that it doesn't require {@status concentration}. If you do so, the spell's duration becomes 1 minute for that casting.
    - class_name: Ranger
      class_source: PHB
      subclass_name: Fey Wanderer
      subclass_source: TCE
      feature: Misty Wanderer
      source: TCE
      level: 15
      entries:
        - '{@i 15th-level Fey Wanderer feature}'
        - 'You can slip in and out of the Feywild to move in a blink of an eye: you can cast {@spell misty step} without expending a spell slot. You can do so a number of times equal to your Wisdom modifier (minimum of once), and you regain all expended uses when you finish a long rest.'
        - In addition, whenever you cast {@i misty step}, you can bring along one willing creature you can see within 5 feet of you. That creature teleports to an unoccupied space of your choice within 5 feet of your destination space.
    - class_name: Ranger
      class_source: PHB
      subclass_name: Gloom Stalker
      subclass_source: XGE
      feature: Dread Ambusher
      source: XGE
      level: 3
      entries:
        - At 3rd level, you master the art of the ambush. You can give yourself a bonus to your initiative rolls equal to your Wisdom modifier.
        - At the start of your first turn of each combat, your walking speed increases by 10 feet, which lasts until the end of that turn. If you take the {@action Attack} action on that turn, you can make one additional weapon attack as part of that action. If that attack hits, the target takes an extra {@damage 1d8} damage of the weapon's damage type.
    - class_name: Ranger
      class_source: PHB
      subclass_name: Gloom Stalker
      subclass_source: XGE
      feature: Gloom Stalker
      source: XGE
      level: 3
      entries:
        - 'Gloom Stalkers are at home in the darkest places: deep under the earth, in gloomy alleyways, in primeval forests, and wherever else the light dims. Most folk enter such places with trepidation, but a Gloom Stalker ventures boldly into the darkness, seeking to ambush threats before they can reach the broader world. Such rangers are often found in the Underdark, but they will go any place where evil lurks in the shadows.'
        - subclassFeature: Gloom Stalker Magic|Ranger||Gloom Stalker|XGE|3
          type: refSubclassFeature
        - subclassFeature: Dread Ambusher|Ranger||Gloom Stalker|XGE|3
          type: refSubclassFeature
        - subclassFeature: Umbral Sight|Ranger||Gloom Stalker|XGE|3
          type: refSubclassFeature
    - class_name: Ranger
      class_source: PHB
      subclass_name: Gloom Stalker
      subclass_source: XGE
      feature: Gloom Stalker Magic
      source: XGE
      level: 3
      entries:
        - Starting at 3rd level, you learn an additional spell when you reach certain levels in this class, as shown in the Gloom Stalker Spells table. The spell counts as a ranger spell for you, but it doesn't count against the number of ranger spells you know.
        - caption: Gloom Stalker Spells
          colLabels:
            - Ranger Level
            - Spells
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - 3rd
              - '{@spell disguise self}'
            - - 5th
              - '{@spell rope trick}'
            - - 9th
              - '{@spell fear}'
            - - 13th
              - '{@spell greater invisibility}'
            - - 17th
              - '{@spell seeming}'
          type: table
    - class_name: Ranger
      class_source: PHB
      subclass_name: Gloom Stalker
      subclass_source: XGE
      feature: Umbral Sight
      source: XGE
      level: 3
      entries:
        - At 3rd level, you gain {@sense darkvision} out to a range of 60 feet. If you already have {@sense darkvision} from your race, its range increases by 30 feet.
        - You are also adept at evading creatures that rely on {@sense darkvision}. While in darkness, you are {@condition invisible} to any creature that relies on {@sense darkvision} to see you in that darkness.
    - class_name: Ranger
      class_source: PHB
      subclass_name: Gloom Stalker
      subclass_source: XGE
      feature: Iron Mind
      source: XGE
      level: 7
      entries:
        - By 7th level, you have honed your ability to resist the mind-altering powers of your prey. You gain proficiency in Wisdom saving throws. If you already have this proficiency, you instead gain proficiency in Intelligence or Charisma saving throws (your choice).
    - class_name: Ranger
      class_source: PHB
      subclass_name: Gloom Stalker
      subclass_source: XGE
      feature: Stalker's Flurry
      source: XGE
      level: 11
      entries:
        - At 11th level, you learn to attack with such unexpected speed that you can turn a miss into another strike. Once on each of your turns when you miss with a weapon attack, you can make another weapon attack as part of the same action.
    - class_name: Ranger
      class_source: PHB
      subclass_name: Gloom Stalker
      subclass_source: XGE
      feature: Shadowy Dodge
      source: XGE
      level: 15
      entries:
        - Starting at 15th level, you can dodge in unforeseen ways, with wisps of supernatural shadow around you. Whenever a creature makes an attack roll against you and doesn't have advantage on the roll, you can use your reaction to impose disadvantage on it. You must use this feature before you know the outcome of the attack roll.
    - class_name: Ranger
      class_source: PHB
      subclass_name: Horizon Walker
      subclass_source: XGE
      feature: Detect Portal
      source: XGE
      level: 3
      entries:
        - At 3rd level, you gain the ability to magically sense the presence of a planar portal. As an action, you detect the distance and direction to the closest planar portal within 1 mile of you.
        - Once you use this feature, you can't use it again until you finish a short or long rest.
        - See the "Planar Travel" section in chapter 2 of the Dungeon Master's Guide for examples of planar portals.
    - class_name: Ranger
      class_source: PHB
      subclass_name: Horizon Walker
      subclass_source: XGE
      feature: Horizon Walker
      source: XGE
      level: 3
      entries:
        - Horizon Walkers guard the world against threats that originate from other planes or that seek to ravage the mortal realm with otherworldly magic. They seek out planar portals and keep watch over them, venturing to the Inner Planes and the Outer Planes as needed to pursue their foes. These rangers are also friends to any forces in the multiverse—especially benevolent dragons, fey, and elementals—that work to preserve life and the order of the planes.
        - subclassFeature: Horizon Walker Magic|Ranger||Horizon Walker|XGE|3
          type: refSubclassFeature
        - subclassFeature: Detect Portal|Ranger||Horizon Walker|XGE|3
          type: refSubclassFeature
        - subclassFeature: Planar Warrior|Ranger||Horizon Walker|XGE|3
          type: refSubclassFeature
    - class_name: Ranger
      class_source: PHB
      subclass_name: Horizon Walker
      subclass_source: XGE
      feature: Horizon Walker Magic
      source: XGE
      level: 3
      entries:
        - Starting at 3rd level, you learn an additional spell when you reach certain levels in this class, as shown in the Horizon Walker Spells table. The spell counts as a ranger spell for you, but it doesn't count against the number of ranger spells you know.
        - caption: Horizon Walker Spells
          colLabels:
            - Ranger Level
            - Spells
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - 3rd
              - '{@spell protection from evil and good}'
            - - 5th
              - '{@spell misty step}'
            - - 9th
              - '{@spell haste}'
            - - 13th
              - '{@spell banishment}'
            - - 17th
              - '{@spell teleportation circle}'
          type: table
    - class_name: Ranger
      class_source: PHB
      subclass_name: Horizon Walker
      subclass_source: XGE
      feature: Planar Warrior
      source: XGE
      level: 3
      entries:
        - At 3rd level, you learn to draw on the energy of the multiverse to augment your attacks.
        - As a bonus action, choose one creature you can see within 30 feet of you. The next time you hit that creature on this turn with a weapon attack, all damage dealt by the attack becomes force damage, and the creature takes an extra {@damage 1d8} force damage from the attack. When you reach 11th level in this class, the extra damage increases to {@damage 2d8}.
    - class_name: Ranger
      class_source: PHB
      subclass_name: Horizon Walker
      subclass_source: XGE
      feature: Ethereal Step
      source: XGE
      level: 7
      entries:
        - At 7th level, you learn to step through the Ethereal Plane. As a bonus action, you can cast the {@spell etherealness} spell with this feature, without expending a spell slot, but the spell ends at the end of the current turn.
        - Once you use this feature, you can't use it again until you finish a short or long rest.
    - class_name: Ranger
      class_source: PHB
      subclass_name: Horizon Walker
      subclass_source: XGE
      feature: Distant Strike
      source: XGE
      level: 11
      entries:
        - At 11th level, you gain the ability to pass between the planes in the blink of an eye. When you take the {@action Attack} action, you can teleport up to 10 feet before each attack to an unoccupied space you can see.
        - If you attack at least two different creatures with the action, you can make one additional attack with it against a third creature.
    - class_name: Ranger
      class_source: PHB
      subclass_name: Horizon Walker
      subclass_source: XGE
      feature: Spectral Defense
      source: XGE
      level: 15
      entries:
        - At 15th level, your ability to move between planes enables you to slip through the planar boundaries to lessen the harm done to you during battle. When you take damage from an attack, you can use your reaction to give yourself resistance to all of that attack's damage on this turn.
    - class_name: Ranger
      class_source: PHB
      subclass_name: Hunter
      subclass_source: PHB
      feature: Colossus Slayer
      source: PHB
      level: 3
      entries:
        - Your tenacity can wear down the most potent foes. When you hit a creature with a weapon attack, the creature takes an extra {@damage 1d8} damage if it's below its hit point maximum. You can deal this extra damage only once per turn.
    - class_name: Ranger
      class_source: PHB
      subclass_name: Hunter
      subclass_source: PHB
      feature: Giant Killer
      source: PHB
      level: 3
      entries:
        - When a Large or larger creature within 5 feet of you hits or misses you with an attack, you can use your reaction to attack that creature immediately after its attack, provided that you can see the creature.
    - class_name: Ranger
      class_source: PHB
      subclass_name: Hunter
      subclass_source: PHB
      feature: Horde Breaker
      source: PHB
      level: 3
      entries:
        - Once on each of your turns when you make a weapon attack, you can make another attack with the same weapon against a different creature that is within 5 feet of the original target and within range of your weapon.
    - class_name: Ranger
      class_source: PHB
      subclass_name: Hunter
      subclass_source: PHB
      feature: Hunter
      source: PHB
      level: 3
      entries:
        - Emulating the Hunter archetype means accepting your place as a bulwark between civilization and the terrors of the wilderness. As you walk the Hunter's path, you learn specialized techniques for fighting the threats you face, from rampaging ogres and hordes of orcs to towering giants and terrifying dragons.
        - subclassFeature: Hunter's Prey|Ranger||Hunter||3
          type: refSubclassFeature
    - class_name: Ranger
      class_source: PHB
      subclass_name: Hunter
      subclass_source: PHB
      feature: Hunter's Prey
      source: PHB
      level: 3
      entries:
        - At 3rd level, you gain one of the following features of your choice.
        - count: 1
          entries:
            - subclassFeature: Colossus Slayer|Ranger||Hunter||3
              type: refSubclassFeature
            - subclassFeature: Giant Killer|Ranger||Hunter||3
              type: refSubclassFeature
            - subclassFeature: Horde Breaker|Ranger||Hunter||3
              type: refSubclassFeature
          type: options
    - class_name: Ranger
      class_source: PHB
      subclass_name: Hunter
      subclass_source: PHB
      feature: Defensive Tactics
      source: PHB
      level: 7
      entries:
        - At 7th level, you gain one of the following features of your choice.
        - count: 1
          entries:
            - subclassFeature: Escape the Horde|Ranger||Hunter||7
              type: refSubclassFeature
            - subclassFeature: Multiattack Defense|Ranger||Hunter||7
              type: refSubclassFeature
            - subclassFeature: Steel Will|Ranger||Hunter||7
              type: refSubclassFeature
          type: options
    - class_name: Ranger
      class_source: PHB
      subclass_name: Hunter
      subclass_source: PHB
      feature: Escape the Horde
      source: PHB
      level: 7
      entries:
        - Opportunity attacks against you are made with disadvantage.
    - class_name: Ranger
      class_source: PHB
      subclass_name: Hunter
      subclass_source: PHB
      feature: Multiattack Defense
      source: PHB
      level: 7
      entries:
        - When a creature hits you with an attack, you gain a +4 bonus to AC against all subsequent attacks made by that creature for the rest of the turn.
    - class_name: Ranger
      class_source: PHB
      subclass_name: Hunter
      subclass_source: PHB
      feature: Steel Will
      source: PHB
      level: 7
      entries:
        - You have advantage on saving throws against being {@condition frightened}.
    - class_name: Ranger
      class_source: PHB
      subclass_name: Hunter
      subclass_source: PHB
      feature: Multiattack
      source: PHB
      level: 11
      entries:
        - At 11th level, you gain one of the following features of your choice.
        - count: 1
          entries:
            - subclassFeature: Volley|Ranger||Hunter||11
              type: refSubclassFeature
            - subclassFeature: Whirlwind Attack|Ranger||Hunter||11
              type: refSubclassFeature
          type: options
    - class_name: Ranger
      class_source: PHB
      subclass_name: Hunter
      subclass_source: PHB
      feature: Volley
      source: PHB
      level: 11
      entries:
        - You can use your action to make a ranged attack against any number of creatures within 10 feet of a point you can see within your weapon's range. You must have ammunition for each target, as normal, and you make a separate attack roll for each target.
    - class_name: Ranger
      class_source: PHB
      subclass_name: Hunter
      subclass_source: PHB
      feature: Whirlwind Attack
      source: PHB
      level: 11
      entries:
        - You can use your action to make a melee attack against any number of creatures within 5 feet of you, with a separate attack roll for each target.
    - class_name: Ranger
      class_source: PHB
      subclass_name: Hunter
      subclass_source: PHB
      feature: Evasion
      source: PHB
      level: 15
      entries:
        - You can nimbly dodge out of the way of certain area effects, such as a red dragon's fiery breath or a {@spell lightning bolt} spell. When you are subjected to an effect that allows you to make a Dexterity saving throw to take only half damage, you instead take no damage if you succeed on the saving throw, and only half damage if you fail.
    - class_name: Ranger
      class_source: PHB
      subclass_name: Hunter
      subclass_source: PHB
      feature: Stand Against the Tide
      source: PHB
      level: 15
      entries:
        - When a hostile creature misses you with a melee attack, you can use your reaction to force that creature to repeat the same attack against another creature (other than itself) of your choice.
    - class_name: Ranger
      class_source: PHB
      subclass_name: Hunter
      subclass_source: PHB
      feature: Superior Hunter's Defense
      source: PHB
      level: 15
      entries:
        - At 15th level, you gain one of the following features of your choice.
        - count: 1
          entries:
            - subclassFeature: Evasion|Ranger||Hunter||15
              type: refSubclassFeature
            - subclassFeature: Stand Against the Tide|Ranger||Hunter||15
              type: refSubclassFeature
            - subclassFeature: Uncanny Dodge|Ranger||Hunter||15
              type: refSubclassFeature
          type: options
    - class_name: Ranger
      class_source: PHB
      subclass_name: Hunter
      subclass_source: PHB
      feature: Uncanny Dodge
      source: PHB
      level: 15
      entries:
        - When an attacker that you can see hits you with an attack, you can use your reaction to halve the attack's damage against you.
    - class_name: Ranger
      class_source: PHB
      subclass_name: Monster Slayer
      subclass_source: XGE
      feature: Hunter's Sense
      source: XGE
      level: 3
      entries:
        - At 3rd level, you gain the ability to peer at a creature and magically discern how best to hurt it. As an action, choose one creature you can see within 60 feet of you. You immediately learn whether the creature has any damage immunities, resistances, or vulnerabilities and what they are. If the creature is hidden from divination magic, you sense that it has no damage immunities, resistances, or vulnerabilities.
        - You can use this feature a number of times equal to your Wisdom modifier (minimum of once). You regain all expended uses of it when you finish a long rest.
    - class_name: Ranger
      class_source: PHB
      subclass_name: Monster Slayer
      subclass_source: XGE
      feature: Monster Slayer
      source: XGE
      level: 3
      entries:
        - You have dedicated yourself to hunting down creatures of the night and wielders of grim magic. A Monster Slayer seeks out vampires, dragons, evil fey, fiends, and other magical threats. Trained in supernatural techniques to overcome such monsters, slayers are experts at unearthing and defeating mighty, mystical foes.
        - subclassFeature: Monster Slayer Magic|Ranger||Monster Slayer|XGE|3
          type: refSubclassFeature
        - subclassFeature: Hunter's Sense|Ranger||Monster Slayer|XGE|3
          type: refSubclassFeature
        - subclassFeature: Slayer's Prey|Ranger||Monster Slayer|XGE|3
          type: refSubclassFeature
    - class_name: Ranger
      class_source: PHB
      subclass_name: Monster Slayer
      subclass_source: XGE
      feature: Monster Slayer Magic
      source: XGE
      level: 3
      entries:
        - Starting at 3rd level, you learn an additional spell when you reach certain levels in this class, as shown in the Monster Slayer Spells table. The spell counts as a ranger spell for you, but it doesn't count against the number of ranger spells you know.
        - caption: Monster Slayer Spells
          colLabels:
            - Ranger Level
            - Spells
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - 3rd
              - '{@spell protection from evil and good}'
            - - 5th
              - '{@spell zone of truth}'
            - - 9th
              - '{@spell magic circle}'
            - - 13th
              - '{@spell banishment}'
            - - 17th
              - '{@spell hold monster}'
          type: table
    - class_name: Ranger
      class_source: PHB
      subclass_name: Monster Slayer
      subclass_source: XGE
      feature: Slayer's Prey
      source: XGE
      level: 3
      entries:
        - Starting at 3rd level, you can focus your ire on one foe, increasing the harm you inflict on it. As a bonus action, you designate one creature you can see within 60 feet of you as the target of this feature. The first time each turn that you hit that target with a weapon attack, it takes an extra {@damage 1d6} damage from the weapon.
        - This benefit lasts until you finish a short or long rest. It ends early if you designate a different creature.
    - class_name: Ranger
      class_source: PHB
      subclass_name: Monster Slayer
      subclass_source: XGE
      feature: Supernatural Defense
      source: XGE
      level: 7
      entries:
        - At 7th level, you gain extra resilience against your prey's assaults on your mind and body. Whenever the target of your Slayer's Prey forces you to make a saving throw and whenever you make an ability check to escape that target's grapple, add {@dice 1d6} to your roll.
    - class_name: Ranger
      class_source: PHB
      subclass_name: Monster Slayer
      subclass_source: XGE
      feature: Magic-User's Nemesis
      source: XGE
      level: 11
      entries:
        - At 11th level, you gain the ability to thwart someone else's magic. When you see a creature casting a spell or teleporting within 60 feet of you, you can use your reaction to try to magically foil it. The creature must succeed on a Wisdom saving throw against your spell save DC, or its spell or teleport fails and is wasted.
        - Once you use this feature, you can't use it again until you finish a short or long rest.
    - class_name: Ranger
      class_source: PHB
      subclass_name: Monster Slayer
      subclass_source: XGE
      feature: Slayer's Counter
      source: XGE
      level: 15
      entries:
        - At 15th level, you gain the ability to counterattack when your prey tries to sabotage you. If the target of your Slayer's Prey forces you to make a saving throw, you can use your reaction to make one weapon attack against the quarry. You make this attack immediately before making the saving throw. If your attack hits, your save automatically succeeds, in addition to the attack's normal effects.
    - class_name: Ranger
      class_source: PHB
      subclass_name: Swarmkeeper
      subclass_source: TCE
      feature: Gathered Swarm
      source: TCE
      level: 3
      entries:
        - '{@i 3rd-level Swarmkeeper feature}'
        - A swarm of intangible nature spirits has bonded itself to you and can assist you in battle. While you're alive, the swarm remains in your space, crawling on you or flying and skittering around you within your space. You determine its appearance, or you generate its appearance by rolling on the Swarm Appearance table.
        - caption: Swarm Appearance
          colLabels:
            - d4
            - Appearance
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - "1"
              - Swarming insects
            - - "2"
              - Miniature twig blights
            - - "3"
              - Fluttering birds
            - - "4"
              - Playful pixies
          type: table
        - 'Once on each of your turns, you can cause the swarm to assist you in one of the following ways, immediately after you hit a creature with an attack:'
        - items:
            - The attack's target takes {@damage 1d6} piercing damage from the swarm.
            - The attack's target must succeed on a Strength saving throw against your spell save DC or be moved by the swarm up to 15 feet horizontally in a direction of your choice.
            - You are moved by the swarm 5 feet horizontally in a direction of your choice.
          type: list
        - entries:
            - A Swarmkeeper's swarm and spells are reflections of the character's bond with nature spirits. Take the opportunity to describe the swarm and the ranger's magic in play. For example, when your ranger casts gaseous form, they might appear to melt into the swarm, instead of a cloud of mist, or the {@spell arcane eye} spell could create an extension of your swarm that spies for you. Such descriptions don't change the effects of spells, but they are an exciting opportunity to explore your character's narrative through their class abilities. For more guidance on customizing spells, see the "Personalizing Spells" section in chapter 3.
            - Also, remember that the swarm's appearance is yours to customize, and don't feel confined to a single appearance. Perhaps the spirits' look changes with the ranger's mood or with the seasons. You decide!
          name: It's Your Swarm
          type: inset
    - class_name: Ranger
      class_source: PHB
      subclass_name: Swarmkeeper
      subclass_source: TCE
      feature: Swarmkeeper
      source: TCE
      level: 3
      entries:
        - Feeling a deep connection to the environment around them, some rangers reach out through their magical connection to the world and bond with a swarm of nature spirits. The swarm becomes a potent force in battle, as well as helpful company for the ranger. Some Swarmkeepers are outcasts or hermits, keeping to themselves and their attendant swarms rather than dealing with the discomfort of others. Other Swarmkeepers enjoy building vibrant communities that work for the mutual benefit of all those they consider part of their swarm.
        - subclassFeature: Gathered Swarm|Ranger||Swarmkeeper|TCE|3
          type: refSubclassFeature
        - subclassFeature: Swarmkeeper Magic|Ranger||Swarmkeeper|TCE|3
          type: refSubclassFeature
    - class_name: Ranger
      class_source: PHB
      subclass_name: Swarmkeeper
      subclass_source: TCE
      feature: Swarmkeeper Magic
      source: TCE
      level: 3
      entries:
        - '{@i 3rd-level Swarmkeeper feature}'
        - You learn the {@spell mage hand} cantrip if you don't already know it. When you cast it, the hand takes the form of your swarming nature spirits.
        - You also learn an additional spell of 1st level or higher when you reach certain levels in this class, as shown in the Swarmkeeper Spells table. Each spell counts as a ranger spell for you, but it doesn't count against the number of ranger spells you know.
        - caption: Swarmkeeper Spells
          colLabels:
            - Ranger Level
            - Spells
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - 3rd
              - '{@spell faerie fire}'
            - - 5th
              - '{@spell web}'
            - - 9th
              - '{@spell gaseous form}'
            - - 13th
              - '{@spell arcane eye}'
            - - 17th
              - '{@spell insect plague}'
          type: table
    - class_name: Ranger
      class_source: PHB
      subclass_name: Swarmkeeper
      subclass_source: TCE
      feature: Writhing Tide
      source: TCE
      level: 7
      entries:
        - '{@i 7th-level Swarmkeeper feature}'
        - You can condense part of your swarm into a focused mass that lifts you up. As a bonus action, you gain a flying speed of 10 feet and can hover. This effect lasts for 1 minute or until you are {@condition incapacitated}.
        - You can use this feature a number of times equal to your proficiency bonus, and you regain all expended uses when you finish a long rest.
    - class_name: Ranger
      class_source: PHB
      subclass_name: Swarmkeeper
      subclass_source: TCE
      feature: Mighty Swarm
      source: TCE
      level: 11
      entries:
        - '{@i 11th-level Swarmkeeper feature}'
        - 'Your Gathered Swarm grows mightier in the following ways:'
        - items:
            - The damage of Gathered Swarm increases to {@damage 1d8}.
            - If a creature fails its saving throw against being moved by Gathered Swarm, you can also cause the swarm to knock the creature {@condition prone}.
            - When you are moved by Gathered Swarm, it gives you {@quickref Cover||3||half cover} until the start of your next turn.
          type: list
    - class_name: Ranger
      class_source: PHB
      subclass_name: Swarmkeeper
      subclass_source: TCE
      feature: Swarming Dispersal
      source: TCE
      level: 15
      entries:
        - '{@i 15th-level Swarmkeeper feature}'
        - You can discorporate into your swarm, avoiding danger. When you take damage, you can use your reaction to give yourself resistance to that damage. You vanish into your swarm and then teleport to an unoccupied space that you can see within 30 feet of you, where you reappear with the swarm.
        - You can use this feature a number of times equal to your proficiency bonus, and you regain all expended uses when you finish a long rest.
    - class_name: Ranger
      class_source: XPHB
      subclass_name: Beast Master
      subclass_source: XPHB
      feature: Beast Master
      source: XPHB
      level: 3
      entries:
        - '{@i Bond with a Primal Beast}'
        - A Beast Master forms a mystical bond with a special animal, drawing on primal magic and a deep connection to the natural world.
        - subclassFeature: Primal Companion|Ranger|XPHB|Beast Master|XPHB|3
          type: refSubclassFeature
    - class_name: Ranger
      class_source: XPHB
      subclass_name: Beast Master
      subclass_source: XPHB
      feature: Primal Companion
      source: XPHB
      level: 3
      entries:
        - 'You magically summon a primal beast, which draws strength from your bond with nature. Choose its stat block: {@creature Beast of the Land|XPHB}, {@creature Beast of the Sea|XPHB}, or {@creature Beast of the Sky|XPHB}. You also determine the kind of animal it is, choosing a kind appropriate for the stat block. Whatever beast you choose, it bears primal markings indicating its supernatural origin.'
        - The beast is Friendly to you and your allies and obeys your commands. It vanishes if you die.
        - entries:
            - entries:
                - In combat, the beast acts during your turn. It can move and use its {@variantrule Reaction|XPHB} on its own, but the only action it takes is the {@action Dodge|XPHB} action unless you take a {@variantrule Bonus Action|XPHB} to command it to take an action in its stat block or some other action. You can also sacrifice one of your attacks when you take the {@action Attack|XPHB} action to command the beast to take the Beast's Strike action. If you have the {@condition Incapacitated|XPHB} condition, the beast acts on its own and isn't limited to the {@action Dodge|XPHB} action.
              name: The Beast in Combat
              type: entries
            - entries:
                - If the beast has died within the last hour, you can take a {@action Magic|XPHB} action to touch it and expend a spell slot. The beast returns to life after 1 minute with all its {@variantrule Hit Points|XPHB} restored.
                - Whenever you finish a {@variantrule Long Rest|XPHB}, you can summon a different primal beast, which appears in an unoccupied space within 5 feet of you. You choose its stat block and appearance. If you already have a beast from this feature, the old one vanishes when the new one appears.
              name: Restoring or Replacing the Beast
              type: entries
          type: entries
    - class_name: Ranger
      class_source: XPHB
      subclass_name: Beast Master
      subclass_source: XPHB
      feature: Exceptional Training
      source: XPHB
      level: 7
      entries:
        - When you take a {@variantrule Bonus Action|XPHB} to command your Primal Companion beast to take an action, you can also command it to take the {@action Dash|XPHB}, {@action Disengage|XPHB}, {@action Dodge|XPHB}, or {@action Help|XPHB} action using its {@variantrule Bonus Action|XPHB}.
        - In addition, whenever it hits with an attack roll and deals damage, it can deal your choice of Force damage or its normal damage type.
    - class_name: Ranger
      class_source: XPHB
      subclass_name: Beast Master
      subclass_source: XPHB
      feature: Bestial Fury
      source: XPHB
      level: 11
      entries:
        - When you command your Primal Companion beast to take the Beast's Strike action, the beast can use it twice.
        - In addition, the first time each turn it hits a creature under the effect of your {@spell Hunter's Mark|XPHB} spell, the beast deals extra Force damage equal to the bonus damage of that spell.
    - class_name: Ranger
      class_source: XPHB
      subclass_name: Beast Master
      subclass_source: XPHB
      feature: Share Spells
      source: XPHB
      level: 15
      entries:
        - When you cast a spell targeting yourself, you can also affect your Primal Companion beast with the spell if the beast is within 30 feet of you.
    - class_name: Ranger
      class_source: XPHB
      subclass_name: Fey Wanderer
      subclass_source: XPHB
      feature: Dreadful Strikes
      source: XPHB
      level: 3
      entries:
        - You can augment your weapon strikes with mind-scarring magic drawn from the murky hollows of the Feywild. When you hit a creature with a weapon, you can deal an extra {@damage 1d4} Psychic damage to the target, which can take this extra damage only once per turn. The extra damage increases to {@damage 1d6} when you reach Ranger level 11.
    - class_name: Ranger
      class_source: XPHB
      subclass_name: Fey Wanderer
      subclass_source: XPHB
      feature: Fey Wanderer
      source: XPHB
      level: 3
      entries:
        - '{@i Wield Fey Mirth and Fury}'
        - A fey mystique surrounds you, thanks to the boon of an archfey or a location in the Feywild that transformed you. However you gained fey magic, you are now a Fey Wanderer. Your joyful laughter brightens the hearts of the downtrodden, and your martial prowess strikes terror in your foes, for great is the mirth of the fey and dreadful is their fury.
        - subclassFeature: Dreadful Strikes|Ranger|XPHB|Fey Wanderer|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Fey Wanderer Spells|Ranger|XPHB|Fey Wanderer|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Otherworldly Glamour|Ranger|XPHB|Fey Wanderer|XPHB|3
          type: refSubclassFeature
    - class_name: Ranger
      class_source: XPHB
      subclass_name: Fey Wanderer
      subclass_source: XPHB
      feature: Fey Wanderer Spells
      source: XPHB
      level: 3
      entries:
        - When you reach a Ranger level specified in the Fey Wanderer Spells table, you thereafter always have the listed spells prepared.
        - caption: Fey Wanderer Spells
          colLabels:
            - Ranger Level
            - Spells
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - 3rd
              - '{@spell Charm Person|XPHB}'
            - - 5th
              - '{@spell Misty Step|XPHB}'
            - - 9th
              - '{@spell Summon Fey|XPHB}'
            - - 13th
              - '{@spell Dimension Door|XPHB}'
            - - 17th
              - '{@spell Mislead|XPHB}'
          type: table
        - You also possess a fey blessing. Choose it from the Feywild Gifts table or determine it randomly.
        - caption: Feywild Gifts
          colLabels:
            - 1d6
            - Gift
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - "1"
              - Illusory butterflies flutter around you while you take a {@variantrule Short Rest|XPHB|Short} or {@variantrule Long Rest|XPHB}.
            - - "2"
              - Flowers bloom from your hair each dawn.
            - - "3"
              - You faintly smell of cinnamon, lavender, nutmeg, or another comforting herb or spice.
            - - "4"
              - Your shadow dances while no one is looking directly at it.
            - - "5"
              - Horns or antlers sprout from your head.
            - - "6"
              - Your skin and hair change color each dawn.
          type: table
    - class_name: Ranger
      class_source: XPHB
      subclass_name: Fey Wanderer
      subclass_source: XPHB
      feature: Otherworldly Glamour
      source: XPHB
      level: 3
      entries:
        - Whenever you make a Charisma check, you gain a bonus to the check equal to your Wisdom modifier (minimum of +1).
        - 'You also gain proficiency in one of these skills of your choice: {@skill Deception|XPHB}, {@skill Performance|XPHB}, or {@skill Persuasion|XPHB}.'
    - class_name: Ranger
      class_source: XPHB
      subclass_name: Fey Wanderer
      subclass_source: XPHB
      feature: Beguiling Twist
      source: XPHB
      level: 7
      entries:
        - The magic of the Feywild guards your mind. You have {@variantrule Advantage|XPHB} on saving throws to avoid or end the {@condition Charmed|XPHB} or {@condition Frightened|XPHB} condition.
        - In addition, whenever you or a creature you can see within 120 feet of you succeeds on a saving throw to avoid or end the {@condition Charmed|XPHB} or {@condition Frightened|XPHB} condition, you can take a {@variantrule Reaction|XPHB} to force a different creature you can see within 120 feet of yourself to make a Wisdom save against your spell save DC. On a failed save, the target is {@condition Charmed|XPHB} or {@condition Frightened|XPHB} (your choice) for 1 minute. The target repeats the save at the end of each of its turns, ending the effect on itself on a success.
    - class_name: Ranger
      class_source: XPHB
      subclass_name: Fey Wanderer
      subclass_source: XPHB
      feature: Fey Reinforcements
      source: XPHB
      level: 11
      entries:
        - You can cast {@spell Summon Fey|XPHB} without a Material component. You can also cast it once without a spell slot, and you regain the ability to cast it in this way when you finish a {@variantrule Long Rest|XPHB}.
        - Whenever you start casting the spell, you can modify it so that it doesn't require {@status Concentration|XPHB}. If you do so, the spell's duration becomes 1 minute for that casting.
    - class_name: Ranger
      class_source: XPHB
      subclass_name: Fey Wanderer
      subclass_source: XPHB
      feature: Misty Wanderer
      source: XPHB
      level: 15
      entries:
        - You can cast {@spell Misty Step|XPHB} without expending a spell slot. You can do so a number of times equal to your Wisdom modifier (minimum of once), and you regain all expended uses when you finish a {@variantrule Long Rest|XPHB}.
        - In addition, whenever you cast {@spell Misty Step|XPHB}, you can bring along one willing creature you can see within 5 feet of yourself. That creature teleports to an unoccupied space of your choice within 5 feet of your destination space.
    - class_name: Ranger
      class_source: XPHB
      subclass_name: Gloom Stalker
      subclass_source: XPHB
      feature: Dread Ambusher
      source: XPHB
      level: 3
      entries:
        - You have mastered the art of creating fearsome ambushes, granting you the following benefits.
        - entries:
            - At the start of your first turn of each combat, your {@variantrule Speed|XPHB} increases by 10 feet until the end of that turn.
          name: Ambusher's Leap
          type: entries
        - entries:
            - When you attack a creature and hit it with a weapon, you can deal an extra {@damage 2d6} Psychic damage. You can use this benefit only once per turn, you can use it a number of times equal to your Wisdom modifier (minimum of once), and you regain all expended uses when you finish a {@variantrule Long Rest|XPHB}.
          name: Dreadful Strike
          type: entries
        - entries:
            - When you roll {@variantrule Initiative|XPHB}, you can add your Wisdom modifier to the roll.
          name: Initiative Bonus
          type: entries
    - class_name: Ranger
      class_source: XPHB
      subclass_name: Gloom Stalker
      subclass_source: XPHB
      feature: Gloom Stalker
      source: XPHB
      level: 3
      entries:
        - '{@i Draw on Shadow Magic to Fight Your Foes}'
        - Gloom Stalkers are at home in the darkest places, wielding magic drawn from the Shadowfell to combat enemies that lurk in darkness.
        - subclassFeature: Dread Ambusher|Ranger|XPHB|Gloom Stalker|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Gloom Stalker Spells|Ranger|XPHB|Gloom Stalker|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Umbral Sight|Ranger|XPHB|Gloom Stalker|XPHB|3
          type: refSubclassFeature
    - class_name: Ranger
      class_source: XPHB
      subclass_name: Gloom Stalker
      subclass_source: XPHB
      feature: Gloom Stalker Spells
      source: XPHB
      level: 3
      entries:
        - When you reach a Ranger level specified in the Gloom Stalker Spells table, you thereafter always have the listed spells prepared.
        - caption: Gloom Stalker Spells
          colLabels:
            - Ranger Level
            - Spells
          colStyles:
            - col-1 text-center
            - col-11
          rows:
            - - 3rd
              - '{@spell Disguise Self|XPHB}'
            - - 5th
              - '{@spell Rope Trick|XPHB}'
            - - 9th
              - '{@spell Fear|XPHB}'
            - - 13th
              - '{@spell Greater Invisibility|XPHB}'
            - - 17th
              - '{@spell Seeming|XPHB}'
          type: table
    - class_name: Ranger
      class_source: XPHB
      subclass_name: Gloom Stalker
      subclass_source: XPHB
      feature: Umbral Sight
      source: XPHB
      level: 3
      entries:
        - You gain {@sense Darkvision|XPHB} with a range of 60 feet. If you already have {@sense Darkvision|XPHB} when you gain this feature, its range increases by 60 feet.
        - You are also adept at evading creatures that rely on {@sense Darkvision|XPHB}. While entirely in {@variantrule Darkness|XPHB}, you have the {@condition Invisible|XPHB} condition to any creature that relies on {@sense Darkvision|XPHB} to see you in that {@variantrule Darkness|XPHB}.
    - class_name: Ranger
      class_source: XPHB
      subclass_name: Gloom Stalker
      subclass_source: XPHB
      feature: Iron Mind
      source: XPHB
      level: 7
      entries:
        - You have honed your ability to resist mind-altering powers. You gain proficiency in Wisdom saving throws. If you already have this proficiency, you instead gain proficiency in Intelligence or Charisma saving throws (your choice).
    - class_name: Ranger
      class_source: XPHB
      subclass_name: Gloom Stalker
      subclass_source: XPHB
      feature: Stalker's Flurry
      source: XPHB
      level: 11
      entries:
        - The Psychic damage of your Dreadful Strike becomes {@damage 2d8}. In addition, when you use the Dreadful Strike effect of your Dread Ambusher feature, you can cause one of the following additional effects.
        - entries:
            - You can make another attack with the same weapon against a different creature that is within 5 feet of the original target and that is within the weapon's range.
          name: Sudden Strike
          type: entries
        - entries:
            - The target and each creature within 10 feet of it must make a Wisdom saving throw against your spell save DC. On a failed save, a creature has the {@condition Frightened|XPHB} condition until the start of your next turn.
          name: Mass Fear
          type: entries
    - class_name: Ranger
      class_source: XPHB
      subclass_name: Gloom Stalker
      subclass_source: XPHB
      feature: Shadowy Dodge
      source: XPHB
      level: 15
      entries:
        - When a creature makes an attack roll against you, you can take a {@variantrule Reaction|XPHB} to impose {@variantrule Disadvantage|XPHB} on that roll. Whether the attack hits or misses, you can then teleport up to 30 feet to an unoccupied space you can see.
    - class_name: Ranger
      class_source: XPHB
      subclass_name: Hunter
      subclass_source: XPHB
      feature: Hunter
      source: XPHB
      level: 3
      entries:
        - '{@i Protect Nature and People from Destruction}'
        - You stalk prey in the wilds and elsewhere, using your abilities as a Hunter to protect nature and people everywhere from forces that would destroy them.
        - subclassFeature: Hunter's Prey|Ranger|XPHB|Hunter|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Hunter's Lore|Ranger|XPHB|Hunter|XPHB|3
          type: refSubclassFeature
    - class_name: Ranger
      class_source: XPHB
      subclass_name: Hunter
      subclass_source: XPHB
      feature: Hunter's Lore
      source: XPHB
      level: 3
      entries:
        - You can call on the forces of nature to reveal certain strengths and weaknesses of your prey. While a creature is marked by your Hunter's Mark, you know whether that creature has any Immunities, Resistances, or Vulnerabilities, and if the creature has any, you know what they are.
    - class_name: Ranger
      class_source: XPHB
      subclass_name: Hunter
      subclass_source: XPHB
      feature: Hunter's Prey
      source: XPHB
      level: 3
      entries:
        - You gain one of the following feature options of your choice. Whenever you finish a {@variantrule Short Rest|XPHB|Short} or {@variantrule Long Rest|XPHB}, you can replace the chosen option with the other one.
        - entries:
            - entries:
                - Your tenacity can wear down even the most resilient foes. When you hit a creature with a weapon, the weapon deals an extra {@damage 1d8} damage to the target if it's missing any of its {@variantrule Hit Points|XPHB}. You can deal this extra damage only once per turn.
              name: Colossus Slayer
              type: entries
            - entries:
                - Once on each of your turns when you make an attack with a weapon, you can make another attack with the same weapon against a different creature that is within 5 feet of the original target, that is within the weapon's range, and that you haven't attacked this turn.
              name: Horde Breaker
              type: entries
          type: entries
    - class_name: Ranger
      class_source: XPHB
      subclass_name: Hunter
      subclass_source: XPHB
      feature: Defensive Tactics
      source: XPHB
      level: 7
      entries:
        - You gain one of the following feature options of your choice. Whenever you finish a {@variantrule Short Rest|XPHB|Short} or {@variantrule Long Rest|XPHB}, you can replace the chosen option with the other one.
        - entries:
            - entries:
                - '{@action Opportunity Attack|XPHB|Opportunity Attacks} have {@variantrule Disadvantage|XPHB} against you.'
              name: Escape the Horde
              type: entries
            - entries:
                - When a creature hits you with an attack roll, that creature has {@variantrule Disadvantage|XPHB} on all other attack rolls against you this turn.
              name: Multiattack Defense
              type: entries
          type: entries
    - class_name: Ranger
      class_source: XPHB
      subclass_name: Hunter
      subclass_source: XPHB
      feature: Superior Hunter's Prey
      source: XPHB
      level: 11
      entries:
        - Once per turn when you deal damage to a creature marked by your Hunter's Mark, you can also deal that spell's extra damage to a different creature that you can see within 30 feet of the first creature.
    - class_name: Ranger
      class_source: XPHB
      subclass_name: Hunter
      subclass_source: XPHB
      feature: Superior Hunter's Defense
      source: XPHB
      level: 15
      entries:
        - When you take damage, you can take a {@variantrule Reaction|XPHB} to give yourself {@variantrule Resistance|XPHB} to that damage and any other damage of the same type until the end of the current turn.
    - class_name: Ranger
      class_source: XPHB
      subclass_name: Winter Walker
      subclass_source: FRHoF
      feature: Frigid Explorer
      source: FRHoF
      level: 3
      entries:
        - You gain the following benefits.
        - entries:
            - Damage from your weapon attacks, Ranger spells, and Ranger features ignores {@variantrule Resistance|XPHB} to Cold damage.
          name: Biting Cold
          page: 6
          type: entries
        - entries:
            - You have {@variantrule Resistance|XPHB} to Cold damage.
          name: Frost Resistance
          page: 6
          type: entries
        - entries:
            - When you hit a creature with an attack roll using a weapon, you can deal an extra {@damage 1d4} Cold damage to the target, which can take this extra damage only once per turn. When you reach Ranger level 11, this extra damage increases to {@dice 1d6}.
          name: Polar Strikes
          page: 6
          type: entries
    - class_name: Ranger
      class_source: XPHB
      subclass_name: Winter Walker
      subclass_source: FRHoF
      feature: Hunter's Rime
      source: FRHoF
      level: 3
      entries:
        - Ice rimes you and your prey, protecting you and slowing them. When you cast {@spell Hunter's Mark|XPHB}, you gain {@variantrule Temporary Hit Points|XPHB} equal to {@dice 1d10} plus your {@class Ranger|XPHB} level.
        - Additionally, while a creature is marked by your {@spell Hunter's Mark|XPHB}, it can't take the {@action Disengage|XPHB} action.
    - class_name: Ranger
      class_source: XPHB
      subclass_name: Winter Walker
      subclass_source: FRHoF
      feature: Winter Walker
      source: FRHoF
      level: 3
      entries:
        - '{@i Withstand the Horrors of Frigid Wastelands}'
        - Winter Walkers hone their craft in the bleak and frozen wilds of places like Icewind Dale. These ruthless, rimed Rangers hunt monsters that haunt arctic wastelands, eventually becoming frigid terrors themselves. Winter Walkers are well versed in the phenomena of Icewind Dale, including the latent magic of fallen Netherese cities, endemic monsters like {@creature yeti|XMM|yetis} and {@creature crag cat|SKT|crag cats}, and the rising threat of Underdark invaders. Due to their cold pragmatism, terrifying magic, and mastery of the region, Winter Walkers are regarded with equal parts respect and fear. Ten-Towns citizens say that Winter Walkers' frequent exposure to malignant entities gives them their fearsome powers. Many Reghed nomads, on the other hand, believe that nature spirits bestow on Winter Walkers a unique curse.
        - subclassFeature: Frigid Explorer|Ranger|XPHB|Winter Walker|FRHoF|3|FRHoF
          type: refSubclassFeature
        - subclassFeature: Hunter's Rime|Ranger|XPHB|Winter Walker|FRHoF|3|FRHoF
          type: refSubclassFeature
        - subclassFeature: Winter Walker Spells|Ranger|XPHB|Winter Walker|FRHoF|3|FRHoF
          type: refSubclassFeature
    - class_name: Ranger
      class_source: XPHB
      subclass_name: Winter Walker
      subclass_source: FRHoF
      feature: Winter Walker Spells
      source: FRHoF
      level: 3
      entries:
        - When you reach a Ranger level specified in the Winter Walker Spells table, you thereafter always have the listed spells prepared.
        - colLabels:
            - Ranger Level
            - Spells
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - "3"
              - '{@spell Ice Knife|XPHB}'
            - - "5"
              - '{@spell Hold Person|XPHB}'
            - - "9"
              - '{@spell Remove Curse|XPHB}'
            - - "13"
              - '{@spell Ice Storm|XPHB}'
            - - "17"
              - '{@spell Cone of Cold|XPHB}'
          type: table
    - class_name: Ranger
      class_source: XPHB
      subclass_name: Winter Walker
      subclass_source: FRHoF
      feature: Fortifying Soul
      source: FRHoF
      level: 7
      entries:
        - Your experience surviving harrowing environments allows you to bolster your allies in addition to yourself. As a {@action Magic|XPHB} action, choose a number of creatures you can see equal to your Wisdom modifier (minimum of one). Each chosen creature regains {@variantrule Hit Points|XPHB} equal to {@dice 1d10} plus your Ranger level and has {@variantrule Advantage|XPHB} on saving throws to avoid or end the {@condition Frightened|XPHB} condition for 1 hour.
        - Once you use this feature, you can't use it again until you finish a {@variantrule Long Rest|XPHB}.
    - class_name: Ranger
      class_source: XPHB
      subclass_name: Winter Walker
      subclass_source: FRHoF
      feature: Chilling Retribution
      source: FRHoF
      level: 11
      entries:
        - When a creature hits you with an attack roll, you can take a {@variantrule Reaction|XPHB} to force the creature to make a Wisdom saving throw against your spell save DC. On a failed save, the target has the {@condition Stunned|XPHB} condition until the end of your next turn. While the target is {@condition Stunned|XPHB}, its {@variantrule Speed|XPHB} is reduced to 0 feet.
        - You can use this feature a number of times equal to your Wisdom modifier (minimum of once), and you regain all expended uses when you finish a {@variantrule Long Rest|XPHB}.
    - class_name: Ranger
      class_source: XPHB
      subclass_name: Winter Walker
      subclass_source: FRHoF
      feature: Frozen Haunt
      source: FRHoF
      level: 15
      entries:
        - When you cast {@spell Hunter's Mark|XPHB}, you can adopt a ghostly, snowy form. This form lasts until the spell ends, and while you are in this form, you gain the following benefits. Once you use this feature, you can't use it again until you finish a {@variantrule Long Rest|XPHB} unless you expend a level 4+ spell slot (no action required).
        - entries:
            - You have {@variantrule Immunity|XPHB} to Cold damage. When you first adopt this form and at the start of each of your subsequent turns, each creature of your choice in a 15-foot {@variantrule Emanation [Area of Effect]|XPHB|Emanation} originating from you takes {@damage 2d4} Cold damage.
          name: Frozen Soul
          page: 6
          type: entries
        - entries:
            - You have {@variantrule Immunity|XPHB} to the {@condition Grappled|XPHB}, {@condition Prone|XPHB}, and {@condition Restrained|XPHB} conditions. You can move through creatures and objects as if they were {@variantrule Difficult Terrain|XPHB}, but you take {@damage 1d10} Force damage if you end your turn inside a creature or an object. If the form ends while you are inside a creature or an object, you are shunted to the nearest unoccupied space.
          name: Partially Incorporeal
          page: 6
          type: entries
    - class_name: Rogue
      class_source: PHB
      subclass_name: Arcane Trickster
      subclass_source: PHB
      feature: Arcane Trickster
      source: PHB
      level: 3
      entries:
        - Some rogues enhance their fine-honed skills of stealth and agility with magic, learning tricks of enchantment and illusion. These rogues include pickpockets and burglars, but also pranksters, mischief-makers, and a significant number of adventurers.
        - subclassFeature: Spellcasting|Rogue||Arcane Trickster||3
          type: refSubclassFeature
        - subclassFeature: Mage Hand Legerdemain|Rogue||Arcane Trickster||3
          type: refSubclassFeature
    - class_name: Rogue
      class_source: PHB
      subclass_name: Arcane Trickster
      subclass_source: PHB
      feature: Mage Hand Legerdemain
      source: PHB
      level: 3
      entries:
        - 'Starting at 3rd level, when you cast {@spell mage hand}, you can make the spectral hand {@condition invisible}, and you can perform the following additional tasks with it:'
        - items:
            - You can stow one object the hand is holding in a container worn or carried by another creature.
            - You can retrieve an object in a container worn or carried by another creature.
            - You can use {@item thieves' tools|phb} to pick locks and disarm traps at range.
          type: list
        - You can perform one of these tasks without being noticed by a creature if you succeed on a Dexterity ({@skill Sleight of Hand}) check contested by the creature's Wisdom ({@skill Perception}) check.
        - In addition, you can use the bonus action granted by your Cunning Action to control the hand.
    - class_name: Rogue
      class_source: PHB
      subclass_name: Arcane Trickster
      subclass_source: PHB
      feature: Spellcasting
      source: PHB
      level: 3
      entries:
        - When you reach 3rd level, you gain the ability to cast spells. See {@book chapter 10|PHB|10} for the general rules of spellcasting and {@book chapter 11|PHB|11} for the {@filter wizard spell list|spells|class=wizard}.
        - entries:
            - entries:
                - 'You learn three cantrips: {@spell mage hand} and two other cantrips of your choice from the wizard spell list. You learn another wizard cantrip of your choice at 10th level.'
              name: Cantrips
              type: entries
          type: entries
        - entries:
            - entries:
                - The Arcane Trickster Spellcasting table shows how many spell slots you have to cast your {@filter wizard spells|spells|class=wizard} of 1st level and higher. To cast one of these spells, you must expend a slot of the spell's level or higher. You regain all expended spell slots when you finish a long rest.
                - For example, if you know the 1st-level spell {@spell charm person} and have a 1st-level and a 2nd-level spell slot available, you can cast {@spell charm person} using either slot.
              name: Spell Slots
              type: entries
          type: entries
        - entries:
            - entries:
                - You know three 1st-level wizard spells of your choice, two of which you must choose from the enchantment and illusion spells on the wizard spell list.
                - The Spells Known column of the Arcane Trickster Spellcasting table shows when you learn more wizard spells of 1st level or higher. Each of these spells must be an enchantment or illusion spell of your choice, and must be of a level for which you have spell slots. For instance, when you reach 7th level in this class, you can learn one new spell of 1st or 2nd level.
                - The spells you learn at 8th, 14th, and 20th level can come from any school of magic.
                - Whenever you gain a level in this class, you can replace one of the wizard spells you know with another spell of your choice from the wizard spell list. The new spell must be of a level for which you have spell slots, and it must be an enchantment or illusion spell, unless you're replacing the spell you gained at 3rd, 8th, 14th, or 20th level from any school of magic.
              name: Spells Known of 1st-Level and Higher
              type: entries
          type: entries
        - entries:
            - entries:
                - Intelligence is your spellcasting ability for your wizard spells, since you learn your spells through dedicated study and memorization. You use your Intelligence whenever a spell refers to your spellcasting ability. In addition, you use your Intelligence modifier when setting the saving throw DC for a wizard spell you cast and when making an attack roll with one.
                - attributes:
                    - int
                  name: Spell
                  type: abilityDc
                - attributes:
                    - int
                  name: Spell
                  type: abilityAttackMod
              name: Spellcasting Ability
              type: entries
          type: entries
    - class_name: Rogue
      class_source: PHB
      subclass_name: Arcane Trickster
      subclass_source: PHB
      feature: Magical Ambush
      source: PHB
      level: 9
      entries:
        - Starting at 9th level, if you are hidden from a creature when you cast a spell on it, the creature has disadvantage on any saving throw it makes against the spell this turn.
    - class_name: Rogue
      class_source: PHB
      subclass_name: Arcane Trickster
      subclass_source: PHB
      feature: Versatile Trickster
      source: PHB
      level: 13
      entries:
        - At 13th level, you gain the ability to distract targets with your {@spell mage hand}. As a bonus action on your turn, you can designate a creature within 5 feet of the spectral hand created by the spell. Doing so gives you advantage on attack rolls against that creature until the end of the turn.
    - class_name: Rogue
      class_source: PHB
      subclass_name: Arcane Trickster
      subclass_source: PHB
      feature: Spell Thief
      source: PHB
      level: 17
      entries:
        - At 17th level, you gain the ability to magically steal the knowledge of how to cast a spell from another spellcaster.
        - Immediately after a creature casts a spell that targets you or includes you in its area of effect, you can use your reaction to force the creature to make a saving throw with its spellcasting ability modifier. The DC equals your spell save DC. On a failed save, you negate the spell's effect against you, and you steal the knowledge of the spell if it is at least 1st level and of a level you can cast (it doesn't need to be a wizard spell). For the next 8 hours, you know the spell and can cast it using your spell slots. The creature can't cast that spell until the 8 hours have passed.
        - Once you use this feature, you can't use it again until you finish a long rest.
    - class_name: Rogue
      class_source: PHB
      subclass_name: Assassin
      subclass_source: PHB
      feature: Assassin
      source: PHB
      level: 3
      entries:
        - You focus your training on the grim art of death. Those who adhere to this archetype are diverse—hired killers, spies, bounty hunters, and even specially anointed priests trained to exterminate the enemies of their deity. Stealth, poison, and disguise help you eliminate your foes with deadly efficiency.
        - Your archetype grants you features at 3rd level and then again at 9th, 13th, and 17th level.
        - subclassFeature: Assassinate|Rogue||Assassin||3
          type: refSubclassFeature
        - subclassFeature: Bonus Proficiencies|Rogue||Assassin||3
          type: refSubclassFeature
    - class_name: Rogue
      class_source: PHB
      subclass_name: Assassin
      subclass_source: PHB
      feature: Assassinate
      source: PHB
      level: 3
      entries:
        - Starting at 3rd level, you are at your deadliest when you get the drop on your enemies. You have advantage on attack rolls against any creature that hasn't taken a turn in the combat yet. In addition, any hit you score against a creature that is {@status surprised} is a critical hit.
    - class_name: Rogue
      class_source: PHB
      subclass_name: Assassin
      subclass_source: PHB
      feature: Bonus Proficiencies
      source: PHB
      level: 3
      entries:
        - When you choose this archetype at 3rd level, you gain proficiency with the {@item disguise kit|phb} and the {@item poisoner's kit|phb}.
    - class_name: Rogue
      class_source: PHB
      subclass_name: Assassin
      subclass_source: PHB
      feature: Infiltration Expertise
      source: PHB
      level: 9
      entries:
        - Starting at 9th level, you can unfailingly create false identities for yourself. You must spend seven days and 25 gp to establish the history, profession, and affiliations for an identity. You can't establish an identity that belongs to someone else. For example, you might acquire appropriate clothing, letters of introduction, and official-looking certification to establish yourself as a member of a trading house from a remote city so you can insinuate yourself into the company of other wealthy merchants.
        - Thereafter, if you adopt the new identity as a disguise, other creatures believe you to be that person until given an obvious reason not to.
    - class_name: Rogue
      class_source: PHB
      subclass_name: Assassin
      subclass_source: PHB
      feature: Impostor
      source: PHB
      level: 13
      entries:
        - At 13th level, you gain the ability to unerringly mimic another person's speech, writing, and behavior. You must spend at least three hours studying these three components of the person's behavior, listening to speech, examining handwriting, and observing mannerism.
        - Your ruse is indiscernible to the casual observer. If a wary creature suspects something is amiss, you have advantage on any Charisma ({@skill Deception}) check you make to avoid detection.
    - class_name: Rogue
      class_source: PHB
      subclass_name: Assassin
      subclass_source: PHB
      feature: Death Strike
      source: PHB
      level: 17
      entries:
        - Starting at 17th level, you become a master of instant death. When you attack and hit a creature that is {@status surprised}, it must make a Constitution saving throw ({@dc 8} + your Dexterity modifier + your proficiency bonus). On a failed save, double the damage of your attack against the creature.
    - class_name: Rogue
      class_source: PHB
      subclass_name: Inquisitive
      subclass_source: XGE
      feature: Ear for Deceit
      source: XGE
      level: 3
      entries:
        - When you choose this archetype at 3rd level, you develop a talent for picking out lies. Whenever you make a Wisdom ({@skill Insight}) check to determine whether a creature is lying, treat a roll of 7 or lower on the {@dice d20} as an 8.
    - class_name: Rogue
      class_source: PHB
      subclass_name: Inquisitive
      subclass_source: XGE
      feature: Eye for Detail
      source: XGE
      level: 3
      entries:
        - Starting at 3rd level, you can use a bonus action to make a Wisdom ({@skill Perception}) check to spot a hidden creature or object or to make an Intelligence ({@skill Investigation}) check to uncover or decipher clues.
    - class_name: Rogue
      class_source: PHB
      subclass_name: Inquisitive
      subclass_source: XGE
      feature: Inquisitive
      source: XGE
      level: 3
      entries:
        - As an archetypal Inquisitive, you excel at rooting out secrets and unraveling mysteries. You rely on your sharp eye for detail, but also on your finely honed ability to read the words and deeds of other creatures to determine their true intent. You excel at defeating creatures that hide among and prey upon ordinary folk, and your mastery of lore and your keen deductions make you well equipped to expose and end hidden evils.
        - subclassFeature: Ear for Deceit|Rogue||Inquisitive|XGE|3
          type: refSubclassFeature
        - subclassFeature: Eye for Detail|Rogue||Inquisitive|XGE|3
          type: refSubclassFeature
        - subclassFeature: Insightful Fighting|Rogue||Inquisitive|XGE|3
          type: refSubclassFeature
    - class_name: Rogue
      class_source: PHB
      subclass_name: Inquisitive
      subclass_source: XGE
      feature: Insightful Fighting
      source: XGE
      level: 3
      entries:
        - At 3rd level, you gain the ability to decipher an opponent's tactics and develop a counter to them. As a bonus action, you can make a Wisdom ({@skill Insight}) check against a creature you can see that isn't {@condition incapacitated}, contested by the target's Charisma ({@skill Deception}) check. If you succeed, you can use your Sneak Attack against that target even if you don't have advantage on the attack roll, but not if you have disadvantage on it.
        - This benefit lasts for 1 minute or until you successfully use this feature against a different target.
    - class_name: Rogue
      class_source: PHB
      subclass_name: Inquisitive
      subclass_source: XGE
      feature: Steady Eye
      source: XGE
      level: 9
      entries:
        - Starting at 9th level, you have advantage on any Wisdom ({@skill Perception}) or Intelligence ({@skill Investigation}) check if you move no more than half your speed on the same turn.
    - class_name: Rogue
      class_source: PHB
      subclass_name: Inquisitive
      subclass_source: XGE
      feature: Unerring Eye
      source: XGE
      level: 13
      entries:
        - Beginning at 13th level, your senses are almost impossible to foil. As an action, you sense the presence of illusions, shapechangers not in their original form, and other magic designed to deceive the senses within 30 feet of you, provided you aren't {@condition blinded} or {@condition deafened}. You sense that an effect is attempting to trick you, but you gain no insight into what is hidden or into its true nature.
        - You can use this feature a number of times equal to your Wisdom modifier (minimum of once), and you regain all expended uses of it when you finish a long rest.
    - class_name: Rogue
      class_source: PHB
      subclass_name: Inquisitive
      subclass_source: XGE
      feature: Eye for Weakness
      source: XGE
      level: 17
      entries:
        - At 17th level, you learn to exploit a creature's weaknesses by carefully studying its tactics and movement. While your Insightful Fighting feature applies to a creature, your Sneak Attack damage against that creature increases by {@damage 3d6}.
    - class_name: Rogue
      class_source: PHB
      subclass_name: Mastermind
      subclass_source: XGE
      feature: Master of Intrigue
      source: XGE
      level: 3
      entries:
        - When you choose this archetype at 3rd level, you gain proficiency with the {@item disguise kit|phb}, the {@item forgery kit|phb}, and one {@item gaming set|PHB} of your choice. You also learn two languages of your choice.
        - Additionally, you can unerringly mimic the speech patterns and accent of a creature that you hear speak for at least 1 minute, enabling you to pass yourself off as a native speaker of a particular land, provided that you know the language.
    - class_name: Rogue
      class_source: PHB
      subclass_name: Mastermind
      subclass_source: XGE
      feature: Master of Tactics
      source: XGE
      level: 3
      entries:
        - Starting at 3rd level, you can use the {@action Help} action as a bonus action. Additionally, when you use the {@action Help} action to aid an ally in attacking a creature, the target of that attack can be within 30 feet of you, rather than within 5 feet of you, if the target can see or hear you.
    - class_name: Rogue
      class_source: PHB
      subclass_name: Mastermind
      subclass_source: XGE
      feature: Mastermind
      source: XGE
      level: 3
      entries:
        - Your focus is on people and on the influence and secrets they have. Many spies, courtiers, and schemers follow this archetype, leading lives of intrigue. Words are your weapons as often as knives or poison, and secrets and favors are some of your favorite treasures.
        - subclassFeature: Master of Intrigue|Rogue||Mastermind|XGE|3
          type: refSubclassFeature
        - subclassFeature: Master of Tactics|Rogue||Mastermind|XGE|3
          type: refSubclassFeature
    - class_name: Rogue
      class_source: PHB
      subclass_name: Mastermind
      subclass_source: XGE
      feature: Insightful Manipulator
      source: XGE
      level: 9
      entries:
        - 'Starting at 9th level, if you spend at least 1 minute observing or interacting with another creature outside combat, you can learn certain information about its capabilities compared to your own. The DM tells you if the creature is your equal, superior, or inferior in regard to two of the following characteristics of your choice:'
        - items:
            - Intelligence score
            - Wisdom score
            - Charisma score
            - Class levels (if any)
          type: list
        - At the DM's option, you might also realize you know a piece of the creature's history or one of its personality traits, if it has any.
    - class_name: Rogue
      class_source: PHB
      subclass_name: Mastermind
      subclass_source: XGE
      feature: Misdirection
      source: XGE
      level: 13
      entries:
        - Beginning at 13th level, you can sometimes cause another creature to suffer an attack meant for you. When you are targeted by an attack while a creature within 5 feet of you is granting you cover against that attack, you can use your reaction to have the attack target that creature instead of you.
    - class_name: Rogue
      class_source: PHB
      subclass_name: Mastermind
      subclass_source: XGE
      feature: Soul of Deceit
      source: XGE
      level: 17
      entries:
        - Starting at 17th level, your thoughts can't be read by telepathy or other means, unless you allow it. You can present false thoughts by succeeding on a Charisma ({@skill Deception}) check contested by the mind reader's Wisdom ({@skill Insight}) check.
        - Additionally, no matter what you say, magic that would determine if you are telling the truth indicates you are being truthful if you so choose, and you can't be compelled to tell the truth by magic.
    - class_name: Rogue
      class_source: PHB
      subclass_name: Phantom
      subclass_source: TCE
      feature: Phantom
      source: TCE
      level: 3
      entries:
        - Many rogues walk a fine line between life and death, risking their own lives and taking the lives of others. While adventuring on that line, some rogues discover a mystical connection to death itself. These rogues take knowledge from the dead and become immersed in negative energy, eventually becoming like ghosts. Thieves' guilds value them as highly effective information gatherers and spies.
        - Many shadar-kai of the Shadowfell are masters of these macabre techniques, and some are willing to teach this path. In places like Thay in the Forgotten Realms and Karrnath in Eberron, where many necromancers practice their craft, a Phantom can become a wizard's confidant and right hand. In temples of gods of death, the Phantom might work as an agent to track down those who try to cheat death and to recover knowledge that might otherwise be lost to the grave.
        - How did you discover this grim power? Did you sleep in a graveyard and awaken to your new abilities? Or did you cultivate them in a temple or thieves' guild dedicated to a deity of death?
        - subclassFeature: Whispers of the Dead|Rogue||Phantom|TCE|3
          type: refSubclassFeature
        - subclassFeature: Wails from the Grave|Rogue||Phantom|TCE|3
          type: refSubclassFeature
    - class_name: Rogue
      class_source: PHB
      subclass_name: Phantom
      subclass_source: TCE
      feature: Wails from the Grave
      source: TCE
      level: 3
      entries:
        - '{@i 3rd-level Phantom feature}'
        - As you nudge someone closer to the grave, you can channel the power of death to harm someone else as well. Immediately after you deal your Sneak Attack damage to a creature on your turn, you can target a second creature that you can see within 30 feet of the first creature. Roll half the number of Sneak Attack dice for your level (round up), and the second creature takes necrotic damage equal to the roll's total, as wails of the dead sound around them for a moment.
        - You can use this feature a number of times equal to your proficiency bonus, and you regain all expended uses when you finish a long rest.
    - class_name: Rogue
      class_source: PHB
      subclass_name: Phantom
      subclass_source: TCE
      feature: Whispers of the Dead
      source: TCE
      level: 3
      entries:
        - '{@i 3rd-level Phantom feature}'
        - Echoes of those who have died cling to you. Whenever you finish a short or long rest, you can choose one skill or tool proficiency that you lack and gain it, as a ghostly presence shares its knowledge with you. You lose this proficiency when you use this feature to choose a different proficiency that you lack.
    - class_name: Rogue
      class_source: PHB
      subclass_name: Phantom
      subclass_source: TCE
      feature: Tokens of the Departed
      source: TCE
      level: 9
      entries:
        - '{@i 9th-level Phantom feature}'
        - 'When a life ends in your presence, you''re able to snatch a token from the departing soul, a sliver of its life essence that takes physical form: as a reaction when a creature you can see dies within 30 feet of you, you can open your free hand and cause a Tiny trinket to appear there, a soul trinket. The DM determines the trinket''s form or has you roll on the {@item Trinket|phb|Trinkets} table in the {@i Player''s Handbook} to generate it. You can have a maximum number of soul trinkets equal to your proficiency bonus, and you can''t create one while at your maximum.'
        - 'You can use soul trinkets in the following ways:'
        - items:
            - While a soul trinket is on your person, you have advantage on death saving throws and Constitution saving throws, for your vitality is enhanced by the life essence within the object.
            - When you deal Sneak Attack damage on your turn, you can destroy one of your soul trinkets that's on your person and then immediately use Wails from the Grave, without expending a use of that feature.
            - As an action, you can destroy one of your soul trinkets, no matter where it's located. When you do so, you can ask the spirit associated with the trinket one question. The spirit appears to you and answers in a language it knew in life. It's under no obligation to be truthful, and it answers as concisely as possible, eager to be free. The spirit knows only what it knew in life, as determined by the DM.
          type: list
    - class_name: Rogue
      class_source: PHB
      subclass_name: Phantom
      subclass_source: TCE
      feature: Ghost Walk
      source: TCE
      level: 13
      entries:
        - '{@i 13th-level Phantom feature}'
        - You can phase partially into the realm of the dead, becoming like a ghost. As a bonus action, you assume a spectral form. While in this form, you have a flying speed of 10 feet, you can hover, and attack rolls have disadvantage against you. You can also move through creatures and objects as if they were {@quickref difficult terrain||3}, but you take {@damage 1d10} force damage if you end your turn inside a creature or an object.
        - You stay in this form for 10 minutes or until you end it as a bonus action. To use this feature again, you must finish a long rest or destroy one of your soul trinkets as part of the bonus action you use to activate Ghost Walk.
    - class_name: Rogue
      class_source: PHB
      subclass_name: Phantom
      subclass_source: TCE
      feature: Death's Friend
      source: TCE
      level: 17
      entries:
        - '{@i 17th-level Phantom feature}'
        - 'Your association with death has become so close that you gain the following benefits:'
        - items:
            - When you use your Wails from the Grave, you can deal the necrotic damage to both the first and the second creature.
            - At the end of a long rest, a soul trinket appears in your hand if you don't have any soul trinkets, as the spirits of the dead are drawn to you.
          type: list
    - class_name: Rogue
      class_source: PHB
      subclass_name: Scout
      subclass_source: XGE
      feature: Scout
      source: XGE
      level: 3
      entries:
        - You are skilled in stealth and surviving far from the streets of a city, allowing you to scout ahead of your companions during expeditions. Rogues who embrace this archetype are at home in the wilderness and among barbarians and rangers, and many Scouts serve as the eyes and ears of war bands. Ambusher, spy, bounty hunter—these are just a few of the roles that Scouts assume as they range the world.
        - subclassFeature: Skirmisher|Rogue||Scout|XGE|3
          type: refSubclassFeature
        - subclassFeature: Survivalist|Rogue||Scout|XGE|3
          type: refSubclassFeature
    - class_name: Rogue
      class_source: PHB
      subclass_name: Scout
      subclass_source: XGE
      feature: Skirmisher
      source: XGE
      level: 3
      entries:
        - Starting at 3rd level, you are difficult to pin down during a fight. You can move up to half your speed as a reaction when an enemy ends its turn within 5 feet of you. This movement doesn't provoke opportunity attacks.
    - class_name: Rogue
      class_source: PHB
      subclass_name: Scout
      subclass_source: XGE
      feature: Survivalist
      source: XGE
      level: 3
      entries:
        - When you choose this archetype at 3rd level, you gain proficiency in the {@skill Nature} and {@skill Survival} skills if you don't already have it. Your proficiency bonus is doubled for any ability check you make that uses either of those proficiencies.
    - class_name: Rogue
      class_source: PHB
      subclass_name: Scout
      subclass_source: XGE
      feature: Superior Mobility
      source: XGE
      level: 9
      entries:
        - At 9th level, your walking speed increases by 10 feet. If you have a climbing or swimming speed, this increase applies to that speed as well.
    - class_name: Rogue
      class_source: PHB
      subclass_name: Scout
      subclass_source: XGE
      feature: Ambush Master
      source: XGE
      level: 13
      entries:
        - Starting at 13th level, you excel at leading ambushes and acting first in a fight.
        - You have advantage on initiative rolls. In addition, the first creature you hit during the first round of a combat becomes easier for you and others to strike; attack rolls against that target have advantage until the start of your next turn.
    - class_name: Rogue
      class_source: PHB
      subclass_name: Scout
      subclass_source: XGE
      feature: Sudden Strike
      source: XGE
      level: 17
      entries:
        - Starting at 17th level, you can strike with deadly speed. If you take the {@action Attack} action on your turn, you can make one additional attack as a bonus action. This attack can benefit from your Sneak Attack even if you have already used it this turn, but you can't use your Sneak Attack against the same target more than once in a turn.
    - class_name: Rogue
      class_source: PHB
      subclass_name: Soulknife
      subclass_source: TCE
      feature: Psi-Bolstered Knack
      source: TCE
      level: 3
      entries:
        - 'When your non-psionic training fails you, your psionic power can help: if you fail an ability check using a skill or tool with which you have proficiency, you can roll one Psionic Energy die and add the number rolled to the check, potentially turning failure into success. You expend the die only if the roll succeeds.'
    - class_name: Rogue
      class_source: PHB
      subclass_name: Soulknife
      subclass_source: TCE
      feature: Psionic Power
      source: TCE
      level: 3
      entries:
        - '{@i 3rd-level Soulknife feature}'
        - You harbor a wellspring of psionic energy within yourself. This energy is represented by your Psionic Energy dice, which are each a {@dice d6}. You have a number of these dice equal to twice your proficiency bonus, and they fuel various psionic powers you have, which are detailed below.
        - Some of your powers expend the Psionic Energy die they use, as specified in a power's description, and you can't use a power if it requires you to use a die when your dice are all expended. You regain all your expended Psionic Energy dice when you finish a long rest. In addition, as a bonus action, you can regain one expended Psionic Energy die, but you can't do so again until you finish a short or long rest.
        - 'When you reach certain levels in this class, the size of your Psionic Energy dice increases: at 5th level ({@dice d8}), 11th level ({@dice d10}), and 17th level ({@dice d12}).'
        - The powers below use your Psionic Energy dice.
        - entries:
            - subclassFeature: Psi-Bolstered Knack|Rogue|PHB|Soulknife|TCE|3
              type: refSubclassFeature
            - subclassFeature: Psychic Whispers|Rogue|PHB|Soulknife|TCE|3
              type: refSubclassFeature
          type: options
    - class_name: Rogue
      class_source: PHB
      subclass_name: Soulknife
      subclass_source: TCE
      feature: Psychic Blades
      source: TCE
      level: 3
      entries:
        - '{@i 3rd-level Soulknife feature}'
        - You can manifest your psionic power as shimmering blades of psychic energy. Whenever you take the {@action Attack} action, you can manifest a psychic blade from your free hand and make the attack with that blade. This magic blade is a simple melee weapon with the finesse and thrown properties. It has a normal range of 60 feet and no long range, and on a hit, it deals psychic damage equal to {@damage 1d6} plus the ability modifier you used for the attack roll. The blade vanishes immediately after it hits or misses its target, and it leaves no mark on its target if it deals damage.
        - After you attack with the blade, you can make a melee or ranged weapon attack with a second psychic blade as a bonus action on the same turn, provided your other hand is free to create it. The damage die of this bonus attack is {@damage 1d4}, instead of {@damage 1d6}.
    - class_name: Rogue
      class_source: PHB
      subclass_name: Soulknife
      subclass_source: TCE
      feature: Psychic Whispers
      source: TCE
      level: 3
      entries:
        - You can establish telepathic communication between yourself and others-perfect for quiet infiltration. As an action, choose one or more creatures you can see, up to a number of creatures equal to your proficiency bonus, and then roll one Psionic Energy die. For a number of hours equal to the number rolled, the chosen creatures can speak telepathically with you, and you can speak telepathically with them. To send or receive a message (no action required), you and the other creature must be within 1 mile of each other. A creature can't use this telepathy if it can't speak any languages, and a creature can end the telepathic connection at any time (no action required). You and the creature don't need to speak a common language to understand each other.
        - The first time you use this power after each long rest, you don't expend the Psionic Energy die. All other times you use the power, you expend the die.
    - class_name: Rogue
      class_source: PHB
      subclass_name: Soulknife
      subclass_source: TCE
      feature: Soulknife
      source: TCE
      level: 3
      entries:
        - Most assassins strike with physical weapons, and many burglars and spies use {@item thieves' tools|PHB} to infiltrate secure locations. In contrast, a Soulknife strikes and infiltrates with the mind, cutting through barriers both physical and psychic. These rogues discover psionic power within themselves and channel it to do their roguish work. They find easy employment as members of thieves' guilds, though they are often mistrusted by rogues who are leery of anyone using strange mind powers to conduct their business. Most governments would also be happy to employ a Soulknife as a spy.
        - Amid the trees of ancient forests on the Material Plane and in the Feywild, some wood elves walk the path of the Soulknife, serving as silent, lethal guardians of their woods. In the endless war among the gith, a githzerai is encouraged to become a Soulknife when stealth is required against the githyanki foe.
        - As a Soulknife, your psionic abilities might have haunted you since you were a child, only revealing their full potential as you experienced the stress of adventure. Or you might have sought out a reclusive order of psychic adepts and spent years learning how to manifest your power.
        - subclassFeature: Psionic Power|Rogue||Soulknife|TCE|3
          type: refSubclassFeature
        - subclassFeature: Psychic Blades|Rogue||Soulknife|TCE|3
          type: refSubclassFeature
    - class_name: Rogue
      class_source: PHB
      subclass_name: Soulknife
      subclass_source: TCE
      feature: Homing Strikes
      source: TCE
      level: 9
      entries:
        - If you make an attack roll with your Psychic Blades and miss the target, you can roll one Psionic Energy die and add the number rolled to the attack roll. If this causes the attack to hit, you expend the Psionic Energy die.
    - class_name: Rogue
      class_source: PHB
      subclass_name: Soulknife
      subclass_source: TCE
      feature: Psychic Teleportation
      source: TCE
      level: 9
      entries:
        - As a bonus action, you manifest one of your Psychic Blades, expend one Psionic Energy die and roll it, and throw the blade at an unoccupied space you can see, up to a number of feet away equal to 10 times the number rolled. You then teleport to that space, and the blade vanishes.
    - class_name: Rogue
      class_source: PHB
      subclass_name: Soulknife
      subclass_source: TCE
      feature: Soul Blades
      source: TCE
      level: 9
      entries:
        - '{@i 9th-level Soulknife feature}'
        - 'Your Psychic Blades are now an expression of your psi-suffused soul, giving you these powers that use your Psionic Energy dice:'
        - entries:
            - subclassFeature: Homing Strikes|Rogue|PHB|Soulknife|TCE|9
              type: refSubclassFeature
            - subclassFeature: Psychic Teleportation|Rogue|PHB|Soulknife|TCE|9
              type: refSubclassFeature
          type: options
    - class_name: Rogue
      class_source: PHB
      subclass_name: Soulknife
      subclass_source: TCE
      feature: Psychic Veil
      source: TCE
      level: 13
      entries:
        - '{@i 13th-level Soulknife feature}'
        - You can weave a veil of psychic static to mask yourself. As an action, you can magically become {@condition invisible}, along with anything you are wearing or carrying, for 1 hour or until you dismiss this effect (no action required). This invisibility ends early immediately after you deal damage to a creature or you force a creature to make a saving throw.
        - Once you use this feature, you can't do so again until you finish a long rest, unless you expend a Psionic Energy die to use this feature again.
    - class_name: Rogue
      class_source: PHB
      subclass_name: Soulknife
      subclass_source: TCE
      feature: Rend Mind
      source: TCE
      level: 17
      entries:
        - '{@i 17th-level Soulknife feature}'
        - You can sweep your Psychic Blades directly through a creature's mind. When you use your Psychic Blades to deal Sneak Attack damage to a creature, you can force that target to make a Wisdom saving throw (DC equal to 8 + your proficiency bonus + your Dexterity modifier). If the save fails, the target is {@condition stunned} for 1 minute. The {@condition stunned} target can repeat the saving throw at the end of each of its turns, ending the effect on itself on a success.
        - Once you use this feature, you can't do so again until you finish a long rest, unless you expend three Psionic Energy dice to use it again.
    - class_name: Rogue
      class_source: PHB
      subclass_name: Swashbuckler
      subclass_source: XGE
      feature: Fancy Footwork
      source: XGE
      level: 3
      entries:
        - When you choose this archetype at 3rd level, you learn how to land a strike and then slip away without reprisal. During your turn, if you make a melee attack against a creature, that creature can't make opportunity attacks against you for the rest of your turn.
    - class_name: Rogue
      class_source: PHB
      subclass_name: Swashbuckler
      subclass_source: XGE
      feature: Rakish Audacity
      source: XGE
      level: 3
      entries:
        - Starting at 3rd level, your confidence propels you into battle. You can give yourself a bonus to your initiative rolls equal to your Charisma modifier.
        - You also gain an additional way to use your Sneak Attack; you don't need advantage on your attack roll to use Sneak Attack against a creature if you are within 5 feet of it, no other creatures are within 5 feet of you, and you don't have disadvantage on the attack roll. All the other rules for Sneak Attack still apply to you.
    - class_name: Rogue
      class_source: PHB
      subclass_name: Swashbuckler
      subclass_source: XGE
      feature: Swashbuckler
      source: XGE
      level: 3
      entries:
        - You focus your training on the art of the blade, relying on speed, elegance, and charm in equal parts. While some warriors are brutes clad in heavy armor, your method of fighting looks almost like a performance. Duelists and pirates typically belong to this archetype.
        - A Swashbuckler excels in single combat, and can fight with two weapons while safely darting away from an opponent.
        - subclassFeature: Fancy Footwork|Rogue||Swashbuckler|XGE|3
          type: refSubclassFeature
        - subclassFeature: Rakish Audacity|Rogue||Swashbuckler|XGE|3
          type: refSubclassFeature
    - class_name: Rogue
      class_source: PHB
      subclass_name: Swashbuckler
      subclass_source: XGE
      feature: Panache
      source: XGE
      level: 9
      entries:
        - At 9th level, your charm becomes extraordinarily beguiling. As an action, you can make a Charisma ({@skill Persuasion}) check contested by a creature's Wisdom ({@skill Insight}) check. The creature must be able to hear you, and the two of you must share a language.
        - If you succeed on the check and the creature is hostile to you, it has disadvantage on attack rolls against targets other than you and can't make opportunity attacks against targets other than you. This effect lasts for 1 minute, until one of your companions attacks the target or affects it with a spell, or until you and the target are more than 60 feet apart.
        - If you succeed on the check and the creature isn't hostile to you, it is {@condition charmed} by you for 1 minute. While {@condition charmed}, it regards you as a friendly acquaintance. This effect ends immediately if you or your companions do anything harmful to it.
    - class_name: Rogue
      class_source: PHB
      subclass_name: Swashbuckler
      subclass_source: XGE
      feature: Elegant Maneuver
      source: XGE
      level: 13
      entries:
        - Starting at 13th level, you can use a bonus action on your turn to gain advantage on the next Dexterity ({@skill Acrobatics}) or Strength ({@skill Athletics}) check you make during the same turn.
    - class_name: Rogue
      class_source: PHB
      subclass_name: Swashbuckler
      subclass_source: XGE
      feature: Master Duelist
      source: XGE
      level: 17
      entries:
        - Beginning at 17th level, your mastery of the blade lets you turn failure into success in combat. If you miss with an attack roll, you can roll it again with advantage. Once you do so, you can't use this feature again until you finish a short or long rest.
    - class_name: Rogue
      class_source: PHB
      subclass_name: Thief
      subclass_source: PHB
      feature: Fast Hands
      source: PHB
      level: 3
      entries:
        - Starting at 3rd level, you can use the bonus action granted by your Cunning Action to make a Dexterity ({@skill Sleight of Hand}) check, use your {@item thieves' tools|phb} to disarm a trap or open a lock, or take the {@action Use an Object} action.
    - class_name: Rogue
      class_source: PHB
      subclass_name: Thief
      subclass_source: PHB
      feature: Second-Story Work
      source: PHB
      level: 3
      entries:
        - When you choose this archetype at 3rd level, you gain the ability to climb faster than normal; climbing no longer costs you extra movement.
        - In addition, when you make a running jump, the distance you cover increases by a number of feet equal to your Dexterity modifier.
    - class_name: Rogue
      class_source: PHB
      subclass_name: Thief
      subclass_source: PHB
      feature: Thief
      source: PHB
      level: 3
      entries:
        - You hone your skills in the larcenous arts. Burglars, bandits, cutpurses, and other criminals typically follow this archetype, but so do rogues who prefer to think of themselves as professional treasure seekers, explorers, delvers, and investigators. In addition to improving your agility and stealth, you learn skills useful for delving into ancient ruins, reading unfamiliar languages, and using magic items you normally couldn't employ.
        - subclassFeature: Fast Hands|Rogue||Thief||3
          type: refSubclassFeature
        - subclassFeature: Second-Story Work|Rogue||Thief||3
          type: refSubclassFeature
    - class_name: Rogue
      class_source: PHB
      subclass_name: Thief
      subclass_source: PHB
      feature: Supreme Sneak
      source: PHB
      level: 9
      entries:
        - Starting at 9th level, you have advantage on a Dexterity ({@skill Stealth}) check if you move no more than half your speed on the same turn.
    - class_name: Rogue
      class_source: PHB
      subclass_name: Thief
      subclass_source: PHB
      feature: Use Magic Device
      source: PHB
      level: 13
      entries:
        - By 13th level, you have learned enough about the workings of magic that you can improvise the use of items even when they are not intended for you. You ignore all class, race, and level requirements on the use of magic items.
    - class_name: Rogue
      class_source: PHB
      subclass_name: Thief
      subclass_source: PHB
      feature: Thief's Reflexes
      source: PHB
      level: 17
      entries:
        - When you reach 17th level, you have become adept at laying ambushes and quickly escaping danger. You can take two turns during the first round of any combat. You take your first turn at your normal initiative and your second turn at your initiative minus 10. You can't use this feature when you are {@status surprised}.
    - class_name: Rogue
      class_source: XPHB
      subclass_name: Arcane Trickster
      subclass_source: XPHB
      feature: Arcane Trickster
      source: XPHB
      level: 3
      entries:
        - '{@i Enhance Stealth with Arcane Spells}'
        - Some Rogues enhance their fine-honed skills of stealth and agility with spells, learning magical tricks to aid them in their trade. Some Arcane Tricksters use their talents as pickpockets and burglars, while others are pranksters.
        - subclassFeature: Spellcasting|Rogue|XPHB|Arcane Trickster|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Mage Hand Legerdemain|Rogue|XPHB|Arcane Trickster|XPHB|3
          type: refSubclassFeature
    - class_name: Rogue
      class_source: XPHB
      subclass_name: Arcane Trickster
      subclass_source: XPHB
      feature: Mage Hand Legerdemain
      source: XPHB
      level: 3
      entries:
        - When you cast {@spell Mage Hand|XPHB}, you can cast it as a {@variantrule Bonus Action|XPHB}, and you can make the spectral hand {@condition Invisible|XPHB}. You can control the hand as a {@variantrule Bonus Action|XPHB}, and through it, you can make Dexterity ({@skill Sleight of Hand|XPHB}) checks.
    - class_name: Rogue
      class_source: XPHB
      subclass_name: Arcane Trickster
      subclass_source: XPHB
      feature: Spellcasting
      source: XPHB
      level: 3
      entries:
        - You have learned to cast spells. See {@book chapter 7|XPHB|7} for the rules on spellcasting. The information below details how you use those rules as an Arcane Trickster.
        - entries:
            - 'You know three cantrips: {@spell Mage Hand|XPHB} and two other cantrips of your choice from the {@filter Wizard spell list|spells|class=Wizard} (see that class''s section for its list). {@spell Mind Sliver|XPHB} and {@spell Minor Illusion|XPHB} are recommended.'
            - Whenever you gain a Rogue level, you can replace one of your cantrips, except {@spell Mage Hand|XPHB}, with another Wizard cantrip of your choice.
            - When you reach Rogue level 10, you learn another Wizard cantrip of your choice.
          name: Cantrips
          type: entries
        - entries:
            - The Arcane Trickster Spellcasting table shows how many spell slots you have to cast your level 1+ spells. You regain all expended spell slots when you finish a {@variantrule Long Rest|XPHB}.
          name: Spell Slots
          type: entries
        - entries:
            - You prepare the list of level 1+ spells that are available for you to cast with this feature. To start, choose three level 1 Wizard spells. {@spell Charm Person|XPHB}, {@spell Disguise Self|XPHB}, and {@spell Fog Cloud|XPHB} are recommended.
            - The number of spells on your list increases as you gain Rogue levels, as shown in the Prepared Spells column of the Arcane Trickster Spellcasting table. Whenever that number increases, choose additional Wizard spells until the number of spells on your list matches the number in the Arcane Trickster Spellcasting table. The chosen spells must be of a level for which you have spell slots. For example, if you're a level 7 Rogue, your list of prepared spells can include five Wizard spells of level 1 or 2 in any combination.
          name: Prepared Spells of 1st+ Level
          type: entries
        - entries:
            - Whenever you gain a Rogue level, you can replace one spell on your list with another Wizard spell for which you have spell slots.
          name: Changing Your Prepared Spells
          type: entries
        - entries:
            - Intelligence is your spellcasting ability for your Wizard spells.
          name: Spellcasting Ability
          type: entries
        - entries:
            - You can use an {@item Arcane Focus|XPHB} as a {@variantrule Spellcasting Focus|XPHB} for your Wizard spells.
          name: Spellcasting Focus
          type: entries
    - class_name: Rogue
      class_source: XPHB
      subclass_name: Arcane Trickster
      subclass_source: XPHB
      feature: Magical Ambush
      source: XPHB
      level: 9
      entries:
        - If you have the {@condition Invisible|XPHB} condition when you cast a spell on a creature, it has {@variantrule Disadvantage|XPHB} on any saving throw it makes against the spell on the same turn.
    - class_name: Rogue
      class_source: XPHB
      subclass_name: Arcane Trickster
      subclass_source: XPHB
      feature: Versatile Trickster
      source: XPHB
      level: 13
      entries:
        - You gain the ability to distract targets with your {@spell Mage Hand|XPHB}. When you use the Trip option of your Cunning Strike on a creature, you can also use that option on another creature within 5 feet of the spectral hand.
    - class_name: Rogue
      class_source: XPHB
      subclass_name: Arcane Trickster
      subclass_source: XPHB
      feature: Spell Thief
      source: XPHB
      level: 17
      entries:
        - You gain the ability to magically steal the knowledge of how to cast a spell from another spellcaster.
        - Immediately after a creature casts a spell that targets you or includes you in its area of effect, you can take a {@variantrule Reaction|XPHB} to force the creature to make an Intelligence saving throw. The DC equals your spell save DC. On a failed save, you negate the spell's effect against you, and you steal the knowledge of the spell if it is at least level 1 and of a level you can cast (it doesn't need to be a Wizard spell). For the next 8 hours, you have the spell prepared. The creature can't cast it until the 8 hours have passed.
        - Once you steal a spell with this feature, you can't use this feature again until you finish a {@variantrule Long Rest|XPHB}.
    - class_name: Rogue
      class_source: XPHB
      subclass_name: Assassin
      subclass_source: XPHB
      feature: Assassin
      source: XPHB
      level: 3
      entries:
        - '{@i Practice the Grim Art of Death}'
        - An Assassin's training focuses on using stealth, poison, and disguise to eliminate foes with deadly efficiency. While some Rogues who follow this path are hired killers, spies, or bounty hunters, the capabilities of this subclass are equally useful for adventurers facing a variety of monstrous enemies.
        - subclassFeature: Assassinate|Rogue|XPHB|Assassin|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Assassin's Tools|Rogue|XPHB|Assassin|XPHB|3
          type: refSubclassFeature
    - class_name: Rogue
      class_source: XPHB
      subclass_name: Assassin
      subclass_source: XPHB
      feature: Assassin's Tools
      source: XPHB
      level: 3
      entries:
        - You gain a {@item Disguise Kit|XPHB} and a {@item Poisoner's Kit|XPHB}, and you have proficiency with them.
    - class_name: Rogue
      class_source: XPHB
      subclass_name: Assassin
      subclass_source: XPHB
      feature: Assassinate
      source: XPHB
      level: 3
      entries:
        - You're adept at ambushing a target, granting you the following benefits.
        - entries:
            - entries:
                - You have {@variantrule Advantage|XPHB} on {@variantrule Initiative|XPHB} rolls.
              name: Initiative
              type: entries
            - entries:
                - During the first round of each combat, you have {@variantrule Advantage|XPHB} on attack rolls against any creature that hasn't taken a turn. If your Sneak Attack hits any target during that round, the target takes extra damage of the weapon's type equal to your Rogue level.
              name: Surprising Strikes
              type: entries
          type: entries
    - class_name: Rogue
      class_source: XPHB
      subclass_name: Assassin
      subclass_source: XPHB
      feature: Infiltration Expertise
      source: XPHB
      level: 9
      entries:
        - You are expert at the following techniques that aid your infiltrations.
        - entries:
            - entries:
                - You can unerringly mimic another person's speech, handwriting, or both if you have spent at least 1 hour studying them.
              name: Masterful Mimicry
              type: entries
            - entries:
                - Your {@variantrule Speed|XPHB} isn't reduced to 0 by using Steady Aim.
              name: Roving Aim
              type: entries
          type: entries
    - class_name: Rogue
      class_source: XPHB
      subclass_name: Assassin
      subclass_source: XPHB
      feature: Envenom Weapons
      source: XPHB
      level: 13
      entries:
        - When you use the Poison option of your Cunning Strike, the target also takes {@damage 2d6} Poison damage whenever it fails the saving throw. This damage ignores {@variantrule Resistance|XPHB} to Poison damage.
    - class_name: Rogue
      class_source: XPHB
      subclass_name: Assassin
      subclass_source: XPHB
      feature: Death Strike
      source: XPHB
      level: 17
      entries:
        - When you hit with your Sneak Attack on the first round of a combat, the target must succeed on a Constitution saving throw ({@dc 8} plus your Dexterity modifier and {@variantrule Proficiency|XPHB|Proficiency Bonus}), or the attack's damage is doubled against the target.
    - class_name: Rogue
      class_source: XPHB
      subclass_name: Scion of the Three
      subclass_source: FRHoF
      feature: Bloodthirst
      source: FRHoF
      level: 3
      entries:
        - When an enemy you can see within 30 feet of yourself takes damage and is {@status Bloodied|XPHB} after taking that damage but not killed outright, you can take a {@variantrule Reaction|XPHB} and {@variantrule Teleportation|XPHB|teleport} to an unoccupied space you can see within 5 feet of that enemy. You can then make one melee attack. You can use this feature a number of times equal to your Intelligence modifier (minimum of once), and you regain all expended uses when you finish a {@variantrule Long Rest|XPHB}.
    - class_name: Rogue
      class_source: XPHB
      subclass_name: Scion of the Three
      subclass_source: FRHoF
      feature: Dread Allegiance
      source: FRHoF
      level: 3
      entries:
        - 'Choose one of the Dead Three: {@deity Bane|Faerûnian|FRHoF}, {@deity Bhaal|Faerûnian|FRHoF}, or {@deity Myrkul|Faerûnian|FRHoF}. You gain {@variantrule Resistance|XPHB} to one type of damage and the ability to cast a cantrip, as detailed in the table below; Intelligence is your spellcasting ability for this cantrip. When you finish a {@variantrule Long Rest|XPHB}, you can change your choice.'
        - colLabels:
            - God
            - Damage Resistance
            - Cantrip
          colStyles:
            - col-4
            - col-4
            - col-4
          page: 7
          rows:
            - - '{@deity Bane|Faerûnian|FRHoF}'
              - Psychic
              - '{@spell Minor Illusion|XPHB}'
            - - '{@deity Bhaal|Faerûnian|FRHoF}'
              - Poison
              - '{@spell Blade Ward|XPHB}'
            - - '{@deity Myrkul|Faerûnian|FRHoF}'
              - Necrotic
              - '{@spell Chill Touch|XPHB}'
          type: table
    - class_name: Rogue
      class_source: XPHB
      subclass_name: Scion of the Three
      subclass_source: FRHoF
      feature: Scion of the Three
      source: FRHoF
      level: 3
      entries:
        - '{@i Become a Gruesome Agent of Malice}'
        - 'A Scion of the Three draws power from a group of malevolent gods known as the Dead Three: {@deity Bane|Faerûnian|FRHoF}, deity of tyranny; {@deity Bhaal|Faerûnian|FRHoF}, deity of violence and murder; and {@deity Myrkul|Faerûnian|FRHoF}, deity of death. While some Rogues of this subclass pledge themselves ardently to those three macabre gods, others find themselves thrust on this path by a curse. Either way, a scion''s power manifests as various occult gifts, as well as an uncanny talent for striking and terrifying foes.'
        - Scions of the Three are most common in Baldur's Gate, where the Dead Three have long competed for influence over mortal hearts. Underground cults to {@deity Bane|Faerûnian|FRHoF}, {@deity Bhaal|Faerûnian|FRHoF}, and {@deity Myrkul|Faerûnian|FRHoF} often count Scions of the Three among their most useful agents. Outside Baldur's Gate, secular thieves' guilds such as the Shadow Thieves of Amn or Xanathar's guild in Waterdeep might cautiously call on a Scion of the Three to undertake an especially violent contract.
        - subclassFeature: Bloodthirst|Rogue|XPHB|Scion of the Three|FRHoF|3|FRHoF
          type: refSubclassFeature
        - subclassFeature: Dread Allegiance|Rogue|XPHB|Scion of the Three|FRHoF|3|FRHoF
          type: refSubclassFeature
    - class_name: Rogue
      class_source: XPHB
      subclass_name: Scion of the Three
      subclass_source: FRHoF
      feature: Strike Fear
      source: FRHoF
      level: 9
      entries:
        - You gain the following {@classFeature Cunning Strike|Rogue|XPHB|5|XPHB} option.
        - entries:
            - The target must succeed on a Wisdom saving throw, or it has the {@condition Frightened|XPHB} condition for 1 minute. While the target is Frightened in this way, you have {@variantrule Advantage|XPHB} on attack rolls against the target.
            - The {@condition Frightened|XPHB} target repeats the save at the end of each of its turns, ending the effect on itself on a success.
          name: 'Terrify (Cost: {@dice 1d6})'
          page: 7
          type: entries
    - class_name: Rogue
      class_source: XPHB
      subclass_name: Scion of the Three
      subclass_source: FRHoF
      feature: Aura of Malevolence
      source: FRHoF
      level: 13
      entries:
        - You radiate malignant power associated with one of the Dead Three. When you use {@subclassFeature Bloodthirst|Rogue|XPHB|Scion of the Three|FRHoF|3|FRHoF} and teleport, each creature of your choice within 10 feet of either the space you left or your destination space (your choice) takes damage equal to your Intelligence modifier; the damage type is the same as the damage {@variantrule Resistance|XPHB} granted by your choice in the Dread Allegiance feature. Damage dealt by this feature ignores {@variantrule Resistance|XPHB}.
    - class_name: Rogue
      class_source: XPHB
      subclass_name: Scion of the Three
      subclass_source: FRHoF
      feature: Dread Incarnate
      source: FRHoF
      level: 17
      entries:
        - You gain the following benefits.
        - entries:
            - You regain one expended use of {@subclassFeature Bloodthirst|Rogue|XPHB|Scion of the Three|FRHoF|3|FRHoF} when you finish a {@variantrule Short Rest|XPHB}.
          name: Cutthroat
          page: 7
          type: entries
        - entries:
            - When you roll for your {@classFeature Sneak Attack|Rogue|XPHB|1|XPHB} damage, you can treat a roll of a 1 or 2 on the die as a 3.
          name: Murderous Intent
          page: 7
          type: entries
    - class_name: Rogue
      class_source: XPHB
      subclass_name: Soulknife
      subclass_source: XPHB
      feature: Psi-Bolstered Knack
      source: XPHB
      level: 3
      entries:
        - If you fail an ability check using a skill or tool with which you have proficiency, you can roll one Psionic Energy Die and add the number rolled to the check, potentially turning failure into success. The die is expended only if the roll then succeeds.
    - class_name: Rogue
      class_source: XPHB
      subclass_name: Soulknife
      subclass_source: XPHB
      feature: Psionic Power
      source: XPHB
      level: 3
      entries:
        - You harbor a wellspring of psionic energy within yourself. It is represented by your Psionic Energy Dice, which fuel certain powers you have from this subclass. The Soulknife Energy Dice table shows the number of these dice you have when you reach certain Rogue levels, and the table shows the die size.
        - caption: Soulknife Energy Dice
          colLabels:
            - Rogue Level
            - Die Size
            - Number
          colStyles:
            - col-4 text-center
            - col-4 text-center
            - col-4 text-center
          rows:
            - - "3"
              - '{@dice D6}'
              - "4"
            - - "5"
              - '{@dice D8}'
              - "6"
            - - "9"
              - '{@dice D8}'
              - "8"
            - - "11"
              - '{@dice D10}'
              - "8"
            - - "13"
              - '{@dice D10}'
              - "10"
            - - "17"
              - '{@dice D12}'
              - "12"
          type: table
        - Any features in this subclass that use a Psionic Energy Die use only the dice from this subclass. Some of your powers expend a Psionic Energy Die, as specified in a power's description, and you can't use a power if it requires you to use a die when your Psionic Energy Dice are all expended.
        - You regain one of your expended Psionic Energy Dice when you finish a {@variantrule Short Rest|XPHB}, and you regain all of them when you finish a {@variantrule Long Rest|XPHB}.
        - subclassFeature: Psi-Bolstered Knack|Rogue|XPHB|Soulknife|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Psychic Whispers|Rogue|XPHB|Soulknife|XPHB|3
          type: refSubclassFeature
        - The first time you use this power after each {@variantrule Long Rest|XPHB}, you don't expend the Psionic Energy Die. All other times you use the power, you expend the die.
    - class_name: Rogue
      class_source: XPHB
      subclass_name: Soulknife
      subclass_source: XPHB
      feature: Psychic Blades
      source: XPHB
      level: 3
      entries:
        - 'You can manifest shimmering blades of psychic energy. Whenever you take the {@action Attack|XPHB} action or make an {@action Opportunity Attack|XPHB}, you can manifest a {@item Psychic Blade|XPHB} in your free hand and make the attack with that blade. The magic blade has the following traits:'
        - name: Psychic Blade
          source: XPHB
          tag: item
          type: statblock
        - The blade vanishes immediately after it hits or misses its target, and it leaves no mark if it deals damage.
        - After you attack with the blade on your turn, you can make a melee or ranged attack with a second psychic blade as a {@variantrule Bonus Action|XPHB} on the same turn if your other hand is free to create it. The damage die of this bonus attack is {@damage 1d4} instead of {@damage 1d6}.
    - class_name: Rogue
      class_source: XPHB
      subclass_name: Soulknife
      subclass_source: XPHB
      feature: Psychic Whispers
      source: XPHB
      level: 3
      entries:
        - You can establish telepathic communication between yourself and others. As a {@action Magic|XPHB} action, choose one or more creatures you can see, up to a number of creatures equal to your {@variantrule Proficiency|XPHB|Proficiency Bonus}, and then roll one Psionic Energy Die. For a number of hours equal to the number rolled, the chosen creatures can speak telepathically with you, and you can speak telepathically with them. To send or receive a message (no action required), you and the other creature must be within 1 mile of each other. A creature can end the telepathic connection at any time (no action required).
    - class_name: Rogue
      class_source: XPHB
      subclass_name: Soulknife
      subclass_source: XPHB
      feature: Soulknife
      source: XPHB
      level: 3
      entries:
        - '{@i Strike Foes with Psionic Blades}'
        - A Soulknife strikes with the mind, cutting through barriers both physical and psychic. These Rogues discover psionic power within themselves and channel it to do their roguish work. As a Soulknife, your psionic abilities might have haunted you since childhood, revealing their full potential only as you experienced the stress of adventure. Or you might have sought out an order of psychic adepts and spent years learning how to manifest your power.
        - subclassFeature: Psionic Power|Rogue|XPHB|Soulknife|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Psychic Blades|Rogue|XPHB|Soulknife|XPHB|3
          type: refSubclassFeature
    - class_name: Rogue
      class_source: XPHB
      subclass_name: Soulknife
      subclass_source: XPHB
      feature: Homing Strikes
      source: XPHB
      level: 9
      entries:
        - If you make an attack roll with your {@item Psychic Blade|XPHB} and miss the target, you can roll one Psionic Energy Die and add the number rolled to the attack roll. If this causes the attack to hit, the die is expended.
    - class_name: Rogue
      class_source: XPHB
      subclass_name: Soulknife
      subclass_source: XPHB
      feature: Psychic Teleportation
      source: XPHB
      level: 9
      entries:
        - As a {@variantrule Bonus Action|XPHB}, you manifest a {@item Psychic Blade|XPHB}, expend one Psionic Energy Die and roll it, and throw the blade at an unoccupied space you can see up to a number of feet away equal to 10 times the number rolled. You then teleport to that space, and the blade vanishes.
    - class_name: Rogue
      class_source: XPHB
      subclass_name: Soulknife
      subclass_source: XPHB
      feature: Soul Blades
      source: XPHB
      level: 9
      entries:
        - You can now use the following powers with your Psychic Blades.
        - subclassFeature: Homing Strikes|Rogue|XPHB|Soulknife|XPHB|9
          type: refSubclassFeature
        - subclassFeature: Psychic Teleportation|Rogue|XPHB|Soulknife|XPHB|9
          type: refSubclassFeature
    - class_name: Rogue
      class_source: XPHB
      subclass_name: Soulknife
      subclass_source: XPHB
      feature: Psychic Veil
      source: XPHB
      level: 13
      entries:
        - You can weave a veil of psychic static to mask yourself. As a {@action Magic|XPHB} action, you gain the {@condition Invisible|XPHB} condition for 1 hour or until you dismiss this effect (no action required). This invisibility ends early immediately after you deal damage to a creature or you force a creature to make a saving throw.
        - Once you use this feature, you can't do so again until you finish a {@variantrule Long Rest|XPHB} unless you expend a Psionic Energy Die (no action required) to restore your use of it.
    - class_name: Rogue
      class_source: XPHB
      subclass_name: Soulknife
      subclass_source: XPHB
      feature: Rend Mind
      source: XPHB
      level: 17
      entries:
        - You can sweep your Psychic Blades through a creature's mind. When you use your Psychic Blades to deal Sneak Attack damage to a creature, you can force that target to make a Wisdom saving throw ({@dc 8} plus your Dexterity modifier and {@variantrule Proficiency|XPHB|Proficiency Bonus}). If the save fails, the target has the {@condition Stunned|XPHB} condition for 1 minute. The {@condition Stunned|XPHB} target repeats the save at the end of each of its turns, ending the effect on itself on a success.
        - Once you use this feature, you can't do so again until you finish a {@variantrule Long Rest|XPHB} unless you expend three Psionic Energy Dice (no action required) to restore your use of it.
    - class_name: Rogue
      class_source: XPHB
      subclass_name: Thief
      subclass_source: XPHB
      feature: Fast Hands
      source: XPHB
      level: 3
      entries:
        - As a {@variantrule Bonus Action|XPHB}, you can do one of the following.
        - entries:
            - entries:
                - Make a Dexterity ({@skill Sleight of Hand|XPHB}) check to pick a lock or disarm a trap with {@item Thieves' Tools|XPHB} or to pick a pocket.
              name: Sleight of Hand
              type: entries
            - entries:
                - Take the {@action Utilize|XPHB} action, or take the {@action Magic|XPHB} action to use a magic item that requires that action.
              name: Use an Object
              type: entries
          type: entries
    - class_name: Rogue
      class_source: XPHB
      subclass_name: Thief
      subclass_source: XPHB
      feature: Second-Story Work
      source: XPHB
      level: 3
      entries:
        - You've trained to get into especially hard-to-reach places, granting you these benefits.
        - entries:
            - entries:
                - You gain a {@variantrule Climb Speed|XPHB} equal to your {@variantrule Speed|XPHB}.
              name: Climber
              type: entries
            - entries:
                - You can determine your jump distance using your Dexterity rather than your Strength.
              name: Jumper
              type: entries
          type: entries
    - class_name: Rogue
      class_source: XPHB
      subclass_name: Thief
      subclass_source: XPHB
      feature: Thief
      source: XPHB
      level: 3
      entries:
        - '{@i Hunt for Treasure as a Classic Adventurer}'
        - A mix of burglar, treasure hunter, and explorer, you are the epitome of an adventurer. In addition to improving your agility and stealth, you gain abilities useful for delving into ruins and getting maximum benefit from the magic items you find there.
        - subclassFeature: Fast Hands|Rogue|XPHB|Thief|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Second-Story Work|Rogue|XPHB|Thief|XPHB|3
          type: refSubclassFeature
    - class_name: Rogue
      class_source: XPHB
      subclass_name: Thief
      subclass_source: XPHB
      feature: Supreme Sneak
      source: XPHB
      level: 9
      entries:
        - You gain the following Cunning Strike option.
        - entries:
            - entries:
                - If you have the {@action Hide|XPHB} action's {@condition Invisible|XPHB} condition, this attack doesn't end that condition on you if you end the turn behind {@variantrule Cover|XPHB|Three-Quarters Cover} or {@variantrule Cover|XPHB|Total Cover}.
              name: 'Stealth Attack (Cost: 1d6)'
              type: entries
          type: entries
    - class_name: Rogue
      class_source: XPHB
      subclass_name: Thief
      subclass_source: XPHB
      feature: Use Magic Device
      source: XPHB
      level: 13
      entries:
        - You've learned how to maximize use of magic items, granting you the following benefits.
        - entries:
            - You can attune to up to four magic items at once.
          name: Attunement
          type: entries
        - entries:
            - Whenever you use a magic item property that expends charges, roll {@dice 1d6}. On a roll of 6, you use the property without expending the charges.
          name: Charges
          type: entries
        - entries:
            - You can use any {@item Spell Scroll|XDMG}, using Intelligence as your spellcasting ability for the spell. If the spell is a cantrip or a level 1 spell, you can cast it reliably. If the scroll contains a higher-level spell, you must first succeed on an Intelligence ({@skill Arcana|XPHB}) check ({@dc 10} plus the spell's level). On a successful check, you cast the spell from the scroll. On a failed check, the scroll disintegrates.
          name: Scrolls
          type: entries
    - class_name: Rogue
      class_source: XPHB
      subclass_name: Thief
      subclass_source: XPHB
      feature: Thief's Reflexes
      source: XPHB
      level: 17
      entries:
        - You are adept at laying ambushes and quickly escaping danger. You can take two turns during the first round of any combat. You take your first turn at your normal {@variantrule Initiative|XPHB} and your second turn at your {@variantrule Initiative|XPHB} minus 10.
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Aberrant Mind
      subclass_source: TCE
      feature: Aberrant Mind
      source: TCE
      level: 1
      entries:
        - An alien influence has wrapped its tendrils around your mind, giving you psionic power. You can now touch other minds with that power and alter the world around you by using it to control the magical energy of the multiverse. Will this power shine from you as a hopeful beacon to others? Or will you be a source of terror to those who feel the stab of your mind and witness the strange manifestations of your might?
        - As an Aberrant Mind sorcerer, you decide how you acquired your powers. Were you born with them? Or did an event later in life leave you shining with psionic awareness? Consult the Aberrant Origins table for a possible origin of your power.
        - caption: Aberrant Origins
          colLabels:
            - d6
            - Origin
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - "1"
              - You were exposed to the Far Realm's warping influence. You are convinced that a tentacle is now growing on you, but no one else can see it.
            - - "2"
              - A psychic wind from the Astral Plane carried psionic energy to you. When you use your powers, faint motes of light sparkle around you.
            - - "3"
              - You once suffered the dominating powers of an aboleth, leaving a psychic splinter in your mind.
            - - "4"
              - You were implanted with a mind flayer tadpole, but the ceremorphosis never completed. And now its psionic power is yours. When you use it, your flesh shines with a strange mucus.
            - - "5"
              - As a child, you had an imaginary friend that looked like a flumph or a strange platypus-like creature. One day, it gifted you with psionic powers, which have ended up being not so imaginary.
            - - "6"
              - 'Your nightmares whisper the truth to you: your psionic powers are not your own. You draw them from your parasitic twin!'
          type: table
        - subclassFeature: Psionic Spells|Sorcerer||Aberrant Mind|TCE|1
          type: refSubclassFeature
        - subclassFeature: Telepathic Speech|Sorcerer||Aberrant Mind|TCE|1
          type: refSubclassFeature
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Aberrant Mind
      subclass_source: TCE
      feature: Psionic Spells
      source: TCE
      level: 1
      entries:
        - '{@i 1st-level Aberrant Mind feature}'
        - You learn additional spells when you reach certain levels in this class, as shown on the Psionic Spells table. Each of these spells counts as a sorcerer spell for you, but it doesn't count against the number of sorcerer spells you know.
        - Whenever you gain a sorcerer level, you can replace one spell you gained from this feature with another spell of the same level. The new spell must be a {@filter divination or an enchantment spell from the sorcerer, warlock, or wizard spell list|spells|class=sorcerer;warlock;wizard|school=D;E|level=1;2;3;4;5}.
        - caption: Psionic Spells
          colLabels:
            - Sorcerer Level
            - Spells
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - 1st
              - '{@spell arms of Hadar}, {@spell dissonant whispers}, {@spell mind sliver|tce}'
            - - 3rd
              - '{@spell calm emotions}, {@spell detect thoughts}'
            - - 5th
              - '{@spell hunger of Hadar}, {@spell sending}'
            - - 7th
              - '{@spell Evard''s black tentacles}, {@spell summon aberration|TCE}'
            - - 9th
              - '{@spell Rary''s telepathic bond}, {@spell telekinesis}'
          type: table
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Aberrant Mind
      subclass_source: TCE
      feature: Telepathic Speech
      source: TCE
      level: 1
      entries:
        - '{@i 1st-level Aberrant Mind feature}'
        - You can form a telepathic connection between your mind and the mind of another. As a bonus action, choose one creature you can see within 30 feet of you. You and the chosen creature can speak telepathically with each other while the two of you are within a number of miles of each other equal to your Charisma modifier (minimum of 1 mile). To understand each other, you each must speak mentally in a language the other knows.
        - The telepathic connection lasts for a number of minutes equal to your sorcerer level. It ends early if you are {@condition incapacitated} or die or if you use this ability to form a connection with a different creature.
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Aberrant Mind
      subclass_source: TCE
      feature: Psionic Sorcery
      source: TCE
      level: 6
      entries:
        - '{@i 6th-level Aberrant Mind feature}'
        - When you cast any spell of 1st level or higher from your Psionic Spells feature, you can cast it by expending a spell slot as normal or by spending a number of sorcery points equal to the spell's level.
        - If you cast the spell using sorcery points, it requires no verbal or somatic components, and it requires no material components, unless they are consumed by the spell.
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Aberrant Mind
      subclass_source: TCE
      feature: Psychic Defenses
      source: TCE
      level: 6
      entries:
        - '{@i 6th-level Aberrant Mind feature}'
        - You gain resistance to psychic damage, and you have advantage on saving throws against being {@condition charmed} or {@condition frightened}.
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Aberrant Mind
      subclass_source: TCE
      feature: Revelation in Flesh
      source: TCE
      level: 14
      entries:
        - '{@i 14th-level Aberrant Mind feature}'
        - 'You can unleash the aberrant truth hidden within yourself. As a bonus action, you can spend 1 or more sorcery points to magically transform your body for 10 minutes. For each sorcery point you spend, you can gain one of the following benefits of your choice, the effects of which last until the transformation ends:'
        - items:
            - You can see any {@condition invisible} creature within 60 feet of you, provided it isn't behind {@quickref Cover||3||total cover}. Your eyes also turn black or become writhing sensory tendrils.
            - You gain a flying speed equal to your walking speed, and you can hover. As you fly, your skin glistens with mucus or shines with an otherworldly light.
            - You gain a swimming speed equal to twice your walking speed, and you can breathe underwater. Moreover, gills grow from your neck or fan out from behind your ears, your fingers become webbed, or you grow writhing cilia that extend through your clothing.
            - Your body, along with any equipment you are wearing or carrying, becomes slimy and pliable. You can move through any space as narrow as 1 inch without squeezing, and you can spend 5 feet of movement to escape from nonmagical restraints or being {@condition grappled}.
          type: list
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Aberrant Mind
      subclass_source: TCE
      feature: Warping Implosion
      source: TCE
      level: 18
      entries:
        - '{@i 18th-level Aberrant Mind feature}'
        - You can unleash your aberrant power as a space-warping anomaly. As an action, you can teleport to an unoccupied space you can see within 120 feet of you. Immediately after you disappear, each creature within 30 feet of the space you left must make a Strength saving throw against your spell save DC. On a failed save, a creature takes {@damage 3d10} force damage and is pulled straight toward the space you left, ending in an unoccupied space as close to your former space as possible. On a successful save, the creature takes half as much damage and isn't pulled.
        - Once you use this feature, you can't do so again until you finish a long rest, unless you spend 5 sorcery points to use it again.
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Clockwork Soul
      subclass_source: TCE
      feature: Clockwork Magic
      source: TCE
      level: 1
      entries:
        - '{@i 1st-level Clockwork Soul feature}'
        - You learn additional spells when you reach certain levels in this class, as shown on the Clockwork Spells table. Each of these spells counts as a sorcerer spell for you, but it doesn't count against the number of sorcerer spells you know.
        - Whenever you gain a sorcerer level, you can replace one spell you gained from this feature with another spell of the same level. The new spell must be an {@filter abjuration or a transmutation spell from the sorcerer, warlock, or wizard spell list|spells|class=sorcerer;warlock;wizard|school=A;T|level=1;2;3;4;5}.
        - caption: Clockwork Spells
          colLabels:
            - Sorcerer Level
            - Spells
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - 1st
              - '{@spell alarm}, {@spell protection from evil and good}'
            - - 3rd
              - '{@spell aid}, {@spell lesser restoration}'
            - - 5th
              - '{@spell dispel magic}, {@spell protection from energy}'
            - - 7th
              - '{@spell freedom of movement}, {@spell summon construct|TCE}'
            - - 9th
              - '{@spell greater restoration}, {@spell wall of force}'
          type: table
        - In addition, consult the Manifestations of Order table and choose or randomly determine a way your connection to order manifests while you are casting any of your sorcerer spells.
        - caption: Manifestations of Order
          colLabels:
            - d6
            - Manifestation
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - "1"
              - Spectral cogwheels hover behind you.
            - - "2"
              - The hands of a clock spin in your eyes.
            - - "3"
              - Your skin glows with a brassy sheen.
            - - "4"
              - Floating equations and geometric objects overlay your body.
            - - "5"
              - Your spellcasting focus temporarily takes the form of a Tiny clockwork mechanism.
            - - "6"
              - The ticking of gears or ringing of a clock can be heard by you and those affected by your magic.
          type: table
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Clockwork Soul
      subclass_source: TCE
      feature: Clockwork Soul
      source: TCE
      level: 1
      entries:
        - The cosmic force of order has suffused you with magic. That power arises from Mechanus or a realm like it-a plane of existence shaped entirely by clockwork efficiency. You, or someone from your lineage, might have become entangled in the machinations of the modrons, the orderly beings who inhabit Mechanus. Perhaps your ancestor even took part in the Great Modron March. Whatever its origin within you, the power of order can seem strange to others, but for you, it is part of a vast and glorious system.
        - subclassFeature: Clockwork Magic|Sorcerer||Clockwork Soul|TCE|1
          type: refSubclassFeature
        - subclassFeature: Restore Balance|Sorcerer||Clockwork Soul|TCE|1
          type: refSubclassFeature
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Clockwork Soul
      subclass_source: TCE
      feature: Restore Balance
      source: TCE
      level: 1
      entries:
        - '{@i 1st-level Clockwork Soul feature}'
        - Your connection to the plane of absolute order allows you to equalize chaotic moments. When a creature you can see within 60 feet of you is about to roll a {@dice d20} with advantage or disadvantage, you can use your reaction to prevent the roll from being affected by advantage and disadvantage.
        - You can use this feature a number of times equal to your proficiency bonus, and you regain all expended uses when you finish a long rest.
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Clockwork Soul
      subclass_source: TCE
      feature: Bastion of Law
      source: TCE
      level: 6
      entries:
        - '{@i 6th-level Clockwork Soul feature}'
        - You can tap into the grand equation of existence to imbue a creature with a shimmering shield of order. As an action, you can expend 1 to 5 sorcery points to create a magical ward around yourself or another creature you can see within 30 feet of you. The ward lasts until you finish a long rest or until you use this feature again.
        - The ward is represented by a number of {@dice d8}s equal to the number of sorcery points spent to create it. When the warded creature takes damage, it can expend a number of those dice, roll them, and reduce the damage taken by the total rolled on those dice.
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Clockwork Soul
      subclass_source: TCE
      feature: Trance of Order
      source: TCE
      level: 14
      entries:
        - '{@i 14th-level Clockwork Soul feature}'
        - You gain the ability to align your consciousness to the endless calculations of Mechanus. As a bonus action, you can enter this state for 1 minute. For the duration, attack rolls against you can't benefit from advantage, and whenever you make an attack roll, an ability check, or a saving throw, you can treat a roll of 9 or lower on the {@dice d20} as a 10.
        - Once you use this bonus action, you can't use it again until you finish a long rest, unless you spend 5 sorcery points to use it again.
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Clockwork Soul
      subclass_source: TCE
      feature: Clockwork Cavalcade
      source: TCE
      level: 18
      entries:
        - '{@i 18th-level Clockwork Soul feature}'
        - 'You summon spirits of order to expunge disorder around you. As an action, you summon the spirits in a 30-foot cube originating from you. The spirits look like modrons or other constructs of your choice. The spirits are intangible and invulnerable, and they create the following effects within the cube before vanishing:'
        - items:
            - The spirits restore up to 100 hit points, divided as you choose among any number of creatures of your choice in the cube.
            - Any damaged objects entirely in the cube are repaired instantly.
            - Every spell of 6th level or lower ends on creatures and objects of your choice in the cube.
          type: list
        - Once you use this action, you can't use it again until you finish a long rest, unless you spend 7 sorcery points to use it again.
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Divine Soul
      subclass_source: XGE
      feature: Divine Magic
      source: XGE
      level: 1
      entries:
        - Your link to the divine allows you to learn spells from the cleric class. When your Spellcasting feature lets you learn or replace a sorcerer cantrip or a sorcerer spell of 1st level or higher, you can choose the new spell from the cleric spell list or the sorcerer spell list. You must otherwise obey all the restrictions for selecting the spell, and it becomes a sorcerer spell for you.
        - 'In addition, choose an affinity for the source of your divine power: good, evil, law, chaos, or neutrality. You learn an additional spell based on that affinity, as shown below. It is a sorcerer spell for you, but it doesn''t count against your number of sorcerer spells known. If you later replace this spell, you must replace it with a spell from the cleric spell list.'
        - colLabels:
            - Affinity
            - Spell
          colStyles:
            - col-6
            - col-6
          rows:
            - - Good
              - '{@spell cure wounds}'
            - - Evil
              - '{@spell inflict wounds}'
            - - Law
              - '{@spell bless}'
            - - Chaos
              - '{@spell bane}'
            - - Neutrality
              - '{@spell protection from evil and good}'
          type: table
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Divine Soul
      subclass_source: XGE
      feature: Divine Soul
      source: XGE
      level: 1
      entries:
        - Sometimes the spark of magic that fuels a sorcerer comes from a divine source that glimmers within the soul. Having such a blessed soul is a sign that your innate magic might come from a distant but powerful familial connection to a divine being. Perhaps your ancestor was an angel, transformed into a mortal and sent to fight in a god's name.
        - Or your birth might align with an ancient prophecy, marking you as a servant of the gods or a chosen vessel of divine magic.
        - A Divine Soul, with a natural magnetism, is seen as a threat by some religious hierarchies. As an outsider who commands sacred power, a Divine Soul can undermine an existing order by claiming a direct tie to the divine.
        - In some cultures, only those who can claim the power of a Divine Soul may command religious power. In these lands, ecclesiastical positions are dominated by a few bloodlines and preserved over generations.
        - subclassFeature: Divine Magic|Sorcerer||Divine Soul|XGE|1
          type: refSubclassFeature
        - subclassFeature: Favored by the Gods|Sorcerer||Divine Soul|XGE|1
          type: refSubclassFeature
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Divine Soul
      subclass_source: XGE
      feature: Favored by the Gods
      source: XGE
      level: 1
      entries:
        - Starting at 1st level, divine power guards your destiny. If you fail a saving throw or miss with an attack roll, you can roll {@dice 2d4} and add it to the total, possibly changing the outcome. Once you use this feature, you can't use it again until you finish a short or long rest.
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Divine Soul
      subclass_source: XGE
      feature: Empowered Healing
      source: XGE
      level: 6
      entries:
        - Starting at 6th level, the divine energy coursing through you can empower healing spells. Whenever you or an ally within 5 feet of you rolls dice to determine the number of hit points a spell restores, you can spend 1 sorcery point to reroll any number of those dice once, provided you aren't {@condition incapacitated}. You can use this feature only once per turn.
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Divine Soul
      subclass_source: XGE
      feature: Otherworldly Wings
      source: XGE
      level: 14
      entries:
        - Starting at 14th level, you can use a bonus action to manifest a pair of spectral wings from your back. While the wings are present, you have a flying speed of 30 feet. The wings last until you're {@condition incapacitated}, you die, or you dismiss them as a bonus action.
        - 'The affinity you chose for your Divine Magic feature determines the appearance of the spectral wings: eagle wings for good or law, bat wings for evil or chaos, and dragonfly wings for neutrality.'
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Divine Soul
      subclass_source: XGE
      feature: Unearthly Recovery
      source: XGE
      level: 18
      entries:
        - At 18th level, you gain the ability to overcome grievous injuries. As a bonus action when you have fewer than half of your hit points remaining, you can regain a number of hit points equal to half your hit point maximum.
        - Once you use this feature, you can't use it again until you finish a long rest.
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Draconic
      subclass_source: PHB
      feature: Draconic Bloodline
      source: PHB
      level: 1
      entries:
        - Your innate magic comes from draconic magic that was mingled with your blood or that of your ancestors. Most often, sorcerers with this origin trace their descent back to a mighty sorcerer of ancient times who made a bargain with a dragon or who might even have claimed a dragon parent. Some of these bloodlines are well established in the world, but most are obscure. Any given sorcerer could be the first of a new bloodline, as a result of a pact or some other exceptional circumstance.
        - subclassFeature: Dragon Ancestor|Sorcerer||Draconic||1
          type: refSubclassFeature
        - subclassFeature: Draconic Resilience|Sorcerer||Draconic||1
          type: refSubclassFeature
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Draconic
      subclass_source: PHB
      feature: Draconic Resilience
      source: PHB
      level: 1
      entries:
        - As magic flows through your body, it causes physical traits of your dragon ancestors to emerge. At 1st level, your hit point maximum increases by 1 and increases by 1 again whenever you gain a level in this class.
        - Additionally, parts of your skin are covered by a thin sheen of dragon-like scales. When you aren't wearing armor, your AC equals 13 + your Dexterity modifier.
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Draconic
      subclass_source: PHB
      feature: Dragon Ancestor
      source: PHB
      level: 1
      entries:
        - At 1st level, you choose one type of dragon as your ancestor. The damage type associated with each dragon is used by features you gain later.
        - caption: Draconic Ancestry
          colLabels:
            - Dragon
            - Damage Type
          colStyles:
            - col-6 text-center
            - col-6 text-center
          rows:
            - - Black
              - '{@filter Acid|spells|damage type=acid|class=sorcerer}'
            - - Blue
              - '{@filter Lightning|spells|damage type=lightning|class=sorcerer}'
            - - Brass
              - '{@filter Fire|spells|damage type=fire|class=sorcerer}'
            - - Bronze
              - '{@filter Lightning|spells|damage type=lightning|class=sorcerer}'
            - - Copper
              - '{@filter Acid|spells|damage type=acid|class=sorcerer}'
            - - Gold
              - '{@filter Fire|spells|damage type=fire|class=sorcerer}'
            - - Green
              - '{@filter Poison|spells|damage type=poison|class=sorcerer}'
            - - Red
              - '{@filter Fire|spells|damage type=fire|class=sorcerer}'
            - - Silver
              - '{@filter Cold|spells|damage type=cold|class=sorcerer}'
            - - White
              - '{@filter Cold|spells|damage type=cold|class=sorcerer}'
          type: table
        - You can speak, read, and write {@language Draconic}. Additionally, whenever you make a Charisma check when interacting with dragons, your proficiency bonus is doubled if it applies to the check.
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Draconic
      subclass_source: PHB
      feature: Elemental Affinity
      source: PHB
      level: 6
      entries:
        - Starting at 6th level, when you cast a spell that deals damage of the type associated with your draconic ancestry, you can add your Charisma modifier to one damage roll of that spell. At the same time, you can spend 1 sorcery point to gain resistance to that damage type for 1 hour.
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Draconic
      subclass_source: PHB
      feature: Dragon Wings
      source: PHB
      level: 14
      entries:
        - At 14th level, you gain the ability to sprout a pair of dragon wings from your back, gaining a flying speed equal to your current speed. You can create these wings as a bonus action on your turn. They last until you dismiss them as a bonus action on your turn.
        - You can't manifest your wings while wearing armor unless the armor is made to accommodate them, and clothing not made to accommodate your wings might be destroyed when you manifest them.
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Draconic
      subclass_source: PHB
      feature: Draconic Presence
      source: PHB
      level: 18
      entries:
        - Beginning at 18th level, you can channel the dread presence of your dragon ancestor, causing those around you to become awestruck or {@condition frightened}. As an action, you can spend 5 sorcery points to draw on this power and exude an aura of awe or fear (your choice) to a distance of 60 feet. For 1 minute or until you lose your {@status concentration} (as if you were casting a {@status concentration} spell), each hostile creature that starts its turn in this aura must succeed on a Wisdom saving throw or be {@condition charmed} (if you chose awe) or {@condition frightened} (if you chose fear) until the aura ends. A creature that succeeds on this saving throw is immune to your aura for 24 hours.
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Lunar
      subclass_source: DSotDQ
      feature: Lunar Embodiment
      source: DSotDQ
      level: 1
      entries:
        - '{@i 1st-Level Lunar Sorcery Feature}'
        - You learn additional spells when you reach certain levels in this class, as shown on the Lunar Spells table. Each of these spells counts as a sorcerer spell for you, but it doesn't count against the number of sorcerer spells you know.
        - caption: Lunar Spells
          colLabels:
            - Sorcerer Level
            - Full Moon Spell
            - New Moon Spell
            - Crescent Moon Spell
          colStyles:
            - col-1-1 text-center
            - col-3-3
            - col-3-3
            - col-3-3
          rows:
            - - 1st
              - '{@spell shield}'
              - '{@spell ray of sickness}'
              - '{@spell color spray}'
            - - 3rd
              - '{@spell lesser restoration}'
              - '{@spell blindness/deafness}'
              - '{@spell alter self}'
            - - 5th
              - '{@spell dispel magic}'
              - '{@spell vampiric touch}'
              - '{@spell phantom steed}'
            - - 7th
              - '{@spell death ward}'
              - '{@spell confusion}'
              - '{@spell hallucinatory terrain}'
            - - 9th
              - '{@spell Rary''s telepathic bond}'
              - '{@spell hold monster}'
              - '{@spell mislead}'
          type: table
        - 'Whenever you finish a long rest, you can choose what lunar phase manifests its power through your magic: Full Moon, New Moon, or Crescent Moon. While in the chosen phase, you can cast one 1st-level spell of the associated phase in the Lunar Spells table once without expending a spell slot. Once you cast a spell in this way, you can''t do so again until you finish a long rest.'
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Lunar
      subclass_source: DSotDQ
      feature: Lunar Sorcery
      source: DSotDQ
      level: 1
      entries:
        - On many worlds, the moon is a revered celestial body with magical properties. On Krynn, the gods of magic are associated with the world's three moons. On the world of Toril, the god Selûne uses the light of the moon to battle darkness. On Eberron, scholars of the Draconic Prophecy decipher ancient secrets from the waxing and waning of that world's twelve moons.
        - You or someone from your lineage has been exposed to the concentrated magic of the moon (or moons) of your world, imbuing you with lunar magic. Perhaps your ancestor was involved in a druidic ritual involving an eclipse, or maybe a mystical fragment of a moon crashed near you. However you came to have your magic, your connection to the moon is obvious when you cast sorcerer spells—perhaps making your pupils glow with the color of a moon from your world, causing spectral manifestations of lunar phases to orbit you, or some other effect.
        - subclassFeature: Lunar Embodiment|Sorcerer||Lunar|DSotDQ|1
          type: refSubclassFeature
        - subclassFeature: Moon Fire|Sorcerer||Lunar|DSotDQ|1
          type: refSubclassFeature
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Lunar
      subclass_source: DSotDQ
      feature: Moon Fire
      source: DSotDQ
      level: 1
      entries:
        - '{@i 1st-Level Lunar Sorcery Feature}'
        - You can call down the radiant light of the moon on command. You learn the {@spell sacred flame} spell, which doesn't count against the number of sorcerer cantrips you know. When you cast the spell, you can target one creature as normal or target two creatures within range that are within 5 feet of each other.
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Lunar
      subclass_source: DSotDQ
      feature: Lunar Boons
      source: DSotDQ
      level: 6
      entries:
        - '{@i 6th-Level Lunar Sorcery Feature}'
        - 'The current phase of your Lunar Embodiment can affect your Metamagic feature. Each Lunar Embodiment phase is associated with certain schools of magic, as shown here:'
        - items:
            - entries:
                - '{@filter Abjuration and divination spells|spells|class=sorcerer|school=A;D}'
              name: Full Moon
              type: item
            - entries:
                - '{@filter Enchantment and necromancy spells|spells|class=sorcerer|school=E;N}'
              name: New Moon
              type: item
            - entries:
                - '{@filter Illusion and transmutation spells|spells|class=sorcerer|school=I;T}'
              name: Crescent Moon
              type: item
          style: list-hang-notitle
          type: list
        - Whenever you use Metamagic on a spell of a school of magic associated with your current Lunar Embodiment phase, you can reduce the sorcery points spent by 1 (minimum 0). You can reduce the sorcery points spent for your Metamagic a number of times equal to your proficiency bonus, and you regain all expended uses when you finish a long rest.
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Lunar
      subclass_source: DSotDQ
      feature: Waxing and Waning
      source: DSotDQ
      level: 6
      entries:
        - '{@i 6th-Level Lunar Sorcery Feature}'
        - You gain greater control over the phases of your lunar magic. As a bonus action, you can spend 1 sorcery point to change your current Lunar Embodiment phase to a different one.
        - You can now cast one 1st-level spell from each lunar phase of the Lunar Spells table once without expending a spell slot, provided your current phase is the same as the lunar phase spell. Once you cast a lunar phase spell in this way, you can't do so again until you finish a long rest.
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Lunar
      subclass_source: DSotDQ
      feature: Lunar Empowerment
      source: DSotDQ
      level: 14
      entries:
        - '{@i 14th-Level Lunar Sorcery Feature}'
        - 'The power of a lunar phase saturates your being. While you are in a Lunar Embodiment phase, you also gain the following benefit associated with that phase:'
        - items:
            - entries:
                - You can use a bonus action to shed bright light in a 10-foot radius and dim light for an additional 10 feet or to douse the light. In addition, you and creatures of your choice have advantage on Intelligence ({@skill Investigation}) and Wisdom ({@skill Perception}) checks while within the bright light you shed.
              name: Full Moon
              type: item
            - entries:
                - You have advantage on Dexterity ({@skill Stealth}) checks. In addition, while you are entirely in darkness, attack rolls have disadvantage against you.
              name: New Moon
              type: item
            - entries:
                - You have resistance to necrotic and radiant damage.
              name: Crescent Moon
              type: item
          style: list-hang-notitle
          type: list
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Lunar
      subclass_source: DSotDQ
      feature: Lunar Phenomenon
      source: DSotDQ
      level: 18
      entries:
        - '{@i 18th-Level Lunar Sorcery feature}'
        - 'As a bonus action, you can tap into a special power of your current Lunar Embodiment phase. Alternatively, as part of the bonus action you take to change your lunar phase using the Waxing and Waning feature, you can immediately use the power of the lunar phase you are entering:'
        - items:
            - entries:
                - You radiate moonlight for a moment. Each creature of your choice within 30 feet of you must succeed on a Constitution saving throw against your spell save DC or be {@condition blinded} until the end of its next turn. In addition, one creature of your choice in that area regains {@dice 3d8} hit points.
              name: Full Moon
              type: item
            - entries:
                - You momentarily emanate gloom. Each creature of your choice within 30 feet of you must succeed on a Dexterity saving throw against your spell save DC or take {@damage 3d10} necrotic damage and have its speed reduced to 0 until the end of its next turn. In addition, you become {@condition invisible} until the end of your next turn, or until immediately after you make an attack roll or cast a spell.
              name: New Moon
              type: item
            - entries:
                - You can magically teleport to an unoccupied space you can see within 60 feet of yourself. You can bring along one willing creature you can see within 5 feet of yourself. That creature teleports to an unoccupied space of your choice that you can see within 5 feet of your destination space. In addition, you and that creature gain resistance to all damage until the start of your next turn.
              name: Crescent Moon
              type: item
          style: list-hang-notitle
          type: list
        - Once you use one of these bonus action benefits, you can't use that benefit again until you finish a long rest, unless you spend 5 sorcery points to use it again.
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Pyromancer (PSK)
      subclass_source: PSK
      feature: Heart of Fire
      source: PSK
      level: 1
      entries:
        - At 1st level, whenever you start casting a spell of 1st level or higher that deals fire damage, fiery magic erupts from you. This eruption causes creatures of your choice that you can see within 10 feet of you to take fire damage equal to half your sorcerer level (minimum of 1).
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Pyromancer (PSK)
      subclass_source: PSK
      feature: Pyromancer (PSK)
      source: PSK
      level: 1
      entries:
        - Your innate magic manifests in fire. You are your fire, and your fire is you.
        - subclassFeature: Heart of Fire|Sorcerer||Pyromancer (PSK)|PSK|1
          type: refSubclassFeature
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Pyromancer (PSK)
      subclass_source: PSK
      feature: Fire in the Veins
      source: PSK
      level: 6
      entries:
        - At 6th level, you gain resistance to fire damage. In addition, spells you cast ignore resistance to fire damage.
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Pyromancer (PSK)
      subclass_source: PSK
      feature: Pyromancer's Fury
      source: PSK
      level: 14
      entries:
        - Starting at 14th level, when you are hit by a melee attack, you can use your reaction to deal fire damage to the attacker. The damage equals your sorcerer level, and ignores resistance to fire damage.
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Pyromancer (PSK)
      subclass_source: PSK
      feature: Fiery Soul
      source: PSK
      level: 18
      entries:
        - At 18th level, you gain immunity to fire damage. In addition, any spell or effect you create ignores resistance to fire damage and treats immunity to fire damage as resistance to fire damage.
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Shadow
      subclass_source: XGE
      feature: Eyes of the Dark
      source: XGE
      level: 1
      entries:
        - Starting at 1st level, you have {@sense darkvision} with a range of 120 feet.
        - When you reach 3rd level in this class, you learn the {@spell darkness} spell, which doesn't count against your number of sorcerer spells known. In addition, you can cast it by spending 2 sorcery points or by expending a spell slot. If you cast it with sorcery points, you can see through the {@spell darkness} created by the spell.
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Shadow
      subclass_source: XGE
      feature: Shadow Magic
      source: XGE
      level: 1
      entries:
        - You are a creature of shadow, for your innate magic comes from the Shadowfell itself. You might trace your lineage to an entity from that place, or perhaps you were exposed to its fell energy and transformed by it.
        - The power of shadow magic casts a strange pall over your physical presence. The spark of life that sustains you is muffled, as if it struggles to remain viable against the dark energy that imbues your soul. At your option, you can pick from or roll on the Shadow Sorcerer Quirks table to create a quirk for your character.
        - caption: Shadow Sorcerer Quirks
          colLabels:
            - d6
            - Quirk
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - "1"
              - You are always icy cold to the touch.
            - - "2"
              - When you are asleep, you don't appear to breathe (though you must still breathe to survive).
            - - "3"
              - You barely bleed, even when badly injured.
            - - "4"
              - Your heart beats once per minute. This event sometimes surprises you.
            - - "5"
              - You have trouble remembering that living creatures and corpses should be treated differently.
            - - "6"
              - You blinked. Once. Last week.
          type: table
        - subclassFeature: Eyes of the Dark|Sorcerer||Shadow|XGE|1
          type: refSubclassFeature
        - subclassFeature: Strength of the Grave|Sorcerer||Shadow|XGE|1
          type: refSubclassFeature
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Shadow
      subclass_source: XGE
      feature: Strength of the Grave
      source: XGE
      level: 1
      entries:
        - Starting at 1st level, your existence in a twilight state between life and death makes you difficult to defeat. When damage reduces you to 0 hit points, you can make a Charisma saving throw ({@dc 5} + the damage taken). On a success, you instead drop to 1 hit point. You can't use this feature if you are reduced to 0 hit points by radiant damage or by a critical hit.
        - After the saving throw succeeds, you can't use this feature again until you finish a long rest.
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Shadow
      subclass_source: XGE
      feature: Hound of Ill Omen
      source: XGE
      level: 6
      entries:
        - 'At 6th level, you gain the ability to call forth a howling creature of darkness to harass your foes. As a bonus action, you can spend 3 sorcery points to magically summon a {@creature hound of ill omen|XGE} to target one creature you can see within 120 feet of you. The hound uses the {@creature dire wolf}''s statistics (see the Monster Manual or appendix C in the Player''s Handbook), with the following changes:'
        - items:
            - The hound is size Medium, not Large, and it counts as a monstrosity, not a beast.
            - It appears with a number of temporary hit points equal to half your sorcerer level.
            - It can move through other creatures and objects as if they were {@quickref difficult terrain||3}. The hound takes 5 force damage if it ends its turn inside an object.
            - At the start of its turn, the hound automatically knows its target's location. If the target was hidden, it is no longer hidden from the hound.
          type: list
        - The hound appears in an unoccupied space of your choice within 30 feet of the target. Roll initiative for the hound. On its turn, it can move only toward its target by the most direct route, and it can use its action only to attack its target. The hound can make opportunity attacks, but only against its target. Additionally, while the hound is within 5 feet of the target, the target has disadvantage on saving throws against any spell you cast. The hound disappears if it is reduced to 0 hit points, if its target is reduced to 0 hit points, or after 5 minutes.
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Shadow
      subclass_source: XGE
      feature: Shadow Walk
      source: XGE
      level: 14
      entries:
        - At 14th level, you gain the ability to step from one shadow into another. When you are in dim light or darkness, as a bonus action, you can magically teleport up to 120 feet to an unoccupied space you can see that is also in dim light or darkness.
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Shadow
      subclass_source: XGE
      feature: Umbral Form
      source: XGE
      level: 18
      entries:
        - Starting at 18th level, you can spend 6 sorcery points as a bonus action to magically transform yourself into a shadowy form. In this form, you have resistance to all damage except force and radiant damage, and you can move through other creatures and objects as if they were {@quickref difficult terrain||3}. You take 5 force damage if you end your turn inside an object.
        - You remain in this form for 1 minute. It ends early if you are {@condition incapacitated}, if you die, or if you dismiss it as a bonus action.
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Storm
      subclass_source: XGE
      feature: Storm Sorcery
      source: XGE
      level: 1
      entries:
        - Your innate magic comes from the power of elemental air. Many with this power can trace their magic back to a near-death experience caused by the Great Rain, but perhaps you were born during a howling gale so powerful that folk still tell stories of it, or your lineage might include the influence of potent air creatures such as djinn. Whatever the case, the magic of the storm permeates your being.
        - Storm sorcerers are invaluable members of a ship's crew. Their magic allows them to exert control over wind and weather in their immediate area. Their abilities also prove useful in repelling attacks by sahuagin, pirates, and other waterborne threats.
        - subclassFeature: Wind Speaker|Sorcerer||Storm|XGE|1
          type: refSubclassFeature
        - subclassFeature: Tempestuous Magic|Sorcerer||Storm|XGE|1
          type: refSubclassFeature
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Storm
      subclass_source: XGE
      feature: Tempestuous Magic
      source: XGE
      level: 1
      entries:
        - Starting at 1st level, you can use a bonus action on your turn to cause whirling gusts of elemental air to briefly surround you, immediately before or after you cast a spell of 1st level or higher. Doing so allows you to fly up to 10 feet without provoking opportunity attacks.
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Storm
      subclass_source: XGE
      feature: Wind Speaker
      source: XGE
      level: 1
      entries:
        - 'The arcane magic you command is infused with elemental air. You can speak, read, and write {@language Primordial}. Knowing this language allows you to understand and be understood by those who speak its dialects: {@language Primordial||Aquan}, {@language Primordial||Auran}, {@language Primordial||Ignan}, and {@language Primordial||Terran}.'
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Storm
      subclass_source: XGE
      feature: Heart of the Storm
      source: XGE
      level: 6
      entries:
        - At 6th level, you gain resistance to lightning and thunder damage. In addition, whenever you start casting a spell of 1st level or higher that deals lightning or thunder damage, stormy magic erupts from you. This eruption causes creatures of your choice that you can see within 10 feet of you to take lightning or thunder damage (choose each time this ability activates) equal to half your sorcerer level.
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Storm
      subclass_source: XGE
      feature: Storm Guide
      source: XGE
      level: 6
      entries:
        - At 6th level, you gain the ability to subtly control the weather around you.
        - If it is raining, you can use an action to cause the rain to stop falling in a 20-foot-radius sphere centered on you. You can end this effect as a bonus action.
        - If it is windy, you can use a bonus action each round to choose the direction that the wind blows in a 100-foot-radius sphere centered on you. The wind blows in that direction until the end of your next turn. This feature doesn't alter the speed of the wind.
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Storm
      subclass_source: XGE
      feature: Storm's Fury
      source: XGE
      level: 14
      entries:
        - Starting at 14th level, when you are hit by a melee attack, you can use your reaction to deal lightning damage to the attacker. The damage equals your sorcerer level. The attacker must also make a Strength saving throw against your sorcerer spell save DC. On a failed save, the attacker is pushed in a straight line up to 20 feet away from you.
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Storm
      subclass_source: XGE
      feature: Wind Soul
      source: XGE
      level: 18
      entries:
        - At 18th level, you gain immunity to lightning and thunder damage.
        - You also gain a magical flying speed of 60 feet. As an action, you can reduce your flying speed to 30 feet for 1 hour and choose a number of creatures within 30 feet of you equal to 3 + your Charisma modifier. The chosen creatures gain a magical flying speed of 30 feet for 1 hour. Once you reduce your flying speed in this way, you can't do so again until you finish a short or long rest.
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Wild
      subclass_source: PHB
      feature: Tides of Chaos
      source: PHB
      level: 1
      entries:
        - Starting at 1st level, you can manipulate the forces of chance and chaos to gain advantage on one attack roll, ability check, or saving throw. Once you do so, you must finish a long rest before you can use this feature again.
        - Any time before you regain the use of this feature, the DM can have you roll on the {@table Wild Magic Surge|PHB} table immediately after you cast a sorcerer spell of 1st level or higher. You then regain the use of this feature.
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Wild
      subclass_source: PHB
      feature: Wild Magic
      source: PHB
      level: 1
      entries:
        - Your innate magic comes from the wild forces of chaos that underlie the order of creation. You might have endured exposure to some form of raw magic, perhaps through a planar portal leading to Limbo, the Elemental Planes, or the mysterious Far Realm. Perhaps you were blessed by a powerful fey creature or marked by a demon. Or your magic could be a fluke of your birth, with no apparent cause or reason. However it came to be, this chaotic magic churns within you, waiting for any outlet.
        - subclassFeature: Wild Magic Surge|Sorcerer||Wild||1
          type: refSubclassFeature
        - subclassFeature: Tides of Chaos|Sorcerer||Wild||1
          type: refSubclassFeature
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Wild
      subclass_source: PHB
      feature: Wild Magic Surge
      source: PHB
      level: 1
      entries:
        - Starting when you choose this origin at 1st level, your spellcasting can unleash surges of untamed magic. Immediately after you cast a sorcerer spell of 1st level or higher, the DM can have you roll a {@dice d20}. If you roll a 1, roll on the Wild Magic Surge table to create a random magical effect. A Wild Magic Surge can happen once per turn.
        - If a Wild Magic effect is a spell, it's too wild to be affected by Metamagic. If it normally requires {@status concentration}, it doesn't require {@status concentration} in this case; the spell lasts for its full duration.
        - caption: Wild Magic Surge
          colLabels:
            - '{@dice d100}'
            - Effect
          colStyles:
            - col-1 text-center
            - col-11
          data:
            genTables:
                reprintedAs:
                    - Wild Magic Surge|XPHB
                tableInclude: true
          rows:
            - - 01-02
              - Roll on this table at the start of each of your turns for the next minute, ignoring this result on subsequent rolls.
            - - 03-04
              - For the next minute, you can see any {@condition invisible} creature if you have line of sight to it.
            - - 05-06
              - A {@filter modron|bestiary|source=mm|search=modron} chosen and controlled by the DM appears in an unoccupied space within 5 feet of you, then disappears 1 minute later.
            - - 07-08
              - You cast {@spell fireball} as a 3rd-level spell centered on yourself.
            - - 09-10
              - You cast {@spell magic missile} as a 5th-level spell.
            - - 11-12
              - Roll a {@dice d10}. Your height changes by a number of inches equal to the roll. If the roll is odd, you shrink. If the roll is even, you grow.
            - - 13-14
              - You cast {@spell confusion} centered on yourself.
            - - 15-16
              - For the next minute, you regain 5 hit points at the start of each of your turns.
            - - 17-18
              - You grow a long beard made of feathers that remains until you sneeze, at which point the feathers explode out from your face.
            - - 19-20
              - You cast {@spell grease} centered on yourself.
            - - 21-22
              - Creatures have disadvantage on saving throws against the next spell you cast in the next minute that involves a saving throw.
            - - 23-24
              - Your skin turns a vibrant shade of blue. A {@spell remove curse} spell can end this effect.
            - - 25-26
              - An eye appears on your forehead for the next minute. During that time, you have advantage on Wisdom ({@skill Perception}) checks that rely on sight.
            - - 27-28
              - For the next minute, all your spells with a casting time of 1 action have a casting time of 1 bonus action.
            - - 29-30
              - You teleport up to 60 feet to an unoccupied space of your choice that you can see.
            - - 31-32
              - You are transported to the Astral Plane until the end of your next turn, after which time you return to the space you previously occupied or the nearest unoccupied space if that space is occupied.
            - - 33-34
              - Maximize the damage of the next damaging spell you cast within the next minute.
            - - 35-36
              - Roll a {@dice d10}. Your age changes by a number of years equal to the roll. If the roll is odd, you get younger (minimum 1 year old). If the roll is even, you get older.
            - - 37-38
              - '{@dice 1d6} {@creature flumph||flumphs} controlled by the DM appear in unoccupied spaces within 60 feet of you and are {@condition frightened} of you. They vanish after 1 minute.'
            - - 39-40
              - You regain {@dice 2d10} hit points.
            - - 41-42
              - You turn into a potted plant until the start of your next turn. While a plant, you are {@condition incapacitated} and have vulnerability to all damage. If you drop to 0 hit points, your pot breaks, and your form reverts.
            - - 43-44
              - For the next minute, you can teleport up to 20 feet as a bonus action on each of your turns.
            - - 45-46
              - You cast {@spell levitate} on yourself.
            - - 47-48
              - A {@creature unicorn} controlled by the DM appears in a space within 5 feet of you, then disappears 1 minute later.
            - - 49-50
              - You can't speak for the next minute. Whenever you try, pink bubbles float out of your mouth.
            - - 51-52
              - A spectral shield hovers near you for the next minute, granting you a +2 bonus to AC and immunity to {@spell magic missile}.
            - - 53-54
              - You are immune to being intoxicated by alcohol for the next {@dice 5d6} days.
            - - 55-56
              - Your hair falls out but grows back within 24 hours.
            - - 57-58
              - For the next minute, any flammable object you touch that isn't being worn or carried by another creature bursts into flame.
            - - 59-60
              - You regain your lowest-level expended spell slot.
            - - 61-62
              - For the next minute, you must shout when you speak.
            - - 63-64
              - You cast {@spell fog cloud} centered on yourself.
            - - 65-66
              - Up to three creatures you choose within 30 feet of you take {@damage 4d10} lightning damage.
            - - 67-68
              - You are {@condition frightened} by the nearest creature until the end of your next turn.
            - - 69-70
              - Each creature within 30 feet of you becomes {@condition invisible} for the next minute. The invisibility ends on a creature when it attacks or casts a spell.
            - - 71-72
              - You gain resistance to all damage for the next minute.
            - - 73-74
              - A random creature within 60 feet of you becomes {@condition poisoned} for {@dice 1d4} hours.
            - - 75-76
              - You glow with bright light in a 30-foot radius for the next minute. Any creature that ends its turn within 5 feet of you is {@condition blinded} until the end of its next turn.
            - - 77-78
              - You cast {@spell polymorph} on yourself. If you fail the saving throw, you turn into a sheep for the spell's duration.
            - - 79-80
              - Illusory butterflies and flower petals flutter in the air within 10 feet of you for the next minute.
            - - 81-82
              - You can take one additional action immediately.
            - - 83-84
              - Each creature within 30 feet of you takes {@damage 1d10} necrotic damage. You regain hit points equal to the sum of the necrotic damage dealt.
            - - 85-86
              - You cast {@spell mirror image}.
            - - 87-88
              - You cast {@spell fly} on a random creature within 60 feet of you.
            - - 89-90
              - You become {@condition invisible} for the next minute. During that time, other creatures can't hear you. The invisibility ends if you attack or cast a spell.
            - - 91-92
              - If you die within the next minute, you immediately come back to life as if by the {@spell reincarnate} spell.
            - - 93-94
              - Your size increases by one size category for the next minute.
            - - 95-96
              - You and all creatures within 30 feet of you gain vulnerability to piercing damage for the next minute.
            - - 97-98
              - You are surrounded by faint, ethereal music for the next minute.
            - - 99-00
              - You regain all expended sorcery points.
          type: table
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Wild
      subclass_source: PHB
      feature: Bend Luck
      source: PHB
      level: 6
      entries:
        - Starting at 6th level, you have the ability to twist fate using your wild magic. When another creature you can see makes an attack roll, an ability check, or a saving throw, you can use your reaction and spend 2 sorcery points to roll {@dice 1d4} and apply the number rolled as a bonus or penalty (your choice) to the creature's roll. You can do so after the creature rolls but before any effects of the roll occur.
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Wild
      subclass_source: PHB
      feature: Controlled Chaos
      source: PHB
      level: 14
      entries:
        - At 14th level, you gain a modicum of control over the surges of your wild magic. Whenever you roll on the {@table Wild Magic Surge|PHB} table, you can roll twice and use either number.
    - class_name: Sorcerer
      class_source: PHB
      subclass_name: Wild
      subclass_source: PHB
      feature: Spell Bombardment
      source: PHB
      level: 18
      entries:
        - Beginning at 18th level, the harmful energy of your spells intensifies. When you roll damage for a spell and roll the highest number possible on any of the dice, choose one of those dice, roll it again and add that roll to the damage. You can use the feature only once per turn.
    - class_name: Sorcerer
      class_source: XPHB
      subclass_name: Aberrant Mind
      subclass_source: TCE
      feature: Aberrant Mind
      source: TCE
      level: 3
    - class_name: Sorcerer
      class_source: XPHB
      subclass_name: Aberrant
      subclass_source: XPHB
      feature: Aberrant Sorcery
      source: XPHB
      level: 3
      entries:
        - '{@i Wield Unnatural Psionic Power}'
        - An alien influence has wrapped its tendrils around your mind, giving you psionic power. You can now touch other minds with that power and alter the world around you. Will this power shine from you as a hopeful beacon to others? Or will you be a terror to those who feel the stab of your mind?
        - Perhaps a psychic wind from the Astral Plane carried psionic energy to you, or you were exposed to the Far Realm's warping influence. Alternatively, you were implanted with a mind flayer tadpole, but your transformation into a mind flayer never occurred; now the tadpole's psionic power is yours. However you acquired this power, your mind is aflame with it.
        - subclassFeature: Psionic Spells|Sorcerer|XPHB|Aberrant|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Telepathic Speech|Sorcerer|XPHB|Aberrant|XPHB|3
          type: refSubclassFeature
    - class_name: Sorcerer
      class_source: XPHB
      subclass_name: Aberrant
      subclass_source: XPHB
      feature: Psionic Spells
      source: XPHB
      level: 3
      entries:
        - When you reach a Sorcerer level specified in the Psionic Spells table, you thereafter always have the listed spells prepared.
        - caption: Psionic Spells
          colLabels:
            - Sorcerer Level
            - Spells
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - 3rd
              - '{@spell Arms of Hadar|XPHB}, {@spell Calm Emotions|XPHB}, {@spell Detect Thoughts|XPHB}, {@spell Dissonant Whispers|XPHB}, {@spell Mind Sliver|XPHB}'
            - - 5th
              - '{@spell Hunger of Hadar|XPHB}, {@spell Sending|XPHB}'
            - - 7th
              - '{@spell Evard''s Black Tentacles|XPHB}, {@spell Summon Aberration|XPHB}'
            - - 9th
              - '{@spell Rary''s Telepathic Bond|XPHB}, {@spell Telekinesis|XPHB}'
          type: table
    - class_name: Sorcerer
      class_source: XPHB
      subclass_name: Aberrant
      subclass_source: XPHB
      feature: Telepathic Speech
      source: XPHB
      level: 3
      entries:
        - You can form a telepathic connection between your mind and the mind of another. As a {@variantrule Bonus Action|XPHB}, choose one creature you can see within 30 feet of yourself. You and the chosen creature can communicate telepathically with each other while the two of you are within a number of miles of each other equal to your Charisma modifier (minimum of 1 mile). To understand each other, you each must mentally use a language the other knows.
        - The telepathic connection lasts for a number of minutes equal to your Sorcerer level. It ends early if you use this ability to form a connection with a different creature.
    - class_name: Sorcerer
      class_source: XPHB
      subclass_name: Aberrant
      subclass_source: XPHB
      feature: Psionic Sorcery
      source: XPHB
      level: 6
      entries:
        - When you cast any level 1+ spell from your Psionic Spells feature, you can cast it by expending a spell slot as normal or by spending a number of Sorcery Points equal to the spell's level. If you cast the spell using Sorcery Points, it requires no Verbal or Somatic components, and it requires no Material components unless they are consumed by the spell or have a cost specified in it.
    - class_name: Sorcerer
      class_source: XPHB
      subclass_name: Aberrant
      subclass_source: XPHB
      feature: Psychic Defenses
      source: XPHB
      level: 6
      entries:
        - You have {@variantrule Resistance|XPHB} to Psychic damage, and you have {@variantrule Advantage|XPHB} on saving throws to avoid or end the {@condition Charmed|XPHB} or {@condition Frightened|XPHB} condition.
    - class_name: Sorcerer
      class_source: XPHB
      subclass_name: Aberrant
      subclass_source: XPHB
      feature: Revelation in Flesh
      source: XPHB
      level: 14
      entries:
        - You can unleash the aberrant truth hidden within yourself. As a {@variantrule Bonus Action|XPHB}, you can spend 1 Sorcery Point or more to magically alter your body for 10 minutes. For each Sorcery Point you spend, you gain one of the following benefits of your choice, the effects of which last until the alteration ends.
        - entries:
            - entries:
                - You gain a {@variantrule Swim Speed|XPHB} equal to twice your {@variantrule Speed|XPHB}, and you can breathe underwater. Gills grow from your neck or flare behind your ears, and your fingers become webbed or you grow wriggling cilia.
              name: Aquatic Adaptation
              type: entries
            - entries:
                - You gain a {@variantrule Fly Speed|XPHB} equal to your {@variantrule Speed|XPHB}, and you can hover. As you fly, your skin glistens with mucus or otherworldly light.
              name: Glistening Flight
              type: entries
            - entries:
                - You can see any {@condition Invisible|XPHB} creature within 60 feet of yourself that isn't behind {@variantrule Cover|XPHB|Total Cover}. Your eyes also turn black or become writhing sensory tendrils.
              name: See the Invisible
              type: entries
            - entries:
                - Your body, along with any equipment you are wearing or carrying, becomes slimy and pliable. You can move through any space as narrow as 1 inch, and you can spend 5 feet of movement to escape from nonmagical restraints or the {@condition Grappled|XPHB} condition.
              name: Wormlike Movement
              type: entries
          type: entries
    - class_name: Sorcerer
      class_source: XPHB
      subclass_name: Aberrant
      subclass_source: XPHB
      feature: Warping Implosion
      source: XPHB
      level: 18
      entries:
        - You can unleash a space-warping anomaly. As a {@action Magic|XPHB} action, you teleport to an unoccupied space you can see within 120 feet of yourself. Immediately after you disappear, each creature within 30 feet of the space you left must make a Strength saving throw against your spell save DC. On a failed save, a creature takes {@damage 3d10} Force damage and is pulled straight toward the space you left, ending in an unoccupied space as close to your former space as possible. On a successful save, the creature takes half as much damage only.
        - Once you use this feature, you can't do so again until you finish a {@variantrule Long Rest|XPHB} unless you spend 5 Sorcery Points (no action required) to restore your use of it.
    - class_name: Sorcerer
      class_source: XPHB
      subclass_name: Clockwork Soul
      subclass_source: TCE
      feature: Clockwork Soul
      source: TCE
      level: 3
    - class_name: Sorcerer
      class_source: XPHB
      subclass_name: Clockwork
      subclass_source: XPHB
      feature: Clockwork Sorcery
      source: XPHB
      level: 3
      entries:
        - '{@i Channel Cosmic Forces of Order}'
        - The cosmic force of order has suffused you with magic. That power arises from Mechanus or a realm like it—a plane of existence shaped entirely by clockwork efficiency. You or someone from your lineage might have become entangled in the machinations of modrons, the orderly beings who inhabit Mechanus. Perhaps your ancestor even took part in the Great Modron March. Whatever its origin within you, the power of order can seem strange to others, but for you, it's part of a vast and glorious system.
        - subclassFeature: Clockwork Spells|Sorcerer|XPHB|Clockwork|XPHB|3
          type: refSubclassFeature
        - subclassFeature: Restore Balance|Sorcerer|XPHB|Clockwork|XPHB|3
          type: refSubclassFeature
    - class_name: Sorcerer
      class_source: XPHB
      subclass_name: Clockwork
      subclass_source: XPHB
      feature: Clockwork Spells
      source: XPHB
      level: 3
      entries:
        - When you reach a Sorcerer level specified in the Clockwork Spells table, you thereafter always have the listed spells prepared.
        - caption: Clockwork Spells
          colLabels:
            - Sorcerer Level
            - Spells
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - 3rd
              - '{@spell Aid|XPHB}, {@spell Alarm|XPHB}, {@spell Lesser Restoration|XPHB}, {@spell Protection from Evil and Good|XPHB}'
            - - 5th
              - '{@spell Dispel Magic|XPHB}, {@spell Protection From Energy|XPHB}'
            - - 7th
              - '{@spell Freedom of Movement|XPHB}, {@spell Summon Construct|XPHB}'
            - - 9th
              - '{@spell Greater Restoration|XPHB}, {@spell Wall of Force|XPHB}'
          type: table
        - In addition, consult the Manifestations of Order table and choose or randomly determine a way your connection to order manifests while you are casting any of your Sorcerer spells.
        - caption: Manifestations of Order
          colLabels:
            - '{@dice 1d6}'
            - Manifestation
          colStyles:
            - col-2 text-center
            - col-10
          rows:
            - - "1"
              - Spectral cogwheels hover behind you.
            - - "2"
              - The hands of a clock spin in your eyes.
            - - "3"
              - Your skin glows with a brassy sheen.
            - - "4"
              - Floating equations and geometric objects overlay your body.
            - - "5"
              - Your {@variantrule Spellcasting Focus|XPHB} temporarily takes the form of a Tiny clockwork mechanism.
            - - "6"
              - The ticking of gears or ringing of a clock can be heard by you and those affected by your magic.
          type: table
    - class_name: Sorcerer
      class_source: XPHB
      subclass_name: Clockwork
      subclass_source: XPHB
      feature: Restore Balance
      source: XPHB
      level: 3
      entries:
        - Your connection to the plane of absolute order allows you to equalize chaotic moments. When a creature you can see within 60 feet of yourself is about to roll a {@dice d20} with {@variantrule Advantage|XPHB} or {@variantrule Disadvantage|XPHB}, you can take a {@variantrule Reaction|XPHB} to prevent the roll from being affected by {@variantrule Advantage|XPHB} and {@variantrule Disadvantage|XPHB}.
        - You can use this feature a number of times equal to your Charisma modifier (minimum of once), and you regain all expended uses when you finish a {@variantrule Long Rest|XPHB}.
    - class_name: Sorcerer
      class_source: XPHB
      subclass_name: Clockwork
      subclass_source: XPHB
      feature: Bastion of Law
      source: XPHB
      level: 6
      entries:
        - You can tap into the grand equation of existence to imbue a creature with a shimmering shield of order. As a {@action Magic|XPHB} action, you can expend 1 to 5 Sorcery Points to create a magical ward around yourself or another creature you can see within 30 feet of yourself. The ward is represented by a number of d8s equal to the number of Sorcery Points spent to create it. When the warded creature takes damage, it can expend a number of those dice, roll them, and reduce the damage taken by the total rolled on those dice.
        - The ward lasts until you finish a {@variantrule Long Rest|XPHB} or until you use this feature again.
    - class_name: Sorcerer
      class_source: XPHB
      subclass_name: Clockwork
      subclass_source: XPHB
      feature: Trance of Order
      source: XPHB
      level: 14
      entries:
        - You gain the ability to align your consciousness with the endless calculations of Mechanus. As a {@variantrule Bonus Action|XPHB}, you can enter this state for 1 minute. For the duration, attack rolls against you can't benefit from {@variantrule Advantage|XPHB}, and whenever you make a {@variantrule D20 Test|XPHB}, you can treat a roll of 9 or lower on the {@dice d20} as a 10.
        - Once you use this feature, you can't use it again until you finish a {@variantrule Long Rest|XPHB} unless you spend 5 Sorcery Points (no action required) to restore your use of it.
    - class_name: Sorcerer
      class_source: XPHB
      subclass_name: Clockwork
      subclass_source: XPHB
      feature: Clockwork Cavalcade
      source: XPHB
      level: 18
      entries:
        - You momentarily summon spirits of order to expunge disorder around you. As a {@action Magic|XPHB} action, you summon the spirits in a 30-foot {@variantrule Cube [Area of Effect]|XPHB|Cube} originating from you. The spirits look like modrons or other Constructs of your choice. The spirits are intangible and invulnerable, and they create the effects below within the {@variantrule Cube [Area of Effect]|XPHB|Cube} before vanishing. Once you use this action, you can't use it again until you finish a {@variantrule Long Rest|XPHB} unless you spend 7 Sorcery Points (no action required) to restore your use of it.
        - entries:
            - entries:
                - The spirits restore up to 100 {@variantrule Hit Points|XPHB}, divided as you choose among any number of creatures of your choice in the {@variantrule Cube [Area of Effect]|XPHB|Cube}.
              name: Heal
              type: entries
            - entries:
                - Any damaged objects entirely in the {@variantrule Cube [Area of Effect]|XPHB|Cube} are repaired instantly.
              name: Repair
              type: entries
            - entries:
                - Every spell of level 6 and lower ends on creatures and objects of your choice in the {@variantrule Cube [Area of Effect]|XPHB|Cube}.
              name: Dispel
              type: entries
          type: entries
    - class_name: Sorcerer
      class_source: XPHB
