    - class_name: Artificer
      class_source: EFA
      subclass_name: Armorer
      subclass_source: EFA
      feature: Extra Attack
      source: EFA
      level: 5
      entries:
        - You can attack twice instead of once whenever you take the {@action Attack|XPHB} action on your turn.
    - class_name: Artificer
      class_source: EFA
      subclass_name: Armorer
      subclass_source: EFA
      feature: Improved Armorer
      source: EFA
      level: 9
      entries:
        - You gain the following benefits.
        - entries:
            - You learn an additional plan for your Replicate Magic Item feature, and it must be in the Armor category. If you replace that plan, you must replace it with another Armor plan.
            - In addition, you can create an additional item with that feature, and the item must also be in the Armor category.
          name: Armor Replication
          page: 16
          type: entries
        - entries:
            - You gain a +1 bonus to attack and damage rolls made with the special weapon of your Arcane Armor model.
          name: Improved Arsenal
          page: 16
          type: entries
    - class_name: Artificer
      class_source: EFA
      subclass_name: Armorer
      subclass_source: EFA
      feature: Perfected Armor
      source: EFA
      level: 15
      entries:
        - Your Arcane Armor gains additional benefits based on its model, as detailed below.
        - entries:
            - The damage die of your Force Demolisher increases to {@damage 2d6} Force damage.
            - In addition, when you use your Giant Stature, your reach increases by 10 feet, your size can increase to Large or Huge (your choice), and you have {@variantrule Advantage|XPHB} on Strength checks and Strength saving throws for the duration.
          name: Dreadnaught
          type: entries
        - entries:
            - The damage die of your Thunder Pulse increases to {@damage 1d10} Thunder damage.
            - In addition, when a Huge or smaller creature you can see ends its turn within 30 feet of you, you can take a {@variantrule Reaction|XPHB} to magically force that creature to make a Strength saving throw against your spell save DC. On a failed save, you pull the creature up to 25 feet directly toward you to an unoccupied space. If you pull the target to a space within 5 feet of yourself, you can make a melee weapon attack against it as part of this {@variantrule Reaction|XPHB}.
            - You can take this {@variantrule Reaction|XPHB} a number of times equal to your Intelligence modifier (minimum of once), and you regain all expended uses when you finish a {@variantrule Long Rest|XPHB}.
          name: Guardian
          type: entries
        - entries:
            - The damage die of your Lightning Launcher increases to {@damage 2d6} Lightning damage. Any creature that takes Lightning damage from your Lightning Launcher glimmers with magical light until the start of your next turn. The glimmering creature sheds {@variantrule Dim Light|XPHB} in a 5-foot radius, and it has {@variantrule Disadvantage|XPHB} on attack rolls against you, as the light jolts it if it attacks you.
            - Additionally, as a {@variantrule Bonus Action|XPHB}, you can gain a {@variantrule Fly Speed|XPHB} equal to twice your {@variantrule Speed|XPHB} until the end of the current turn. You can take this {@variantrule Bonus Action|XPHB} a number of times equal to your Intelligence modifier (minimum of once), and you regain all expended uses when you finish a {@variantrule Long Rest|XPHB}.
          name: Infiltrator
          type: entries
    - class_name: Artificer
      class_source: EFA
      subclass_name: Artillerist
      subclass_source: EFA
      feature: Artillerist
      source: EFA
      level: 3
      entries:
        - '{@i Wield Destructive Power from Afar}'
        - An Artillerist specializes in using magic to hurl energy, projectiles, and explosions on a battlefield.
        - subclassFeature: Tools of the Trade|Artificer|EFA|Artillerist|EFA|3|EFA
          type: refSubclassFeature
        - subclassFeature: Artillerist Spells|Artificer|EFA|Artillerist|EFA|3|EFA
