          type: table
    - class_name: Cleric
      class_source: XPHB
      subclass_name: Knowledge
      subclass_source: FRHoF
      feature: Mind Magic
      source: FRHoF
      level: 3
      entries:
        - As a {@action Magic|XPHB} action, you can expend one use of your Channel Divinity to manifest your magical knowledge. Choose one spell from the Divination school on the Knowledge Domain Spells table that you have prepared. As part of that action, you cast that spell without expending a spell slot or needing Material components.
    - class_name: Cleric
      class_source: XPHB
      subclass_name: Knowledge
      subclass_source: FRHoF
      feature: Unfettered Mind
      source: FRHoF
      level: 6
      entries:
        - You gain {@variantrule telepathy|XPHB} out to 60 feet. When you use this {@variantrule telepathy|XPHB}, you can simultaneously contact a number of creatures equal to your Wisdom modifier (minimum of one).
        - Additionally, you gain proficiency in Intelligence saving throws. If you already have this proficiency, you instead gain saving throw proficiency with one ability in which you lack it.
    - class_name: Cleric
      class_source: XPHB
      subclass_name: Knowledge
      subclass_source: FRHoF
      feature: Divine Foreknowledge
      source: FRHoF
      level: 17
      entries:
        - As a {@variantrule Bonus Action|XPHB}, you magically expand your mind to the future. For 1 hour, you have {@variantrule Advantage|XPHB} on {@variantrule D20 Test|XPHB|D20 Tests}. Once you use this feature, you can't use it again until you finish a {@variantrule Long Rest|XPHB}. You can also restore your use of this feature by expending a level 6+ spell slot (no action required).
