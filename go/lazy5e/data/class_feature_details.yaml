          rows:
            - - 3rd
              - '{@spell Alter Self|XPHB}, {@spell Chromatic Orb|XPHB}, {@spell Command|XPHB}, {@spell Dragon''s Breath|XPHB}'
            - - 5th
              - '{@spell Fear|XPHB}, {@spell Fly|XPHB}'
            - - 7th
              - '{@spell Arcane Eye|XPHB}, {@spell Charm Monster|XPHB}'
            - - 9th
