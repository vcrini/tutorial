  - name: Tattiche Casuali
    kind: Azione
    text: 'Marcate uno Stress e tirate un d6. La Scatola usa la mossa corrispondente: 1. Raggio di Mana. La Scatola spara un raggio incandescente. Effettuate un attacco contro un bersaglio a distanza Lontana. In caso di successo, infliggete 2d10+2 danni magici. 2. Getti di Fuoco. La Scatola spara a casaccio, ruotando su sé stessa e rilasciando getti di fiamme. Effettuate un attacco contro tutti i bersagli entro distanza Ravvicinata. I bersagli colpiti subiscono 2d8 danni fisici. 3. Travolgere. La scatola si muove in modo irregolare. Effettuate un attacco contro tutti i PG entro distanza Ravvicinata. I bersagli colpiti subiscono 1d6+5 danni fisici e sono Vulnerabili fino al loro prossimo tiro con Speranza. 4. Gas Elettrico. La Scatola spruzza un gas argentato che scintilla come un fulmine. Tutti i bersagli entro distanza Ravvicinata devono superare un Tiro Reazione di Astuzia o marcare 3 punti Stress. 5. Schiaffo Stordente. La Scatola salta e le sue facce sbattono, creando un piccolo tuono. Tutti i bersagli entro distanza Prossima devono superare unTiro Reazione di Forza o diventare Vulnerabili fino a quando la Scatola non viene sconfitta. 6. Lamento Psionico. La Scatola rilascia uno sciame di api meccaniche il cui ronzio sconvolge le menti dei mortali. Tutti i bersagli entro distanza Ravvicinata devono superare un Tiro Reazione di Presenza o subire 2d4+9 danni magici diretti.'
  - name: Sovralimentazione
    kind: Reazione
    text: Prima di tirare il danno per l’attacco della Scatola, potete marcare uno Stress per aggiungere un d6 al tiro di danno. Inoltre, ottenete Paura.
  - name: Terremoto Mortale
    kind: Reazione
    text: Quando la Scatola subisce l’ultimo PF, il potere magico che la alimenta esplode in una scarica di forza. Tutti i bersagli entro distanza Ravvicinata devono superare un Tiro Reazione di Istinto o subire 2d8+1 danni magici.
  source: core
