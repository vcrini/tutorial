- name: Background Arcano (Arti Psioniche)
  class: Arcani
  type: Background
  caster_trait: Intelligenza
  description: "Disciplina mentale per manipolare materia e percezione."
  effects:
    - "Attivazione con controllo psichico e concentrazione."

- name: Background Arcano (Scienza Folle)
  class: Arcani
  type: Background
  caster_trait: Intelligenza
  description: "Poteri mediati da dispositivi sperimentali e prototipi."
  effects:
