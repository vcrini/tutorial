- name: Colpo Mirato
  class: Combattimento
  type: Regola
  caster_trait: ""
  description: "Attacco mirato a una parte specifica del bersaglio con penalità al tiro."
  effects:
    - "Permette effetti tattici aggiuntivi oltre al danno."

- name: Attacco Selvaggio
  class: Combattimento
  type: Regola
  caster_trait: ""
  description: "Approccio aggressivo: più pressione offensiva a costo di esposizione difensiva."
  effects:
    - "Utile per chiudere rapidamente uno scontro ravvicinato."

- name: Soppressione
  class: Combattimento
  type: Regola
  caster_trait: ""
  description: "Fuoco di copertura per limitare movimenti nemici."
  effects:
    - "Costringe avversari a cercare riparo o rallentare."

- name: Paura
  class: Condizioni
  type: Regola
  caster_trait: Spirito
  description: "Creature o eventi terrificanti impongono prove di coraggio."
  effects:
    - "Fallimenti possono imporre penalità o comportamenti difensivi."

- name: Veleno
  class: Pericoli
  type: Regola
  caster_trait: Vigore
  description: "Effetti tossici da morso, arma o ambiente contaminato."
  effects:
    - "Richiede prove di resistenza per evitarne le conseguenze."

- name: Inseguimento
  class: Movimento
  type: Regola
  caster_trait: Agilità
  description: "Sequenza dinamica con distanza variabile tra inseguitori e fuggitivi."
  effects:
    - "Gestisce manovre, ostacoli e cambi di ritmo."

- name: Scavatore
  class: Capacità Speciali
  type: Mostri
  caster_trait: ""
  description: "La creatura si muove nel sottosuolo e può emergere per colpire."
  effects:
    - "Consente attacchi a sorpresa e riposizionamento occulto."

- name: Etereo
  class: Capacità Speciali
  type: Mostri
  caster_trait: ""
  description: "Entità immateriale che attraversa ostacoli e ignora attacchi non adatti."
  effects:
    - "Richiede contromisure specifiche per essere danneggiata."

- name: Rigenerazione
  class: Capacità Speciali
  type: Mostri
  caster_trait: Vigore
  description: "Recupero accelerato dei danni, lento o rapido a seconda della creatura."
  effects:
    - "Alcuni tipi di danno possono impedirla."

- name: Invulnerabilità
  class: Capacità Speciali
  type: Mostri
  caster_trait: ""
  description: "La creatura può essere neutralizzata solo tramite un punto debole specifico."
  effects:
    - "Riduce l'efficacia degli attacchi convenzionali."

- name: Background Arcano (Magia)
  class: Arcani
  type: Background
  caster_trait: Intelligenza
  description: "Accesso ai poteri tramite studio arcano e formule."
  effects:
    - "Poteri iniziali e riserva punti potere definiti dal regolamento base."

- name: Background Arcano (Miracoli)
  class: Arcani
  type: Background
  caster_trait: Spirito
  description: "Poteri concessi da fede, culto o forza spirituale."
