# Meccaniche Base
- name: Meccanica
  subclass: Tiri sui Tratti
  domains: ""
  description: "Lancia il dado dell'abilità o attributo. Se il risultato è 4 o più (Numero Chiave), l'azione riesce. I Protagonisti lanciano anche il Dado del Destino (d6) e tengono il risultato più alto. Un risultato di 1 su entrambi i dadi è un Fallimento Critico."
  class_privileges:
    - "Successo: risultato ≥ 4 (Numero Chiave)"
    - "Incremento: ogni 4 punti oltre il NC aggiunge un incremento (effetto migliorato)"
    - "Fallimento Critico: 1 sia sul dado abilità che sul Dado del Destino"
    - "Tentativo senza abilità: usa d4 -2"
  source: core

- name: Meccanica
  subclass: Dado del Destino
  domains: ""
  description: "I Protagonisti lanciano un d6 extra ogni volta che tirano su un attributo o un'abilità. Tengono il risultato più alto tra tutti i dadi. Il Dado del Destino può dare Asso come qualsiasi altro dado."
  class_privileges:
    - "Un solo Dado del Destino per azione, anche con Azioni Multiple"
    - "Può sostituire il risultato di uno qualsiasi dei dadi tirati"
  source: core

- name: Meccanica
  subclass: Assi (Dadi Esplosi)
  domains: ""
  description: "Quando si ottiene il risultato massimo su un dado, il dado 'esplode': si rilancia e si aggiunge il nuovo risultato. Si continua finché non si ottiene un risultato diverso dal massimo. I modificatori al tiro si applicano una sola volta, alla fine delle esplosioni."
  source: core

- name: Meccanica
  subclass: Tiri Contrapposti
  domains: ""
  description: "Entrambi i contendenti tirano e chi ottiene il risultato più alto vince. Il personaggio attivo tira per primo. Serve almeno un successo (≥4) per non fallire immediatamente. Il vincitore calcola gli incrementi confrontando il proprio tiro con il totale del perdente."
  source: core

- name: Meccanica
  subclass: Benny
  domains: ""
  description: "I giocatori ricevono 3 Benny all'inizio di ogni sessione. I Benny inutilizzati si perdono a fine sessione. Se un giocatore ottiene un Jolly in combattimento, tutti i giocatori ricevono immediatamente un Benny."
  class_privileges:
    - "Ripetere un tiro su un Tratto (non se Fallimento Critico; scegliere il totale migliore)"
    - "Ripetere un tiro di danni (tenere il migliore)"
    - "Riprendersi da Scosso istantaneamente"
    - "Tiro di Assorbimento (tiro di Vigore; ogni successo/incremento riduce le Ferite di 1)"
    - "Pescare una nuova Carta Azione"
    - "Recuperare 5 Punti Potere (personaggi arcani)"
    - "Influenzare la Storia (a discrezione del GM)"
  source: core

- name: Meccanica
  subclass: Iniziativa - Carte Azione
  domains: ""
  description: "All'inizio di ogni round il GM distribuisce una carta azione a ogni Protagonista (e gruppo di Comparse simili). Il round si svolge contando alla rovescia dall'Asso al Due. Ogni personaggio agisce quando viene chiamata la sua carta."
  class_privileges:
    - "Jolly: chi lo riceve può agire in qualsiasi momento del round e ottiene +2 a tutti i tiri di Tratti e danni per quel round"
    - "Pareggi: si risolvono in base al seme (Picche > Cuori > Quadri > Fiori)"
    - "Mescolare: se viene servito un Jolly, il mazzo va rimescolato alla fine del round"
    - "Protagonisti: ricevono 1 carta (o più con certi Vantaggi)"
    - "Comparse uguali: condividono una sola carta"
  source: core

- name: Meccanica
  subclass: Azioni e Azioni Gratuite
  domains: ""
  description: "Ogni personaggio può muoversi (fino al Passo) e compiere una singola azione senza penalità. Azioni Multiple consentono fino a 3 azioni, ma ogni azione aggiuntiva oltre la prima comporta -2 cumulativo a tutte le azioni del turno."
  class_privileges:
    - "Azione gratuita: pronunciare 1-2 frasi, spostarsi ≤ Passo, gettarsi a terra, lasciare cadere un oggetto"
    - "Correre: azione gratuita; +d6\" al Passo ma -2 a tutti i tiri quel turno (il dado per correre non esplode)"
    - "Azioni Multiple: 2 azioni = -2 a entrambe; 3 azioni = -4 a ciascuna"
  source: core

# Effetti dei Danni
- name: Meccanica
  subclass: Danni, Ferite e Scosso
  domains: ""
  description: "Se i danni raggiungono o superano la Robustezza del bersaglio, questi è Scosso. Per ogni incremento oltre il primo risultato di Scosso subisce anche una Ferita. I Protagonisti possono subire fino a 3 Ferite; una quarta li rende Incapacitati."
  class_privileges:
    - "Fallimento (danni < Rob.): nessun effetto"
    - "Successo (danni ≥ Rob.): Scosso"
    - "1 Incremento (4-7 oltre Rob.): 1 Ferita e Scosso"
    - "2 Incrementi (8-11 oltre Rob.): 2 Ferite e Scosso"
    - "3 Incrementi (12-15 oltre Rob.): 3 Ferite e Scosso"
    - "Scosso: solo azioni gratuite; tiro di Spirito (azione gratuita) per riprendersi"
    - "Ferite: -1 cumulativo al Passo e a tutti i tiri Tratti (massimo -3)"
    - "Penalità Ferite: -1 per Ferita (massimo -3)"
  source: core

- name: Meccanica
  subclass: Tiro di Assorbimento
  domains: ""
  description: "Prima di applicare le Ferite, il giocatore può spendere un Benny per un tiro di Assorbimento (Vigore). Ogni successo e incremento riduce di 1 le Ferite dell'attacco. Se si Assorbono tutte le Ferite, viene rimosso anche lo Scosso."
  source: core

- name: Meccanica
  subclass: Incapacitato
  domains: ""
  description: "Un personaggio che riceve una Ferita oltre il limite (4ª Ferita per Protagonisti) diventa Incapacitato. Effettua subito un tiro di Vigore: Fallimento Critico = morte, Fallimento = tira sulla Tabella delle Lesioni e subisce Dissanguamento, Successo = tira sulla Tabella delle Lesioni (lesione permanente), Incremento = nessuna lesione permanente."
  class_privileges:
    - "Dissanguamento: tiro di Vigore a ogni turno (con -3 da Ferite); fallimento = morte; successo = sopravvive; incremento = stabile"
    - "Recupero: tiro di Vigore ogni giorno; successo = non più Incapacitato; incremento = guarisce anche 1 Ferita"
  source: core

- name: Meccanica
  subclass: Fatica
  domains: ""
  description: "La Fatica si accumula per fame, sete, veleni, poteri e altri pericoli. È articolata su tre livelli. Si recupera 1 livello per ora di riposo (o secondo le condizioni specifiche)."
  class_privileges:
    - "Affaticato: -1 a tutti i tiri dei Tratti"
    - "Esausto: -2 a tutti i tiri dei Tratti"
    - "Incapacitato: non può compiere azioni; rischio di perdere i sensi"
  source: core

- name: Meccanica
  subclass: Guarigione
  domains: ""
  description: "L'abilità Guarigione rimuove Ferite. Ogni tentativo richiede 10 minuti per livello di Ferita del paziente. Penalità di -1 senza kit di pronto soccorso. Un successo rimuove 1 Ferita; un incremento ne rimuove 2. Disponibile solo entro 1 ora dal danno (Ora di Grazia)."
  class_privileges:
    - "Guarigione Naturale: tiro di Vigore ogni 5 giorni; successo = guarisce 1 Ferita; incremento = guarisce 2"
    - "Fallimento Critico in Guarigione Naturale: subisce 1 Ferita aggiuntiva"
  source: core

# Regole di Combattimento
- name: Regola
  subclass: Attacco Selvaggio
  domains: ""
  description: "Il personaggio mette da parte ogni cautela e attacca con tutta la sua forza. Aggiunge +2 ai tiri di Combattere e ai conseguenti tiri di danno per tutto il turno, ma diventa Vulnerabile fino alla fine del suo prossimo turno."
  source: core

- name: Regola
  subclass: Azioni Multiple
  domains: ""
  description: "Un personaggio può compiere fino a 3 azioni per turno. Ogni azione aggiuntiva oltre la prima comporta -2 cumulativo a tutte le azioni. Tutte le azioni devono essere dichiarate all'inizio del turno. I Protagonisti lanciano un Dado del Destino per ognuna."
  class_privileges:
    - "2 azioni: -2 a entrambe"
    - "3 azioni: -4 a ciascuna"
  source: core

- name: Regola
  subclass: Copertura e Ostacoli
  domains: ""
  description: "Gli attacchi subiscono una penalità se il bersaglio si trova dietro una copertura. Se l'attacco manca solo per la copertura, il GM può decidere che l'ostacolo funzioni come armatura aggiungendo il Bonus di Copertura alla Robustezza."
  class_privileges:
    - "Leggera (1/4 coperto): -2"
    - "Media (1/2 coperto o Prono): -4"
    - "Pesante (visibile solo per 1/4): -6"
    - "Quasi Totale: -8"
  source: core

- name: Regola
  subclass: Prese in Lotta
  domains: ""
  description: "Tiro contrapposto di Atletica. Se vince l'attaccante: il bersaglio è Avviluppato (non può spostarsi, è Distratto). Con un incremento: il bersaglio è Bloccato (non può muoversi, è Distratto e Vulnerabile, non può compiere azioni fisiche tranne liberarsi). La vittima è Vulnerabile finché mantiene la Presa."
  class_privileges:
    - "Avviluppato: non si sposta, è Distratto"
    - "Bloccato: non si muove, Distratto e Vulnerabile, solo azione = liberarsi"
    - "Liberarsi: tiro contrapposto di Atletica (come attivo); successo = libero da Avviluppato; incremento = libero da Bloccato"
    - "Stritolare: tiro contrapposto di Forza; danno pari al dado di Forza (+ d6 con incremento)"
  source: core

- name: Regola
  subclass: Colpi Mirati
  domains: ""
  description: "Modificatori al tiro di attacco per colpire parti specifiche del corpo (basati sulla Scala della parte, non della creatura)."
  class_privileges:
    - "Testa/Organi Vitali (-4): +4 ai danni se colpito"
    - "Mano (-): il bersaglio potrebbe essere Disarmato"
    - "Arti (-2): nessun effetto aggiuntivo oltre Ferite"
    - "Area Non Protetta (?): penalità corrispondente alla Scala dell'area"
    - "Oggetto (?): vedi Tabella della Scala (es. pistola -4, spada lunga -2)"
  source: core

- name: Regola
  subclass: Attacchi con Effetto ad Area
  domains: ""
  description: "Granate, incantesimi e altri attacchi ad area usano i Modelli di Esplosione (Piccola/Media/Grande/Conico). Con un successo il modello colpisce dove desiderato; in caso di fallimento con un modello MEP/MEM/MEG il modello devia di 1d6\" (x2 a Media, x3 a Lunga, x4 a Estrema)."
  class_privileges:
    - "Piccolo (MEP): 4m diametro, ~2 bersagli"
    - "Medio (MEM): 8m diametro, ~3 bersagli"
    - "Grande (MEG): 12m diametro, ~4 bersagli"
    - "Conico: cono lungo 18m, ~3 bersagli"
    - "Deviazione: lancia 1d12 per la direzione (come un orologio)"
  source: core

- name: Regola
  subclass: Fuoco di Sbarramento
  domains: ""
  description: "Usa un'arma da fuoco come attacco ad area (richiede almeno velocità di un revolver, non necessita ricarica). Consuma il triplo dei proiettili della CdT. Usa il Modello Medio. Con successo il bersaglio è Distratto; con incremento viene colpito e subisce danni normali."
  source: core

- name: Regola
  subclass: Disarmare
  domains: ""
  description: "Tentativo di distruggere o far cadere l'arma dell'avversario. Colpire l'arma: danni normali senza Assi; il difensore tira Forza contro i danni o lascia cadere l'arma. Se l'attacco colpisce anche il difensore rendendolo Scosso/Ferito, deve tirare Forza (-2 braccio, -4 mano) o lascia cadere l'oggetto."
  source: core

- name: Regola
  subclass: Danni Non Letali
  domains: ""
  description: "Dichiarare l'intenzione di infliggere danni non letali usando pugni/armi contundenti (o armi da taglio con penalità -1 a Combattere). I danni non letali causano Ferite normali, ma se la vittima diventa Incapacitata perde i sensi per 1d6 ore invece di rischiare la morte."
  source: core

- name: Regola
  subclass: Sorpresa
  domains: ""
  description: "La fazione che tende l'imboscata riceve le carte azione, ma si considerano tutti in Pausa. Le vittime effettuano un tiro di Percezione: successo = ricevono una carta azione normalmente; fallimento = per il primo round non ricevono carte e non possono agire."
  source: core

- name: Regola
  subclass: Illuminazione
  domains: ""
  description: "La penalità da illuminazione si applica a tutti i tiri che risentono di scarsa illuminazione (attacchi, Percezione, uso di poteri, ecc.)."
  class_privileges:
    - "Luce Fioca (crepuscolo, nebbia, notte di luna piena): -2"
    - "Oscurità (notte senza luna, interni con poche luci): -4; bersagli non visibili oltre 10\" (20 m)"
    - "Buio Pesto (oscurità completa o bersaglio invisibile/nascosto): -6; poteri che richiedono vista potrebbero non funzionare"
  source: core

- name: Regola
  subclass: Mirare
  domains: ""
  description: "Se il personaggio impiega tutto il turno a Mirare (non si sposta, non compie altre azioni), il turno successivo ignora fino a 4 punti di penalità da Gittata, Copertura, Colpo Mirato, Scala o Velocità. In alternativa, Mirare conferisce +2 all'attacco. Richiede che il personaggio sia 'stazionario'."
  source: core

- name: Regola
  subclass: Taglia e Scala
  domains: ""
  description: "Quando creature di Scale differenti si affrontano, la più piccola applica come bonus ai propri attacchi la differenza tra le due Scale; la creatura più grande applica la stessa differenza come penalità ai propri attacchi."
  class_privileges:
    - "Minuscolo (-6): fessura di un elmo, giuntura di corazza, topo, palla da tennis"
    - "Molto Piccolo (-4): testa o mano umana, pallone da basket, gatto"
    - "Piccolo (-2): arto umano, cane"
    - "Normale (-): umano, motocicletta, toro, cavallo"
    - "Grande (+2): ippopotamo, elefante, automobile"
    - "Enorme (+4): drago, balena"
    - "Mastodontico (+6): edificio, kaiju, nave"
  source: core

- name: Regola
  subclass: Velocità Relativa
  domains: ""
  description: "Penalità al tiro per colpire un bersaglio che si muove molto velocemente rispetto all'attaccante (velocità relativa tra attaccante e difensore)."
  class_privileges:
    - "90 km/h+: -1"
    - "180 km/h+: -2"
    - "360 km/h+: -4"
    - "Mach 1+: -6"
    - "Mach 2+: -8"
    - "Quasi Velocità della Luce: -10"
  source: core

- name: Regola
  subclass: Supporto
  domains: ""
  description: "I personaggi possono cooperare e aiutare un alleato. Chi Supporta effettua un tiro di un'abilità rilevante. Ogni successo dà +1 al tiro dell'alleato nel Tratto scelto; ogni incremento dà +2. Un Fallimento Critico dà invece -2. Il bonus massimo da Supporto è +4."
  source: core

- name: Regola
  subclass: Test
  domains: ""
  description: "I Test mettono in difficoltà i nemici (imbarazzo, sabbia negli occhi, paura, ecc.). Il giocatore descrive l'azione e il GM sceglie l'abilità da tirare, contrapposta all'attributo associato all'abilità scelta del difensore. Con successo: il nemico è Distratto o Vulnerabile (a scelta). Con incremento: è anche Scosso o subisce altri effetti."
  source: core

- name: Regola
  subclass: Tutti Assieme
  domains: ""
  description: "Ogni alleato adiacente al bersaglio conferisce +1 ai tiri di Combattere di ciascun attaccante, fino a +4 massimo. Gli alleati Scossi contano, ma non quelli Storditi."
  source: core

- name: Regola
  subclass: Combattimento a Cavallo
  domains: ""
  description: "I personaggi a cavallo usano il dado più basso tra Combattere e Cavalcare. La cavalcatura agisce alla stessa carta azione del cavaliere."
  class_privileges:
    - "Cadere: se Scosso/Stordito/Ferito in sella, tiro di Cavalcare o cade (2d4 danni; 2d6 con Fallimento Critico)"
    - "Carica: +4 ai danni di Combattere; deve muoversi almeno 6\" in linea retta verso il nemico"
  source: core

- name: Regola
  subclass: Rompere Oggetti
  domains: ""
  description: "Attaccare un oggetto: deve eguagliare la Parata dell'avversario (o 2 per oggetti immobili). Se i danni eguagliano o superano la Durezza, l'oggetto è distrutto/reso inservibile. Gli attacchi contro oggetti non producono danni aggiuntivi da incremento e i dadi non esplodono."
  source: core

# Tabelle di Riferimento
- name: Tabella
  subclass: Penalità da Gittata
  domains: ""
  description: "Modificatori al tiro per colpire in base alla distanza dall'arma. La Gittata è indicata per le armi a distanza in pollici (Corta/Media/Lunga). Il NC per colpire a Gittata Corta è 4."
  class_privileges:
    - "Corta: nessuna penalità"
    - "Media: -2"
    - "Lunga: -4"
    - "Estrema (fino a 4x Gittata Lunga, richiede Mira): -8 (o -6 con mirino)"
  source: core

- name: Tabella
  subclass: Proiettili per Cadenza di Tiro
  domains: ""
  description: "Quando si tiene traccia delle munizioni, questa tabella indica quanti proiettili vengono consumati con ogni azione di Sparare, in base alla CdT utilizzata (non necessariamente il massimo dell'arma)."
  class_privileges:
    - "CdT 1: 1 proiettile"
    - "CdT 2: 5 proiettili"
    - "CdT 3: 10 proiettili"
    - "CdT 4: 20 proiettili"
    - "CdT 5: 40 proiettili"
    - "CdT 6: 50 proiettili"
  source: core

- name: Tabella
  subclass: Lesioni (2d6)
  domains: ""
  description: "Quando un Protagonista diventa Incapacitato a causa di Ferite, tira 2d6 sulla Tabella delle Lesioni. La lesione è permanente a meno di interventi chirurgici o magici miracolosi. Con Fallimento (non Critico) la lesione sparisce dopo 24 ore o quando tutte le Ferite sono guarite."
  class_privileges:
    - "2 – Gioielli di Famiglia: non può più riprodursi (nessun altro effetto)"
    - "3-4 – Braccio: destro o sinistro (casuale); l'arto non è utilizzabile"
    - "5-9 – Addome: tira d6 → 1-2 Martoriato (Agilità -1 tipo dado), 3-4 Malridotto (Vigore -1), 5-6 Massacrato (Forza -1)"
    - "10-11 – Gamba: ottieni Svantaggio Lento (Minore, o Maggiore se lo aveva già)"
    - "12 – Testa: tira d6 → 1-3 Brutta Cicatrice (Svantaggio Brutto Maggiore), 4-5 Accecato (Svantaggio Guercio o Cieco), 6 Danno Cerebrale (Intelligenza -1 tipo dado)"
  source: core

- name: Tabella
  subclass: Effetti Danni (Scosso/Ferite)
  domains: ""
  description: "Tabella riassuntiva degli effetti dei danni in base a quanti danni superano la Robustezza del bersaglio."
  class_privileges:
    - "Successo (0-3 oltre Rob.) su bersaglio non Scosso: Scosso"
    - "Successo (0-3 oltre Rob.) su bersaglio già Scosso: 1 Ferita, rimane Scosso"
    - "1 Incremento (4-7 oltre Rob.): 1 Ferita e Scosso (indipendentemente dallo stato)"
    - "2 Incrementi (8-11 oltre Rob.): 2 Ferite e Scosso"
    - "3 Incrementi (12-15 oltre Rob.): 3 Ferite e Scosso"
    - "ogni +1 Incremento ulteriore: +1 Ferita e Scosso"
  source: core

- name: Tabella
  subclass: Penalità da Copertura
  domains: ""
  description: "Penalità agli attacchi in mischia e a distanza quando il bersaglio si trova dietro una copertura."
  class_privileges:
    - "-2 Leggera: un quarto del bersaglio è coperto"
    - "-4 Media: il bersaglio è coperto per metà oppure è Prono"
    - "-6 Pesante: il bersaglio è visibile solo per un quarto"
    - "-8 Quasi Totale: il bersaglio è quasi interamente coperto"
  source: core

- name: Tabella
  subclass: Bonus da Copertura
  domains: ""
  description: "Quando un attacco non colpisce il bersaglio ma lo avrebbe fatto senza il modificatore di Copertura, il GM può decidere che l'ostacolo funzioni come armatura. Si aggiunge il Bonus di Copertura alla Robustezza del bersaglio."
  class_privileges:
    - "+2: vetro pesante, cuoio spesso, muro in cartongesso, scudo di legno, sportello d'auto in alluminio"
    - "+4: lastra d'acciaio, sportello d'auto in acciaio"
    - "+6: porta di quercia, muro in mattoni di cemento"
    - "+8: muro in mattoni"
    - "+10: muro di pietra, vetro antiproiettile, albero"
  source: core

- name: Tabella
  subclass: Durezza degli Oggetti
  domains: ""
  description: "Valori di Durezza per oggetti comuni. Per distruggerli i danni devono eguagliare o superare questa soglia (i dadi di danno non esplodono contro oggetti)."
  class_privileges:
    - "4: Corda"
    - "8: Porta leggera, Serratura"
    - "9: Pistola, fucile"
    - "10: Porta pesante, Coltello/spada, Scudo medievale*"
    - "12: Manette, Scudo moderno*"
    - "* Il personaggio deve dichiarare che desidera rompere lo scudo; i normali attacchi non lo danneggiano"
  source: core

- name: Tabella
  subclass: Penalità da Illuminazione
  domains: ""
  description: "Penalità applicata a tutti i tiri che risentono di scarsa illuminazione (attacchi, Percezione, uso di poteri, ecc.)."
  class_privileges:
    - "-2: Luce Fioca – crepuscolo, nebbia, notte di luna piena"
    - "-4: Oscurità – notte senza luna, interni con luci d'emergenza; bersagli non visibili oltre 10\" (20m)"
    - "-6: Buio Pesto – oscurità completa o bersaglio nascosto; poteri che richiedono vista potrebbero non funzionare"
  source: core

- name: Tabella
  subclass: Modificatori di Scala
  domains: ""
  description: "La creatura più piccola applica la differenza di Scala come bonus ai propri attacchi. La creatura più grande applica la stessa differenza come penalità. Per i Colpi Mirati si usa la Scala della parte del corpo presa di mira, non quella della creatura."
  class_privileges:
    - "-6 Minuscolo: fessura di un elmo, giuntura di corazza, topo, palla da tennis"
    - "-4 Molto Piccolo: testa o mano umana, pallone da basket, gatto"
    - "-2 Piccolo: arto umano, cane"
    - "- Normale: umano, motocicletta, toro, cavallo"
    - "+2 Grande: ippopotamo, elefante, automobile"
    - "+4 Enorme: drago, balena"
    - "+6 Mastodontico: edificio, kaiju, nave"
  source: core

- name: Tabella
  subclass: Penalità da Velocità Relativa
  domains: ""
  description: "Penalità al tiro per colpire bersagli che si muovono ad alta velocità. Si applica quando la velocità relativa tra attaccante e difensore supera 90 km/h fuori dal combattimento."
  class_privileges:
    - "-1: 90 km/h+"
    - "-2: 180 km/h+"
    - "-4: 360 km/h+"
    - "-6: Mach 1+"
    - "-8: Mach 2+"
    - "-10: Quasi Velocità della Luce"
  source: core
