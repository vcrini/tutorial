# Vantaggi di Background
- name: Vantaggio - Background
  subclass: Allerta
  domains: Principiante
  description: "Poche cose sfuggono a questo eroe, che aggiunge +2 ai tiri di Percezione per vedere, sentire o percepire il mondo intorno a sé."
  source: core

- name: Vantaggio - Background
  subclass: Ambidestro
  domains: "Principiante, Agilità d8+"
  description: "L'eroe è abile con la mano sinistra quanto lo è con la destra, e ignora le penalità da Mano Secondaria. Se brandisce un'arma per mano, beneficia degli eventuali bonus alla Parata di entrambe le armi."
  source: core

- name: Vantaggio - Background
  subclass: Aristocratico
  domains: Principiante
  description: "Il personaggio è nato in una posizione privilegiata o l'ha raggiunta. Aggiunge +2 ai tiri di Persuasione quando utilizza Contattare Conoscenze presso l'élite locale. Aggiunge inoltre +2 ai tiri di Conoscenze Comuni per conoscere l'etichetta delle classi superiori, gli alberi genealogici, l'araldica o i pettegolezzi di persone altolocate."
  source: core

- name: Vantaggio - Background
  subclass: Attraente
  domains: "Principiante, Vigore d6+"
  description: "Il personaggio aggiunge +1 ai tiri di Esibirsi e Persuasione se il bersaglio rientra nel tipo di persona da cui è attratto (genere, sesso, specie, ecc.)."
  source: core

- name: Vantaggio - Background
  subclass: Molto Attraente
  domains: "Principiante, Attraente"
  description: "Il personaggio è bello da morire. Il bonus a Esibirsi e Persuasione del Vantaggio Attraente diventa +2."
  source: core

- name: Vantaggio - Background
  subclass: Background Arcano
  domains: Principiante
  description: "L'esposizione a misteriose energie, lo studio delle arti arcane, un dono divino o proveniente dagli spiriti soprannaturali possono conferire al personaggio capacità e poteri straordinari. Il Capitolo Cinque descrive in dettaglio tutti i Background Arcani e le regole per utilizzarne i poteri."
  source: core

- name: Vantaggio - Background
  subclass: Berserk
  domains: Principiante
  description: "Quando la furia rossa si impossessa del berserk, diventa una macchina di morte incontrollabile. Subito dopo aver subito una Ferita o un Scosso fisico, effettua un tiro di Intelligenza: se fallisce, entra in furia. Furia: la Forza migliora di un tipo; tutti gli attacchi in corpo a corpo devono essere Attacchi Selvaggi; non può usare abilità che richiedano concentrazione e lucidità. Con Fallimento Critico colpisce un bersaglio casuale. Dopo 5 round consecutivi: 1 livello Fatica, poi un altro dopo altri 5, poi la furia termina."
  source: core

- name: Vantaggio - Background
  subclass: Bruto
  domains: "Principiante, Forza d6+, Vigore d6+"
  description: "I bruti sfruttano la propria forza anche nelle situazioni che richiederebbero coordinazione e flessibilità. Considerano Atletica come un'abilità associata alla Forza anziché all'Agilità durante la creazione del personaggio e per gli Avanzamenti. Aggiungono +1 alla Gittata Corta degli oggetti scagliati e ricalcolano le Gittate successive in modo che ognuna sia il doppio della precedente."
  source: core

- name: Vantaggio - Background
  subclass: Carismatico
  domains: "Principiante, Spirito d8+"
  description: "Il personaggio è una persona estremamente piacevole, forse perché ha modi gentili, perché ispira fiducia o perché è molto sicuro di sé. Questo Vantaggio permette di ripetere un qualsiasi tiro di Persuasione."
  source: core

- name: Vantaggio - Background
  subclass: Coraggioso
  domains: "Principiante, Spirito d6+"
  description: "I personaggi con questo Vantaggio sanno controllare le proprie paure oppure hanno affrontato talmente tanti orrori da essere diventati impassibili. Aggiungono +2 ai tiri contro la Paura e sottraggono 2 ai tiri sulla Tabella della Paura."
  source: core

- name: Vantaggio - Background
  subclass: Fama
  domains: Principiante
  description: "Il personaggio gode di una certa notorietà. Se decide di Esibirsi per raccogliere fondi, raddoppia il denaro raccolto. Aggiunge +1 ai tiri di Persuasione se il bersaglio è già amichevole e conosce il personaggio."
  source: core

- name: Vantaggio - Background
  subclass: Famoso
  domains: "Navigato, Fama"
  description: "L'eroe è una vera celebrità, ben conosciuto in un contesto molto ampio. Se decide di Esibirsi per raccogliere fondi, moltiplica per 5 il denaro raccolto. Aggiunge +2 ai tiri di Persuasione se il bersaglio è già amichevole e conosce il personaggio."
  source: core

- name: Vantaggio - Background
  subclass: Fortuna
  domains: Principiante
  description: "Questo avventuriero sembra avere dalla sua il karma, gli dèi o il destino stesso. Riceve un Benny in più all'inizio di ogni sessione."
  source: core

- name: Vantaggio - Background
  subclass: Fortuna Sfacciata
  domains: "Principiante, Fortuna"
  description: "Il giocatore riceve due Benny in più invece di uno all'inizio di ogni sessione."
  source: core

- name: Vantaggio - Background
  subclass: Guarigione Rapida
  domains: "Principiante, Vigore d8+"
  description: "Il personaggio aggiunge +2 al tiro di Vigore per la guarigione naturale ed effettua tale tiro ogni tre giorni, anziché ogni cinque."
  source: core

- name: Vantaggio - Background
  subclass: Impeto
  domains: "Principiante, Spirito d8+"
  description: "Il personaggio ha dentro di sé l'energia per affrontare le circostanze più avverse. Quando spende un Benny per ripetere un tiro su un Tratto, aggiunge +2 al totale. Il bonus si applica solo al secondo tiro e non ai tiri di danno né quando si spende un Benny per un tiro di Assorbimento."
  source: core

- name: Vantaggio - Background
  subclass: Linguista
  domains: "Principiante, Intelligenza d6+"
  description: "Il personaggio ha probabilmente viaggiato molto o è molto portato per le lingue. Inizia il gioco conoscendo un numero di lingue aggiuntive pari a metà del suo dado di Intelligenza (d6 = 3 lingue aggiuntive), ognuna delle quali con d6."
  source: core

- name: Vantaggio - Background
  subclass: Massiccio
  domains: "Principiante, Forza d6+, Vigore d6+"
  description: "Il personaggio è imponente oppure molto in forma. Ottiene +1 alla Taglia (e conseguentemente +1 alla Robustezza) e considera il dado di Forza come se fosse migliore di un tipo per quanto riguarda l'Ingombro e la Forza Minima per armi, armature e altro equipaggiamento. Massiccio non può aumentare la Taglia oltre un valore di 3."
  source: core

- name: Vantaggio - Background
  subclass: Pieveloce
  domains: "Principiante, Agilità d6+"
  description: "Il Passo dell'eroe è aumentato di +2 e il suo dado per correre migliora di un tipo (da d6 a d8, per esempio)."
  source: core

- name: Vantaggio - Background
  subclass: Resistenza Arcana
  domains: "Principiante, Spirito d8+"
  description: "La magia e tutte le energie soprannaturali hanno poco potere contro questo personaggio. I tiri di tutte le abilità arcane contro il personaggio subiscono una penalità di -2 (anche quando utilizzate dagli alleati!) e i danni magici sono ridotti di 2."
  source: core

- name: Vantaggio - Background
  subclass: Resistenza Arcana Migliorata
  domains: "Principiante, Resistenza Arcana"
  description: "Come Resistenza Arcana, ma la penalità ai tiri di abilità arcane diventa -4 e i danni magici sono ridotti di 4."
  source: core

- name: Vantaggio - Background
  subclass: Ricco
  domains: Principiante
  description: "Il personaggio possiede molto denaro. Gli eroi Ricchi iniziano il gioco con fondi iniziali triplicati. Se nell'ambientazione ha senso, l'eroe dispone di entrate annuali equivalenti a $150.000 odierni."
  source: core

- name: Vantaggio - Background
  subclass: Ricco Sfondato
  domains: "Principiante, Ricco"
  description: "Il personaggio è estremamente ricco. I fondi iniziali sono moltiplicati per cinque. Se nell'ambientazione ha senso, l'eroe dispone di entrate annuali equivalenti a $500.000 odierni."
  source: core

- name: Vantaggio - Background
  subclass: Veloce
  domains: "Principiante, Agilità d8+"
  description: "I personaggi Veloci sono dotati di sangue freddo e riflessi fulminei. In combattimento, quando ottiene come carta azione un Cinque o meno, può scartarla e pescare di nuovo, fino a che non ottiene una carta superiore al Cinque."
  source: core

# Vantaggi di Combattimento
- name: Vantaggio - Combattimento
  subclass: Ammazzagiganti
  domains: Veterano
  description: "Più grossi sono e più è difficile ucciderli... almeno per gli altri. Quando attacca avversari la cui Taglia è maggiore della tua di almeno tre punti, aggiungi +1d6 danni. Un umano (Taglia 0) ottiene questo bonus contro creature con Taglia 3 o superiore."
  source: core

- name: Vantaggio - Combattimento
  subclass: Arma Personale
  domains: "Principiante, abilità relativa all'arma d8+"
  description: "L'eroe conosce una singola arma come il palmo della propria mano. Quando la utilizza ottiene +1 alla Parata e aggiunge +1 ai tiri di Atletica (per lanciare), Combattere o Sparare, a seconda del tipo di arma. Può essere acquisito più volte, ogni volta per un'arma diversa."
  source: core

- name: Vantaggio - Combattimento
  subclass: Arma Personale Migliorata
  domains: "Navigato, Arma Personale"
  description: "Come Arma Personale, ma i bonus associati all'arma diventano +2."
  source: core

- name: Vantaggio - Combattimento
  subclass: Bloccare
  domains: "Navigato, Combattere d8+"
  description: "L'esperienza sul campo di battaglia ha insegnato al personaggio come difendersi al meglio. Ottiene +1 alla Parata e il bonus di Tutti Assieme contro di lui è ridotto di 1."
  source: core

- name: Vantaggio - Combattimento
  subclass: Bloccare Migliorato
  domains: "Navigato, Bloccare"
  description: "Come Bloccare, ma il bonus alla Parata diventa +2 e il bonus di Tutti Assieme contro il personaggio è ridotto di 2."
  source: core

- name: Vantaggio - Combattimento
  subclass: Calcolatore
  domains: "Principiante, Intelligenza d8+"
  description: "Pochi secondi passati a studiare l'avversario permettono di sfruttarne le debolezze. Quando ottieni una carta azione pari o inferiore a Cinque, puoi ignorare fino a 2 punti di penalità applicabili a una singola azione per quel round, incluse quelle derivanti da Copertura, Azioni Multiple, Gittata, o persino Ferite."
  source: core

- name: Vantaggio - Combattimento
  subclass: Colpo Mortale
  domains: "Protagonista, Principiante, Atletica d8+"
  description: "Quando ricevi un Jolly come carta azione, raddoppi il totale dei danni inflitti con il primo attacco a segno di Sparare o Atletica (utilizzata per scagliare un'arma o un oggetto)."
  source: core

- name: Vantaggio - Combattimento
  subclass: Colpo Poderoso
  domains: "Protagonista, Principiante, Combattere d8+"
  description: "Quando ricevi un Jolly come carta azione, raddoppi il totale dei danni inflitti con il primo attacco di Combattere andato a segno."
  source: core

- name: Vantaggio - Combattimento
  subclass: Combattente a Due Mani
  domains: "Principiante, Agilità d8+"
  description: "Se il personaggio impiega un'azione per attaccare con un'arma da mischia e un'altra azione per attaccare con un'altra arma brandita con la mano secondaria, la seconda azione non causa la penalità da Azioni Multiple. La penalità da Mano Secondaria si applica comunque."
  source: core

- name: Vantaggio - Combattimento
  subclass: Combattente Improvvisatore
  domains: "Navigato, Intelligenza d6+"
  description: "A qualunque eroe prima o poi capita di doversi difendere utilizzando oggetti non pensati per il combattimento. I personaggi con questo Vantaggio ignorano la penalità di -2 associata alle Armi Improvvisate."
  source: core

- name: Vantaggio - Combattimento
  subclass: Contrattacco
  domains: "Navigato, Combattere d8+"
  description: "I combattenti con questo Vantaggio sanno come rispondere istantaneamente a un errore dell'avversario. Una volta per round, se non sei Scosso o Stordito, puoi effettuare un Attacco Gratuito contro un nemico adiacente che ha fallito un attacco di Combattere contro di te."
  source: core

- name: Vantaggio - Combattimento
  subclass: Contrattacco Migliorato
  domains: "Veterano, Contrattacco"
  description: "Come Contrattacco, ma puoi effettuare fino a tre contrattacchi ogni round."
  source: core

- name: Vantaggio - Combattimento
  subclass: Disimpegno
  domains: "Principiante, Agilità d8+"
  description: "Quando il personaggio si ritira dal corpo a corpo, uno dei nemici adiacenti (a tua scelta) non ottiene l'attacco gratuito di Combattere contro di lui."
  source: core

- name: Vantaggio - Combattimento
  subclass: Disimpegno Migliorato
  domains: "Navigato, Disimpegno"
  description: "Come Disimpegno, ma fino a tre nemici adiacenti (a tua scelta) si vedono negata la possibilità di sferrare un attacco gratuito di Combattere quando ti allontani."
  source: core

- name: Vantaggio - Combattimento
  subclass: Doppio Colpo
  domains: "Navigato, Sparare d6+"
  description: "Un esperto di armi da fuoco riesce a sparare due colpi in rapida successione senza che ne risenta la precisione. Con armi a CdT 1, aggiunge +1 per colpire e ai danni, e consuma due munizioni. Non può essere combinato con Fuoco Rapido."
  source: core

- name: Vantaggio - Combattimento
  subclass: Duro a Morire
  domains: "Principiante, Spirito d8+"
  description: "L'eroe ha più vite di una nidiata di gatti. Quando effettua il tiro di Vigore per evitare il Dissanguamento, ignora le penalità da Ferite."
  source: core

- name: Vantaggio - Combattimento
  subclass: Ancora Piu Duro a Morire
  domains: "Veterano, Duro a Morire"
  description: "Il personaggio è più difficile di Rasputin da ammazzare. Se mai dovesse essere 'ucciso', tira un dado: se il risultato è dispari, è davvero morto. Se invece è pari, è Incapacitato ma sopravvive in qualche modo."
  source: core

- name: Vantaggio - Combattimento
  subclass: Finta
  domains: "Principiante, Combattere d8+"
  description: "Quando effettui un Test con l'abilità Combattere, puoi scegliere di costringere l'avversario a resistere con un tiro di Intelligenza anziché di Agilità."
  source: core

- name: Vantaggio - Combattimento
  subclass: Frenesia
  domains: "Navigato, Combattere d8+"
  description: "Una volta per round, quando effettua un attacco di Combattere, il personaggio lancia due dadi di Combattere (assieme a un solo Dado del Destino). Ciascun dado può essere indirizzato a un bersaglio diverso o entrambi possono essere rivolti allo stesso nemico."
  source: core

- name: Vantaggio - Combattimento
  subclass: Frenesia Migliorata
  domains: "Veterano, Frenesia"
  description: "Come Frenesia, ma puoi utilizzare il dado di Combattere aggiuntivo fino a due volte nello stesso round, se effettui due attacchi di Combattere."
  source: core

- name: Vantaggio - Combattimento
  subclass: Fuoco Rapido
  domains: "Navigato, Sparare d6+"
  description: "L'eroe è capace di sparare in modo rapido ma accurato. Quando utilizza un'arma a distanza in grado di fare fuoco rapidamente, finché ha colpi a sufficienza può aumentare di 1 la Cadenza di Tiro per un singolo attacco di Sparare per round."
  source: core

- name: Vantaggio - Combattimento
  subclass: Fuoco Rapido Migliorato
  domains: "Veterano, Fuoco Rapido"
  description: "L'eroe può aumentare di 1 la Cadenza di Tiro due volte nello stesso round (utilizzando le Azioni Multiple)."
  source: core

- name: Vantaggio - Combattimento
  subclass: Incassatore
  domains: "Principiante, Vigore d8+"
  description: "L'eroe riesce a incassare persino i colpi più devastanti. Aggiunge +2 ai tiri di Assorbimento e al tiro di Vigore per resistere a un Colpo Tramortente."
  source: core

- name: Vantaggio - Combattimento
  subclass: Istinto Omicida
  domains: Navigato
  description: "L'eroe odia perdere. Può ripetere gratuitamente il tiro ogni volta che effettua un Test come personaggio attivo."
  source: core

- name: Vantaggio - Combattimento
  subclass: Lottatore
  domains: "Principiante, Forza d8+, Vigore d8+"
  description: "Il personaggio picchia come un fabbro e il suo corpo sembra fatto di ferro. Ottiene +1 alla Robustezza e quando attacca con pugni e calci (o artigli!) infligge For+d4 danni."
  source: core

- name: Vantaggio - Combattimento
  subclass: Energumeno
  domains: "Navigato, Lottatore"
  description: "Ottieni un ulteriore +1 alla Robustezza e il dado per i danni dei pugni o artigli migliora di un tipo."
  source: core

- name: Vantaggio - Combattimento
  subclass: Mano Ferma
  domains: "Principiante, Agilità d8+"
  description: "Sparare da cavallo o da un veicolo in movimento non è affatto facile, ma il tuo eroe sa come fare e ignora la penalità da Piattaforma Instabile. Riduce inoltre da -2 a -1 la penalità per sparare mentre corre."
  source: core

- name: Vantaggio - Combattimento
  subclass: Nervi Saldi
  domains: "Navigato, Intelligenza d8+"
  description: "I combattenti che sanno mantenere la calma quando tutti corrono al riparo sono gli avversari tra i più pericolosi. Un eroe con questo Vantaggio pesca una carta azione in più e sceglie quale utilizzare."
  source: core

- name: Vantaggio - Combattimento
  subclass: Nervi Saldi Migliorati
  domains: "Navigato, Nervi Saldi"
  description: "Come Nervi Saldi, ma peschi tre carte azione e scegli quale utilizzare."
  source: core

- name: Vantaggio - Combattimento
  subclass: Parkour
  domains: "Principiante, Agilità d8+, Atletica d6+"
  description: "Il personaggio pratica il parkour o è comunque un esperto di salti, corse, volteggi, capriole e altre acrobazie. Quando si muove a piedi, può spostarsi al proprio normale Passo anche su Terreno Difficile, finché ci siano ostacoli su cui balzare, scivolare, volteggiare o simili. Aggiunge inoltre +2 ai tiri di Atletica per arrampicarsi e durante gli Inseguimenti."
  source: core

- name: Vantaggio - Combattimento
  subclass: Primo Colpo
  domains: "Principiante, Agilità d8+"
  description: "Una volta per round, se non sei Scosso né Stordito, ottieni un attacco gratuito di Combattere contro un nemico non appena si avvicina entro la tua Portata. Questo attacco interrompe automaticamente l'azione del nemico."
  source: core

- name: Vantaggio - Combattimento
  subclass: Primo Colpo Migliorato
  domains: "Eroico, Primo Colpo"
  description: "Come Primo Colpo, ma puoi utilizzarlo fino a tre volte nello stesso round, purché contro tre nemici diversi."
  source: core

- name: Vantaggio - Combattimento
  subclass: Riflessi in Combattimento
  domains: Navigato
  description: "Il guerriero riesce a riprendersi rapidamente da shock e traumi. Aggiunge +2 ai tiri di Spirito per riprenderti da Scosso o Stordito."
  source: core

- name: Vantaggio - Combattimento
  subclass: Rock and Roll!
  domains: "Navigato, Sparare d8+"
  description: "I tiratori più esperti riescono a compensare il rinculo delle armi automatiche. Se non si muove durante il proprio turno, il personaggio ignora la penalità del Rinculo quando utilizza un'arma con Cadenza di Tiro 2 o superiore."
  source: core

- name: Vantaggio - Combattimento
  subclass: Schivare
  domains: "Navigato, Agilità d8+"
  description: "L'eroe riesce ad anticipare gli attacchi o sa come muoversi per non farsi colpire. Se non è vittima di un attacco a sorpresa, tutti gli attacchi a distanza contro di lui subiscono una penalità di -2 (non cumulabile con eventuali penalità da Copertura)."
  source: core

- name: Vantaggio - Combattimento
  subclass: Schivare Migliorato
  domains: "Navigato, Schivare"
  description: "Come Schivare, ma il personaggio aggiunge +2 ai tiri per Sfuggire a un Attacco con Effetto ad Area."
  source: core

- name: Vantaggio - Combattimento
  subclass: Senza Pieta
  domains: Navigato
  description: "Quando spendi un Benny per ritirare i danni, aggiungi +2 al totale."
  source: core

- name: Vantaggio - Combattimento
  subclass: Spazzata
  domains: "Principiante, Forza d8+, Combattere d8+"
  description: "Permette di effettuare un singolo attacco di Combattere a -2 contro tutti i bersagli entro la Portata dell'arma che si sta usando. Il danno viene risolto separatamente per ciascun bersaglio colpito. In un singolo round è possibile effettuare una sola Spazzata e non può essere combinata con Frenesia."
  source: core

- name: Vantaggio - Combattimento
  subclass: Spazzata Migliorata
  domains: "Veterano, Spazzata"
  description: "Come Spazzata, ma senza la penalità di -2 al tiro di Combattere."
  source: core

- name: Vantaggio - Combattimento
  subclass: Studente di Arti Marziali
  domains: "Principiante, Combattere d6+"
  description: "L'eroe ha studiato le basi delle arti marziali. Considera mani e piedi come Armi Naturali e non è considerato disarmato. Quando combatte senza armi aggiunge +1 ai tiri di Combattere e infligge For+d4 danni."
  source: core

- name: Vantaggio - Combattimento
  subclass: Esperto di Arti Marziali
  domains: "Navigato, Studente di Arti Marziali"
  description: "Il combattente ha approfondito lo studio delle arti marziali. Il dado per i danni a mani nude migliora di un tipo e aggiunge +2 (anziché +1) ai tiri di Combattere quando non usa armi."
  source: core

- name: Vantaggio - Combattimento
  subclass: Tempra d'Acciaio
  domains: "Principiante, Vigore d8+"
  description: "L'eroe riesce a ignorare il dolore più intenso. Puoi ignorare 1 punto di penalità da Ferite."
  source: core

- name: Vantaggio - Combattimento
  subclass: Tempra d'Acciaio Migliorata
  domains: "Principiante, Tempra d'Acciaio"
  description: "Puoi ignorare 2 punti di penalità da Ferite."
  source: core

- name: Vantaggio - Combattimento
  subclass: Tiratore Scelto
  domains: "Navigato, Atletica d8+ o Sparare d8+"
  description: "Il personaggio ha un talento naturale per gli attacchi a distanza. Se nel round non compie nessun movimento e fa fuoco con una CdT non superiore a 1 per azione, può ignorare fino a 2 punti di penalità di Sparare (o Atletica per le armi scagliate) causate da Colpi Mirati, Copertura, Gittata, Scala o Velocità."
  source: core

- name: Vantaggio - Combattimento
  subclass: Un Ferro per Mano
  domains: "Principiante, Agilità d8+"
  description: "Come Combattente a Due Mani, ma si applica alle armi a distanza: consente di effettuare due attacchi a distanza con un'arma per mano senza causare la penalità da Azioni Multiple."
  source: core

# Vantaggi di Leadership
- name: Vantaggio - Leadership
  subclass: Comando
  domains: "Principiante, Intelligenza d6+"
  description: "La capacità basilare di impartire istruzioni chiare anche nel mezzo della battaglia. Le Comparse entro il Raggio di Comando (5\"/10 metri) aggiungono +1 ai tiri per riprendersi da Scosso."
  source: core

- name: Vantaggio - Leadership
  subclass: Presenza Imperiosa
  domains: "Navigato, Comando"
  description: "Una voce stentorea, comandi efficaci, un carisma naturale o il semplice addestramento possono rendere un comandante molto più efficace. Il Raggio di Comando del personaggio diventa 10\" (20 metri)."
  source: core

- name: Vantaggio - Leadership
  subclass: Fervore
  domains: "Veterano, Spirito d8+, Comando"
  description: "Una semplice frase, se pronunciata da un grande leader, può produrre risultati sorprendenti. Le Comparse entro il Raggio di Comando aggiungono +1 ai tiri di danno quando attaccano con Combattere."
  source: core

- name: Vantaggio - Leadership
  subclass: Ispirare
  domains: "Navigato, Comando"
  description: "I leader di straordinaria esperienza sanno come ispirare i propri uomini anche di fronte a pericoli e avversità letali. Una volta per turno, l'eroe può utilizzare la propria abilità di Battaglia per effettuare un tiro di Supporto a favore di un solo tipo di tiro su un Tratto, applicandolo a tutte le Comparse alleate entro il Raggio di Comando."
  source: core

- name: Vantaggio - Leadership
  subclass: Leader Nato
  domains: "Navigato, Spirito d8+, Comando"
  description: "Il condottiero ha dimostrato le proprie capacità sul campo innumerevoli volte. Gli effetti dei Vantaggi di Leadership che si applicano alle Comparse vengono estesi anche ai Protagonisti."
  source: core

- name: Vantaggio - Leadership
  subclass: Mantenete la Posizione!
  domains: "Navigato, Intelligenza d8+, Comando"
  description: "Le Comparse entro il Raggio di Comando ottengono +1 alla Robustezza."
  source: core

- name: Vantaggio - Leadership
  subclass: Tattico
  domains: "Navigato, Intelligenza d8+, Comando, Battaglia d6+"
  description: "Il comandante ha un istinto naturale per le tattiche delle piccole unità e riesce spesso a trarre vantaggio dalle situazioni in rapido mutamento. L'eroe riceve una carta azione aggiuntiva ogni round di combattimento o di Inseguimento; all'inizio del round può decidere se scartarla o assegnarla a un alleato Comparsa entro il Raggio di Comando."
  source: core

- name: Vantaggio - Leadership
  subclass: Maestro di Tattica
  domains: "Veterano, Tattico"
  description: "Come Tattico, ma il personaggio riceve adesso due carte che potrà assegnare agli alleati."
  source: core

# Vantaggi di Potere
- name: Vantaggio - Potere
  subclass: Artefice
  domains: "Navigato, Background Arcano"
  description: "Coloro che manipolano le forze soprannaturali possono imparare a imbrogliarle all'interno di oggetti speciali, creando armi incantate, pozioni di guarigione, o reliquie benedette dalle potenze divine. Gli Artefici possono creare oggetti incredibili utilizzando il sistema degli Oggetti Arcani."
  source: core

- name: Vantaggio - Potere
  subclass: Concentrazione
  domains: "Navigato, Background Arcano"
  description: "L'eroe è in grado di concentrare le proprie energie in maniera più efficace. La Durata di base dei poteri che non sono Istantanei è raddoppiata. Tale effetto si applica anche al mantenimento dei poteri."
  source: core

- name: Vantaggio - Potere
  subclass: Guerriero Sacro/Sacrilego
  domains: "Navigato, Background Arcano (Miracoli), Fede d6+"
  description: "Coloro che sono animati da vera fede non hanno paura di affrontare pericoli immani per servire il proprio credo. Dopo aver effettuato un tiro di Assorbimento, puoi aggiungere +1 al totale per ogni Punto Potere che decidi di spendere, fino a un massimo di +4."
  source: core

- name: Vantaggio - Potere
  subclass: Incanalare
  domains: "Navigato, Background Arcano"
  description: "Quando ottieni un incremento al tiro di abilità arcana, il costo in Punti Potere è ridotto di 1, e può arrivare a essere 0."
  source: core

- name: Vantaggio - Potere
  subclass: Inventore
  domains: "Navigato, Background Arcano (Scienza Folle), Scienza Folle d6+"
  description: "Il personaggio può spendere fino a 3 Punti Potere per costruire un congegno improvvisato, purché abbia accesso a un minimo di materiali di recupero o pezzi di ricambio. Il congegno consente di utilizzare un potere tra quelli disponibili agli Scienziati Pazzi dell'ambientazione con costo in PP pari o inferiore a 3."
  source: core

- name: Vantaggio - Potere
  subclass: Mago
  domains: "Navigato, Background Arcano (Magia), Lanciare Incantesimi d6+"
  description: "La sapienza magica è composta da infinite tradizioni e variazioni. Spendendo 1 Punto Potere in più al momento del lancio, puoi modificare l'Aspetto di un potere (una palla di fuoco può diventare un fulmine globulare, per esempio)."
  source: core

- name: Vantaggio - Potere
  subclass: Mentalista
  domains: "Navigato, Background Arcano (Arti Psioniche), Arti Psioniche d6+"
  description: "Il contatto continuo con le menti altrui ha reso la psiche del personaggio più forte e resistente. Un Mentalista aggiunge +2 ai tiri contrapposti di Arti Psioniche per attivare i propri poteri o per resistere a quelli altrui."
  source: core

- name: Vantaggio - Potere
  subclass: Nuovi Poteri
  domains: "Principiante, Background Arcano"
  description: "Scegliendo questo Vantaggio apprendi due nuovi poteri di Rango pari o inferiore a quello del personaggio. In alternativa puoi aggiungere un nuovo Aspetto a un potere che possiedi già. Nuovo Potere può essere acquisito più volte."
  source: core

- name: Vantaggio - Potere
  subclass: Picco di Energia
  domains: "Protagonista, Principiante, Background Arcano, abilità arcana d8+"
  description: "Quando ricevi un Jolly in combattimento, recuperi 10 Punti Potere. Non puoi comunque eccedere il tuo totale massimo."
  source: core

- name: Vantaggio - Potere
  subclass: Prosciugamento dell'Anima
  domains: "Navigato, Background Arcano, abilità arcana d10+"
  description: "Puoi decidere di subire un livello di Fatica per recuperare fino a 5 Punti Potere. Se vuoi puoi subire due livelli di Fatica e ottenere fino a 10 Punti Potere. In nessun caso puoi usare questo Vantaggio per diventare Incapacitato. La Fatica causata può essere recuperata solo naturalmente."
  source: core

- name: Vantaggio - Potere
  subclass: Punti Potere
  domains: "Principiante, Background Arcano"
  description: "Questo Vantaggio conferisce 5 Punti Potere aggiuntivi. Può essere acquisito più volte, ma solo una volta per Rango. Raggiunto il Rango Leggendario, tale limite decade, ma i Punti Potere ottenuti sono solo 2."
  source: core

- name: Vantaggio - Potere
  subclass: Ricarica Rapida
  domains: "Navigato, Spirito d6+, Background Arcano"
  description: "I Punti Potere di norma si ricaricano a un ritmo di 5 per ogni ora di riposo. Questo Vantaggio raddoppia il ritmo di ricarica portandolo a 10 punti ogni ora di riposo."
  source: core

- name: Vantaggio - Potere
  subclass: Ricarica Rapida Migliorata
  domains: "Veterano, Ricarica Rapida"
  description: "Il ritmo di ricarica dei Punti Potere diventa 20 per ogni ora di riposo."
  source: core

- name: Vantaggio - Potere
  subclass: Sforzo in Piu
  domains: "Navigato, Background Arcano (Dono), Focus d6+"
  description: "Puoi spendere 1 Punto Potere per aumentare di +1 il risultato finale di un tiro di Focus, oppure puoi spenderne 3 per aggiungere +2. Non puoi però usare questo Vantaggio per migliorare un Fallimento Critico."
  source: core

# Vantaggi Professionali
- name: Vantaggio - Professionale
  subclass: Acrobata
  domains: "Principiante, Agilità d8+, Atletica d8+"
  description: "Un Acrobata può ripetere gratuitamente un tiro di Atletica per un'azione che richieda equilibrio o movimenti acrobatici o per le prese in combattimento. Non è applicabile ai tiri per interrompere azioni, arrampicarsi, nuotare o scagliare."
  source: core

- name: Vantaggio - Professionale
  subclass: Combattimento Acrobatico
  domains: "Navigato, Acrobata"
  description: "I combattenti più agili confondono i nemici balzando intorno a loro e rendendo impossibile colpirli. Gli attacchi contro il personaggio subiscono una penalità di -1, purché sia consapevole dell'attacco, abbia libertà di movimento e non stia subendo penalità da Ingombro o Forza Minima."
  source: core

- name: Vantaggio - Professionale
  subclass: Assassino
  domains: "Principiante, Agilità d8+, Combattere d6+, Furtività d6+"
  description: "Gli Assassini sono addestrati per uccidere anche i nemici più resistenti. Quando la vittima è Vulnerabile o Inerme aggiungono +2 ai tiri di danno."
  source: core

- name: Vantaggio - Professionale
  subclass: Asso
  domains: "Principiante, Agilità d8+"
  description: "Gli Assi sono quei piloti che sviluppano un'affinità speciale con il proprio veicolo. Ignorano 2 punti di penalità ai tiri di Guidare, Navigare e Pilotare. Possono inoltre spendere i propri Benny per effettuare un tiro per Assorbire i danni subiti dal veicolo."
  source: core

- name: Vantaggio - Professionale
  subclass: Investigatore
  domains: "Principiante, Intelligenza d8+, Ricerca d8+"
  description: "Gli Investigatori sanno come raccogliere informazioni e risolvere misteri intricati. Aggiungono +2 ai tiri di Ricerca e Percezione quando sono alla ricerca di indizi tra documenti, appunti, corrispondenze, o cercano oggetti nascosti tra pile di cianfrusaglie, rifiuti o detriti."
  source: core

- name: Vantaggio - Professionale
  subclass: Ladro
  domains: "Principiante, Agilità d8+, Arte del Furto d6+, Furtività d6+"
  description: "I Ladri sono specializzati in inganni, furti e ruberie e sanno riconoscere e disarmare trappole, arrampicarsi e scassinare serrature. +1 ai tiri per scassinare/disarmare/borseggiare; +1 Atletica per arrampicarsi in ambienti urbani; +1 Furtività tra le ombre cittadine; +1 Arte del Furto in qualsiasi circostanza."
  source: core

- name: Vantaggio - Professionale
  subclass: MacGyver
  domains: "Principiante, Intelligenza d6+, Percezione d8+, Riparare d6+"
  description: "Quando c'è bisogno di uno strumento, questo personaggio riesce sempre a improvvisare qualcosa. Con pochi oggetti comuni, può tentare un tiro di Riparare per creare strumenti, esplosivi o armi improvvisate che durano fino a quando vengono utilizzate o fino alla fine dell'incontro o scena."
  source: core

- name: Vantaggio - Professionale
  subclass: Riparatutto
  domains: "Principiante, Riparare d8+"
  description: "L'esperto di meccanica aggiunge +2 ai tiri di Riparare. Si ottiene un incremento, i tempi di riparazione sono dimezzati. Se la descrizione di una riparazione specifica già che un incremento dimezza il tempo necessario, questo personaggio la dimezza nuovamente, impiegando quindi solo un quarto del tempo."
  source: core

- name: Vantaggio - Professionale
  subclass: Soldato
  domains: "Principiante, Forza d6+, Vigore d6+"
  description: "I soldati di professione sono abituati a trasportare carichi pesanti e a sopportare condizioni ambientali ostili. Dopo qualche giorno si abituano all'equipaggiamento che trasportano e considerano la loro Forza come migliore di un tipo di dado per l'Ingombro e la Forza Minima per armi, armature e altro equipaggiamento. Possono inoltre ritirare gratuitamente i tiri di Vigore per resistere alle condizioni ambientali avverse."
  source: core

- name: Vantaggio - Professionale
  subclass: Studioso
  domains: "Principiante, Ricerca d8+"
  description: "Professori, studenti e amanti del sapere trascorrono molto tempo ad approfondire le proprie conoscenze. Scegli una delle seguenti abilità: Battaglia, Conoscenze Accademiche, Occulto, Scienze o un'altra abilità associata all'Intelligenza presente nell'ambientazione. Tutti i tiri dell'abilità scelta ottengono un bonus di +2."
  source: core

- name: Vantaggio - Professionale
  subclass: Tuttofare
  domains: "Principiante, Intelligenza d10+"
  description: "Grazie a una buona istruzione, software di apprendimento, o semplice intuizione, questo eroe riesce a cavarsela imparando velocemente come affrontare ogni situazione. Dopo aver osservato o studiato un argomento, il personaggio effettua, come azione, un tiro di Intelligenza: se riesce, ottiene d4 in quell'abilità come azione (d6 in caso di incremento). Il dado dura fino a quando non tenta di apprendere una nuova abilità."
  source: core

- name: Vantaggio - Professionale
  subclass: Uomo dei Boschi
  domains: "Principiante, Spirito d6+, Sopravvivenza d8+"
  description: "Gli uomini dei boschi sono ranger, scout, cacciatori ed esploratori. Aggiungono +2 a tutti i tiri di Sopravvivenza e a quelli di Furtività nelle terre selvagge (non in aree urbane né in rovine, né in luoghi sotterranei)."
  source: core

# Vantaggi Sociali
- name: Vantaggio - Sociale
  subclass: Affidabile
  domains: "Principiante, Spirito d8+"
  description: "Tutti sanno di poter contare sul personaggio quando hanno bisogno di aiuto. Puoi ripetere gratuitamente un tiro di Supporto (di qualunque tipo)."
  source: core

- name: Vantaggio - Sociale
  subclass: Agitatore
  domains: "Navigato, Spirito d8+"
  description: "Insultare o umiliare un rivale può anche essere divertente, ma far sudare freddo un intero gruppo può essere una vera mossa tattica. Una volta per round, il personaggio può indirizzare un Test di Provocare o Intimidire contro tutti i nemici all'interno di un MEM. I bersagli devono essere in grado di vedere e sentire chiaramente il personaggio."
  source: core

- name: Vantaggio - Sociale
  subclass: Bassifondi
  domains: "Principiante, Intelligenza d6+"
  description: "Chi conosce i Bassifondi sa come contattare il mercato nero, sfuggire alla legge (o al crimine!) locale, mantenere un basso profilo quando è necessario, ottenere armi illegali, ricettare merci rubate, scoprire quale 'boss' sta reclutando manodopera. +2 ai tiri di Intimidire e Persuasione per Contattare Conoscenze nel mondo della criminalità; +2 ai tiri di Conoscenze Comuni per attività losche."
  source: core

- name: Vantaggio - Sociale
  subclass: Coinvolgere
  domains: "Principiante, Spirito d8+"
  description: "Le parole del personaggio non solo ispirano i suoi interlocutori, ma spesso incoraggiano anche gli altri. Una volta per turno, quando effettui un tiro di Supporto con Persuasione o Esibirsi, Coinvolgere ti permette di lanciare un dado in più dell'abilità utilizzata. Tale dado Supporta un altro alleato che sia in grado di vederti e sentirti e si applica alla sua prossima azione, qualunque essa sia."
  source: core

- name: Vantaggio - Sociale
  subclass: Coinvolgere Migliorato
  domains: "Navigato, Coinvolgere"
  description: "Puoi utilizzare l'effetto di Coinvolgere fino a due volte per turno (con due diverse azioni di Supportare)."
  source: core

- name: Vantaggio - Sociale
  subclass: Contatti
  domains: Principiante
  description: "L'eroe ha stretto un contatto con persone oppure con organizzazioni che possono aiutarlo quando è in difficoltà. Una volta per sessione, se può contattarli in qualche modo, il personaggio può richiedere un favore al proprio Contatti. Può essere acquisito più volte, specificando ogni volta un tipo di Contatto diverso."
  source: core

- name: Vantaggio - Sociale
  subclass: Controbattere
  domains: "Principiante, Provocare d6+"
  description: "Per alcuni, lo scontro verbale è un'arte non dissimile dalla scherma, e questo personaggio può definirsi un duellante esperto, pronto a punire chi osi sfidarlo. Puoi ripetere gratuitamente il tiro dado quando effettui un Test di Provocare."
  source: core

- name: Vantaggio - Sociale
  subclass: Incoraggiare
  domains: "Principiante, Spirito d8+"
  description: "Umiliare o intimorire un nemico non solo lo fa esitare, ma sostiene e rinsalda il morale dei propri alleati. Quando effettui con successo un Test contro un nemico, puoi anche rimuovere da un alleato lo stato di Distratto o Vulnerabile."
  source: core

- name: Vantaggio - Sociale
  subclass: Istigare
  domains: "Principiante, Provocare d6+"
  description: "I personaggi più scaltri sanno come manipolare i nemici, attraendone l'attenzione in modo che ignorino gli alleati o altri innocenti. Con un incremento in un Test di Provocare, puoi scegliere di rendere il bersaglio 'Istigato': subisce una penalità di -2 a qualunque azione rivolta a bersagli diversi dal personaggio che lo ha Istigato. Se ottieni un incremento quando resisti a Intimidire o Provocare, il tuo nemico diventa Distratto."
  source: core

- name: Vantaggio - Sociale
  subclass: Legame Comune
  domains: "Protagonista, Principiante, Spirito d8+"
  description: "Eroi altruisti e leader determinati sanno che la loro vera forza consiste nell'unione con i propri alleati. Questo Vantaggio ti permette di cedere i tuoi Benny agli alleati con i quali puoi comunicare."
  source: core

- name: Vantaggio - Sociale
  subclass: Minaccioso
  domains: "Principiante, uno Svantaggio tra Brutto/Implacabile/Meschino/Sanguinario"
  description: "Essere scorbutici o poco attraenti ha sicuramente un lato positivo quando si tratta di incutere paura nel cuore dei nemici. Aggiunge +2 ai tiri di Intimidire."
  source: core

- name: Vantaggio - Sociale
  subclass: Umiliare
  domains: "Principiante, Provocare d8+"
  description: "Le persone dotate di un acume crudele possono distruggere l'autostima dei rivali con un semplice gesto o un'osservazione pungente. Puoi ripetere gratuitamente il tiro dado quando effettui un Test di Provocare."
  source: core

- name: Vantaggio - Sociale
  subclass: Volonta di Ferro
  domains: "Principiante, Spirito d8+"
  description: "La forza di volontà può proteggerti come un'armatura quando qualcuno tenta di sminuirti o farti esitare. Aggiunge +2 ai tiri di Intelligenza o Spirito per resistere a un Test."
  source: core

- name: Vantaggio - Sociale
  subclass: Volonta di Ferro Migliorata
  domains: "Navigato, Coraggioso, Volonta di Ferro"
  description: "Il bonus di Volontà di Ferro si applica anche ai tiri di Intelligenza o Spirito per resistere ai poteri e negarne gli effetti. Non è cumulabile con Coraggioso, e non si applica ai tiri per resistere alle conseguenze dei poteri, per esempio contro la Paura o per riprendersi da Scosso."
  source: core

# Vantaggi Folli
- name: Vantaggio - Folle
  subclass: Campione
  domains: "Principiante, Spirito d8+, Combattere d6+"
  description: "I campioni combattono le forze delle tenebre (o della luce) e aggiungono +2 ai tiri di danno contro le creature soprannaturali malvagie (o buone, per i Campioni del male). Il bonus si applica a poteri, attacchi a distanza, in mischia, ad area, ecc."
  source: core

- name: Vantaggio - Folle
  subclass: Chi
  domains: "Veterano, Esperto di Arti Marziali"
  description: "Lo studio delle discipline marziali ha portato il personaggio nei territori della consapevolezza mistica. All'inizio di ogni combattimento, l'eroe ottiene un 'Punto Chi' spendibile per: ritirare un attacco fallito (anche un Fallimento Critico), costringere un nemico a ritirare un attacco riuscito contro di lui, o aggiungere +d6 a un tiro di danno di un attacco di Combattere effettuato con Armi Naturali (tale dado può esplodere!)."
  source: core

- name: Vantaggio - Folle
  subclass: Coraggio in Bottiglia
  domains: "Principiante, Vigore d8+"
  description: "Ci sono persone che reagiscono all'alcol in maniera molto particolare. Il round successivo a una buona sorsata (almeno 200 cl di qualcosa di forte), considera il Vigore incrementato di un tipo di dado. I tiri di Intelligenza e Agilità e delle loro abilità associate subiscono però una penalità di -1. Tali effetti durano per un'ora, dopodiché il personaggio subisce un livello di Fatica che dura per le quattro ore successive."
  source: core

- name: Vantaggio - Folle
  subclass: Guaritore
  domains: "Principiante, Spirito d8+"
  description: "Gli eroi con questo Vantaggio aggiungono +2 ai tiri di Guarigione, che siano di origine magica o naturale."
  source: core

- name: Vantaggio - Folle
  subclass: Legame Animale
  domains: Principiante
  description: "Alcuni individui riescono a stabilire un legame straordinario con gli animali che li accompagnano. Questi personaggi possono spendere i Benny sui tiri di qualunque animale sotto il loro controllo, incluse cavalcature, famigli e compagni animali di ogni genere."
  source: core

- name: Vantaggio - Folle
  subclass: Riciclatore
  domains: "Principiante, Fortuna"
  description: "Una volta per scena o per incontro l'eroe può trovare da qualche parte o 'ricordarsi improvvisamente' di avere con sé un oggetto di equipaggiamento, una manciata di munizioni, o qualche altro oggetto utile."
  source: core

- name: Vantaggio - Folle
  subclass: Senso del Pericolo
  domains: Principiante
  description: "L'eroe percepisce se sta per capitargli qualcosa. Quando sta per essere vittima di un attacco a Sorpresa, ottiene +2 al tiro di Percezione per poter agire al primo round. Con incremento, inizia l'incontro come se fosse già in Pausa. Consente anche un tiro di Percezione a -2 per accorgersi di pericoli non coperti dalle regole sulla Sorpresa."
  source: core

- name: Vantaggio - Folle
  subclass: Signore delle Bestie
  domains: "Principiante, Spirito d8+"
  description: "Il personaggio piace agli animali, che non lo attaccano mai a meno che non sia lui ad aggredirli o non siano infuriati per qualche motivo. Il 'magnetismo animale' è così forte da permettergli di attrarre un fedele compagno animale (di Taglia 0 o minore, soggetto all'approvazione del GM)."
  source: core

# Vantaggi Leggendari
- name: Vantaggio - Leggendario
  subclass: Duro Come il Ferro
  domains: "Leggendario, Vigore d8+"
  description: "L'eroe è un veterano di mille battaglie. Può subire quattro Ferite prima di diventare Incapacitato. La penalità massima da Ferite rimane comunque -3."
  source: core

- name: Vantaggio - Leggendario
  subclass: Piu Duro del Ferro
  domains: "Leggendario, Duro Come il Ferro, Vigore d12+"
  description: "L'eroe può subire cinque Ferite prima di diventare Incapacitato! La penalità massima da Ferite rimane comunque -3."
  source: core

- name: Vantaggio - Leggendario
  subclass: Maestro d'Armi
  domains: "Leggendario, Combattere d12+"
  description: "Ottieni +1 alla Parata e utilizzi il d8 invece del d6 come dado per i danni aggiuntivi per gli attacchi di Combattere. Il personaggio deve essere armato o possedere capacità o Vantaggi che contano come armi (per esempio Studente di Arti Marziali)."
  source: core

- name: Vantaggio - Leggendario
  subclass: Gran Maestro d'Armi
  domains: "Leggendario, Maestro d'Armi"
  description: "Ottieni un ulteriore +1 alla Parata e il dado per i danni aggiuntivi diventa il d10."
  source: core

- name: Vantaggio - Leggendario
  subclass: Professionista
  domains: "Leggendario, dado massimo nel Tratto specifico"
  description: "Il personaggio è un esperto in un particolare attributo o abilità (a tua scelta). Il Tratto e il relativo limite massimo aumentano di uno: d12 diventa d12+1, oppure d12+1 diventa d12+2. Questo Vantaggio può essere acquisito una sola volta per ciascun Tratto."
  source: core

- name: Vantaggio - Leggendario
  subclass: Esperto
  domains: "Leggendario, Professionista nel Tratto specifico"
  description: "Come per Professionista, il Tratto e il relativo limite massimo ricevono un ulteriore incremento."
  source: core

- name: Vantaggio - Leggendario
  subclass: Maestro
  domains: "Protagonista, Leggendario, Esperto nel Tratto specifico"
  description: "Quando effettui un tiro del Tratto specifico, utilizzi il d10 come Dado del Destino invece del d6."
  source: core

- name: Vantaggio - Leggendario
  subclass: Seguaci
  domains: "Protagonista, Leggendario"
  description: "Ogni volta che acquisisci questo Vantaggio, cinque seguaci si uniscono al tuo personaggio. Eventuali perdite vengono rimpiazzate automaticamente dopo un po' di tempo. I seguaci devono avere modo di mangiare e permettersi da vivere, e di solito si aspettano di ricevere una parte del bottino o altre ricompense."
  source: core

- name: Vantaggio - Leggendario
  subclass: Spalla
  domains: "Protagonista, Leggendario"
